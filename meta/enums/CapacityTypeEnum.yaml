id: https://nde.nl/ontology/hc/enum/CapacityTypeEnum
name: CapacityTypeEnum
title: Capacity Type Enumeration
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc

enums:
  CapacityTypeEnum:
    description: >-
      Types of storage or holding capacity measurements.
      Created 2026-01-17 per Rule 53 to support Capacity class.
    permissible_values:
      VOLUME:
        description: Cubic volume capacity (e.g., cubic meters)
      SHELF_LENGTH:
        description: Linear shelf or storage length (e.g., linear meters)
      FLOOR_AREA:
        description: Floor space area (e.g., square meters)
      ITEM_COUNT:
        description: Number of items that can be stored (e.g., boxes, folders)
      WEIGHT:
        description: Weight capacity (e.g., kilograms, tons)
      SEATING:
        description: Seating capacity (e.g., seats, persons)
      DISPLAY_AREA:
        description: Exhibition or display area
      RACK_SLOTS:
        description: Number of rack or shelf slots
      DRAWER_UNITS:
        description: Number of drawer units
      CABINET_UNITS:
        description: Number of cabinet or storage units
