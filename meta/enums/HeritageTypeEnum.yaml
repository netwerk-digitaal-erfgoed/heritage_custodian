id: https://nde.nl/ontology/hc/enum/HeritageTypeEnum
name: HeritageTypeEnum
title: Person Heritage Type Single-Letter Codes
version: 1.0.0

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  wd: http://www.wikidata.org/entity/


description: |
  Single-letter codes classifying a person's relevance to heritage sectors.
  Used in LinkedIn profile analysis, connection network data, and staff 
  heritage relevance classification.
  
  These codes are derived from the GLAMORCUBESFIXPHDNT taxonomy.
  Each code maps to a corresponding CustodianType subclass.
  
  **Usage Context**:
  - `heritage_relevance.heritage_types[]` in person entity profiles
  - `heritage_type` in PersonConnection records
  - Staff classification in custodian files
  
  **Mapping to CustodianType Classes**:
  Each single-letter code maps to a corresponding CustodianType subclass:
  - G → GalleryType
  - L → LibraryType
  - A → ArchiveOrganizationType
  - M → MuseumType
  - O → OfficialInstitutionType
  - R → ResearchOrganizationType
  - C → CommercialOrganizationType
  - U → UnspecifiedType
  - B → BioCustodianType
  - E → EducationProviderType
  - S → HeritageSocietyType
  - F → FeatureCustodianType
  - I → IntangibleHeritageGroupType
  - X → MixedCustodianType
  - P → PersonalCollectionType
  - H → HolySacredSiteType
  - D → DigitalPlatformType
  - N → NonProfitType
  - T → TasteScentHeritageType

enums:
  HeritageTypeEnum:
    description: |
      Single-letter heritage sector classification codes for person data.
      Used to classify individuals' professional relevance to heritage sectors.
    permissible_values:
      G:
        description: "Gallery - Works in gallery/exhibition sector"
        meaning: hc:class/GalleryType
        annotations:
          full_label: Gallery
          example_roles: "Gallery director, Curator, Exhibition designer"
          
      L:
        description: "Library - Works in library sector"
        meaning: hc:class/LibraryType
        annotations:
          full_label: Library
          example_roles: "Librarian, Collection manager, Digital librarian"
          
      A:
        description: "Archive - Works in archival/audiovisual heritage sector"
        meaning: hc:class/ArchiveOrganizationType
        annotations:
          full_label: Archive
          example_roles: "Archivist, Records manager, AV specialist"
          
      M:
        description: "Museum - Works in museum sector"
        meaning: hc:class/MuseumType
        annotations:
          full_label: Museum
          example_roles: "Museum curator, Conservator, Registrar"
          
      O:
        description: "Official - Works in government/official heritage institution"
        meaning: hc:class/OfficialInstitutionType
        annotations:
          full_label: Official Institution
          example_roles: "Policy advisor, Heritage officer, Government archivist"
          
      R:
        description: "Research - Works in heritage research/academia"
        meaning: hc:class/ResearchOrganizationType
        annotations:
          full_label: Research Center
          example_roles: "Researcher, Professor, Documentation specialist"
          
      C:
        description: "Commercial - Works in corporate heritage/brand archives"
        meaning: hc:class/CommercialOrganizationType
        annotations:
          full_label: Commercial/Corporate
          example_roles: "Corporate archivist, Brand historian"
          
      U:
        description: "Unknown - Heritage sector affiliation unclear"
        meaning: hc:class/UnspecifiedType
        annotations:
          full_label: Unknown/Unspecified
          example_roles: "Unable to determine from available data"
          
      B:
        description: "Bio - Works in botanical garden, zoo, or living collections"
        meaning: hc:class/BioCustodianType
        annotations:
          full_label: Botanical/Zoo
          example_roles: "Botanist, Zoologist, Living collections curator"
          
      E:
        description: "Education - Works in heritage education/universities with collections"
        meaning: hc:class/EducationProviderType
        annotations:
          full_label: Education Provider
          example_roles: "University librarian, Academic archivist, Museum educator"
          
      S:
        description: "Society - Works with heritage/historical societies"
        meaning: hc:class/HeritageSocietyType
        annotations:
          full_label: Heritage Society
          example_roles: "Society curator, Heritage volunteer, Local historian"
          
      F:
        description: "Feature - Works with geographic feature heritage sites"
        meaning: hc:class/FeatureCustodianType
        annotations:
          full_label: Feature Custodian
          example_roles: "Site manager, Monument keeper, Landscape curator"
          
      I:
        description: "Intangible - Works with intangible cultural heritage"
        meaning: hc:class/IntangibleHeritageGroupType
        annotations:
          full_label: Intangible Heritage
          example_roles: "Oral historian, Folklore specialist, Traditional crafts preservationist"
          
      X:
        description: "Mixed - Works across multiple heritage sectors"
        meaning: hc:class/MixedCustodianType
        annotations:
          full_label: Mixed/Multiple
          example_roles: "Cross-domain specialist, Multi-institution consultant"
          
      P:
        description: "Personal - Works with private/personal collections"
        meaning: hc:class/PersonalCollectionType
        annotations:
          full_label: Personal Collection
          example_roles: "Private collection manager, Family archive keeper"
          
      H:
        description: "Holy - Works with religious heritage sites/collections"
        meaning: hc:class/HolySacredSiteType
        annotations:
          full_label: Holy/Sacred Site
          example_roles: "Church archivist, Temple curator, Religious heritage officer"
          
      D:
        description: "Digital - Works in digital heritage/data/technology"
        meaning: hc:class/DigitalPlatformType
        annotations:
          full_label: Digital Platform
          example_roles: "Digital archivist, Data engineer, Heritage technologist"
          
      N:
        description: "NGO - Works with non-profit heritage organizations"
        meaning: hc:class/NonProfitType
        annotations:
          full_label: Non-Profit Organization
          example_roles: "NGO program manager, Heritage advocate, Conservation officer"
          
      T:
        description: "Taste/Scent - Works with culinary/olfactory heritage"
        meaning: hc:class/TasteScentHeritageType
        annotations:
          full_label: Taste/Scent Heritage
          example_roles: "Culinary historian, Food heritage specialist, Perfume archivist"
