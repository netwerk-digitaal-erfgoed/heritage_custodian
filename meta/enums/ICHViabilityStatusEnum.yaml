# ICH Viability Status Enumeration
# Current health/viability status of intangible heritage forms

id: https://nde.nl/ontology/hc/enum/ICHViabilityStatusEnum
name: ich_viability_status_enum
title: ICH Viability Status Enumeration

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  ich: https://ich.unesco.org/

enums:
  ICHViabilityStatusEnum:
    description: |
      Current viability/health status of an intangible cultural heritage form.
      
      Based on UNESCO ICH assessment criteria for evaluating heritage viability.
      Factors include: practitioner numbers, transmission success, community 
      engagement, institutional support, and external threats.
    enum_uri: hc:ICHViabilityStatus
    permissible_values:
      THRIVING:
        description: |
          Heritage form is actively practiced with strong transmission.
          
          Indicators:
          - Stable or growing practitioner community
          - Active intergenerational transmission
          - Regular practice opportunities (festivals, workshops)
          - Strong institutional/community support
          - Youth engagement
        meaning: hc:Viability/Thriving
      
      STABLE:
        description: |
          Heritage form is maintained at consistent level.
          
          Indicators:
          - Stable practitioner numbers
          - Functional transmission mechanisms
          - Regular but not growing practice
          - Adequate community support
        meaning: hc:Viability/Stable
      
      VULNERABLE:
        description: |
          Heritage form shows signs of declining viability.
          
          Indicators:
          - Declining practitioner numbers
          - Transmission challenges
          - Aging practitioner community
          - Reduced practice frequency
          - Decreasing community interest
          
          Safeguarding intervention recommended.
        meaning: hc:Viability/Vulnerable
      
      ENDANGERED:
        description: |
          Heritage form at significant risk of disappearing.
          
          Indicators:
          - Very few remaining practitioners
          - Broken transmission chain
          - Minimal or no youth involvement
          - Loss of practice contexts
          - Urgent intervention required
          
          May qualify for UNESCO Urgent Safeguarding list.
        meaning: hc:Viability/Endangered
      
      CRITICALLY_ENDANGERED:
        description: |
          Heritage form in immediate danger of extinction.
          
          Indicators:
          - Handful of elderly practitioners remaining
          - No active transmission
          - No community structure to support practice
          - Documentation may be only preservation option
        meaning: hc:Viability/CriticallyEndangered
      
      DORMANT:
        description: |
          Heritage form no longer actively practiced.
          
          Indicators:
          - No living practitioners
          - Historical documentation only
          - Potential for revival if knowledge exists
          - May be revivable through reconstruction
        meaning: hc:Viability/Dormant
      
      REVIVING:
        description: |
          Heritage form undergoing active revival efforts.
          
          Indicators:
          - Active revitalization program
          - New practitioners being trained
          - Community mobilization for recovery
          - Institutional support for revival
          - Historical research informing reconstruction
        meaning: hc:Viability/Reviving
      
      UNKNOWN:
        description: |
          Viability status not yet assessed or data unavailable.
          
          Used when:
          - Newly registered heritage form
          - Assessment pending
          - Insufficient data for classification
        meaning: hc:Viability/Unknown
