id: https://nde.nl/ontology/hc/enum/ConsortiumGovernanceRoleEnum
name: consortium_governance_role_enum
title: Consortium Governance Role Enum
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  ConsortiumGovernanceRoleEnum:
    description: |
      Role a contributing agency plays in consortium governance.

      Consortium governance models vary, but typically include:
      - Voting members with equal representation
      - Observers who participate without voting
      - Founding members with special status
      - Associates with limited participation
    permissible_values:
      VOTING_MEMBER:
        description: |
          Full voting member of the consortium governance body.

          For VIAF Council: Each contributor can appoint one voting representative.
          Voting rights on:
          - Membership decisions (new contributors)
          - Technical standards
          - Data licensing
          - Strategic direction
      OBSERVER:
        description: |
          Participates in consortium activities but without voting rights.

          May attend meetings, receive communications, access data,
          but cannot vote on governance decisions.
      FOUNDING_MEMBER:
        description: |
          Original founding member with potential special status.

          For VIAF: Library of Congress, Deutsche Nationalbibliothek,
          and Bibliotheque nationale de France were founding contributors (2003).

          May have special recognition or legacy privileges.
      ASSOCIATE:
        description: |
          Limited participation - data contribution only, no governance role.

          Some consortium services allow data contribution without
          full membership (e.g., smaller national libraries).
      REGIONAL_REPRESENTATIVE:
        description: |
          Represents a regional group of contributors.

          In some consortia, regional groups elect representatives
          rather than each member having individual votes.
