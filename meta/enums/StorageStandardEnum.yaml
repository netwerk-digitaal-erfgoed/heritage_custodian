# StorageStandardEnum - International and regional standards for storage conditions
# 
# References key standards for heritage storage including:
# - ISO 82306 (Document storage requirements)
# - ISO/TR 19815:2018 (Environmental management framework)
# - EN 16893:2018 (Building specifications)
# - EN 15757:2010 (Temperature and humidity)
# - ISO 9706:2025 (Paper permanence)
# 
# Generation date: 2025-11-29
# 
id: https://nde.nl/ontology/hc/enum/storage-standard
name: storage_standard_enum
title: Storage Standard Enumeration

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/

imports:
  - linkml:types

enums:
  StorageStandardEnum:
    description: |
      International and regional standards governing storage conditions
      for heritage collections. These standards define requirements for
      building design, environmental control, and preservation practices.
      
      Standards are referenced in:
      - StorageConditionPolicy (what conditions SHOULD be achieved)
      - StorageCondition (how observed conditions compare to standards)
      
      **KEY STANDARDS**:
      
      1. **ISO 82306** - Document storage requirements (general)
      2. **ISO/TR 19815:2018** - Environmental management framework
      3. **EN 16893:2018** - Building specifications (European)
      4. **EN 15757:2010** - Temperature and humidity control
      5. **ISO 9706:2025** - Paper permanence requirements
      6. **ISO 11108** - Archival paper durability
      7. **PAS 198** - UK specification for archive storage
    
    permissible_values:
      ISO_82306:
        title: ISO 82306 Document Storage Requirements
        description: |
          ISO 82306 "Document management — Information and documentation —
          Requirements for document storage."
          
          Comprehensive standard covering physical and environmental
          requirements for document storage facilities.
        meaning: dcterms:Standard
        annotations:
          scope: "Document storage facility requirements"
          url: "https://www.iso.org/standard/82306.html"
          status: "Active"
      
      ISO_TR_19815_2018:
        title: ISO/TR 19815:2018 Environmental Management
        description: |
          ISO/TR 19815:2018 "Document management — Information and
          documentation — Requirements for environmental conditions."
          
          Technical report providing framework for managing environmental
          conditions in document storage facilities. Covers monitoring,
          target setting, and remediation approaches.
        meaning: dcterms:Standard
        annotations:
          scope: "Environmental management framework"
          year: "2018"
          document_type: "Technical Report"
          url: "https://www.iso.org/standard/66264.html"
      
      EN_16893_2018:
        title: EN 16893:2018 Building Specifications
        description: |
          EN 16893:2018 "Conservation of Cultural Heritage — Specifications
          for location, construction and modification of buildings or rooms
          intended for the storage or use of heritage collections."
          
          European standard providing building specifications for heritage
          storage. Covers site selection, construction materials, fire
          protection, and security requirements.
        meaning: dcterms:Standard
        annotations:
          scope: "Building specifications for heritage storage"
          year: "2018"
          jurisdiction: "European Union"
          organization: "CEN (European Committee for Standardization)"
      
      EN_15757_2010:
        title: EN 15757:2010 Temperature and Humidity
        description: |
          EN 15757:2010 "Conservation of Cultural Property — Specifications
          for temperature and relative humidity to limit climate-induced
          mechanical damage in organic hygroscopic materials."
          
          Critical standard for preventing damage from temperature and
          humidity fluctuations. Defines acceptable ranges and fluctuation
          limits for different material types.
        meaning: dcterms:Standard
        annotations:
          scope: "Temperature and RH specifications"
          year: "2010"
          jurisdiction: "European Union"
          key_concept: "Historical climate, proofed fluctuations"
      
      ISO_9706_2025:
        title: ISO 9706:2025 Paper Permanence
        description: |
          ISO 9706:2025 "Information and documentation — Paper for documents
          — Requirements for permanence."
          
          Specifies requirements for permanent paper intended for documents.
          Defines paper characteristics for long-term preservation.
        meaning: dcterms:Standard
        annotations:
          scope: "Paper permanence requirements"
          year: "2025"
          edition: "2"
          url: "https://www.iso.org/standard/88908.html"
      
      ISO_11108:
        title: ISO 11108 Archival Paper
        description: |
          ISO 11108 "Information and documentation — Archival paper —
          Requirements for permanence and durability."
          
          Specifies requirements for archival-quality paper exceeding
          basic permanence requirements of ISO 9706.
        meaning: dcterms:Standard
        annotations:
          scope: "Archival paper durability"
          relationship: "Extends ISO 9706"
      
      ISO_20494:
        title: ISO 20494 Paper Stability
        description: |
          ISO 20494 "Information and documentation — Paper stability
          for general graphic applications — Requirements."
          
          Defines paper stability requirements for general graphic
          applications including printing and publishing.
        meaning: dcterms:Standard
        annotations:
          scope: "Paper stability for graphics"
      
      PAS_198_2012:
        title: PAS 198:2012 UK Archive Storage
        description: |
          PAS 198:2012 "Specification for managing environmental conditions
          for cultural collections."
          
          UK Publicly Available Specification providing practical guidance
          for archive and museum storage. Includes risk-based approach
          to environmental management.
        meaning: dcterms:Standard
        annotations:
          scope: "UK heritage storage specification"
          year: "2012"
          jurisdiction: "United Kingdom"
          organization: "BSI (British Standards Institution)"
      
      BS_5454_2000:
        title: BS 5454:2000 Archive Storage (Withdrawn)
        description: |
          BS 5454:2000 "Recommendations for the storage and exhibition
          of archival documents."
          
          Historical UK standard for archive storage. Superseded by
          PAS 198:2012 but still referenced in legacy documentation.
        meaning: dcterms:Standard
        annotations:
          scope: "Archive storage (historical)"
          year: "2000"
          status: "Withdrawn - see PAS 198:2012"
          jurisdiction: "United Kingdom"
      
      EN_16141_2012:
        title: EN 16141:2012 Showcases
        description: |
          EN 16141:2012 "Conservation of cultural heritage — Guidelines
          for management of environmental conditions — Open storage
          facilities, definitions and characteristics of collection centres
          offering open storage facilities."
        meaning: dcterms:Standard
        annotations:
          scope: "Display and showcase environments"
          year: "2012"
      
      ASHRAE_CHAPTER_24:
        title: ASHRAE Handbook Chapter 24
        description: |
          ASHRAE Handbook: HVAC Applications, Chapter 24 "Museums, Galleries,
          Archives, and Libraries."
          
          North American standard providing HVAC specifications for
          heritage facilities. Updated in each handbook edition.
        meaning: dcterms:Standard
        annotations:
          scope: "HVAC for heritage facilities (North America)"
          organization: "ASHRAE"
          updates: "Regular handbook editions"
      
      IMAGE_PERMANENCE_INSTITUTE:
        title: Image Permanence Institute Guidelines
        description: |
          IPI (Image Permanence Institute) guidelines for storage of
          photographic materials, film, and other imaging media.
          
          Includes specific temperature and humidity recommendations
          for different photographic processes.
        meaning: dcterms:Standard
        annotations:
          scope: "Photographic and film storage"
          organization: "Rochester Institute of Technology"
          url: "https://www.imagepermanenceinstitute.org/"
      
      NISO_TR01:
        title: NISO TR01 Environmental Guidelines
        description: |
          NISO TR01 "Environmental Guidelines for the Storage of Paper
          Records."
          
          US technical report providing environmental guidelines for
          paper-based collections in libraries and archives.
        meaning: dcterms:Standard
        annotations:
          scope: "Paper records storage (US)"
          organization: "NISO"
      
      INSTITUTION_SPECIFIC:
        title: Institution-Specific Standard
        description: |
          Storage conditions governed by institution-specific policies
          that may reference or adapt international standards to local
          requirements and resources.
        meaning: dcterms:Standard
        annotations:
          scope: "Custom institutional requirements"
          note: "Document specific requirements in StorageConditionPolicy"
      
      NO_STANDARD_APPLIED:
        title: No Standard Applied
        description: |
          Storage facility does not follow any recognized standard.
          May indicate legacy facility, resource constraints, or
          non-professional management.
        meaning: dcterms:Standard
        annotations:
          risk_level: "High - no benchmark for assessment"
          action: "Recommend standards adoption"
