id: https://nde.nl/ontology/hc/enum/CateringTypeEnum
name: catering_type_enum
title: CateringTypeEnum
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  CateringTypeEnum:
    description: |
      Types of catering facilities at heritage custodian venues.
      
      Used by CateringPlace class to classify food and beverage establishments
      operated at or by heritage institutions.
    permissible_values:
      CAFE:
        description: Casual café or coffee shop
      RESTAURANT:
        description: Full-service restaurant
      TEAROOM:
        description: Tea room
      CANTEEN:
        description: Staff cafeteria
      TERRACE:
        description: Outdoor/garden café
      HISTORIC_CAFE:
        description: Heritage café with cultural significance
      EVENT_CATERING:
        description: Function and event catering space
