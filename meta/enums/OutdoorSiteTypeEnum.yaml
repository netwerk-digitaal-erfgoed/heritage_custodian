id: https://nde.nl/ontology/hc/enum/OutdoorSiteTypeEnum
name: outdoor_site_type_enum
title: OutdoorSiteTypeEnum
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  OutdoorSiteTypeEnum:
    description: |
      Types of outdoor heritage sites managed by heritage custodians.
      
      Used by OutdoorSite class to classify outdoor areas such as gardens,
      sculpture parks, archaeological sites, and nature reserves.
    permissible_values:
      SCULPTURE_GARDEN:
        description: Outdoor art/sculpture display
      FORMAL_GARDEN:
        description: Historic formal garden
      LANDSCAPE_PARK:
        description: Landscape or pleasure grounds
      ARCHAEOLOGICAL_SITE:
        description: Archaeological excavation or ruins
      BOTANICAL_GARDEN:
        description: Botanical collection gardens
      NATURE_RESERVE:
        description: Managed natural area
      CEMETERY:
        description: Historic burial grounds
      PLAZA_COURTYARD:
        description: Outdoor plaza or courtyard space
      ZOO_GROUNDS:
        description: Zoological garden grounds
