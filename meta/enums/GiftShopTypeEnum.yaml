# GiftShopTypeEnum - Types of heritage institution retail operations
# 
# Used by GiftShop class to classify types of retail spaces.
# 
# Generation date: 2025-11-29
# 
id: https://nde.nl/ontology/hc/enum/gift-shop-type
name: gift_shop_type_enum
title: Gift Shop Type Enumeration

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  gr: http://purl.org/goodrelations/v1#

enums:
  GiftShopTypeEnum:
    description: |
      Types of retail operations for heritage custodians.
      
      Classifies the primary focus and format of the gift shop.
      
      Aligns with Schema.org schema:Store and subtypes.
    
    permissible_values:
      MUSEUM_SHOP:
        title: museum shop
        description: |
          General museum gift shop with diverse merchandise related to collections.
          Offers reproductions, books, souvenirs, design objects, and branded items.
        meaning: schema:Store
        annotations:
          examples: "Rijksmuseum Shop, MoMA Store, V&A Shop"
      
      BOOKSHOP:
        title: bookshop
        description: |
          Retail primarily focused on books, publications, and printed materials.
          May include catalogs, academic publications, guides, and children's books.
        meaning: schema:BookStore
        annotations:
          examples: "British Library Shop, Tate Bookshop, National Archives Publications"
      
      DESIGN_STORE:
        title: design store
        description: |
          Retail focused on design objects, home decor, and high-end reproductions.
          Emphasizes design quality and aesthetic value over souvenirs.
        meaning: schema:Store
        annotations:
          examples: "MoMA Design Store, Design Museum Shop, Cooper Hewitt Shop"
      
      SPECIALTY_SHOP:
        title: specialty shop
        description: |
          Themed or collection-specific retail focused on particular subject area.
          Examples: science shop, natural history shop, military history shop.
        meaning: schema:Store
        annotations:
          examples: "NASA Shop, Natural History Museum Shop, Imperial War Museum Shop"
      
      POP_UP:
        title: pop-up shop
        description: |
          Temporary retail for special exhibitions or events.
          Has defined valid_from/valid_to matching exhibition dates.
        meaning: schema:Store
        annotations:
          examples: "Vermeer Exhibition Shop, Blockbuster temporary retail"
      
      KIOSK:
        title: kiosk
        description: |
          Small-format retail point, often unmanned or with minimal staffing.
          Located at entrance/exit, in galleries, or at satellite locations.
        meaning: schema:Store
        annotations:
          examples: "Gallery kiosk, Entrance vending, Self-service point"
      
      ONLINE_ONLY:
        title: online only
        description: |
          E-commerce operation without physical retail presence.
          Institution maintains only web-based shop.
        meaning: schema:OnlineStore
        annotations:
          examples: "Small museum webshop, Print-on-demand only"
      
      CAFE_SHOP:
        title: cafe shop
        description: |
          Combined cafe and retail space.
          Sells merchandise alongside food and beverages.
        meaning: schema:CafeOrCoffeeShop
        annotations:
          examples: "Museum cafe with merchandise corner, Gift area in restaurant"
      
      CHILDREN_SHOP:
        title: children's shop
        description: |
          Retail focused on children's products, educational toys, and family items.
          May be separate space or section within main shop.
        meaning: schema:Store
        annotations:
          examples: "Please Touch Museum Shop, Science center kids shop"
      
      PUBLICATION_CENTER:
        title: publication center
        description: |
          Focused on institutional publications, catalogs, and scholarly works.
          May handle mail-order and institutional sales.
        meaning: schema:Store
        annotations:
          examples: "National Gallery Publications, University Press retail outlet"
