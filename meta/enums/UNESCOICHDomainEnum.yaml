# UNESCO Intangible Cultural Heritage Domain Enumeration
# Five domains per the 2003 Convention for the Safeguarding of the ICH

id: https://nde.nl/ontology/hc/enum/UNESCOICHDomainEnum
name: unesco_ich_domain_enum
title: UNESCO ICH Domain Enumeration

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  ich: https://ich.unesco.org/

enums:
  UNESCOICHDomainEnum:
    description: |
      The five domains of intangible cultural heritage as defined by 
      the UNESCO 2003 Convention for the Safeguarding of the Intangible 
      Cultural Heritage.
      
      Article 2 of the Convention defines ICH as manifesting in these domains.
      Heritage practices may belong to multiple domains simultaneously.
    enum_uri: ich:Domain
    permissible_values:
      ORAL_TRADITIONS_EXPRESSIONS:
        description: |
          Oral traditions and expressions, including language as a vehicle 
          of the intangible cultural heritage.
          
          Examples: Storytelling, epic poetry, folk tales, legends, riddles,
          proverbs, songs, chants, prayers, indigenous languages.
        meaning: ich:Domain/OralTraditions
      
      PERFORMING_ARTS:
        description: |
          Performing arts including music, dance, theater, and other 
          performance traditions.
          
          Examples: Traditional music, folk dance, puppet theater, opera,
          carnival performances, ritual dances, instrumental traditions.
        meaning: ich:Domain/PerformingArts
      
      SOCIAL_PRACTICES_RITUALS_FESTIVE_EVENTS:
        description: |
          Social practices, rituals and festive events that structure 
          community life and affirm group identity.
          
          Examples: Festivals, carnivals, commemorations, rites of passage,
          seasonal celebrations, community gatherings, religious ceremonies.
          
          Most KIEN-registered Dutch heritage forms fall in this domain.
        meaning: ich:Domain/SocialPractices
      
      KNOWLEDGE_NATURE_UNIVERSE:
        description: |
          Knowledge and practices concerning nature and the universe.
          
          Examples: Traditional ecological knowledge, traditional medicine,
          weather forecasting, astronomical knowledge, agricultural practices,
          navigation skills, animal husbandry traditions.
        meaning: ich:Domain/NatureKnowledge
      
      TRADITIONAL_CRAFTSMANSHIP:
        description: |
          Traditional craftsmanship - skills and knowledge involved in 
          making objects, tools, and artworks.
          
          Examples: Weaving, pottery, woodcarving, metalworking, lace-making,
          boat building, instrument making, traditional cooking techniques.
          
          Focus is on skills and knowledge, not the products themselves.
        meaning: ich:Domain/Craftsmanship
