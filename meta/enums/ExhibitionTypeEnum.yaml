# ExhibitionTypeEnum
# Classifies types of museum/gallery/archive exhibitions
#
# Created January 2026 for Exhibition class

id: https://nde.nl/ontology/hc/enum/ExhibitionTypeEnum
name: exhibition_type_enum
title: Exhibition Type Enumeration

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  aat: http://vocab.getty.edu/aat/

imports:
  - linkml:types

default_prefix: hc

enums:
  ExhibitionTypeEnum:
    description: |
      Categorizes exhibitions by their temporal nature and format.
      
      **Use Cases**:
      - Museums: Permanent collection displays, temporary exhibitions, traveling shows
      - Archives: Document exhibitions, historical displays
      - Libraries: Special collections exhibitions, author retrospectives
      - Galleries: Solo shows, group exhibitions, art fairs
      
      **Ontology Alignment**:
      - AAT: Uses Getty Art & Architecture Thesaurus concepts where available
      - Schema.org: Aligned with schema:ExhibitionEvent subtypes
    permissible_values:
      PERMANENT:
        description: |
          Long-term or indefinite exhibition of permanent collection.
          Typically core museum displays that remain for years.
        meaning: aat:300054766
        examples:
          - value: "Rijksmuseum Gallery of Honour"
          - value: "British Museum Egyptian collection"
      
      TEMPORARY:
        description: |
          Time-limited exhibition with defined start and end dates.
          Typically 3-12 months duration.
        meaning: aat:300054767
        examples:
          - value: "Vermeer exhibition (Feb-Jun 2023)"
          - value: "Summer blockbuster exhibition"
      
      TRAVELING:
        description: |
          Exhibition that tours multiple venues.
          Also known as touring or itinerant exhibition.
        meaning: aat:300386268
        examples:
          - value: "King Tut traveling exhibition"
          - value: "Impressionism tour across Europe"
      
      VIRTUAL:
        description: |
          Online-only or primarily digital exhibition.
          Accessible via website, VR, or digital platforms.
        meaning: schema:VirtualLocation
        examples:
          - value: "Google Arts & Culture online exhibition"
          - value: "3D virtual museum tour"
      
      HYBRID:
        description: |
          Exhibition with both physical and significant virtual components.
          Digital extension enhances or parallels physical exhibition.
        examples:
          - value: "Physical exhibition with companion VR experience"
          - value: "In-gallery exhibit with online collection deep-dive"
      
      POP_UP:
        description: |
          Short-term exhibition, typically less than 3 months.
          Often in unconventional or temporary spaces.
        examples:
          - value: "Weekend pop-up art show"
          - value: "Festival exhibition pavilion"
      
      RETROSPECTIVE:
        description: |
          Exhibition surveying an artist's or subject's complete body of work.
          Typically spans career or significant time period.
        meaning: aat:300054768
        examples:
          - value: "Picasso: A Retrospective"
          - value: "50 Years of Photography: Career Retrospective"
      
      SOLO:
        description: |
          Exhibition featuring work of a single artist.
          Also known as one-person show or monographic exhibition.
        meaning: aat:300054770
        examples:
          - value: "Yayoi Kusama: Infinity Mirrors"
          - value: "Frida Kahlo solo exhibition"
      
      GROUP:
        description: |
          Exhibition featuring multiple artists or contributors.
          Also known as collective or thematic exhibition.
        meaning: aat:300054771
        examples:
          - value: "Young British Artists (YBA) group show"
          - value: "Women in Photography collective exhibition"
      
      LOAN:
        description: |
          Exhibition primarily composed of borrowed works from other institutions.
          Emphasis on works not normally held by hosting institution.
        examples:
          - value: "Masterpieces from the Prado"
          - value: "Loaned treasures from private collections"
      
      ARCHIVAL:
        description: |
          Exhibition of archival materials: documents, manuscripts, photographs.
          Often found in archives, libraries, or special collections.
        meaning: aat:300264547
        examples:
          - value: "Letters from the Front: WWI correspondence"
          - value: "Presidential Papers exhibition"
      
      COMMEMORATIVE:
        description: |
          Exhibition marking anniversary, memorial, or significant event.
          Often tied to specific dates or historical milestones.
        examples:
          - value: "D-Day 80th Anniversary Exhibition"
          - value: "Founding Fathers: 250 Years"
      
      SITE_SPECIFIC:
        description: |
          Exhibition created for and integrated with specific location.
          Artwork responds to architectural or spatial context.
        meaning: aat:300185655
        examples:
          - value: "Olafur Eliasson installation in Tate Turbine Hall"
          - value: "Land art exhibition in sculpture garden"
      
      BLOCKBUSTER:
        description: |
          Large-scale, high-profile temporary exhibition.
          Often with extended hours, timed tickets, major marketing.
        examples:
          - value: "Tutankhamun and the Golden Age of the Pharaohs"
          - value: "Van Gogh Immersive Experience"
