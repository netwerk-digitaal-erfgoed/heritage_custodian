id: https://nde.nl/ontology/hc/enum/SourceDocumentTypeEnum
name: SourceDocumentTypeEnum
title: Source Document Type Enumeration

imports:
  - linkml:types

enums:
  SourceDocumentTypeEnum:
    description: "Types of source documents (CIDOC-CRM E55_Type)"
    reachable_from:
      source_ontology: crm
      source_nodes:
        - crm:E55_Type
        - crm:E31_Document
    permissible_values:
      ARCHIVAL_DOCUMENT:
        description: "Archival record or manuscript"
        meaning: crm:E31_Document
      WEBSITE:
        description: "Website or web page"
        meaning: schema:WebPage
      LETTERHEAD:
        description: "Institutional letterhead"
        meaning: crm:E31_Document
      STATUTE:
        description: "Legal statute or charter"
        meaning: crm:E31_Document
      PUBLICATION:
        description: "Published work (book, article, etc.)"
        meaning: schema:CreativeWork
      DATABASE:
        description: "Database or registry entry"
        meaning: schema:Dataset
      SIGNAGE:
        description: "Physical signage or nameplate"
        meaning: crm:E31_Document
