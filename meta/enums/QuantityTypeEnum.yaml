id: https://nde.nl/ontology/hc/enum/QuantityTypeEnum
name: QuantityTypeEnum
title: Quantity Type Enum
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  qudt: http://qudt.org/schema/qudt/
  schema: http://schema.org/
imports:
- linkml:types
default_prefix: hc
enums:
  QuantityTypeEnum:
    description: >-
      Type of quantity being measured.
    enum_uri: hc:QuantityTypeEnum
    permissible_values:
      STAFF_COUNT:
        description: Number of staff members or employees.
        meaning: schema:numberOfEmployees
      COLLECTION_SIZE:
        description: Number of items in a collection.
        meaning: schema:size
      VISITOR_COUNT:
        description: Number of visitors (annual, daily, etc.).
      BUDGET_AMOUNT:
        description: Financial amount (budget, revenue, cost).
        meaning: schema:amount
      AREA:
        description: Physical area or floor space.
        meaning: schema:floorSize
      DURATION:
        description: Time duration or period.
        meaning: schema:duration
      LINEAR_EXTENT:
        description: Linear measurement (e.g., archive meters).
        meaning: qudt:Length
      CAPACITY:
        description: Maximum capacity (seats, storage, etc.).
        meaning: schema:maximumAttendeeCapacity
      ENGAGEMENT_COUNT:
        description: Social media engagement count (comments, likes, shares, etc.).
        meaning: schema:interactionStatistic
      VIEW_COUNT:
        description: Number of views on digital content (video, page, etc.).
        meaning: schema:interactionStatistic
      OBJECT_COUNT:
        description: Number of distinct objects detected or tracked.
        meaning: schema:size
      CLAIM_COUNT:
        description: Number of claims or assertions extracted from sources.
        meaning: schema:numberOfItems
      CHARACTER_COUNT:
        description: Number of characters in text content.
      WORD_COUNT:
        description: Number of words in text content.
        meaning: schema:wordCount
      OTHER:
        description: Other type of quantity not listed.
