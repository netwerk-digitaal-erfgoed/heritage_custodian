id: https://nde.nl/ontology/hc/enum/CompressionTypeEnum
name: compression_type_enum
title: Compression Type Enum
prefixes:
  linkml: https://w3id.org/linkml/
imports:
- linkml:types
enums:
  CompressionTypeEnum:
    description: |
      Compression types for file downloads.
    permissible_values:
      NONE:
        description: |
          No compression - plain file.

          MIME type unchanged from content type.
      GZIP:
        description: |
          Gzip compression.

          Single compressed file.
          Content-Encoding: gzip
      ZIP:
        description: |
          ZIP archive.

          May contain multiple files.
          application/zip
      BZIP2:
        description: |
          Bzip2 compression.

          Higher compression ratio than gzip.
      XZ:
        description: |
          XZ/LZMA compression.

          Very high compression ratio.
