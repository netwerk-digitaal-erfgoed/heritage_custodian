id: https://nde.nl/ontology/hc/enum/ExhibitionSpaceTypeEnum
name: exhibition_space_type_enum
title: ExhibitionSpaceTypeEnum
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  ExhibitionSpaceTypeEnum:
    description: |
      Types of auxiliary exhibition spaces operated by heritage custodians.
      
      Used by ExhibitionSpace class to classify secondary exhibition venues
      such as satellite galleries, partner venues, and project spaces.
    permissible_values:
      SATELLITE_GALLERY:
        description: Permanent secondary exhibition venue
      EXHIBITION_PAVILION:
        description: Purpose-built exhibition structure
      PARTNER_VENUE:
        description: Exhibition space in another institution
      POP_UP_GALLERY:
        description: Temporary exhibition venue
      OUTDOOR_EXHIBITION:
        description: Open-air display area
      PROJECT_SPACE:
        description: Experimental/contemporary art space
      STUDY_GALLERY:
        description: Visible storage or study collection display
