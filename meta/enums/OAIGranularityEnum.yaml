id: https://nde.nl/ontology/hc/enum/OAIGranularityEnum
name: oai_granularity_enum
title: OAI Granularity Enum
prefixes:
  linkml: https://w3id.org/linkml/
imports:
- linkml:types
enums:
  OAIGranularityEnum:
    description: |
      OAI-PMH datestamp granularity.

      Determines the precision of date/time values used in
      selective harvesting (from/until parameters).
    permissible_values:
      YYYY_MM_DD:
        description: |
          Day-level granularity.

          Format: YYYY-MM-DD

          Example: "2025-12-14"
      YYYY_MM_DD_THH_MM_SS_Z:
        description: |
          Second-level granularity.

          Format: YYYY-MM-DDThh:mm:ssZ

          Example: "2025-12-14T10:30:00Z"

          Note: Must use UTC (Z suffix).
