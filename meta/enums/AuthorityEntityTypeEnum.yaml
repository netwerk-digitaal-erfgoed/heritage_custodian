id: https://nde.nl/ontology/hc/enum/AuthorityEntityTypeEnum
name: authority_entity_type_enum
title: Authority Entity Type Enum
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  AuthorityEntityTypeEnum:
    description: Types of entities covered in authority files
    permissible_values:
      PERSON:
        description: |
          Personal name authorities.
          Authors, artists, historical figures.
      CORPORATE_BODY:
        description: |
          Corporate/organizational name authorities.
          Companies, institutions, museums, libraries, archives.
      GEOGRAPHIC:
        description: |
          Geographic name authorities.
          Places, administrative regions.
      WORK:
        description: |
          Work/title authorities.
          Uniform titles for works (books, music, art).
      SUBJECT:
        description: |
          Subject heading authorities.
          Topical terms for classification.
      EVENT:
        description: |
          Event authorities.
          Conferences, exhibitions, historical events.
      FAMILY:
        description: |
          Family name authorities.
          Noble houses, dynasties, family groups.
