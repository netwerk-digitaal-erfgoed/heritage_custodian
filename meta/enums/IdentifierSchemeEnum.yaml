# Identifier Scheme Enumeration - Types of identifiers
# Extracted from custodian_source.yaml per Rule 38 (modular schema files)

id: https://nde.nl/ontology/hc/enums/IdentifierSchemeEnum
name: IdentifierSchemeEnum
title: Identifier Scheme Enumeration

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/

imports:
  - linkml:types

default_range: string

enums:
  IdentifierSchemeEnum:
    description: Types of identifiers
    permissible_values:
      ISIL:
        description: International Standard Identifier for Libraries
      GHCID:
        description: GLAM Heritage Custodian ID (string format)
      GHCID_UUID:
        description: GHCID as UUID v5 (SHA-1)
      GHCID_UUID_SHA256:
        description: GHCID as UUID v8 (SHA-256)
      GHCID_NUMERIC:
        description: GHCID as 64-bit integer
      RECORD_ID:
        description: Database record UUID v7
      Wikidata:
        description: Wikidata Q-number
      VIAF:
        description: Virtual International Authority File
      GND:
        description: Gemeinsame Normdatei (German)
      KvK:
        description: Dutch Chamber of Commerce number
      Sigla:
        description: Czech library sigla identifier
      IČO:
        description: Czech business identification number
      DIČ:
        description: Czech tax identification number (Daňové identifikační číslo)
      Website:
        description: Official website URL as identifier
      LOC:
        description: Library of Congress identifier
      BNF:
        description: Bibliothèque nationale de France identifier
      ORCID:
        description: Open Researcher and Contributor ID
      ROR:
        description: Research Organization Registry identifier
      OpenStreetMap:
        description: OpenStreetMap node/way/relation ID
      CONABIP:
        description: Argentine popular library network identifier
      OLD_ID:
        description: Legacy or previous identifier from source system
      ARON_UUID:
        description: Czech ARON archival system UUID
      INSTITUTION_CODE:
        description: Institution code from source registry
      KIEN_URL:
        description: KIEN (Kennis Infrastructuur Erfgoed Nederland) URL
      LCNAF:
        description: Library of Congress Name Authority File identifier
      Email:
        description: Email address as identifier
      Phone:
        description: Phone number as identifier
      Twitter:
        description: Twitter/X handle as identifier
      Facebook:
        description: Facebook page/profile as identifier
      Instagram:
        description: Instagram handle as identifier
      YouTube:
        description: YouTube channel as identifier
      GEONAMES:
        description: GeoNames geographic entity identifier
      LinkedIn:
        description: LinkedIn profile or company page
      GHCID_PREVIOUS:
        description: Previous GHCID before relocation or reorganization
      OCLC:
        description: OCLC (Online Computer Library Center) identifier
