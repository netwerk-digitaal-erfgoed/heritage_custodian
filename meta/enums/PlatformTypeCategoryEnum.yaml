id: https://nde.nl/ontology/hc/enum/PlatformTypeCategoryEnum
name: platform_type_category_enum
title: Platform Type Category Enum
prefixes:
  linkml: https://w3id.org/linkml/
imports:
- linkml:types
enums:
  PlatformTypeCategoryEnum:
    description: High-level categories for digital platform type classification
    permissible_values:
      REPOSITORY:
        description: Platforms for storing and accessing digital content (digital
          libraries, archives, document repositories)
      AGGREGATOR:
        description: Platforms aggregating metadata/content from multiple sources
          (aggregators, bibliographic databases)
      DISCOVERY:
        description: Platforms for searching and browsing heritage content (web portals,
          online databases)
      VIRTUAL_HERITAGE:
        description: Digital representations of physical heritage (virtual museums,
          virtual tours, online galleries)
      RESEARCH:
        description: Platforms supporting scholarly research (disciplinary repositories,
          preprint servers)
      INTERACTIVE:
        description: Platforms enabling user engagement (crowdsourcing, educational,
          social media)
      COMMERCE:
        description: Transaction-oriented platforms (booking systems, webshops)
      AUXILIARY:
        description: Secondary/supporting platforms (project sites, microsites, APIs,
          legacy platforms)
