id: https://nde.nl/ontology/hc/enum/AuthorityRecordFormatEnum
name: authority_record_format_enum
title: Authority Record Format Enum
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  AuthorityRecordFormatEnum:
    description: Formats for authority records contributed to consortium services
    permissible_values:
      MARC21_AUTHORITY:
        description: |
          MARC21 Authority format (US, UK, Australia, etc.)
          Standard format for most English-speaking countries.
      UNIMARC_AUTHORITY:
        description: |
          UNIMARC Authority format (France, Italy, Portugal, etc.)
          Standard format for many European countries.
      RDF:
        description: |
          RDF/Linked Data format.
          Increasingly used alongside MARC (e.g., GND, data.bnf.fr).
      PROPRIETARY:
        description: |
          Custom or proprietary format.
          Some agencies use non-standard formats that VIAF converts.
