id: https://nde.nl/ontology/hc/enum/ReadingRoomTypeEnum
name: reading_room_type_enum
title: ReadingRoomTypeEnum
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc

enums:
  ReadingRoomTypeEnum:
    description: |
      Types of reading rooms at heritage custodian institutions.
      
      Used by ReadingRoom class to classify research and consultation spaces
      where collections are accessed under supervised conditions.
    permissible_values:
      GENERAL:
        description: General/main reading room for standard collections
      SPECIAL_COLLECTIONS:
        description: Reading room for rare, valuable, or fragile materials
      MICROFILM:
        description: Reading room for microfilm/microfiche materials
      DIGITAL:
        description: Reading room for electronic resources and digitization on demand
      MAP_ROOM:
        description: Reading room for oversized cartographic materials
      NEWSPAPER:
        description: Reading room for periodicals and newspapers
      MULTIMEDIA:
        description: Reading room for audiovisual materials
      GENEALOGY:
        description: Reading room specializing in genealogical research
