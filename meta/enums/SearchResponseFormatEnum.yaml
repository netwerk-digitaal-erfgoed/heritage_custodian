id: https://nde.nl/ontology/hc/enum/SearchResponseFormatEnum
name: search_response_format_enum
title: Search Response Format Enum
prefixes:
  linkml: https://w3id.org/linkml/
imports:
- linkml:types
enums:
  SearchResponseFormatEnum:
    description: |
      Response formats for search API results.
    permissible_values:
      JSON:
        description: |
          JSON (application/json).

          Most common format for modern APIs.
      XML:
        description: |
          XML (application/xml or text/xml).

          Legacy format, still used in some heritage APIs.
      JSON_LD:
        description: |
          JSON-LD (application/ld+json).

          JSON with linked data semantics.
      HTML:
        description: |
          HTML (text/html).

          Human-readable results page (not ideal for API use).
      CSV:
        description: |
          CSV (text/csv).

          Tabular export format.
      ATOM:
        description: |
          Atom feed (application/atom+xml).

          Syndication format.
