id: https://nde.nl/ontology/hc/enum/NameTypeEnum
name: name_type_enum
title: Name Type Enum
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
  - linkml:types
default_prefix: hc

enums:
  NameTypeEnum:
    description: |
      Classification of name visibility level in LinkedIn data.
      Per AGENTS.md Rule 17.
    permissible_values:
      full:
        description: Complete first and last name visible
        meaning: schema:Text
      abbreviated:
        description: Contains single initial (e.g., 'Amy B.', 'S. Buse')
        meaning: schema:Text
      anonymous:
        description: Privacy-hidden profile ('LinkedIn Member')
        meaning: schema:Text
