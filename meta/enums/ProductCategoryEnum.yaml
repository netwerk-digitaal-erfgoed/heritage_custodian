# ProductCategoryEnum - Categories of products sold in heritage gift shops
# 
# Used by GiftShop class to classify types of merchandise.
# 
# Generation date: 2025-11-29
# 
id: https://nde.nl/ontology/hc/enum/product-category
name: product_category_enum
title: Product Category Enumeration

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  gr: http://purl.org/goodrelations/v1#

enums:
  ProductCategoryEnum:
    description: |
      Categories of products typically sold in heritage institution gift shops.
      
      Aligns with Schema.org schema:Product and subtypes.
      GoodRelations gr:ProductOrService for detailed product modeling.
    
    permissible_values:
      REPRODUCTIONS:
        title: reproductions
        description: |
          Art reproductions, prints, posters, and high-quality replicas of collection items.
          Includes framed prints, canvas reproductions, and facsimiles.
        meaning: schema:Product
        annotations:
          examples: "Art prints, Poster reproductions, Canvas prints, High-res photo prints"
      
      BOOKS:
        title: books
        description: |
          Publications including exhibition catalogs, scholarly works, guidebooks,
          coffee table books, and children's books related to collections.
        meaning: schema:Book
        annotations:
          examples: "Exhibition catalogs, Collection guides, Art history books, Children's books"
      
      DESIGN_OBJECTS:
        title: design objects
        description: |
          Design items, home decor, and functional objects inspired by collections.
          Includes vases, furniture, lighting, and designer collaborations.
        meaning: schema:Product
        annotations:
          examples: "Designer vases, Mondrian-inspired objects, Architect collaborations"
      
      JEWELRY:
        title: jewelry
        description: |
          Jewelry, accessories, and wearable items inspired by collection pieces.
          Includes reproductions of historical jewelry and contemporary designs.
        meaning: schema:Product
        annotations:
          examples: "Egyptian revival jewelry, Art nouveau reproductions, Museum-inspired designs"
      
      TEXTILES:
        title: textiles
        description: |
          Clothing, scarves, bags, and textile products featuring collection imagery.
          Includes silk scarves, t-shirts, tote bags, and umbrellas.
        meaning: schema:Product
        annotations:
          examples: "Silk scarves, Museum t-shirts, Tote bags, Art-print umbrellas"
      
      STATIONERY:
        title: stationery
        description: |
          Cards, notebooks, pens, calendars, and paper products.
          Includes postcards, note cards, journals, and office supplies.
        meaning: schema:Product
        annotations:
          examples: "Postcards, Greeting cards, Art notebooks, Museum calendars"
      
      HOME_DECOR:
        title: home decor
        description: |
          Home furnishing items including pillows, blankets, tableware, and decorative objects.
        meaning: schema:Product
        annotations:
          examples: "Art pillows, Museum tableware, Decorative objects, Candles"
      
      TOYS:
        title: toys
        description: |
          Educational toys, games, puzzles, and children's activity items.
          Includes STEM toys, art kits, and collection-themed games.
        meaning: schema:Product
        annotations:
          examples: "Art puzzles, Educational kits, Science toys, Building sets"
      
      FOOD:
        title: food and beverages
        description: |
          Specialty foods, chocolates, tea, coffee, and culinary items.
          May include regional specialties or recipe books.
        meaning: schema:Product
        annotations:
          examples: "Museum chocolates, Specialty teas, Dutch stroopwafels, Recipe books"
      
      SOUVENIRS:
        title: souvenirs
        description: |
          Tourist items, keychains, magnets, and branded memorabilia.
          Lower price point, high volume items for casual visitors.
        meaning: schema:Product
        annotations:
          examples: "Keychains, Magnets, Pencils, Erasers, Small figures"
      
      GIFTS:
        title: gifts
        description: |
          Gift-oriented items suitable for presents.
          Includes gift sets, premium packaging, and curated selections.
        meaning: schema:Product
        annotations:
          examples: "Gift sets, Curated boxes, Premium wrapped items"
      
      MULTIMEDIA:
        title: multimedia
        description: |
          Audio, video, and digital products including DVDs, CDs, apps, and downloads.
        meaning: schema:Product
        annotations:
          examples: "Exhibition DVDs, Audio guides, Digital downloads, Museum apps"
      
      ORIGINAL_ART:
        title: original art
        description: |
          Original artworks, limited editions, and artist collaborations.
          Higher price point, may require certificates of authenticity.
        meaning: schema:Product
        annotations:
          examples: "Limited edition prints, Artist multiples, Original commissions"
      
      ANTIQUES:
        title: antiques
        description: |
          Vintage and antique items, often related to museum's collection area.
          May include authentication services.
        meaning: schema:Product
        annotations:
          examples: "Antique books, Vintage maps, Period objects"
      
      PLANTS:
        title: plants
        description: |
          Live plants, seeds, and gardening items.
          Common in botanical garden and natural history museum shops.
        meaning: schema:Product
        annotations:
          examples: "Heritage seeds, Native plants, Garden books, Botanical prints"
      
      CRAFT_SUPPLIES:
        title: craft supplies
        description: |
          Art supplies, craft materials, and creative tools.
          Supports hands-on engagement with museum's artistic mission.
        meaning: schema:Product
        annotations:
          examples: "Art supplies, Craft kits, Drawing materials, Sketchbooks"
      
      ACCESSIBILITY_ITEMS:
        title: accessibility items
        description: |
          Products designed for accessibility needs including tactile reproductions,
          large print guides, and assistive devices.
        meaning: schema:Product
        annotations:
          examples: "Tactile models, Large print books, Audio descriptions"
      
      POSTCARDS:
        title: postcards
        description: |
          Individual postcards and postcard sets featuring collection highlights,
          exhibition images, and architectural views. A staple of museum retail.
        meaning: schema:Product
        annotations:
          examples: "Single postcards, Postcard sets, Vintage reproduction postcards, Exhibition postcards"
      
      POSTERS:
        title: posters
        description: |
          Large format prints and posters of artworks, exhibition announcements,
          and collection highlights. Various sizes from A3 to billboard format.
        meaning: schema:Product
        annotations:
          examples: "Exhibition posters, Art posters, Vintage poster reproductions, Rolled and framed options"
      
      PUZZLES:
        title: puzzles
        description: |
          Jigsaw puzzles featuring artwork and collection images. Various piece counts
          from children's puzzles (50-100 pieces) to advanced (1000+ pieces).
        meaning: schema:Product
        annotations:
          examples: "Art jigsaw puzzles, 3D puzzles, Children's puzzles, Collector edition puzzles"
      
      MEMBERSHIP_CARDS:
        title: membership cards
        description: |
          Museum membership cards, annual passes, and discount cards.
          Includes Museumkaart (Netherlands), ArtPass, and institutional memberships.
        meaning: schema:Product
        annotations:
          examples: "Museumkaart, Annual membership, Friends membership, Student passes"
      
      MAGNETS:
        title: magnets
        description: |
          Refrigerator magnets and decorative magnets featuring collection images,
          logos, and iconic artworks. Popular low-cost souvenir item.
        meaning: schema:Product
        annotations:
          examples: "Art magnets, Logo magnets, Collection highlight magnets, Magnet sets"
      
      CALENDARS:
        title: calendars
        description: |
          Wall calendars, desk calendars, and planners featuring collection artworks.
          Seasonal product with annual refresh cycle.
        meaning: schema:Product
        annotations:
          examples: "Wall calendars, Desk calendars, Art diary planners, Advent calendars"
      
      MUGS_DRINKWARE:
        title: mugs and drinkware
        description: |
          Coffee mugs, tea cups, water bottles, and drinking glasses featuring
          collection imagery and museum branding.
        meaning: schema:Product
        annotations:
          examples: "Art mugs, Travel mugs, Water bottles, Wine glasses, Espresso cups"
      
      UMBRELLAS:
        title: umbrellas
        description: |
          Umbrellas featuring artwork prints, typically full-canopy prints of
          famous paintings. Practical and decorative.
        meaning: schema:Product
        annotations:
          examples: "Art print umbrellas, Compact umbrellas, Golf umbrellas with artwork"
      
      BAGS_ACCESSORIES:
        title: bags and accessories
        description: |
          Tote bags, backpacks, pouches, and fashion accessories featuring
          collection imagery. Sustainable/reusable shopping bags popular.
        meaning: schema:Product
        annotations:
          examples: "Canvas tote bags, Laptop bags, Cosmetic pouches, Coin purses, Lanyards"
      
      EXHIBITION_MERCHANDISE:
        title: exhibition merchandise
        description: |
          Limited-edition products created specifically for temporary exhibitions.
          Time-limited availability tied to exhibition run dates.
        meaning: schema:Product
        annotations:
          examples: "Vermeer exhibition catalog, Blockbuster show merchandise, Artist collaboration items"
      
      EDUCATIONAL_MATERIALS:
        title: educational materials
        description: |
          Learning resources, activity books, flashcards, and educational kits
          for schools, families, and lifelong learners.
        meaning: schema:Product
        annotations:
          examples: "Art flashcards, Activity workbooks, Teacher resource packs, STEM kits"
      
      GIFT_VOUCHERS:
        title: gift vouchers
        description: |
          Gift cards, vouchers, and gift certificates redeemable at the museum
          shop, cafe, or for admission tickets.
        meaning: schema:Product
        annotations:
          examples: "Shop gift cards, Experience vouchers, Membership gift certificates"
