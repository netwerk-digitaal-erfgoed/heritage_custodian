id: https://nde.nl/ontology/hc/enum/HTTPMethodEnum
name: http_method_enum
title: HTTP Method Enum
prefixes:
  linkml: https://w3id.org/linkml/
imports:
- linkml:types
enums:
  HTTPMethodEnum:
    description: |
      HTTP methods supported for API requests.
    permissible_values:
      GET:
        description: |
          HTTP GET method.

          Query parameters in URL. Most common for search APIs.
      POST:
        description: |
          HTTP POST method.

          Query in request body. Used for complex queries.
      BOTH:
        description: |
          Supports both GET and POST methods.
