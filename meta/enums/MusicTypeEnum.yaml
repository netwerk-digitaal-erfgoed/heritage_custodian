id: https://nde.nl/ontology/hc/enum/MusicTypeEnum
name: music_type_enum
title: Music Type Enum
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../metadata

enums:
  MusicTypeEnum:
    description: |
      Types of music presence in audio.
    permissible_values:
      BACKGROUND:
        description: Background/ambient music under other content
      FEATURED:
        description: Primary audio is music (performance, recording)
      ARCHIVAL:
        description: Historical music recording
      LIVE:
        description: Live performance captured
      THEME:
        description: Theme music or jingle
      TRANSITION:
        description: Transition/bridge music
