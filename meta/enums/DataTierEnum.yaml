# Data Tier Enumeration - Data quality tiers from authoritative to inferred
# Extracted from custodian_source.yaml per Rule 38 (modular schema files)

id: https://nde.nl/ontology/hc/enums/DataTierEnum
name: DataTierEnum
title: Data Tier Enumeration

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/

imports:
  - linkml:types

default_range: string

enums:
  DataTierEnum:
    description: Data quality tiers from authoritative to inferred
    permissible_values:
      TIER_1_AUTHORITATIVE:
        description: Official registry data (NDE CSV, Nationaal Archief ISIL)
      TIER_2_VERIFIED:
        description: Verified external sources (Wikidata, Google Maps, genealogy archive registries)
      TIER_3_CROWD_SOURCED:
        description: Community-contributed data (reviews, user edits)
      TIER_4_INFERRED:
        description: Algorithmically extracted (website scrape, external search)
