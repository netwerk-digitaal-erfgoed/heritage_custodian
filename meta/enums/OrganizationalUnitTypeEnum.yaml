# OrganizationalUnitTypeEnum
# Types of informal organizational units

id: https://nde.nl/ontology/hc/enum/OrganizationalUnitTypeEnum
name: OrganizationalUnitTypeEnum

enums:
  OrganizationalUnitTypeEnum:
    description: |
      Types of informal organizational units within heritage custodians.
      
      These are OPERATIONAL/FUNCTIONAL units, not legally registered entities.
      For formal legal sub-organizations, use CustodianLegalStatus hierarchy.
    
    permissible_values:
      DEPARTMENT:
        description: |
          Major organizational division with broad responsibilities.
          
          Examples:
          - Collections Department
          - Education Department
          - Research Department
          - IT Department
          - Conservation Department
        meaning: org:OrganizationalUnit
      
      TEAM:
        description: |
          Smaller functional group within a department.
          
          Examples:
          - Digital Preservation Team
          - Cataloging Team
          - Visitor Services Team
          - Web Development Team
        meaning: org:OrganizationalUnit
      
      DIVISION:
        description: |
          Large-scale organizational segment, typically larger than department.
          
          Examples:
          - Collections Care Division
          - Public Programs Division
          - Administrative Services Division
        meaning: org:OrganizationalUnit
      
      GROUP:
        description: |
          Cross-functional working group, committee, or task force.
          Often temporary or project-based.
          
          Examples:
          - Metadata Standards Working Group
          - Acquisitions Committee
          - Digital Strategy Task Force
        meaning: org:OrganizationalUnit
      
      PROGRAM:
        description: |
          Specific programmatic unit or initiative.
          
          Examples:
          - Fellowship Program
          - Digitization Program
          - School Outreach Program
          - Grants Management Program
        meaning: org:OrganizationalUnit
      
      SERVICE:
        description: |
          Service-oriented unit providing specific services.
          
          Examples:
          - Reading Room
          - Reference Desk
          - Reprographic Services
          - Interlibrary Loan Service
        meaning: org:OrganizationalUnit
      
      LAB:
        description: |
          Technical or scientific laboratory unit.
          
          Examples:
          - Conservation Lab
          - Digitization Lab
          - Imaging Lab
          - Analysis Lab (materials analysis, authentication)
        meaning: org:OrganizationalUnit
      
      OFFICE:
        description: |
          Administrative or support office.
          
          Examples:
          - Director's Office
          - Legal Office
          - Communications Office
          - Development Office (fundraising)
        meaning: org:OrganizationalUnit
      
      UNIT:
        description: |
          Generic organizational unit (use when specific type unclear).
          
          Examples:
          - Special Collections Unit
          - Archival Processing Unit
        meaning: org:OrganizationalUnit
    
    comments:
      - "All types map to org:OrganizationalUnit (W3C ORG)"
      - "Distinction is functional, not ontological"
      - "Units can nest: DIVISION > DEPARTMENT > TEAM"
      - "Some types may overlap (PROGRAM can be within DEPARTMENT)"
