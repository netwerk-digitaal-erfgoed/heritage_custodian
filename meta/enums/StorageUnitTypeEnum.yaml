# StorageUnitTypeEnum - Types of individual storage units
# 
# Classifies storage units by their physical form and function.
# 
# HC Ontology Extension (hc-storage.ttl):
# Named individuals mapping:
# - ARCHIVE_BOX → hc:ArchiveBox
# - FLAT_FILE_DRAWER → hc:FlatFileDrawer
# - HANGING_RACK → hc:HangingRack
# - COMPACT_SHELVING → hc:CompactShelving
# - SPECIMEN_CABINET → hc:SpecimenCabinet
# - COLD_STORAGE_VAULT → hc:ColdStorageVault
# 
# Generation date: 2026-01-02
# 
id: https://nde.nl/ontology/hc/enum/StorageUnitTypeEnum
name: storage_unit_type_enum
title: Storage Unit Type Enumeration

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  aat: http://vocab.getty.edu/aat/
  wd: http://www.wikidata.org/entity/

default_prefix: hc

imports:
  - linkml:types

enums:
  StorageUnitTypeEnum:
    description: |
      Types of individual storage units used in heritage storage facilities.
      
      Maps to HC ontology named individuals (hc:ArchiveBox, etc.) and
      AAT/Wikidata concepts where available.
    
    permissible_values:
      ARCHIVE_BOX:
        description: |
          Acid-free box for storing archival materials.
          Standard archival storage container for documents, photographs,
          and other flat materials.
        meaning: hc:ArchiveBox
        annotations:
          aat_id: "300045703"  # document boxes
          wikidata_id: "Q854619"
      
      FLAT_FILE_DRAWER:
        description: |
          Horizontal drawer for storing oversized flat materials.
          Used for maps, prints, drawings, architectural plans.
        meaning: hc:FlatFileDrawer
        annotations:
          aat_id: "300038899"  # flat files (cabinets)
      
      HANGING_RACK:
        description: |
          Rack system for hanging textiles, costumes, or paintings.
          Provides vertical storage with proper support.
        meaning: hc:HangingRack
      
      COMPACT_SHELVING:
        description: |
          Mobile shelving system (e.g., Compactus) that maximizes
          storage density by eliminating fixed aisles.
        meaning: hc:CompactShelving
        annotations:
          aat_id: "300221807"  # compact shelving
      
      SPECIMEN_CABINET:
        description: |
          Cabinet designed for storing natural history specimens,
          small artifacts, or other three-dimensional objects.
        meaning: hc:SpecimenCabinet
      
      COLD_STORAGE_VAULT:
        description: |
          Refrigerated storage area for temperature-sensitive materials.
          Used for film, photographs, biological specimens.
        meaning: hc:ColdStorageVault
        annotations:
          wikidata_id: "Q1199549"  # cold storage
      
      STANDARD_SHELF:
        description: |
          Standard fixed or adjustable shelving unit.
          General-purpose storage for boxes, books, small objects.
        annotations:
          aat_id: "300037372"  # shelves
      
      DRAWER_CABINET:
        description: |
          Cabinet with multiple drawers for organized storage.
          Used for small objects, textiles, prints.
        annotations:
          aat_id: "300038884"  # storage cabinets
      
      PAINTING_RACK:
        description: |
          Specialized rack for vertical storage of framed paintings.
          Pull-out screens or sliding panels.
        annotations:
          aat_id: "300266503"  # painting storage racks
      
      ROLLED_STORAGE:
        description: |
          Horizontal or vertical storage for rolled materials.
          Used for textiles, maps, architectural drawings.
      
      PALLET:
        description: |
          Pallet-based storage for large or heavy objects.
          Often used in high-bay warehousing.
      
      CRATE:
        description: |
          Individual crate or case for object storage/transport.
          May be custom-built for specific objects.
        annotations:
          aat_id: "300045377"  # crates
      
      SOLANDER_BOX:
        description: |
          Hinged clamshell box for storing books, prints, or documents.
          Opens flat for easy access.
        annotations:
          aat_id: "300045713"  # solander boxes
      
      PORTFOLIO:
        description: |
          Portfolio case for prints, drawings, or photographs.
          Flat enclosure with ties or straps.
        annotations:
          aat_id: "300026031"  # portfolios
      
      TRAY:
        description: |
          Shallow tray for organizing small items within larger units.
          Used inside cabinets or on shelves.
      
      OTHER:
        description: |
          Other storage unit type not covered by specific categories.
          Document in unit_description field.
