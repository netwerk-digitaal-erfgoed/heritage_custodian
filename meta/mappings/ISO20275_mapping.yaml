id: https://nde.nl/ontology/hc/mapping/ISO20275
name: ISO20275_mapping
title: ISO 20275 Legal Form Code Mappings
description: |
  Mappings between ISO 20275 Entity Legal Form codes and ontology classes.
  Based on data/ontology/2023-09-28-elf-code-list-v1.5.csv

prefixes:
  linkml: https://w3id.org/linkml/
  iso20275: https://www.gleif.org/en/about-lei/code-lists/iso-20275-entity-legal-forms-code-list/
  wd: https://www.wikidata.org/wiki/

imports:
  - linkml:types
  - ../metadata

# Note: This is a template structure. The actual mappings would be generated
# from parsing the CSV file data/ontology/2023-09-28-elf-code-list-v1.5.csv

classes:
  ISO20275CodeMapping:
    description: |
      Mapping structure for ISO 20275 Entity Legal Form codes to ontology concepts.
      Each code represents a specific legal form in a particular jurisdiction.
    
    attributes:
      elf_code:
        description: ISO 20275 4-character code
        range: string
        required: true
        pattern: "^[A-Z0-9]{4}$"
      
      country_code:
        description: ISO 3166-1 alpha-2 country code
        range: string
        required: true
        pattern: "^[A-Z]{2}$"
      
      legal_form_name:
        description: Name of the legal form in local language
        range: string
        required: true
      
      ontology_mappings:
        description: Mappings to ontology classes
        range: uriorcurie
        multivalued: true
      
      wikidata_equivalent:
        description: |
          Equivalent Wikidata entity (Q-number) for this legal form.
          Note: We map to ontology classes, not directly to Wikidata.
        range: string
        pattern: "^Q[0-9]+$"

# Example mappings for common Dutch legal forms:
examples:
  - description: "Dutch Foundation (Stichting)"
    value:
      elf_code: "8888"
      country_code: "NL"
      legal_form_name: "Stichting"
      ontology_mappings:
        - "org:FormalOrganization"
        - "schema:NonProfitOrganization"
      wikidata_equivalent: "Q163740"
  
  - description: "Dutch Private Limited Company (BV)"
    value:
      elf_code: "54M6"
      country_code: "NL"
      legal_form_name: "Besloten vennootschap"
      ontology_mappings:
        - "org:FormalOrganization"
        - "schema:Corporation"
      wikidata_equivalent: "Q864207"
  
  - description: "Dutch Municipality (Gemeente)"
    value:
      elf_code: "XXXX"  # Note: Government bodies may not have ELF codes
      country_code: "NL"
      legal_form_name: "Gemeente"
      ontology_mappings:
        - "org:FormalOrganization"
        - "cpov:PublicOrganisation"
        - "schema:GovernmentOrganization"
      wikidata_equivalent: "Q2039348"

comments:
  - "ISO 20275 provides standardized codes for 1,600+ legal forms across 150+ jurisdictions"
  - "Not all legal forms have ISO 20275 codes (e.g., some government entity types)"
  - "Wikidata Q-numbers are for reference only; we map to proper ontology classes"
  - "The full mapping would be generated by parsing the CSV file"
