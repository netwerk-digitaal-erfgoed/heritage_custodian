id: https://nde.nl/ontology/hc/class/MunicipalArchiveRecordSetTypes
name: MunicipalArchiveRecordSetTypes
title: Municipal Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./MunicipalArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
- ../slots/has_scope
classes:
  CouncilGovernanceFonds:
    is_a: MunicipalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Fonds of municipal council governance records, decisions, and ordinances.
    keywords:
    - council
    - governance
    - municipal
    - decisions
    - ordinances
    - resolutions
    - fonds
    alt_descriptions:
      nl: Fonds met archiefstukken over gemeenteraadsbestuur besluiten en verordeningen.
      de: Fonds mit Unterlagen zu Gemeinderatsgovernance Beschluessen und Satzungen.
      fr: Fonds de documents sur la gouvernance du conseil municipal les decisions et les ordonnances.
      es: Fondo de registros sobre gobernanza del consejo municipal decisiones y ordenanzas.
      ar: فوندس يضم سجلات حوكمة المجلس البلدي وقراراته ولوائحه.
      id: Fonds arsip tata kelola dewan kota keputusan dan peraturan daerah.
      zh: 收录市议会治理、决议与条例文件的全宗。
    structured_aliases:
    - {literal_form: fonds gemeenteraadsbestuur, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds Gemeinderatsverwaltung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds du conseil municipal, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo del consejo municipal, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس المجلس البلدي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds dewan kota, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 市议会治理全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots: [has_type, has_score, has_note, has_scope]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:CouncilGovernanceFonds

  CivilRegistrySeries:
    is_a: MunicipalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Series of civil-status records such as birth, marriage, death, and population registers.
    keywords:
    - civil registry
    - birth
    - marriage
    - death
    - population
    - vital records
    - series
    alt_descriptions:
      nl: Reeks burgerlijke-standregisters zoals geboorte- huwelijks- overlijdens- en bevolkingsregisters.
      de: Serie von Personenstandsunterlagen wie Geburts- Heirats- Sterbe- und Bevoelkerungsregistern.
      fr: Serie de registres d etat civil dont naissances mariages deces et registres de population.
      es: Serie de registros de estado civil como nacimientos matrimonios defunciones y padrones.
      ar: سلسلة سجلات الأحوال المدنية مثل المواليد والزواج والوفيات وسجلات السكان.
      id: Seri catatan sipil seperti kelahiran perkawinan kematian dan registrasi penduduk.
      zh: 包含出生、婚姻、死亡与人口登记等民事身份档案系列。
    structured_aliases:
    - {literal_form: reeks burgerlijke stand, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie Personenstandsregister, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie des registres d etat civil, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de registros civiles, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات الأحوال المدنية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri registrasi sipil, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 民事登记系列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots: [has_type, has_score, has_note, has_scope]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:CivilRegistrySeries

  MunicipalAdministrationFonds:
    is_a: MunicipalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Fonds documenting municipal departments and execution of public services.
    keywords:
    - administration
    - municipal
    - departments
    - public services
    - governance
    - fonds
    alt_descriptions:
      nl: Fonds die gemeentelijke diensten en de uitvoering van publieke taken documenteert.
      de: Fonds zur Dokumentation kommunaler Aemter und der Durchfuehrung oeffentlicher Dienstleistungen.
      fr: Fonds documentant les services municipaux et l execution des services publics.
      es: Fondo que documenta dependencias municipales y la ejecucion de servicios publicos.
      ar: فوندس يوثق الإدارات البلدية وتنفيذ الخدمات العامة.
      id: Fonds yang mendokumentasikan dinas kota dan pelaksanaan layanan publik.
      zh: 记录市政部门及公共服务执行情况的全宗。
    structured_aliases:
    - {literal_form: fonds gemeentelijke administratie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds Kommunalverwaltung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds d administration municipale, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de administracion municipal, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس الإدارة البلدية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds administrasi kota, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 市政行政全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots: [has_type, has_score, has_note, has_scope]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MunicipalAdministrationFonds

  UrbanPlanningCollection:
    is_a: MunicipalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of planning maps, permits, and records of built-environment development.
    keywords:
    - urban planning
    - maps
    - permits
    - built environment
    - zoning
    - collection
    alt_descriptions:
      nl: Collectie met planologische kaarten vergunningen en dossiers over ruimtelijke ontwikkeling.
      de: Sammlung von Planungsplaenen Genehmigungen und Unterlagen zur baulichen Entwicklung.
      fr: Collection de cartes d urbanisme permis et dossiers de developpement du cadre bati.
      es: Coleccion de mapas de planificacion permisos y registros del desarrollo urbano construido.
      ar: مجموعة خرائط تخطيط وتصاريح وسجلات تطوير البيئة العمرانية.
      id: Koleksi peta perencanaan izin dan arsip pengembangan lingkungan terbangun.
      zh: 收录规划图、许可文件与建成环境发展记录的集合。
    structured_aliases:
    - {literal_form: collectie stedenbouwdossiers, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Stadtplanungsunterlagen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection des archives d urbanisme, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de expedientes urbanisticos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة سجلات التخطيط العمراني, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip tata kota, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 城市规划档案集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots: [has_type, has_score, has_note, has_scope]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:UrbanPlanningCollection

  LocalHistoryCollection:
    is_a: MunicipalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of local-history documentation including photographs, ephemera, and community memory materials.
    keywords:
    - local history
    - photographs
    - ephemera
    - community memory
    - municipal
    - collection
    alt_descriptions:
      nl: Collectie lokale geschiedenisdocumentatie waaronder foto s efemera en gemeenschapsgeheugenmateriaal.
      de: Sammlung lokalhistorischer Dokumentation mit Fotos Ephemera und Materialien des Gemeinschaftsgedaechtnisses.
      fr: Collection de documentation d histoire locale incluant photographies ephemera et memoires communautaires.
      es: Coleccion de documentacion de historia local incluidas fotografias efimeros y materiales de memoria comunitaria.
      ar: مجموعة توثيق للتاريخ المحلي تشمل الصور والمطبوعات الزائلة ومواد الذاكرة المجتمعية.
      id: Koleksi dokumentasi sejarah lokal termasuk foto ephemera dan bahan memori komunitas.
      zh: 地方史文献集合，含照片、短期文献与社区记忆材料。
    structured_aliases:
    - {literal_form: collectie lokale geschiedenis, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Lokalgeschichte, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection d histoire locale, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de historia local, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة التاريخ المحلي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi sejarah lokal, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 地方史文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots: [has_type, has_score, has_note, has_scope]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:LocalHistoryCollection
