id: https://nde.nl/ontology/hc/class/FireSuppressionTypes
name: FireSuppressionTypes
title: Fire Suppression Type Subclasses
description: Concrete subclasses of FireSuppressionType representing specific system
  types. Based on common fire protection systems.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - ./FireSuppressionType
  - linkml:types
default_prefix: hc
classes:
  InertGasSystem:
    is_a: FireSuppressionType
    description: >-
      Fire extinguishing system using inert gases to displace oxygen and
      suppress combustion without water damage.
    alt_descriptions:
      nl: >-
        Brandblussysteem dat inerte gassen gebruikt om zuurstof te verdringen en verbranding
        te onderdrukken zonder waterschade.
      de: >-
        Feuerlöschsystem, das Inertgase verwendet, um Sauerstoff zu verdrängen und Verbrennung
        ohne Wasserschaden zu unterdrücken.
      fr: >-
        Système d'extinction d'incendie utilisant des gaz inertes pour déplacer l'oxygène
        et supprimer la combustion sans dégâts d'eau.
      es: >-
        Sistema de extinción de incendios que utiliza gases inertes para desplazar el oxígeno
        y suprimir la combustión sin daños por agua.
      ar: >-
        نظام إطفاء حريق يستخدم غازات خاملة لإزاحة الأكسجين وقمع الاحتراق دون أضرار المياه.
      id: >-
        Sistem pemadam kebakaran yang menggunakan gas inert untuk menggantikan oksigen
        dan menekan pembakaran tanpa kerusakan air.
      zh: >-
        使用惰性气体置换氧气并抑制燃烧而不造成水损的灭火系统。
    broad_mappings:
    - skos:Concept
  SprinklerSystem:
    is_a: FireSuppressionType
    description: Water-based sprinkler suppression system for automated discharge.
    alt_descriptions:
      nl: Op water gebaseerd sprinklersysteem voor geautomatiseerde blussing.
      de: Wasserbasiertes Sprinklersystem zur automatischen Löschung.
      fr: Système d'extinction par sprinklers à eau pour déclenchement automatisé.
      es: Sistema de extinción por rociadores a base de agua para descarga automática.
      ar: نظام رشاشات مائي للإطفاء الآلي.
      id: Sistem sprinkler berbasis air untuk pemadaman otomatis.
      zh: 基于水的喷淋灭火系统，用于自动排放。
    structured_aliases:
    - literal_form: sprinklerinstallatie
      in_language: nl
    - literal_form: Sprinkleranlage
      in_language: de
    - literal_form: système sprinkler
      in_language: fr
    - literal_form: sistema de rociadores
      in_language: es
    - literal_form: نظام رشاشات
      in_language: ar
    - literal_form: sistem sprinkler
      in_language: id
    - literal_form: 喷淋系统
      in_language: zh
    keywords:
    - sprinkler
    - water
    - automated
    - suppression
    broad_mappings:
    - skos:Concept
  WaterMistSystem:
    is_a: FireSuppressionType
    description: High-pressure fine water mist suppression system.
    alt_descriptions:
      nl: Hogedruk fijnewaternevel-blussingssysteem.
      de: Hochdruck-Wassernebel-Löschsystem.
      fr: Système d'extinction à brouillard d'eau à haute pression.
      es: Sistema de extinción de neblina de agua a alta presión.
      ar: نظام إطفاء برذاذ الماء عالي الضغط.
      id: Sistem pemadam kabut air bertekanan tinggi.
      zh: 高压细水雾灭火系统。
    structured_aliases:
    - literal_form: waternevelsysteem
      in_language: nl
    - literal_form: Wassernebelanlage
      in_language: de
    - literal_form: système de brouillard d'eau
      in_language: fr
    - literal_form: sistema de neblina de agua
      in_language: es
    - literal_form: نظام رذاذ الماء
      in_language: ar
    - literal_form: sistem kabut air
      in_language: id
    - literal_form: 细水雾系统
      in_language: zh
    keywords:
    - water mist
    - fine mist
    - high pressure
    - suppression
    broad_mappings:
    - skos:Concept
  ChemicalAgentSystem:
    is_a: FireSuppressionType
    description: Clean-agent chemical suppression system.
    alt_descriptions:
      nl: Schoon-middel chemisch blussingssysteem.
      de: Chemisches Löschsystem mit sauberen Wirkstoffen.
      fr: Système d'extinction chimique à agent propre.
      es: Sistema de extinción química de agente limpio.
      ar: نظام إطفاء كيميائي بعامل نظيف.
      id: Sistem pemadam kimia agen bersih.
      zh: 洁净剂化学灭火系统。
    structured_aliases:
    - literal_form: chemisch blussingssysteem
      in_language: nl
    - literal_form: chemisches Löschsystem
      in_language: de
    - literal_form: système chimique
      in_language: fr
    - literal_form: sistema químico
      in_language: es
    - literal_form: نظام كيميائي
      in_language: ar
    - literal_form: sistem kimia
      in_language: id
    - literal_form: 化学灭火系统
      in_language: zh
    keywords:
    - chemical
    - clean agent
    - gas
    - suppression
    broad_mappings:
    - skos:Concept
  NoSystem:
    is_a: FireSuppressionType
    description: No fixed fire suppression system is installed.
    alt_descriptions:
      nl: Geen vast brandblussysteem geïnstalleerd.
      de: Keine fest installierte Feuerlöschanlage vorhanden.
      fr: Aucun système d'extinction fixe installé.
      es: Ningún sistema de extinción fijo instalado.
      ar: لا يوجد نظام إطفاء ثابت مثبت.
      id: Tidak ada sistem pemadam kebakaran tetap terpasang.
      zh: 未安装固定灭火系统。
    structured_aliases:
    - literal_form: geen systeem
      in_language: nl
    - literal_form: kein System
      in_language: de
    - literal_form: pas de système
      in_language: fr
    - literal_form: sin sistema
      in_language: es
    - literal_form: بلا نظام
      in_language: ar
    - literal_form: tanpa sistem
      in_language: id
    - literal_form: 无系统
      in_language: zh
    keywords:
    - none
    - no system
    - unprotected
    broad_mappings:
    - skos:Concept
