classes:
  ParishArchive:
    description: >-
      Ecclesiastical repository maintaining sacramental registers, administrative records, and congregational documentation for a local church jurisdiction.
    alt_descriptions:
      nl: >-
        Kerkelijke bewaarplaats die sacramentele registers, administratieve archieven en gemeentedocumentatie voor een lokale kerkjurisdictie bijhoudt.
      de: >-
        Kirchliches Archiv, das Sakramentalregister, Verwaltungsunterlagen und Gemeindeunterlagen für eine örtliche Kirchengemeinde führt.
      fr: >-
        Dépôt ecclésiastique maintenant les registres sacramentels, les archives administratives et la documentation paroissiale pour une juridiction ecclésiale locale.
      es: >-
        Depósito eclesiástico que mantiene registros sacramentales, archivos administrativos y documentación parroquial para una jurisdicción eclesiástica local.
      ar: >-
        مستودع كنسي يحافظ على سجلات الأسرار المقدسة والسجلات الإدارية ووثائق الرعية لولاية كنسية محلية.
      id: >-
        Repositori gerejawi yang memelihara registri sakramen, catatan administratif, dan dokumentasi jemaat untuk yurisdiksi gereja lokal.
      zh: >-
        为当地教会管辖区维护圣事登记册、行政档案和会众文献的教会存储库。
