id: https://nde.nl/ontology/hc/class/TrackIdentifier
name: TrackIdentifier
title: Track Identifier
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_code
classes:
  TrackIdentifier:
    class_uri: hc:TrackIdentifier
    description: >-
      Unique code or reference assigned to an audio or music recording within a cataloging system.
    alt_descriptions:
      nl: Unieke code of verwijzing toegewezen aan een audio- of muziekopname binnen een catalogiseringssysteem.
      de: Eindeutiger Code oder Referenz, der einer Audio- oder Musikaufnahme in einem Katalogisierungssystem zugewiesen wird.
      fr: Code unique ou référence attribué à un enregistrement audio ou musical dans un système de catalogage.
      es: Código único o referencia asignado a una grabación de audio o música dentro de un sistema de catalogación.
      ar: رمز أو مرجع فريد يُعين لتسجيل صوتي أو موسيقي ضمن نظام الفهرسة.
      id: Kode atau referensi unik yang ditugaskan untuk rekaman audio atau musik dalam sistem katalog.
      zh: 在编目系统中分配给音频或音乐录音的唯一代码或引用。
    structured_aliases:
    - literal_form: trackidentificatie
      in_language: nl
    - literal_form: Track-Identifikator
      in_language: de
    - literal_form: identifiant de piste
      in_language: fr
    - literal_form: identificador de pista
      in_language: es
    - literal_form: معرف المسار
      in_language: ar
    - literal_form: pengenal trek
      in_language: id
    - literal_form: 曲目标识符
      in_language: zh
    broad_mappings:
    - schema:identifier
    slots:
    - has_code
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
