id: https://nde.nl/ontology/hc/class/ResearchLibrary
name: ResearchLibrary
title: ResearchLibrary
description: >-
  A research library facility.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_name
classes:
  ResearchLibrary:
    class_uri: schema:Library
    description: >-
      Specialized library facility focused on supporting in-depth scholarly investigation,
      with extensive collections and resources for advanced academic or scientific study.
    alt_descriptions:
      nl: >-
        Gespecialiseerde bibliotheekfaciliteit gericht op het ondersteunen van diepgaand wetenschappelijk onderzoek,
        met uitgebreide collecties en bronnen voor geavanceerde academische of wetenschappelijke studie.
      de: >-
        Spezialisierte Bibliothekseinrichtung, die auf die Unterstützung eingehender wissenschaftlicher Untersuchungen
        ausgerichtet ist, mit umfangreichen Beständen und Ressourcen für fortgeschrittene akademische oder wissenschaftliche Studien.
      fr: >-
        Bibliothèque spécialisée axée sur le soutien à l'investigation savante approfondie,
        avec des collections et des ressources étendues pour l'étude académique ou scientifique avancée.
      es: >-
        Biblioteca especializada enfocada en apoyar la investigación académica profunda,
        con extensas colecciones y recursos para el estudio académico o científico avanzado.
      ar: >-
        مكتبة متخصصة تركز على دعم البحث العلمي المتعمق،
        مع مجموعات وموارد واسعة للدراسة الأكاديمية أو العلمية المتقدمة.
      id: >-
        Fasilitas perpustakaan khusus yang berfokus pada mendukung investigasi ilmiah mendalam,
        dengan koleksi dan sumber daya yang luas untuk studi akademik atau ilmiah lanjutan.
      zh: >-
        专注于支持深度学术研究的专门图书馆设施，
        拥有支持高级学术或科学研究的广泛馆藏和资源。
    broad_mappings:
      - schema:Library
      - schema:Place
    keywords:
      - research library
      - academic library
      - scholarly resources
    structured_aliases:
      - literal_form: onderzoeksbibliotheek
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Forschungsbibliothek
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: bibliothèque de recherche
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: biblioteca de investigación
        predicate: EXACT_SYNONYM
        in_language: es
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class created during migration
      custodian_types: '["*"]'
    slots:
      - has_name
