        spécialisées dans des domaines spécifiques, des zones thématiques ou des domaines thématiques.
      es: >-
        Clasificación para colecciones de registros mantenidas por archivos
        enfocados en campos específicos, áreas temáticas o dominios temáticos.
      ar: >-
        تصنيف لمجموعات السجلات التي تحتفظ بها الأرشيفات
        المتخصصة في مجالات محددة أو مناطق موضوعية أو مجالات مواضيعية.
      id: >-
        Klasifikasi untuk koleksi catatan yang dikelola oleh arsip
        yang berfokus pada bidang tertentu, area subjek, atau domain tematik.
      zh: >-
        由专注于特定领域、主题区域或主题领域的档案维护的记录集合分类。
