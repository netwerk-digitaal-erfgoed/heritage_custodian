        Classificatie voor archiefcollecties die worden beheerd door archieven
        die zich richten op specifieke vakgebieden, onderwerpregio's of thematische domeinen.
      de: >-
        Klassifikation für Archivbestände, die von Archiven verwaltet werden,
        die sich auf bestimmte Fachgebiete, Themenbereiche oder thematische Domänen konzentrieren.
      fr: >-
