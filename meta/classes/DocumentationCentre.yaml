classes:
  DocumentationCentre:
    description: >-
      Institution dedicated to collecting, organizing, and providing research access to documentation on specific subjects or historical events.
    alt_descriptions:
      nl: >-
        Instelling die gewijd is aan het verzamelen, organiseren en verschaffen van onderzoekstoegang tot documentatie over specifieke onderwerpen of historische gebeurtenissen.
      de: >-
        Einrichtung, die dem Sammeln, Organisieren und Bereitstellen von Forschungszugang zu Dokumentation über bestimmte Themen oder historische Ereignisse gewidmet ist.
      fr: >-
        Institution dédiée à la collecte, l'organisation et la mise à disposition pour la recherche de documentation sur des sujets spécifiques ou des événements historiques.
      es: >-
        Institución dedicada a recopilar, organizar y proporcionar acceso de investigación a documentación sobre temas específicos o eventos históricos.
      ar: >-
        مؤسسة مكرسة لجمع وتنظيم وتوفير الوصول البحثي إلى الوثائق حول مواضيع محددة أو أحداث تاريخية.
      id: >-
        Lembaga yang didedikasikan untuk mengumpulkan, mengorganisir, dan menyediakan akses penelitian ke dokumentasi tentang topik atau peristiwa sejarah tertentu.
      zh: >-
        专门收集、整理和提供特定主题或历史事件文献研究访问的机构。
