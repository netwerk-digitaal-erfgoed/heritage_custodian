id: https://nde.nl/ontology/hc/class/InstitutionalArchiveRecordSetTypes
name: InstitutionalArchiveRecordSetTypes
title: Institutional Archive Record Set Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./InstitutionalArchiveRecordSetType
  - linkml:types
  - ../slots/has_type
  - ../slots/has_score
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  InstitutionAdministrationFonds:
    is_a: InstitutionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A fonds consisting of records created by an institution to support governance, administration, and internal management.
    alt_descriptions:
      nl: >-
        Een fonds met archiefbescheiden die door een instelling zijn gevormd ter ondersteuning van bestuur, administratie en interne bedrijfsvoering.
      de: >-
        Ein Fonds mit Unterlagen, die von einer Institution zur Unterstuetzung von Leitung, Verwaltung und interner Organisation erstellt wurden.
      fr: >-
        Un fonds de documents produits par une institution pour la gouvernance, l'administration et la gestion interne.
      es: >-
        Un fondo de documentos creados por una institucion para la gobernanza, la administracion y la gestion interna.
      ar: >-
        صندوق من السجلات التي أنشأتها مؤسسة لدعم الحوكمة والإدارة والتسيير الداخلي.
      id: >-
        Sebuah fonds berisi catatan yang dibuat oleh sebuah institusi untuk mendukung tata kelola, administrasi, dan manajemen internal.
      zh: >-
        由机构为支持治理、行政与内部管理而形成的记录全宗。
    structured_aliases:
    - literal_form: instellingsadministratiefonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Institutionsverwaltungsfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds administratif institutionnel
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo administrativo institucional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق الإدارة المؤسسية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds administrasi institusi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 机构行政全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:InstitutionalArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by InstitutionalArchive custodians. Inverse of rico:isOrWasHolderOf."
  OperationalRecordSeries:
    is_a: InstitutionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A series of records documenting operational processes, procedures, and routine organizational activities.
    alt_descriptions:
      nl: >-
        Een serie archiefbescheiden die operationele processen, procedures en routinematige activiteiten van een organisatie documenteert.
      de: >-
        Eine Serie von Unterlagen zur Dokumentation operativer Prozesse, Verfahren und routinemaessiger organisatorischer Taetigkeiten.
      fr: >-
        Une serie de documents documentant les processus operationnels, les procedures et les activites courantes d'une organisation.
      es: >-
        Una serie de documentos que registra procesos operativos, procedimientos y actividades rutinarias de una organizacion.
      ar: >-
        سلسلة سجلات توثق العمليات التشغيلية والإجراءات والأنشطة الروتينية للمؤسسة.
      id: >-
        Seri catatan yang mendokumentasikan proses operasional, prosedur, dan kegiatan rutin organisasi.
      zh: >-
        记录运营流程、规程与日常组织活动的记录系列。
    structured_aliases:
    - literal_form: operationele processen serie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Betriebsprozessserie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie des processus operationnels
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de procesos operativos
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة العمليات التشغيلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri proses operasional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 运营流程记录系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:InstitutionalArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by InstitutionalArchive custodians. Inverse of rico:isOrWasHolderOf."
