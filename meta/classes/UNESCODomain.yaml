classes:
  UNESCODomain:
    class_uri: skos:Concept
    description: >-
      Thematic safeguarding category used to classify elements listed under the
      2003 Convention for Intangible Cultural Heritage.
    alt_descriptions:
      nl: UNESCO-domein voor immaterieel erfgoed om elementen thematisch in te delen naar borgingsgebied.
      de: UNESCO-Domaene des immateriellen Kulturerbes zur thematischen Einordnung von Elementen nach Schutzbereich.
      fr: Domaine UNESCO du patrimoine culturel immateriel servant a classer des elements par aire thematique de sauvegarde.
      es: Dominio UNESCO de patrimonio cultural inmaterial usado para categorizar elementos por area tematica de salvaguardia.
      ar: مجال لليونسكو للتراث غير المادي يُستخدم لتصنيف العناصر حسب مجال الصون الموضوعي.
      id: Domain UNESCO untuk warisan budaya takbenda guna mengelompokkan elemen menurut area tematik pelindungan.
      zh: 用于按保护主题领域对非遗要素进行分类的UNESCO领域概念。
