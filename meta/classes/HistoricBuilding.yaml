classes:
  HistoricBuilding:
    class_uri: hc:HistoricBuilding
    description: >-
      Architecturally or culturally significant structure maintained as a heritage asset with documented conservation and access metadata.
    alt_descriptions:
      nl: >-
        Architectonisch of cultureel significant bouwwerk dat als erfgoedgoed wordt onderhouden
        met gedocumenteerde conserverings- en toegangsmetadata.
      de: >-
        Architektonisch oder kulturell bedeutsames Bauwerk, das als Heritage-Asset gepflegt wird
        mit dokumentierten Erhaltungs- und Zugangsdaten.
      fr: >-
        Structure architecturalement ou culturellement significative maintenue comme actif patrimonial
        avec des métadonnées de conservation et d'accès documentées.
      es: >-
        Estructura arquitectónica o culturalmente significativa mantenida como activo patrimonial
        con metadatos de conservación y acceso documentados.
      ar: >-
        مبنى ذو أهمية معمارية أو ثقافية يُدار كأصل تراثي
        مع بيانات حفظ ووصول موثقة.
      id: >-
        Struktur yang signifikan secara arsitektural atau budaya yang dipelihara sebagai aset warisan
        dengan metadata pelestarian dan akses yang terdokumentasi.
      zh: >-
        作为遗产资产维护的建筑或文化意义重大的结构，具有记录的保护和访问元数据。
    structured_aliases:
    - literal_form: historisch gebouw
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: historisches Gebäude
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: bâtiment historique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: edificio histórico
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مبنى تاريخي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: bangunan bersejarah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 历史建筑
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_style
    - designed_by
    - in_area
    - has_label
    - has_condition
    - constructed_on
    - used_for
    - has_type
    - has_status
    - has_access_policy
    - part_of
    - identified_by
    - has_score
    - has_operating_hours
    - derive_from
    - generated_by
    slot_usage:
      has_type:
        required: true
    broad_mappings:
    - schema:LandmarksOrHistoricalBuildings
    close_mappings:
    - crm:E24_Physical_Human-Made_Thing
    comments:
    - Buildings of historical, architectural, or cultural significance owned or managed by heritage custodians.
    - May include historic house museums, heritage properties, monuments, or protected structures.
    - 'Preserved from prior description: Architecturally or historically significant building maintained as a heritage asset and documented with conservation and access metadata.'
    keywords:
    - architectural heritage
    - historic structure
    - protected building
    - cultural landmark
    notes:
    - |
      Preserved from prior description (commit 6e634651):

      "Historic building owned, managed, or stewarded by a heritage custodian.\n\n**DEFINITION**:\n\nA HistoricBuilding is a building of historical, architectural, or cultural\nsignificance that is owned or managed by a heritage custodian as a secondary\nproperty. This may be a historic house museum, heritage property, monument,\nor protected building separate from the custodian's main facility.\n\n**GETTY AAT ALIGNMENT**:\n\n`aat:300005425` (historic buildings) - \"Buildings that are historically\nsignificant, typically old, and often protected or preserved.\"\n\n**WIKIDATA TYPE LINKAGE (FeatureTypeEnum Subset)**:\n\nHistoric buildings can be classified using relevant types from FeatureTypeEnum\n(298 types). Relevant building-related types include:\n\n- Q35112 (monument)\n- Q811979 (architectural structure)\n- Q4989906 (monument)\n- Q1081138 (historic house museum)\n- Q3947 (house)\n- Q16560 (palace)\n- Q23413 (castle)\n- Q44539 (temple)\n- Q317557 (manor house)\n\n**DISTINCTION\
