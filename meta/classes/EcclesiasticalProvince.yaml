id: https://nde.nl/ontology/hc/class/EcclesiasticalProvince
name: EcclesiasticalProvince
title: Ecclesiastical Province Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  org: http://www.w3.org/ns/org#

default_prefix: hc

imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
classes:
  EcclesiasticalProvince:
    class_uri: org:Organization
    description: >-
      Higher-level church jurisdiction grouping an archdiocese and related
      dioceses within one metropolitan structure.
    alt_descriptions:
      nl: Hogere kerkelijke jurisdictie die een aartsbisdom en verwante bisdommen in een metropolitane structuur groepeert.
      de: Hoehere kirchliche Jurisdiktion die Erzdioezese und zugehoerige Dioezesen in einer metropolitanen Struktur zusammenfasst.
      fr: Juridiction ecclesiastique superieure regroupant un archidiocese et des dioceses associes dans une meme structure metropolitaine.
      es: Jurisdiccion eclesiastica superior que agrupa una arquidiocesis y diocesis relacionadas en una misma estructura metropolitana.
      ar: ولاية كنسية عليا تجمع أبرشية رئيسية وأبرشيات تابعة ضمن بنية متروبوليتية واحدة.
      id: Yurisdiksi gerejawi tingkat tinggi yang mengelompokkan sebuah keuskupan agung dan keuskupan terkait dalam satu struktur metropolitan.
      zh: 将总教区及相关教区纳入同一都会结构的高级教会辖区。
    structured_aliases:
    - {literal_form: kerkprovincie, in_language: nl}
    - {literal_form: Kirchenprovinz, in_language: de}
    - {literal_form: province ecclesiastique, in_language: fr}
    - {literal_form: provincia eclesiastica, in_language: es}
    - {literal_form: إقليم كنسي, in_language: ar}
    - {literal_form: provinsi gerejawi, in_language: id}
    - {literal_form: 教省, in_language: zh}
    broad_mappings:
    - org:Organization

    slots:
    - has_label
    - identified_by

    notes:
    - |
      Preserved from prior description (commit ee5e8e5a):

      An ecclesiastical province is a large jurisdiction of religious government,
      consisting of several dioceses (one archdiocese and several suffragan dioceses).

      **Usage**:
      Used to model the hierarchical location of a Diocese.

      **Ontology Alignment**:
      - **Primary**: `org:Organization` (Administrative unit)
      - **Close**: `schema:Organization`
    annotations:
      custodian_types: '["H"]'
      specificity_score: 0.8
      specificity_rationale: Highly specific to ecclesiastical hierarchy.
