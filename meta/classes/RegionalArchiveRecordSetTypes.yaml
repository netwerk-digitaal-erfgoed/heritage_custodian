id: https://nde.nl/ontology/hc/class/RegionalArchiveRecordSetTypes
name: RegionalArchiveRecordSetTypes
title: Regional Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./RegionalArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_significance
- ../slots/has_type
- ../slots/has_note
- ../slots/has_scope
classes:
  RegionalGovernanceFonds:
    is_a: RegionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation produced by subnational
      governing bodies and executive decision-making forums.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie geproduceerd door
        regionale bestuursorganen en uitvoerende besluitvormingsfora.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen regionaler
        Regierungsorgane und exekutiver Entscheidungsforen.
      fr: >-
        Agrégation fondée sur la provenance de documents produits par des
        organes de gouvernance infranationaux et des instances exécutives.
      es: >-
        Agregación basada en procedencia de documentación producida por
        órganos de gobierno subnacionales y foros de decisión ejecutiva.
      ar: >-
        تجميع قائم على المنشأ لوثائق تنتجها هيئات الحكم دون الوطنية
        ومنتديات اتخاذ القرار التنفيذي.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan badan
        pemerintahan subnasional dan forum pengambilan keputusan eksekutif.
      zh: >-
        基于来源原则聚合由次国家治理机构与行政决策论坛形成的文献。
    structured_aliases:
    - literal_form: Regionalverwaltungsbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fondo de gobierno regional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: "fonds de gouvernement régional"
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: provinciaal bestuursarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: أرشيف الإدارة الإقليمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip tata kelola regional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区域治理文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    - literal_form: fundo de governo regional
      predicate: RELATED_SYNONYM
      in_language: pt
    keywords:
    - provincial government records
    - regional council
    - provincial states
    - gedeputeerde staten
    - commissaris van de koning
    - regional policy
    comments:
    - Records created by regional government bodies (provincial states, regional councils, district administrations).
    - Includes provincial/state government records, council minutes, policy documents, intergovernmental correspondence.
    - Dutch context includes Provinciale Staten, Gedeputeerde Staten, Commissaris van de Koning.
    - Follows the fonds organizational principle (respect des fonds).
    - Legacy candidate mapping retained as note: wd:Q1643722 was previously used but verified as a specific building in Vienna, so it is not a semantic mapping for this class.
    - 'Preserved from prior description: A rico:RecordSetType for regional government administrative records organized as a fonds.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - RegionalArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Fonds
    - GovernmentArchive
    annotations:
      dutch_context: Includes Provinciale Staten, Gedeputeerde Staten, and Commissaris van de Koning records. May also include records of waterschappen (water boards) when managed at regional level.
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:RegionalGovernanceFonds
      has_note:
        equals_string: This RecordSetType classifies record sets following the fonds principle. The rico-rst:Fonds individual defines the standard archival concept of fonds.
      has_scope:
        equals_string: '["provincial government", "regional council", "policy records", "intergovernmental correspondence", "regional planning"]'
  CadastralAndLandRecordsFonds:
    is_a: RegionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation for land-tenure documentation,
      boundary registration, and property transaction evidence.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie voor documentatie over grondbezit,
        grensregistratie en eigendomstransacties.
      de: >-
        Provenienzbasierte Aggregation fuer Unterlagen zu Landbesitz,
        Grenzregistrierung und Eigentumsuebertragungen.
      fr: >-
        Agrégation fondée sur la provenance pour la documentation de tenure
        foncière, d'enregistrement des limites et de transactions immobilières.
      es: >-
        Agregación basada en procedencia para documentación de tenencia de
        tierras, registro de linderos y transacciones de propiedad.
      ar: >-
        تجميع قائم على المنشأ لوثائق حيازة الأراضي وتسجيل الحدود
        وإثبات معاملات الملكية.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi kepemilikan lahan,
        registrasi batas, dan bukti transaksi properti.
      zh: >-
        基于来源原则聚合土地权属、界线登记与不动产交易证据文献。
    structured_aliases:
    - literal_form: Katasterbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fondo catastral
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: fonds cadastral
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: kadasterarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: أرشيف السجل العقاري
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip kadaster dan pertanahan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地籍与土地权属文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    - literal_form: fundo cadastral
      predicate: RELATED_SYNONYM
      in_language: pt
    keywords:
    - cadastral maps
    - land registry
    - property records
    - property transfer
    - mortgage records
    comments:
    - Records documenting land ownership, property boundaries, and real estate transactions.
    - Includes cadastral maps, land registers, property transfer deeds, mortgage records, tithe records.
    - Dutch context includes historical kadaster records predating the national Kadaster (1832).
    - Essential for genealogical and local history research.
    - Legacy candidate mapping retained as note: wd:Q7418661 was previously used but verified as a Wikimedia category unrelated to this concept.
    - 'Preserved from prior description: A rico:RecordSetType for cadastral, land registry, and property records.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - RegionalArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Fonds
    - NotarialArchive
    annotations:
      dutch_context: Historical kadaster records predate national Kadaster (1832). Includes oud-rechterlijke archieven with pre-1811 property transactions. Essential for genealogical and local history research.
      genealogical_value: Critical for tracing property ownership, family wealth, and residence patterns. Complements civil registry and notarial records.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:CadastralAndLandRecordsFonds
      has_note:
        equals_string: This RecordSetType classifies record sets following the fonds principle. Cadastral offices typically form discrete fonds with their own provenance.
      has_scope:
        equals_string: '["cadastral maps", "land registers", "property deeds", "mortgage records", "tithe records"]'
  NotarialProtocolSeries:
    is_a: RegionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence of legally authenticated civil instruments,
      arranged according to office workflow chronology.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van juridisch geauthenticeerde civiele
        instrumenten, geordend volgens de kantoorchronologie.
      de: >-
        Geordnete Dokumentationsfolge rechtlich beglaubigter zivilrechtlicher
        Instrumente nach der Chronologie des Amtsablaufs.
      fr: >-
        Sequence documentaire ordonnee d'instruments civils authentifiés,
        organisée selon la chronologie des procédures d'office.
      es: >-
        Secuencia documental ordenada de instrumentos civiles autenticados,
        organizada segun la cronologia del flujo de oficina.
      ar: >-
        تسلسل وثائقي منظم لصكوك مدنية موثقة قانونياً، مرتب وفق
        التسلسل الزمني لإجراءات المكتب.
      id: >-
        Urutan dokumenter teratur dari instrumen perdata yang diautentikasi,
        disusun menurut kronologi alur kerja kantor.
      zh: >-
        按办公流程时间顺序编排的经法律认证民事文书文献序列。
    structured_aliases:
    - literal_form: Notariatsprotokolle
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: protocolos notariales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: minutes notariales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: "notariële protocollen"
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: البروتوكولات التوثيقية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: protokol notarial
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公证业务记录序列
      predicate: EXACT_SYNONYM
      in_language: zh
    - literal_form: protocolos notariais
      predicate: RELATED_SYNONYM
      in_language: pt
    keywords:
    - notarial protocols
    - notarieel archief
    - marriage contracts
    - property transfers
    - estate inventories
    comments:
    - Records created by notaries documenting legal transactions, contracts, wills.
    - Organized chronologically within each notary's practice.
    - Dutch notarial archives are essential for genealogical and socio-economic history.
    - Access restrictions may apply (typically 75 years for wills, 20 years for other documents).
    - Legacy candidate mapping retained as note: wd:Q1366032 was previously used but verified as an infrared weapon-guidance concept, not an archival one.
    - 'Preserved from prior description: A rico:RecordSetType for notarial protocols and records organized as series.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - RegionalArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Series
    - NotarialArchive
    annotations:
      dutch_context: Post-1811 follows French notarial system. Pre-1811 varies by region. Essential source for family history, social history, and economic history.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:NotarialProtocolSeries
      has_note:
        equals_string: This RecordSetType classifies record sets following the series principle. Protocols are organized chronologically within each notary's practice. Access restrictions apply to recent records.
      has_scope:
        equals_string: '["notarial protocols", "wills", "marriage contracts", "property transfers", "estate inventories"]'
  RegionalHistoryCollection:
    is_a: RegionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body that evidences local memory,
      place-based identity, and historical community life.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel dat lokaal geheugen,
        plaatsgebonden identiteit en historische gemeenschapspraktijken vastlegt.
      de: >-
        Zusammengestellter Dokumentkoerper zur lokalen Erinnerung,
        ortsbezogenen Identitaet und historischen Gemeinschaftspraxis.
      fr: >-
        Ensemble documentaire réuni témoignant de la mémoire locale,
        de l'identité territoriale et de la vie communautaire historique.
      es: >-
        Cuerpo documental reunido que evidencia memoria local,
        identidad territorial y vida comunitaria historica.
      ar: >-
        جسم وثائقي مُجمع يوثق الذاكرة المحلية والهوية المرتبطة بالمكان
        والحياة المجتمعية التاريخية.
      id: >-
        Kumpulan dokumenter terhimpun yang merekam ingatan lokal,
        identitas berbasis tempat, dan kehidupan komunitas historis.
      zh: >-
        汇集体现地方记忆、地域认同与历史社区生活的文献整体。
    structured_aliases:
    - literal_form: Regionalgeschichtliche Sammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: "colección de historia regional"
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: "collection d'histoire régionale"
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: streekhistorische collectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: مجموعة تاريخ محلي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi sejarah regional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方历史文献汇集
      predicate: EXACT_SYNONYM
      in_language: zh
    - literal_form: "coleção de história regional"
      predicate: RELATED_SYNONYM
      in_language: pt
    keywords:
    - regional history
    - local photographs
    - regional newspapers
    - oral history
    - regional maps
    comments:
    - Assembled collections documenting regional history, culture, and identity.
    - May include archival materials and library/museum-type items.
    - Often organized by subject or format rather than strict provenance (artificial collections).
    - Legacy candidate mapping retained as note: wd:Q9388534 was previously included and is semantically close (archival collection); kept as contextual note while RiC mappings remain primary.
    - 'Preserved from prior description: A rico:RecordSetType for regional history documentation collections.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - schema:Collection
    see_also:
    - RegionalArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Collection
    - LocalHistoryArchive
    annotations:
      collection_nature_note: Often includes artificial/assembled collections organized by subject, format, or documentation purpose rather than strict provenance.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:RegionalHistoryCollection
      has_note:
        equals_string: This RecordSetType typically follows the collection principle (artificial assemblage). Documentation value prioritized for diverse regional materials.
      has_scope:
        equals_string: '["photographs", "newspapers", "maps", "oral histories", "ephemera", "personal papers"]'
  WaterManagementFonds:
    is_a: RegionalArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation on hydraulic governance,
      flood control, drainage systems, and water infrastructure stewardship.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie over waterbestuur,
        overstromingsbeheersing, drainage en beheer van waterinfrastructuur.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen zu Wassergovernance,
        Hochwasserschutz, Entwaesserungssystemen und Infrastrukturunterhalt.
      fr: >-
        Agrégation fondée sur la provenance de documentation sur la gouvernance
        hydraulique, la maîtrise des crues, le drainage et l'infrastructure de l'eau.
      es: >-
        Agregación basada en procedencia de documentación sobre gobernanza
        hidraulica, control de inundaciones, drenaje e infraestructura del agua.
      ar: >-
        تجميع قائم على المنشأ لوثائق الحوكمة المائية والسيطرة على الفيضانات
        وأنظمة التصريف وصيانة البنية التحتية للمياه.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi tata kelola hidraulik,
        pengendalian banjir, sistem drainase, dan infrastruktur air.
      zh: >-
        基于来源原则聚合水务治理、防洪、排水系统与水利设施维护文献。
    structured_aliases:
    - literal_form: Wasserverbandsbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: "fondo de gestión del agua"
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: fonds de gestion de l'eau
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: waterschapsarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: أرشيف إدارة المياه
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip tata kelola sumber daya air
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 水务治理文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    - literal_form: "fundo de gestão de águas"
      predicate: RELATED_SYNONYM
      in_language: pt
    keywords:
    - water board
    - dike administration
    - polder records
    - flood control
    - land reclamation
    comments:
    - Records documenting water management, flood control, drainage, and water quality.
    - Dutch waterschappen are among the oldest democratic institutions with medieval records.
    - Includes dike and polder administration, land reclamation documentation, water infrastructure.
    - Essential for landscape history, climate adaptation research, and Dutch hydraulic engineering heritage.
    - Legacy candidate mapping retained as note: wd:Q188509 was previously used but verified as the settlement concept "suburb", so it is not appropriate as an ontology mapping here.
    - 'Preserved from prior description: A rico:RecordSetType for water management and water board (waterschap) records.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - RegionalArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Fonds
    - RegionalGovernanceFonds
    annotations:
      dutch_context: Waterschappen are among the oldest democratic institutions in the Netherlands. Records essential for landscape history, climate adaptation research, and understanding Dutch hydraulic engineering heritage.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:WaterManagementFonds
      has_note:
        equals_string: This RecordSetType classifies record sets following the fonds principle. Each water board forms a discrete fonds with distinct provenance.
      has_scope:
        equals_string: '["water board governance", "dike administration", "polder records", "flood control", "land reclamation", "water infrastructure"]'
