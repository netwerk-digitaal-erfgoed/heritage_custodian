id: https://nde.nl/ontology/hc/class/DiocesanArchiveRecordSetTypes
name: DiocesanArchiveRecordSetTypes
title: DiocesanArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
  - ./DiocesanArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  DiocesanAdministrationFonds:
    is_a: DiocesanArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a fonds for diocesan governance,
      administration, and institutional correspondence.
    alt_descriptions:
      nl: >-
        Documentaire aggregatie ingericht als fonds voor diocesaan bestuur,
        administratie en institutionele correspondentie.
      de: >-
        Dokumentarische Aggregation als Fonds fuer dioezesane Leitung,
        Verwaltung und institutionelle Korrespondenz.
      fr: >-
        Agregation documentaire organisee en fonds pour la gouvernance
        dioecesaine, l'administration et la correspondance institutionnelle.
      es: >-
        Agregacion documental dispuesta como fondo para gobierno diocesano,
        administracion y correspondencia institucional.
      ar: >-
        تجميع وثائقي منظم على شكل رصيد لإدارة الأبرشية
        والحوكمة والمراسلات المؤسسية.
      id: >-
        Agregasi dokumenter yang disusun sebagai fonds untuk tata kelola
        keuskupan, administrasi, dan korespondensi institusional.
      zh: >-
        以全宗方式组织的教区治理、行政与机构往来文献聚合体。
    structured_aliases:
      - literal_form: bisdom-bestuursfonds
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Fonds dioezesaner Verwaltung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: fonds d'administration dioecesaine
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: fondo de administracion diocesana
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: رصيد إدارة أبرشية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: fonds administrasi keuskupan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 教区行政文献全宗
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Governance, administration, and correspondence remain distinct functional strands within the same provenance unit.
    keywords:
      - diocesan governance
      - institutional correspondence
      - ecclesiastical administration
      - fonds provenance
    examples:
      - value:
          has_type: hc:DiocesanAdministrationFonds
          has_custodian: hc:DiocesanArchive
          has_note: Chancery circulars, governance decrees, and episcopal office correspondence.
        description: Diocesan governance documentation grouped by institutional provenance.
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:DiocesanAdministrationFonds
      has_custodian:
        equals_string: hc:DiocesanArchive
      has_note:
        equals_string: This RecordSetType is typically held by DiocesanArchive custodians.

  ParishRecordSeries:
    is_a: DiocesanArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a series for records from multiple
      parishes within diocesan jurisdiction.
    alt_descriptions:
      nl: >-
        Documentaire aggregatie ingericht als reeks voor bronnen uit meerdere
        parochies binnen diocesane jurisdictie.
      de: >-
        Dokumentarische Aggregation als Serie fuer Unterlagen aus mehreren
        Pfarreien innerhalb dioezesaner Zustaendigkeit.
      fr: >-
        Agregation documentaire organisee en serie pour les documents de
        plusieurs paroisses dans la juridiction dioecesaine.
      es: >-
        Agregacion documental dispuesta como serie para registros de
        multiples parroquias dentro de la jurisdiccion diocesana.
      ar: >-
        تجميع وثائقي منظم على شكل سلسلة لسجلات صادرة عن عدة رعايا
        ضمن الولاية الأبرشية.
      id: >-
        Agregasi dokumenter yang disusun sebagai seri untuk catatan dari
        beberapa paroki dalam yurisdiksi keuskupan.
      zh: >-
        以序列方式组织的、涵盖教区辖区内多个堂区来源记录的文献聚合体。
    structured_aliases:
      - literal_form: reeks parochiebronnen binnen bisdom
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Folge pfarrlicher Unterlagen im Bistum
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: serie de sources paroissiales diocésaines
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: serie de registros parroquiales diocesanos
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: سلسلة سجلات رعايا أبرشية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: seri catatan paroki dalam keuskupan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 教区辖内堂区记录序列
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: The multi-parish scope is retained as a defining organizational characteristic.
    keywords:
      - parish jurisdiction
      - diocesan scope
      - documentary sequence
      - ecclesiastical record
    examples:
      - value:
          has_type: hc:ParishRecordSeries
          has_custodian: hc:DiocesanArchive
          has_note: Parish visitation files and registry extracts organized by reporting cycle.
        description: Multi-parish documentation arranged as a recurring diocesan sequence.
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:ParishRecordSeries
      has_custodian:
        equals_string: hc:DiocesanArchive
      has_note:
        equals_string: This RecordSetType is typically held by DiocesanArchive custodians.

  EpiscopalCorrespondenceCollection:
    is_a: DiocesanArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation grouped as a collection for bishops'
      correspondence and communication records.
    alt_descriptions:
      nl: >-
        Documentaire aggregatie gegroepeerd als collectie voor correspondentie
        en communicatiebronnen van bisschoppen.
      de: >-
        Dokumentarische Aggregation als Sammlung fuer Korrespondenz
        und Kommunikationsunterlagen von Bischofsambtern.
      fr: >-
        Agregation documentaire regroupee en collection pour la
        correspondance episcopale et les traces de communication.
      es: >-
        Agregacion documental agrupada como coleccion para
        correspondencia episcopal y registros de comunicacion.
      ar: >-
        تجميع وثائقي مصنف كمجموعة لمراسلات الأساقفة
        وسجلات الاتصال المؤسسي.
      id: >-
        Agregasi dokumenter yang dikelompokkan sebagai koleksi untuk
        korespondensi uskup dan rekaman komunikasi.
      zh: >-
        作为集合编组的主教通信与联络记录文献聚合体。
    structured_aliases:
      - literal_form: collectie bisschoppelijke correspondentie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Sammlung bischöflicher Korrespondenz
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: collection de correspondance episcopale
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: coleccion de correspondencia episcopal
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: مجموعة مراسلات أسقفية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: koleksi korespondensi episkopal
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 主教通信文献合集
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Communications scope includes both internal ecclesiastical and external institutional exchanges.
    keywords:
      - episcopal communication
      - institutional exchange
      - correspondence corpus
      - documentary collection
    examples:
      - value:
          has_type: hc:EpiscopalCorrespondenceCollection
          has_custodian: hc:DiocesanArchive
          has_note: Pastoral letters, chancery replies, and inter-diocesan exchanges.
        description: Episcopal communication documentation assembled as a thematic collection.
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:EpiscopalCorrespondenceCollection
      has_custodian:
        equals_string: hc:DiocesanArchive
      has_note:
        equals_string: This RecordSetType is typically held by DiocesanArchive custodians.
