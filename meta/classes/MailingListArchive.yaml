classes:
  MailingListArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Organization dedicated to preserving email-based community communications, discussion threads, and listserv records.
    alt_descriptions:
      nl: >-
        Organisatie die zich toelegt op het bewaren van e-mailgebaseerde gemeenschapscommunicatie, discussiedraden en listserv-records.
      de: >-
        Organisation, die sich der Bewahrung von E-Mail-basierten Gemeinschaftskommunikationen, Diskussionsthemen und Listserv-Datensätzen widmet.
      fr: >-
        Organisation dédiée à la préservation des communications communautaires par courriel, des fils de discussion et des enregistrements de listes de diffusion.
      es: >-
        Organización dedicada a preservar comunicaciones comunitarias basadas en correo electrónico, hilos de discusión y registros de listas de correo.
      ar: >-
        منظمة مكرسة للحفاظ على اتصالات المجتمع القائمة على البريد الإلكتروني وخيارات النقاش وسجلات القوائم البريدية.
      id: >-
        Organisasi yang berdedikasi untuk melestarikan komunikasi komunitas berbasis email, utas diskusi, dan rekaman listserv.
      zh: >-
        致力于保存基于电子邮件的社区通信、讨论线程和邮件列表记录的组织。
