id: https://nde.nl/ontology/hc/classes/GenealogyArchivesRegistryEnrichment
name: GenealogyArchivesRegistryEnrichment
title: Genealogy Archives Registry Enrichment Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
- ../enums/DataTierEnum
# default_range: string
classes:
  GenealogyArchivesRegistryEnrichment:
    description: >-
      Enrichment data derived from genealogy-focused archive registry sources,
      including municipality, province, and linked archive information.
    class_uri: prov:Entity
    alt_descriptions:
      nl: Verrijkingsdata uit genealogische archiefregisters inclusief gemeente provincie en gekoppelde archiefinformatie.
      de: Anreicherungsdaten aus genealogischen Archivregistern mit Angaben zu Gemeinde Provinz und verknuepften Archiven.
      fr: Donnees d enrichissement issues de registres d archives genealogiques incluant municipalite province et archives associees.
      es: Datos de enriquecimiento derivados de registros archivisticos genealogicos incluidos municipio provincia e informacion de archivo vinculada.
      ar: بيانات إثراء مشتقة من سجلات أرشيفية خاصة بعلم الأنساب وتشمل البلدية والمقاطعة ومعلومات الأرشيف المرتبطة.
      id: Data pengayaan dari registri arsip genealogi termasuk munisipalitas provinsi dan informasi arsip terkait.
      zh: 源自家谱档案登记来源的富化数据，包含市镇、省份及关联档案信息。
    structured_aliases:
    - {literal_form: verrijking genealogisch archiefregister, in_language: nl}
    - {literal_form: Anreicherung genealogisches Archivregister, in_language: de}
    - {literal_form: enrichissement registre d archives genealogiques, in_language: fr}
    - {literal_form: enriquecimiento de registro archivistico genealogico, in_language: es}
    - {literal_form: إثراء سجل الأرشيف الجينيالوجي, in_language: ar}
    - {literal_form: pengayaan registri arsip genealogi, in_language: id}
    - {literal_form: 家谱档案登记富化, in_language: zh}
    broad_mappings:
    - prov:Entity
    close_mappings:
    - schema:Dataset
    related_mappings:
    - prov:PrimarySource
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_source
    - has_url
