classes:
  HumidityTolerance:
    class_uri: hc:HumidityTolerance
    description: >-
      Acceptable deviation range from target atmospheric moisture levels used in preventive conservation and environmental monitoring.
    alt_descriptions:
      nl: >-
        Acceptabele afwijkingsmarge van doel atmosferische vochtigheidsniveaus gebruikt bij preventieve conservering en omgevingsmonitoring.
      de: >-
        Zulässiger Abweichungsbereich von Ziel-Luftfeuchtigkeitswerten, der bei präventiver Konservierung und Umweltüberwachung verwendet wird.
      fr: >-
        Plage de déviation acceptable des niveaux d'humidité atmosphérique cible utilisée dans la conservation préventive et la surveillance environnementale.
      es: >-
        Rango de desviación aceptable de los niveles de humedad atmosférica objetivo utilizado en conservación preventiva y monitoreo ambiental.
      ar: >-
        نطاق الانحراف المقبول عن مستويات الرطوبة الجوية المستهدفة المستخدم في الحفظ الوقائي والمراقبة البيئية.
      id: >-
        Rentang deviasi yang dapat diterima dari tingkat kelembaban atmosfer target yang digunakan dalam pelestarian preventif dan pemantauan lingkungan.
      zh: >-
        预防性保护和环境监测中使用的目标大气湿度水平的可接受偏差范围。
