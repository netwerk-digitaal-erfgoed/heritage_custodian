id: https://nde.nl/ontology/hc/class/NobilityArchiveRecordSetTypes
name: NobilityArchiveRecordSetTypes
title: NobilityArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./NobilityArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  NobleFamilyPapersFonds:
    is_a: NobilityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of correspondence, household governance,
      legal instruments, and lineage administration produced by aristocratic households.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van correspondentie, huishoudbestuur,
        juridische stukken en afstammingsadministratie uit adellijke huizen.
      de: >-
        Provenienzbasierte Aggregation von Korrespondenz, Hausverwaltung,
        Rechtsurkunden und Abstammungsverwaltung adeliger Haushalte.
      fr: >-
        Agrégation fondée sur la provenance de correspondances,
        de gouvernance domestique et de documents juridiques de familles nobles.
      es: >-
        Agregación basada en procedencia de correspondencia,
        gobierno doméstico y documentación legal de familias nobiliarias.
      ar: >-
        تجميع قائم على المنشأ للمراسلات وإدارة المنزل والوثائق القانونية
        وإدارة الأنساب الصادرة عن الأسر الأرستقراطية.
      id: >-
        Agregasi berbasis asal-usul untuk korespondensi, tata kelola rumah,
        instrumen hukum, dan administrasi garis keturunan keluarga bangsawan.
      zh: >-
        基于来源原则聚合贵族家族形成的往来函件、家政治理、法律文书与谱系管理文献。
    structured_aliases:
    - literal_form: adellijk familiepapierenfonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Fonds adliger Familienunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds de papiers de famille noble
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo documental de familia nobiliaria
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رصيد أوراق أسر نبيلة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds dokumen keluarga bangsawan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 贵族家族文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Family provenance remains primary even when documentation spans estates, courts, and diplomacy.
    - 'Preserved from prior description: Fonds containing papers generated by noble families.'
    keywords:
    - aristocratic household
    - lineage administration
    - legal instrument
    - family correspondence
    examples:
    - value:
        has_type: hc:NobleFamilyPapersFonds
        has_custodian: hc:NobilityArchive
        has_note: Household accounts, marriage contracts, and dynastic correspondence.
      description: Aristocratic family documentation grouped by household provenance.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - NobilityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:NobleFamilyPapersFonds
      has_custodian:
        equals_string: hc:NobilityArchive
      has_note:
        equals_string: This RecordSetType is typically held by NobilityArchive custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  EstateRecordsSeries:
    is_a: NobilityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence of estate stewardship,
      tenancy oversight, and property-administration activities.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van landgoedbeheer,
        pachttoezicht en activiteiten van eigendomsadministratie.
      de: >-
        Geordnete Dokumentationsfolge zu Gutsherrschaft,
        Pachtaufsicht und Aktivitaeten der Liegenschaftsverwaltung.
      fr: >-
        Sequence documentaire ordonnee de gestion domaniale,
        de supervision locative et d'administration patrimoniale.
      es: >-
        Secuencia documental ordenada de gestion de fincas,
        supervision de arrendamientos y administracion patrimonial.
      ar: >-
        تسلسل وثائقي منظم لإدارة الأملاك والإشراف على الإيجارات
        وأنشطة الإدارة العقارية.
      id: >-
        Urutan dokumenter teratur mengenai pengelolaan tanah milik,
        pengawasan sewa, dan administrasi properti.
      zh: >-
        由庄园管理、租佃监督与不动产行政活动形成的有序文献序列。
    structured_aliases:
    - literal_form: reeks landgoedbeheerdocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge von Gutsverwaltungsunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence de gestion domaniale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia de administracion de fincas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة إدارة أملاك
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan administrasi tanah warisan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 庄园治理文献序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Sequence ordering supports long-duration reconstruction of estate administration practice.
    - 'Preserved from prior description: Series of estate management and property administration records.'
    keywords:
    - estate stewardship
    - tenancy oversight
    - property administration
    - recurring workflow
    examples:
    - value:
        has_type: hc:EstateRecordsSeries
        has_custodian: hc:NobilityArchive
        has_note: Rent rolls, tenancy contracts, and maintenance directives.
      description: Estate-management documentation arranged as a recurring sequence.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - NobilityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:EstateRecordsSeries
      has_custodian:
        equals_string: hc:NobilityArchive
      has_note:
        equals_string: This RecordSetType is typically held by NobilityArchive custodians. Inverse of rico:isOrWasHolderOf.
  GenealogyCollection:
    is_a: NobilityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body of pedigree evidence,
      heraldic attestations, and succession-related lineage reconstructions.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van bewijsstukken voor afstamming,
        heraldische attestaties en reconstructies van opvolgingslijnen.
      de: >-
        Zusammengestellter Dokumentkoerper aus Abstammungsnachweisen,
        heraldischen Belegen und Rekonstruktionen von Erbfolgelinien.
      fr: >-
        Ensemble documentaire reuni de preuves genealogiques,
        d'attestations heraldiques et de reconstructions de succession.
      es: >-
        Cuerpo documental reunido de evidencias de linaje,
        atestaciones heraldicas y reconstrucciones sucesorias.
      ar: >-
        جسم وثائقي مُجمع يضم أدلة الأنساب والإثباتات الشعارية
        وإعادة بناء خطوط الخلافة.
      id: >-
        Kumpulan dokumenter terhimpun berisi bukti silsilah,
        pengesahan heraldik, dan rekonstruksi garis suksesi.
      zh: >-
        汇集谱系证据、纹章证明与继承线重建材料的文献整体。
    structured_aliases:
    - literal_form: collectie genealogische documentatie adel
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung adliger Genealogienachweise
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de preuves genealogiques nobiliaires
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de pruebas genealogicas nobiliarias
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تجميعة أدلة أنساب النبلاء
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi bukti genealogi bangsawan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 贵族谱系证据汇编
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Compilations may merge evidence from family, court, and heraldic sources.
    - 'Preserved from prior description: Collection of genealogical documentation about noble lineages.'
    keywords:
    - pedigree evidence
    - heraldic attestation
    - succession history
    - lineage reconstruction
    examples:
    - value:
        has_type: hc:GenealogyCollection
        has_custodian: hc:NobilityArchive
        has_note: Pedigree charts, arms attestations, and inheritance dossiers.
      description: Lineage evidence assembled from multi-source genealogical workflows.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - NobilityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:GenealogyCollection
      has_custodian:
        equals_string: hc:NobilityArchive
      has_note:
        equals_string: This RecordSetType is typically held by NobilityArchive custodians. Inverse of rico:isOrWasHolderOf.
