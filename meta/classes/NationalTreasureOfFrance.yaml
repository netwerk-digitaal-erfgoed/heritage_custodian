id: https://w3id.org/nde/ontology/NationalTreasureOfFrance
name: NationalTreasureOfFrance
title: National Treasure of France
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_score
classes:
  NationalTreasureOfFrance:
    description: >-
      Organizational custodian type for institutions holding artifacts designated
      as protected cultural property under French heritage legislation.
    alt_descriptions:
      nl: >-
        Organisatorisch beheerderstype voor instellingen die artefacten bezitten die zijn aangewezen
        als beschermd cultureel eigendom onder de Franse erfgoedwetgeving.
      de: >-
        Organisatorischer Verwaltertyp für Institutionen, die Artefakte besitzen, die nach französischem
        Kulturgutschutzgesetz als geschütztes Kulturerbe ausgewiesen sind.
      fr: >-
        Type de dépositaire organisationnel pour les institutions détenant des artefacts désignés
        comme biens culturels protégés en vertu de la législation patrimoniale française.
      es: >-
        Tipo de depositario organizacional para instituciones que poseen artefactos designados
        como patrimonio cultural protegido bajo la legislación patrimonial francesa.
      ar: >-
        نوع أمين تنظيمي للمؤسسات التي تحتفظ بقطع أثرية مصنفة
        كتراث ثقافي محمي بموجب التشريعات الفرنسية للتراث.
      id: >-
        Tipe kustodian organisasi untuk lembaga yang memegang artefak yang ditetapkan
        sebagai properti budaya yang dilindungi berdasarkan undang-undang warisan Prancis.
      zh: >-
        持有根据法国遗产立法被指定为受保护文化财产的文物的机构的组织保管人类型。
    structured_aliases:
    - literal_form: Franse nationale schat
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: französischer Nationalschatz
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: trésor national français
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tesoro nacional francés
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: كنز وطني فرنسي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: harta karun nasional Prancis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 法国国宝
      predicate: EXACT_SYNONYM
      in_language: zh
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    broad_mappings:
    - skos:Concept
    - schema:ArchiveOrganization
    slots:
    - has_score
    - identified_by
    slot_usage:
      identified_by:
    annotations:
      skos:prefLabel: National Treasure of France
      skos:altLabel: "trésor national, French National Treasure"
      legal_framework: French cultural property law
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - NationalTreasure
    - FrenchPrivateArchives
    - PublicArchivesInFrance
    keywords:
    - French heritage
    - cultural property
    - national treasure
    - patrimoine
    comments:
    - France-specific cultural heritage designation governed by Code du patrimoine.
    - Export prohibition and state pre-emption rights apply to designated items.
    - 'Preserved from prior description: Organization type for custodians of items designated as French national treasures under French cultural property law.'
