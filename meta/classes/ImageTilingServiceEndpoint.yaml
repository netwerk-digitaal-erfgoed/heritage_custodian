id: https://nde.nl/ontology/hc/class/ImageTilingServiceEndpoint
name: image_tiling_service_endpoint_class
title: ImageTilingServiceEndpoint Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_score
classes:
  ImageTilingServiceEndpoint:
    is_a: DataServiceEndpoint
    class_uri: hc:ImageTilingServiceEndpoint
    description: >-
      Data-service endpoint for tiled high-resolution image delivery, including
      deep-zoom and region/size transformation capabilities.
    alt_descriptions:
      nl: Dataservice-endpoint voor tegelgebaseerde levering van hoge-resolutiebeelden inclusief deep-zoom en regio/maat-transformaties.
      de: Datenservice-Endpunkt fuer gekachelte Bereitstellung hochaufgeloester Bilder mit Deep-Zoom sowie Regions- und Groessentransformationen.
      fr: Point de terminaison de service de donnees pour diffusion d images haute resolution en tuiles avec zoom profond et transformations.
      es: Endpoint de servicio de datos para entrega en teselas de imagenes de alta resolucion con deep-zoom y transformaciones de region/tamano.
      ar: نقطة نهاية خدمة بيانات لتقديم الصور عالية الدقة بشكل مُجزأ، مع إمكانات التكبير العميق وتحويلات المنطقة/الحجم.
      id: Endpoint layanan data untuk pengiriman citra resolusi tinggi berbasis tile termasuk deep-zoom dan transformasi wilayah/ukuran.
      zh: 用于分块式高分辨率图像传输的数据服务端点，支持深度缩放及区域/尺寸变换。
    structured_aliases:
    - {literal_form: beeldtegel-service-endpoint, in_language: nl}
    - {literal_form: Bildkachel-Serviceendpunkt, in_language: de}
    - {literal_form: point de service d image en tuiles, in_language: fr}
    - {literal_form: endpoint de servicio de imagen en teselas, in_language: es}
    - {literal_form: نقطة خدمة صور مُجزأة, in_language: ar}
    - {literal_form: endpoint layanan gambar bertile, in_language: id}
    - {literal_form: 分块图像服务端点, in_language: zh}
    close_mappings:
    - dcat:DataService
    - schema:DataFeed
    slots:
    - has_score
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
