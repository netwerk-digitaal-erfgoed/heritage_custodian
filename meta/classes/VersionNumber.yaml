id: https://nde.nl/ontology/hc/class/VersionNumber
name: VersionNumber
title: Version Number
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_version
classes:
  VersionNumber:
    class_uri: hc:VersionNumber
    description: >-
      Sequential identifier indicating the position of a resource or artifact within a revision history.
    alt_descriptions:
      nl: >-
        Volgnummer dat de positie van een bron of artefact binnen een revisiegeschiedenis aangeeft.
      de: >-
        Sequentielle Kennung, die die Position einer Ressource oder eines Artefakts innerhalb einer Revisionshistorie angibt.
      fr: >-
        Identifiant séquentiel indiquant la position d'une ressource ou d'un artefact dans un historique de révision.
      es: >-
        Identificador secuencial que indica la posición de un recurso o artefacto dentro de un historial de revisiones.
      ar: >-
        معرف تسلسلي يشير إلى موقع مورد أو قطعة أثرية ضمن سجل المراجعات.
      id: >-
        Pengenal berurutan yang menunjukkan posisi sumber daya atau artefak dalam riwayat revisi.
      zh: >-
        指示资源或制品在修订历史中位置的顺序标识符。
