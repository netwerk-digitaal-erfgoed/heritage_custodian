classes:
  TasteScentHeritageType:
    is_a: CustodianType
    class_uri: skos:Concept
    description: >-
      Custodian category for organizations that actively practice, preserve, and transmit culinary and olfactory traditions (recipes, formulations, brewing and distilling techniques) as.
    alt_descriptions:
      nl: Instellingstype voor organisaties die culinair en geur-erfgoed actief beoefenen bewaren en overdragen.
      de: Einrichtungstyp fuer Organisationen die kulinarisches und olfaktorisches Erbe aktiv praktizieren bewahren und vermitteln.
      fr: Type d institution pour des organisations qui pratiquent preservent et transmettent activement un patrimoine gustatif et olfactif.
      es: Tipo de institucion para organizaciones que practican preservan y transmiten activamente patrimonio culinario y olfativo.
      ar: نوع جهة لمنظمات تمارس وتحفظ وتنقل التراث الذوقي والشمّي بشكل نشط.
      id: Tipe lembaga untuk organisasi yang secara aktif mempraktikkan melestarikan dan mewariskan warisan rasa dan aroma.
      zh: 面向积极实践、保存并传承味觉与嗅觉传统（配方、酿造/蒸馏技艺等）的机构类型。
    annotations:
      skos:prefLabel: Taste and Scent Heritage
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
      modeling_notes: |
        Coverage

        Corresponds to 'T' (TASTE_SMELL) in the GLAMORCUBESFIXPHDNT taxonomy.

        Distinction

        Taste/scent heritage custodians:
        - actively practice and transmit techniques (not only exhibit artifacts)
        - preserve intangible knowledge (recipes, formulations, sensory skills)
        - may produce heritage foods/beverages/perfumes using historical methods

        This class models archives/museums as organizations, not collections.

      legacy_description: |
        Preserved from earlier, more verbose description.
        It contained extended criteria lists, ontology layer notes, Wikidata coverage,
        and a long RDF serialization example.
