id: https://nde.nl/ontology/hc/class/ScientificArchiveRecordSetType
name: ScientificArchiveRecordSetType
title: ScientificArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  ScientificArchiveRecordSetType:
    description: >-
      Taxonomy node for aggregations of research data, experimental records, field notes,
      and scholarly correspondence from academic or research institutions.
    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties van onderzoeksgegevens, experimentele verslagen,
        veldnotities en wetenschappelijke correspondentie van academische of onderzoekinstellingen.
      de: >-
        Taxonomieknoten für Aggregationen von Forschungsdaten, experimentellen Aufzeichnungen,
        Feldnotizen und wissenschaftlicher Korrespondenz aus akademischen oder Forschungseinrichtungen.
      fr: >-
        Nœud taxonomique pour les agrégations de données de recherche, relevés expérimentaux,
        notes de terrain et correspondance savante d'institutions académiques ou de recherche.
      es: >-
        Nodo taxonómico para agregaciones de datos de investigación, registros experimentales,
        notas de campo y correspondencia académica de instituciones académicas o de investigación.
      ar: >-
        عقدة تصنيفية لتجميعات بيانات البحث والسجلات التجريبية وملاحظات الميدان والمراسلات العلمية من المؤسسات الأكاديمية أو البحثية.
      id: >-
        Simpul taksonomi untuk agregasi data penelitian, catatan eksperimental, catatan lapangan,
        dan korespondensi ilmiah dari institusi akademik atau penelitian.
      zh: >-
        用于聚合来自学术或研究机构的研究数据、实验记录、野外笔记和学术通信的分类法节点。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - ScientificArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: ScientificArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: Record set type used to classify materials typically held by scientific archives.'
