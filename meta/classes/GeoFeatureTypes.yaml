  SpotFeature:
    is_a: GeoFeatureType
    class_uri: gn:S
    description: >-
      Discrete point-based geographical entity including individual built structures and localized features.
    alt_descriptions:
      nl: >-
        Discreet puntgebaseerd geografisch element inclusief individuele bouwstructuren en gelokaliseerde kenmerken.
      de: >-
        Diskret punktbasiertes geografisches Element einschließlich einzelner Bauwerke und lokalisierter Merkmale.
      fr: >-
        Entité géographique ponctuelle discrete incluant des structures bâties individuelles et des caractéristiques localisées.
      es: >-
        Entidad geográfica puntual discreta que incluye estructuras construidas individuales y características localizadas.
      ar: >-
        عنصر جغرافي نقطي منفصل يشمل الهياكل المبنية الفردية والميزات الموضعية.
      id: >-
        Entitas geografis berbasis titik diskrit termasuk struktur bangunan individual dan fitur terlokalisasi.
      zh: >-
