classes:
  AdministrativeBoundary:
    is_a: GeoFeatureType
    class_uri: gn:A
    description: >-
      Geographically bounded political or administrative division used for governmental jurisdiction.
    alt_descriptions:
      nl: >-
        Geografisch begrensde politieke of administratieve eenheid die wordt gebruikt voor overheidsjurisdictie.
      de: >-
        Geografisch begrenzte politische oder administrative Einheit, die für staatliche Zuständigkeit verwendet wird.
      fr: >-
        Division politique ou administrative géographiquement délimitée utilisée pour la juridiction gouvernementale.
      es: >-
        División política o administrativa geográficamente delimitada utilizada para la jurisdicción gubernamental.
      ar: >-
        تقسيم سياسي أو إداري محدد جغرافياً يُستخدم للولاية الحكومية.
      id: >-
        Divisi politik atau administratif yang dibatasi secara geografis yang digunakan untuk yurisdiksi pemerintah.
      zh: >-
        用于政府管辖的地理边界政治或行政区划。
    structured_aliases:
    - literal_form: bestuurlijke grens
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Verwaltungsgrenze
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: limite administratif
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: límite administrativo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: حدود إدارية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: batas administratif
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 行政边界
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - administrative boundary
    - political division
    - governmental jurisdiction
    - administrative region
    - territorial division
    comments:
    - 'Preserved from prior description: Administrative division feature class.'
  HydrographicFeature:
    is_a: GeoFeatureType
    class_uri: gn:H
    description: >-
      Water-related geographical entity including rivers, lakes, seas, and other bodies of water.
    alt_descriptions:
      nl: >-
        Watergerelateerde geografische entiteit inclusief rivieren, meren, zeeën en andere waterlichamen.
      de: >-
        Wasserbezogene geografische Entität einschließlich Flüsse, Seen, Meere und anderer Gewässer.
      fr: >-
        Entité géographique liée à l'eau incluant rivières, lacs, mers et autres étendues d'eau.
      es: >-
        Entidad geográfica relacionada con el agua que incluye ríos, lagos, mares y otras masas de agua.
      ar: >-
        كيان جغرافي متعلق بالمياه يشمل الأنهار والبحيرات والبحار وغيرها من المسطحات المائية.
      id: >-
        Entitas geografis terkait air termasuk sungai, danau, laut, dan badan air lainnya.
      zh: >-
        与水相关的地理实体，包括河流、湖泊、海洋和其他水体。
    structured_aliases:
    - literal_form: hydrografisch element
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: hydrografisches Merkmal
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: élément hydrographique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: elemento hidrográfico
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: عنصر هيدروغرافي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fitur hidrografi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 水文特征
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - hydrographic
    - water body
    - river
    - lake
    - aquatic geography
    comments:
    - 'Preserved from prior description: Hydrographic feature class.'
  AreaFeature:
    is_a: GeoFeatureType
    class_uri: gn:L
    description: >-
      Geographically extended region or zone defined by area-based boundaries.
    alt_descriptions:
      nl: >-
        Geografisch uitgebreide regio of zone gedefinieerd door oppervlaktegebonden grenzen.
      de: >-
        Geografisch erweiterte Region oder Zone, die durch flächenbasierte Grenzen definiert wird.
      fr: >-
        Région ou zone géographiquement étendue définie par des limites basées sur la superficie.
      es: >-
        Región o zona geográficamente extendida definida por límites basados en el área.
      ar: >-
        منطقة أو نطاق جغرافي ممتد محدد بحدود قائمة على المساحة.
      id: >-
        Wilayah atau zona yang diperluas secara geografis yang didefinisikan oleh batas berbasis area.
      zh: >-
        由基于区域的边界定义的地理延伸区域或地带。
