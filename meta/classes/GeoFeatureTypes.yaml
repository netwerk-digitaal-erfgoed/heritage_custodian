    keywords:
    - populated place
    - settlement
    - locality
    - inhabited area
    - community
    comments:
    - 'Preserved from prior description: Populated place feature class.'
  RoadRailroad:
    is_a: GeoFeatureType
    class_uri: gn:R
    description: >-
      Linear transportation infrastructure for vehicular or rail-based movement and connectivity.
    alt_descriptions:
      nl: >-
        Lineaire transportinfrastructuur voor voertuig- of spoorverkeer en connectiviteit.
      de: >-
        Lineare Verkehrsinfrastruktur für Fahrzeuge oder Schienenverkehr und Konnektivität.
      fr: >-
        Infrastructure de transport linéaire pour le mouvement routier ou ferroviaire et la connectivité.
      es: >-
        Infraestructura de transporte lineal para movimiento vehicular o ferroviario y conectividad.
      ar: >-
        بنية تحتية نقلية خطية للحركة بالمركبات أو السكك الحديدية والاتصال.
      id: >-
        Infrastruktur transportasi linier untuk pergerakan kendaraan atau kereta api dan konektivitas.
      zh: >-
