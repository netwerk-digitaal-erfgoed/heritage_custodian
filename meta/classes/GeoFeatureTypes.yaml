      fr: >-
        Entité géographique basée sur la végétation incluant forêts, prairies, zones humides et zones agricoles.
      es: >-
        Entidad geográfica basada en plantas que incluye bosques, praderas, humedales y áreas agrícolas.
      ar: >-
        كيان جغرافي نباتي يشمل الغابات والأراضي العشبية والأراضي الرطبة والمناطق الزراعية.
      id: >-
        Entitas geografis berbasis tumbuhan termasuk hutan, padang rumput, lahan basah, dan area pertanian.
      zh: >-
