  UnderseaFeature:
    is_a: GeoFeatureType
    class_uri: gn:U
    description: >-
      Submarine geographical entity including underwater ridges, trenches, seamounts, and abyssal plains.
    alt_descriptions:
      nl: >-
        Onderzees geografisch element inclusief onderzeese ruggen, troggen, zeearmen en abyssale vlaktes.
      de: >-
        Untermeerisches geografisches Element einschließlich Unterwasserücken, Gräben, Seeberge und Tiefseebebenen.
      fr: >-
        Entité géographique sous-marine incluant dorsales, fosses, monts sous-marins et plaines abyssales.
      es: >-
        Entidad geográfica submarina que incluye dorsales, fosas, montes submarinos y llanuras abisales.
      ar: >-
        كيان جغرافي تحت البحر يشمل السلاسل البحرية والخنادق والجبال البحرية والسهول العميقة.
      id: >-
        Entitas geografis bawah laut termasuk punggung laut, parit, gunung laut, dan dataran abisal.
      zh: >-
        海底地理实体，包括水下海岭、海沟、海山和深海平原。
