  HypsographicFeature:
    is_a: GeoFeatureType
    class_uri: gn:T
    description: >-
      Terrain elevation or relief-based geographical entity including mountains, hills, and valleys.
    alt_descriptions:
      nl: >-
        Terreinhoogte of reliëfgebaseerd geografisch element inclusief bergen, heuvels en valleien.
      de: >-
        Geländeerhebung oder reliefbasiertes geografisches Element einschließlich Berge, Hügel und Täler.
      fr: >-
        Élévation de terrain ou entité géographique basée sur le relief incluant montagnes, collines et vallées.
      es: >-
