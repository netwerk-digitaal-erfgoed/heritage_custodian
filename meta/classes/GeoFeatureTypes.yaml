    - literal_form: caractéristique de zone
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: característica de área
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ميزة مساحية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fitur area
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区域特征
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - area feature
    - region
    - zone
    - geographical area
    - spatial extent
    comments:
    - 'Preserved from prior description: Area feature class.'
  PopulatedPlace:
    is_a: GeoFeatureType
    class_uri: gn:P
    description: >-
      Settlement or locality inhabited by human populations, ranging from hamlets to major cities.
    alt_descriptions:
      nl: >-
        Nederzetting of plaats bewoond door menselijke populaties, variërend van gehuchten tot grote steden.
      de: >-
        Siedlung oder Ort, der von menschlichen Bevölkerungen bewohnt wird, von Weilern bis zu Großstädten.
      fr: >-
        Colonie ou localité habitée par des populations humaines, allant des hameaux aux grandes villes.
      es: >-
        Asentamiento o localidad habitada por poblaciones humanas, desde aldeas hasta grandes ciudades.
      ar: >-
        مستوطنة أو منطقة مأهولة بالسكان البشريين، تتراوح من القرى الصغيرة إلى المدن الكبرى.
      id: >-
        Permukiman atau lokalitas yang dihuni oleh populasi manusia, mulai dari dusun hingga kota besar.
      zh: >-
        有人类居住的定居点或地点，从小村庄到大城市。
