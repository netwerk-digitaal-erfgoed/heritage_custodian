id: https://nde.nl/ontology/hc/class/NewspaperClippingsArchiveRecordSetTypes
name: NewspaperClippingsArchiveRecordSetTypes
title: NewspaperClippingsArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./NewspaperClippingsArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  ClippingsCollection:
    is_a: NewspaperClippingsArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Aggregated set of excerpted periodical articles organized by source publication.
    alt_descriptions:
      nl: >-
        Geaggregeerde set uitgeknipte periodieke artikelen georganiseerd naar bronpublicatie.
      de: >-
        Aggregierte Menge ausgeschnittener periodischer Artikel, organisiert nach Quellpublikation.
      fr: >-
        Ensemble agrégé d'articles de périodiques découpés, organisés par publication source.
      es: >-
        Conjunto agregado de artículos periodísticos recortados, organizados por publicación fuente.
      ar: >-
        مجموعة مجمعة من المقالات الدورية المقطوعة منظمة حسب المنشور المصدر.
      id: >-
        Kumpulan artikel berkala yang dipotong dan diagregasi, diorganisir berdasarkan publikasi sumber.
      zh: >-
        按来源出版物组织的剪报文章聚合集。
    structured_aliases:
    - literal_form: krantenknipselcollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Zeitungsartikelsammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de coupures de presse
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de recortes de prensa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة قصاصات الصحف
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi kliping koran
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 剪报集
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - NewspaperClippingsArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:ClippingsCollection
      has_custodian:
        equals_string: hc:NewspaperClippingsArchive
      has_note:
        equals_string: This RecordSetType is typically held by NewspaperClippingsArchive custodians. Inverse of rico:isOrWasHolderOf.
    keywords:
    - newspaper clippings
    - periodical excerpts
    - press archive
    - media collection
    comments:
    - Physical or digital aggregations of cut articles from newspapers and journals.
    - Often arranged chronologically or by source publication.
    - 'Preserved from prior description: Collection of newspaper and periodical clippings.'
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  SubjectFileCollection:
    is_a: NewspaperClippingsArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Thematically organized compilation of excerpted articles grouped by subject matter.
    alt_descriptions:
      nl: >-
        Thematisch georganiseerde compilatie van uitgeknipte artikelen gegroepeerd op onderwerp.
      de: >-
        Thematisch organisierte Zusammenstellung ausgeschnittener Artikel, nach Thema gruppiert.
      fr: >-
        Compilation thématiquement organisée d'articles découpés regroupés par sujet.
      es: >-
        Compilación temáticamente organizada de artículos recortados agrupados por materia.
      ar: >-
        تجميع منظم موضوعياً للمقالات المقتطعة مجمعة حسب الموضوع.
      id: >-
        Kompilasi artikel yang dipotong yang diorganisir secara tematis dan dikelompokkan berdasarkan subjek.
      zh: >-
        按主题组织的剪报文章汇编。
    structured_aliases:
    - literal_form: dossiernetwerk
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sachaktenmappe
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection thématique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección temática
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ملف موضوعي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi berbasis subjek
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 主题档案集
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - NewspaperClippingsArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:SubjectFileCollection
      has_custodian:
        equals_string: hc:NewspaperClippingsArchive
      has_note:
        equals_string: This RecordSetType is typically held by NewspaperClippingsArchive custodians. Inverse of rico:isOrWasHolderOf.
    keywords:
    - subject files
    - thematic clippings
    - dossier collection
    - topic archive
    comments:
    - Clippings arranged by subject rather than source or date.
    - Supports research on specific themes, events, or biographical topics.
    - 'Preserved from prior description: Subject-organized clipping file collection.'
    annotations:
      custodian_types: '[''*'']'
