id: https://nde.nl/ontology/hc/class/Expense
name: Expense
title: Expense Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_quantity
  - ../slots/has_description
classes:
  Expense:
    class_uri: schema:MonetaryAmount
    description: >-
      Recorded monetary outflow representing a cost incurred by an organization during operational activities.
    alt_descriptions:
      nl: >-
        Geregistreerde gelduitstroom die een kostenpost vertegenwoordigt die door een organisatie tijdens operationele activiteiten is gemaakt.
      de: >-
        Erfasster Geldabfluss, der eine Ausgabe darstellt, die von einer Organisation während betrieblicher Aktivitäten entstanden ist.
      fr: >-
        Sortie de fonds enregistrée représentant un coût engagé par une organisation lors d'activités opérationnelles.
      es: >-
        Salida monetaria registrada que representa un costo incurrido por una organización durante actividades operativas.
      ar: >-
        تدفق نقدي مسجل يمثل تكلفة تحملتها منظمة خلال الأنشطة التشغيلية.
      id: >-
        Arus keluar uang tercatat yang mewakili biaya yang dikeluarkan oleh organisasi selama aktivitas operasional.
      zh: >-
        记录的货币流出，代表组织在运营活动中产生的成本。
    structured_aliases:

      - literal_form: Uitgave

        predicate: EXACT_SYNONYM

        in_language: nl

      - literal_form: Ausgabe

        predicate: EXACT_SYNONYM

        in_language: de

      - literal_form: Dépense

        predicate: EXACT_SYNONYM

        in_language: fr

      - literal_form: Gasto

        predicate: EXACT_SYNONYM

        in_language: es

      - literal_form: مصروف

        predicate: EXACT_SYNONYM

        in_language: ar

      - literal_form: Pengeluaran

        predicate: EXACT_SYNONYM

        in_language: id

      - literal_form: 支出

        predicate: EXACT_SYNONYM

        in_language: zh
