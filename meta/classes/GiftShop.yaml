classes:
  GiftShop:
    is_a: ReconstructedEntity
    class_uri: schema:Store
    description: >-
      Retail operation selling merchandise, reproductions, publications, and heritage-related products to institutional visitors.
    alt_descriptions:
      nl: >-
        Detailhandelsoperatie die merchandise, reproducties, publicaties en erfgoedgerelateerde producten verkoopt aan instellingsbezoekers.
      de: >-
        Einzelhandelsoperation, die Merchandise, Reproduktionen, Publikationen und heritagesbezogene Produkte an institutionelle Besucher verkauft.
      fr: >-
        Opération de vente au détail vendant des produits dérivés, reproductions, publications et produits liés au patrimoine aux visiteurs institutionnels.
      es: >-
        Operación minorista que vende mercancía, reproducciones, publicaciones y productos relacionados con el patrimonio a los visitantes institucionales.
      ar: >-
        عملية تجزئة تبيع البضائع والنسخ والمنشورات والمنتجات المتعلقة بالتراث للزوار المؤسسيين.
      id: >-
        Operasi ritel yang menjual barang dagangan, reproduksi, publikasi, dan produk terkait warisan kepada pengunjung lembaga.
      zh: >-
        向机构访客销售商品、复制品、出版物和遗产相关产品的零售业务。
