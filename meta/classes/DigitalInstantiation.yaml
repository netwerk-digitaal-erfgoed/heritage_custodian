id: https://nde.nl/ontology/hc/class/DigitalInstantiation
name: DigitalInstantiation
title: Digital Instantiation Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_status
- ../slots/has_url
classes:
  DigitalInstantiation:
    class_uri: crm:E73_Information_Object
    description: >-
      Digital surrogate record describing an access endpoint and lifecycle status
      for electronically stored heritage representations.
    alt_descriptions:
      nl: >-
        Digitaal surrogaatrecord dat een toegangseindpunt en levenscyclusstatus beschrijft
        voor elektronisch opgeslagen erfgoedrepresentaties.
      de: >-
        Digitaler Surrogatdatensatz, der einen Zugangsendpunkt und Lebenszyklusstatus
        für elektronisch gespeicherte Heritage-Repräsentationen beschreibt.
      fr: >-
        Enregistrement de substitut numérique décrivant un point d'accès et un état de cycle de vie
        pour les représentations patrimoniales stockées électroniquement.
      es: >-
        Registro sustituto digital que describe un punto de acceso y estado de ciclo de vida
        para representaciones patrimoniales almacenadas electrónicamente.
      ar: >-
        سجل بديل رقمي يصف نقطة نهاية الوصول وحالة دورة الحياة
        للتمثيلات التراثية المخزنة إلكترونيًا.
      id: >-
        Catatan pengganti digital yang mendeskripsikan titik akhir akses dan status siklus hidup
        untuk representasi warisan yang disimpan secara elektronik.
      zh: >-
        描述电子存储遗产表示的访问端点和生命周期状态的数字代理记录。
    structured_aliases:
    - literal_form: digitale instantie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: digitale Instanziierung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: instantiation numérique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: instanciación digital
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تجسيد رقمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: instansi digital
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 数字实例
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - crm:E73_Information_Object
    slots:
    - has_url
    - has_status
    - has_label
    comments:
    - Represents digitized versions of physical heritage objects.
    - Tracks accessibility and availability of digital surrogates.
    - 'Preserved from prior description: Digital surrogate or manifestation record describing access endpoint and lifecycle status.'
    keywords:
    - digital surrogate
    - access endpoint
    - lifecycle status
    - electronic representation
