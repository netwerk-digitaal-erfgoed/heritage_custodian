classes:
  HistoricalRegion:
    class_uri: hc:HistoricalRegion
    description: >-
      Geographic territory or polity that existed during a past era, capturing boundaries and names that differ from present-day geography.
    alt_descriptions:
      nl: >-
        Geografisch territorium of staat die in een vroegere tijdperk bestond, met grenzen en namen die afwijken van de huidige geografie.
      de: >-
        Geografisches Territorium oder politische Einheit, das in einer vergangenen Ära existierte, mit Grenzen und Namen, die von der heutigen Geografie abweichen.
      fr: >-
        Territoire géographique ou polity qui existait pendant une époque passée, capturant des frontières et des noms différents de la géographie actuelle.
      es: >-
        Territorio geográfico o entidad política que existió durante una era pasada, capturando fronteras y nombres que difieren de la geografía actual.
      ar: >-
        إقليم جغرافي أو كيان سياسي وُجد في حقبة ماضية، يلتقط الحدود والأسماء التي تختلف عن الجغرافيا الحالية.
      id: >-
        Wilayah geografis atau entitas politik yang ada pada era lampau, menangkap batas dan nama yang berbeda dari geografi saat ini.
      zh: >-
        过去时代存在的地理区域或政体，记录与当今地理不同的边界和名称。
