id: https://w3id.org/nde/ontology/GLAM
name: GLAM
title: GLAM Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_score
classes:
  GLAM:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Collective sector designation encompassing galleries, libraries, archives,
      and museums as cultural memory institutions.
    alt_descriptions:
      nl: >-
        Collectieve sectoraanduiding die galerieën, bibliotheken, archieven en musea
        als culturele herinneringsinstellingen omvat.
      de: >-
        Kollektive Sektorbezeichnung, die Galerien, Bibliotheken, Archive und Museen
        als kulturelle Gedächtnisinstitutionen umfasst.
      fr: >-
        Désignation sectorielle collective englobant galeries, bibliothèques, archives
        et musées en tant qu'institutions de mémoire culturelle.
      es: >-
        Designación sectorial colectiva que abarca galerías, bibliotecas, archivos y museos
        como instituciones de memoria cultural.
      ar: >-
        تسمية قطاعية جماعية تشمل المعارض والمكتبات والأرشيفات والمتاحف كمؤسسات للذاكرة الثقافية.
      id: >-
        Sebutan sektor kolektif yang mencakup galeri, perpustakaan, arsip, dan museum
        sebagai institusi memori budaya.
      zh: >-
        作为文化记忆机构涵盖美术馆、图书馆、档案馆和博物馆的集合性部门称谓。
    broad_mappings:
      - skos:Concept
    slots:
      - identified_by
      - has_score
    annotations:
      skos:prefLabel: GLAM
      sector_term: 'yes'
      specificity_score: 0.35
      specificity_rationale: Sector umbrella concept for memory institutions.
      custodian_types: '["*"]'
