id: https://nde.nl/ontology/hc/classes/EnrichmentProvenance
name: EnrichmentProvenance
title: EnrichmentProvenance
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
# default_range: string
classes:
  EnrichmentProvenance:
    description: >-
      Container that groups provenance statements for one enrichment package,
      including source-specific entries, hashes, and verification events.
    class_uri: prov:Bundle
    alt_descriptions:
      nl: Container die provenanceverklaringen groepeert voor een verrijkingspakket inclusief bronitems hashes en verificatiegebeurtenissen.
      de: Behaelter zur Buendelung von Provenienzaussagen fuer ein Anreicherungspaket inklusive Quelleneintraegen Hashes und Verifizierungen.
      fr: Conteneur regroupant les declarations de provenance pour un lot d enrichissement avec entrees source empreintes et verifications.
      es: Contenedor que agrupa declaraciones de procedencia para un paquete de enriquecimiento con entradas de origen hashes y verificaciones.
      ar: حاوية تجمع بيانات الإسناد لحزمة إثراء واحدة بما في ذلك إدخالات المصادر والتجزئات وأحداث التحقق.
      id: Wadah yang mengelompokkan pernyataan provenance untuk satu paket pengayaan termasuk entri sumber hash dan peristiwa verifikasi.
      zh: 用于汇总单个富化包溯源声明的容器，包含来源条目、哈希和值证事件。
    structured_aliases:
    - {literal_form: verrijkingsprovenance, in_language: nl}
    - {literal_form: Anreicherungsprovenienz, in_language: de}
    - {literal_form: provenance d enrichissement, in_language: fr}
    - {literal_form: procedencia de enriquecimiento, in_language: es}
    - {literal_form: إسناد الإثراء, in_language: ar}
    - {literal_form: provenance pengayaan, in_language: id}
    - {literal_form: 富化溯源包, in_language: zh}
    exact_mappings:
    - prov:Bundle
    close_mappings:
    - prov:Collection
    related_mappings:
    - prov:Entity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
