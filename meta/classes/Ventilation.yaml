id: https://nde.nl/ontology/hc/class/Ventilation
name: Ventilation
title: Ventilation Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/require
classes:
  Ventilation:
    class_uri: schema:Thing
    description: >-
      Air-exchange provision or requirement used to maintain suitable storage or
      occupancy conditions in collection environments.
    alt_descriptions:
      nl: Voorziening of eis voor luchtverversing om geschikte bewaar- of gebruiksomstandigheden in collectieomgevingen te handhaven.
      de: Luftaustauschvorgabe oder -anforderung zur Sicherstellung geeigneter Lager- oder Nutzungsbedingungen in Sammlungsumgebungen.
      fr: Dispositif ou exigence de renouvellement d air pour maintenir des conditions adaptees de conservation ou d occupation.
      es: Provision o requisito de renovacion de aire para mantener condiciones adecuadas de almacenamiento u ocupacion.
      ar: تجهيز أو متطلب لتجديد الهواء للحفاظ على ظروف مناسبة للتخزين أو الإشغال في بيئات المجموعات.
      id: Ketentuan atau persyaratan pertukaran udara untuk menjaga kondisi penyimpanan atau okupansi yang sesuai di lingkungan koleksi.
      zh: 用于在藏品环境中维持适宜存储或使用条件的换气配置或要求。
    structured_aliases:
    - literal_form: ventilatievoorziening
      in_language: nl
    - literal_form: Belueftungsvorgabe
      in_language: de
    - literal_form: exigence de ventilation
      in_language: fr
    - literal_form: requisito de ventilacion
      in_language: es
    - literal_form: متطلب التهوية
      in_language: ar
    - literal_form: persyaratan ventilasi
      in_language: id
    - literal_form: 通风要求
      in_language: zh
    slots:
    - require
    slot_usage:
      require:
        range: AirChanges
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
