id: https://nde.nl/ontology/hc/classes/PublicationEntry
name: PublicationEntry
title: PublicationEntry
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  bf: http://id.loc.gov/ontologies/bibframe/
  dcterms: http://purl.org/dc/terms/
imports:
  - linkml:types
# default_range: string
classes:
  PublicationEntry:
    alt_descriptions:
      nl: Bibliografische publicatievermelding voor wetenschappelijke of professionele werken gekoppeld aan erfgoedcontexten.
      de: Bibliografischer Publikationseintrag fuer wissenschaftliche oder berufliche Werke in Heritage Kontexte.
      fr: Entree bibliographique de publication pour des travaux savants ou professionnels lies au domaine du patrimoine.
      es: Registro bibliografico de publicacion para obras academicas o profesionales vinculadas al patrimonio.
      ar: سجل ببليوغرافي لمنشور علمي أو مهني مرتبط بسياقات التراث.
      id: Entri publikasi bibliografis untuk karya ilmiah atau profesional dalam konteks warisan budaya.
      zh: 用于遗产语境中学术或专业成果的书目出版条目。
    structured_aliases:
    - literal_form: publicatievermelding
      in_language: nl
    - literal_form: Publikationseintrag
      in_language: de
    - literal_form: entree de publication
      in_language: fr
    - literal_form: entrada de publicacion
      in_language: es
    - literal_form: مدخل منشور
      in_language: ar
    - literal_form: entri publikasi
      in_language: id
    - literal_form: 出版条目
      in_language: zh
    description: >-
      Bibliographic publication entry for scholarly or professional works
      associated with people or institutions in heritage contexts.
    class_uri: schema:ScholarlyArticle
    close_mappings:
    - bf:Work
    - dcterms:BibliographicResource
    related_mappings:
    - schema:CreativeWork
    - prov:Entity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
      modeling_notes: |
        Mapping rationale

        - class_uri: schema:ScholarlyArticle for publication-level bibliographic records
        - close_mappings: bf:Work and dcterms:BibliographicResource for library contexts
        - related_mappings: schema:CreativeWork and prov:Entity for broader and provenance alignment
    slots: []
