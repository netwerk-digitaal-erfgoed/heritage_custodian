      es: Tipo escandinavo de archivo regional encargado de la preservacion duradera de registros gubernamentales y civiles.
      ar: نوع إسكندنافي من الأرشيفات الإقليمية لحفظ السجلات الحكومية والمدنية على المدى الطويل.
