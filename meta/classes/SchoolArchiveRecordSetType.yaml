id: https://nde.nl/ontology/hc/class/SchoolArchiveRecordSetType
name: SchoolArchiveRecordSetType
title: SchoolArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  SchoolArchiveRecordSetType:
    description: >-
      Classification concept for documentary aggregations produced by teaching
      institutions in educational administration, pedagogy, and student life.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties die door
        onderwijsinstellingen worden gevormd rond onderwijsadministratie,
        pedagogiek en leerlingenleven.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die von
        Bildungseinrichtungen in den Bereichen Schulverwaltung, Pädagogik und
        Lernendenleben erzeugt werden.
      fr: >-
        Concept de classification pour des agrégations documentaires produites
        par des établissements d'enseignement autour de l'administration
        éducative, de la pédagogie et de la vie des élèves.
      es: >-
        Concepto de clasificación para agregaciones documentales producidas por
        instituciones educativas sobre administración, pedagogía y vida
        estudiantil.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي تنتجها مؤسسات تعليمية في
        الإدارة التعليمية والتربية وحياة الطلاب.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dihasilkan lembaga
        pendidikan dalam administrasi pendidikan, pedagogi, dan kehidupan
        peserta didik.
      zh: >-
        用于分类由教学机构在教育行政、教学法和学生生活领域形成的文献聚合体的分类概念。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - SchoolArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: SchoolArchiveRecordSetType
    structured_aliases:
    - literal_form: type voor onderwijsdocumentaire aggregatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ für Bildungsdokumentationsaggregation
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'agrégation documentaire éducative
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de agregación documental educativa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع تجميع وثائقي تعليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe agregasi dokumenter pendidikan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 教育文献聚合类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Supports categorization of documentary output from educational governance and instruction.
    - Preserves context for institution-level memory and accountability in education settings.
    - 'Preserved from prior description: Record set type used to classify materials typically held by school archives.'
    keywords:
    - educational administration
    - pedagogical documentation
    - documentary aggregation
    - student life records
    examples:
    - value:
        has_type: SchoolArchiveRecordSetType
        has_scope: Enrollment registers, curriculum plans, and annual reports.
      description: Documentary aggregation from teaching-institution operations.
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
