classes:
  CurrentPosition:
    class_uri: schema:Role
    description: >-
      Present professional role or employment relationship linking an individual to their current organizational affiliation.
    alt_descriptions:
      nl: >-
        Huidige professionele rol of arbeidsrelatie die een individu koppelt aan de huidige organisatieaansluiting.
      de: >-
        Aktuelle berufliche Rolle oder Beschäftigungsverhältnis, das eine Person mit ihrer gegenwärtigen Organisationszugehörigkeit verknüpft.
      fr: >-
        Rôle professionnel ou relation d'emploi actuel liant un individu à son affiliation organisationnelle actuelle.
      es: >-
        Rol profesional actual o relación laboral que vincula a un individuo con su afiliación organizacional actual.
      ar: >-
        الدور المهني الحالي أو علاقة العمل التي تربط الفرد بانتمائه التنظيمي الحالي.
      id: >-
        Peran profesional atau hubungan kerja saat ini yang menghubungkan individu dengan afiliasi organisasinya saat ini.
      zh: >-
        将个人与其当前组织隶属关系联系起来的当前职业角色或雇佣关系。
