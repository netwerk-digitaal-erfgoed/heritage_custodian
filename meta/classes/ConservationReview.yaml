id: https://nde.nl/ontology/hc/class/ConservationReview
name: ConservationReview
title: Conservation Review
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
- ../slots/temporal_extent
classes:
  ConservationReview:
    class_uri: crm:E14_Condition_Assessment
    description: >-
      Follow-up assessment activity used to re-evaluate physical condition outcomes
      and determine pending treatment requirements.
    alt_descriptions:
      nl: >-
        Vervolgsbeoordelingsactiviteit gebruikt om fysieke toestandsresultaten te herevalueren
        en behandelingseisen te bepalen.
      de: >-
        Nachfolgende Bewertungstätigkeit zur Neubewertung physischer Zustandsergebnisse
        und Feststellung ausstehender Behandlungsanforderungen.
      fr: >-
        Activité d'évaluation de suivi utilisée pour réévaluer les résultats de l'état physique
        et déterminer les besoins de traitement en attente.
      es: >-
        Actividad de evaluación de seguimiento utilizada para reevaluar resultados de condición física
        y determinar requisitos de tratamiento pendientes.
      ar: >-
        نشاط تقييم متابعة يُستخدم لإعادة تقييم نتائج الحالة المادية
        وتحديد متطلبات المعالجة المعلقة.
      id: >-
        Aktivitas penilaian tindak lanjut yang digunakan untuk mengevaluasi ulang hasil kondisi fisik
        dan menentukan kebutuhan perawatan yang tertunda.
      zh: >-
        用于重新评估物理状态结果并确定待处理需求的后续评估活动。
    structured_aliases:
    - literal_form: conserveringsbeoordeling
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Konservierungsüberprüfung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: révision de conservation
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: revisión de conservación
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مراجعة الحفظ
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tinjauan konservasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 保护审查
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - crm:E14_Condition_Assessment
    slots:
    - temporal_extent
    - has_label
    - has_description
    comments:
    - Documents periodic condition reassessment of heritage objects.
    - Tracks changes in object condition over time for conservation planning.
    - 'Preserved from prior description: Follow-up assessment entry used to re-evaluate condition outcomes and pending treatment needs.'
    keywords:
    - condition assessment
    - conservation planning
    - treatment review
    - periodic reassessment
