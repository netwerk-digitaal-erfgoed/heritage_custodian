id: https://nde.nl/ontology/hc/class/DigitalConfidence
name: DigitalConfidence
title: Digital Confidence Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dqv: http://www.w3.org/ns/dqv#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_score
  - ../slots/has_type
classes:
  DigitalConfidence:
    class_uri: dqv:QualityMeasurement
    description: >-
      Quantitative assessment score indicating reliability of inferred or
      machine-extracted digital attribute values.
    alt_descriptions:
      nl: >-
        Kwantitatieve beoordelingsscore die de betrouwbaarheid van afgeleide of
        machine-geëxtraheerde digitale attribuutwaarden aangeeft.
      de: >-
        Quantitativer Bewertungswert, der die Zuverlässigkeit von abgeleiteten oder
        maschinell extrahierten digitalen Attributwerten angibt.
      fr: >-
        Score d'évaluation quantitative indiquant la fiabilité des valeurs d'attributs
        numériques déduites ou extraites par machine.
      es: >-
        Puntuación de evaluación cuantitativa que indica la confiabilidad de valores
        de atributos digitales inferidos o extraídos por máquina.
      ar: >-
        درجة تقييم كمية تشير إلى موثوقية قيم السمات الرقمية المستنتجة أو المستخرجة آلياً.
      id: >-
        Skor penilaian kuantitatif yang menunjukkan keandalan nilai atribut digital
        yang disimpulkan atau diekstraksi mesin.
      zh: >-
        指示推断或机器提取的数字属性值可靠性的定量评估分数。
    broad_mappings:
      - dqv:QualityMeasurement
    slots:
      - has_score
      - has_description
      - has_type
    slot_usage:
      has_score:
        range: float
        required: true
        minimum_value: 0.0
        maximum_value: 1.0
