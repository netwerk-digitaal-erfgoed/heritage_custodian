id: https://nde.nl/ontology/hc/class/LocalHistoryArchiveRecordSetType
name: LocalHistoryArchiveRecordSetType
title: Local History Archive Record Set Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_type
- ../slots/has_scope
- ../slots/has_score
classes:
  LocalHistoryArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Classification concept for documentary aggregations maintained by local history
      archives documenting place-based community heritage.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties beheerd door lokale geschiedenisarchieven
        die plaatsgebonden erfgoed van de gemeenschap documenteren.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die von lokalen Geschichtsarchiven
        verwaltet werden und ortsbasiertes Gemeinschaftserbe dokumentieren.
      fr: >-
        Concept de classification pour les agrégations documentaires maintenues par les archives
        d'histoire locale documentant le patrimoine communautaire basé sur le lieu.
      es: >-
        Concepto de clasificación para agregaciones documentales mantenidas por archivos de historia local
        que documentan patrimonio comunitario basado en el lugar.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي تديرها أرشيفات التاريخ المحلي
        التي توثق تراث المجتمع القائم على المكان.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dikelola oleh arsip sejarah lokal
        yang mendokumentasikan warisan komunitas berbasis tempat.
      zh: >-
        用于分类由记录基于地点的社区遗产的地方历史档案维护的文献聚合的分类概念。
    structured_aliases:
    - literal_form: lokaal-historisch archief-recordsettype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Lokalgeschichte-Archiv-RecordSet-Typ
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de fonds d'archives d'histoire locale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de fondo de archivo de historia local
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع مجموعة سجلات أرشيف التاريخ المحلي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe set rekaman arsip sejarah lokal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方历史档案记录集类型
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_type
    - has_scope
    - has_score
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    comments:
    - Applies to collections documenting local community history and heritage.
    - Often includes photographs, oral histories, local publications, and family papers.
    - 'Preserved from prior description: Record-set type for classifying local-history archival holdings.'
    keywords:
    - local history
    - community heritage
    - place-based archives
    - local documentation
    annotations:
      specificity_score: 0.55
      specificity_rationale: Record-set classification class for place-based historical archive material.
      custodian_types: '["*"]'
