id: https://nde.nl/ontology/hc/classes/IsilCodeEntry
name: IsilCodeEntry
title: ISIL Code Entry Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_name
- ../slots/has_note
classes:
  IsilCodeEntry:
    class_uri: dcterms:Identifier
    description: >-
      Structured registration record capturing International Standard Identifier
      for Libraries and Related Organizations assignment and metadata.
    alt_descriptions:
      nl: >-
        Gestructureerd registratierecord dat de toewijzing en metagegevens van de
        Internationale Standaard Identificatie voor Bibliotheken en Gerelateerde Organisaties vastlegt.
      de: >-
        Strukturierter Registrierungsdatensatz, der die Zuweisung und Metadaten des Internationalen
        Standardidentifikators für Bibliotheken und verwandte Organisationen erfasst.
      fr: >-
        Enregistrement d'inscription structuré capturant l'attribution et les métadonnées
        de l'Identifiant International Normalisé pour les Bibliothèques et Organisations Apparentées.
      es: >-
        Registro de inscripción estructurado que captura la asignación y metadatos del
        Identificador Estándar Internacional para Bibliotecas y Organizaciones Relacionadas.
      ar: >-
        سجل تسجيل منظم يلتقط تخصيص ومعرفات المعيار الدولي للمكتبات والمنظمات ذات الصلة.
      id: >-
        Catatan pendaftaran terstruktur yang menangkap penetapan dan metadata Pengidentifikasi
        Standar Internasional untuk Perpustakaan dan Organisasi Terkait.
      zh: >-
        捕获图书馆和相关组织国际标准标识符分配和元数据的结构化注册记录。
    broad_mappings:
    - dcterms:Identifier
    slots:
    - has_name
    - has_note
    annotations:
      specificity_score: 0.4
      specificity_rationale: Identifier-entry class for ISIL registry ingestion and provenance.
      custodian_types: '["*"]'
    comments:
    - 'Preserved from prior description: Structured ISIL registration entry for an institution identifier assignment.'
