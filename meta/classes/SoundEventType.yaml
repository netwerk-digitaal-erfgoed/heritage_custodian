id: https://nde.nl/ontology/hc/class/SoundEventType
name: SoundEventType
title: SoundEventType
description: >-
  Controlled category for classifying audible occurrences in recordings or live observations.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/

default_prefix: hc

imports:
- linkml:types
- ../slots/has_label
classes:
  SoundEventType:
    class_uri: skos:Concept
    description: >-
      Controlled vocabulary concept for classifying audible occurrences in
      annotation and analysis workflows.
    alt_descriptions:
      nl: >-
        Gecontroleerd vocabulaireconcept voor het classificeren van hoorbare
        gebeurtenissen in annotatie- en analyseworkflows.
      de: >-
        Kontrolliertes Vokabular-Konzept zur Klassifizierung hörbarer
        Vorkommnisse in Annotation- und Analyseabläufen.
      fr: >-
        Concept de vocabulaire contrôlé pour classer les occurrences audibles
        dans des workflows d'annotation et d'analyse.
      es: >-
        Concepto de vocabulario controlado para clasificar ocurrencias audibles
        en flujos de trabajo de anotación y análisis.
      ar: >-
        مفهوم معجم مضبوط لتصنيف الوقائع المسموعة في مسارات عمل التعليق
        والتحليل.
      id: >-
        Konsep kosakata terkontrol untuk mengklasifikasikan kejadian yang dapat
        didengar dalam alur kerja anotasi dan analisis.
      zh: >-
        用于在标注与分析流程中分类可听事件的受控词汇概念。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    structured_aliases:
    - literal_form: categorie hoorbare gebeurtenis
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Kategorie hörbares Vorkommnis
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: catégorie d'occurrence audible
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: categoría de ocurrencia audible
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: فئة واقعة مسموعة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kategori kejadian terdengar
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 可听事件类别
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Use for classifying audio events (e.g., speech, music, applause) in analysis or annotation contexts.
    - Preserved usage detail: supports distinctions such as speech, music, and applause.
    - 'Preserved from prior description: Controlled vocabulary concept for categorizing sound events.'
    keywords:
    - audio annotation
    - controlled vocabulary
    - audible occurrence
    - event categorization
    examples:
    - value:
        has_label: speech
      description: Audible occurrence category used in segment-level annotation.
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
    - has_label
