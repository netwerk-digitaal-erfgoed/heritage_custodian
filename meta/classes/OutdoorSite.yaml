classes:
  OutdoorSite:
    is_a: ReconstructedEntity
    class_uri: schema:Park
    description: >-
      Exterior grounds under heritage stewardship including gardens, sculpture parks, archaeological sites, and managed landscapes.
    alt_descriptions:
      nl: >-
        Buitenterreinen onder erfgoedbeheer inclusief tuinen, beeldentuinen, archeologische sites en beheerde landschappen.
      de: >-
        Außenanlagen unter Denkmalschutzverwaltung einschließlich Gärten, Skulpturenparks, archäologischer Stätten und gepflegter Landschaften.
      fr: >-
        Terrains extérieurs sous gestion patrimoniale comprenant jardins, parcs de sculptures, sites archéologiques et paysages aménagés.
      es: >-
        Terrenos exteriores bajo gestión patrimonial que incluyen jardines, parques de esculturas, sitios arqueológicos y paisajes gestionados.
      ar: >-
        أراضي خارجية تحت إدارة التراث تشمل الحدائق ومتنزهات المنحوتات والمواقع الأثرية والمناظر الطبيعية المُدارة.
      id: >-
        Lahan luar di bawah pengelolaan warisan termasuk taman, taman patung, situs arkeologi, dan lanskap yang dikelola.
      zh: >-
        包括花园、雕塑公园、考古遗址和管理景观在内的遗产管理外部场地。
