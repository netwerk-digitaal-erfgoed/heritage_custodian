id: https://nde.nl/ontology/hc/class/FreeArchiveRecordSetTypes
name: FreeArchiveRecordSetTypes
title: Free Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./FreeArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  OpenAccessCollection:
    is_a: FreeArchiveRecordSetType
    class_uri: hc:OpenAccessCollection
    description: >-
      A collection of materials made available for public consultation and reuse under open access conditions.
    alt_descriptions:
      nl: >-
        Een collectie materiaal die onder open toegangsvoorwaarden beschikbaar wordt gesteld voor publieke raadpleging en hergebruik.
      de: >-
        Eine Sammlung von Materialien, die unter Open-Access-Bedingungen zur oeffentlichen Einsicht und Wiederverwendung bereitgestellt wird.
      fr: >-
        Une collection de documents mise a disposition du public pour consultation et reutilisation selon des conditions d'acces ouvert.
      es: >-
        Una coleccion de materiales puesta a disposicion del publico para consulta y reutilizacion bajo condiciones de acceso abierto.
      ar: >-
        مجموعة من المواد المتاحة للاطلاع العام وإعادة الاستخدام وفق شروط الوصول المفتوح.
      id: >-
        Sekumpulan materi yang disediakan untuk konsultasi publik dan penggunaan ulang dengan ketentuan akses terbuka.
      zh: >-
        在开放获取条件下向公众提供查阅与再利用的一组资料收藏。
    structured_aliases:
    - literal_form: open access collectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Open-Access-Sammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection en acces ouvert
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de acceso abierto
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة وصول مفتوح
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi akses terbuka
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 开放获取收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - open access
      - public consultation
      - reuse conditions
      - accessibility
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:FreeArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
