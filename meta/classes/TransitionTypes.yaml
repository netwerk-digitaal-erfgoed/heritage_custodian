  FlashTransition:
    is_a: TransitionType
    class_uri: hc:FlashTransition
    description: Very brief high-intensity strobe-like boundary effect for emphasis.
    alt_descriptions:
      nl: Zeer kort, fel stroboscoopachtig grens-effect voor nadruk.
      de: Sehr kurzer, intensiver stroboartiger Grenz-Effekt zur Betonung.
      fr: Effet de frontiere tres bref et intense, de type stroboscopique, pour l emphase.
      es: Efecto de limite muy breve e intenso, tipo estroboscopico, para enfasis.
      ar: تأثير حدّي شديد وقصير جدًا شبيه بالوميض المتقطع لإبراز درامي.
      id: Efek batas sangat singkat dan intens seperti strob untuk penekanan.
      zh: 用于强调的极短高亮频闪式边界效果。
    structured_aliases:
    - literal_form: flitsaccent
      in_language: nl
    - literal_form: Stroboakzent
      in_language: de
    - literal_form: accent stroboscopique
      in_language: fr
    - literal_form: acento estroboscopico
      in_language: es
    - literal_form: وميض تأكيدي
      in_language: ar
    - literal_form: aksen strobo
      in_language: id
    - literal_form: 频闪强调
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/flash)
      has_code:
        ifabsent: string(FLASH)
      has_label:
        ifabsent: string(Flash)
