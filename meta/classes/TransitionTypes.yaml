id: https://nde.nl/ontology/hc/class/TransitionTypes
name: TransitionTypes
title: Video Transition Type Concrete Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ./TransitionType
  - linkml:types
  - ../slots/has_code
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  CutTransition:
    is_a: TransitionType
    class_uri: hc:CutTransition
    description: Instantaneous boundary change between adjacent shots with no interpolation.
    alt_descriptions:
      nl: Ogenblikkelijke shotgrenswijziging tussen opeenvolgende shots zonder interpolatie.
      de: Unmittelbarer Wechsel der Shot-Grenze zwischen benachbarten Einstellungen ohne Interpolation.
      fr: Changement instantane de limite entre plans consecutifs sans interpolation.
      es: Cambio instantaneo de limite entre tomas contiguas sin interpolacion.
      ar: تغيّر فوري في حد الانتقال بين لقطات متجاورة دون مزج.
      id: Perubahan batas antar shot yang seketika tanpa interpolasi.
      zh: 相邻镜头之间无插值的瞬时边界变化。
    structured_aliases:
    - literal_form: harde snede
      in_language: nl
    - literal_form: harter Schnittwechsel
      in_language: de
    - literal_form: bascule immediate
      in_language: fr
    - literal_form: cambio instantaneo de plano
      in_language: es
    - literal_form: تبديل فوري
      in_language: ar
    - literal_form: pergantian seketika
      in_language: id
    - literal_form: 瞬时镜头切换
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/cut)
      has_code:
        ifabsent: string(CUT)
      has_label:
        ifabsent: string(Cut)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on cut transition characteristics and detection cues.
    broad_mappings:
      - skos:Concept

  FadeInTransition:
    is_a: TransitionType
    class_uri: hc:FadeInTransition
    description: Gradual increase from full darkness or solid matte into visible imagery.
    alt_descriptions:
      nl: Geleidelijke toename van volledige duisternis of effen vlak naar zichtbaar beeld.
      de: Allmaehlicher Uebergang von vollstaendiger Dunkelheit oder einfarbiger Flaeche zu sichtbarem Bild.
      fr: Augmentation progressive depuis l obscurite totale ou un a-plat vers une image visible.
      es: Incremento gradual desde oscuridad total o fondo uniforme hacia imagen visible.
      ar: ازدياد تدريجي من ظلام كامل أو خلفية مصمتة إلى صورة مرئية.
      id: Peningkatan bertahap dari gelap penuh atau bidang polos menuju citra terlihat.
      zh: 从全黑或纯色底逐步增强到可见画面的过程。
    structured_aliases:
    - literal_form: opkomen uit zwart
      in_language: nl
    - literal_form: Einblendaufbau
      in_language: de
    - literal_form: apparition progressive
      in_language: fr
    - literal_form: aparicion gradual
      in_language: es
    - literal_form: ظهور تدريجي
      in_language: ar
    - literal_form: muncul bertahap
      in_language: id
    - literal_form: 渐显入画
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/fade-in)
      has_code:
        ifabsent: string(FADE_IN)
      has_label:
        ifabsent: string(Fade In)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on fade-in transition characteristics and use cases.
    broad_mappings:
      - skos:Concept

  FadeOutTransition:
    is_a: TransitionType
    class_uri: hc:FadeOutTransition
    description: Gradual decrease from visible imagery to full darkness or solid matte.
    alt_descriptions:
      nl: Geleidelijke afname van zichtbaar beeld naar volledige duisternis of effen vlak.
      de: Allmaehlicher Rueckgang von sichtbarem Bild zu vollstaendiger Dunkelheit oder einfarbiger Flaeche.
      fr: Diminution progressive d une image visible vers l obscurite totale ou un a-plat.
      es: Disminucion gradual de imagen visible hacia oscuridad total o fondo uniforme.
      ar: انخفاض تدريجي من صورة مرئية إلى ظلام كامل أو خلفية مصمتة.
      id: Penurunan bertahap dari citra terlihat menuju gelap penuh atau bidang polos.
      zh: 从可见画面逐步减弱到全黑或纯色底的过程。
    structured_aliases:
    - literal_form: uitdoof naar zwart
      in_language: nl
    - literal_form: Ausblendabsenkung
      in_language: de
    - literal_form: disparition progressive
      in_language: fr
    - literal_form: desaparicion gradual
      in_language: es
    - literal_form: اختفاء تدريجي
      in_language: ar
    - literal_form: hilang bertahap
      in_language: id
    - literal_form: 渐隐出画
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/fade-out)
      has_code:
        ifabsent: string(FADE_OUT)
      has_label:
        ifabsent: string(Fade Out)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on fade-out transition characteristics and use cases.
    broad_mappings:
      - skos:Concept

  DissolveTransition:
    is_a: TransitionType
    class_uri: hc:DissolveTransition
    description: Overlap blend where outgoing and incoming shots coexist briefly.
    alt_descriptions:
      nl: Overlappende menging waarbij uitgaand en inkomend shot kort samen zichtbaar zijn.
      de: Ueberblendung mit kurzzeitiger Gleichzeitigkeit von ausgehender und eingehender Einstellung.
      fr: Fondu superpose ou plans sortant et entrant coexistent brievement.
      es: Mezcla superpuesta en la que toma saliente y entrante coexisten brevemente.
      ar: مزج متراكب تتواجد فيه اللقطة الخارجة والداخلة معًا لفترة وجيزة.
      id: Campuran tumpang tindih saat shot keluar dan masuk tampil bersamaan sesaat.
      zh: 出入镜头短暂共存的叠化混合效果。
    structured_aliases:
    - literal_form: overvloei
      in_language: nl
    - literal_form: Ueberblendmischung
      in_language: de
    - literal_form: fondu enchainé
      in_language: fr
    - literal_form: mezcla encadenada
      in_language: es
    - literal_form: مزج متداخل
      in_language: ar
    - literal_form: campur tindih
      in_language: id
    - literal_form: 叠化
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/dissolve)
      has_code:
        ifabsent: string(DISSOLVE)
      has_label:
        ifabsent: string(Dissolve)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on dissolve transition characteristics and heritage context.
    broad_mappings:
      - skos:Concept

  WipeTransition:
    is_a: TransitionType
    class_uri: hc:WipeTransition
    description: Moving geometric boundary that replaces one shot with another.
    alt_descriptions:
      nl: Bewegende geometrische grens die het ene shot door het andere vervangt.
      de: Bewegte geometrische Grenze, die eine Einstellung durch eine andere ersetzt.
      fr: Frontiere geometrique mobile remplacant un plan par un autre.
      es: Frontera geometrica en movimiento que reemplaza una toma por otra.
      ar: حد هندسي متحرك يستبدل لقطة بأخرى.
      id: Batas geometris bergerak yang menggantikan satu shot dengan shot lain.
      zh: 通过移动几何边界将一个镜头替换为另一个镜头。
    structured_aliases:
    - literal_form: veegovergang
      in_language: nl
    - literal_form: geometrischer Abstreifer
      in_language: de
    - literal_form: balayage geometrique
      in_language: fr
    - literal_form: barrido geometrico
      in_language: es
    - literal_form: مسح هندسي
      in_language: ar
    - literal_form: sapuan geometris
      in_language: id
    - literal_form: 几何擦除替换
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/wipe)
      has_code:
        ifabsent: string(WIPE)
      has_label:
        ifabsent: string(Wipe)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on wipe transition characteristics and historical context.
    broad_mappings:
      - skos:Concept

  MorphTransition:
    is_a: TransitionType
    class_uri: hc:MorphTransition
    description: Continuous warp blending one visual form into a different form.
    alt_descriptions:
      nl: Doorlopende vervormingsmenging waarbij de ene beeldvorm in een andere overgaat.
      de: Kontinuierliche Verformungsmischung, bei der eine Bildform in eine andere uebergeht.
      fr: Melange par deformation continue transformant une forme visuelle en une autre.
      es: Mezcla por deformacion continua que transforma una forma visual en otra.
      ar: مزج تشوّهي متواصل تتحول فيه هيئة بصرية إلى أخرى.
      id: Pencampuran distorsi berkelanjutan yang mengubah satu bentuk visual ke bentuk lain.
      zh: 通过连续形变将一种视觉形态融合为另一种形态。
    structured_aliases:
    - literal_form: vervormingsmenging
      in_language: nl
    - literal_form: Formverzerrungsblendung
      in_language: de
    - literal_form: deformation continue
      in_language: fr
    - literal_form: deformacion continua
      in_language: es
    - literal_form: تشكل متحوّل
      in_language: ar
    - literal_form: ubah bentuk bertahap
      in_language: id
    - literal_form: 连续形变融合
      in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/transition-type/morph)
      has_code:
        ifabsent: string(MORPH)
      has_label:
        ifabsent: string(Morph)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video annotation domain.
      legacy_description: Preserved verbose guidance on morph transition characteristics and rarity.
    broad_mappings:
