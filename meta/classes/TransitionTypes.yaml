  OtherTransition:
    is_a: TransitionType
    class_uri: hc:OtherTransition
    description: Fallback category for boundary-change patterns not covered by predefined subclasses.
    alt_descriptions:
      nl: Fallbackcategorie voor grenswisselpatronen die niet onder vooraf gedefinieerde subklassen vallen.
      de: Auffangkategorie fuer Grenzwechselmuster, die nicht von vordefinierten Unterklassen abgedeckt sind.
      fr: Categorie de repli pour des motifs de changement de limite non couverts par les sous-classes predefinies.
      es: Categoria de reserva para patrones de cambio de limite no cubiertos por subclases predefinidas.
      ar: فئة احتياطية لأنماط تغيّر الحدود غير المغطاة بالفئات الفرعية المحددة مسبقًا.
      id: Kategori cadangan untuk pola perubahan batas yang tidak tercakup subkelas baku.
      zh: 用于未被预定义子类覆盖的边界变化模式的兜底类别。
    structured_aliases:
    - literal_form: overige grenswissel
      in_language: nl
    - literal_form: sonstiger Grenzwechsel
      in_language: de
    - literal_form: autre changement de limite
      in_language: fr
    - literal_form: otro cambio de limite
      in_language: es
    - literal_form: نمط حدودي آخر
      in_language: ar
    - literal_form: pola batas lain
      in_language: id
    - literal_form: 其他边界变化
      in_language: zh
