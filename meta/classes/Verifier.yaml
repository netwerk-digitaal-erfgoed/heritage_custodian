imports:
- linkml:types
classes:
  Verifier:
    class_uri: prov:Agent
    description: >-
      Agent responsible for reviewing, validating, and confirming the accuracy or authenticity of data, documents, or processes.
    alt_descriptions:
      nl: >-
        Agent die verantwoordelijk is voor het beoordelen, valideren en bevestigen van de nauwkeurigheid of authenticiteit van gegevens, documenten of processen.
      de: >-
        Akteur, der für die Überprüfung, Validierung und Bestätigung der Genauigkeit oder Authentizität von Daten, Dokumenten oder Prozessen verantwortlich ist.
      fr: >-
        Agent responsable de l'examen, de la validation et de la confirmation de l'exactitude ou de l'authenticité des données, documents ou processus.
      es: >-
        Agente responsable de revisar, validar y confirmar la exactitud o autenticidad de datos, documentos o procesos.
      ar: >-
        وكيل مسؤول عن مراجعة والتحقق من وتأكيد دقة أو أصالة البيانات أو المستندات أو العمليات.
      id: >-
        Agen yang bertanggung jawab untuk meninjau, memvalidasi, dan mengonfirmasi keakuratan atau keaslian data, dokumen, atau proses.
      zh: >-
        负责审查、验证和确认数据、文档或流程的准确性或真实性的代理。
