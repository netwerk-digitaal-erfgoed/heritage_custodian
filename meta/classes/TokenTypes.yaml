id: https://nde.nl/ontology/hc/class/TokenTypes
name: token_types_class
title: Token Types
version: 1.0.0
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
- ./TokenType
- linkml:types
- ../slots/has_label
default_prefix: hc
classes:
  InputToken:
    is_a: TokenType
    class_uri: hc:InputToken
    description: >-
      Measurement category for units consumed by a computational request lifecycle.
    alt_descriptions:
      nl: Eenheden in de invoerprompt die naar het groot taalmodel worden verzonden (ook wel prompt-tokens genoemd).
      de: Einheiten im Eingabe-Prompt, der an das LLM gesendet wird (auch Prompt-Tokens genannt).
      fr: Unités dans l'invite d'entrée envoyée au grand modèle de langage (également appelés jetons d'invite).
      es: Unidades en el prompt de entrada enviado al modelo de lenguaje grande (también conocidos como tokens de prompt).
      ar: الوحدات في مطالبة الإدخال المرسلة إلى النموذج اللغوي الكبير (تُعرف أيضًا برموز المطالبة).
      id: Unit dalam prompt input yang dikirim ke model bahasa besar (juga dikenal sebagai token prompt).
      zh: 发送到大语言模型的输入提示中的单元（也称为提示词 token）。
    structured_aliases:
    - literal_form: invoertoken
      in_language: nl
    - literal_form: Eingabe-Token
      in_language: de
    - literal_form: jeton d'entrée
      in_language: fr
    - literal_form: token de entrada
      in_language: es
    - literal_form: توكن إدخال
      in_language: ar
    - literal_form: token input
      in_language: id
    - literal_form: 输入 token
      in_language: zh
    keywords:
    - input
    - prompt
    - consumption
    - request
    - computational
    slots: []
    slot_usage:
      has_label:
        ifabsent: string(Input Token)
    examples:
    - value:
        identified_by: hc:TokenType/INPUT
        has_label: Input Token
        has_description: Tokens in the input prompt
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  OutputToken:
    is_a: TokenType
    class_uri: hc:OutputToken
    description: >-
      Measurement category for units generated by a computational response lifecycle.
    alt_descriptions:
      nl: Eenheden gegenereerd door het groot taalmodel in het antwoord (ook wel completion-tokens genoemd).
      de: Einheiten, die vom LLM in der Antwort generiert wurden (auch Completion-Tokens genannt).
      fr: Unités générées par le grand modèle de langage dans la réponse (également appelés jetons de complétion).
      es: Unidades generadas por el modelo de lenguaje grande en la respuesta (también conocidos como tokens de completación).
      ar: الوحدات التي يولدها النموذج اللغوي الكبير في الاستجابة (تُعرف أيضًا برموز الإكمال).
      id: Unit yang dihasilkan oleh model bahasa besar dalam respons (juga dikenal sebagai token penyelesaian).
      zh: 大语言模型在响应中生成的单元（也称为补全 token）。
    structured_aliases:
    - literal_form: uitvoertoken
      in_language: nl
    - literal_form: Ausgabe-Token
      in_language: de
    - literal_form: jeton de sortie
      in_language: fr
    - literal_form: token de salida
      in_language: es
    - literal_form: توكن إخراج
      in_language: ar
    - literal_form: token output
      in_language: id
    - literal_form: 输出 token
      in_language: zh
    keywords:
    - output
    - completion
    - generation
    - response
    - computational
    slots: []
    slot_usage:
      has_label:
        ifabsent: string(Output Token)
    examples:
    - value:
        identified_by: hc:TokenType/OUTPUT
        has_label: Output Token
        has_description: Tokens in the completion response
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  CachedToken:
    is_a: TokenType
    class_uri: hc:CachedToken
    description: >-
      Units served from the provider's key-value cache with reduced cost and latency.
    alt_descriptions:
      nl: Eenheden geleverd vanuit de key-value cache van de provider met lagere kosten en latentie.
      de: Einheiten aus dem KV-Cache des Anbieters mit reduzierten Kosten und Latenz.
      fr: Unités servies depuis le cache clé-valeur du fournisseur avec un coût et une latence réduits.
      es: Unidades servidas desde el caché clave-valor del proveedor con costo y latencia reducidos.
      ar: الوحدات المقدمة من ذاكرة التخزين المؤقت للمفتاح-القيمة للموفر بتكلفة وزمن انتقال منخفضين.
      id: Unit yang dilayani dari cache kunci-nilai penyedia dengan biaya dan latensi yang dikurangi.
      zh: 从提供商的键值缓存中提供的单元，具有更低的成本和延迟。
    structured_aliases:
    - literal_form: gecachetoken
      in_language: nl
    - literal_form: Cache-Token
      in_language: de
    - literal_form: jeton en cache
      in_language: fr
    - literal_form: token en caché
      in_language: es
    - literal_form: توكن مخزن
      in_language: ar
    - literal_form: token cache
      in_language: id
    - literal_form: 缓存 token
      in_language: zh
    keywords:
    - cache
    - key-value
    - latency
    - cost reduction
    - optimization
    slots: []
    slot_usage:
      has_label:
        ifabsent: string(Cached Token)
    examples:
    - value:
        identified_by: hc:TokenType/CACHED
        has_label: Cached Token
        has_description: Tokens served from provider cache
    comments:
    - Providers supporting caching include OpenAI (Prompt caching), Anthropic (Context caching), ZhipuAI (KV cache for Preserved Thinking)
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  ReasoningToken:
    is_a: TokenType
    class_uri: hc:ReasoningToken
    description: >-
      Units used for chain-of-thought in models with thinking capabilities.
    alt_descriptions:
      nl: Eenheden gebruikt voor keten-van-gedachten redenering in modellen met denkcapaciteiten.
      de: Einheiten für Chain-of-Thought-Reasoning in Modellen mit Denkfähigkeiten.
      fr: Unités utilisées pour le raisonnement par chaîne de pensée dans les modèles avec capacités de réflexion.
      es: Unidades utilizadas para el razonamiento de cadena de pensamiento en modelos con capacidades de pensamiento.
      ar: الوحدات المستخدمة للاستدلال بسلسلة الأفكار في النماذج ذات قدرات التفكير.
      id: Unit yang digunakan untuk penalaran rantai-pikiran dalam model dengan kemampuan berpikir.
      zh: 用于具有思考能力的模型中的思维链推理的单元。
    structured_aliases:
    - literal_form: redeneertoken
      in_language: nl
    - literal_form: Reasoning-Token
      in_language: de
    - literal_form: jeton de raisonnement
      in_language: fr
    - literal_form: token de razonamiento
      in_language: es
    - literal_form: توكن استدلال
      in_language: ar
    - literal_form: token penalaran
      in_language: id
    - literal_form: 推理 token
      in_language: zh
    keywords:
    - reasoning
    - chain-of-thought
    - thinking
    - extended thinking
    - o1
    slots: []
    slot_usage:
      has_label:
        ifabsent: string(Reasoning Token)
    examples:
    - value:
        identified_by: hc:TokenType/REASONING
        has_label: Reasoning Token
        has_description: Tokens for chain-of-thought reasoning
    comments:
    - Models with reasoning tokens include ZhipuAI GLM 4.7 (Interleaved/Preserved thinking), OpenAI o1/o1-mini, Anthropic Claude (Extended thinking)
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  TotalToken:
    is_a: TokenType
    class_uri: hc:TotalToken
    description: >-
      Aggregate count of all units consumed (input plus output).
    alt_descriptions:
      nl: Geaggregeerd aantal van alle verbruikte eenheden (invoer plus uitvoer).
      de: Aggregierte Anzahl aller verbrauchten Einheiten (Eingabe plus Ausgabe).
      fr: Compte agrégé de toutes les unités consommées (entrée plus sortie).
      es: Recuento agregado de todas las unidades consumidas (entrada más salida).
      ar: العدد الإجمالي لجميع الوحدات المستهلكة (الإدخال زائد الإخراج).
      id: Jumlah agregat semua unit yang dikonsumsi (input ditambah output).
      zh: 所有消耗单元的汇总计数（输入加输出）。
    structured_aliases:
    - literal_form: totaaltoken
      in_language: nl
    - literal_form: Gesamt-Token
      in_language: de
    - literal_form: jeton total
      in_language: fr
    - literal_form: token total
      in_language: es
    - literal_form: توكن إجمالي
      in_language: ar
    - literal_form: token total
      in_language: id
    - literal_form: 总 token
      in_language: zh
    keywords:
    - total
    - aggregate
    - sum
    - consumption
    - usage
    slots: []
    slot_usage:
      has_label:
        ifabsent: string(Total Token)
    examples:
    - value:
        identified_by: hc:TokenType/TOTAL
        has_label: Total Token
        has_description: Sum of input and output tokens
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
