    description: >-
      Controlled vocabulary term for visual motifs, symbolic subjects, and representational conventions in artworks.
    alt_descriptions:
      nl: >-
        Gecontroleerde vocabulaireterm voor visuele motieven, symbolische onderwerpen en weergaveconventies in kunstwerken.
      de: >-
        Kontrollierter Vokabularbegriff für visuelle Motive, symbolische Themen und Darstellungskonventionen in Kunstwerken.
      fr: >-
        Terme de vocabulaire contrôlé pour les motifs visuels, les sujets symboliques et les conventions de représentation dans les œuvres d'art.
      es: >-
        Término de vocabulario controlado para motivos visuales, temas simbólicos y convenciones de representación en obras de arte.
      ar: >-
        مصطلح مفردات مضبوطة للزخارف البصرية والمواضيع الرمزية واتفاقيات التمثيل في الأعمال الفنية.
      id: >-
        Istilah kosakata terkendali untuk motif visual, subjek simbolis, dan konvensi representasi dalam karya seni.
      zh: >-
        用于艺术作品中视觉母题、象征主题和表现惯例的受控词汇术语。
