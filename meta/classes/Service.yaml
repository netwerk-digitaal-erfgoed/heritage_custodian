id: https://nde.nl/ontology/hc/class/Service
name: Service
title: Service
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_type
- ../slots/has_price
classes:
  Service:
    class_uri: schema:Service
    description: >-
      A service offered by an institution.
    alt_descriptions:
      nl: Een dienst aangeboden door een instelling.
      de: Eine von einer Institution angebotene Dienstleistung.
      fr: Un service offert par une institution.
    structured_aliases:
    - literal_form: dienst
      in_language: nl
    - literal_form: Dienstleistung
      in_language: de
    - literal_form: service
      in_language: fr
    comments:
    - Used for visitor services (guided tours, audio guides).
    - Used for research services (reference, reproductions).
    - Used for conservation services.
    broad_mappings:
    - schema:Service
    slots:
    - has_type
    - has_price
    slot_usage:
      has_type:
    annotations:
      specificity_score: '0.40'
      specificity_rationale: Moderately specific - services common in public institutions.
      custodian_types: "['*']"
    examples:
    - value:
        price: €15 per person
