id: https://nde.nl/ontology/hc/class/EntityType
name: EntityType
title: Entity Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_label
classes:
  EntityType:
    class_uri: hc:EntityType
    description: >-
      Controlled classification used to indicate the conceptual kind of a modeled
      thing.
    alt_descriptions:
      nl: Gecontroleerde classificatie die het conceptuele soort van een gemodelleerd object aangeeft.
      de: Kontrollierte Klassifikation zur Angabe der konzeptuellen Art eines modellierten Gegenstands.
      fr: Classification controlee indiquant la categorie conceptuelle d'un element modele.
      es: Clasificacion controlada que indica la clase conceptual de un elemento modelado.
      ar: تصنيف مضبوط يحدد النوع المفاهيمي للعنصر الممثَّل.
      id: Klasifikasi terkendali untuk menunjukkan jenis konseptual dari entitas yang dimodelkan.
      zh: 用于标示建模对象概念类别的受控分类。
    structured_aliases:
      - literal_form: entiteitstype
        in_language: nl
      - literal_form: Entitaetstyp
        in_language: de
      - literal_form: type d'entite
        in_language: fr
      - literal_form: tipo de entidad
        in_language: es
      - literal_form: نوع الكيان
        in_language: ar
      - literal_form: tipe entitas
        in_language: id
      - literal_form: 实体类型
        in_language: zh
    slots:
      - has_label
      - identified_by
    broad_mappings:
      - skos:Concept
    close_mappings:
      - schema:DefinedTerm
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.2"
      specificity_rationale: Generic classification concept reused across modules.
