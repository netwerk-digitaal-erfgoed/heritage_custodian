id: https://nde.nl/ontology/hc/class/MailingListArchiveRecordSetTypes
name: MailingListArchiveRecordSetTypes
title: Mailing List Archive Record Set Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./MailingListArchiveRecordSetType
  - linkml:types
  - ../slots/has_type
  - ../slots/has_score
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  EmailArchiveCollection:
    is_a: MailingListArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-level aggregation of electronic mail list messages and
      threaded discussion archives.
    alt_descriptions:
      nl: >-
        Aggregatie op collectieniveau van elektronische maillijstberichten en
        gearchiveerde discussiedraden.
      de: >-
        Aggregation auf Sammlungsebene von E-Mail-Listen-Nachrichten und archivierten Diskussionsfäden.
      fr: >-
        Agrégation au niveau de la collection de messages de listes de diffusion et
        d'archives de discussions thématiques.
      es: >-
        Agregación a nivel de colección de mensajes de listas de correo y archivos de hilos de discusión.
      ar: >-
        تجميع على مستوى المجموعة لرسائل القوائم البريدية وأرشيفات سلاسل المحادثة.
      id: >-
        Agregasi tingkat koleksi pesan milis dan arsip utas diskusi.
      zh: >-
        邮件列表消息和线程讨论档案的集合级聚合。
    structured_aliases:
      - {literal_form: e-maillijstarchiefcollectie, predicate: EXACT_SYNONYM, in_language: nl}
      - {literal_form: E-Mail-Listen-Archivsammlung, predicate: EXACT_SYNONYM, in_language: de}
      - {literal_form: collection d archives de listes de diffusion, predicate: EXACT_SYNONYM, in_language: fr}
      - {literal_form: colección de archivos de listas de correo, predicate: EXACT_SYNONYM, in_language: es}
      - {literal_form: مجموعة أرشيف القوائم البريدية, predicate: EXACT_SYNONYM, in_language: ar}
      - {literal_form: koleksi arsip milis, predicate: EXACT_SYNONYM, in_language: id}
      - {literal_form: 邮件列表档案集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
    keywords:
      - email archives
      - mailing lists
      - threaded discussions
      - digital communication
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
  DiscussionForumFonds:
    is_a: MailingListArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A fonds consisting of records accumulated by an ongoing discussion community, typically preserved as a coherent body of communication.
    alt_descriptions:
      nl: >-
        Een fonds met archiefbescheiden die door een doorlopende discussiegemeenschap zijn opgebouwd en doorgaans als samenhangend communicatiebestand worden bewaard.
      de: >-
        Ein Fonds mit Unterlagen, die von einer fortlaufenden Diskussionsgemeinschaft angesammelt und typischerweise als zusammenhaengender Kommunikationsbestand bewahrt wurden.
      fr: >-
        Un fonds de documents accumules par une communaute de discussion durable, generalement conserve comme un ensemble coherent de communication.
      es: >-
        Un fondo de documentos acumulados por una comunidad de debate sostenida, normalmente conservado como un cuerpo coherente de comunicacion.
      ar: >-
        صندوق من السجلات التي جمعتها جماعة نقاش مستمرة ويُحفظ عادة كجسم متماسك من الاتصالات.
      id: >-
        Sebuah fonds catatan yang terakumulasi oleh komunitas diskusi berkelanjutan, biasanya dipelihara sebagai kumpulan komunikasi yang koheren.
      zh: >-
        由持续性的讨论社群积累并通常作为连贯通信整体保存的记录全宗。
    structured_aliases:
      - {literal_form: discussieforumfonds, predicate: EXACT_SYNONYM, in_language: nl}
      - {literal_form: Diskussionsforen-Fonds, predicate: EXACT_SYNONYM, in_language: de}
      - {literal_form: fonds de forum de discussion, predicate: EXACT_SYNONYM, in_language: fr}
      - {literal_form: fondo de foro de discusión, predicate: EXACT_SYNONYM, in_language: es}
      - {literal_form: فوندس منتدى نقاش, predicate: EXACT_SYNONYM, in_language: ar}
      - {literal_form: fonds forum diskusi, predicate: EXACT_SYNONYM, in_language: id}
      - {literal_form: 讨论论坛全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
    keywords:
      - discussion forum
      - online community
      - threaded conversations
      - digital discourse
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
