id: https://nde.nl/ontology/hc/classes/YoutubeComment
name: YoutubeComment
title: YoutubeComment
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  sioc: http://rdfs.org/sioc/ns#
imports:
- linkml:types
- ../slots/has_quantity
classes:
  YoutubeComment:
    description: >-
      User-authored response text with engagement counts and timestamps for
      discourse analysis.
    alt_descriptions:
      nl: YouTube-videoreactie inclusief reactie-ID, auteurinformatie, tekstinhoud, aantal vind-ik-leuks en tijdstempels voor analyse van door gebruikers gegenereerde inhoud.
      de: YouTube-Video-Kommentar einschließlich Kommentar-ID, Autoreninformationen, Textinhalt, Like-Anzahl und Zeitstempel für die Analyse von benutzergenerierten Inhalten.
      fr: Commentaire de vidéo YouTube incluant l'ID de commentaire, les informations sur l'auteur, le contenu textuel, le nombre de j'aime et les horodatages pour l'analyse de contenu généré par l'utilisateur.
      es: Comentario de video de YouTube incluyendo ID de comentario, información del autor, contenido de texto, conteo de me gusta y marcas de tiempo para análisis de contenido generado por el usuario.
      ar: تعليق فيديو YouTube بما في ذلك معرف التعليق ومعلومات المؤلف ومحتوى النص وعدد الإعجابات والطوابع الزمنية لتحليل المحتوى الذي أنشأه المستخدم.
      id: Komentar video YouTube termasuk ID komentar, informasi penulis, konten teks, jumlah suka, dan timestamp untuk analisis konten yang dibuat pengguna.
      zh: YouTube视频评论，包括评论ID、作者信息、文本内容、点赞数和时间戳， 用于用户生成内容分析。
    class_uri: schema:Comment
    broad_mappings:
    - schema:Comment
    - sioc:Post
    related_mappings:
    - prov:Entity
    - schema:UserComments
    slots:
    - has_quantity
    structured_aliases:
    - literal_form: YouTube-reactie
      in_language: nl
    - literal_form: YouTube-Kommentar
      in_language: de
    - literal_form: commentaire YouTube
      in_language: fr
    - literal_form: comentario de YouTube
      in_language: es
    - literal_form: تعليق يوتيوب
      in_language: ar
    - literal_form: komentar YouTube
      in_language: id
    - literal_form: YouTube评论
      in_language: zh
    comments:
    - User-generated comment content on YouTube videos
    - Part of online community discourse
    keywords:
    - YouTube comment
    - user-generated content
    - social media
    - online discourse
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
