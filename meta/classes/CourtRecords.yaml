classes:
  CourtRecords:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Institution responsible for preserving and providing access to judicial proceedings, legal decisions, and tribunal documentation.
    alt_descriptions:
      nl: >-
        Instelling die verantwoordelijk is voor het bewaren en toegankelijk maken van gerechtelijke procedures, juridische beslissingen en tribunaaldocumentatie.
      de: >-
        Einrichtung, die für die Erhaltung und Bereitstellung von Gerichtsverfahren, Rechtsentscheidungen und Tribunalunterlagen zuständig ist.
      fr: >-
        Institution responsable de la préservation et de l'accès aux procédures judiciaires, décisions juridiques et documents de tribunal.
      es: >-
        Institución responsable de preservar y proporcionar acceso a procedimientos judiciales, decisiones legales y documentación de tribunales.
      ar: >-
        المؤسسة المسؤولة عن الحفاظ على الإجراءات القضائية والقرارات القانونية ووثائق المحاكم وتوفير الوصول إليها.
      id: >-
        Lembaga yang bertanggung jawab untuk melestarikan dan menyediakan akses ke prosedur pengadilan, keputusan hukum, dan dokumentasi pengadilan.
      zh: >-
        负责保存和提供司法程序、法律裁决和法庭文件访问的机构。
