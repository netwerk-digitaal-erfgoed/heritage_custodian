id: https://nde.nl/ontology/hc/class/FacilityTypes
name: FacilityTypes
title: Facility Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./FacilityType
  - linkml:types
classes:
  FoodServiceFacility:
    is_a: FacilityType
    description: >-
      On-site establishment providing food and beverage services to visitors and staff.
    alt_descriptions:
      nl: >-
        Ter plaatse gevestigde voorziening die eet- en drinkdiensten biedt aan bezoekers en personeel.
      de: >-
        Vor-Ort-Einrichtung, die Besuchern und Personal Verpflegungsleistungen anbietet.
      fr: >-
        Établissement sur site offrant des services de restauration aux visiteurs et au personnel.
      es: >-
        Establecimiento in situ que proporciona servicios de alimentos y bebidas a visitantes y personal.
      ar: >-
        منشأة في الموقع توفر خدمات الطعام والشراب للزوار والموظفين.
      id: >-
        Fasilitas di lokasi yang menyediakan layanan makanan dan minuman untuk pengunjung dan staf.
      zh: >-
        向访客和员工提供餐饮服务的现场设施。
    structured_aliases:
      - literal_form: HorecaVoorziening
        in_language: nl
      - literal_form: Gastronomieeinrichtung
        in_language: de
      - literal_form: ServiceDeRestauration
        in_language: fr
      - literal_form: ServicioDeComida
        in_language: es
      - literal_form: خدمة الطعام
        in_language: ar
      - literal_form: FasilitasMakanan
        in_language: id
      - literal_form: 餐饮设施
        in_language: zh
    keywords:
      - food service
      - catering
      - restaurant
      - cafe
      - dining
      - hospitality
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  RetailFacility:
    is_a: FacilityType
    description: >-
      On-site commercial space offering merchandise, publications, or souvenirs for purchase.
    alt_descriptions:
      nl: >-
        Ter plaatse commerciële ruimte die merchandise, publicaties of souvenirs te koop aanbiedt.
      de: >-
        Vor-Ort-Verkaufsfläche, die Merchandise, Publikationen oder Souvenirs zum Kauf anbietet.
      fr: >-
        Espace commercial sur site proposant des produits dérivés, publications ou souvenirs à l'achat.
      es: >-
        Espacio comercial in situ que ofrece mercancía, publicaciones o recuerdos para la venta.
      ar: >-
        مساحة تجارية في الموقع تقدم بضائع أو منشورات أو تذكارات للبيع.
      id: >-
        Ruang komersial di lokasi yang menawarkan merchandise, publikasi, atau cenderamata untuk dibeli.
      zh: >-
        提供商品、出版物或纪念品购买的现场商业空间。
    structured_aliases:
      - literal_form: DetailhandelVoorziening
        in_language: nl
      - literal_form: Einzelhandelseinrichtung
        in_language: de
      - literal_form: ServiceDeVente
        in_language: fr
      - literal_form: Tienda
        in_language: es
      - literal_form: متجر
        in_language: ar
      - literal_form: FasilitasEceran
        in_language: id
      - literal_form: 零售设施
        in_language: zh
    keywords:
      - retail
      - shop
      - store
      - gift shop
      - merchandise
      - sales
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  ParkingFacility:
    is_a: FacilityType
    description: >-
      Designated area for vehicle or bicycle storage available to visitors and staff.
    alt_descriptions:
      nl: >-
        Aangewezen gebied voor voertuig- of fietsopslag beschikbaar voor bezoekers en personeel.
      de: >-
        Ausgewiesener Bereich für Fahrzeug- oder Fahrradabstellung für Besucher und Personal.
      fr: >-
        Zone désignée pour le stationnement de véhicules ou vélos disponible pour les visiteurs et le personnel.
      es: >-
        Área designada para estacionamiento de vehículos o bicicletas disponible para visitantes y personal.
      ar: >-
        منطقة مخصصة لوقوف السيارات أو الدراجات متاحة للزوار والموظفين.
      id: >-
        Area yang ditunjuk untuk penyimpanan kendaraan atau sepeda yang tersedia untuk pengunjung dan staf.
      zh: >-
        供访客和员工使用的指定车辆或自行车停放区域。
    structured_aliases:
      - literal_form: Parkeervoorziening
        in_language: nl
      - literal_form: Parkeinrichtung
        in_language: de
      - literal_form: Stationnement
        in_language: fr
      - literal_form: Estacionamiento
        in_language: es
      - literal_form: موقف سيارات
        in_language: ar
      - literal_form: FasilitasParkir
        in_language: id
      - literal_form: 停车设施
        in_language: zh
    keywords:
      - parking
      - vehicle storage
      - bicycle parking
      - car park
      - garage
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  ResearchFacility:
    is_a: FacilityType
    description: >-
      Dedicated space providing scholarly resources and study conditions for researchers.
    alt_descriptions:
      nl: >-
        Toegewijde ruimte die wetenschappelijke bronnen en studieomstandigheden biedt voor onderzoekers.
      de: >-
        Dedizierter Raum, der wissenschaftliche Ressourcen und Studienbedingungen für Forscher bietet.
      fr: >-
        Espace dédié offrant des ressources savantes et des conditions d'étude aux chercheurs.
      es: >-
        Espacio dedicado que proporciona recursos académicos y condiciones de estudio para investigadores.
      ar: >-
        مساحة مخصصة توفر موارد علمية وظروف دراسة للباحثين.
      id: >-
        Ruang khusus yang menyediakan sumber daya ilmiah dan kondisi belajar untuk peneliti.
      zh: >-
        为研究人员提供学术资源和学习条件的专用空间。
    structured_aliases:
      - literal_form: Onderzoeksvoorziening
        in_language: nl
      - literal_form: Forschungseinrichtung
        in_language: de
      - literal_form: SalleDeRecherche
        in_language: fr
      - literal_form: SalaDeInvestigación
        in_language: es
      - literal_form: قاعة البحث
        in_language: ar
      - literal_form: FasilitasPenelitian
        in_language: id
      - literal_form: 研究设施
        in_language: zh
    keywords:
      - research
      - study space
      - scholarly resources
      - reading room
      - academic
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  StorageFacility:
    is_a: FacilityType
    description: >-
      Secure environment designed for preserving collections, materials, or institutional equipment.
    alt_descriptions:
      nl: >-
        Beveiligde omgeving ontworpen voor het bewaren van collecties, materialen of institutionele apparatuur.
      de: >-
        Sichere Umgebung zur Bewahrung von Sammlungen, Materialien oder institutioneller Ausstattung.
      fr: >-
        Environnement sécurisé conçu pour préserver les collections, matériaux ou équipements institutionnels.
      es: >-
        Entorno seguro diseñado para preservar colecciones, materiales o equipos institucionales.
      ar: >-
        بيئة آمنة مصممة للحفاظ على المجموعات أو المواد أو المعدات المؤسسية.
      id: >-
        Lingkungan aman yang dirancang untuk melestarikan koleksi, bahan, atau peralatan kelembagaan.
      zh: >-
        专为保存藏品、材料或机构设备而设计的安全环境。
    structured_aliases:
      - literal_form: Opslagvoorziening
        in_language: nl
      - literal_form: Lagereinrichtung
        in_language: de
      - literal_form: Stockage
        in_language: fr
      - literal_form: Almacén
        in_language: es
      - literal_form: تخزين
        in_language: ar
      - literal_form: FasilitasPenyimpanan
        in_language: id
      - literal_form: 存储设施
        in_language: zh
    keywords:
      - storage
      - repository
      - archive storage
      - collection storage
      - preservation
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  AccessibilityFacility:
    is_a: FacilityType
    description: >-
      Infrastructure or service supporting inclusive access for visitors with diverse abilities.
    alt_descriptions:
      nl: >-
        Infrastructuur of dienst die inclusieve toegang ondersteunt voor bezoekers met diverse mogelijkheden.
      de: >-
        Infrastruktur oder Dienstleistung, die inklusiven Zugang für Besucher mit unterschiedlichen Fähigkeiten unterstützt.
      fr: >-
        Infrastructure ou service soutenant l'accès inclusif pour les visiteurs ayant des capacités diverses.
      es: >-
        Infraestructura o servicio que apoya el acceso inclusivo para visitantes con diversas capacidades.
      ar: >-
        بنية تحتية أو خدمة تدعم الوصول الشامل للزوار ذوي القدرات المتنوعة.
      id: >-
        Infrastruktur atau layanan yang mendukung akses inklusif untuk pengunjung dengan kemampuan beragam.
      zh: >-
        支持不同能力访客包容性访问的基础设施或服务。
    structured_aliases:
      - literal_form: Toegankelijkheidsvoorziening
        in_language: nl
      - literal_form: Barrierefreiheitseinrichtung
        in_language: de
      - literal_form: Accessibilité
        in_language: fr
      - literal_form: Accesibilidad
        in_language: es
      - literal_form: إمكانية الوصول
        in_language: ar
      - literal_form: FasilitasAksesibilitas
        in_language: id
      - literal_form: 无障碍设施
        in_language: zh
    keywords:
      - accessibility
      - disability access
      - inclusive design
      - wheelchair access
      - barrier-free
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  RestroomFacility:
    is_a: FacilityType
    description: >-
      Sanitary facilities providing restroom access for visitors and institutional personnel.
    alt_descriptions:
      nl: >-
        Sanitaire voorzieningen die toilettoegang bieden voor bezoekers en institutioneel personeel.
      de: >-
        Sanitäre Einrichtungen, die Toilettenzugang für Besucher und Personal bieten.
      fr: >-
        Installations sanitaires offrant un accès aux toilettes pour les visiteurs et le personnel.
      es: >-
        Instalaciones sanitarias que proporcionan acceso a baños para visitantes y personal institucional.
      ar: >-
        مرافق صحية توفر الوصول إلى دورات المياه للزوار والموظفين المؤسسيين.
      id: >-
        Fasilitas sanitasi yang menyediakan akses toilet untuk pengunjung dan personel kelembagaan.
      zh: >-
        为访客和机构人员提供洗手间访问的卫生设施。
    structured_aliases:
      - literal_form: Sanitair
        in_language: nl
      - literal_form: Sanitäranlagen
        in_language: de
      - literal_form: Toilettes
        in_language: fr
      - literal_form: Baños
        in_language: es
      - literal_form: دورات المياه
        in_language: ar
      - literal_form: Toilet
        in_language: id
      - literal_form: 洗手间
        in_language: zh
    keywords:
      - restroom
      - toilet
      - bathroom
      - sanitary facilities
      - washroom
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
  EventFacility:
    is_a: FacilityType
    description: >-
      Multi-purpose space designed for lectures, gatherings, public programs, or institutional events.
    alt_descriptions:
      nl: >-
        Multifunctionele ruimte ontworpen voor lezingen, bijeenkomsten, openbare programma's of institutionele evenementen.
      de: >-
        Multifunktionaler Raum für Vorträge, Versammlungen, öffentliche Programme oder institutionelle Veranstaltungen.
      fr: >-
        Espace polyvalent conçu pour les conférences, rassemblements, programmes publics ou événements institutionnels.
      es: >-
        Espacio polivalente diseñado para conferencias, reuniones, programas públicos o eventos institucionales.
      ar: >-
        مساحة متعددة الأغراض مصممة للمحاضرات أو التجمعات أو البرامج العامة أو الأحداث المؤسسية.
      id: >-
        Ruang serbaguna yang dirancang untuk ceramah, pertemuan, program publik, atau acara kelembagaan.
      zh: >-
        专为讲座、聚会、公共项目或机构活动设计的多功能空间。
    structured_aliases:
      - literal_form: Evenementenruimte
        in_language: nl
      - literal_form: Veranstaltungseinrichtung
        in_language: de
      - literal_form: SalleDÉvénements
        in_language: fr
      - literal_form: SalaDeEventos
        in_language: es
      - literal_form: قاعة الفعاليات
        in_language: ar
      - literal_form: FasilitasAcara
        in_language: id
      - literal_form: 活动设施
        in_language: zh
    keywords:
      - event space
      - venue
      - auditorium
      - meeting room
      - conference
      - lecture hall
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - schema:Place
      - crm:E53_Place
