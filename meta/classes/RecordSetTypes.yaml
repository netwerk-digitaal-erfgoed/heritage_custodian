id: https://nde.nl/ontology/hc/class/RecordSetTypes
name: RecordSetTypes
title: Record Set Type Subclasses
description: Concrete subclasses of RecordSetType representing specific levels of archival arrangement. Based on ISAD(G) and RiC-O levels.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
- ./RecordSetType
- linkml:types
default_prefix: hc
classes:
  Fonds:
    is_a: RecordSetType
    class_uri: rico:Fonds
    description: >-
      Entire body of records created, accumulated, and maintained by a single
      agent during the course of its activities.
    alt_descriptions:
      nl: >-
        Gehele corpus van archiefbescheiden gecreëerd, geaccumuleerd en beheerd door een enkele
        agent in de loop van zijn activiteiten.
      de: >-
        Gesamtheit der von einem einzigen Akteur im Laufe seiner Tätigkeiten erstellten,
        angesammelten und verwalteten Unterlagen.
      fr: >-
        Ensemble des documents créés, accumulés et gérés par un seul agent
        au cours de ses activités.
      es: >-
        Conjunto completo de documentos creados, acumulados y mantenidos por un solo
        agente durante el curso de sus actividades.
      ar: >-
        مجموعة كاملة من السجلات التي أنشأها وكيل واحد وجمعها وحافظ عليها
        خلال ممارسة أنشطته.
      id: >-
        Keseluruhan catatan yang dibuat, diakumulasikan, dan dikelola oleh satu agen
        selama kegiatannya.
      zh: >-
        由单个代理在其活动过程中创建、积累和维护的全部记录。
    structured_aliases:
    - literal_form: archiefblok
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Bestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة الأرشيف
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    comments:
    - Highest level in archival arrangement hierarchy.
    - Represents the complete records of an individual, family, or organization.
    - 'Preserved from prior description: The whole of the records created and/or accumulated and used by a single agent.'
    keywords:
    - archival fonds
    - record group
    - highest arrangement level
    - agent records
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  Series:
    is_a: RecordSetType
    class_uri: rico:Series
    description: >-
      Documents arranged according to a filing system or maintained as a unit
      due to their functional relationship.
    alt_descriptions:
      nl: >-
        Documenten gerangschikt volgens een ordensysteem of als eenheid bewaard
        vanwege hun functionele samenhang.
      de: >-
        Dokumente, die nach einem Ordnungssystem geordnet oder aufgrund ihrer
        funktionalen Beziehung als Einheit aufbewahrt werden.
      fr: >-
        Documents organisés selon un système de classement ou maintenus comme unité
        en raison de leur relation fonctionnelle.
      es: >-
        Documentos organizados según un sistema de archivo o mantenidos como unidad
        debido a su relación funcional.
      ar: >-
        وثائق مرتبة وفق نظام ملفات أو محتفظ بها كوحدة
        بسبب علاقتها الوظيفية.
      id: >-
        Dokumen yang disusun menurut sistem filing atau dipertahankan sebagai unit
        karena hubungan fungsionalnya.
      zh: >-
        按照归档系统排列或因其功能关系而作为一个单元维护的文件。
    structured_aliases:
    - literal_form: reeks
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Serie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: série
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة أرشيفية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    comments:
    - Mid-level arrangement grouping related documents.
    - Often organized by function, subject, or chronological period.
    - 'Preserved from prior description: Documents arranged in accordance with a filing system or maintained as a unit.'
    keywords:
    - archival series
    - document grouping
    - mid-level arrangement
    - functional filing
  File:
    is_a: RecordSetType
    class_uri: rico:File
    description: >-
      Organized unit of documents grouped together for current operational use
      or systematic archival arrangement.
    alt_descriptions:
      nl: >-
        Georganiseerde eenheid van documenten samengebracht voor actueel operationeel gebruik
        of systematische archivering.
      de: >-
        Organisierte Einheit von Dokumenten, die für den aktuellen Betrieb
        oder zur systematischen Archivierung zusammengefasst sind.
      fr: >-
        Unité organisée de documents regroupés pour un usage opérationnel actuel
        ou un arrangement archivistique systématique.
      es: >-
        Unidad organizada de documentos agrupados para uso operativo actual
        o disposición archivística sistemática.
      ar: >-
        وحدة منظمة من الوثائق مجمعة للاستخدام العملي الحالي
        أو الترتيب الأرشيفي المنهجي.
      id: >-
        Unit terorganisir dari dokumen yang dikelompokkan untuk penggunaan operasional saat ini
        atau pengaturan arsip sistematis.
      zh: >-
        为当前业务使用或系统档案整理而分组的文件的有组织单元。
    structured_aliases:
    - literal_form: dossier
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Akte
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: dossier
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: expediente
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ملف
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: berkas
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 案卷
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    comments:
    - Lower-level grouping within a series.
    - Often corresponds to a physical folder or logical grouping.
    - 'Preserved from prior description: An organized unit of documents grouped together for current use or archival arrangement.'
    keywords:
    - archival file
    - document folder
    - lower-level arrangement
    - operational grouping
  RecordItem:
    is_a: RecordSetType
    class_uri: rico:Record
    description: >-
      Smallest intellectually indivisible documentary unit within archival
      arrangement, representing a single discrete record.
    alt_descriptions:
      nl: >-
        Kleinste intellectueel ondeelbare documentaire eenheid binnen archivering,
        die een enkel afzonderlijk record vertegenwoordigt.
      de: >-
        Kleinste intellektuell unteilbare Dokumenteneinheit innerhalb der Archivordnung,
        die einen einzelnen eigenständigen Datensatz darstellt.
      fr: >-
        Plus petite unité documentaire intellectuellement indivisible dans l'arrangement
        archivistique, représentant un document unique et distinct.
      es: >-
        Unidad documental más pequeña intelectualmente indivisible dentro del
        arreglo archivístico, que representa un solo registro discreto.
      ar: >-
        أصغر وحدة وثائقية غير قابلة للتجزئة فكرياً ضمن الترتيب الأرشيفي،
        تمثل سجلاً منفرداً ومتميزاً.
      id: >-
        Unit dokumenter terkecil yang secara intelektual tidak dapat dibagi dalam pengaturan arsip,
        mewakili catatan tunggal yang terpisah.
      zh: >-
        档案整理中在智力上不可分割的最小文献单元，代表单个离散记录。
    structured_aliases:
    - literal_form: archiefstuk
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Archivale
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: pièce d'archives
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: pieza de archivo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: وثيقة أرشيفية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: item arsip
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 档案件
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    comments:
    - Lowest level in archival arrangement hierarchy.
    - Represents a single document, letter, photograph, or other discrete item.
    - 'Preserved from prior description: The smallest intellectually indivisible unit of archival material.'
    keywords:
    - record item
    - individual document
    - lowest arrangement level
    - discrete record
