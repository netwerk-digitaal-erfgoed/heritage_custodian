id: https://w3id.org/nde/ontology/ScientificArchive
name: ScientificArchive
title: Scientific Archive
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
- ../classes/AgentType
- linkml:types
- ../slots/identified_by
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  ScientificArchive:
    description: >-
      Institution preserving research data, experimental protocols, laboratory records,
      and scholarly correspondence from academic and scientific endeavors.
    alt_descriptions:
      nl: >-
        Instelling die onderzoeksgegevens, experimentele protocollen, laboratoriumverslagen
        en wetenschappelijke correspondentie uit academische en wetenschappelijke ondernemingen bewaart.
      de: >-
        Institution, die Forschungsdaten, experimentelle Protokolle, Laboraufzeichnungen
        und wissenschaftliche Korrespondenz aus akademischen und wissenschaftlichen Unternehmungen bewahrt.
      fr: >-
        Institution préservant les données de recherche, protocoles expérimentaux, relevés
        de laboratoire et correspondance savante issus d'entreprises académiques et scientifiques.
      es: >-
        Institución que preserva datos de investigación, protocolos experimentales, registros
        de laboratorio y correspondencia académica de empresas académicas y científicas.
      ar: >-
        مؤسسة تحافظ على بيانات البحث والبروتوكولات التجريبية وسجلات المختبر والمراسلات العلمية من المساعي الأكاديمية والعلمية.
      id: >-
        Institusi yang melestarikan data penelitian, protokol eksperimental, catatan laboratorium,
        dan korespondensi ilmiah dari usaha akademik dan ilmiah.
      zh: >-
        保存来自学术和科学事业的研究数据、实验协议、实验室记录和学术通信的机构。
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - wd:Q27032095
    broad_mappings:
    - wd:Q166118
    - skos:Concept
    slot_usage:
      identified_by:
    annotations:
      skos:prefLabel: Scientific Archive
      skos:altLabel: Forschungsarchiv, archives scientifiques, Research Archive
      subject_domain: science/research
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - AcademicArchive
    - ResearchCenter
    - InstitutionalRepository
    comments:
    - Forschungsarchiv (de)
    - archives scientifiques (fr)
    - Preserves scientific research materials (data, lab notebooks, correspondence, project documentation).
    - Supports history of science research and, where applicable, reproducibility/traceability.
    - May include long-term research data archives.
    - 'Preserved from prior description: Archive organization that collects and preserves records of scientific research.'
