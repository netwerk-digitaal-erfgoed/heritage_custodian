id: https://nde.nl/ontology/hc/classes/GooglePhoto
name: GooglePhoto
title: Google Photo Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - linkml:types
classes:
  GooglePhoto:
    class_uri: schema:ImageObject
    description: >-
      Image metadata record harvested from Google Places API for location
      enrichment and visual documentation workflows.
    alt_descriptions:
      nl: >-
        Afbeeldingsmetadatarecord verzameld via Google Places API voor locatieverrijking
        en visuele documentatieworkflows.
      de: >-
        Bild-Metadaten-Datensatz, der über die Google Places API für Standortanreicherung
        und visuelle Dokumentations-Workflows abgerufen wurde.
      fr: >-
        Enregistrement de métadonnées d'image récolté via l'API Google Places pour l'enrichissement
        de localisation et les flux de documentation visuelle.
      es: >-
        Registro de metadatos de imagen obtenido de la API de Google Places para enriquecimiento
        de ubicación y flujos de documentación visual.
      ar: >-
        سجل بيانات وصفية للصور تم جمعه من واجهة برمجة تطبيقات أماكن Google لإثراء الموقع وسير عمل التوثيق المرئي.
      id: >-
        Rekaman metadata gambar yang diambil dari API Google Places untuk pengayaan lokasi
        dan alur kerja dokumentasi visual.
      zh: >-
        从Google Places API获取的图像元数据记录，用于位置丰富和视觉文档工作流。
