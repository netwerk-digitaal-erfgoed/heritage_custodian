    notes:
    - |
      Preserved from prior description (commit 37852a46):

      "Abstract base class for scope type classifications in the heritage domain.\n\n**DEFINITION**:\n\nScopeType represents CATEGORIES of scope/coverage dimensions, not individual\nscope instances. Each subclass defines characteristics of a scope category\n(temporal, spatial, subject, material, etc.).\n\n**CRITICAL: TYPE vs INSTANCE**\n\n| Aspect | ScopeType (This Class) | Scope (Instance Class) |\n|--------|------------------------|------------------------|\n| **Nature** | Classification/category | Individual scope |\n| **Examples** | TEMPORAL, SPATIAL, SUBJECT | \"1600-1700 Dutch painting\" |\n| **Properties** | Category metadata | Actual coverage values |\n| **Cardinality** | ~5-10 types | Thousands of instances |\n\n**SCOPE DIMENSIONS**:\n\n1. **TEMPORAL**: Time-based coverage\n   - Century, Decade, Date Range, Era, Period\n   - Historical Period, Epoch\n   \n2. **SPATIAL**: Geographic coverage\n   - Country, Region, City, Continent\n   - Administrative Division, Geographic\
    annotations:
      specificity_score: '0.35'
      specificity_rationale: Moderately low specificity - scope types are generic classification concepts.
      has_score:
      custodian_types: "['*']"
    comments:
    - Abstract base class - use specific subclasses (TemporalScope, SpatialScope, etc.)
    - Represents SCOPE TYPES, not scope instances
    - Scope.has_type references these type classes
    - Follows Type/Types naming convention (Rule 0b)
    - 'Organized by dimension: temporal, spatial, subject, material'
    - |
      ScopeType represents categories of scope/coverage dimensions, not individual scope instances.

      TYPE vs INSTANCE (informal):
      - ScopeType examples: TEMPORAL, SPATIAL, SUBJECT
      - Scope examples: "1600-1700", "Amsterdam", "Dutch Golden Age painting"

      Common dimensions: temporal, spatial, subject, material, linguistic, institutional.
    - 'Preserved from prior description: Controlled vocabulary concept describing a dimension of scope/coverage.'
    see_also:
    - https://www.dublincore.org/specifications/dublin-core/dcmi-terms/#section-7
    - https://www.w3.org/2004/02/skos/
    examples:
    - value:
        identified_by:
        - https://nde.nl/ontology/hc/scope-type/temporal
        has_label:
        - Temporal@en
        - temporeel@nl
        has_description: Time-based scope dimension
