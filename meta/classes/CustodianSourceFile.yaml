classes:
  CustodianSourceFile:
    class_uri: prov:Entity
    tree_root: true
    description: >-
      Root record bundle aggregating a complete heritage custodian source document with enrichment and provenance metadata.
    alt_descriptions:
      nl: >-
        Hoofdrecordbundel die een compleet erfgoedbeheerder-brondocument samenvoegt met verrijkings- en herkomstmetadata.
      de: >-
        Wurzel-Datensatzbündel, das ein vollständiges Kulturgutverwalter-Quelldokument mit Anreicherungs- und Herkunftsmetadaten aggregiert.
      fr: >-
        Ensemble d'enregistrements racine agrégeant un document source complet de dépositaire du patrimoine avec des métadonnées d'enrichissement et de provenance.
      es: >-
        Paquete de registro raíz que agrega un documento fuente completo de custodio patrimonial con metadatos de enriquecimiento y procedencia.
      ar: >-
        حزمة سجل جذر تجمع مستند مصدر وصي التراث الكامل مع بيانات الإثراء والمنشأ الوصفية.
      id: >-
        Bundel catatan akar yang mengagregasi dokumen sumber pengelola warisan lengkap dengan metadata pengayaan dan asal-usul.
      zh: >-
        汇集完整遗产托管人来源文件及丰富和来源元数据的根记录包。
