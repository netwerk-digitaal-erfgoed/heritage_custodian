id: https://nde.nl/ontology/hc/class/ForkliftAccess
name: ForkliftAccess
title: ForkliftAccess
description: Provision for forklift access in a facility.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
classes:
  ForkliftAccess:
    class_uri: schema:LocationFeatureSpecification
    description: >-
      Facility access feature indicating whether spaces permit forklift entry
      for logistics, handling, or collection movement.
    alt_descriptions:
      nl: Toegangskenmerk van een faciliteit dat aangeeft of ruimten heftrucktoegang bieden voor logistiek en collectieverplaatsing.
      de: Zugangsmerkmal einer Einrichtung das angibt ob Bereiche Staplerzufahrt fuer Logistik und Objektbewegung erlauben.
      fr: Caracteristique d acces indiquant si des espaces autorisent l entree de chariots elevateurs pour la logistique et les deplacements de collection.
      es: Caracteristica de acceso que indica si los espacios permiten ingreso de montacargas para logistica y movimiento de colecciones.
      ar: سمة وصول للمرفق توضح ما إذا كانت المساحات تسمح بدخول الرافعات الشوكية لأعمال اللوجستيات ونقل المقتنيات.
      id: Fitur akses fasilitas yang menunjukkan apakah ruang mengizinkan masuk forklift untuk logistik dan perpindahan koleksi.
      zh: 表示场地空间是否允许叉车进入以进行物流与藏品搬运的设施通行特征。
    structured_aliases:
    - {literal_form: heftrucktoegang, in_language: nl}
    - {literal_form: Staplerzugang, in_language: de}
    - {literal_form: acces chariot elevateur, in_language: fr}
    - {literal_form: acceso para montacargas, in_language: es}
    - {literal_form: وصول رافعة شوكية, in_language: ar}
    - {literal_form: akses forklift, in_language: id}
    - {literal_form: 叉车通行, in_language: zh}
    broad_mappings:
    - schema:LocationFeatureSpecification
    slots:
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
