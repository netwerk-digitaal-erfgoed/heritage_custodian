id: https://nde.nl/ontology/hc/class/TreatmentTypes
name: TreatmentTypes
title: Treatment Types - Concrete Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  aat: http://vocab.getty.edu/aat/
default_prefix: hc
imports:
  - ./TreatmentType
  - linkml:types
  - ../slots/has_code
classes:
  CleaningTreatment:
    is_a: TreatmentType
    class_uri: hc:CleaningTreatment
    description: >-
      Intervention focused on removing surface soiling, accretions, and residues.
    alt_descriptions:
      nl: Ingrijpende handeling gericht op het verwijderen van oppervlakkig vuil, afzettingen en resten.
      de: Eingriff zur Entfernung von Oberflaechenverschmutzung, Ablagerungen und Rueckstaenden.
      fr: Intervention visant a eliminer salissures de surface, depots et residus.
      es: Intervencion orientada a eliminar suciedad superficial, depositos y residuos.
      ar: إجراء يركز على إزالة الاتساخات السطحية والترسبات والبقايا.
      id: Intervensi berfokus pada penghilangan kotoran permukaan, endapan, dan residu.
      zh: 侧重去除表面污垢、附着物与残留物的处置。
    structured_aliases:
    - literal_form: oppervlaktereiniging
      in_language: nl
    - literal_form: Oberflaechenreinigungseingriff
      in_language: de
    - literal_form: intervention de depoussiérage
      in_language: fr
    - literal_form: intervencion de limpieza superficial
      in_language: es
    - literal_form: إزالة اتساخ سطحي
      in_language: ar
    - literal_form: tindakan pembersihan permukaan
      in_language: id
    - literal_form: 表面清洁处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: CLEANING
    annotations:
      specificity_score: '0.65'
      aat_id: '300053109'
      skos:prefLabel: Cleaning
      skos:altLabel: surface cleaning, reiniging, Reinigung
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - cleaning
    - surface cleaning
    - soiling removal
    - conservation treatment
    - dirt removal
  StabilizationTreatment:
    is_a: TreatmentType
    class_uri: hc:StabilizationTreatment
    description: >-
      Intervention focused on restoring structural integrity and slowing further
      material loss.
    alt_descriptions:
      nl: Ingrijpende handeling gericht op herstel van structurele samenhang en het remmen van verder materiaalverlies.
      de: Eingriff zur Wiederherstellung struktureller Integritaet und Verlangsamung weiteren Materialverlusts.
      fr: Intervention orientee vers la restauration de l integrite structurelle et le ralentissement des pertes materielles.
      es: Intervencion centrada en recuperar la integridad estructural y frenar la perdida material adicional.
      ar: إجراء يركز على استعادة السلامة البنيوية وإبطاء مزيد من فقدان المادة.
      id: Intervensi yang berfokus pada pemulihan integritas struktur dan perlambatan kehilangan material lanjutan.
      zh: 侧重恢复结构完整性并减缓进一步材料流失的处置。
    structured_aliases:
    - literal_form: structurele consolidatie
      in_language: nl
    - literal_form: strukturelle Festigung
      in_language: de
    - literal_form: intervention de consolidation
      in_language: fr
    - literal_form: intervencion de consolidacion
      in_language: es
    - literal_form: تدعيم بنيوي
      in_language: ar
    - literal_form: tindakan konsolidasi struktur
      in_language: id
    - literal_form: 结构加固处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: STABILIZATION
    annotations:
      specificity_score: '0.65'
      aat_id: '300053113'
      skos:prefLabel: Stabilization
      skos:altLabel: consolidation, stabilisatie, Konsolidierung
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - stabilization
    - consolidation
    - structural repair
    - material preservation
    - conservation treatment
  RestorationTreatment:
    is_a: TreatmentType
    class_uri: hc:RestorationTreatment
    description: >-
      Intervention focused on recovering legibility and visual coherence using
      reversible and documented methods.
    alt_descriptions:
      nl: Ingrijpende handeling gericht op herstel van leesbaarheid en visuele samenhang met omkeerbare, gedocumenteerde methoden.
      de: Eingriff zur Wiederherstellung von Lesbarkeit und visueller Koharenz mit reversiblen, dokumentierten Verfahren.
      fr: Intervention visant a retablir lisibilite et coherence visuelle avec des methodes reversibles et documentees.
      es: Intervencion orientada a recuperar legibilidad y coherencia visual mediante metodos reversibles y documentados.
      ar: إجراء يهدف إلى استعادة المقروئية والاتساق البصري بوسائل قابلة للعكس وموثقة.
      id: Intervensi untuk memulihkan keterbacaan dan koherensi visual dengan metode yang reversibel dan terdokumentasi.
      zh: 通过可逆且有记录的方法恢复可读性与视觉一致性的处置。
    structured_aliases:
    - literal_form: visuele herintegratie
      in_language: nl
    - literal_form: visuelle Rueckfuehrung
      in_language: de
    - literal_form: intervention de reintegration visuelle
      in_language: fr
    - literal_form: intervencion de reintegracion visual
      in_language: es
    - literal_form: إعادة دمج بصري
      in_language: ar
    - literal_form: tindakan reintegrasi visual
      in_language: id
    - literal_form: 视觉重整处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: RESTORATION
    annotations:
      specificity_score: '0.65'
      aat_id: '300053115'
      skos:prefLabel: Restoration
      skos:altLabel: retouching, inpainting, restauratie, Restaurierung
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - restoration
    - visual reintegration
    - retouching
    - inpainting
    - aesthetic recovery
  PreventiveTreatment:
    is_a: TreatmentType
    class_uri: hc:PreventiveTreatment
    description: >-
      Risk-reduction intervention plan based on environment control, handling
      rules, and protective housing.
    alt_descriptions:
      nl: Risicobeperkend interventieplan op basis van omgevingscontrole, hanteringsregels en beschermende verpakking.
      de: Risikomindernder Interventionsplan auf Basis von Umweltkontrolle, Handhabungsregeln und Schutzbehaeltnissen.
      fr: Plan d intervention de reduction des risques fonde sur controle environnemental, regles de manipulation et conditionnement protecteur.
      es: Plan de intervencion para reducir riesgos basado en control ambiental, normas de manipulacion y alojamiento protector.
      ar: خطة تدخل لتقليل المخاطر تعتمد على ضبط البيئة وقواعد المناولة والتغليف الوقائي.
      id: Rencana intervensi pengurangan risiko berbasis kendali lingkungan, aturan penanganan, dan kemasan pelindung.
      zh: 基于环境控制、操作规范与防护包装的风险降低处置方案。
    structured_aliases:
    - literal_form: preventieve maatregel
      in_language: nl
    - literal_form: praeventive Massnahme
      in_language: de
    - literal_form: intervention preventive
      in_language: fr
    - literal_form: intervencion preventiva
      in_language: es
    - literal_form: إجراء وقائي
      in_language: ar
    - literal_form: tindakan preventif
      in_language: id
    - literal_form: 预防性处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: PREVENTIVE
    annotations:
      specificity_score: '0.60'
      aat_id: '300227748'
      skos:prefLabel: Preventive Conservation
      skos:altLabel: "preventieve conservering, pr\xE4ventive Konservierung"
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - preventive conservation
    - risk reduction
    - environmental control
    - protective housing
    - handling protocol
  DeacidificationTreatment:
    is_a: TreatmentType
    class_uri: hc:DeacidificationTreatment
    description: >-
      Intervention that neutralizes acidic substrates and introduces alkaline
      reserve in paper-based carriers.
    alt_descriptions:
      nl: Ingrijpende handeling die zure dragers neutraliseert en alkalische reserve toevoegt in papiergebonden dragers.
      de: Eingriff zur Neutralisierung saurer Traeger und Einbringung alkalischer Reserve in papierbasierten Materialien.
      fr: Intervention neutralisant des supports acides et introduisant une reserve alcaline dans des supports papier.
      es: Intervencion que neutraliza soportes acidos e introduce reserva alcalina en portadores de papel.
      ar: إجراء يعادل الحموضة ويضيف احتياطيًا قلويًا في الحوامل الورقية.
      id: Intervensi yang menetralkan substrat asam dan menambahkan cadangan alkali pada media berbasis kertas.
      zh: 对酸性纸质载体进行中和并引入碱储备的处置。
    structured_aliases:
    - literal_form: ontzuring
      in_language: nl
    - literal_form: Entsaeuerungseingriff
      in_language: de
    - literal_form: intervention de desacidification
      in_language: fr
    - literal_form: intervencion de desacidificacion
      in_language: es
    - literal_form: إزالة الحموضة
      in_language: ar
    - literal_form: tindakan netralisasi asam
      in_language: id
    - literal_form: 去酸处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: DEACIDIFICATION
    annotations:
      specificity_score: '0.70'
      aat_id: '300053108'
      skos:prefLabel: Deacidification
      skos:altLabel: "ontzuring, Ents\xE4uerung, d\xE9sacidification"
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - deacidification
    - paper conservation
    - alkaline reserve
    - acid neutralization
    - ph stabilization
  ReliningTreatment:
    is_a: TreatmentType
    class_uri: hc:ReliningTreatment
    description: >-
      Intervention adding supportive backing to weakened canvas structures.
    alt_descriptions:
      nl: Ingrijpende handeling waarbij een ondersteunende ruglaag aan verzwakte doekstructuren wordt toegevoegd.
      de: Eingriff mit zusaetzlicher Rueckenstuetzung fuer geschwaechte Leinwandstrukturen.
      fr: Intervention ajoutant un support dorsal a des structures de toile fragilisees.
      es: Intervencion que agrega soporte posterior a estructuras de lienzo debilitadas.
      ar: إجراء يضيف دعامة خلفية لهياكل القماش الضعيفة.
      id: Intervensi yang menambah dukungan belakang pada struktur kanvas yang melemah.
      zh: 为脆弱画布结构增加背衬支撑的处置。
    structured_aliases:
    - literal_form: doekdoublering
      in_language: nl
    - literal_form: Leinwandunterstuetzung
      in_language: de
    - literal_form: intervention de doublage
      in_language: fr
    - literal_form: intervencion de refuerzo de lienzo
      in_language: es
    - literal_form: تدعيم خلفي للقماش
      in_language: ar
    - literal_form: tindakan pelapis belakang kanvas
      in_language: id
    - literal_form: 画布背衬加固
      in_language: zh
    slot_usage:
      has_code:
        equals_string: RELINING
    annotations:
      specificity_score: '0.75'
      aat_id: '300053112'
      skos:prefLabel: Relining
      skos:altLabel: canvas lining, doublering, Doublierung
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - relining
    - canvas backing
    - structural support
    - painting conservation
    - lining treatment
  ReframingTreatment:
    is_a: TreatmentType
    class_uri: hc:ReframingTreatment
    description: >-
      Intervention providing protective enclosure through frame, glazing,
      backing, and mounting systems.
    alt_descriptions:
      nl: Ingrijpende handeling die beschermende omhulling biedt via lijst, beglazing, rugkarton en montagesysteem.
      de: Eingriff mit schuetzender Einfassung durch Rahmen, Verglasung, Rueckwand und Montagesysteme.
      fr: Intervention fournissant une enclosure protectrice via cadre, vitrage, dos et systemes de montage.
      es: Intervencion que aporta cerramiento protector mediante marco, acristalado, respaldo y sistemas de montaje.
      ar: إجراء يوفر غلافًا وقائيًا عبر الإطار والزجاج واللوح الخلفي ونظم التثبيت.
      id: Intervensi yang menyediakan pelindung melalui bingkai, kaca, papan belakang, dan sistem pemasangan.
      zh: 通过框体、玻璃、背板与装裱系统提供防护封装的处置。
    structured_aliases:
    - literal_form: beschermende omlijsting
      in_language: nl
    - literal_form: schutzgerahmte Einfassung
      in_language: de
    - literal_form: intervention d encadrement protecteur
      in_language: fr
    - literal_form: intervencion de enmarcado protector
      in_language: es
    - literal_form: تغليف إطاري وقائي
      in_language: ar
    - literal_form: tindakan pembingkaian pelindung
      in_language: id
    - literal_form: 防护装框处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: REFRAMING
    annotations:
      specificity_score: '0.65'
      aat_id: '300053118'
      skos:prefLabel: Reframing
      skos:altLabel: framing, encadrement, inlijsten
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - reframing
    - protective framing
    - glazing
    - mounting
    - enclosure
  FumigationTreatment:
    is_a: TreatmentType
    class_uri: hc:FumigationTreatment
    description: >-
      Intervention for infestation control using anoxic, thermal, or limited
      chemical methods.
    alt_descriptions:
      nl: Ingrijpende handeling voor plaagbeheersing met anoxische, thermische of beperkt chemische methoden.
      de: Eingriff zur Befallskontrolle mit anoxischen, thermischen oder begrenzt chemischen Verfahren.
      fr: Intervention de lutte contre les infestations par methodes anoxiques, thermiques ou chimiques limitees.
      es: Intervencion para control de infestaciones mediante metodos anoxicos, termicos o quimicos limitados.
      ar: إجراء لمكافحة الإصابة بالآفات باستخدام أساليب لا هوائية أو حرارية أو كيميائية محدودة.
      id: Intervensi pengendalian infestasi menggunakan metode anoksik, termal, atau kimia terbatas.
      zh: 采用缺氧、热处理或有限化学方法进行虫害控制的处置。
    structured_aliases:
    - literal_form: plaagbestrijding
      in_language: nl
    - literal_form: Befallskontrolleingriff
      in_language: de
    - literal_form: intervention antiparasitaire
      in_language: fr
    - literal_form: intervencion de control de plagas
      in_language: es
    - literal_form: مكافحة آفات
      in_language: ar
    - literal_form: tindakan kendali infestasi
      in_language: id
    - literal_form: 虫害控制处置
      in_language: zh
    slot_usage:
      has_code:
        equals_string: FUMIGATION
    annotations:
      specificity_score: '0.70'
      aat_id: '300053107'
      skos:prefLabel: Fumigation
      skos:altLabel: pest treatment, ontsmetting, Begasung
    broad_mappings:
    - crm:E7_Activity
    - schema:Action
    keywords:
    - fumigation
    - pest control
    - infestation treatment
    - anoxic treatment
    - IPM
