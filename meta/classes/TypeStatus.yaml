id: https://nde.nl/ontology/hc/class/TypeStatus
name: TypeStatus
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
  - linkml:types
  - ../slots/has_code
  - ../slots/has_label
  - ../slots/has_specimen
classes:
  TypeStatus:
    class_uri: skos:Concept
    description: >-
      Controlled indicator of the nomenclatural role assigned to a biological
      specimen in taxonomic designation.
    alt_descriptions:
      nl: Gecontroleerde status die de nomenclatorische rol van een biologisch specimen aangeeft.
      de: Kontrollierter Status, der die nomenklatorische Rolle eines biologischen Belegs angibt.
      fr: Statut controle indiquant le role nomenclatural d un specimen biologique.
      es: Estado controlado que indica la funcion nomenclatural de un especimen biologico.
      ar: حالة مضبوطة تبيّن الدور التسموي لعينة بيولوجية في التصنيف.
      id: Status terkontrol yang menunjukkan peran nomenklatural spesimen biologis.
      zh: 指示生物标本在分类命名中角色的受控状态。
    structured_aliases:
    - literal_form: type-exemplaarstatus
      in_language: nl
    - literal_form: Typusstatus
      in_language: de
    - literal_form: statut de type
      in_language: fr
    - literal_form: estado de tipo
      in_language: es
    - literal_form: حالة العينة النمطية
      in_language: ar
    - literal_form: status spesimen tipe
      in_language: id
    - literal_form: 模式标本状态
      in_language: zh
    slots:
    - has_code
    - has_label
    - has_specimen
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
