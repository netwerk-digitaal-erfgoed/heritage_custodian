- ../slots/related_to
- ../slots/has_label
classes:
  TentativeWorldHeritageSite:
    description: Location-level nomination entry proposed for potential inscription under international cultural-value frameworks.
    is_a: CustodianType
    class_uri: skos:Concept
    slots:
    - has_type
    - has_score
    - related_to
    - identified_by
    - has_label
    slot_usage:
      identified_by:
      has_type:
        equals_string: hc:FeatureCustodianType
      related_to:
        range: WikidataAlignment
        inlined: true
      has_label:
        any_of:
        - equals_string: Tentativliste
        - equals_string: lista indicativa del Patrimonio de la Humanidad
        - equals_string: liste indicative du patrimoine mondial
    see_also:
    - WorldHeritageSite
    - NationalTreasure
    - NationalTreasureOfFrance
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    alt_descriptions:
      nl: 'Begrip voor: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      de: 'Begriff fuer: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      fr: 'Concept pour: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      es: 'Concepto para: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      ar: 'مفهوم لـ: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      id: 'Konsep untuk: UNESCO -list designation for institutions that manage sites proposed for future inscription.'
      zh: 用于以下内容的概念：UNESCO -list designation for institutions that manage sites proposed for future inscription.
    structured_aliases:
    - literal_form: tentative world heritage site
      in_language: nl
    - literal_form: tentative world heritage site
      in_language: de
    - literal_form: tentative world heritage site
      in_language: fr
    - literal_form: tentative world heritage site
      in_language: es
    - literal_form: tentative world heritage site
      in_language: ar
    - literal_form: tentative world heritage site
      in_language: id
    - literal_form: tentative world heritage site
      in_language: zh
