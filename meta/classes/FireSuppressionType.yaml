id: https://nde.nl/ontology/hc/class/FireSuppressionType
name: FireSuppressionType
title: Fire Suppression Type
description: Abstract base class for fire suppression system types (e.g., Inert Gas, Sprinkler). MIGRATED from fire_suppression_type slot per Rule 0b.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  FireSuppressionType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomy concept for categorizing technical fire suppression
      methods used in heritage facilities.
    alt_descriptions:
      nl: Abstract taxonomieconcept voor classificatie van technische brandblusmethoden in erfgoedfaciliteiten.
      de: Abstraktes Taxonomiekonzept zur Klassifikation technischer Feuerloeschmethoden in Kultureinrichtungen.
      fr: Concept taxonomique abstrait pour classifier les methodes techniques de suppression incendie dans les sites patrimoniaux.
      es: Concepto taxonomico abstracto para clasificar metodos tecnicos de supresion de incendios en instalaciones patrimoniales.
      ar: مفهوم تصنيفي مجرد لتصنيف طرق إخماد الحريق التقنية المستخدمة في مرافق التراث.
      id: Konsep taksonomi abstrak untuk mengklasifikasikan metode teknis pemadaman kebakaran di fasilitas warisan.
      zh: 用于分类遗产设施技术性灭火方式的抽象分类学概念。
    structured_aliases:
    - {literal_form: type brandblussing, in_language: nl}
    - {literal_form: Feuerloeschtyp, in_language: de}
    - {literal_form: type de suppression incendie, in_language: fr}
    - {literal_form: tipo de supresion de incendios, in_language: es}
    - {literal_form: نوع إخماد الحريق, in_language: ar}
    - {literal_form: tipe pemadaman kebakaran, in_language: id}
    - {literal_form: 灭火类型, in_language: zh}
    broad_mappings:
    - skos:Concept
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
