classes:
  WebsitePresence:
    is_a: DigitalPresenceType
    class_uri: schema:WebSite
    description: >-
      Public-facing information channel delivered through a standard browser
      interface and maintained for institutional communication.
    alt_descriptions:
      nl: >-
        Publiek informatiekanaal dat via een standaard browserinterface wordt
        aangeboden en wordt onderhouden voor institutionele communicatie.
      de: >-
        Öffentliches Informationsangebot, das über eine standardisierte
        Browseroberfläche bereitgestellt und für institutionelle Kommunikation
        gepflegt wird.
      fr: >-
        Canal d'information public diffusé via une interface de navigateur
        standard et maintenu pour la communication institutionnelle.
      es: >-
        Canal público de información ofrecido mediante una interfaz de
        navegador estándar y mantenido para la comunicación institucional.
      ar: >-
        قناة معلومات عامة تُقدَّم عبر واجهة متصفح قياسية وتُدار لأغراض
        التواصل المؤسسي.
      id: >-
        Kanal informasi publik yang disajikan melalui antarmuka peramban
        standar dan dipelihara untuk komunikasi kelembagaan.
      zh: >-
        通过标准浏览器界面提供并维护用于机构传播的公共信息渠道。
    annotations:
      enum_equivalent: WEBSITE
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    structured_aliases:
    - literal_form: publieke webinformatieomgeving
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: öffentliche Web-Informationspräsenz
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: présence d'information publique sur le web
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: presencia web informativa pública
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: حضور معلوماتي عام على الويب
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: presensi informasi publik berbasis web
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公共信息网络呈现形态
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Represents a browser-accessible channel focused on institutional information dissemination.
    - Preserved usage scope: informational rather than highly transactional functionality.
    - 'Preserved from prior description: Traditional website - informational web presence.'
    keywords:
    - public information channel
    - browser interface
    - institutional communication
    - web presence
    examples:
    - value:
        has_label: Municipal Heritage Information Site
      description: Browser-accessible channel for public-facing institutional information.
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
