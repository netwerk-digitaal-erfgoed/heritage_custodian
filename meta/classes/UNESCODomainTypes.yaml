id: https://nde.nl/ontology/hc/class/UNESCODomainTypes
name: UNESCODomainTypes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - ./UNESCODomainType
  - linkml:types
classes:
  OralTraditions:
    is_a: UNESCODomainType
    description: Practices and expressions transmitted primarily through speech and recitation.
    alt_descriptions:
      nl: Praktijken en expressies die vooral mondeling via spreken en voordracht worden overgedragen.
      de: Praktiken und Ausdrucksformen, die ueberwiegend muendlich durch Sprache und Vortrag ueberliefert werden.
      fr: Pratiques et expressions transmises principalement par la parole et la recitation.
      es: Practicas y expresiones transmitidas principalmente por habla y recitacion.
      ar: ممارسات وتعبيرات تُنقل أساسًا عبر الكلام والإلقاء.
      id: Praktik dan ekspresi yang terutama diwariskan melalui ujaran dan pelafalan.
      zh: 主要通过口述与吟诵传承的实践与表达。
    structured_aliases:
    - literal_form: mondelinge overlevering
      in_language: nl
    - literal_form: muendliche Ueberlieferung
      in_language: de
    - literal_form: transmission orale
      in_language: fr
    - literal_form: transmision oral
      in_language: es
    - literal_form: تراث شفهي
      in_language: ar
    - literal_form: transmisi lisan
      in_language: id
    - literal_form: 口头传承
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
  PerformingArts:
    is_a: UNESCODomainType
    description: Embodied practices presented through music, dance, theatre, or related stage forms.
    alt_descriptions:
      nl: Belichaamde praktijken uitgevoerd via muziek, dans, theater of verwante podiumvormen.
      de: Verkoerperte Praktiken in Musik, Tanz, Theater oder verwandten Buehnenformen.
      fr: Pratiques incarnees presentees par musique, danse, theatre ou formes sceniques associees.
      es: Practicas corporizadas presentadas mediante musica, danza, teatro o formas escenicas afines.
      ar: ممارسات أدائية متجسدة تُعرض عبر الموسيقى والرقص والمسرح أو أشكال المنصة القريبة.
      id: Praktik berwujud yang ditampilkan melalui musik, tari, teater, atau bentuk panggung terkait.
      zh: 通过音乐、舞蹈、戏剧及相关舞台形式呈现的具身实践。
    structured_aliases:
    - literal_form: podiumpraktijken
      in_language: nl
    - literal_form: Buehnenpraxis
      in_language: de
    - literal_form: pratiques sceniques
      in_language: fr
    - literal_form: practicas escenicas
      in_language: es
    - literal_form: ممارسات أدائية
      in_language: ar
    - literal_form: praktik panggung
      in_language: id
    - literal_form: 舞台实践
      in_language: zh
    broad_mappings:
    - skos:Concept
  SocialPractices:
    is_a: UNESCODomainType
    description: Customs, rituals, and festive activities structuring communal life.
    alt_descriptions:
      nl: Gewoonten, rituelen en feestactiviteiten die het gemeenschapsleven vormgeven.
      de: Braeuche, Rituale und Festaktivitaeten, die das Gemeinschaftsleben strukturieren.
      fr: Coutumes, rituels et activites festives structurant la vie communautaire.
      es: Costumbres, rituales y actividades festivas que estructuran la vida comunitaria.
      ar: عادات وطقوس وأنشطة احتفالية تنظّم حياة المجتمع.
      id: Adat, ritus, dan kegiatan perayaan yang menstrukturkan kehidupan komunitas.
      zh: 组织社区生活的习俗、仪式与节庆活动。
    structured_aliases:
    - literal_form: gemeenschapsgebruiken
      in_language: nl
    - literal_form: Gemeinschaftsbraeuche
      in_language: de
    - literal_form: coutumes communautaires
      in_language: fr
    - literal_form: costumbres comunitarias
      in_language: es
    - literal_form: ممارسات مجتمعية
      in_language: ar
    - literal_form: praktik kemasyarakatan
      in_language: id
    - literal_form: 社群习俗活动
      in_language: zh
    broad_mappings:
    - skos:Concept
  NatureKnowledge:
    is_a: UNESCODomainType
    description: Ecological know-how and customary understandings of environment, seasons, and resources.
    alt_descriptions:
      nl: Ecologische knowhow en gebruikskennis over omgeving, seizoenen en hulpbronnen.
      de: Oekologisches Erfahrungswissen und tradierte Kenntnisse zu Umwelt, Jahreszeiten und Ressourcen.
      fr: Savoirs ecologiques et connaissances coutumieres de l environnement, des saisons et des ressources.
      es: Saberes ecologicos y entendimientos consuetudinarios sobre entorno, estaciones y recursos.
      ar: معارف بيئية وفهوم عرفية عن البيئة والفصول والموارد.
      id: Pengetahuan ekologis dan pemahaman adat tentang lingkungan, musim, dan sumber daya.
      zh: 关于环境、季节与资源的生态知识与习惯性认知。
    structured_aliases:
    - literal_form: ecologische kennispraktijk
      in_language: nl
    - literal_form: oekologisches Praxiswissen
      in_language: de
    - literal_form: savoirs ecologiques
      in_language: fr
    - literal_form: saberes ecologicos
      in_language: es
    - literal_form: معارف بيئية
      in_language: ar
    - literal_form: pengetahuan ekologis
      in_language: id
    - literal_form: 生态知识实践
      in_language: zh
    broad_mappings:
    - skos:Concept
  TraditionalCraftsmanship:
    is_a: UNESCODomainType
    description: Skills for making objects with inherited handwork techniques and materials.
    alt_descriptions:
      nl: Vaardigheden voor het maken van objecten met overgeleverde handwerktechnieken en materialen.
      de: Fertigkeiten zur Herstellung von Objekten mit ueberlieferten Handwerkstechniken und Materialien.
      fr: Savoir-faire pour fabriquer des objets avec des techniques manuelles et des materiaux transmis.
      es: Destrezas para crear objetos con tecnicas manuales y materiales heredados.
      ar: مهارات لصنع الأشياء باستخدام تقنيات يدوية ومواد موروثة.
      id: Keterampilan membuat objek dengan teknik kerajinan tangan dan bahan turun-temurun.
      zh: 运用传承手工技艺与材料制作器物的技能体系。
    structured_aliases:
    - literal_form: ambachtelijke maakvaardigheden
      in_language: nl
    - literal_form: handwerkliche Herstellungsfaehigkeiten
      in_language: de
    - literal_form: savoir-faire artisanal
      in_language: fr
    - literal_form: destrezas artesanales
      in_language: es
    - literal_form: مهارات حرفية
      in_language: ar
    - literal_form: keterampilan kerajinan tangan
      in_language: id
    - literal_form: 手工营造技艺
      in_language: zh
    broad_mappings:
    - skos:Concept
