classes:
  MainPart:
    class_uri: schema:QuantitativeValue
    description: >-
      Dominant quantified component representing the largest share within an allocation structure.
    alt_descriptions:
      nl: >-
        Dominant gekwantificeerd onderdeel dat het grootste aandeel vertegenwoordigt binnen een toewijzingsstructuur.
      de: >-
        Dominanter quantifizierter Bestandteil, der den größten Anteil innerhalb einer Zuweisungsstruktur repräsentiert.
      fr: >-
        Composant quantifié dominant représentant la plus grande part dans une structure d'allocation.
      es: >-
        Componente cuantificado dominante que representa la mayor participación dentro de una estructura de asignación.
      ar: >-
        مكون كمي مهيمن يمثل الحصة الأكبر ضمن هيكل التخصيص.
      id: >-
        Komponen terkuantifikasi dominan yang mewakili porsi terbesar dalam struktur alokasi.
      zh: >-
        在分配结构中代表最大份额的主要量化组成部分。
