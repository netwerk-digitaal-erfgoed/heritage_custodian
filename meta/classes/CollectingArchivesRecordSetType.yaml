classes:
  CollectingArchivesRecordSetType:
    description: >-
      Taxonomic category for documentary aggregations stewarded by institutions
      that acquire materials from multiple external provenance lines.
    alt_descriptions:
      nl: Taxonomische categorie voor documentaire aggregaties beheerd door instellingen die materiaal uit meerdere externe herkomstlijnen verwerven.
      de: Taxonomische Kategorie fuer dokumentarische Aggregationen, die von Einrichtungen mit Erwerb aus mehreren externen Provenienzlinien verwaltet werden.
      fr: Categorie taxonomique pour des ensembles documentaires geres par des institutions qui acquierent des materiaux de plusieurs provenances externes.
      es: Categoria taxonomica para agregaciones documentales custodiadas por instituciones que adquieren materiales de multiples procedencias externas.
      ar: فئة تصنيفية لتجميعات وثائقية تديرها مؤسسات تقتني موادا من مصادر منشأ خارجية متعددة.
      id: Kategori taksonomi untuk agregasi dokumenter yang dikelola institusi pengakuisisi bahan dari banyak garis provenance eksternal.
      zh: 由从多个外部来源征集材料的机构管理之文献聚合体分类类型。
    structured_aliases:
    - literal_form: verzamelarchief-recordsettype
      in_language: nl
    - literal_form: Sammelarchiv-Bestandsart
      in_language: de
    - literal_form: type de fonds d archives de collecte
      in_language: fr
    - literal_form: tipo de conjunto documental de archivo recolector
      in_language: es
    - literal_form: نوع مجموعة سجلات أرشيف تجميعي
      in_language: ar
    - literal_form: jenis set catatan arsip penghimpun
      in_language: id
    - literal_form: 征集型档案记录集类型
      in_language: zh
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - skos:Concept
    - rico:RecordSetType
    related_mappings:
    - wd:Q117246276
    keywords:
    - record set taxonomy
    - multi-provenance holdings
    - collecting repository workflows
    examples:
    - value:
        has_type: CollectedMaterialsFonds
        has_score: 0.88
    comments:
    - Focuses on documentary arrangement patterns, not institutional governance
    slots:
