id: https://nde.nl/ontology/hc/classes/PlatformSourceReference
name: PlatformSourceReference
title: PlatformSourceReference
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  pav: http://purl.org/pav/
imports:
- linkml:types
# default_range: string
classes:
  PlatformSourceReference:
    description: >-
      Structured source reference for a digital platform including URL, fetch timestamp,
      and list of data fields extracted from that source.
    alt_descriptions:
      nl: Gestructureerde bronverwijzing voor een digitaal platform.
      de: Strukturierte Quellenreferenz für eine digitale Plattform.
      fr: Référence de source structurée pour une plateforme numérique.
    structured_aliases:
    - literal_form: platformbronverwijzing
      in_language: nl
    - literal_form: Plattform-Quellenreferenz
      in_language: de
    comments:
    - Source reference with provenance metadata for platform data extraction.
    class_uri: prov:PrimarySource
    broad_mappings:
    - prov:PrimarySource
    close_mappings:
    - pav:RetrievedFrom
    related_mappings:
    - schema:WebPage
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
