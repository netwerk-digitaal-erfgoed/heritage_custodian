classes:
  ReviewsSummary:
    description: >-
      Aggregated evaluation statistics combining average scores, total counts, and optional rating distribution across scale values.
    alt_descriptions:
      nl: >-
        Geaggregeerde evaluatiestatistieken die gemiddelde scores, totale aantallen en optionele beoordelingsverdeling over schaalwaarden combineren.
      de: >-
        Aggregierte Bewertungsstatistiken, die Durchschnittswerte, Gesamtzahlen und optionale Bewertungsverteilung über Skalenwerte kombinieren.
      fr: >-
        Statistiques d'évaluation agrégées combinant scores moyens, comptes totaux et distribution optionnelle des notes sur les valeurs d'échelle.
      es: >-
        Estadísticas de evaluación agregadas que combinan puntuaciones promedio, recuentos totales y distribución opcional de calificaciones en valores de escala.
      ar: >-
        إحصائيات تقييم مجمعة تجمع متوسط الدرجات وإجمالي الأعداد والتوزيع الاختياري للتقييم عبر قيم المقياس.
      id: >-
        Statistik evaluasi teragregasi yang menggabungkan skor rata-rata, jumlah total, dan distribusi peringkat opsional di seluruh nilai skala.
      zh: >-
        汇总评估统计数据，结合平均分、总数和跨量表值的可选评分分布。
