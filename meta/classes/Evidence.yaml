id: https://nde.nl/ontology/hc/class/Evidence
name: Evidence
title: Evidence Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_description
- ../slots/has_score
classes:
  Evidence:
    class_uri: crm:E73_Information_Object
    description: >-
      Supporting documentation used to substantiate claims, assessments, or interpretive
      statements about heritage entities.
    alt_descriptions:
      nl: >-
        Ondersteunende documentatie gebruikt om beweringen, beoordelingen of interpreterende
        verklaringen over erfgoedentiteiten te onderbouwen.
      de: >-
        Unterlagen, die zur Untermauerung von Behauptungen, Bewertungen oder interpretativen
        Aussagen über Heritage-Entitäten verwendet werden.
      fr: >-
        Documentation de soutien utilisée pour étayer des affirmations, évaluations ou déclarations
        interprétatives sur les entités patrimoniales.
      es: >-
        Documentación de apoyo utilizada para fundamentar afirmaciones, evaluaciones o declaraciones
        interpretativas sobre entidades patrimoniales.
      ar: >-
        وثائق داعمة تستخدم لإثبات الادعاءات أو التقييمات أو البيانات التفسيرية
        حول كيانات التراث.
      id: >-
        Dokumentasi pendukung yang digunakan untuk memperkuat klaim, penilaian, atau pernyataan
        interpretatif tentang entitas warisan.
      zh: >-
        用于支持关于遗产实体的主张、评估或解释性陈述的佐证文献。
    structured_aliases:
    - literal_form: bewijsmateriaal
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Beweismaterial
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: élément de preuve
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: elemento de prueba
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: دليل إثبات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: bahan bukti
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 证据材料
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - crm:E73_Information_Object
    close_mappings:
    - schema:CreativeWork
    slots:
    - identified_by
    - has_label
    - has_description
    - has_score
    comments:
    - Links assertions to source documentation for traceability.
    - Supports provenance verification and claim validation workflows.
    - 'Preserved from prior description: Documentation used to support a claim, assessment, or interpretation.'
    keywords:
    - supporting documentation
    - claim substantiation
    - provenance evidence
    - assessment basis
    examples:
    - value:
        has_label: Conservation Treatment Report
        has_description: Technical analysis supporting attribution claim.
      description: Documentary evidence for heritage assessment
    annotations:
      specificity_score: 0.2
      specificity_rationale: Reusable support object for assertions and assessments.
      custodian_types: '["*"]'
