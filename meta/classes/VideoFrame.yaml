    comments:
    - Created from slot_fixes.yaml migration (2026-01-22)
    - Use with analyze slot to track frame analysis
    - Sample rate affects both coverage and compute cost
    - 'Preserved from prior description: A video frame or set of frames analyzed during video processing. **PURPOSE**: Represents frames from a video that have been analyzed by computer vision or multimodal AI models. Used to track frame-based analysis parameters such as sample rate (frames per second analyzed) and total frames processed. **USE CASES**: - Video annotation (object detection, scene analysis) - Frame sampling configuration - Analysis throughput tracking - Computer vision pipeline configuration **FRAME SAMPLE RATE**: The sample rate determines how many frames are analyzed per second of video: | Sample Rate | Frames/sec | Use Case | |-------------|------------|----------| | 0.1 fps | 1 every 10s | Overview/thumbnails | | 1.0 fps | 1 per second | Standard analysis | | 5.0 fps | 5 per second | Detailed analysis | | 30.0 fps | Every frame | Exhaustive analysis | Higher sample rates capture more detail but increase compute cost. **MIGRATION SUPPORT**: This class supports migration from the frame_sample_rate slot per slot_fixes.yaml. Use with has_quantity + Quantity + has_unit + Unit.'
