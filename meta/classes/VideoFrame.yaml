classes:
  VideoFrame:
    class_uri: schema:VideoObject
    description: >-
      Still-image segment representing a discrete temporal sample extracted from moving-image media.
    alt_descriptions:
      nl: >-
        Stilstaand beeldsegment dat een discreet tijdsmonster vertegenwoordigt dat uit bewegende beeldmedia is geëxtraheerd.
      de: >-
        Standbildsegment, das eine diskrete zeitliche Probe darstellt, die aus Bewegtbildmedien extrahiert wurde.
      fr: >-
        Segment d'image fixe représentant un échantillon temporel discret extrait de médias d'images animées.
      es: >-
        Segmento de imagen fija que representa una muestra temporal discreta extraída de medios de imágenes en movimiento.
      ar: >-
        مقطع صورة ثابتة يمثل عينة زمنية منفصلة مستخرجة من وسائط الصور المتحركة.
      id: >-
        Segmen gambar diam yang mewakili sampel temporal diskrit yang diekstrak dari media gambar bergerak.
      zh: >-
        表示从运动图像媒体中提取的离散时间样本的静止图像片段。
