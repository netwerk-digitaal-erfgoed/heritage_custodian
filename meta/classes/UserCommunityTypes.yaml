id: https://nde.nl/ontology/hc/class/UserCommunityTypes
name: UserCommunityTypes
title: User Community Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
default_prefix: hc
imports:
  - ./UserCommunityType
  - linkml:types
classes:
  ResearchCommunity:
    is_a: UserCommunityType
    description: Academic and scholarly audiences using holdings for inquiry.
    alt_descriptions:
      nl: Academische en wetenschappelijke doelgroepen die collecties voor onderzoek gebruiken.
      de: Akademische und wissenschaftliche Zielgruppen, die Bestaende fuer Forschung nutzen.
      fr: Publics academiques et scientifiques utilisant les fonds pour l enquete.
      es: Audiencias academicas y cientificas que usan los fondos para investigacion.
      ar: جماهير أكاديمية وبحثية تستخدم المقتنيات لأغراض الاستقصاء.
      id: Audiens akademik dan ilmiah yang memakai koleksi untuk penyelidikan.
      zh: 用馆藏开展学术探究的高校与研究受众。
    structured_aliases:
    - literal_form: onderzoeksdoelgroep
      in_language: nl
    - literal_form: Forschungspublikum
      in_language: de
    - literal_form: public de recherche
      in_language: fr
    - literal_form: audiencia de investigacion
      in_language: es
    - literal_form: جمهور بحثي
      in_language: ar
    - literal_form: audiens riset
      in_language: id
    - literal_form: 研究受众
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - research
    - academic audience
    - scholarly inquiry
    - researcher community
    - scientific community
  PublicCommunity:
    is_a: UserCommunityType
    description: General audiences engaging through visits, programmes, and online access.
    alt_descriptions:
      nl: Algemene publieksgroepen die deelnemen via bezoeken, programma's en online toegang.
      de: Allgemeine Zielgruppen mit Beteiligung ueber Besuche, Programme und Online-Zugang.
      fr: Publics generaux engages par visites, programmes et acces en ligne.
      es: Audiencias generales que participan mediante visitas, programas y acceso en linea.
      ar: جماهير عامة تتفاعل عبر الزيارات والبرامج والوصول الرقمي.
      id: Audiens umum yang terlibat melalui kunjungan, program, dan akses daring.
      zh: 通过参观、项目与线上访问参与的公众受众。
    structured_aliases:
    - literal_form: algemeen publiek
      in_language: nl
    - literal_form: allgemeines Publikum
      in_language: de
    - literal_form: public general
      in_language: fr
    - literal_form: audiencia general
      in_language: es
    - literal_form: جمهور عام
      in_language: ar
    - literal_form: audiens umum
      in_language: id
    - literal_form: 大众受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - public
    - general audience
    - visitors
    - community engagement
    - public programming
  EducationalCommunity:
    is_a: UserCommunityType
    description: Learners and educators using holdings for teaching and study.
    alt_descriptions:
      nl: Lerenden en docenten die collecties gebruiken voor onderwijs en studie.
      de: Lernende und Lehrende, die Bestaende fuer Unterricht und Studium nutzen.
      fr: Apprenants et educateurs utilisant les fonds pour enseignement et etude.
      es: Estudiantes y docentes que usan los fondos para ensenanza y estudio.
      ar: متعلمون ومعلمون يستخدمون المقتنيات للتعليم والدراسة.
      id: Peserta didik dan pendidik yang memakai koleksi untuk pengajaran dan belajar.
      zh: 将馆藏用于教学与学习的学习者和教育者。
    structured_aliases:
    - literal_form: onderwijsdoelgroep
      in_language: nl
    - literal_form: Bildungspublikum
      in_language: de
    - literal_form: public educatif
      in_language: fr
    - literal_form: audiencia educativa
      in_language: es
    - literal_form: جمهور تعليمي
      in_language: ar
    - literal_form: audiens pendidikan
      in_language: id
    - literal_form: 教育受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - education
    - teachers
    - students
    - learners
    - educational programming
  ProfessionalCommunity:
    is_a: UserCommunityType
    description: Practitioners in heritage, library, archive, and museum fields.
    alt_descriptions:
      nl: Professionals werkzaam in erfgoed-, bibliotheek-, archief- en museumdomeinen.
      de: Fachpraktiker in den Bereichen Kulturerbe, Bibliothek, Archiv und Museum.
      fr: Professionnels des domaines patrimoine, bibliotheque, archives et musees.
      es: Profesionales de patrimonio, bibliotecas, archivos y museos.
      ar: ممارسون مهنيون في مجالات التراث والمكتبات والأرشيف والمتاحف.
      id: Praktisi profesional di bidang warisan, perpustakaan, arsip, dan museum.
      zh: 在遗产、图书馆、档案与博物馆领域从业的专业人群。
    structured_aliases:
    - literal_form: vakprofessionals
      in_language: nl
    - literal_form: Fachpublikum
      in_language: de
    - literal_form: public professionnel
      in_language: fr
    - literal_form: audiencia profesional
      in_language: es
    - literal_form: جمهور مهني
      in_language: ar
    - literal_form: audiens profesional
      in_language: id
    - literal_form: 专业受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - professionals
    - GLAM sector
    - heritage practitioners
    - librarians
    - archivists
    - museum professionals
  GenealogyCommunity:
    is_a: UserCommunityType
    description: Family-history audiences tracing lineage, households, and local records.
    alt_descriptions:
      nl: Publiek voor familiegeschiedenis dat afstamming, huishoudens en lokale registers onderzoekt.
      de: Zielgruppen zur Familiengeschichte, die Abstammung, Haushalte und lokale Register nachverfolgen.
      fr: Publics de genealogie retraçant filiations, menages et registres locaux.
      es: Audiencias de historia familiar que rastrean linajes, hogares y registros locales.
      ar: جماهير مهتمة بتاريخ العائلة تتتبع الأنساب والأسر والسجلات المحلية.
      id: Audiens sejarah keluarga yang menelusuri silsilah, rumah tangga, dan catatan lokal.
      zh: 追踪家谱、户籍与地方记录的家族史受众。
    structured_aliases:
    - literal_form: familiehistorisch publiek
      in_language: nl
    - literal_form: Familienforschungspublikum
      in_language: de
    - literal_form: public de genealogie
      in_language: fr
    - literal_form: audiencia genealogica
      in_language: es
    - literal_form: جمهور أنساب
      in_language: ar
    - literal_form: audiens silsilah keluarga
      in_language: id
    - literal_form: 家族史受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - genealogy
    - family history
    - lineage research
    - ancestry
    - local records
  ArtistCommunity:
    is_a: UserCommunityType
    description: Creative practitioners using holdings for inspiration, reinterpretation, and production.
    alt_descriptions:
      nl: Creatieve makers die collecties gebruiken voor inspiratie, herinterpretatie en productie.
      de: Kreative Praktiker, die Bestaende fuer Inspiration, Neuinterpretation und Produktion nutzen.
      fr: Praticiens creatifs utilisant les fonds pour inspiration, reinterpretation et production.
      es: Practicantes creativos que usan los fondos para inspiracion, reinterpretacion y produccion.
      ar: ممارسون مبدعون يستخدمون المقتنيات للإلهام وإعادة التأويل والإنتاج.
      id: Praktisi kreatif yang memanfaatkan koleksi untuk inspirasi, reinterpretasi, dan produksi.
      zh: 将馆藏用于灵感、再诠释与创作生产的创意实践者。
    structured_aliases:
    - literal_form: creatief makerspubliek
      in_language: nl
    - literal_form: Kreativpublikum
      in_language: de
    - literal_form: public creatif
      in_language: fr
    - literal_form: audiencia creativa
      in_language: es
    - literal_form: جمهور إبداعي
      in_language: ar
    - literal_form: audiens kreatif
      in_language: id
    - literal_form: 创作者受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - artists
    - creative practitioners
    - artistic inspiration
    - reinterpretation
    - creative production
  JournalistCommunity:
    is_a: UserCommunityType
    description: News and documentary practitioners using holdings for reporting and verification.
    alt_descriptions:
      nl: Nieuws- en documentairemakers die collecties gebruiken voor berichtgeving en verificatie.
      de: Nachrichten- und Dokumentarpraxis, die Bestaende fuer Berichterstattung und Verifikation nutzt.
      fr: Professionnels de l information et du documentaire utilisant les fonds pour reportage et verification.
      es: Profesionales de noticias y documental que usan los fondos para reporteo y verificacion.
      ar: ممارسو الأخبار والوثائقيات الذين يستخدمون المقتنيات للتغطية والتحقق.
      id: Praktisi berita dan dokumenter yang memakai koleksi untuk peliputan dan verifikasi.
      zh: 将馆藏用于报道与核验的新闻与纪实从业者。
    structured_aliases:
    - literal_form: journalistiek publiek
      in_language: nl
    - literal_form: Medienpublikum
      in_language: de
    - literal_form: public journalistique
      in_language: fr
    - literal_form: audiencia periodistica
      in_language: es
    - literal_form: جمهور إعلامي
      in_language: ar
    - literal_form: audiens jurnalisme
      in_language: id
    - literal_form: 新闻纪实受众
      in_language: zh
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    keywords:
    - journalists
    - media
    - news reporting
    - documentary
    - verification
