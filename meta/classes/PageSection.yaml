id: https://nde.nl/ontology/hc/class/PageSection
name: PageSection
title: Page Section
description: Structured representation of a section within a web page.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/

default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
  - ../slots/has_description
  - ../slots/has_url
classes:
  PageSection:
    class_uri: schema:WebPageElement
    description: >-
      Distinct fragment or labeled division within a web document containing related content elements.
    alt_descriptions:
      nl: >-
        Afzonderlijk fragment of gelabelde onderverdeling binnen een webdocument dat gerelateerde inhoudselementen bevat.
      de: >-
        Eigenständiges Fragment oder gekennzeichneter Abschnitt innerhalb eines Webdokuments mit verwandten Inhaltselementen.
      fr: >-
        Fragment distinct ou division étiquetée dans un document web contenant des éléments de contenu connexes.
      es: >-
        Fragmento distinto o división etiquetada dentro de un documento web que contiene elementos de contenido relacionados.
      ar: >-
        جزء متميز أو قسم مسمى داخل مستند ويب يحتوي على عناصر محتوى ذات صلة.
      id: >-
        Fragmen berbeda atau divisi berlabel dalam dokumen web yang berisi elemen konten terkait.
      zh: >-
        包含相关内容元素的网页文档中的独特片段或标记部分。
