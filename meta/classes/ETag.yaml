id: https://nde.nl/ontology/hc/class/ETag
name: ETag
title: ETag
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
  - ../slots/has_score
classes:
  ETag:
    class_uri: hc:ETag
    description: >-
      HTTP validator token used to detect representation changes for cache
      coherence and conditional retrieval.
    alt_descriptions:
      nl: HTTP-validatietoken voor detectie van representatiewijzigingen bij cachecoherentie en conditionele opvraging.
      de: HTTP-Validierungstoken zur Erkennung von Darstellungsaenderungen fuer Cache-Kohaerenz und bedingten Abruf.
      fr: Jeton de validation HTTP utilise pour detecter les changements de representation et gerer la coherence du cache.
      es: Token validador HTTP usado para detectar cambios de representacion y mantener coherencia de cache.
      ar: رمز تحقق HTTP لاكتشاف تغيّر التمثيل وضمان اتساق التخزين المؤقت والاسترجاع الشرطي.
      id: Token validator HTTP untuk mendeteksi perubahan representasi demi koherensi cache dan pengambilan bersyarat.
      zh: 用于检测表示变更、支持缓存一致性与条件获取的 HTTP 校验令牌。
    structured_aliases:
      - literal_form: entiteitstag
        in_language: nl
      - literal_form: Entitaets-Tag
        in_language: de
      - literal_form: balise d'entite
        in_language: fr
      - literal_form: etiqueta de entidad
        in_language: es
      - literal_form: وسم الكيان
        in_language: ar
      - literal_form: tag entitas
        in_language: id
      - literal_form: 实体标签
        in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_score
    slot_usage:
      has_label:
        required: true
    annotations:
      specificity_score: "0.25"
      specificity_rationale: Technical web metadata token for synchronization workflows.
      custodian_types: "['*']"
