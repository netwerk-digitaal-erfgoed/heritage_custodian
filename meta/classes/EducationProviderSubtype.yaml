id: https://nde.nl/ontology/hc/class/EducationProviderSubtype
name: EducationProviderSubtype
title: Education Provider Subtype Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
classes:
  EducationProviderSubtype:
    class_uri: skos:Concept
    description: >-
      Specific taxonomy node for variants of educational providers within
      the provider type hierarchy.
    alt_descriptions:
      nl: Specifiek taxonomieknooppunt voor varianten van onderwijsaanbieders binnen de typehierarchie.
      de: Spezifischer Taxonomieknoten fuer Varianten von Bildungsanbietern innerhalb der Typhierarchie.
      fr: Noeud taxonomique specifique pour les variantes de fournisseurs educatifs dans la hierarchie des types.
      es: Nodo taxonomico especifico para variantes de proveedores educativos dentro de la jerarquia de tipos.
      ar: عقدة تصنيفية محددة لأنماط مزودي التعليم ضمن هرمية أنواع المزودين.
      id: Simpul taksonomi spesifik untuk varian penyedia pendidikan dalam hierarki tipe penyedia.
      zh: 用于提供方类型层级中教育提供方细分变体的具体分类节点。
    structured_aliases:
    - {literal_form: subtype onderwijsaanbieder, in_language: nl}
    - {literal_form: Bildungsanbietersubtyp, in_language: de}
    - {literal_form: sous-type de fournisseur educatif, in_language: fr}
    - {literal_form: subtipo de proveedor educativo, in_language: es}
    - {literal_form: نوع فرعي لمزود التعليم, in_language: ar}
    - {literal_form: subtipe penyedia pendidikan, in_language: id}
    - {literal_form: 教育提供方子类型, in_language: zh}
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:EducationalOrganization

    slots:
    - has_label
    - identified_by

    annotations:
      custodian_types: '["E"]'
      specificity_score: 0.7
      specificity_rationale: Classification for education providers.
