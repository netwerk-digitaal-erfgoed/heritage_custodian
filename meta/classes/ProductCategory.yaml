id: https://nde.nl/ontology/hc/class/ProductCategory
name: ProductCategory
title: ProductCategory
description: >-
  Category of a product.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
  - linkml:types
  - ../slots/has_label
classes:
  ProductCategory:
    class_uri: skos:Concept
    description: >-
      Classification concept that groups products or items based on shared characteristics,
      function, material, or intended use within a categorization system.
    alt_descriptions:
      nl: >-
        Classificatieconcept dat producten of artikelen groepeert op basis van gemeenschappelijke
        kenmerken, functie, materiaal of beoogd gebruik binnen een categoriseringssysteem.
      de: >-
        Klassifikationskonzept, das Produkte oder Artikel basierend auf gemeinsamen Merkmalen,
        Funktion, Material oder vorgesehenem Verwendungszweck innerhalb eines Kategorisierungssystems gruppiert.
      fr: >-
        Concept de classification qui regroupe des produits ou des articles sur la base de caractéristiques
        communes, de fonction, de matériau ou d'usage prévu dans un système de catégorisation.
      es: >-
        Concepto de clasificación que agrupa productos o artículos basándose en características
        compartidas, función, material o uso previsto dentro de un sistema de categorización.
      ar: >-
        مفهوم تصنيفي يجمع المنتجات أو العناصر بناءً على الخصائص المشتركة
        أو الوظيفة أو المادة أو الاستخدام المقصود ضمن نظام تصنيفي.
      id: >-
        Konsep klasifikasi yang mengelompokkan produk atau item berdasarkan karakteristik
        bersama, fungsi, material, atau penggunaan yang dimaksudkan dalam sistem kategorisasi.
      zh: >-
        分类概念，根据分类系统中的共同特征、功能、材料或预期用途对产品或项目进行分组。
    exact_mappings:
      - schema:CategoryCode
    broad_mappings:
      - skos:Concept
      - schema:Thing
    keywords:
      - product category
      - classification
      - categorization
      - taxonomy term
    examples:
      - value: paintings
        description: Category for painted artworks
      - value: sculptures
        description: Category for three-dimensional artworks
    structured_aliases:
      - literal_form: productcategorie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Produktkategorie
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: catégorie de produit
        predicate: EXACT_SYNONYM
        in_language: fr
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
      - has_label
