id: https://nde.nl/ontology/hc/class/EventType
name: EventType
title: Event Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
  - ../slots/has_score
classes:
  EventType:
    class_uri: hc:EventType
    description: >-
      Controlled category used to classify temporal occurrences by their
      functional or historical character.
    alt_descriptions:
      nl: Gecontroleerde categorie om temporele gebeurtenissen op functioneel of historisch karakter te classificeren.
      de: Kontrollierte Kategorie zur Klassifikation zeitlicher Vorgaenge nach funktionalem oder historischem Charakter.
      fr: Categorie controlee servant a classifier les occurrences temporelles selon leur caractere fonctionnel ou historique.
      es: Categoria controlada para clasificar ocurrencias temporales segun su caracter funcional o historico.
      ar: فئة مضبوطة لتصنيف الوقوعات الزمنية بحسب طابعها الوظيفي أو التاريخي.
      id: Kategori terkendali untuk mengklasifikasikan kejadian temporal menurut karakter fungsional atau historisnya.
      zh: 用于按功能或历史特征分类时间发生的受控类别。
    structured_aliases:
      - literal_form: gebeurtenistype
        in_language: nl
      - literal_form: Ereignistyp
        in_language: de
      - literal_form: type d'evenement
        in_language: fr
      - literal_form: tipo de evento
        in_language: es
      - literal_form: نوع الحدث
        in_language: ar
      - literal_form: tipe peristiwa
        in_language: id
      - literal_form: 事件类型
        in_language: zh
    slots:
      - identified_by
      - has_label
      - has_description
      - has_score
    broad_mappings:
      - skos:Concept
    annotations:
      specificity_score: "0.2"
      specificity_rationale: Generic vocabulary class for event classification.
      custodian_types: "['*']"
