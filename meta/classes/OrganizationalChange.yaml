id: https://nde.nl/ontology/hc/classes/OrganizationalChange
name: OrganizationalChange
title: OrganizationalChange
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  org: http://www.w3.org/ns/org#
imports:
- linkml:types
# default_range: string
classes:
  OrganizationalChange:
    description: Record describing an organizational lifecycle change such as merger, split, rename, or closure.
    alt_descriptions:
      nl: Registratie van een organisatorische levenscycluswijziging zoals fusie splitsing hernoeming of sluiting.
      de: Eintrag zu einer organisatorischen Lebenszyklusaenderung wie Fusion Aufspaltung Umbenennung oder Schliessung.
      fr: Enregistrement d un changement du cycle de vie organisationnel tel qu une fusion scission renomination ou fermeture.
      es: Registro de un cambio del ciclo de vida organizativo como fusion escision renombrado o cierre.
      ar: سجل يصف تغييرا في دورة حياة المنظمة مثل الدمج أو الانقسام أو إعادة التسمية أو الإغلاق.
      id: Rekaman perubahan siklus hidup organisasi seperti merger pemisahan penggantian nama atau penutupan.
      zh: 描述组织生命周期变更（如合并、拆分、更名或关闭）的记录。
    structured_aliases:
    - {literal_form: registratie organisatorische wijziging, in_language: nl}
    - {literal_form: Aufzeichnung Organisationsaenderung, in_language: de}
    - {literal_form: enregistrement de changement organisationnel, in_language: fr}
    - {literal_form: registro de cambio organizativo, in_language: es}
    - {literal_form: سجل تغيير تنظيمي, in_language: ar}
    - {literal_form: rekaman perubahan organisasi, in_language: id}
    - {literal_form: 组织变更记录, in_language: zh}
    class_uri: org:ChangeEvent
    close_mappings:
    - prov:Activity
    related_mappings:
    - schema:Event
    - prov:Entity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_note
