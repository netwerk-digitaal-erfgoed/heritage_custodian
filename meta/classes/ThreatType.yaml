classes:
  ThreatType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Category of endangerment, risk, or adverse condition affecting heritage sustainability, based on UNESCO intangible cultural heritage classification.
    alt_descriptions:
      nl: Categorie van bedreigingen, risico's of ongunstige omstandigheden die de levensvatbaarheid van erfgoed beïnvloeden.
      de: Kategorie von Bedrohungen, Risiken oder nachteiligen Bedingungen, die die Nachhaltigkeit des Kulturerbes beeinträchtigen.
      fr: Catégorie de menaces, de risques ou de conditions défavorables affectant la viabilité du patrimoine.
      es: 'Concepto para: Category of endangerment, risk, or adverse condition affecting heritage sustainability, based on UNESCO intangible cultural heritage classification.'
      ar: 'مفهوم لـ: Category of endangerment, risk, or adverse condition affecting heritage sustainability, based on UNESCO intangible cultural heritage classification.'
      id: 'Konsep untuk: Category of endangerment, risk, or adverse condition affecting heritage sustainability, based on UNESCO intangible cultural heritage classification.'
      zh: 用于以下内容的概念：Category of endangerment, risk, or adverse condition affecting heritage sustainability, based on UNESCO intangible cultural heritage classification.
    structured_aliases:
    - literal_form: bedreigingstype
      in_language: nl
    - literal_form: Bedrohungstyp
      in_language: de
    - literal_form: type de menace
      in_language: fr
    - literal_form: threat type
      in_language: es
    - literal_form: threat type
      in_language: ar
    - literal_form: threat type
      in_language: id
    - literal_form: threat type
      in_language: zh
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    comments:
    - Subclasses define specific categories of endangerment to heritage viability
    - Based on UNESCO intangible cultural heritage threat categories
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
