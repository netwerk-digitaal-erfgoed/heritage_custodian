id: https://nde.nl/ontology/hc/class/PublicationSeries
name: PublicationSeries
title: Publication Series
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  bibo: http://purl.org/ontology/bibo/
  dcterms: http://purl.org/dc/terms/

default_prefix: hc

imports:
- linkml:types
- ../slots/has_name
classes:
  PublicationSeries:
    class_uri: schema:Periodical
    description: >-
      Continuing issued set of related works released sequentially under a common title.
    alt_descriptions:
      nl: >-
        Doorlopend uitgegeven set verwante werken die opeenvolgend worden
        vrijgegeven onder een gemeenschappelijke titel.
      de: >-
        Fortlaufend herausgegebene Reihe verwandter Werke, die nacheinander
        unter einem gemeinsamen Titel veröffentlicht werden.
      fr: >-
        Ensemble continu d'œuvres apparentées publiées séquentiellement
        sous un titre commun.
      es: >-
        Conjunto continuo de obras relacionadas publicadas secuencialmente
        bajo un título común.
      ar: >-
        مجموعة مستمرة من الأعمال ذات الصلة تصدر بالتسلسل تحت عنوان مشترك.
      id: >-
        Kumpulan karya terkait yang diterbitkan secara berkelanjutan dan berurutan
        di bawah judul bersama.
      zh: >-
        在共同标题下按顺序发行的连续相关作品集。
    structured_aliases:
    - literal_form: reeks
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Reihe
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: série
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Periodical
    - bibo:Series
    - dcterms:BibliographicResource
    slots:
    - has_name
    comments:
    - Groups individually published items under a shared editorial framework.
    - Distinguished from periodicals by emphasis on cumulative thematic coherence.
    - 'Preserved from prior description: Publication series.'
    keywords:
    - serial publication
    - continuing series
    - bibliographic collection
    - editorial grouping
    examples:
    - value:
        has_name: Studies in Dutch Cultural History
      description: Academic monograph series with thematic focus
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
