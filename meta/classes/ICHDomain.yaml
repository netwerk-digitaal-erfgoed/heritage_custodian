id: https://nde.nl/ontology/hc/class/ICHDomain
name: ICHDomain
title: ICH Domain
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_description
classes:
  ICHDomain:
    class_uri: hc:ICHDomain
    description: >-
      Controlled classification domain for categorizing non-physical heritage practices,
      traditions, and living expressions.
    alt_descriptions:
      nl: >-
        Gecontroleerd classificatiedomein voor het categoriseren van niet-fysieke erfgoedpraktijken,
        tradities en levende uitdrukkingen.
      de: >-
        Kontrolliertes Klassifikationsgebiet zur Kategorisierung von nicht-physischen Heritage-Praktiken,
        Traditionen und lebendigen Ausdrucksformen.
      fr: >-
        Domaine de classification contrôlé pour catégoriser les pratiques patrimoniales non matérielles,
        les traditions et les expressions vivantes.
      es: >-
        Dominio de clasificación controlado para categorizar prácticas patrimoniales no físicas,
        tradiciones y expresiones vivas.
      ar: >-
        مجال تصنيف مضبوط لتصنيف ممارسات التراث غير المادية والتقاليد والتعبيرات الحية.
      id: >-
        Domain klasifikasi terkontrol untuk mengategorikan praktik warisan non-fisik,
        tradisi, dan ekspresi hidup.
      zh: >-
        用于对非物质遗产实践、传统和活态表达进行分类的受控分类领域。
    structured_aliases:
    - literal_form: ICH-domein
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: ICH-Bereich
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: domaine PCI
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: dominio PCI
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجال التراث الثقافي غير المادي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: domain ICH
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 非遗领域
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_label
    - has_description
    broad_mappings:
    - skos:Concept
    comments:
    - Aligns with UNESCO 2003 Convention ICH domain categories.
    - Five primary domains: oral traditions, performing arts, social practices, knowledge/practices, traditional craftsmanship.
    - 'Preserved from prior description: Controlled domain category for classifying intangible cultural heritage expressions and practices.'
    keywords:
    - intangible heritage
    - cultural traditions
    - living practices
    - UNESCO domains
    examples:
    - value:
        has_label: Performing Arts
        has_description: Traditional music, dance, and theatrical performances.
      description: UNESCO ICH performing arts domain
