id: https://nde.nl/ontology/hc/class/IndexType
name: index_type_class
title: Index Type Base Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
classes:
  IndexType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomy concept for classifying the organizational logic of an
      index structure.
    alt_descriptions:
      nl: Abstract taxonomieconcept voor classificatie van de ordeningslogica van een indexstructuur.
      de: Abstraktes Taxonomiekonzept zur Klassifikation der Organisationslogik einer Indexstruktur.
      fr: Concept taxonomique abstrait pour classifier la logique d organisation d une structure d index.
      es: Concepto taxonomico abstracto para clasificar la logica organizativa de una estructura de indice.
      ar: مفهوم تصنيفي مجرد لتصنيف منطق التنظيم داخل بنية الفهرس.
      id: Konsep taksonomi abstrak untuk mengklasifikasikan logika pengorganisasian pada struktur indeks.
      zh: 用于分类索引结构组织逻辑的抽象分类学概念。
    structured_aliases:
    - {literal_form: type indexstructuur, in_language: nl}
    - {literal_form: Indextyp, in_language: de}
    - {literal_form: type d index, in_language: fr}
    - {literal_form: tipo de indice, in_language: es}
    - {literal_form: نوع فهرس, in_language: ar}
    - {literal_form: tipe indeks, in_language: id}
    - {literal_form: 索引类型, in_language: zh}
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    slot_usage:
      identified_by:
        identifier: true
        required: true
      has_label:
        multivalued: true
        required: true
    annotations:
      specificity_score: 0.6
      specificity_rationale: 'Index types are moderately specific - apply to publications

        and finding aids but not broadly across heritage entities.

        '
      migration_source: table_of_content slot
      migration_date: '2026-01-16'
      migration_rule: Rule 53/56
      custodian_types: "['*']"
    comments:
    - Abstract base - use concrete subclasses from IndexTypes.yaml
    - Created for table_of_content migration per Rule 53/56 (2026-01-16)
