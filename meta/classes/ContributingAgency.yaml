id: https://nde.nl/ontology/hc/class/ContributingAgency
name: contributing_agency
title: Contributing Agency Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  dcat: http://www.w3.org/ns/dcat#
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
- linkml:types
- ../slots/contribute_to
- ../slots/begin_of_the_begin
- ../slots/has_description
- ../slots/has_label
- ../slots/has_role
- ../slots/has_score
- ../slots/has_url
- ../slots/current
- ../slots/represented_by
- ../slots/member_of
- ../slots/provide
- ../slots/has_format
classes:
  ContributingAgency:
    class_uri: org:FormalOrganization
    description: >-
      Formal organization that submits authority datasets to a shared aggregation and reconciliation service.
    alt_descriptions:
      nl: Formele organisatie die autoriteitsdatasets aan een gedeelde aggregatie- en reconciliatiedienst levert.
      de: Formale Organisation, die Normdatensaetze an einen gemeinsamen Aggregations- und Abgleichsdienst liefert.
      fr: Organisation formelle qui fournit des jeux d'autorites a un service commun d'agrégation et de rapprochement.
      es: Organizacion formal que aporta conjuntos de autoridades a un servicio compartido de agregacion y reconciliacion.
      ar: مؤسسة رسمية تزوّد بيانات استنادية لخدمة مشتركة للتجميع والتوفيق.
      id: Organisasi formal yang menyumbangkan dataset otoritas ke layanan agregasi dan rekonsiliasi bersama.
      zh: 向共享聚合与对齐服务提交规范数据集的正式机构。
    broad_mappings:
    - org:FormalOrganization
    close_mappings:
    - prov:Agent
    - dcat:Catalog
    slots:
    - has_label
    - contribute_to
    - has_format
    - provide
    - begin_of_the_begin
    - current
    - represented_by
    - has_url
    - has_description
    - member_of
    - has_role
    - has_score
