id: https://nde.nl/ontology/hc/classes/PhotoAttribution
name: PhotoAttribution
title: PhotoAttribution
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
- linkml:types
# default_range: string
classes:
  PhotoAttribution:
    description: >-
      Photo author attribution containing display name, author URI, and photo URI.
      Used for crediting photographers in Google Maps and other image sources.
    alt_descriptions:
      nl: Foto-auteursvermelding met weergavenaam, auteur-URI en foto-URI.
      de: Foto-Autorenzuordnung mit Anzeigename, Autor-URI und Foto-URI.
      fr: Attribution de photo avec nom d'affichage, URI auteur et URI photo.
    structured_aliases:
    - literal_form: foto-attributie
      in_language: nl
    - literal_form: Foto-Zuordnung
      in_language: de
    comments:
    - Attribution is a form of rights/credit statement for photographers.
    class_uri: schema:ImageObject
    broad_mappings:
    - schema:ImageObject
    close_mappings:
    - dcterms:RightsStatement
    related_mappings:
    - prov:Attribution
    - schema:Person
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
