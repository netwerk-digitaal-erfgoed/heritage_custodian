id: https://nde.nl/ontology/hc/class/VideoIdentifier
name: VideoIdentifier
title: Video Identifier
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_code
classes:
  VideoIdentifier:
    class_uri: hc:VideoIdentifier
    description: >-
      Persistent unique code assigned to audiovisual content items for
      platform-specific retrieval and reference.
    alt_descriptions:
      nl: >-
        Permanente unieke code toegekend aan audiovisuele content-items voor
        platformspecifieke ophaling en referentie.
      de: >-
        Persistenter eindeutiger Code, der Audioinhalten zur plattformspezifischen
        Abrufung und Referenz zugewiesen wird.
      fr: >-
        Code unique persistant attribué aux éléments de contenu audiovisuel pour
        la récupération et la référence spécifiques à la plateforme.
      es: >-
        Código único persistente asignado a elementos de contenido audiovisual para
        recuperación y referencia específica de plataforma.
      ar: >-
        رمز فريد دائم يُخصص لعناصر المحتوى السمعي البصري للاسترجاع والمرجعية الخاصة بالمنصة.
      id: >-
        Kode unik persisten yang ditetapkan untuk item konten audiovisual untuk
        pengambilan dan referensi khusus platform.
      zh: >-
        分配给视听内容项的持久唯一代码，用于平台特定的检索和引用。
    slots:
    - has_code
    close_mappings:
    - schema:identifier
    annotations:
      specificity_score: '0.50'
      specificity_rationale: Moderately specific - video identifiers common in digital heritage.
      custodian_types: '[''*'']'
    examples:
    - value:
        has_code: dQw4w9WgXcQ
        platform: YouTube
      description: YouTube video identifier
    comments:
    - 'Preserved from prior description: An identifier for a video resource. **USAGE**: Used for: - YouTube video IDs - Vimeo video IDs - Platform-specific identifiers'
