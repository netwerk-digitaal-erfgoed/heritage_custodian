id: https://nde.nl/ontology/hc/class/ScopeTypes
name: ScopeTypes
title: Scope Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
