classes:
  TemporalScope:
    is_a: ScopeType
    class_uri: hc:TemporalScope
    description: Scope classification concept for data completeness and observation coverage.
    alt_descriptions:
      nl: >-
        Bereikclassificatieconcept voor gegevensvolledigheid en observatiedekking.
      de: >-
        Bereichsklassifizierungskonzept fuer Datenvollstaendigkeit und Beobachtungsabdeckung.
      fr: >-
        Concept de classification de portee pour l'exhaustivite des donnees et la couverture d'observation.
      es: >-
        Concepto de clasificacion de alcance para la integridad de datos y la cobertura de observacion.
      ar: >-
        مفهوم تصنيف النطاق لكمال البيانات وتغطية الملاحظة.
      id: >-
        Konsep klasifikasi cakupan untuk kelengkapan data dan jangkauan pengamatan.
      zh: >-
        用于数据完整性和观察覆盖范围的范围分类概念。
    structured_aliases:
    - literal_form: temporeel bereik
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: zeitlicher Bereich
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: portee temporelle
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: alcance temporal
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نطاق زمني
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: cakupan temporal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 时间范围
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - temporal
    - time
    - period
    - date
    - chronological
    - era
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - dct:PeriodOfTime
    comments:
    - 'Examples: "1600-1700", "Medieval period", "19th century".'
    - 'Preserved from prior description: Scope type for time-based coverage.'
