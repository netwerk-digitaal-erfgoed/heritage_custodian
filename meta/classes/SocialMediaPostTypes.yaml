      in_language: ar
    - literal_form: tipe-postingan-artikel
      in_language: id
    - literal_form: 文章帖子类型
      in_language: zh
    keywords:
    - article
    - long-form writing
    - blog
    - Medium
    - Substack
    - LinkedIn Articles
    - in-depth content
    broad_mappings:
    - as:Article
    - skos:Concept
    close_mappings:
    - schema:Article
    - schema:BlogPosting
    slot_usage:
      categorized_as:
        equals_string: ARTICLE
      ephemeral:
        required: true
        ifabsent: 'false'
