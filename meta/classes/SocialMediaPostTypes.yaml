        equals_string_in:
        - Medium
        - Substack
        - LinkedIn
        - WordPress
    comments:
    - Best for in-depth heritage storytelling
    - Medium popular for cultural content
    - Substack for newsletter-style distribution
    - LinkedIn Articles for professional audience
    slots:
    - has_score
  ThreadPostType:
    is_a: SocialMediaPostType
    class_uri: hc:Thread
    description: >-
      Sequential multi-post format for extended narrative storytelling across linked entries.
    alt_descriptions:
