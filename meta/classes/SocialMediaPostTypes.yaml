      de: Sequentielles Multi-Post-Format für erweiterte erzählerische Geschichten über verknüpfte Einträge.
      fr: Format multi-message séquentiel pour des récits narratifs étendus à travers des entrées liées.
      es: Formato secuencial de múltiples publicaciones para narrativas extendidas a través de entradas vinculadas.
      ar: تنسيق متسلسل متعدد المنشورات لسرد القصص الموسعة عبر الإدخالات المرتبطة.
      id: Format multi-posting berurutan untuk cerita naratif yang diperpanjang melalui entri tertaut.
      zh: 通过链接条目进行扩展叙事讲故事的顺序多帖格式。
    structured_aliases:
    - literal_form: thread-post-type
      in_language: nl
    - literal_form: ThreadPostType
      in_language: de
    - literal_form: type-post-fil
      in_language: fr
    - literal_form: tipo-post-hilo
      in_language: es
    - literal_form: نوع-منشور-الخيط
      in_language: ar
    - literal_form: tipe-postingan-utas
      in_language: id
    - literal_form: 串帖类型
      in_language: zh
    keywords:
    - thread
    - multi-post
    - sequential
    - storytelling
    - Twitter thread
    - Bluesky thread
    - narrative
    close_mappings:
    - as:Collection
    - schema:ItemList
    slot_usage:
      categorized_as:
        equals_string: THREAD
      ephemeral:
        required: true
        ifabsent: 'false'
      applicable_in:
        equals_string_in:
        - XTwitter
        - Mastodon
        - Bluesky
        - Threads
    comments:
    - Popular format for heritage storytelling
    - Overcomes character limits creatively
    - '#MuseumWeek and similar campaigns use threads'
    - Thread reader tools compile into articles
    slots:
    - has_score
    broad_mappings:
    - skos:Concept
  CarouselPostType:
    is_a: SocialMediaPostType
    class_uri: hc:Carousel
    description: >-
      Swipeable multi-item format combining multiple images or media assets in a single post.
    alt_descriptions:
      nl: Veegbaar multi-itemformaat dat meerdere afbeeldingen of media-assets combineert in één bericht.
      de: Wischbares Multi-Item-Format, das mehrere Bilder oder Medien-Assets in einem einzigen Post kombiniert.
      fr: Format multi-éléments glissable combinant plusieurs images ou ressources média dans une seule publication.
      es: Formato deslizable de múltiples elementos que combina múltiples imágenes o recursos multimedia en una sola publicación.
      ar: تنسيق متعدد العناصر القابلة للتمرير يجمع صورًا متعددة أو أصول وسائط في منشور واحد.
      id: Format multi-item yang dapat digeser menggabungkan beberapa gambar atau aset media dalam satu postingan.
      zh: 在单个帖子中组合多个图像或媒体资产的可滑动多项目格式。
    structured_aliases:
    - literal_form: carousel-post-type
      in_language: nl
