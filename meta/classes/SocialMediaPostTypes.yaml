    - schema:ImageGallery
    slot_usage:
      categorized_as:
        equals_string: CAROUSEL
      ephemeral:
        required: true
        ifabsent: 'false'
      applicable_in:
        equals_string_in:
        - Instagram
        - LinkedIn
        - Facebook
        - XTwitter
    comments:
    - Excellent for detailed collection storytelling
    - Instagram carousels have highest engagement
    - Good for before/after conservation
    - LinkedIn carousels popular for professional content
    slots:
    - has_score
    broad_mappings:
    - skos:Concept
  OtherPostType:
    is_a: SocialMediaPostType
    class_uri: as:Object
    description: >-
      Fallback category for content formats not matching established classifications.
    alt_descriptions:
      nl: Terugvalcategorie voor inhoudsformaten die niet overeenkomen met gevestigde classificaties.
      de: Rückfallkategorie für Inhaltsformate, die nicht mit etablierten Klassifikationen übereinstimmen.
      fr: Catégorie de repli pour les formats de contenu ne correspondant pas aux classifications établies.
