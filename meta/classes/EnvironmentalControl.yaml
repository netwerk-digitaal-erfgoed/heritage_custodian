id: https://nde.nl/ontology/hc/class/EnvironmentalControl
name: EnvironmentalControl
title: Environmental Control
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  sosa: http://www.w3.org/ns/sosa/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  EnvironmentalControl:
    class_uri: hc:EnvironmentalControl
    description: >-
      Control mechanism or operational intervention used to maintain target
      storage climate conditions.
    alt_descriptions:
      nl: Regelmechanisme of operationele ingreep om doelwaarden van het bewaarklimaat te handhaven.
      de: Regelmechanismus oder betriebliche Massnahme zur Einhaltung von Sollwerten des Lagerklimas.
      fr: Mecanisme de regulation ou intervention operationnelle utilise pour maintenir les conditions climatiques cibles de stockage.
      es: Mecanismo de control o intervencion operativa para mantener condiciones climaticas objetivo en almacenamiento.
      ar: آلية ضبط أو تدخل تشغيلي يُستخدم للحفاظ على شروط المناخ المستهدفة في التخزين.
      id: Mekanisme kendali atau intervensi operasional untuk mempertahankan kondisi iklim penyimpanan yang ditargetkan.
      zh: 用于维持存储环境目标气候条件的控制机制或操作干预。
    structured_aliases:
      - literal_form: klimaatregeling
        in_language: nl
      - literal_form: Klimasteuerung
        in_language: de
      - literal_form: controle climatique
        in_language: fr
      - literal_form: control ambiental
        in_language: es
      - literal_form: تحكم بيئي
        in_language: ar
      - literal_form: kendali lingkungan
        in_language: id
      - literal_form: 环境控制
        in_language: zh
    slots:
      - has_label
      - has_description
    broad_mappings:
      - sosa:Actuation
      - schema:Product
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.3"
      specificity_rationale: Conservation operations artifact for climate management.
