id: https://nde.nl/ontology/hc/class/Custodian
name: Custodian
title: Custodian Hub Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  foaf: http://xmlns.com/foaf/0.1/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_type
- ../slots/has_label
- ../slots/has_score
- ../slots/temporal_extent
- ../slots/has_collection
- ../slots/has_digital_presence
- ../slots/has_status
classes:
  Custodian:
    class_uri: crm:E39_Actor
    description: >-
      Persistent hub entity representing an actor that exercises custody, used to connect observed evidence and reconstructed aspects.
    alt_descriptions:
      nl: Persistente hub-entiteit voor een actor met beheerrol, gebruikt om observaties en gereconstrueerde aspecten te verbinden.
      de: Persistente Hub-Entitaet fuer einen verwahrenden Akteur zur Verknuepfung von Beobachtungen und rekonstruierten Aspekten.
      fr: Entite pivot persistante representant un acteur de garde, reliant observations et aspects reconstruits.
      es: Entidad hub persistente que representa un actor custodio y conecta observaciones con aspectos reconstruidos.
      ar: كيان محوري دائم يمثل جهة حافظة ويصل بين الملاحظات والجوانب المعاد بناؤها.
      id: Entitas hub persisten yang mewakili aktor kustodian untuk menghubungkan observasi dan aspek hasil rekonstruksi.
      zh: 表示保管行为体的持久枢纽实体，用于连接观测证据与重建结果。
    broad_mappings:
    - prov:Agent
    - rico:Agent
    - foaf:Agent
    - schema:Thing
    - crm:E39_Actor
    close_mappings:
    - schema:Organization
    - schema:Person
    - crm:E40_Legal_Body
    - crm:E21_Person
    slots:
    - identified_by
    - has_type
    - has_label
    - has_status
    - has_collection
    - has_digital_presence
    - temporal_extent
    - has_score
    slot_usage:
      identified_by:
        required: true
        identifier: true
