id: https://nde.nl/ontology/hc/classes/WikidataResolvedEntities
name: WikidataResolvedEntities
title: Wikidata Resolved Entities Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
classes:
  WikidataResolvedEntities:
    description: >-
      Lookup cache of property metadata keyed by P-identifiers after entity
      disambiguation.
    alt_descriptions:
      nl: >-
        Opzoekcache van eigenschapsmetadata, gesleuteld op P-identificatoren na
        entiteitsdisambiguatie.
      de: >-
        Lookup-Cache von Eigenschaftsmetadaten, nach P-Kennungen geschlüsselt
        nach Entitätsdisambiguierung.
      fr: >-
        Cache de consultation des métadonnées de propriété, indexé par
        identifiants P après désambiguïsation.
      es: >-
        Caché de consulta de metadatos de propiedades, indexado por
        identificadores P tras la desambiguación.
      ar: >-
        ذاكرة تخزين مؤقت لبيانات الخصائص، مفهرسة بمعرّفات P بعد إزالة
        الالتباس عن الكيانات.
      id: >-
        Cache pencarian metadata properti yang dikunci oleh pengenal P setelah
        disambiguasi entitas.
      zh: >-
        实体消歧后按P标识符索引的属性元数据查找缓存。
    broad_mappings:
    - linkml:Any
    slots: []
    comments:
    - Keys are property IDs (P123, P456, etc.)
    - Values are property metadata objects
    - Used for caching resolved Wikidata lookups
    - 'Preserved from prior description: Lookup cache of resolved property metadata keyed by P-identifiers.'
    keywords:
    - wikidata
    - cache
    - resolved
    - property
    - metadata
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for caching resolved entities
      custodian_types: "['*']"
    structured_aliases:
    - literal_form: opgeloste wikidata-entiteiten
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: aufgelöste Wikidata-Entitäten
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: entités Wikidata résolues
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: entidades Wikidata resueltas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: كيانات ويكي بيانات محلولة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: entitas Wikidata terselesaikan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 已解析维基数据实体
      predicate: EXACT_SYNONYM
      in_language: zh
