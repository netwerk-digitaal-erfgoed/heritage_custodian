imports:
- ./TechnologicalInfrastructureType
- linkml:types
default_prefix: hc
classes:
  Framework:
    is_a: TechnologicalInfrastructureType
    class_uri: hc:Framework
    description: >-
      Web application framework for frontend or backend development.
    alt_descriptions:
      nl: Webapplicatieframework voor frontend- of backend-ontwikkeling.
      de: Webanwendungsframework für Frontend- oder Backend-Entwicklung.
      fr: Framework d'application web pour le développement frontend ou backend.
      es: Framework de aplicación web para desarrollo frontend o backend.
      ar: إطار عمل تطبيق الويب لتطوير الواجهة الأمامية أو الخلفية.
      id: Framework aplikasi web untuk pengembangan frontend atau backend.
      zh: 用于前端或后端开发的Web应用框架。
    structured_aliases:
    - literal_form: raamwerk
      in_language: nl
    - literal_form: Framework
      in_language: de
    - literal_form: framework
      in_language: fr
    - literal_form: framework
      in_language: es
    - literal_form: إطار عمل
      in_language: ar
    - literal_form: framework
      in_language: id
    - literal_form: 框架
      in_language: zh
    keywords:
    - framework
    - web application
    - frontend
    - backend
    - development
    annotations:
      category: application
      doap_alignment: doap:platform
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    comments:
    - Examples: React, Vue, Angular, Django, Rails, Spring, Express
  FrontendFramework:
    is_a: Framework
    class_uri: hc:FrontendFramework
    description: >-
      Client-side JavaScript or TypeScript framework for user interface development.
    alt_descriptions:
      nl: Client-side JavaScript/TypeScript-framework voor gebruikersinterface-ontwikkeling.
      de: Client-seitiges JavaScript/TypeScript-Framework für Benutzeroberflächenentwicklung.
      fr: Framework frontend JavaScript/TypeScript pour le développement d'interface utilisateur.
      es: Framework frontend de JavaScript/TypeScript para desarrollo de interfaz de usuario.
      ar: إطار عمل الواجهة الأمامية بلغة JavaScript/TypeScript لتطوير واجهة المستخدم.
      id: Framework frontend JavaScript/TypeScript untuk pengembangan antarmuka pengguna.
      zh: 用于用户界面开发的客户端JavaScript/TypeScript框架。
