      es: Tecnología de sistema de gestión de base de datos para almacenamiento y recuperación de datos.
      ar: تقنية نظام إدارة قواعد البيانات لتخزين واسترجاع البيانات.
      id: Teknologi sistem manajemen basis data untuk penyimpanan dan pengambilan data.
      zh: 用于数据存储和检索的数据库管理系统技术。
    structured_aliases:
    - literal_form: databasesysteem
      in_language: nl
    - literal_form: Datenbanksystem
