    is_a: Framework
    class_uri: hc:BackendFramework
    description: >-
      Server-side web framework for API and business logic development.
    alt_descriptions:
      nl: Server-side webframework voor API- en bedrijfslogica-ontwikkeling.
      de: Server-seitiges Webframework für API- und Geschäftslogik-Entwicklung.
      fr: Framework web backend pour le développement d'API et de logique métier.
      es: Framework web backend para desarrollo de API y lógica de negocio.
