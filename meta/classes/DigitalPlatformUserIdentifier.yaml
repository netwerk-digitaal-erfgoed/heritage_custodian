classes:
  DigitalPlatformUserIdentifier:
    is_a: Identifier
    class_uri: hc:DigitalPlatformUserIdentifier
    description: >-
      Account-level identifier linking contributors, authors, or organizations to their profiles on external digital services.
    alt_descriptions:
      nl: >-
        Identificatiecode op accountniveau die bijdragers, auteurs of organisaties koppelt aan hun profielen op externe digitale diensten.
      de: >-
        Kennung auf Kontenebene, die Mitwirkende, Autoren oder Organisationen mit ihren Profilen auf externen digitalen Diensten verknüpft.
      fr: >-
        Identifiant au niveau du compte reliant les contributeurs, auteurs ou organisations à leurs profils sur des services numériques externes.
      es: >-
        Identificador a nivel de cuenta que vincula contribuyentes, autores u organizaciones con sus perfiles en servicios digitales externos.
      ar: >-
        معرف على مستوى الحساب يربط المساهمين أو المؤلفين أو المنظمات بملفاتهم الشخصية على الخدمات الرقمية الخارجية.
      id: >-
        Pengenal tingkat akun yang menghubungkan kontributor, penulis, atau organisasi ke profil mereka di layanan digital eksternal.
      zh: >-
        将贡献者、作者或组织链接到外部数字服务上其个人资料的账户级标识符。
