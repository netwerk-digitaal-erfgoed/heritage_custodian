id: https://nde.nl/ontology/hc/class/ComponentTypes
name: component_types_class
title: Component Types Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- ./ComponentType
- linkml:types
default_prefix: hc
classes:
  StreetNumberComponent:
    is_a: ComponentType
    class_uri: hc:StreetNumber
    description: >-
      Type node for numeric or alphanumeric locator values used to identify a
      building along a route.
    alt_descriptions:
      nl: Typenode voor numerieke of alfanumerieke locatiewaarden die een gebouw langs een straat identificeren.
      de: Typknoten fuer numerische oder alphanumerische Kennwerte zur Identifizierung eines Gebaeudes entlang einer Strasse.
      fr: Noeud de type pour des valeurs numeriques ou alphanumeriques identifiant un batiment le long d une voie.
      es: Nodo de tipo para valores numericos o alfanumericos que identifican un edificio en una via.
      ar: عقدة نوع لقيم رقمية أو رقمية حرفية لتحديد مبنى على امتداد طريق.
      id: Simpul tipe untuk nilai numerik atau alfanumerik yang mengidentifikasi bangunan di sepanjang rute.
      zh: 用于标识道路沿线建筑之数字或字母数字定位值的类型节点。
    structured_aliases:
    - {literal_form: huisnummercomponent, in_language: nl}
    - {literal_form: Hausnummerkomponente, in_language: de}
    - {literal_form: composant numero de rue, in_language: fr}
    - {literal_form: componente numero de via, in_language: es}
    - {literal_form: مكوّن رقم المبنى, in_language: ar}
    - {literal_form: komponen nomor jalan, in_language: id}
    - {literal_form: 门牌号组件, in_language: zh}
    keywords:
    - house number
    - street number
    - building locator
    - address component
    broad_mappings: [skos:Concept]

  RouteComponent:
    is_a: ComponentType
    class_uri: hc:Route
    description: >-
      Type node for thoroughfare naming elements such as street or road names.
    alt_descriptions:
      nl: Typenode voor naamdelen van wegen of straten.
      de: Typknoten fuer Benennungselemente von Strassen und Wegen.
      fr: Noeud de type pour les elements de denomination de rue ou de voie.
      es: Nodo de tipo para elementos de denominacion de calles o vias.
      ar: عقدة نوع لعناصر تسمية الشوارع والطرق.
      id: Simpul tipe untuk elemen penamaan jalan atau rute.
      zh: 用于街道或道路名称要素的类型节点。
    structured_aliases:
    - {literal_form: straatnaamcomponent, in_language: nl}
    - {literal_form: Strassenkomponente, in_language: de}
    - {literal_form: composant voie, in_language: fr}
    - {literal_form: componente via, in_language: es}
    - {literal_form: مكوّن اسم الطريق, in_language: ar}
    - {literal_form: komponen nama jalan, in_language: id}
    - {literal_form: 路名组件, in_language: zh}
    keywords:
    - street name
    - road name
    - thoroughfare
    - route designation
    broad_mappings: [skos:Concept]

  LocalityComponent:
    is_a: ComponentType
    class_uri: hc:Locality
    description: >-
      Type node for municipality-level place names used in location strings.
    alt_descriptions:
      nl: Typenode voor plaatsnamen op gemeentelijk niveau in locatieketens.
      de: Typknoten fuer Ortsnamen auf Gemeindeebene in Standortangaben.
      fr: Noeud de type pour les toponymes au niveau de la commune dans les chaines de localisation.
      es: Nodo de tipo para nombres de localidad a nivel municipal en cadenas de ubicacion.
      ar: عقدة نوع لأسماء المحليات على مستوى البلدية ضمن سلاسل الموقع.
      id: Simpul tipe untuk nama lokalitas tingkat kota/kabupaten dalam rangkaian lokasi.
      zh: 用于位置字符串中市镇级地名的类型节点。
    structured_aliases:
    - {literal_form: plaatscomponent, in_language: nl}
    - {literal_form: Ortskomponente, in_language: de}
    - {literal_form: composant localite, in_language: fr}
    - {literal_form: componente localidad, in_language: es}
    - {literal_form: مكوّن المحلّة, in_language: ar}
    - {literal_form: komponen lokalitas, in_language: id}
    - {literal_form: 地方组件, in_language: zh}
    keywords:
    - locality
    - municipality
    - city
    - place name
    broad_mappings: [skos:Concept]

  PostalCodeComponent:
    is_a: ComponentType
    class_uri: hc:PostalCode
    description: >-
      Type node for postal indexing tokens assigned to delivery areas.
    alt_descriptions:
      nl: Typenode voor postindexcodes die aan bezorggebieden zijn toegewezen.
      de: Typknoten fuer Postleitzahlenkennungen von Zustellgebieten.
      fr: Noeud de type pour les codes d indexation postale attribues aux zones de distribution.
      es: Nodo de tipo para codigos postales asignados a zonas de reparto.
      ar: عقدة نوع لرموز الفهرسة البريدية المخصصة لمناطق التوزيع.
      id: Simpul tipe untuk token indeks pos yang ditetapkan pada area pengiriman.
      zh: 用于配送区域邮政索引代码的类型节点。
    structured_aliases:
    - {literal_form: postcodecomponent, in_language: nl}
    - {literal_form: Postleitzahlkomponente, in_language: de}
    - {literal_form: composant code postal, in_language: fr}
    - {literal_form: componente codigo postal, in_language: es}
    - {literal_form: مكوّن الرمز البريدي, in_language: ar}
    - {literal_form: komponen kode pos, in_language: id}
    - {literal_form: 邮编组件, in_language: zh}
    keywords:
    - postal code
    - zip code
    - postcode
    - mailing code
    broad_mappings: [skos:Concept]

  SubregionComponent:
    is_a: ComponentType
    class_uri: hc:Subregion
    description: >-
      Type node for second-level administrative area names in location models.
    alt_descriptions:
      nl: Typenode voor namen van tweedelijns bestuurlijke gebieden in locatiemodellen.
      de: Typknoten fuer Namen administrativer Gebiete der zweiten Ebene in Ortsmodellen.
      fr: Noeud de type pour les noms d unites administratives de second niveau dans les modeles de localisation.
      es: Nodo de tipo para nombres de divisiones administrativas de segundo nivel en modelos de ubicacion.
      ar: عقدة نوع لأسماء الوحدات الإدارية من المستوى الثاني في نماذج الموقع.
      id: Simpul tipe untuk nama wilayah administratif tingkat kedua pada model lokasi.
      zh: 用于位置模型中二级行政区名称的类型节点。
    structured_aliases:
    - {literal_form: deelregiocomponent, in_language: nl}
    - {literal_form: Unterregionskomponente, in_language: de}
    - {literal_form: composant sous-region, in_language: fr}
    - {literal_form: componente subregion, in_language: es}
    - {literal_form: مكوّن إقليم فرعي, in_language: ar}
    - {literal_form: komponen subwilayah, in_language: id}
    - {literal_form: 次级行政区组件, in_language: zh}
    keywords:
    - subregion
    - county
    - province
    - second-level division
    broad_mappings: [skos:Concept]

  RegionComponent:
    is_a: ComponentType
    class_uri: hc:Region
    description: >-
      Type node for first-level administrative area names in location models.
    alt_descriptions:
      nl: Typenode voor namen van eerstelijns bestuurlijke gebieden in locatiemodellen.
      de: Typknoten fuer Namen administrativer Gebiete der ersten Ebene in Ortsmodellen.
      fr: Noeud de type pour les noms d unites administratives de premier niveau dans les modeles de localisation.
      es: Nodo de tipo para nombres de divisiones administrativas de primer nivel en modelos de ubicacion.
      ar: عقدة نوع لأسماء الوحدات الإدارية من المستوى الأول في نماذج الموقع.
      id: Simpul tipe untuk nama wilayah administratif tingkat pertama pada model lokasi.
      zh: 用于位置模型中一级行政区名称的类型节点。
    structured_aliases:
    - {literal_form: regiocomponent, in_language: nl}
    - {literal_form: Regionskomponente, in_language: de}
    - {literal_form: composant region, in_language: fr}
    - {literal_form: componente region, in_language: es}
    - {literal_form: مكوّن إقليم, in_language: ar}
    - {literal_form: komponen wilayah, in_language: id}
    - {literal_form: 区域组件, in_language: zh}
    keywords:
    - region
    - state
    - territory
    - first-level division
    broad_mappings: [skos:Concept]

  CountryComponent:
    is_a: ComponentType
    class_uri: hc:Country
    description: >-
      Type node for sovereign-state names used as top-level geopolitical
      references.
    alt_descriptions:
      nl: Typenode voor namen van soevereine staten als topniveau geopolitieke verwijzing.
      de: Typknoten fuer Staatenbezeichnungen als geopolitische Referenz auf oberster Ebene.
      fr: Noeud de type pour les noms d Etats souverains utilises comme references geopolitiques de plus haut niveau.
      es: Nodo de tipo para nombres de estados soberanos usados como referencia geopolitica de nivel superior.
      ar: عقدة نوع لأسماء الدول ذات السيادة بوصفها مرجعا جيوسياسيا أعلى.
      id: Simpul tipe untuk nama negara berdaulat sebagai referensi geopolitik tingkat atas.
      zh: 用作最高层级地缘政治参照之主权国家名称类型节点。
    structured_aliases:
    - {literal_form: landcomponent, in_language: nl}
    - {literal_form: Landeskomponente, in_language: de}
    - {literal_form: composant pays, in_language: fr}
    - {literal_form: componente pais, in_language: es}
    - {literal_form: مكوّن الدولة, in_language: ar}
    - {literal_form: komponen negara, in_language: id}
    - {literal_form: 国家组件, in_language: zh}
    keywords:
    - country
    - nation
    - sovereign state
    - geopolitical entity
    broad_mappings: [skos:Concept]

  PremiseComponent:
    is_a: ComponentType
    class_uri: hc:Premise
    description: >-
      Type node for named buildings, compounds, or sites within an addressable
      location.
    alt_descriptions:
      nl: Typenode voor benoemde gebouwen complexen of locaties binnen een adresseerbare plaats.
      de: Typknoten fuer benannte Gebaeude Anlagen oder Standorte innerhalb einer adressierbaren Lage.
      fr: Noeud de type pour les batiments ensembles ou sites nommes dans un lieu adressable.
      es: Nodo de tipo para edificios complejos o sitios nombrados dentro de una ubicacion direccionable.
      ar: عقدة نوع للمباني أو المجمعات أو المواقع المسماة ضمن موقع قابل للعنونة.
      id: Simpul tipe untuk bangunan kompleks atau situs bernama dalam lokasi beralamat.
      zh: 用于可寻址位置中具名建筑、园区或场址的类型节点。
    structured_aliases:
    - {literal_form: gebouwcomponent, in_language: nl}
    - {literal_form: Gebaeudekomponente, in_language: de}
    - {literal_form: composant batiment, in_language: fr}
    - {literal_form: componente inmueble, in_language: es}
    - {literal_form: مكوّن المبنى, in_language: ar}
    - {literal_form: komponen bangunan, in_language: id}
    - {literal_form: 楼宇组件, in_language: zh}
    keywords:
    - premise
    - building name
    - site
    - complex
    broad_mappings: [skos:Concept]

  SubpremiseComponent:
    is_a: ComponentType
    class_uri: hc:Subpremise
    description: >-
      Type node for unit-level locators such as floor, suite, room, or internal
      section identifiers.
    alt_descriptions:
      nl: Typenode voor eenheidslocators zoals verdieping suite kamer of interne sectie-identificatie.
      de: Typknoten fuer Einheitenspezifizierungen wie Etage Suite Raum oder interne Abschnittskennungen.
      fr: Noeud de type pour les localisateurs d unite comme etage suite salle ou identifiants de section interne.
      es: Nodo de tipo para localizadores de unidad como planta suite sala o identificadores de seccion interna.
      ar: عقدة نوع لمحددات الوحدات مثل الطابق أو الجناح أو الغرفة أو معرّفات الأقسام الداخلية.
      id: Simpul tipe untuk pelacak unit seperti lantai suite ruang atau pengenal bagian internal.
      zh: 用于楼层、套间、房间或内部区段标识等单元定位要素的类型节点。
    structured_aliases:
    - {literal_form: subgebouwcomponent, in_language: nl}
    - {literal_form: Untereinheitskomponente, in_language: de}
    - {literal_form: composant sous-unite, in_language: fr}
    - {literal_form: componente subunidad, in_language: es}
    - {literal_form: مكوّن وحدة فرعية, in_language: ar}
    - {literal_form: komponen subunit, in_language: id}
    - {literal_form: 子单元组件, in_language: zh}
    keywords:
    - subpremise
    - unit
    - floor
    - suite
    - room
    broad_mappings: [skos:Concept]
