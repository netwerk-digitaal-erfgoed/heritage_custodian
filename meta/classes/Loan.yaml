classes:
  Loan:
    class_uri: crm:E10_Transfer_of_Custody
    description: >-
      Temporary custody arrangement for transferring collection items between institutions for exhibition or research purposes.
    alt_descriptions:
      nl: >-
        Tijdelijke bewaarregeling voor het overdragen van collectiestukken tussen instellingen voor tentoonstellings- of onderzoeksdoeleinden.
      de: >-
        Vorläufige Vereinbarung zur Übertragung von Sammlungsstücken zwischen Institutionen für Ausstellungs- oder Forschungszwecke.
      fr: >-
        Arrangement de garde temporaire pour le transfert d'objets de collection entre institutions à des fins d'exposition ou de recherche.
      es: >-
        Acuerdo de custodia temporal para transferir objetos de colección entre instituciones con fines de exposición o investigación.
      ar: >-
        ترتيب حضانة مؤقت لنقل عناصر المجموعة بين المؤسسات لأغراض المعارض أو البحث.
      id: >-
        Pengaturan hak asuh sementara untuk mentransfer benda koleksi antar lembaga untuk tujuan pameran atau penelitian.
      zh: >-
        在机构之间临时转移藏品用于展览或研究目的的保管安排。
