id: https://nde.nl/ontology/hc/class/FrenchPrivateArchivesRecordSetTypes
name: FrenchPrivateArchivesRecordSetTypes
title: French Private Archives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./FrenchPrivateArchivesRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  FrenchPrivateFonds:
    is_a: FrenchPrivateArchivesRecordSetType
    class_uri: hc:FrenchPrivateFonds
    description: >-
      A fonds of records accumulated by private entities and preserved under French private archival stewardship.
    alt_descriptions:
      nl: >-
        Een fonds met archiefbescheiden die door private partijen zijn opgebouwd en onder Frans particulier archiefbeheer worden bewaard.
      de: >-
        Ein Fonds mit Unterlagen, die von privaten Akteuren gebildet und unter franzoesischer privater Archivverwaltung bewahrt werden.
      fr: >-
        Un fonds de documents accumules par des acteurs prives et conserve dans le cadre de la gestion des archives privees en France.
      es: >-
        Un fondo de documentos acumulados por entidades privadas y conservados bajo la custodia de archivos privados en Francia.
      ar: >-
        صندوق من السجلات جمعته جهات خاصة ويُحفظ ضمن إدارة الأرشيف الخاص في فرنسا.
      id: >-
        Sebuah fonds catatan yang dikumpulkan oleh pihak swasta dan dipelihara dalam pengelolaan arsip swasta di Prancis.
      zh: >-
        由私人主体积累并在法国私人档案保管体系下保存的记录全宗。
    structured_aliases:
    - literal_form: particulier Frans fonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: franzoesischer Privatfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds prive francais
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo privado frances
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق خاص فرنسي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds swasta Prancis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 法国私人全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    keywords:
      - private archives
      - French archival heritage
      - private entity records
      - fonds
      - non-public records
    slot_usage:
      has_custodian:
        equals_string: "hc:FrenchPrivateArchives"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
