id: https://nde.nl/ontology/hc/class/Rationale
name: Rationale
title: Rationale
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
classes:
  Rationale:
    class_uri: hc:Rationale
    description: >-
      Explanatory statement documenting the reasoning, justification, or basis
      for a decision, classification, or mapping choice.
    alt_descriptions:
      nl: >-
        Verklarende verklaring die de redenering, rechtvaardiging of basis
        documenteert voor een beslissing, classificatie of mapping-keuze.
      de: >-
        Erklärende Erklärung, die die Begründung, Rechtfertigung oder Basis
        für eine Entscheidung, Klassifizierung oder Mapping-Wahl dokumentiert.
      fr: >-
        Déclaration explicative documentant le raisonnement, la justification ou la base
        d'une décision, d'une classification ou d'un choix de mappage.
      es: >-
        Declaración explicativa que documenta el razonamiento, justificación o base
        para una decisión, clasificación o elección de mapeo.
      ar: >-
        بيان تفسيري يوثق المنطق أو المبرر أو الأساس
        لقرار أو تصنيف أو اختيار تعيين.
      id: >-
        Pernyataan penjelasan yang mendokumentasikan penalaran, pembenaran, atau dasar
        untuk keputusan, klasifikasi, atau pilihan pemetaan.
      zh: >-
        记录决策、分类或映射选择的推理、理由或基础的解释性声明。
    broad_mappings:
      - prov:Entity
      - skos:Concept
    keywords:
      - rationale
      - justification
      - reasoning
      - decision basis
    structured_aliases:
      - literal_form: onderbouwing
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Begründung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: justification
        predicate: EXACT_SYNONYM
        in_language: fr
    slots:
      - has_description
    slot_usage:
      has_description:
        required: true
    comments:
      - Often serialized as a note-like field documenting influences on a decision
    annotations:
      specificity_score: 0.45
      specificity_rationale: Moderately specific - rationale documentation is common.
      custodian_types: '["*"]'
    examples:
      - value:
          has_description: Mapped based on exact name match and location
