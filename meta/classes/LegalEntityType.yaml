id: https://nde.nl/ontology/hc/class/LegalEntityType
name: LegalEntityType
title: Legal Entity Type Class
description: 'High-level classification of legal entity types that can serve as heritage custodians.

  Based on formal legal distinctions between natural persons and legal persons (organizations).


  This class provides the top-level categorization, while specific legal forms

  are captured through the LegalForm class hierarchy.

  '
prefixes:
  linkml: https://w3id.org/linkml/
  rov: http://www.w3.org/ns/regorg#
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
- ../metadata
- ../slots/has_score
classes:
  LegalEntityType:
    class_uri: hc:LegalEntityType
    description: >-
      Top-level legal classification used to distinguish natural-person and
      juridical-person entities in governance and registration contexts.
    alt_descriptions:
      nl: Topniveau juridische classificatie om natuurlijke personen en rechtspersonen in governance- en registratiecontexten te onderscheiden.
      de: Oberste rechtliche Klassifikation zur Unterscheidung natuerlicher und juristischer Personen in Governance- und Registrierungskontexten.
      fr: Classification juridique de haut niveau distinguant personnes physiques et personnes morales dans les contextes de gouvernance et d enregistrement.
      es: Clasificacion juridica de alto nivel para distinguir personas naturales y personas juridicas en contextos de gobernanza y registro.
      ar: تصنيف قانوني عالي المستوى للتمييز بين الأشخاص الطبيعيين والأشخاص الاعتباريين في سياقات الحوكمة والتسجيل.
      id: Klasifikasi hukum tingkat atas untuk membedakan orang perseorangan dan badan hukum dalam konteks tata kelola dan registrasi.
      zh: 用于在治理与登记情境中区分自然人和法人实体的顶层法律分类。
    structured_aliases:
    - {literal_form: type rechtspersoon, in_language: nl}
    - {literal_form: Rechtstraegertyp, in_language: de}
    - {literal_form: type d entite juridique, in_language: fr}
    - {literal_form: tipo de entidad legal, in_language: es}
    - {literal_form: نوع كيان قانوني, in_language: ar}
    - {literal_form: tipe entitas hukum, in_language: id}
    - {literal_form: 法律实体类型, in_language: zh}
    close_mappings:
    - org:classification
    comments:
    - 'Natural person: Individual human being with legal rights and responsibilities'
    - 'Legal person: Entity that is not a natural person but has legal rights (corporations, governments, foundations)'
    - All corporations and government bodies are subtypes of ORGANIZATION (legal persons)
    slots:
    - has_score
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
