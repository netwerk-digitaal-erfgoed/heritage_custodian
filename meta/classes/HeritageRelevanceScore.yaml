id: https://nde.nl/ontology/hc/class/HeritageRelevanceScore
name: HeritageRelevanceScore
title: Heritage Relevance Score Class
description: Numeric score expressing how strongly an entity is related to heritage contexts.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_value
classes:
  HeritageRelevanceScore:
    class_uri: schema:Rating
    description: >-
      Numeric rating expressing degree of relevance to heritage-related
      contexts.
    alt_descriptions:
      nl: Numerieke waardering die de mate van relevantie voor erfgoedgerelateerde contexten uitdrukt.
      de: Numerische Bewertung die den Grad der Relevanz fuer erberelevante Kontexte ausdrueckt.
      fr: Evaluation numerique exprimant le degre de pertinence pour des contextes lies au patrimoine.
      es: Valoracion numerica que expresa el grado de relevancia para contextos relacionados con patrimonio.
      ar: تصنيف رقمي يعبّر عن درجة الصلة بسياقات مرتبطة بالتراث.
      id: Penilaian numerik yang menyatakan tingkat relevansi terhadap konteks terkait warisan.
      zh: 表示与遗产相关情境关联程度的数值评分。
    structured_aliases:
    - {literal_form: score erfgoedrelevantie, in_language: nl}
    - {literal_form: Erberelevanzwert, in_language: de}
    - {literal_form: score de pertinence patrimoniale, in_language: fr}
    - {literal_form: puntuacion de relevancia patrimonial, in_language: es}
    - {literal_form: درجة الصلة بالتراث, in_language: ar}
    - {literal_form: skor relevansi warisan, in_language: id}
    - {literal_form: 遗产相关性评分, in_language: zh}
    slots:
    - has_value
    - has_description
    slot_usage:
      has_value:
        range: float
    annotations:
      specificity_score: 0.2
      specificity_rationale: Analytic score for heritage relevance.
      custodian_types: "['*']"
