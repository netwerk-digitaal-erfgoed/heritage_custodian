id: https://nde.nl/ontology/hc/class/DistrictArchiveGermanyRecordSetTypes
name: DistrictArchiveGermanyRecordSetTypes
title: DistrictArchiveGermany Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./DistrictArchiveGermanyRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  KreisAdministrationFonds:
    is_a: DistrictArchiveGermanyRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Highest-level aggregation of documentation produced by county-level public
      authorities in German local government.
    alt_descriptions:
      nl: >-
        Hoogste aggregatieniveau van documentatie geproduceerd door
        districtsbesturen binnen de Duitse lokale overheid.
      de: >-
        Höchste Aggregationsebene von Unterlagen, die von
        Kreisverwaltungsbehörden in der deutschen Kommunalverwaltung erstellt wurden.
      fr: >-
        Niveau d'agrégation le plus élevé de la documentation produite par les
        autorités d'arrondissement dans l'administration locale allemande.
      es: >-
        Nivel de agregación más alto de documentación producida por autoridades
        de distrito dentro de la administración local alemana.
      ar: >-
        أعلى مستوى تجميعي للوثائق التي تنتجها سلطات المقاطعات ضمن
        الإدارة المحلية في ألمانيا.
      id: >-
        Tingkat agregasi tertinggi untuk dokumentasi yang dihasilkan oleh
        otoritas tingkat distrik dalam pemerintahan lokal Jerman.
      zh: >-
        德国地方政府中县级公共机构形成文档的最高聚合层级。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:KreisAdministrationFonds
      has_custodian:
        equals_string: hc:DistrictArchiveGermany
    structured_aliases:
    - literal_form: districtsbestuursfonds Duitsland
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Kreisverwaltungsfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds d'administration d'arrondissement
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de administración distrital
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق إدارة المقاطعة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds administrasi distrik
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 县级行政文档总成
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Captures county-level governmental documentary output as a single aggregation level.
    - Intended for regional administrative provenance contexts in Germany.
    - 'Preserved from prior description: Fonds-level aggregation of district administration records.'
    keywords:
    - county governance
    - local administration
    - provenance aggregation
    - German districts
    examples:
    - value:
        has_type: hc:KreisAdministrationFonds
        has_custodian: hc:DistrictArchiveGermany
        has_note: District executive directives, budget planning, and council files.
      description: County-level governmental documentation grouped at highest aggregation

  LocalGovernanceSeries:
    is_a: DistrictArchiveGermanyRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence from county decision-making workflows,
      arranged by recurring public-service function or procedure.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks uit bestuursprocessen op districtsniveau,
        gerangschikt naar terugkerende administratieve functie of procedure.
      de: >-
        Geordnete Dokumentationsfolge aus kommunalen Arbeitsabläufen auf
        Kreisebene, gegliedert nach wiederkehrender Verwaltungsfunktion oder Verfahren.
      fr: >-
        Séquence documentaire ordonnée issue des processus de gouvernance de
        district, organisée par fonction ou procédure administrative récurrente.
      es: >-
        Secuencia documental ordenada procedente de procesos de gobernanza de
        distrito, organizada por función o procedimiento administrativo recurrente.
      ar: >-
        تسلسل وثائقي منظم من سير عمل الحوكمة على مستوى المقاطعة، مرتب حسب
        الوظيفة أو الإجراء الإداري المتكرر.
      id: >-
        Urutan dokumenter terstruktur dari alur tata kelola tingkat distrik,
        disusun menurut fungsi atau prosedur administratif yang berulang.
      zh: >-
        来自县级治理流程、按重复行政职能或程序组织的有序文档序列。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:LocalGovernanceSeries
      has_custodian:
        equals_string: hc:DistrictArchiveGermany
    structured_aliases:
    - literal_form: reeks lokale bestuursdocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Serie kommunaler Verwaltungsunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: série de gouvernance locale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de gobernanza local
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة وثائق الحوكمة المحلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri tata kelola lokal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方治理文档序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Represents recurring procedural sequences rather than whole institutional output.
    - Suitable for grouping documentation by administrative workflow continuity.
    - 'Preserved from prior description: Series-level aggregation of district governance documentation.'
    keywords:
    - procedural sequence
    - district governance
    - local government workflow
    - administrative continuity
    examples:
    - value:
        has_type: hc:LocalGovernanceSeries
        has_custodian: hc:DistrictArchiveGermany
        has_note: Permit-processing correspondence and decision registers.
      description: Recurring governance workflow documentation arranged as a sequence
