id: https://nde.nl/ontology/hc/class/DigitalPlatformDataSource
name: DigitalPlatformDataSource
title: Digital Platform Data Source
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - linkml:types
classes:
  DigitalPlatformDataSource:
    class_uri: prov:Entity
    description: >-
      Source artifact captured for platform profiling, enrichment, or quality
      assessment workflows.
    alt_descriptions:
      nl: >-
        Bronartefact vastgelegd voor platformprofilering, verrijking of kwaliteitsbeoordelingsworkflows.
      de: >-
        Quellenartefakt, das für Plattform-Profiling, Anreicherung oder Qualitätsbewertungs-Workflows erfasst wurde.
      fr: >-
        Artefact source capturé pour le profilage de plateforme, l'enrichissement ou les flux de travail d'évaluation de qualité.
      es: >-
        Artefacto fuente capturado para perfilado de plataforma, enriquecimiento o flujos de trabajo de evaluación de calidad.
      ar: >-
        قطعة أثرية مصدر ملتقطة لتنميط المنصة أو الإثراء أو عمليات تقييم الجودة.
      id: >-
        Artefak sumber yang diambil untuk pemrofilan platform, pengayaan, atau alur kerja penilaian kualitas.
      zh: >-
        为平台分析、丰富或质量评估工作流捕获的源工件。
    broad_mappings:
      - prov:Entity
    slots:
      - has_type
      - has_url
      - retrieved_by
      - retrieved_at
