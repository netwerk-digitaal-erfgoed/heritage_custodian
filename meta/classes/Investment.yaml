id: https://nde.nl/ontology/hc/class/Investment
name: Investment
title: Investment Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_quantity
- ../slots/has_type
- ../slots/temporal_extent
classes:
  Investment:
    class_uri: schema:InvestmentOrDeposit
    description: >-
      Financial allocation directed toward institutional priorities,
      capital projects, or strategic development initiatives.
    alt_descriptions:
      nl: >-
        Financiële toewijzing gericht op institutionele prioriteiten,
        kapitaalprojecten of strategische ontwikkelingsinitiatieven.
      de: >-
        Finanzielle Zuweisung für institutionelle Prioritäten,
        Kapitalprojekte oder strategische Entwicklungsinitiativen.
      fr: >-
        Allocation financière dirigée vers les priorités institutionnelles,
        les projets capitaux ou les initiatives de développement stratégique.
      es: >-
        Asignación financiera dirigida a prioridades institucionales,
        proyectos de capital o iniciativas de desarrollo estratégico.
      ar: >-
        تخصيص مالي موجه نحو الأولويات المؤسسية،
        أو المشاريع الرأسمالية أو مبادرات التطوير الاستراتيجي.
      id: >-
        Alokasi keuangan yang diarahkan pada prioritas institusional,
        proyek modal, atau inisiatif pengembangan strategis.
      zh: >-
        指向机构优先事项、资本项目或战略发展倡议的财务分配。
    broad_mappings:
    - schema:InvestmentOrDeposit
    slots:
    - has_quantity
    - has_type
    - temporal_extent
    structured_aliases:
    - literal_form: investering
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Investition
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: investissement
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: inversión
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: استثمار
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: investasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 投资
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Tracks financial commitments to institutional development
    - May include capital expenditure, endowment growth, or project funding
    - 'Preserved from prior description: Financial investment allocated to institutional priorities or strategic development.'
    keywords:
    - finance
    - capital
    - funding
    - allocation
    - strategic investment
    examples:
    - value:
        has_type: capital_project
        has_quantity: 2500000
      description: Capital investment for facility renovation
    annotations:
      specificity_score: 0.6
      specificity_rationale: Financial planning class for medium-term and long-term allocation tracking.
      custodian_types: '["*"]'
