classes:
  SpecialCollectionRecordSetType:
    description: >-
      Classification for record collections requiring specialized security,
      handling protocols, and controlled access due to their rarity, value, or fragility.
    alt_descriptions:
      nl: >-
        Classificatie voor archiefcollecties die gespecialiseerde beveiliging,
        behandelingsprotocollen en gecontroleerde toegang vereisen vanwege hun zeldzaamheid, waarde of kwetsbaarheid.
      de: >-
        Klassifikation für Archivbestände, die spezielle Sicherheits-, 
        Handhabungsprotokolle und kontrollierten Zugriff aufgrund ihrer Seltenheit, ihres Werts oder ihrer Zerbrechlichkeit erfordern.
      fr: >-
        Classification pour les collections de documents nécessitant une sécurité spécialisée,
        des protocoles de manipulation et un accès contrôlé en raison de leur rareté, valeur ou fragilité.
      es: >-
        Clasificación para colecciones de registros que requieren seguridad especializada,
        protocolos de manejo y acceso controlado debido a su rareza, valor o fragilidad.
      ar: >-
        تصنيف لمجموعات السجلات التي تتطلب أمناً متخصصاً
        وبروتوكولات مناولة ووصولاً مضبوطاً بسبب ندرتها أو قيمتها أو هشاشتها.
      id: >-
        Klasifikasi untuk koleksi catatan yang memerlukan keamanan khusus,
        protokol penanganan, dan akses terkontrol karena kelangkaan, nilai, atau kerapuhannya.
      zh: >-
        由于稀有性、价值或脆弱性需要专门安全、处理协议和受控访问的记录集合分类。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
    related_mappings:
