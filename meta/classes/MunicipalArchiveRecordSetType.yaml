id: https://nde.nl/ontology/hc/class/MunicipalArchiveRecordSetType
name: MunicipalArchiveRecordSetType
title: Municipal Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
