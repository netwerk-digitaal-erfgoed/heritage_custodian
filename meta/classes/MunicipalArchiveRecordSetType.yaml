classes:
  MunicipalArchiveRecordSetType:
    abstract: true
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: Abstract record-set classifier for collection categories held in municipal archival custody.
    alt_descriptions:
      nl: Abstracte recordsetclassificatie voor collectiecategorieen in gemeentelijke archiefzorg.
      de: Abstrakter Recordset-Klassifikator fuer Sammlungskategorien in kommunaler Archivverwahrung.
      fr: Classificateur abstrait de lots documentaires pour categories conservees en archives municipales.
      es: Clasificador abstracto de conjuntos documentales para categorias en custodia archivistica municipal.
      ar: مصنف مجرد لمجموعات السجلات لفئات المقتنيات في الحفظ الأرشيفي البلدي.
      id: Pengklasifikasi abstrak record set untuk kategori koleksi dalam kustodi arsip kota.
      zh: 面向市政档案保管类别的抽象记录集分类器。
    structured_aliases:
