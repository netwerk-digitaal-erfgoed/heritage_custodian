    - {literal_form: Typ Stadtarchiv-Recordset, in_language: de}
    - {literal_form: type de lot d archive municipale, in_language: fr}
    - {literal_form: tipo de conjunto de archivo municipal, in_language: es}
    - {literal_form: نوع مجموعة سجلات أرشيف بلدي, in_language: ar}
    - {literal_form: tipe record set arsip kota, in_language: id}
    - {literal_form: 市政档案记录集类型, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    keywords:
    - municipal
    - city
    - local government
    - archive
    - record set
    - classifier
    slots:
    - has_type
    - has_score
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MunicipalArchiveRecordSetType
    notes:
    - |
      Preserved from prior description (commit 6e634651):

      Preserved from prior description (commit 6e634651):

      "Abstract base class for all municipal archive record set types.\n\n**Definition**:\nA rico:RecordSetType that classifies collections held by municipal archives.\nMunicipal archives preserve records documenting local governance, public \nservices, civic life, and community history.\n\n**Subclasses**:\n- CouncilGovernanceFonds (council minutes, ordinances, resolutions)\n- CivilRegistrySeries (births, marriages, deaths, population registers)\n- MunicipalAdministrationFonds (departments, services, personnel)\n- UrbanPlanningCollection (maps, building permits, zoning records)\n- LocalHistoryCollection (photographs, ephemera, community documentation)\n\n**RiC-O Alignment**:\nThis is an abstract type classifier. Subclasses specify both the domain \n(type of municipal records) and organizational principle (fonds, series, collection).\n\n**Dual-Class Pattern**:\nMunicipalArchive (ArchiveOrganizationType) = the custodian institution.\nMunicipalArchiveRecordSetType (rico:RecordSetType)\
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
