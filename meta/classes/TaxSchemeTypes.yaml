classes:
  ANBI:
    is_a: TaxSchemeType
    class_uri: hc:ANBI
    description: Dutch public-benefit institution status enabling donor tax deductions and tax exemptions for recipient institutions.
    annotations:
      jurisdiction: NL
      deduction_percentage: 100
      regulatory_body: Belastingdienst
      legal_basis: Wet inkomstenbelasting 2001
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    alt_descriptions:
      nl: Nederlandse status voor instellingen die het algemeen belang dienen, met fiscale voordelen voor schenkers en vrijstellingen voor ontvangers.
      de: Niederländischer Status fuer gemeinnuetzige Einrichtungen mit steuerlichen Vorteilen fuer Spender und Befreiungen fuer Empfaenger.
      fr: Statut neerlandais d'organisme d'interet general permettant des ded reductions fiscales aux donateurs et des exemptions aux beneficiaires.
      es: Estatus holandes para instituciones de interes publico con beneficios fiscales para donantes y exenciones para destinatarios.
      ar: صفة هولندية للمؤسسات ذات النفع العام تمكّن المانحين من خصومات ضريبية وإعفاءات للمستفيدين.
      id: Status lembaga kepentingan umum Belanda yang memberikan insentif pajak bagi donor dan pembebasan bagi penerima.
      zh: 荷兰公益机构地位，使捐赠人可享税收抵扣，受赠机构可获免税。
    structured_aliases:
    - literal_form: algemeen nut beogende instelling
      in_language: nl
    - literal_form: gemeinnuetzige Einrichtung
      in_language: de
    - literal_form: organisme d'interet general
      in_language: fr
    - literal_form: institucion de interes publico
      in_language: es
    - literal_form: مؤسسة ذات نفع عام
      in_language: ar
    - literal_form: lembaga kepentingan umum
      in_language: id
    - literal_form: 公益机构
      in_language: zh
    keywords:
    - tax exemption
    - charitable deduction
    - public benefit
    - Dutch tax law
    - donor incentive
  CulturalANBI:
    is_a: TaxSchemeType
    class_uri: hc:CulturalANBI
    description: Enhanced Dutch status for organizations with increased donor deduction multiplier.
    annotations:
      jurisdiction: NL
      deduction_percentage: 125
      regulatory_body: Belastingdienst
      legal_basis: Wet inkomstenbelasting 2001, Art. 6.39a
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    alt_descriptions:
      nl: Verhoogde Nederlandse fiscale status voor culturele instellingen met een hogere aftrekvermenigvuldiger voor schenkers.
      de: Erhoehter niederlaendischer Steuerstatus fuer kulturelle Einrichtungen mit erhoehtem Spenderabzugsmultiplikator.
      fr: Statut fiscal neerlandais renforce pour les organisations culturelles avec un multiplicateur de deduction accru pour les donateurs.
      es: Estatus fiscal holandes mejorado para organizaciones culturales con multiplicador de deduccion aumentado para donantes.
      ar: صفة ضريبية هولندية معززة للمنظمات الثقافية مع مضاعف خصم متزايد للمتبرعين.
      id: Status pajak Belanda yang ditingkatkan untuk organisasi budaya dengan pengali potongan yang lebih tinggi bagi donor.
      zh: 为文化机构提供的荷兰强化税收地位，捐赠人享有更高的抵扣倍数。
    structured_aliases:
    - literal_form: culturele ANBI
      in_language: nl
    - literal_form: kulturelle gemeinnuetzige Einrichtung
      in_language: de
    - literal_form: organisme culturel d'interet general
      in_language: fr
    - literal_form: ANBI cultural
      in_language: es
    - literal_form: مؤسسة ثقافية ذات نفع عام
      in_language: ar
    - literal_form: ANBI budaya
      in_language: id
    - literal_form: 文化公益机构
      in_language: zh
    keywords:
    - cultural tax incentive
    - enhanced deduction
    - charitable giving
    - Dutch cultural policy
    - donor multiplier
  GiftAid:
    is_a: TaxSchemeType
    class_uri: hc:GiftAid
    description: UK tax-relief mechanism allowing eligible charities to reclaim basic-rate tax on donations.
    annotations:
      jurisdiction: UK
      reclaim_percentage: 25
      regulatory_body: HMRC
      legal_basis: Finance Act 1990
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    alt_descriptions:
      nl: Brits fiscaal mechanisme waarmee in aanmerking komende goede doelen belasting op schenkingen kunnen terugvorderen.
      de: Britischer Steuererleichterungsmechanismus, der berechtigte Wohlttigkeitsorganisationen die Rueckerstattung von Steuern auf Spenden ermoeglicht.
      fr: Mecanisme fiscal britannique permettant aux organismes caritatifs eligible de recuperer la taxe de base sur les dons.
      es: Mecanismo fiscal britanico que permite a las organizaciones benificas elegibles reclamar el impuesto basico sobre donaciones.
      ar: آلية ضريبية بريطانية تتيح للجمعيات الخيرية المؤهلة استرداد الضريبة الأساسية على التبرعات.
      id: Mekanisme insentif pajak Inggris yang memungkinkan badan amal yang memenuhi syarat mengklaim pajak dasar atas donasi.
      zh: 英国税收减免机制，允许符合条件的慈善机构收回捐赠的基础税率税款。
    structured_aliases:
    - literal_form: schenkingaftrek
      in_language: nl
    - literal_form: Spendensteuerrueckerstattung
      in_language: de
    - literal_form: aide aux dons
      in_language: fr
    - literal_form: ayuda por donaciones
      in_language: es
    - literal_form: معونة التبرعات
      in_language: ar
    - literal_form: bantuan donasi
      in_language: id
    - literal_form: 捐赠税收返还
      in_language: zh
    keywords:
    - gift aid
    - UK charity tax
    - tax reclamation
    - donor relief
    - HMRC
  CulturalGiftsScheme:
    is_a: TaxSchemeType
    class_uri: hc:CulturalGiftsScheme
    description: UK granting tax reduction for donation of pre-eminent objects to public collections.
    annotations:
      jurisdiction: UK
      tax_reduction_individual: 30
      tax_reduction_corporate: 20
      regulatory_body: Arts Council England
      legal_basis: Finance Act 2012
      custodian_types: '[''*'']'
