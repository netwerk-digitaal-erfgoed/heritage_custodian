      nl: Brits fiscaal programma voor belastingvermindering bij schenking van vooraanstaande objecten aan openbare collecties.
      de: Britisches Steuerprogramm zur Steuerreduzierung bei Schenkung herausragender Objekte an oeffentliche Sammlungen.
      fr: Programme fiscal britannique offrant une reduction d'impot pour le don d'objets preeminents aux collections publiques.
      es: Programa fiscal britanico de reduccion de impuestos por donacion de objetos eminentes a colecciones publicas.
      ar: برنامج ضريبي بريطاني يمنح تخفيضًا ضريبيًا مقابل التبرع بقطع بارزة للمجموعات العامة.
      id: Program pajak Inggris yang memberikan pengurangan pajak atas donasi benda unggulan kepada koleksi publik.
      zh: 英国税收计划，为向公共收藏捐赠杰出物品提供税收减免。
