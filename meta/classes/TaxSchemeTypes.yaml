      es: Estatus de organización benifica registrada en el Reino Unido con derecho a exenciones fiscales y tarifarias basicas.
      ar: صفة جمعية خيرية مسجلة في المملكة المتحدة تتيح إعفاءات ضريبية وأساسية.
      id: Status badan amal terdaftar di Inggris yang memberikan keringanan pajak dan tarif utama.
