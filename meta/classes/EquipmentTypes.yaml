id: https://nde.nl/ontology/hc/class/EquipmentTypes
name: EquipmentTypes
title: Equipment Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./EquipmentType
  - linkml:types
classes:
  ConservationEquipment:
    is_a: EquipmentType
    description: >-
      Category for treatment and stabilization apparatus used in conservation
      practice.
    alt_descriptions:
      nl: >-
        Categorie voor behandelings- en stabilisatieapparatuur die in de conservatiepraktijk wordt gebruikt.
      de: >-
        Kategorie für Behandlungs- und Stabilisierungsgeräte, die in der Konservierungspraxis verwendet werden.
      fr: >-
        Catégorie pour les équipements de traitement et de stabilisation utilisés dans la pratique de la conservation.
      es: >-
        Categoría para equipos de tratamiento y estabilización utilizados en la práctica de conservación.
      ar: >-
        فئة لأجهزة المعالجة والاستقرار المستخدمة في ممارسة الحفظ.
      id: >-
        Kategori untuk peralatan perawatan dan stabilisasi yang digunakan dalam praktik konservasi.
      zh: >-
        用于保护实践中处理和稳定设备的类别。
    structured_aliases:
      - literal_form: conservatieapparatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Konservierungsgeraet
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: equipement de conservation
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: equipo de conservacion
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: معدات الحفظ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: peralatan konservasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 保护设备
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - conservation
      - treatment
      - stabilization
      - preservation equipment
      - heritage care
    broad_mappings:
      - skos:Concept
      - crm:E55_Type

  DigitizationEquipment:
    is_a: EquipmentType
    description: >-
      Category for capture and conversion apparatus used to create digital
      surrogates.
    alt_descriptions:
      nl: >-
        Categorie voor vastleggings- en conversieapparatuur die wordt gebruikt om digitale surrogaten te creëren.
      de: >-
        Kategorie für Erfassungs- und Konvertierungsgeräte zur Erstellung digitaler Surrogate.
      fr: >-
        Catégorie pour les équipements de capture et de conversion utilisés pour créer des substituts numériques.
      es: >-
        Categoría para equipos de captura y conversión utilizados para crear sustitutos digitales.
      ar: >-
        فئة لأجهزة الالتقاط والتحويل المستخدمة لإنشاء بدائل رقمية.
      id: >-
        Kategori untuk peralatan penangkapan dan konversi yang digunakan untuk membuat pengganti digital.
      zh: >-
        用于创建数字替代品的捕获和转换设备类别。
    structured_aliases:
      - literal_form: digitaliseringsapparatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Digitalisierungsgeraet
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: equipement de numerisation
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: equipo de digitalizacion
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: معدات الرقمنة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: peralatan digitalisasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 数字化设备
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - digitization
      - capture
      - conversion
      - scanning
      - digital surrogate
    broad_mappings:
      - skos:Concept
      - crm:E55_Type

  ImagingEquipment:
    is_a: EquipmentType
    description: >-
      Category for optical and imaging apparatus supporting documentation and
      analysis workflows.
    alt_descriptions:
      nl: >-
        Categorie voor optische en beeldvormende apparatuur die documentatie- en analyseworkflows ondersteunt.
      de: >-
        Kategorie für optische und Bildgebungsgeräte zur Unterstützung von Dokumentations- und Analyse-Workflows.
      fr: >-
        Catégorie pour les équipements optiques et d'imagerie soutenant les flux de documentation et d'analyse.
      es: >-
        Categoría para equipos ópticos y de imágenes que apoyan flujos de documentación y análisis.
      ar: >-
        فئة للأجهزة البصرية والتصوير التي تدعم عمليات التوثيق والتحليل.
      id: >-
        Kategori untuk peralatan optik dan pencitraan yang mendukung alur kerja dokumentasi dan analisis.
      zh: >-
        支持文档和分析工作流的光学和成像设备类别。
    structured_aliases:
      - literal_form: beeldvormingsapparatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Bildgebungsgeraet
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: equipement d'imagerie
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: equipo de imagenes
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: معدات التصوير
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: peralatan pencitraan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 成像设备
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - imaging
      - optical
      - photography
      - documentation
      - analysis
      - camera
    broad_mappings:
      - skos:Concept
      - crm:E55_Type

  StorageEquipment:
    is_a: EquipmentType
    description: >-
      Category for furniture and containment apparatus used to house and protect
      holdings.
    alt_descriptions:
      nl: >-
        Categorie voor meubels en inrichtingsapparatuur die wordt gebruikt om collecties te herbergen en te beschermen.
      de: >-
        Kategorie für Möbel und Behältnisgeräte zur Unterbringung und zum Schutz von Beständen.
      fr: >-
        Catégorie pour les meubles et équipements de confinement utilisés pour abriter et protéger les collections.
      es: >-
        Categoría para muebles y equipos de contención utilizados para alojar y proteger fondos.
      ar: >-
        فئة للأثاث ومعدات الاحتواء المستخدمة لإيواء وحماية المقتنيات.
      id: >-
        Kategori untuk furnitur dan peralatan penyimpanan yang digunakan untuk menampung dan melindungi koleksi.
      zh: >-
        用于存放和保护藏品的家具和容纳设备类别。
    structured_aliases:
      - literal_form: opslagapparatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Lagerungsausstattung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: equipement de stockage
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: equipo de almacenamiento
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: معدات التخزين
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: peralatan penyimpanan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 存储设备
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - storage
      - furniture
      - containment
      - shelving
      - archival storage
      - protection
    broad_mappings:
      - skos:Concept
      - crm:E55_Type

  AnalyticalEquipment:
    is_a: EquipmentType
    description: >-
      Category for scientific instrumentation used to measure, characterize, or
      test material properties.
    alt_descriptions:
      nl: >-
        Categorie voor wetenschappelijke instrumentatie die wordt gebruikt om materiaaleigenschappen te meten, karakteriseren of testen.
      de: >-
        Kategorie für wissenschaftliche Instrumente zur Messung, Charakterisierung oder Prüfung von Materialeigenschaften.
      fr: >-
        Catégorie pour l'instrumentation scientifique utilisée pour mesurer, caractériser ou tester les propriétés des matériaux.
      es: >-
        Categoría para instrumentación científica utilizada para medir, caracterizar o probar propiedades de materiales.
      ar: >-
        فئة للأجهزة العلمية المستخدمة لقياس أو وصف أو اختبار خصائص المواد.
      id: >-
        Kategori untuk instrumentasi ilmiah yang digunakan untuk mengukur, mengkarakterisasi, atau menguji properti material.
      zh: >-
        用于测量、表征或测试材料特性的科学仪器类别。
    structured_aliases:
      - literal_form: analyseapparatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Analysegeraet
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: equipement analytique
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: equipo analitico
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: معدات تحليلية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: peralatan analitik
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 分析设备
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - analytical
      - scientific instrumentation
      - measurement
      - characterization
      - material testing
      - analysis
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
