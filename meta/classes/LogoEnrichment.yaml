id: https://nde.nl/ontology/hc/classes/LogoEnrichment
name: LogoEnrichment
title: Logo Enrichment Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_url
classes:
  LogoEnrichment:
    class_uri: prov:Entity
    description: >-
      Enrichment payload containing brand imagery candidates such as logos
      and favicons extracted from website analysis.
    alt_descriptions:
      nl: >-
        Verrijkingspayload met merkbeeldkandidaten zoals logo's
        en favicons geëxtraheerd uit website-analyse.
      de: >-
        Anreicherungsnutzdaten mit Markenbildkandidaten wie Logos
        und Favicons, extrahiert aus Website-Analysen.
      fr: >-
        Charge d'enrichissement contenant des candidats d'images de marque
        tels que logos et favicons extraits de l'analyse de sites Web.
      es: >-
        Carga de enriquecimiento que contiene candidatos de imágenes de marca
        como logotipos y favicons extraídos del análisis de sitios web.
      ar: >-
        حمولة إثراء تحتوي على مرشحات صور العلامة التجارية
        مثل الشعارات والأيقونات المفضلة المستخرجة من تحليل الموقع.
      id: >-
        Muatan pengayaan yang berisi kandidat citra merek
        seperti logo dan favicon yang diekstraksi dari analisis situs web.
      zh: >-
        包含从网站分析中提取的品牌图像候选项（如标志和网站图标）的丰富化载荷。
    close_mappings:
    - schema:ImageObject
    related_mappings:
    - prov:Derivation
    - schema:Brand
    slots:
    - has_url
    structured_aliases:
    - literal_form: logo-verrijking
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Logo-Anreicherung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: enrichissement de logo
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: enriquecimiento de logotipo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: إثراء الشعار
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pengayaan logo
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 标志丰富化
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Derived from HTML meta tags, link elements, and image analysis
    - Supports brand identification and visual identity tracking
    - 'Preserved from prior description: Enrichment payload containing logo and favicon candidates derived from website analysis.'
    keywords:
    - logo
    - favicon
    - brand
    - website analysis
    - visual identity
    examples:
    - value:
        has_url: https://example.org/logo.png
      description: Logo URL extracted from institutional website
    annotations:
      specificity_score: 0.4
      specificity_rationale: Aggregated visual-brand enrichment result class.
      custodian_types: '["*"]'
    broad_mappings:
    - prov:Entity
