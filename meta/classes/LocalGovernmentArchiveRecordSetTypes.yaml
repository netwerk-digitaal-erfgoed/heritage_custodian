id: https://nde.nl/ontology/hc/class/LocalGovernmentArchiveRecordSetTypes
name: LocalGovernmentArchiveRecordSetTypes
title: Local Government Archive Record Set Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./LocalGovernmentArchiveRecordSetType
  - linkml:types
  - ../slots/has_type
  - ../slots/has_score
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  LocalAdministrationFonds:
    is_a: LocalGovernmentArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A fonds consisting of records created by local government bodies to support administration, governance, and decision-making.
    alt_descriptions:
      nl: >-
        Een fonds met archiefbescheiden van lokale overheden ter ondersteuning van bestuur, administratie en besluitvorming.
      de: >-
        Ein Fonds mit Unterlagen lokaler Behoerden zur Unterstuetzung von Verwaltung, Governance und Entscheidungsfindung.
      fr: >-
        Un fonds de documents produits par des administrations locales pour la gouvernance, l'administration et la prise de decision.
      es: >-
        Un fondo de documentos creados por gobiernos locales para la administracion, la gobernanza y la toma de decisiones.
      ar: >-
        صندوق من السجلات التي أنشأتها هيئات الحكم المحلي لدعم الإدارة والحوكمة واتخاذ القرار.
      id: >-
        Sebuah fonds catatan yang dibuat oleh badan pemerintah daerah untuk mendukung administrasi, tata kelola, dan pengambilan keputusan.
      zh: >-
        由地方政府机构为行政、治理与决策形成的记录全宗。
    structured_aliases:
    - literal_form: lokaal bestuursfonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Kommunalverwaltungsfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds administratif local
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo administrativo local
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق الإدارة المحلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds administrasi pemerintah daerah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方行政全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:LocalGovernmentArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by LocalGovernmentArchive custodians. Inverse of rico:isOrWasHolderOf."
    keywords:
    - local administration
    - municipal records
    - governance
    - decision-making
    - civic administration
  PublicWorksSeries:
    is_a: LocalGovernmentArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A series of records documenting local infrastructure projects and public works.
    alt_descriptions:
      nl: >-
        Een serie archiefbescheiden over lokale infrastructuurprojecten en openbare werken.
      de: >-
        Eine Serie von Unterlagen zu lokalen Infrastrukturprojekten und oeffentlichen Bauarbeiten.
      fr: >-
        Une serie de documents relatifs aux infrastructures locales et aux travaux publics.
      es: >-
        Una serie de documentos sobre infraestructura local y obras publicas.
      ar: >-
        سلسلة سجلات توثق مشاريع البنية التحتية المحلية والأشغال العامة.
      id: >-
        Seri catatan yang mendokumentasikan proyek infrastruktur lokal dan pekerjaan umum.
      zh: >-
        记录地方基础设施项目与公共工程的记录系列。
    structured_aliases:
    - literal_form: openbare werken serie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: oeffentliche Bauwerke Serie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie des travaux publics
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de obras publicas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة الأشغال العامة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri pekerjaan umum
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公共工程记录系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:LocalGovernmentArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by LocalGovernmentArchive custodians. Inverse of rico:isOrWasHolderOf."
    keywords:
    - public works
    - infrastructure
    - municipal projects
    - construction
    - civic infrastructure
  LocalTaxRecordsSeries:
    is_a: LocalGovernmentArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A series of records documenting local taxation, assessment, and revenue administration.
    alt_descriptions:
      nl: >-
        Een serie archiefbescheiden die lokale belastingheffing, aanslagen en inkomstenbeheer documenteert.
      de: >-
        Eine Serie von Unterlagen zur Dokumentation lokaler Besteuerung, Veranlagung und Einnahmenverwaltung.
      fr: >-
        Une serie de documents sur la fiscalite locale, l'evaluation et l'administration des recettes.
      es: >-
        Una serie de documentos sobre fiscalidad local, valoracion y administracion de ingresos.
      ar: >-
        سلسلة سجلات توثق الضرائب المحلية والتقييم وإدارة الإيرادات.
      id: >-
        Seri catatan yang mendokumentasikan perpajakan lokal, penilaian, dan administrasi pendapatan.
      zh: >-
        记录地方税收、评估与财政收入管理的记录系列。
    structured_aliases:
    - literal_form: gemeentelijke belastingserie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Kommunalsteueraktenserie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie des registres fiscaux locaux
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de registros fiscales locales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة السجلات الضريبية المحلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri catatan pajak daerah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方税务记录系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
