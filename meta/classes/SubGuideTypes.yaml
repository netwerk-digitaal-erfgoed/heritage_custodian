    is_a: SubGuideType
    class_uri: hc:DirectSubGuide
    description: >-
      Hierarchical subdivision of a main finding aid within the same institutional repository.
    alt_descriptions:
      nl: >-
        Hiërarchische onderverdeling van een hoofd-inventaris binnen dezelfde institutionele repository.
      de: >-
        Hierarchische Unterteilung eines Hauptfindbuchs innerhalb desselben institutionellen Repositoriums.
      fr: >-
        Subdivision hiérarchique d'un instrument de recherche principal dans le même dépôt institutionnel.
      es: >-
        Subdivisión jerárquica de una guía principal dentro del mismo repositorio institucional.
      ar: >-
        تقسيم فرعي هرمي لدليل رئيسي داخل نفس المستودع المؤسسي.
      id: >-
        Subdivisi hierarkis dari panduan utama dalam repositori kelembagaan yang sama.
      zh: >-
        同一机构存储库中主要检索工具的层级细分。
