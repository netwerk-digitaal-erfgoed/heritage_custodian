id: https://nde.nl/ontology/hc/class/HospitalArchiveRecordSetTypes
name: HospitalArchiveRecordSetTypes
title: Hospital Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./HospitalArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_note
  - ../slots/has_scope
  - ../slots/has_custodian
classes:
  HospitalAdministrationFonds:
    is_a: HospitalArchiveRecordSetType
    class_uri: hc:HospitalAdministrationFonds
    description: >-
      A fonds consisting of governance and administrative records created by hospital management.
    alt_descriptions:
      nl: >-
        Een fonds met bestuurlijke en administratieve archiefbescheiden die door de ziekenhuisleiding zijn gevormd.
      de: >-
        Ein Fonds mit Leitungs- und Verwaltungsunterlagen, die von der Krankenhausleitung erstellt wurden.
      fr: >-
        Un fonds de documents de gouvernance et d'administration produits par la direction d'un hopital.
      es: >-
        Un fondo de documentos de gobernanza y administracion generados por la direccion de un hospital.
      ar: >-
        صندوق يتكون من سجلات الحوكمة والإدارة التي أنشأتها إدارة المستشفى.
      id: >-
        Sebuah fonds berisi catatan tata kelola dan administrasi yang dibuat oleh manajemen rumah sakit.
      zh: >-
        由医院管理层形成的治理与行政记录构成的全宗。
    structured_aliases:
    - {literal_form: ziekenhuisbestuursfonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Krankenhausverwaltungsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds administratif hospitalier, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo administrativo hospitalario, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: صندوق إدارة المستشفى, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds administrasi rumah sakit, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 医院行政全宗, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - hospital administration
      - governance records
      - institutional management
      - healthcare governance
      - administrative fonds
    slots:
      - has_type
      - has_score
      - has_note
      - has_scope
      - has_custodian
    slot_usage:
      has_custodian:
        equals_string: "hc:HospitalArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
  PatientRecordsSeries:
    is_a: HospitalArchiveRecordSetType
    class_uri: hc:PatientRecordsSeries
    description: >-
      A series of clinical care records documenting patient episodes of care and subject to heightened privacy controls.
    alt_descriptions:
      nl: >-
        Een serie zorgdossiers die patiëntenzorgtrajecten documenteert en onder strengere privacybeperkingen valt.
      de: >-
        Eine Serie klinischer Behandlungsunterlagen, die Patientenkontakte dokumentiert und strengen Datenschutzregeln unterliegt.
      fr: >-
        Une serie de dossiers de soins documentant les episodes de prise en charge des patients et soumise a des controles de confidentialite renforces.
      es: >-
        Una serie de registros de atencion clinica que documenta episodios de atencion al paciente y esta sujeta a controles de privacidad reforzados.
      ar: >-
        سلسلة من سجلات الرعاية السريرية التي توثق حلقات رعاية المرضى وتخضع لقيود خصوصية مشددة.
      id: >-
        Seri catatan perawatan klinis yang mendokumentasikan episode perawatan pasien dan tunduk pada kontrol privasi yang lebih ketat.
      zh: >-
        记录患者就诊与护理过程并受更严格隐私控制约束的一组临床护理记录系列。
    structured_aliases:
    - {literal_form: patientendossierserie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Patientenaktenserie, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de dossiers patients, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de historias clinicas, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات المرضى, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri catatan pasien, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 病历系列, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - patient records
      - clinical care
      - medical privacy
      - patient episodes
      - healthcare documentation
    slots:
      - has_type
      - has_score
      - has_note
      - has_scope
      - has_custodian
    slot_usage:
      has_custodian:
        equals_string: "hc:HospitalArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
  MedicalResearchCollection:
    is_a: HospitalArchiveRecordSetType
    class_uri: hc:MedicalResearchCollection
    description: >-
      A collection of materials documenting clinical and medical research activities, including protocols, datasets, and ethics or regulatory approvals.
    alt_descriptions:
      nl: >-
        Een collectie materiaal die klinisch en medisch onderzoek documenteert, waaronder protocollen, datasets en ethische of regulatorische goedkeuringen.
      de: >-
        Eine Sammlung von Materialien zur Dokumentation klinischer und medizinischer Forschung, einschliesslich Protokollen, Datensaetzen sowie ethischer oder regulatorischer Genehmigungen.
      fr: >-
        Une collection de documents relatifs a la recherche clinique et medicale, incluant des protocoles, des jeux de donnees et des autorisations ethique ou reglementaires.
      es: >-
        Una coleccion de materiales que documenta actividades de investigacion clinica y medica, incluidos protocolos, conjuntos de datos y aprobaciones eticas o regulatorias.
      ar: >-
        مجموعة من المواد التي توثق أنشطة البحث الطبي والسريري، بما في ذلك البروتوكولات ومجموعات البيانات والموافقات الأخلاقية أو التنظيمية.
      id: >-
        Koleksi materi yang mendokumentasikan kegiatan riset klinis dan medis, termasuk protokol, kumpulan data, serta persetujuan etik atau regulasi.
      zh: >-
        记录临床与医学研究活动（包括研究方案、数据集以及伦理或监管审批文件）的材料收藏。
    structured_aliases:
    - {literal_form: medische onderzoekscollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: medizinische Forschungssammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de recherche medicale, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de investigacion medica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة البحث الطبي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi riset medis, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 医学研究收藏, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - clinical research
      - medical protocols
      - research datasets
      - ethics approvals
      - clinical trials
    slots:
      - has_type
      - has_score
      - has_note
      - has_scope
      - has_custodian
    slot_usage:
      has_custodian:
        equals_string: "hc:HospitalArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
  NursingRecordsCollection:
    is_a: HospitalArchiveRecordSetType
    class_uri: hc:NursingRecordsCollection
    description: >-
      A collection of records documenting nursing education, training, and professional practice.
    alt_descriptions:
      nl: >-
        Een collectie archiefbescheiden die verpleegkundige opleidingen, training en beroepspraktijk documenteert.
      de: >-
        Eine Sammlung von Unterlagen zur Dokumentation der Pflegeausbildung, Schulung und beruflichen Praxis.
      fr: >-
        Une collection de documents relatifs a la formation en soins infirmiers et a la pratique professionnelle.
      es: >-
        Una coleccion de documentos que registra la formacion en enfermeria y la practica profesional.
      ar: >-
        مجموعة من السجلات التي توثق تعليم التمريض والتدريب والممارسة المهنية.
      id: >-
        Koleksi catatan yang mendokumentasikan pendidikan keperawatan, pelatihan, dan praktik profesional.
      zh: >-
        记录护理教育、培训与职业实践的材料收藏。
    structured_aliases:
    - {literal_form: verpleegkundedocumentatiecollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Pflegedokumentationssammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de dossiers infirmiers, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de registros de enfermeria, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة سجلات التمريض, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi catatan keperawatan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 护理记录收藏, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - nursing education
      - nursing practice
      - healthcare training
      - professional records
      - nursing documentation
    slots:
      - has_type
      - has_score
      - has_note
      - has_scope
      - has_custodian
    slot_usage:
      has_custodian:
        equals_string: "hc:HospitalArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
  MedicalPhotographyCollection:
    is_a: HospitalArchiveRecordSetType
    class_uri: hc:MedicalPhotographyCollection
    description: >-
      A collection of photographic or imaging materials used for medical documentation and clinical or institutional reference.
    alt_descriptions:
      nl: >-
        Een collectie fotografisch of beeldvormend materiaal dat wordt gebruikt voor medische documentatie en klinische of institutionele referentie.
      de: >-
        Eine Sammlung fotografischer oder bildgebender Materialien fuer medizinische Dokumentation sowie klinische oder institutionelle Referenz.
      fr: >-
        Une collection de photographies ou d'images utilisees pour la documentation medicale et comme reference clinique ou institutionnelle.
      es: >-
        Una coleccion de materiales fotograficos o de imagen utilizados para la documentacion medica y como referencia clinica o institucional.
      ar: >-
        مجموعة من المواد الفوتوغرافية أو التصويرية المستخدمة للتوثيق الطبي وللرجوع السريري أو المؤسسي.
      id: >-
        Koleksi materi fotografi atau pencitraan yang digunakan untuk dokumentasi medis dan referensi klinis atau institusional.
      zh: >-
        用于医疗文档记录以及临床或机构参考的摄影或影像资料收藏。
    structured_aliases:
    - {literal_form: medische fotocollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: medizinische Fotosammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de photographies medicales, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de fotografia medica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة الصور الطبية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi fotografi medis, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 医学影像收藏, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - medical photography
      - clinical imaging
      - medical documentation
      - institutional reference
      - visual records
    slots:
      - has_type
      - has_score
      - has_note
      - has_scope
      - has_custodian
    slot_usage:
      has_custodian:
        equals_string: "hc:HospitalArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
