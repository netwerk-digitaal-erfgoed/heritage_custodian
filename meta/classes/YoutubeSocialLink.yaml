id: https://nde.nl/ontology/hc/classes/YoutubeSocialLink
name: YoutubeSocialLink
title: YoutubeSocialLink
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
