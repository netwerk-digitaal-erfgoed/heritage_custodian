classes:
  YoutubeSocialLink:
    description: >-
      Outbound profile or website pointer captured from a channel about-page for
      cross-platform identity resolution.
    alt_descriptions:
      nl: Social media link van de informatiepagina van een YouTube-kanaal, met links naar externe platforms zoals websites, Facebook, Twitter, Instagram en andere online aanwezigheid.
      de: Social-Media-Link von der Info-Seite eines YouTube-Kanals, der zu externen Plattformen wie Websites, Facebook, Twitter, Instagram und anderer Online-Präsenz führt.
      fr: Lien vers les réseaux sociaux depuis la page "À propos" d'une chaîne YouTube, reliant à des plateformes externes comme les sites web, Facebook, Twitter, Instagram et autre présence en ligne.
      es: Enlace de redes sociales desde la página de información de un canal de YouTube, que enlaza a plataformas externas como sitios web, Facebook, Twitter, Instagram y otra presencia en línea.
      ar: رابط وسائل التواصل الاجتماعي من صفحة "حول" لقناة YouTube، يربط بمنصات خارجية مثل مواقع الويب وفيسبوك وتويتر وإنستغرام ووجود آخر عبر الإنترنت.
      id: Tautan media sosial dari halaman tentang saluran YouTube, menautkan ke platform eksternal seperti situs web, Facebook, Twitter, Instagram, dan kehadiran online lainnya.
      zh: 来自YouTube频道关于页面的社交媒体链接，链接到网站、Facebook、Twitter、 Instagram等外部平台和其他在线存在。
    class_uri: schema:WebPage
    broad_mappings:
    - schema:WebPage
    close_mappings:
