classes:
  KeyPeriod:
    class_uri: hc:KeyPeriod
    description: >-
      Historically significant temporal interval used to frame organizational transformations, governance changes, or stewardship phases.
    alt_descriptions:
      nl: >-
        Historisch significant tijdsinterval gebruikt om organisatorische transformaties, bestuursveranderingen of beheerfasen te omkaderen.
      de: >-
        Historisch bedeutsames Zeitintervall zur Rahmung organisatorischer Transformationen, Governance-Änderungen oder Bewahrungsphasen.
      fr: >-
        Intervalle temporel historiquement significatif utilisé pour encadrer les transformations organisationnelles, les changements de gouvernance ou les phases de garde.
      es: >-
        Intervalo temporal históricamente significativo utilizado para enmarcar transformaciones organizacionales, cambios de gobernanza o fases de custodia.
      ar: >-
        فترة زمنية ذات أهمية تاريخية تُستخدم لتأطير التحولات التنظيمية أو تغييرات الحوكمة أو مراحل الرعاية.
      id: >-
        Interval temporal yang signifikan secara historis yang digunakan untuk membingkai transformasi organisasi, perubahan tata kelola, atau fase pengelolaan.
      zh: >-
        具有历史意义的时间间隔，用于框架组织转型、治理变更或保管阶段。
