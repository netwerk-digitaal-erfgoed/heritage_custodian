classes:
  FieldOfStudy:
    class_uri: skos:Concept
    description: >-
      Disciplinary domain or research area used to classify academic or scholarly specialization.
    alt_descriptions:
      nl: >-
        Disciplinair domein of onderzoeksgebied dat wordt gebruikt om academische of wetenschappelijke specialisatie te classificeren.
      de: >-
        Disziplinäres Gebiet oder Forschungsbereich zur Klassifizierung akademischer oder wissenschaftlicher Spezialisierung.
      fr: >-
        Domaine disciplinaire ou domaine de recherche utilisé pour classer la spécialisation académique ou savante.
      es: >-
        Dominio disciplinar o área de investigación utilizada para clasificar la especialización académica o académica.
      ar: >-
        مجال تخصصي أو مجال بحثي يستخدم لتصنيف التخصص الأكاديمي أو العلمي.
      id: >-
        Domain disipliner atau bidang penelitian yang digunakan untuk mengklasifikasikan spesialisasi akademis atau ilmiah.
      zh: >-
        用于分类学术或学术专业化的学科领域或研究领域。
