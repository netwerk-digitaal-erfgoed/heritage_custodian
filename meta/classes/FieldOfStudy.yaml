id: https://nde.nl/ontology/hc/class/FieldOfStudy
name: FieldOfStudy
title: Field Of Study Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
