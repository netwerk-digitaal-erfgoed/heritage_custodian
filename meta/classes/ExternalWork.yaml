id: https://nde.nl/ontology/hc/classes/ExternalWork
name: ExternalWork
title: External Work Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_description
classes:
  ExternalWork:
    class_uri: schema:Service
    description: >-
      Contracted service or commissioned activity performed by external parties
      on behalf of a heritage institution.
    alt_descriptions:
      nl: >-
        Gecontracteerde dienst of geautoriseerde activiteit uitgevoerd door externe partijen
        namens een erfgoedinstelling.
      de: >-
        Beauftragte Dienstleistung oder in Auftrag gegebene Tätigkeit, die von externen Parteien
        im Namen einer Heritage-Institution durchgeführt wird.
      fr: >-
        Service contracté ou activité commanditée réalisée par des parties externes
        au nom d'une institution patrimoniale.
      es: >-
        Servicio contratado o actividad encargada realizada por partes externas
        en nombre de una institución patrimonial.
      ar: >-
        خدمة متعاقد عليها أو نشاط مُكلَّف به يقوم به أطراف خارجية
        نيابة عن مؤسسة تراثية.
      id: >-
        Layanan yang dikontrak atau aktivitas yang ditugaskan yang dilakukan oleh pihak eksternal
        atas nama lembaga warisan.
      zh: >-
        由外部方代表遗产机构执行的承包服务或委托活动。
    structured_aliases:
    - literal_form: externe opdracht
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: externe Leistung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: prestation externe
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: trabajo externo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: عمل خارجي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pekerjaan eksternal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 外部工作
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Service
    close_mappings:
    - schema:Offer
    slots:
    - has_label
    - has_description
    comments:
    - Tracks outsourced conservation, digitization, or consulting services.
    - Used for vendor management and service procurement documentation.
    - 'Preserved from prior description: External service or contracted work item accepted or commissioned by an institution.'
    keywords:
    - contracted service
    - external contractor
    - service procurement
    - commissioned work
    examples:
    - value:
        has_label: Conservation Treatment
        has_description: Professional cleaning and stabilization of 18th-century textile.
      description: External conservation service engagement
    annotations:
      custodian_types: '["M", "A", "L", "G"]'
      custodian_types_rationale: External service procurement is common in institutional operations.
      custodian_types_primary: M
      specificity_score: 0.6
      specificity_rationale: Operational service class for external work engagement.
