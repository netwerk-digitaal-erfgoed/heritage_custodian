id: https://nde.nl/ontology/hc/class/DispositionServiceTypes
name: DispositionServiceTypes
title: Disposition Service Types
description: Concrete types of disposition services. MIGRATED from disposition_service string (2026-01-26).
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- ./DispositionServiceType
- linkml:types
default_prefix: hc
classes:
  SecureDestructionService:
    is_a: DispositionServiceType
    description: >-
      Disposition service providing certified secure destruction of records requiring
      confidential disposal or sensitive data elimination.
    alt_descriptions:
      nl: >-
        Dispositiedienst die gecertificeerde veilige vernietiging van records biedt die
        vertrouwelijke verwijdering of gevoelige gegevenseliminatie vereisen.
      de: >-
        Dispositionsdienst, der zertifizierte sichere Vernichtung von Unterlagen bietet, die
        vertrauliche Entsorgung oder sensible Dateneliminierung erfordern.
      fr: >-
        Service de disposition fournissant la destruction sécurisée certifiée de documents nécessitant
        une élimination confidentielle ou une suppression de données sensibles.
      es: >-
        Servicio de disposición que proporciona destrucción segura certificada de registros que requieren
        eliminación confidencial o eliminación de datos sensibles.
      ar: >-
        خدمة التصرف التي توفر تدميرًا آمنًا معتمدًا للسجلات التي تتطلب
        التخلص السري أو إزالة البيانات الحساسة.
      id: >-
        Layanan disposisi yang menyediakan penghancuran aman tersertifikasi untuk catatan yang memerlukan
        pembuangan rahasia atau penghapusan data sensitif.
      zh: >-
        为需要机密处置或敏感数据消除的记录提供经认证的安全销毁的处置服务。
    structured_aliases:
    - literal_form: veilige vernietiging
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: sichere Vernichtung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: destruction sécurisée
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: destrucción segura
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: التدمير الآمن
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: penghancuran aman
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 安全销毁
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    comments:
    - Used for confidential or sensitive records requiring certified destruction.
    - Provides audit trail for compliance purposes.
    - 'Preserved from prior description: Secure destruction of records.'
    keywords:
    - secure destruction
    - confidential disposal
    - certified elimination
    - sensitive data
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  PermanentArchiveTransferService:
    is_a: DispositionServiceType
    description: >-
      Disposition service facilitating the transfer of records to a permanent archival
      repository for long-term preservation.
    alt_descriptions:
      nl: >-
        Dispositiedienst die de overdracht van records naar een permanent archiefdepot
        voor langetermijnbehoud faciliteert.
      de: >-
        Dispositionsdienst, der die Übertragung von Unterlagen an ein dauerhaftes Archivdepot
        zur langfristigen Aufbewahrung erleichtert.
      fr: >-
        Service de disposition facilitant le transfert de documents vers un dépôt archivistique
        permanent pour la conservation à long terme.
      es: >-
        Servicio de disposición que facilita la transferencia de registros a un repositorio
        archivístico permanente para preservación a largo plazo.
      ar: >-
        خدمة التصرف التي تسهل نقل السجلات إلى مستودع أرشيفي دائم
        للحفظ طويل الأمد.
      id: >-
        Layanan disposisi yang memfasilitasi transfer catatan ke repositori arsip permanen
        untuk pelestarian jangka panjang.
      zh: >-
        促进将记录转移到永久档案库以进行长期保存的处置服务。
    structured_aliases:
    - literal_form: permanente archiefoverdracht
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: permanente Archivübertragung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: transfert d'archives permanent
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: transferencia de archivo permanente
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نقل الأرشيف الدائم
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: transferensi arsip permanen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 永久档案移交
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    comments:
    - Transfers records with permanent retention value to archival custody.
    - Includes legal transfer of ownership and custody protocols.
    - 'Preserved from prior description: Transfer of records to a permanent archive.'
    keywords:
    - archival transfer
    - permanent preservation
    - records transfer
    - long-term custody
  DepositorReturnService:
    is_a: DispositionServiceType
    description: >-
      Disposition service handling the return of records to the originating depositing
      organization after processing or retention period.
    alt_descriptions:
      nl: >-
        Dispositiedienst die de terugzending van records naar de oorspronkelijke deponerende
        organisatie na verwerking of bewaartermijn afhandelt.
      de: >-
        Dispositionsdienst, der die Rücksendung von Unterlagen an die ursprüngliche hinterlegende
        Organisation nach Bearbeitung oder Aufbewahrungsfrist abwickelt.
      fr: >-
        Service de disposition gérant le retour des documents à l'organisation déposante
        d'origine après traitement ou période de conservation.
      es: >-
        Servicio de disposición que maneja la devolución de registros a la organización
        depositante original después del procesamiento o período de retención.
      ar: >-
        خدمة التصرف التي تتولى إعادة السجلات إلى المنظمة المودعة الأصلية
        بعد المعالجة أو فترة الاحتفاظ.
      id: >-
        Layanan disposisi yang menangani pengembalian catatan ke organisasi penyetor asli
        setelah pemrosesan atau periode retensi.
      zh: >-
        处理在处理或保管期后将记录归还给原始存档组织的处置服务。
    structured_aliases:
    - literal_form: depotretour
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Hinterlegungsrückgabe
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: retour au déposant
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: devolución al depositante
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: إعادة للمودع
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pengembalian ke penyetor
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 存档人归还
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    comments:
    - Returns records to originating organization after processing.
    - Used when records do not require permanent archival retention.
    - 'Preserved from prior description: Return of records to the depositing organization.'
    keywords:
    - record return
    - depositor service
    - records disposition
    - custody return
