id: https://w3id.org/nde/ontology/MilitaryArchive
name: MilitaryArchive
title: Military Archive
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  MilitaryArchive:
    description: >-
      Archive organization focused on preservation of defense, armed-forces, and
      military-administration records.
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    alt_descriptions:
      nl: Archieforganisatie gericht op het behoud van defensie- krijgsmacht- en militaire bestuursarchieven.
      de: Archivorganisation mit Schwerpunkt auf Erhalt von Verteidigungs- Streitkraefte- und Militaerverwaltungsunterlagen.
      fr: Organisation archivistique consacree a la preservation des archives de defense des forces armees et de l administration militaire.
      es: Organizacion archivistica enfocada en la preservacion de registros de defensa fuerzas armadas y administracion militar.
      ar: منظمة أرشيفية تركز على حفظ سجلات الدفاع والقوات المسلحة والإدارة العسكرية.
      id: Organisasi arsip yang berfokus pada pelestarian rekaman pertahanan angkatan bersenjata dan administrasi militer.
      zh: 专注保存国防、武装力量及军事行政记录的档案机构。
    structured_aliases:
    - {literal_form: militair archief, in_language: nl}
    - {literal_form: Militaerarchiv, in_language: de}
    - {literal_form: archive militaire, in_language: fr}
    - {literal_form: archivo militar, in_language: es}
    - {literal_form: أرشيف عسكري, in_language: ar}
    - {literal_form: arsip militer, in_language: id}
    - {literal_form: 军事档案机构, in_language: zh}
    close_mappings:
    - rico:CorporateBody
    - skos:Concept
    - wd:Q1934883
    broad_mappings:
    - wd:Q166118
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    slot_usage:
      identified_by:
      has_type:
        any_of:
        - equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: Military Archive
      skos:altLabel: "Militärarchiv, archivo militar, archive militaire, Defense Archive, Armed Forces Archive"
      subject_domain: military/defense
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - GovernmentArchive
    - NationalArchives
    - WarArchive
    - MilitaryArchiveRecordSetType
    comments:
    - "Militärarchiv (de)"
    - archivo militar (es)
    - archive militaire (fr)
    - Preserves records of military and defense activities
    - Access often subject to declassification schedules
    - Important for military history and veterans' affairs
