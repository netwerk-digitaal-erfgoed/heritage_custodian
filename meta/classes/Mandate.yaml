id: https://nde.nl/ontology/hc/class/Mandate
name: Mandate
title: Mandate Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_description
- ../slots/has_type
classes:
  Mandate:
    class_uri: skos:Concept
    description: >-
      Formal authorization defining the scope of authority, responsibilities, and operational remit for an organizational role or entity.
    alt_descriptions:
      nl: >-
        Formele machtiging die de reikwijdte van bevoegdheid, verantwoordelijkheden en operationeel mandaat voor een organisatorische rol of entiteit definieert.
      de: >-
        Formelle Genehmigung, die den Umfang der Befugnisse, Verantwortlichkeiten und des operativen Mandats für eine organisatorische Rolle oder Entität definiert.
      fr: >-
        Autorisation formelle définissant l'étendue de l'autorité, des responsabilités et du mandat opérationnel pour un rôle organisationnel ou une entité.
      es: >-
        Autorización formal que define el alcance de la autoridad, responsabilidades y mandato operativo para un rol organizacional o entidad.
      ar: >-
        تفويض رسمي يحدد نطاق السلطة والمسؤوليات والتفويض التشغيلي لدور تنظيمي أو كيان.
      id: >-
        Otorisasi formal yang mendefinisikan ruang lingkup wewenang, tanggung jawab, dan mandat operasional untuk peran organisasi atau entitas.
      zh: >-
        定义组织角色或实体的权力范围、职责和运营权限的正式授权。
    structured_aliases:
    - literal_form: mandaat
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Mandat
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: mandat
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: mandato
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تفويض
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: mandat
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 授权
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    slots:
    - has_label
    - has_description
    - has_type
    comments:
    - Defines legal or governance basis for institutional activities.
    - Used for documenting organizational authority and jurisdictional scope.
    - 'Preserved from prior description: Formal authority, responsibility, or remit assigned to a role or organization.'
    keywords:
    - formal authorization
    - organizational authority
    - governance remit
    - legal basis
    examples:
    - value:
        has_label: Heritage Preservation Mandate
        has_description: Legal authority to preserve cultural heritage assets.
      description: Institutional mandate for heritage custodians
    annotations:
      specificity_score: 0.3
      specificity_rationale: Governance concept class for assigned institutional responsibilities.
      custodian_types: '["*"]'
