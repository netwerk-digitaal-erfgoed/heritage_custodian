classes:
  Curator:
    is_a: StaffRole
    description: >-
      Professional role responsible for research, acquisition strategy, and
      interpretive presentation of holdings.
    alt_descriptions:
      nl: >-
        Professionele rol die verantwoordelijk is voor onderzoek,
        verwervingsstrategie en interpretatieve presentatie van collecties.
      de: >-
        Berufsrolle mit Verantwortung für Forschung, Erwerbsstrategie und
        interpretative Präsentation von Beständen.
      fr: >-
        Rôle professionnel responsable de la recherche, de la stratégie
        d'acquisition et de la présentation interprétative des fonds.
      es: >-
        Rol profesional responsable de investigación, estrategia de adquisición
        y presentación interpretativa de los fondos.
      ar: >-
        دور مهني مسؤول عن البحث واستراتيجية الاقتناء والعرض التفسيري
        للمقتنيات.
      id: >-
        Peran profesional yang bertanggung jawab atas riset, strategi
        akuisisi, dan penyajian interpretatif koleksi.
      zh: >-
        负责藏品研究、征集策略与诠释展示的专业岗位。
    close_mappings:
    - wd:Q674426
    structured_aliases:
    - literal_form: collectiecurator
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Kurator
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: conservateur de collection
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: curador de colecciones
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: أمين مقتنيات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kurator koleksi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 馆藏策展岗位
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Covers scholarly stewardship, acquisition planning, and interpretive framing.
    - Preserved scope detail: includes exhibition development responsibilities.
    - 'Preserved from prior description: Curator responsible for collections research, acquisition, and exhibitions.'
    keywords:
    - collection research
    - acquisition strategy
    - interpretive presentation
    - stewardship role
    examples:
    - value:
        has_score: 0.94
      description: Staff role assignment used for curatorial responsibility modeling.
    slot_usage:
      categorized_as:
        ifabsent: string(CURATORIAL)
    slots:
    - has_score
