id: https://nde.nl/ontology/hc/class/ConditionofAccess
name: ConditionofAccess
title: Condition of Access
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_name
classes:
  ConditionofAccess:
    class_uri: hc:ConditionofAccess
    description: >-
      Rule set defining prerequisites, constraints, and procedural requirements for
      consulting, reusing, or requesting heritage resources.
    alt_descriptions:
      nl: >-
        Verzameling regels die voorwaarden, beperkingen en procedurele vereisten
        vastlegt voor het raadplegen, hergebruiken of aanvragen van erfgoedbronnen.
      de: >-
        Regelwerk, das Voraussetzungen, Einschränkungen und Verfahrensanforderungen
        fuer die Einsicht, Nachnutzung oder Beantragung von Kulturerbe-Ressourcen
        festlegt.
      fr: >-
        Ensemble de regles definissant les prealables, les contraintes et les
        exigences procedurales pour consulter, reutiliser ou demander des ressources
        patrimoniales.
      es: >-
        Conjunto de reglas que define requisitos previos, restricciones y
        procedimientos para consultar, reutilizar o solicitar recursos patrimoniales.
      ar: >-
        مجموعة قواعد تحدد المتطلبات المسبقة والقيود والإجراءات اللازمة للاطلاع على
        موارد التراث أو إعادة استخدامها أو طلبها.
      id: >-
        Kumpulan aturan yang menetapkan prasyarat, batasan, dan persyaratan prosedural
        untuk menelaah, menggunakan kembali, atau meminta sumber daya warisan.
      zh: >-
        规定查阅、再利用或申请遗产资源时前提条件、限制与流程要求的规则集合。
    structured_aliases:
      - literal_form: raadplegingsvoorwaarden
        in_language: nl
      - literal_form: Nutzungsauflagen
        in_language: de
      - literal_form: regles de consultation
        in_language: fr
      - literal_form: reglas de consulta
        in_language: es
      - literal_form: شروط الاطلاع
        in_language: ar
      - literal_form: ketentuan konsultasi
        in_language: id
      - literal_form: 查阅规则
        in_language: zh
    slots:
      - has_name
      - has_description
    examples:
      - value:
          has_name: Reading room registration and ID check
          has_description:
            description_text: Researchers must register, present photo ID, and agree to supervised handling.
        description: On-site consultation prerequisites for fragile materials
      - value:
          has_name: Restricted consultation period
          has_description:
            description_text: Personal files remain unavailable for 75 years from creation unless legal exception applies.
        description: Time-based restriction on sensitive records
    keywords:
      - consultation requirements
      - reading room rules
      - legal restrictions
      - embargo periods
      - user obligations
    broad_mappings:
      - rico:Rule
    close_mappings:
      - dcterms:RightsStatement
    comments:
      - Captures normative constraints rather than observed preservation status.
      - Used to represent legal, ethical, and procedural requirements on consultation.
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.45"
      specificity_rationale: Specific rule class for consultation and reuse governance.
