classes:
  ExternalFunding:
    class_uri: frapo:Funding
    description: >-
      Financial contribution received from an external entity such as a grant-making body, government agency, or private donor.
    alt_descriptions:
      nl: >-
        Financiële bijdrage ontvangen van een externe entiteit zoals een subsidieverstrekker, overheidsinstantie of particuliere donor.
      de: >-
        Finanzieller Beitrag, der von einer externen Entität wie einem Förderer, einer Behörde oder einem privaten Spender erhalten wurde.
      fr: >-
        Contribution financière reçue d'une entité externe telle qu'un organisme de subvention, une agence gouvernementale ou un donateur privé.
      es: >-
        Contribución financiera recibida de una entidad externa como un organismo de subvenciones, agencia gubernamental o donante privado.
      ar: >-
        مساهمة مالية مستلمة من كيان خارجي مثل جهة منح أو وكالة حكومية أو متبرع خاص.
      id: >-
        Kontribusi keuangan yang diterima dari entitas eksternal seperti badan hibah, lembaga pemerintah, atau donor swasta.
      zh: >-
        从赠款机构、政府机构或私人捐助者等外部实体获得的财政捐款。
