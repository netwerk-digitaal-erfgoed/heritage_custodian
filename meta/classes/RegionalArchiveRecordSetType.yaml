classes:
  RegionalArchiveRecordSetType:
    abstract: true
    class_uri: rico:RecordSetType
    description: >-
      Abstract base class for record set types specific to regional archives.
    alt_descriptions:
      nl: Abstracte basisklasse voor archiefbestandstypen specifiek voor regionale archieven.
      de: Abstrakte Basisklasse für Bestandstypen regionaler Archive.
      fr: Classe de base abstraite pour les types de fonds d'archives régionaux.
      es: Clase base abstracta para tipos de fondos de archivos regionales.
      ar: فئة أساسية مجردة لأنواع مجموعات الأرشيف الإقليمية.
      id: Kelas dasar abstrak untuk tipe set rekaman arsip regional.
      zh: 区域档案记录集类型的抽象基类。
    comments:
    - Regional archives preserve records documenting regional governance, administration, and cultural heritage at the provincial, state, or territorial level.
    - In the Netherlands, regional archives (Regionaal Historisch Centrum, RHC) serve multiple municipalities within a region.
    - Subclasses specify both the domain (regional administration, land records, etc.) and the organizational principle (fonds, series, collection).
    - Note that rico-rst:Fonds, rico-rst:Series, and rico-rst:Collection are named individuals (instances) in RiC-O, not classes.
    structured_aliases:
    - literal_form: regionaal archiefbestandstype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Regionalarchiv-Bestandstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de fonds d'archives régional
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de fondo de archivo regional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع مجموعة أرشيف إقليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe set rekaman arsip regional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区域档案记录集类型
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - regional archives
    - provincial records
    - territorial administration
    - local governance
    - regional heritage
    broad_mappings:
