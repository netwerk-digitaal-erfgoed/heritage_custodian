id: https://nde.nl/ontology/hc/class/Container
name: Container
title: Heritage Custodian Data Container
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_score
classes:
  Container:
    tree_root: true
    class_uri: prov:Collection
    description: >-
      Validation root aggregating heterogeneous instance data for batch loading,
      schema validation, and integrity checking workflows.
    alt_descriptions:
      nl: >-
        Validatiewortel die heterogene instantiegegevens samenvoegt voor batchladen,
        schemavalidatie en integriteitscontroleworkflows.
      de: >-
        Validierungswurzel, die heterogene Instanzdaten für Stapelladen, Schema-Validierung
        und Integritätsprüfungs-Workflows aggregiert.
      fr: >-
        Racine de validation agrégeant des données d'instance hétérogènes pour le chargement
        par lots, la validation de schéma et les flux de vérification d'intégrité.
      es: >-
        Raíz de validación que agrega datos de instancia heterogéneos para carga por lotes,
        validación de esquema y flujos de verificación de integridad.
      ar: >-
        جذر التحقق الذي يجمع بيانات الحالة غير المتجانسة لتحميل الدفعات والتحقق من المخطط وعمليات فحص التكامل.
      id: >-
        Akar validasi yang mengagregasi data instans heterogen untuk pemuatan batch,
        validasi skema, dan alur kerja pemeriksaan integritas.
      zh: >-
        聚合异构实例数据用于批量加载、模式验证和完整性检查工作流的验证根。
    broad_mappings:
      - prov:Collection
    related_mappings:
      - schema:Dataset
    slots:
      - has_score
      - has_custodian
      - has_note
      - has_label
      - has_section
      - identified_by
      - has_profile
    comments:
      - Technical container for LinkML instance validation workflows
