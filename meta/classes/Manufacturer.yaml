- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_url
classes:
  Manufacturer:
    class_uri: schema:Organization
    description: >-
      Organization engaged in the production of devices, equipment, or technical components for commercial or industrial purposes.
    alt_descriptions:
      nl: >-
        Organisatie betrokken bij de productie van apparaten, apparatuur of technische componenten voor commerciële of industriële doeleinden.
      de: >-
        Organisation, die mit der Produktion von Geräten, Ausrüstung oder technischen Komponenten für kommerzielle oder industrielle Zwecke befasst ist.
      fr: >-
        Organisation engagée dans la production d'appareils, d'équipements ou de composants techniques à des fins commerciales ou industrielles.
      es: >-
        Organización dedicada a la producción de dispositivos, equipos o componentes técnicos con fines comerciales o industriales.
      ar: >-
        منظمة منخرطة في إنتاج الأجهزة أو المعدات أو المكونات التقنية لأغراض تجارية أو صناعية.
      id: >-
        Organisasi yang terlibat dalam produksi perangkat, peralatan, atau komponen teknis untuk tujuan komersial atau industri.
      zh: >-
        从事设备、装备或技术组件生产以用于商业或工业目的的组织。
