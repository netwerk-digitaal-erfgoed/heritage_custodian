id: https://nde.nl/ontology/hc/class/DigitalPlatformDataQualityNotes
name: DigitalPlatformDataQualityNotes
title: Digital Platform Data Quality Notes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dqv: http://www.w3.org/ns/dqv#
default_prefix: hc
imports:
  - linkml:types
classes:
  DigitalPlatformDataQualityNotes:
    class_uri: dqv:QualityAnnotation
    description: >-
      Annotation capturing verification status, completeness assessment, and documented
      limitations affecting dataset reliability.
    alt_descriptions:
      nl: >-
        Annotatie die de verificatiestatus, volledigheidsbeoordeling en gedocumenteerde
        beperkingen vastlegt die de betrouwbaarheid van de gegevensset beïnvloeden.
      de: >-
        Anmerkung, die den Verifikationsstatus, die Vollständigkeitsbewertung und dokumentierte
        Einschränkungen erfasst, die die Zuverlässigkeit des Datensatzes beeinflussen.
      fr: >-
        Annotation capturant l'état de vérification, l'évaluation de l'exhaustivité et les
        limitations documentées affectant la fiabilité du jeu de données.
      es: >-
        Anotación que captura el estado de verificación, la evaluación de completitud y las
        limitaciones documentadas que afectan la confiabilidad del conjunto de datos.
      ar: >-
        تعليق يلتقط حالة التحقق وتقييم الاكتمال والقيود الموثقة التي تؤثر على موثوقية مجموعة البيانات.
      id: >-
        Anotasi yang menangkap status verifikasi, penilaian kelengkapan, dan keterbatasan
        terdokumentasi yang memengaruhi keandalan kumpulan data.
      zh: >-
        捕获验证状态、完整性评估和影响数据集可靠性的已记录限制的注释。
    broad_mappings:
      - dqv:QualityAnnotation
    slots: []
