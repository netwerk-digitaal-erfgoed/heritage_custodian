id: https://nde.nl/ontology/hc/class/DepartmentalArchivesRecordSetTypes
name: DepartmentalArchivesRecordSetTypes
title: DepartmentalArchives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
  - ./DepartmentalArchivesRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  DepartmentAdministrationFonds:
    is_a: DepartmentalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a fonds for departement-level public
      administration records in France.
    alt_descriptions:
      nl: >-
        Documentaire aggregatie ingericht als fonds voor departementale
        overheidsadministratie in Frankrijk.
      de: >-
        Dokumentarische Aggregation als Fonds fuer Unterlagen der
        departementalen oeffentlichen Verwaltung in Frankreich.
      fr: >-
        Agregation documentaire organisee en fonds pour les documents
        d'administration publique departementale en France.
      es: >-
        Agregacion documental dispuesta como fondo para registros de
        administracion publica departamental en Francia.
      ar: >-
        تجميع وثائقي منظم كرصيد لسجلات الإدارة العامة
        على مستوى المقاطعات في فرنسا.
      id: >-
        Agregasi dokumenter yang disusun sebagai fonds untuk catatan
        administrasi publik tingkat departemen di Prancis.
      zh: >-
        以全宗方式组织的法国省级公共行政记录文献聚合体。
    structured_aliases:
      - literal_form: fonds departementale administratie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Fonds departementaler Verwaltung Frankreich
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: fonds d'administration departementale
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: fondo de administracion departamental
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: رصيد الإدارة العامة للمقاطعة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: fonds administrasi departemen Prancis
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 法国省级行政文献全宗
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: The description's territorial qualifier (France, departmental level) remains explicit as contextual scope.
    keywords:
      - departmental governance
      - French administration
      - public authority records
      - fonds provenance
    examples:
      - value:
          has_type: hc:DepartmentAdministrationFonds
          has_custodian: hc:DepartmentalArchives
          has_note: Prefectural directives, departmental decrees, and local administrative registers.
        description: Department-level French public-administration documentation grouped by provenance.
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:DepartmentAdministrationFonds
      has_custodian:
        equals_string: hc:DepartmentalArchives
      has_note:
        equals_string: This RecordSetType is typically held by DepartmentalArchives custodians.

  PrefectureSeries:
    is_a: DepartmentalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a series for prefectural governance,
      regulation, and civil administration records.
    alt_descriptions:
      nl: >-
        Documentaire aggregatie ingericht als reeks voor prefectoraal bestuur,
        regulering en civiele administratieve bronnen.
      de: >-
        Dokumentarische Aggregation als Serie fuer praefektorale Leitung,
        Regulierung und zivilverwaltungsbezogene Unterlagen.
      fr: >-
        Agregation documentaire organisee en serie pour les documents de
        gouvernance prefectorale, de regulation et d'administration civile.
      es: >-
        Agregacion documental dispuesta como serie para registros de
        gobernanza prefectural, regulacion y administracion civil.
      ar: >-
        تجميع وثائقي منظم كسلسلة لوثائق الحوكمة على مستوى المحافظة
        والتنظيم والإدارة المدنية.
      id: >-
        Agregasi dokumenter yang disusun sebagai seri untuk catatan
        tata kelola prefektur, regulasi, dan administrasi sipil.
      zh: >-
        以序列方式组织的省长行政区治理、监管与民政管理记录文献聚合体。
    structured_aliases:
      - literal_form: reeks prefecturale bestuursdossiers
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Folge praefekturaler Verwaltungsunterlagen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: serie de dossiers prefecturaux
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: serie de expedientes prefecturales
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: سلسلة سجلات إدارة المحافظة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: seri arsip administrasi prefektur
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 省长行政区治理文献序列
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Governance, regulation, and civil-administration facets are retained as explicit sequence scope.
    keywords:
      - prefectural governance
      - civil administration
      - regulatory record
      - documentary series
    examples:
      - value:
          has_type: hc:PrefectureSeries
          has_custodian: hc:DepartmentalArchives
          has_note: Prefect correspondence, enforcement records, and civil directives by cycle.
        description: Prefecture-level governance documentation arranged as a recurring series.
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:PrefectureSeries
      has_custodian:
        equals_string: hc:DepartmentalArchives
      has_note:
        equals_string: This RecordSetType is typically held by DepartmentalArchives custodians.
