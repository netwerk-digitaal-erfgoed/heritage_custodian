    keywords:
    - budget
    - financial plan
    - allocation
    - fiscal period
    - resource planning
    broad_mappings:
    - schema:FinancialProduct
    - frapo:FundingProgramme
    slots:
    - has_label
    - has_description
    - has_type
    - temporal_extent
    - has_quantity
    - has_currency
    - has_budget
    - has_main_part
    - has_section
    - allocate
    - include
    - funded_by
    - draw_endowment
    - approved_by
    - approved_on
    - based_on
    - has_status
    - identified_by
    - updated_at
    - documented_by
    - refer_to
    - derive_from
    - generated_by
    - has_operational_unit
    - has_score
    - has_measurement_unit
    slot_usage:
      has_label:
        required: true
        close_mappings:
        - dcterms:title
        description: Name/title for this budget document. MIGRATED from budget_name (2026-01-15) per Rule 53. Maps to dcterms:title as a formal title for a financial planning resource.
        examples:
        - value: Rijksmuseum Operating Budget FY2024
        - value: Noord-Hollands Archief Annual Budget 2024-2025
      has_description:
        required: false
        close_mappings:
        - dcterms:description
        description: Narrative description of this budget document's scope and purpose. MIGRATED from budget_description (2026-01-15) per Rule 53. Maps to dcterms:description for financial planning documentation.
        examples:
        - value: Annual operating budget for fiscal year 2024, including major exhibition initiatives and digitization expansion.
      has_type:
        multivalued: true
        required: true
        examples:
        - value:
          - OperatingBudget
          - ConsolidatedBudget
      temporal_extent:
        range: TimeSpan
        inlined: true
        required: false
        examples:
        - value:
            begin_of_the_begin: '2024-01-01'
            end_of_the_begin: '2024-01-01'
            begin_of_the_end: '2024-12-31'
            end_of_the_end: '2024-12-31'
        - value:
            begin_of_the_begin: '2024-04-01'
            end_of_the_begin: '2024-04-01'
            begin_of_the_end: '2025-03-31'
            end_of_the_end: '2025-03-31'
      has_quantity:
        range: decimal
        required: false
        examples:
        - value: 45000000.0
      has_currency:
        range: Currency
        inlined: true
        required: true
        examples:
        - value:
            currency_code: EUR
            has_label: Euro
            currency_symbol: "\u20AC"
        - value:
            currency_code: USD
            has_label: US Dollar
            currency_symbol: $
      has_budget:
        range: decimal
        required: false
      has_main_part:
        inlined: false
        required: false
        examples:
        - value:
            has_quantity:
            part_type: capital_budget
            currency_code: EUR
      has_section:
        range: decimal
        required: false
      allocate:
        required: false
        multivalued: true
        inlined: false
      include:
        multivalued: true
        inlined: false
      funded_by:
        range: decimal
        required: false
      draw_endowment:
        range: decimal
        required: false
      approved_by:
        range: Approver
        required: false
      has_status:
        range: BudgetStatus
        required: true
        examples:
        - value: '{value: "ACTIVE", effective_at: "2024-01-01"}'
        - value: '{value: "DRAFT", effective_at: "2023-10-01"}'
      identified_by:
        range: integer
        required: false
      updated_at:
        range: date
        required: false
      documented_by:
        multivalued: true
        inlined: false
        required: false
        examples:
        - value: https://nde.nl/ontology/hc/financial/rijksmuseum-annual-report-2024
      refer_to:
        range: Custodian
        required: true
      derive_from:
        multivalued: true
        required: false
      generated_by:
        range: ReconstructionActivity
        required: false
    comments:
    - Represents PLANNED financial allocations (not actuals)
    - 'Heritage-specific categories: acquisition, preservation, digitization budgets'
    - Links to FinancialStatement via documented_by inverse relationship
    - FRAPO frapo:FundingProgramme as primary ontology class
    - Budget transparency often legally required for nonprofits
    see_also:
    - http://purl.org/cerif/frapo/FundingProgramme
    - https://schema.org/FinancialStatement
    - https://nde.nl/ontology/hc/class/Custodian
    examples:
    - value:
        id: https://nde.nl/ontology/hc/budget/rm/fy2024
        has_label: Rijksmuseum Operating Budget FY2024
        has_description: Annual operating budget for fiscal year 2024, including major exhibition initiatives and digitization expansion.
        has_type:
        - OperatingBudget
        - ConsolidatedBudget
        temporal_extent:
          start_of_the_start: '2024-01-01'
          end_of_the_end: '2024-12-31'
        has_quantity: 45000000.0
        has_currency:
          currency_code: EUR
          has_label: Euro
          currency_symbol: "\u20AC"
        operating_budget: 38000000.0
        has_main_part:
          has_quantity:
          part_type: capital_budget
          currency_code: EUR
        acquisition_budget: 2000000.0
        personnel_budget: 22000000.0
        preservation_budget: 1500000.0
        allocate:
        - has_quantity:
            has_value: 500000.0
          has_unit:
            has_label: EUR
        innovation_budget: 750000.0
        include:
        - has_quantity:
          has_label: External Grants & Subsidies
        internal_funding: 25000000.0
        has_endowment_draw: 5000000.0
        approved_on:
          start_of_the_start: '2023-11-15'
        approved_by:
          approver_name: Board of Directors
        has_status:
          value: ACTIVE
          effective_at: '2024-01-01'
        refers_to_custodian: https://nde.nl/ontology/hc/nl-nh-ams-m-rm-q190804
    - value:
        id: https://nde.nl/ontology/hc/budget/nha/fy2024-2025
        has_label: Noord-Hollands Archief Annual Budget 2024-2025
        has_description: Provincial archive annual budget aligned with government fiscal year.
        has_type:
        - OperatingBudget
        - ConsolidatedBudget
        temporal_extent:
          start_of_the_start: '2024-04-01'
          end_of_the_end: '2025-03-31'
        has_quantity: 8500000.0
        has_currency:
          currency_code: EUR
          has_label: Euro
          currency_symbol: "\u20AC"
        operating_budget: 7500000.0
        has_main_part:
          has_quantity:
          part_type: capital_budget
          currency_code: EUR
        personnel_budget: 5200000.0
        allocate:
        - has_quantity:
            has_value: 800000.0
          has_unit:
            has_label: EUR
        include:
        - has_quantity:
          has_label: Province Subsidy
        internal_funding: 2500000.0
        approved_on:
          start_of_the_start: '2024-03-01'
        approved_by:
          approver_name: Province of Noord-Holland
        has_status:
          value: ACTIVE
          effective_at: '2024-04-01'
        refers_to_custodian: https://nde.nl/ontology/hc/nl-nh-haa-a-nha
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
      modeling_notes: |
        Distinguish budget plans from financial statements:
        budgets represent planned allocations, while financial statements report actuals.

        Typical heritage budget categories include operating, capital,
        acquisition, project, and endowment draw.

        Fiscal periods vary by institution and jurisdiction; model explicitly
        with temporal_extent.

        Mapping rationale:
        - class_uri: frapo:FundingProgramme for planned allocation programs
        - related_mappings: schema:MonetaryAmount and frapo:hasFunding for value modeling
