id: https://nde.nl/ontology/hc/class/StatementTypes
name: StatementTypes
title: Statement Types - Concrete Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
  - ./StatementType
  - linkml:types
  - ../slots/has_code
  - ../slots/identified_by
classes:
  MissionStatementType:
    is_a: StatementType
    class_uri: hc:MissionStatement
    description: >-
      Formal declaration articulating the fundamental purpose and primary objectives of an organization.
    alt_descriptions:
      nl: >-
        Formele verklaring die het fundamentele doel en de primaire doelstellingen van een organisatie articuleert.
      de: >-
        Formelle Erklärung, die den grundlegenden Zweck und die primären Ziele einer Organisation artikuliert.
      fr: >-
        Déclaration formelle articulant le but fondamental et les objectifs primaires d'une organisation.
      es: >-
        Declaración formal que articula el propósito fundamental y los objetivos primarios de una organización.
      ar: >-
        إعلان رسمي يُعبّر عن الغرض الأساسي والأهداف الأولية للمؤسسة.
      id: >-
        Deklarasi formal yang mengartikulasikan tujuan mendasar dan objektif primer suatu organisasi.
      zh: >-
        阐明组织根本宗旨与首要目标的正式声明。
    structured_aliases:
      - literal_form: missieverklaring
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Leitbild
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: énoncé de mission
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: enunciado de misión
        predicate: EXACT_SYNONYM
        in_language: es
    keywords:
      - mission
      - organizational purpose
      - strategic planning
    examples:
      - value: "To collect, preserve, and present Dutch art and history"
        description: Heritage domain mission statement
    slot_usage:
      has_code:
        equals_string: MISSION
      identified_by:
        equals_string: https://nde.nl/ontology/hc/statement-type/mission
    annotations:
      specificity_score: '0.50'
      specificity_rationale: Core organizational metadata
      custodian_types: '[''*'']'
    broad_mappings:
      - schema:CreativeWork
      - skos:Concept
  VisionStatementType:
    is_a: StatementType
    class_uri: hc:VisionStatement
    description: >-
      Aspirational declaration describing the desired future state and long-term direction of an organization.
    alt_descriptions:
      nl: >-
        Inspirerende verklaring die de gewenste toekomstige toestand en langetermijnrichting van een organisatie beschrijft.
      de: >-
        Aspirationelle Erklärung, die den angestrebten zukünftigen Zustand und die langfristige Ausrichtung einer Organisation beschreibt.
      fr: >-
        Déclaration aspirante décrivant l'état futur souhaité et l'orientation à long terme d'une organisation.
      es: >-
        Declaración aspiracional que describe el estado futuro deseado y la dirección a largo plazo de una organización.
      ar: >-
        إعلان طموح يصف الحالة المستقبلية المرجوة والتوجه طويل الأمد للمؤسسة.
      id: >-
        Deklarasi aspirasional yang menggambarkan keadaan masa depan yang diinginkan dan arah jangka panjang suatu organisasi.
      zh: >-
        描述组织期望的未来状态与长期方向的愿景声明。
    structured_aliases:
      - literal_form: visieverklaring
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zukunftsvision
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: énoncé de vision
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: enunciado de visión
        predicate: EXACT_SYNONYM
        in_language: es
    keywords:
      - vision
      - future state
      - strategic direction
    examples:
      - value: "To become the most accessible heritage collection in Europe"
        description: Heritage domain vision statement
    slot_usage:
      has_code:
        equals_string: VISION
      identified_by:
        equals_string: https://nde.nl/ontology/hc/statement-type/vision
    annotations:
      specificity_score: '0.50'
      specificity_rationale: Core organizational metadata
      custodian_types: '[''*'']'
    broad_mappings:
      - schema:CreativeWork
      - skos:Concept
  GoalStatementType:
    is_a: StatementType
    class_uri: hc:GoalStatement
    description: >-
      Specific, measurable, and time-bound objective that an organization commits to achieving.
    alt_descriptions:
      nl: >-
        Specifiek, meetbaar en tijdgebonden doelstelling waaraan een organisatie zich committeert te bereiken.
      de: >-
        Spezifisches, messbares und zeitgebundenes Ziel, dessen Erreichung eine Organisation sich verpflichtet.
      fr: >-
        Objectif spécifique, mesurable et limité dans le temps qu'une organisation s'engage à atteindre.
      es: >-
        Objetivo específico, medible y limitado en el tiempo que una organización se compromete a alcanzar.
      ar: >-
        هدف محدد وقابل للقياس ومحدد بجدول زمني تلتزم المؤسسة بتحقيقه.
      id: >-
        Objektif spesifik, terukur, dan terikat waktu yang dicapai oleh suatu organisasi.
      zh: >-
        组织承诺实现的具体、可衡量且有时限的目标。
    structured_aliases:
      - literal_form: doelstelling
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zielsetzung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: objectif
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: objetivo
        predicate: EXACT_SYNONYM
        in_language: es
    keywords:
      - goal
      - objective
      - target
      - measurable outcome
    examples:
      - value: "Digitize 100% of paper collection by 2030"
        description: Heritage domain goal statement
    slot_usage:
      has_code:
        equals_string: GOAL
      identified_by:
        equals_string: https://nde.nl/ontology/hc/statement-type/goal
    annotations:
      specificity_score: '0.55'
      specificity_rationale: Strategic planning metadata
      custodian_types: '[''*'']'
    broad_mappings:
      - schema:CreativeWork
      - skos:Concept
  ValueStatementType:
    is_a: StatementType
    class_uri: hc:ValueStatement
    description: >-
      Declaration of core principles and ethical foundations that guide organizational behavior and decision-making.
    alt_descriptions:
      nl: >-
        Verklaring van kernprincipes en ethische fundamenten die het organisatiegedrag en de besluitvorming sturen.
      de: >-
        Erklärung der Kernprinzipien und ethischen Grundlagen, die das Organisationsverhalten und die Entscheidungsfindung leiten.
      fr: >-
        Déclaration des principes fondamentaux et des bases éthiques qui guident le comportement organisationnel et la prise de décision.
      es: >-
        Declaración de principios fundamentales y bases éticas que guían el comportamiento organizacional y la toma de decisiones.
      ar: >-
        إعلان المبادئ الأساسية والأسس الأخلاقية التي توجه السلوك التنظيمي وصنع القرار.
      id: >-
        Deklarasi prinsip inti dan fondasi etis yang membimbing perilaku organisasi dan pengambilan keputusan.
      zh: >-
        阐明指导组织行为与决策的核心原则与伦理基础的价值观声明。
    structured_aliases:
      - literal_form: kernwaarden
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Grundwerte
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: valeurs fondamentales
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: valores fundamentales
        predicate: EXACT_SYNONYM
        in_language: es
    keywords:
      - values
      - principles
      - ethics
      - organizational culture
    examples:
      - value: "Accessibility, Excellence, Innovation, Collaboration"
        description: Heritage domain value statement
    slot_usage:
      has_code:
        equals_string: VALUE
      identified_by:
        equals_string: https://nde.nl/ontology/hc/statement-type/value
    annotations:
      specificity_score: '0.50'
      specificity_rationale: Core organizational metadata
      custodian_types: '[''*'']'
    broad_mappings:
      - schema:CreativeWork
      - skos:Concept
  MottoStatementType:
    is_a: StatementType
    class_uri: hc:MottoStatement
    description: >-
      Concise, memorable phrase that encapsulates organizational identity or key message for branding purposes.
    alt_descriptions:
      nl: >-
        Beknopte, memorabele zin die de organisatie-identiteit of kernboodschap voor merkdoeleinden samenvat.
      de: >-
        Prägnante, einprägsame Phrase, die die Organisationsidentität oder Kernbotschaft für Markenbildungszwecke verkörpert.
      fr: >-
        Phrase concise et mémorable qui encapsule l'identité organisationnelle ou le message clé à des fins de marque.
      es: >-
        Frase concisa y memorable que encapsula la identidad organizacional o el mensaje clave para fines de marca.
      ar: >-
        عبارة موجزة ولا تُنسى تُجسّد هوية المؤسسة أو رسالتها الرئيسية لأغراض العلامة التجارية.
      id: >-
        Frasa ringkas dan mudah diingat yang merangkum identitas organisasi atau pesan kunci untuk tujuan merek.
      zh: >-
        概括组织身份或关键信息用于品牌推广的简洁易记短语。
    structured_aliases:
      - literal_form: slogan
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Wahlspruch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: devise
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: lema
        predicate: EXACT_SYNONYM
        in_language: es
    keywords:
      - motto
      - slogan
      - tagline
      - branding
    examples:
      - value: "Heritage for All"
        description: Heritage domain motto
    slot_usage:
      has_code:
        equals_string: MOTTO
      identified_by:
        equals_string: https://nde.nl/ontology/hc/statement-type/motto
    annotations:
      specificity_score: '0.45'
      specificity_rationale: Brand identity metadata
      custodian_types: '[''*'']'
    broad_mappings:
      - schema:CreativeWork
      - skos:Concept
