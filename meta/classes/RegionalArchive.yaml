id: https://w3id.org/nde/ontology/RegionalArchive
name: RegionalArchive
title: Regional Archive
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
  - ../classes/AgentType
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/hold_record_set
classes:
  RegionalArchive:
    description: >-
      Archival institution serving a defined geographic region that may cross administrative
      boundaries, preserving records of regional historical and governance significance.
    alt_descriptions:
      nl: >-
        Archiefinstelling die een bepaald geografisch gebied bedient dat administratieve grenzen
        kan overschrijden en archieven van regionale historische en bestuurlijke betekenis bewaart.
      de: >-
        Archivinstitution, die eine definierte geografische Region bedient, die administrative
        Grenzen überschreiten kann, und Aufzeichnungen von regionaler historischer und Verwaltungsbedeutung bewahrt.
      fr: >-
        Institution archivistique desservant une région géographique définie pouvant traverser
        les frontières administratives, préservant des documents d'importance historique et de gouvernance régionale.
      es: >-
        Institución archivística que sirve a una región geográfica definida que puede cruzar
        límites administrativos, preservando registros de importancia histórica y de gobernanza regional.
      ar: >-
        مؤسسة أرشيفية تخدم منطقة جغرافية محددة قد تعبر الحدود الإدارية،
        تحافظ على سجلات ذات أهمية تاريخية وحكومية إقليمية.
      id: >-
        Institusi arsip yang melayani wilayah geografis tertentu yang dapat melampaui batas
        administratif, melestarikan catatan signifikansi sejarah dan tata kelola regional.
      zh: >-
        服务于可能跨越行政边界的特定地理区域的档案机构，
        保存具有区域历史和治理重要性的记录。
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    exact_mappings:
      - wd:Q27032392
    close_mappings:
      - rico:CorporateBody
    broad_mappings:
      - wd:Q166118
      - skos:Concept
    keywords:
      - regional archive
      - regional records
      - geographic archive
    structured_aliases:
      - literal_form: regionaal archief
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Regionalarchiv
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: archives régionales
        predicate: EXACT_SYNONYM
        in_language: fr
    slots:
      - has_type
      - hold_record_set
      - has_score
      - identified_by
    slot_usage:
      identified_by: null
      hold_record_set:
        examples:
          - value: hc:RegionalGovernanceFonds
          - value: hc:CadastralAndLandRecordsFonds
          - value: hc:NotarialProtocolSeries
          - value: hc:RegionalHistoryCollection
          - value: hc:WaterManagementFonds
    annotations:
      skos:prefLabel: Regional Archive
      skos:altLabel: Regionalarchiv, archivo regional, archives régionales
      admin_level: regional
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
      - ProvincialArchive
      - StateArchives
      - NationalArchives
      - MunicipalArchive
      - RegionalArchiveRecordSetType
    comments:
      - Serves geographic regions that may cross administrative boundaries
      - Typical holdings include regional governance fonds, cadastral records, notarial protocols
