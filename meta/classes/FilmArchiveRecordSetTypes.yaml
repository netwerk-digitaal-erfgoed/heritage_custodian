id: https://nde.nl/ontology/hc/class/FilmArchiveRecordSetTypes
name: FilmArchiveRecordSetTypes
title: Film Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
- ./FilmArchiveRecordSetType
- linkml:types
- ../slots/has_note
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  FeatureFilmCollection:
    is_a: FilmArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for feature-length and short fiction
      films, including theatrical and art-cinema releases.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor speelfilms en korte fictiefilms inclusief bioscoop- en artcinemareleases.
      de: Sammlungsorientierter Recordsettyp fuer lange und kurze Spielfilme inklusive Kino- und Arthouse-Vertrieb.
      fr: Type de lot documentaire oriente collection pour longs et courts metrages de fiction y compris sorties en salles.
      es: Tipo de conjunto documental orientado a colecciones para largometrajes y cortos de ficcion incluidas exhibiciones en sala.
      ar: نوع مجموعة سجلات قائم على التجميع للأفلام الروائية الطويلة والقصيرة بما في ذلك العروض السينمائية.
      id: Tipe record set berbasis koleksi untuk film fiksi panjang dan pendek termasuk rilis bioskop dan sinema seni.
      zh: 面向馆藏编组的记录集类型，用于长片与短篇剧情电影（含院线与艺术电影发行）。
    structured_aliases:
    - {literal_form: speelfilmcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Spielfilmsammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de films de fiction, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de largometrajes, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أفلام روائية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi film fiksi, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 故事片合集, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - feature film
      - fiction film
      - theatrical release
      - cinema collection
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - wd:Q24862
    slots:
    - has_type
    - has_scope
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:FeatureFilmCollection

  DocumentaryFilmCollection:
    is_a: FilmArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for non-fiction moving-image
      materials, including documentary, educational, and industrial films.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor non-fictie bewegend beeld waaronder documentaire- onderwijs- en bedrijfsfilms.
      de: Sammlungsorientierter Recordsettyp fuer nonfiktionales Bewegtbild darunter Dokumentar- Lehr- und Industriefilme.
      fr: Type de lot documentaire oriente collection pour images en mouvement non fictionnelles incluant documentaires et films educatifs.
      es: Tipo de conjunto documental orientado a colecciones para imagen en movimiento de no ficcion incluyendo documentales y filmes educativos.
      ar: نوع مجموعة سجلات قائم على التجميع لمواد الصورة المتحركة غير الروائية بما يشمل الوثائقيات والأفلام التعليمية والصناعية.
      id: Tipe record set berbasis koleksi untuk materi gambar bergerak nonfiksi termasuk film dokumenter edukasi dan industri.
      zh: 面向馆藏编组的记录集类型，用于非虚构活动影像材料，包括纪录、教育与工业影片。
    structured_aliases:
    - {literal_form: documentairefilmcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Dokumentarfilmsammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de films documentaires, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de documentales, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أفلام وثائقية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi film dokumenter, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 纪录影片合集, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - documentary film
      - non-fiction
      - educational film
      - industrial film
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - wd:Q93204
    slots:
    - has_type
    - has_scope
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:DocumentaryFilmCollection

  NewsreelSeries:
    is_a: FilmArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Series-oriented record set type for recurring newsreel issues and screen
      magazines arranged chronologically.
    alt_descriptions:
      nl: Seriegerichte recordsettype voor periodieke bioscoopjournaals en filmmagazines met chronologische ordening.
      de: Serienorientierter Recordsettyp fuer periodische Wochenschauen und Filmmagazine mit chronologischer Ordnung.
      fr: Type de lot documentaire oriente serie pour journaux filmes periodiques et magazines ecran organises chronologiquement.
      es: Tipo de conjunto documental orientado a series para noticiarios periodicos y revistas cinematograficas organizados cronologicamente.
      ar: نوع مجموعة سجلات موجّه للسلاسل لأعداد النشرات الإخبارية السينمائية والمجلات المرئية المرتبة زمنيا.
      id: Tipe record set berbasis seri untuk edisi berkala berita film dan majalah layar yang disusun kronologis.
      zh: 面向系列编组的记录集类型，用于按时间顺序组织的新闻短片期次与银幕杂志。
    structured_aliases:
    - {literal_form: bioscoopjournaalreeks, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Wochenschau-Serie, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de journaux cinematographiques, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de noticiarios cinematograficos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة نشرات سينمائية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri berita film, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 新闻电影系列, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - newsreel
      - screen magazine
      - chronological series
      - cinema news
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    - wd:Q622812
    slots:
    - has_type
    - has_scope
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:NewsreelSeries

  ProductionRecordsFonds:
    is_a: FilmArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Fonds-oriented record set type for records created during film production,
      such as scripts, schedules, contracts, and correspondence.
    alt_descriptions:
      nl: Fondsgerichte recordsettype voor tijdens filmproductie gevormde dossiers zoals scripts schema s contracten en correspondentie.
      de: Fondsorientierter Recordsettyp fuer waehrend der Filmproduktion entstandene Unterlagen wie Drehbuecher Plaene Vertraege und Korrespondenz.
      fr: Type de lot documentaire oriente fonds pour les dossiers produits pendant la production cinematographique tels que scripts et contrats.
      es: Tipo de conjunto documental orientado a fondo para registros creados durante la produccion cinematografica como guiones y contratos.
      ar: نوع مجموعة سجلات موجّه للفوندس لسجلات تُنشأ أثناء إنتاج الفيلم مثل النصوص والجداول والعقود والمراسلات.
      id: Tipe record set berbasis fonds untuk arsip yang dibuat selama produksi film seperti naskah jadwal kontrak dan korespondensi.
      zh: 面向全宗编组的记录集类型，用于电影制作过程中形成的脚本、排期、合同与通信记录。
    structured_aliases:
    - {literal_form: filmproductiefonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Filmproduktionsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds de production cinematographique, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de produccion cinematografica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس سجلات الإنتاج السينمائي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds catatan produksi film, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 电影制作档案全宗, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - film production
      - production records
      - script archive
      - film contracts
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_scope
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:ProductionRecordsFonds

  FilmPromoCollection:
    is_a: FilmArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for film publicity materials,
      including posters, stills, press kits, and trailers.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor promotiemateriaal van films waaronder posters stills perskits en trailers.
      de: Sammlungsorientierter Recordsettyp fuer Filmwerbematerialien darunter Plakate Stills Pressemappen und Trailer.
      fr: Type de lot documentaire oriente collection pour materiel promotionnel de films notamment affiches photos et dossiers de presse.
      es: Tipo de conjunto documental orientado a colecciones para material promocional de cine incluidas carteles fotos y dosieres de prensa.
      ar: نوع مجموعة سجلات قائم على التجميع لمواد الدعاية السينمائية بما يشمل الملصقات والصور والملفات الصحفية والعروض التشويقية.
      id: Tipe record set berbasis koleksi untuk materi promosi film termasuk poster still kit pers dan trailer.
      zh: 面向馆藏编组的记录集类型，用于电影宣传材料，包括海报、剧照、媒体资料包与预告片。
    structured_aliases:
    - {literal_form: filmpromotiemateriaalcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Filmwerbematerialsammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de materiel promotionnel de films, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de promocion cinematografica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة مواد ترويجية سينمائية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi materi promosi film, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 电影宣传资料合集, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
      - film publicity
      - movie posters
      - press kits
      - promotional materials
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_scope
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:FilmPromoCollection
