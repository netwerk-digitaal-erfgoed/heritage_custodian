id: https://nde.nl/ontology/hc/class/ConflictType
name: ConflictType
title: Conflict Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
classes:
  ConflictType:
    class_uri: hc:ConflictType
    abstract: true
    description: >-
      Controlled vocabulary root for classifying destructive crises and hostile
      disruptions that can impact heritage stewardship.
    alt_descriptions:
      nl: Wortel van een gecontroleerde vocabulaire voor de classificatie van destructieve crises en vijandige verstoringen.
      de: Stamm einer kontrollierten Vokabelliste zur Klassifikation destruktiver Krisen und feindlicher Stoerungen.
      fr: Racine de vocabulaire controle pour classifier les crises destructrices et perturbations hostiles.
      es: Raiz de vocabulario controlado para clasificar crisis destructivas y perturbaciones hostiles.
      ar: جذر مفردات مضبوطة لتصنيف الأزمات المدمرة والاضطرابات العدائية المؤثرة على حفظ التراث.
      id: Akar kosakata terkendali untuk mengklasifikasikan krisis destruktif dan gangguan bermusuhan.
      zh: 用于分类影响遗产保管的破坏性危机与敌对扰动的受控词表根节点。
    structured_aliases:
      - literal_form: crisistaxonomie
        in_language: nl
      - literal_form: Krisentaxonomie
        in_language: de
      - literal_form: taxonomie des crises
        in_language: fr
      - literal_form: taxonomia de crisis
        in_language: es
      - literal_form: تصنيف الأزمات
        in_language: ar
      - literal_form: taksonomi krisis
        in_language: id
      - literal_form: 危机分类体系
        in_language: zh
    broad_mappings:
      - skos:Concept
    comments:
      - Abstract superclass; concrete categories are defined in ConflictTypes.yaml.
    notes:
      - |
        Preserved from prior description (commit 5e94e52b):

        Abstract base class for conflict type taxonomy.

        **DEFINITION**:

        ConflictType defines the type of conflict or disaster affecting
        heritage institutions. Concrete types are defined in ConflictTypes.yaml
        per Rule 0b (Type/Types naming pattern).

        **TAXONOMY**:

        - **ARMED_CONFLICT**: War, military operations, armed insurgency
        - **NATURAL_DISASTER**: Earthquake, flood, hurricane, fire
        - **CIVIL_UNREST**: Riots, protests, civil disorder
        - **TERRORISM**: Targeted attacks on cultural heritage
        - **LOOTING**: Systematic theft of cultural objects
        - **NEGLECT**: Abandonment leading to destruction

        **SKOS ALIGNMENT**:

        Maps to `skos:Concept` for vocabulary alignment.

        Created as part of conflict_status migration per slot_fixes.yaml (Rule 53).
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Crisis classification applies across all custodian domains.
      specificity_score: "0.4"
      specificity_rationale: Taxonomy root for conflict and disaster categorization.
