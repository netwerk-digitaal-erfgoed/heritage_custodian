id: https://nde.nl/ontology/hc/EducationProviderType
name: EducationProviderType
title: Education Provider Type
description: 'Specialized custodian type for educational institutions (universities, colleges, schools) that maintain heritage collections as part of their educational mission. Education providers classified under this type integrate heritage custodianship with degree-granting or training programs. They maintain collections primarily for teaching, research, and student learning, distinguishing them from standalone museums (M), archives (A), or libraries (L). Key Characteristics: - Degree-granting institutions (universities, colleges) or training providers (schools) - Heritage collections support educational programs (teaching collections) - Academic access for students, faculty, researchers - Often include multiple collection types (museum, library, archive) - Collections integrated into curriculum and research activities Wikidata Coverage: - Base concepts: Q3918 (university), Q189004 (college), Q3914 (school) - University museums: Q866133 (university museum), Q111889841 (university art museum) - Academic libraries: Q2467461 (university library), Q28707487 (academic library) - University archives: Q132560468 (university archive) - Specialized: medical schools, law schools, art colleges, music conservatories This class represents ''E'' (Education Provider) in the GLAMORCUBEPSXHFN taxonomy. '
from_schema: https://nde.nl/ontology/hc/EducationProviderType
see_also:
