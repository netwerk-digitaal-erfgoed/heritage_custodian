classes:
  DigitalPlatformType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomic concept for categorizing digital service environments based on their functional capabilities and operational patterns.
    alt_descriptions:
      nl: >-
        Abstract taxonomisch concept voor het categoriseren van digitale serviceomgevingen op basis van hun functionele mogelijkheden en operationele patronen.
      de: >-
        Abstraktes taxonomisches Konzept zur Kategorisierung digitaler Dienstleistungsumgebungen basierend auf ihren funktionalen Fähigkeiten und Betriebsmustern.
      fr: >-
        Concept taxonomique abstrait pour catégoriser les environnements de services numériques en fonction de leurs capacités fonctionnelles et de leurs modèles opérationnels.
      es: >-
        Concepto taxonómico abstracto para categorizar entornos de servicios digitales basándose en sus capacidades funcionales y patrones operativos.
      ar: >-
        مفهوم تصنيفي تجريدي لتصنيف بيئات الخدمات الرقمية بناءً على قدراتها الوظيفية وأنماطها التشغيلية.
      id: >-
        Konsep taksonomi abstrak untuk mengkategorikan lingkungan layanan digital berdasarkan kapabilitas fungsional dan pola operasionalnya.
      zh: >-
        基于功能能力和运营模式对数字服务环境进行分类的抽象分类概念。
