id: https://nde.nl/ontology/hc/class/Summary
name: Summary
title: Summary
description: >-
  Condensed representation capturing the essential points, main ideas, or substance of a longer document, resource, or entity.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_text
classes:
  Summary:
    class_uri: skos:Concept
    description: >-
      Condensed representation capturing the essential points, main ideas, or substance of a longer document, resource, or entity.
    alt_descriptions:
      nl: >-
        Verkorte weergave die de essentiële punten, hoofdideeën of kern van een langer document, bron of entiteit vastlegt.
      de: >-
        Verdichtete Darstellung, die die wesentlichen Punkte, Hauptideen oder den Kern eines längeren Dokuments, einer Ressource oder Entität erfasst.
      fr: >-
        Représentation condensée capturant les points essentiels, les idées principales ou la substance d'un document, d'une ressource ou d'une entité plus longs.
      es: >-
        Representación condensada que captura los puntos esenciales, las ideas principales o la sustancia de un documento, recurso o entidad más largo.
      ar: >-
        تمثيل مكثف يلتقط النقاط الجوهرية أو الأفكار الرئيسية أو جوهر مستند أو مورد أو كيان أطول.
      id: >-
        Representasi ringkas yang menangkap poin-poin penting, ide utama, atau substansi dari dokumen, sumber daya, atau entitas yang lebih panjang.
      zh: >-
        捕捉较长文档、资源或实体的要点、主要思想或实质内容的精简表述。
    structured_aliases:
    - literal_form: samenvatting
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Zusammenfassung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: résumé
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: resumen
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ملخص
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: ringkasan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 摘要
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - abstract
    - synopsis
    - digest
    - condensation
    - overview
    broad_mappings:
    - skos:Concept
    annotations:
      custodian_types: '["*"]'
    slots:
    - has_text
