id: https://nde.nl/ontology/hc/class/IIIF
name: IIIF
title: IIIF
description: International Image Interoperability Framework support/compatibility.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
classes:
  IIIF:
    class_uri: dcterms:Standard
    description: >-
      Reference to the International Image Interoperability Framework standard
      for interoperable image delivery and annotation.
    alt_descriptions:
      nl: Verwijzing naar de IIIF-standaard voor interoperabele beeldaanlevering en annotatie.
      de: Verweis auf den IIIF-Standard fuer interoperable Bildbereitstellung und Annotation.
      fr: Reference a la norme IIIF pour la diffusion et l annotation interopérables des images.
      es: Referencia al estandar IIIF para entrega interoperable de imagenes y anotacion.
      ar: مرجع إلى معيار IIIF للتقديم البيني للصور والتعليقات التوضيحية.
      id: Rujukan ke standar IIIF untuk penyajian gambar dan anotasi yang interoperabel.
      zh: 指向 IIIF 标准的引用，用于可互操作的图像传输与标注。
    structured_aliases:
    - {literal_form: IIIF-standaard, in_language: nl}
    - {literal_form: IIIF-Standard, in_language: de}
    - {literal_form: norme IIIF, in_language: fr}
    - {literal_form: estandar IIIF, in_language: es}
    - {literal_form: معيار IIIF, in_language: ar}
    - {literal_form: standar IIIF, in_language: id}
    - {literal_form: IIIF 标准, in_language: zh}
    exact_mappings:
    - dcterms:Standard
    slots:
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
