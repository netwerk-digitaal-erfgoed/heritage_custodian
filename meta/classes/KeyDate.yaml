id: https://nde.nl/ontology/hc/class/KeyDate
name: KeyDate
title: Key Date
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
classes:
  KeyDate:
    class_uri: hc:KeyDate
    description: >-
      Chronological milestone marker denoting a significant event or turning
      point in an entity's historical development.
    alt_descriptions:
      nl: >-
        Chronologische mijlpaalmarker die een belangrijk gebeurtenis of keerpunt in de
        historische ontwikkeling van een entiteit aangeeft.
      de: >-
        Chronologischer Meilenstein-Marker, der ein bedeutendes Ereignis oder einen
        Wendepunkt in der historischen Entwicklung einer Entität bezeichnet.
      fr: >-
        Marqueur de jalon chronologique désignant un événement significatif ou un tournant
        dans le développement historique d'une entité.
      es: >-
        Marcador de hito cronológico que denota un evento significativo o punto de inflexión
        en el desarrollo histórico de una entidad.
      ar: >-
        علامة معلم زمني تشير إلى حدث مهم أو نقطة تحول في التطور التاريخي لكيان.
      id: >-
        Penanda tonggak kronologis yang menunjukkan peristiwa signifikan atau titik balik
        dalam pengembangan historis suatu entitas.
      zh: >-
        标记实体历史发展中重要事件或转折点的时间里程碑标记。
    slots:
      - has_description
    broad_mappings:
      - schema:Event
