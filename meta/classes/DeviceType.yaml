classes:
  DeviceType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract classification for electronic, mechanical, or network-connected equipment deployed in institutional operations.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor elektronische, mechanische of netwerkverbonden apparatuur ingezet in institutionele activiteiten.
      de: >-
        Abstrakte Klassifikation für elektronische, mechanische oder netzwerkverbundene Ausrüstung, die im institutionellen Betrieb eingesetzt wird.
      fr: >-
        Classification abstraite pour les équipements électroniques, mécaniques ou connectés au réseau déployés dans les opérations institutionnelles.
      es: >-
        Clasificación abstracta para equipos electrónicos, mecánicos o conectados a la red implementados en operaciones institucionales.
      ar: >-
        تصنيف تجريدي للمعدات الإلكترونية أو الميكانيكية أو المتصلة بالشبكة المنتشرة في العمليات المؤسسية.
      id: >-
        Klasifikasi abstrak untuk peralatan elektronik, mekanis, atau terhubung jaringan yang dikerahkan dalam operasi kelembagaan.
      zh: >-
        用于机构运营中部署的电子、机械或网络连接设备的抽象分类。
