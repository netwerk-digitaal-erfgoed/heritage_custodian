id: https://nde.nl/ontology/hc/class/Funding
name: Funding
title: Funding
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_currency
  - ../slots/has_description
  - ../slots/has_quantity
classes:
  Funding:
    class_uri: hc:Funding
    description: >-
      Monetary support allocated to an initiative, institution, or activity under
      defined financial terms.
    alt_descriptions:
      nl: Financiele ondersteuning toegekend aan een initiatief, instelling of activiteit onder vastgelegde voorwaarden.
      de: Finanzielle Unterstuetzung, die einer Initiative, Einrichtung oder Aktivitaet unter festgelegten Bedingungen zugewiesen wird.
      fr: Soutien financier alloue a une initiative, une institution ou une activite selon des conditions definies.
      es: Apoyo monetario asignado a una iniciativa, institucion o actividad bajo terminos financieros definidos.
      ar: دعم مالي مخصّص لمبادرة أو مؤسسة أو نشاط وفق شروط مالية محددة.
      id: Dukungan moneter yang dialokasikan untuk inisiatif, institusi, atau aktivitas dengan ketentuan finansial tertentu.
      zh: 在明确财务条款下分配给项目、机构或活动的资金支持。
    structured_aliases:
      - literal_form: financiering
        in_language: nl
      - literal_form: Finanzierung
        in_language: de
      - literal_form: financement
        in_language: fr
      - literal_form: financiacion
        in_language: es
      - literal_form: تمويل
        in_language: ar
      - literal_form: pendanaan
        in_language: id
      - literal_form: 资金
        in_language: zh
    slots:
      - has_quantity
      - has_currency
      - has_description
    slot_usage:
      has_quantity:
        range: integer
        required: true
    broad_mappings:
      - schema:MonetaryAmount
