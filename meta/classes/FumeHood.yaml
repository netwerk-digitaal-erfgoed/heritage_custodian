id: https://nde.nl/ontology/hc/class/FumeHood
name: FumeHood
title: Fume Hood
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
classes:
  FumeHood:
    class_uri: hc:FumeHood
    description: >-
      Ventilated safety enclosure used to contain and extract hazardous fumes
      during conservation or laboratory operations.
    alt_descriptions:
      nl: Geventileerde veiligheidskast voor het afzuigen van schadelijke dampen tijdens conserverings- of laboratoriumwerk.
      de: Beluefteter Sicherheitsschrank zur Erfassung und Abfuehrung gefaehrlicher Daempfe bei Konservierungs- oder Laborarbeiten.
      fr: Enceinte de securite ventilee utilisee pour capter et evacuer les vapeurs dangereuses en laboratoire ou conservation.
      es: Cabina de seguridad ventilada para contener y extraer vapores peligrosos en operaciones de laboratorio o conservacion.
      ar: حجرة أمان مهواة لاحتواء وسحب الأبخرة الخطرة أثناء أعمال المختبر أو الترميم.
      id: Enklosur keselamatan berventilasi untuk menahan dan mengekstraksi uap berbahaya saat operasi laboratorium atau konservasi.
      zh: 用于在实验或修复作业中收容并排出有害烟气的通风安全柜。
    structured_aliases:
      - literal_form: zuurkast
        in_language: nl
      - literal_form: Abzugshaube
        in_language: de
      - literal_form: hotte aspirante de laboratoire
        in_language: fr
      - literal_form: campana de extraccion
        in_language: es
      - literal_form: خزانة شفط أبخرة
        in_language: ar
      - literal_form: lemari asam
        in_language: id
      - literal_form: 通风柜
        in_language: zh
    slots:
      - has_description
