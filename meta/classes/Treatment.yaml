id: https://nde.nl/ontology/hc/class/Treatment
name: Treatment
title: Treatment
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/use_material
classes:
  Treatment:
    class_uri: crm:E11_Modification
    description: >-
      Intervention on a heritage object to stabilize condition, recover function,
      or support long-term preservation.
    alt_descriptions:
      nl: Ingrijpende handeling op een erfgoedobject om toestand te stabiliseren, functie te herstellen of langdurige bewaring te ondersteunen.
      de: Eingriff an einem Kulturerbeobjekt zur Stabilisierung des Zustands, Wiederherstellung der Funktion oder langfristigen Erhaltung.
      fr: Intervention sur un objet patrimonial pour stabiliser son etat, restaurer sa fonction ou soutenir sa conservation a long terme.
      es: Intervencion sobre un objeto patrimonial para estabilizar su estado, recuperar su funcion o apoyar su conservacion a largo plazo.
      ar: إجراء على مقتنى تراثي لتثبيت حالته أو استعادة وظيفته أو دعم حفظه طويل الأمد.
      id: Intervensi pada objek warisan untuk menstabilkan kondisi, memulihkan fungsi, atau mendukung pelestarian jangka panjang.
      zh: 对遗产对象进行的处置，用于稳定状态、恢复功能或支持长期保存。
    structured_aliases:
    - literal_form: conserveringsingreep
      in_language: nl
    - literal_form: Konservierungseingriff
      in_language: de
    - literal_form: intervention de conservation
      in_language: fr
    - literal_form: intervencion de conservacion
      in_language: es
    - literal_form: معالجة صونية
      in_language: ar
    - literal_form: tindakan konservasi
      in_language: id
    - literal_form: 保护处置
      in_language: zh
    keywords:
    - conservation
    - restoration
    - preservation
    exact_mappings:
    - crm:E11_Modification
    annotations:
      specificity_score: '0.60'
      specificity_rationale: More specific - conservation treatments are heritage-domain.
      custodian_types: '[''*'']'
    examples:
    - value:
        treatment_type: CONSERVATION
        treatment_description: Surface cleaning and stabilization
        treatment_date: '2025-01-10'
        treated_by: Conservation Lab
      description: Conservation treatment record
    slots:
    - use_material
