id: https://nde.nl/ontology/hc/class/SupervisedHandling
name: SupervisedHandling
title: SupervisedHandling
description: >-
  Policy mandating that access to or manipulation of materials occurs only under staff observation and guidance to ensure proper care.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
classes:
  SupervisedHandling:
    class_uri: hc:SupervisedHandling
    close_mappings:
    - schema:Thing
    description: >-
      Policy mandating that access to or manipulation of materials occurs only under staff observation and guidance to ensure proper care.
    alt_descriptions:
      nl: >-
        Beleid dat voorschrijft dat toegang tot of hantering van materialen alleen plaatsvindt onder toezicht en begeleiding van personeel om goede verzorging te waarborgen.
      de: >-
        Richtlinie, die vorschreibt, dass der Zugang zu oder die Handhabung von Materialien nur unter Beobachtung und Anleitung des Personals erfolgt, um eine ordnungsgemäße Pflege zu gewährleisten.
      fr: >-
        Politique exigeant que l'accès aux documents ou leur manipulation ne se fasse que sous l'observation et les conseils du personnel pour assurer une manipulation appropriée.
      es: >-
        Política que exige que el acceso a o la manipulación de materiales solo ocurra bajo observación y guía del personal para garantizar un cuidado adecuado.
      ar: >-
        سياسة تفرض أن الوصول إلى المواد أو التعامل معها يتم فقط تحت مراقبة وتوجيه الموظفين لضمان الرعاية المناسبة.
      id: >-
        Kebijakan yang mewajibkan akses ke atau penanganan material hanya dilakukan di bawah pengawasan dan bimbingan staf untuk memastikan perawatan yang tepat.
      zh: >-
        规定只有在工作人员观察和指导下才能接触或处理材料以确保妥善保管的政策。
    structured_aliases:
