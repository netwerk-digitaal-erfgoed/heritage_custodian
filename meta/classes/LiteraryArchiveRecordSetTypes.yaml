id: https://nde.nl/ontology/hc/class/LiteraryArchiveRecordSetTypes
name: LiteraryArchiveRecordSetTypes
title: LiteraryArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./LiteraryArchiveRecordSetType
- linkml:types
- ../slots/has_type
- ../slots/has_score
- ../slots/has_note
classes:
  AuthorPapersCollection:
    is_a: LiteraryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for personal papers of writers and
      authors, including correspondence and notebooks.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor persoonlijke papieren van schrijvers en auteurs inclusief correspondentie en notitieboeken.
      de: Sammlungsorientierter Recordsettyp fuer persoenliche Unterlagen von Schriftstellerinnen und Schriftstellern inklusive Korrespondenz und Notizbuechern.
      fr: Type de lot documentaire oriente collection pour papiers personnels d auteurs et ecrivains avec correspondance et carnets.
      es: Tipo de conjunto documental orientado a coleccion para papeles personales de autores y escritores con correspondencia y cuadernos.
      ar: نوع مجموعة سجلات قائم على التجميع للأوراق الشخصية للكتاب والمؤلفين بما في ذلك المراسلات والدفاتر.
      id: Tipe record set berbasis koleksi untuk arsip pribadi penulis dan pengarang termasuk korespondensi dan buku catatan.
      zh: 面向馆藏编组的记录集类型，用于作家与作者个人文献，包括通信与手记。
    structured_aliases:
    - {literal_form: auteurspapieren-collectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Autorenpapiersammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de papiers d auteurs, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de papeles de autor, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أوراق مؤلفين, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip pribadi penulis, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 作者文献合集, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
    - author papers
    - writer correspondence
    - literary manuscripts
    - personal papers
    - author archives
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:AuthorPapersCollection

  LiteraryManuscriptCollection:
    is_a: LiteraryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for literary manuscripts, draft
      versions, and textual development materials.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor literaire manuscripten versiedrafts en tekstontwikkelingsmateriaal.
      de: Sammlungsorientierter Recordsettyp fuer literarische Manuskripte Entwurfsfassungen und Materialien zur Textentwicklung.
      fr: Type de lot documentaire oriente collection pour manuscrits litteraires versions de travail et materiaux de developpement textuel.
      es: Tipo de conjunto documental orientado a coleccion para manuscritos literarios borradores y materiales de desarrollo textual.
      ar: نوع مجموعة سجلات قائم على التجميع للمخطوطات الأدبية ومسودات النسخ ومواد تطور النص.
      id: Tipe record set berbasis koleksi untuk manuskrip sastra versi draf dan materi pengembangan teks.
      zh: 面向馆藏编组的记录集类型，用于文学手稿、草稿版本及文本演变材料。
    structured_aliases:
    - {literal_form: literaire-manuscriptcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Literarische-Manuskriptsammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de manuscrits litteraires, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de manuscritos literarios, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة مخطوطات أدبية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi manuskrip sastra, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 文学手稿合集, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
    - literary manuscripts
    - draft versions
    - textual development
    - author drafts
    - manuscript collection
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:LiteraryManuscriptCollection

  PublisherRecordsSeries:
    is_a: LiteraryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Series-oriented record set type for publishing-house records organized by
      issue, season, or production cycle.
    alt_descriptions:
      nl: Seriegerichte recordsettype voor uitgeversarchieven geordend per uitgave seizoen of productiecyclus.
      de: Serienorientierter Recordsettyp fuer Unterlagen von Verlagen organisiert nach Ausgabe Saison oder Produktionszyklus.
      fr: Type de lot documentaire oriente serie pour dossiers d editeurs organises par livraison saison ou cycle de production.
      es: Tipo de conjunto documental orientado a series para registros editoriales organizados por entrega temporada o ciclo de produccion.
      ar: نوع مجموعة سجلات موجّه للسلاسل لسجلات دور النشر المنظمة حسب الإصدار أو الموسم أو دورة الإنتاج.
      id: Tipe record set berbasis seri untuk arsip penerbit yang diatur per terbitan musim atau siklus produksi.
      zh: 面向系列编组的记录集类型，用于按期次、季次或生产周期组织的出版社档案记录。
    structured_aliases:
    - {literal_form: uitgeversrecordreeks, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Verlagsunterlagen-Serie, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de dossiers d editeur, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de registros editoriales, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات دور النشر, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri arsip penerbit, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 出版社记录系列, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
    - publisher records
    - publishing archives
    - editorial records
    - production cycles
    - publishing house
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:PublisherRecordsSeries
