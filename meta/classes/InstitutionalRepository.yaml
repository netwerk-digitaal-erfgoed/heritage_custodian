id: https://w3id.org/nde/ontology/InstitutionalRepository
name: InstitutionalRepository
title: Institutional Repository Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_type
- ../slots/has_score
classes:
  InstitutionalRepository:
    is_a: ArchiveOrganizationType
    class_uri: hc:InstitutionalRepository
    broad_mappings:
    - schema:Library
    description: >-
      Digital repository service for preserving, publishing, and providing access
      to scholarly output produced by an academic or research institution.
    alt_descriptions:
      nl: >-
        Digitale repositorydienst voor het behouden, publiceren en ontsluiten van wetenschappelijke
        output geproduceerd door een academische of onderzoeksinstelling.
      de: >-
        Digitaler Repository-Service zur Bewahrung, Veröffentlichung und Bereitstellung
        wissenschaftlicher Outputs einer akademischen oder Forschungseinrichtung.
      fr: >-
        Service de dépôt numérique pour préserver, publier et donner accès aux productions
        scientifiques d'une institution académique ou de recherche.
      es: >-
        Servicio de repositorio digital para preservar, publicar y proporcionar acceso
        a la producción académica de una institución académica o de investigación.
      ar: >-
        خدمة مستودع رقمي للحفاظ على المخرجات الأكاديمية ونشرها وتوفير الوصول إليها
        التي تنتجها مؤسسة أكاديمية أو بحثية.
      id: >-
        Layanan repositori digital untuk melestarikan, menerbitkan, dan menyediakan akses
        ke output ilmiah yang dihasilkan oleh institusi akademik atau penelitian.
      zh: >-
        用于保存、发布和提供学术或研究机构产出的学术成果访问的数字仓储服务。
    structured_aliases:
    - literal_form: institutionele repository
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Institutionelles Repositorium
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: dépôt institutionnel
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: repositorio institucional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مستودع مؤسسي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: repositori institusional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 机构仓储
      predicate: EXACT_SYNONYM
      in_language: zh
    close_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_type
    - has_score
    comments:
    - Open-access platform for institutional research output.
    - Includes publications, datasets, theses, and dissertations.
    - 'Preserved from prior description: Digital repository service for preserving and publishing institutional scholarly output.'
    keywords:
    - digital repository
    - open access
    - scholarly output
    - institutional publications
    annotations:
      platform_type: digital repository
      access_model: open access
      specificity_score: 0.5
      specificity_rationale: Institution-linked digital repository model for publications and datasets.
      custodian_types: '["*"]'
