classes:
  WomensArchives:
    description: >-
      Custodial organization dedicated to collecting, preserving, and providing
      access to records on women's history, movements, and lived experiences.
    alt_descriptions:
      nl: Type erfgoedinstelling gericht op het verzamelen, bewaren en toegankelijk maken van materiaal dat de geschiedenis van vrouwen, feministische bewegingen, vrouwenorganisaties en de ervaringen en bijdragen van vrouwen documenteert.
      de: Art der Heritage-Institution, die sich auf das Sammeln, Bewahren und Zugänglichmachen von Materialien konzentriert, die die Frauengeschichte, feministische Bewegungen, Frauenorganisationen und die Erfahrungen und Beiträge von Frauen dokumentieren.
      fr: Type d'institution patrimoniale axée sur la collecte, la préservation et l'accès aux matériaux documentant l'histoire des femmes, les mouvements féministes, les organisations de femmes et les expériences et contributions des femmes dans tous les domaines.
      es: Tipo de institución patrimonial enfocada en recolectar, preservar y proporcionar acceso a materiales que documentan la historia de las mujeres, movimientos feministas, organizaciones de mujeres y las experiencias y contribuciones de las mujeres en todos los campos.
      ar: نوع مؤسسة التراث التي تركز على جمع وحفظ وتوفير الوصول إلى المواد التي توثق تاريخ النساء والحركات النسوية ومنظمات النساء وتجارب النساء ومساهماتهن في جميع المجالات.
      id: Jenis lembaga warisan yang berfokus pada pengumpulan, pelestarian, dan penyediaan akses ke materi yang mendokumentasikan sejarah perempuan, gerakan feminis, organisasi perempuan, serta pengalaman dan kontribusi perempuan di semua bidang.
      zh: 专注于收集、保存和提供记录妇女历史、女权运动、妇女组织以及 各领域妇女经验和贡献的资料的遗产机构类型。
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - related_to
    - identified_by
    close_mappings:
