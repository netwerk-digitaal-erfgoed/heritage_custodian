id: https://nde.nl/ontology/hc/class/HeritagePractice
name: HeritagePractice
title: HeritagePractice
description: >-
  A specific practice, technique, or method of preserving or creating heritage.
  Examples: Traditional brewing, perfume formulation, archival appraisal method.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  HeritagePractice:
    class_uri: skos:Concept
    description: >-
      Practice-oriented concept for techniques, routines, or methods involved in
      transmission, care, or continuation of heritage.
    alt_descriptions:
      nl: Praktijkgericht concept voor technieken routines of methoden bij overdracht zorg of voortzetting van erfgoed.
      de: Praxisorientiertes Konzept fuer Techniken Routinen oder Methoden der Weitergabe Pflege oder Fortfuehrung von Erbe.
      fr: Concept oriente vers les pratiques pour techniques routines ou methodes de transmission soin ou continuation du patrimoine.
      es: Concepto orientado a practicas para tecnicas rutinas o metodos de transmision cuidado o continuidad del patrimonio.
      ar: مفهوم موجه للممارسات يصف التقنيات أو الإجراءات أو الأساليب المعنية بنقل التراث أو صونه أو استمراريته.
      id: Konsep berorientasi praktik untuk teknik rutinitas atau metode dalam transmisi perawatan atau keberlanjutan warisan.
      zh: 面向实践的概念，用于描述遗产传承、照护或延续中的技术、流程与方法。
    structured_aliases:
    - {literal_form: erfgoedpraktijk, in_language: nl}
    - {literal_form: Erbepraxis, in_language: de}
    - {literal_form: pratique patrimoniale, in_language: fr}
    - {literal_form: practica patrimonial, in_language: es}
    - {literal_form: ممارسة تراثية, in_language: ar}
    - {literal_form: praktik warisan, in_language: id}
    - {literal_form: 遗产实践, in_language: zh}
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
    - has_label
    - has_description
