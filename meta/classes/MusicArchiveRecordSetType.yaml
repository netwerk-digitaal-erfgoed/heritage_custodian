id: https://nde.nl/ontology/hc/class/MusicArchiveRecordSetType
name: MusicArchiveRecordSetType
title: Music Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  MusicArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: Record-set classifier for holdings managed by music-focused archive organizations.
    alt_descriptions:
      nl: Recordsetclassificatie voor collecties beheerd door op muziek gerichte archieforganisaties.
      de: Recordset-Klassifikator fuer Bestaende die von musikfokussierten Archivorganisationen verwaltet werden.
      fr: Classificateur de lots documentaires pour fonds geres par des archives specialisees en musique.
      es: Clasificador de conjuntos documentales para fondos gestionados por archivos especializados en musica.
      ar: مصنف مجموعات سجلات للمقتنيات التي تديرها مؤسسات أرشيفية متخصصة في الموسيقى.
      id: Pengklasifikasi record set untuk koleksi yang dikelola organisasi arsip berfokus musik.
      zh: 用于音乐主题档案机构馆藏的记录集分类器。
    structured_aliases:
    - {literal_form: type muziekarchiefrecordset, in_language: nl}
    - {literal_form: Typ Musikarchiv-Recordset, in_language: de}
    - {literal_form: type de lot d archive musicale, in_language: fr}
    - {literal_form: tipo de conjunto de archivo musical, in_language: es}
    - {literal_form: نوع مجموعة سجلات أرشيف موسيقي, in_language: ar}
    - {literal_form: tipe record set arsip musik, in_language: id}
    - {literal_form: 音乐档案记录集类型, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MusicArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
