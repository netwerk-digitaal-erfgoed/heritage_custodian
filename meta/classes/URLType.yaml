id: https://nde.nl/ontology/hc/class/URLType
name: URLType
title: URL Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../metadata
  - ../slots/identified_by
  - ../slots/has_label
classes:
  URLType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract category for classifying web-address purposes such as official
      site, social profile, service endpoint, or archived snapshot.
    alt_descriptions:
      nl: Abstracte categorie voor het classificeren van doelen van webadressen, zoals officiele site, sociaal profiel, service-endpoint of webarchiefkopie.
      de: Abstrakte Kategorie zur Klassifikation von Zwecken von Webadressen, etwa offizielle Website, soziales Profil, Service-Endpunkt oder Webarchiv-Snapshot.
      fr: Categorie abstraite pour classer la finalite des adresses web, comme site officiel, profil social, endpoint de service ou capture archivee.
      es: Categoria abstracta para clasificar la finalidad de direcciones web, como sitio oficial, perfil social, endpoint de servicio o captura archivada.
      ar: فئة تجريدية لتصنيف غرض عناوين الويب مثل الموقع الرسمي أو الملف الاجتماعي أو نقطة خدمة أو لقطة مؤرشفة.
      id: Kategori abstrak untuk mengklasifikasikan tujuan alamat web seperti situs resmi, profil sosial, endpoint layanan, atau salinan arsip.
      zh: 用于分类网址用途的抽象类别，如官网、社交主页、服务端点或归档快照。
    structured_aliases:
    - literal_form: url-type
      in_language: nl
    - literal_form: URL-Typ
      in_language: de
    - literal_form: type d URL
      in_language: fr
    - literal_form: tipo de URL
      in_language: es
    - literal_form: نوع الرابط
      in_language: ar
    - literal_form: tipe URL
      in_language: id
    - literal_form: URL类型
      in_language: zh
    slots:
    - has_label
    - identified_by
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
