id: https://nde.nl/ontology/hc/classes/Hypothesis
name: Hypothesis
title: Hypothesis
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/generated_by
  - ../slots/has_note
classes:
  Hypothesis:
    class_uri: hc:Hypothesis
    description: >-
      Provisional explanatory statement proposed when available evidence is
      insufficient for definitive classification.
    alt_descriptions:
      nl: >-
        Voorlopige verklarende verklaring voorgesteld wanneer beschikbaar bewijs
        onvoldoende is voor definitieve classificatie.
      de: >-
        Vorläufige erklärende Aussage, die vorgeschlagen wird, wenn verfügbare Beweise
        für eine endgültige Klassifizierung unzureichend sind.
      fr: >-
        Déclaration explicative provisoire proposée lorsque les preuves disponibles sont
        insuffisantes pour une classification définitive.
      es: >-
        Declaración explicativa provisional propuesta cuando la evidencia disponible es
        insuficiente para una clasificación definitiva.
      ar: >-
        بيان تفسيري مؤقت يُقترح عندما تكون الأدلة المتاحة غير كافية للتصنيف النهائي.
      id: >-
        Pernyataan penjelasan sementara yang diusulkan ketika bukti yang tersedia tidak
        cukup untuk klasifikasi definitif.
      zh: >-
        当可用证据不足以进行明确分类时提出的临时解释性陈述。
    slots:
      - generated_by
      - has_note
    broad_mappings:
      - skos:Concept
    close_mappings:
      - prov:Entity
      - schema:Claim
