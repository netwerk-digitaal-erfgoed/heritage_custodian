      es: Clasificador abstracto de conjuntos documentales para categorias de colecciones gestionadas por archivos de acceso amplio.
      ar: مصنف مجرد لمجموعات السجلات لفئات المقتنيات التي تديرها عادة منظمات الأرشيف ذات الوصول الواسع.
      id: Pengklasifikasi abstrak record set untuk kategori koleksi yang umumnya dikelola organisasi arsip dengan akses luas.
