id: https://nde.nl/ontology/hc/class/DistritalArchiveRecordSetType
name: DistritalArchiveRecordSetType
title: DistritalArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  DistritalArchiveRecordSetType:
    is_a: CollectionType
    abstract: true
    class_uri: rico:RecordSetType
    description: >-
      Abstract taxonomy node for aggregations of administrative documentation maintained
      at sub-regional governmental level, particularly in Portuguese archival organization.
    alt_descriptions:
      nl: >-
        Abstract taxonomieknooppunt voor aggregaties van administratieve documentatie die op
        subregionaal overheidsniveau wordt beheerd, met name in Portugese archieforganisatie.
      de: >-
        Abstrakter Taxonomieknoten für Aggregationen administrativer Dokumentation, die auf
        subregionaler Regierungsebene geführt wird, insbesondere in portugiesischer Archivorganisation.
      fr: >-
        Nœud taxonomique abstrait pour les agrégations de documentation administrative conservée
        au niveau gouvernemental sous-régional, particulièrement dans l'organisation archivistique portugaise.
      es: >-
        Nodo taxonómico abstracto para agregaciones de documentación administrativa mantenida
        a nivel gubernamental subregional, particularmente en la organización archivística portuguesa.
      ar: >-
        عقدة تصنيفية مجردة لتجميعات الوثائق الإدارية المحفوظة على المستوى الحكومي دون الإقليمي،
        لا سيما في التنظيم الأرشيفي البرتغالي.
      id: >-
        Simpul taksonomi abstrak untuk agregasi dokumentasi administratif yang dipelihara
        pada tingkat pemerintahan subregional, khususnya dalam organisasi arsip Portugis.
      zh: >-
        用于聚合在次区域政府级别维护的行政文档的抽象分类法节点，特别是在葡萄牙档案组织中。
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
    slots:
      - has_type
      - has_score
      - has_scope
