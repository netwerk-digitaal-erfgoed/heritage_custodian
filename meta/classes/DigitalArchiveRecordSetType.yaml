id: https://nde.nl/ontology/hc/class/DigitalArchiveRecordSetType
name: DigitalArchiveRecordSetType
title: DigitalArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_scope
classes:
  DigitalArchiveRecordSetType:
    is_a: CollectionType
    abstract: true
    class_uri: rico:RecordSetType
    description: >-
      Abstract classification for record-set categories originating from or maintained within digital archival environments.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor recordset-categorieën afkomstig van of onderhouden binnen digitale archiefomgevingen.
      de: >-
        Abstrakte Klassifikation für Datensatzkategorien, die aus digitalen Archivumgebungen stammen oder darin gepflegt werden.
      fr: >-
        Classification abstraite pour les catégories de jeux d'enregistrements issus ou maintenus dans des environnements d'archives numériques.
      es: >-
        Clasificación abstracta para categorías de conjuntos de registros originados o mantenidos en entornos de archivo digital.
      ar: >-
        تصنيف تجريدي لفئات مجموعات السجلات المنشأة أو المحفوظة في بيئات أرشيفية رقمية.
      id: >-
        Klasifikasi abstrak untuk kategori kumpulan catatan yang berasal dari atau dipelihara dalam lingkungan arsip digital.
      zh: >-
        源于或维护于数字档案环境的记录集类别的抽象分类。
    structured_aliases:
      - {literal_form: digitaal archief recordset-type, in_language: nl}
      - {literal_form: digitale collectiecategorie, in_language: nl}
      - {literal_form: digitales Archiv-Datensatztyp, in_language: de}
      - {literal_form: digitale Bestandskategorie, in_language: de}
      - {literal_form: type de jeu d'enregistrements d'archives numériques, in_language: fr}
      - {literal_form: catégorie de collection numérique, in_language: fr}
      - {literal_form: tipo de conjunto de registros de archivo digital, in_language: es}
      - {literal_form: categoría de colección digital, in_language: es}
      - {literal_form: نوع مجموعة سجلات الأرشيف الرقمي, in_language: ar}
      - {literal_form: فئة المجموعة الرقمية, in_language: ar}
      - {literal_form: jenis kumpulan catatan arsip digital, in_language: id}
      - {literal_form: kategori koleksi digital, in_language: id}
      - {literal_form: 数字档案记录集类型, in_language: zh}
      - {literal_form: 数字藏品类别, in_language: zh}
    keywords:
      - digital archive
      - record set type
      - born-digital
      - digital collection
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
    slots:
      - has_scope
