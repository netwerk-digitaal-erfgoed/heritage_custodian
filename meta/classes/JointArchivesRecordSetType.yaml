id: https://nde.nl/ontology/hc/class/JointArchivesRecordSetType
name: JointArchivesRecordSetType
title: Joint Archives Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../classes/CollectionType
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  JointArchivesRecordSetType:
    class_uri: hc:JointArchivesRecordSetType
    is_a: CollectionType
    description: >-
      Taxonomy node for aggregations maintained under collaborative or
      multi-institutional archival stewardship arrangements.
    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties die onder collaboratieve of multi-institutionele
        archiefbeheersregelingen worden onderhouden.
      de: >-
        Taxonomieknoten für Aggregationen, die unter kollaborativen oder multi-institutionellen
        Archivverwaltungsvereinbarungen gepflegt werden.
      fr: >-
        Nœud taxonomique pour les agrégations maintenues dans le cadre d'arrangements de
        garde archivistique collaborative ou multi-institutionnelle.
      es: >-
        Nodo taxonómico para agregaciones mantenidas bajo acuerdos de custodia archivística
        colaborativa o multi-institucional.
      ar: >-
        عقدة تصنيفية للتجميعات التي تُدار بموجب ترتيبات رعاية أرشيفية تعاونية أو متعددة المؤسسات.
      id: >-
        Simpul taksonomi untuk agregasi yang dipelihara di bawah pengaturan pengelolaan arsip
        kolaboratif atau multi-institusional.
      zh: >-
        在协作或多机构档案保管安排下维护的聚合的分类法节点。
    structured_aliases:
    - {literal_form: gezamenlijk-archief-recordsettype, in_language: nl}
    - {literal_form: Gemeinschaftsarchiv-Bestandstyp, in_language: de}
    - {literal_form: type de fonds d'archives conjointes, in_language: fr}
    - {literal_form: tipo de conjunto documental de archivos conjuntos, in_language: es}
    - {literal_form: نوع مجموعة سجلات الأرشيف المشترك, in_language: ar}
    - {literal_form: jenis set catatan arsip bersama, in_language: id}
    - {literal_form: 联合档案记录集类型, in_language: zh}
    keywords:
    - collaborative stewardship
    - multi-institutional
    - shared custody
    - joint management
    - cooperative archives
    slots:
      - has_type
      - has_score
      - has_scope
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
