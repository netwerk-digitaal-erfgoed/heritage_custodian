id: https://nde.nl/ontology/hc/class/JointArchivesRecordSetTypes
name: JointArchivesRecordSetTypes
title: Joint Archives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./JointArchivesRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  SharedRecordsFonds:
    is_a: JointArchivesRecordSetType
    class_uri: hc:SharedRecordsFonds
    description: >-
      Fonds-level aggregation preserving provenance-based documentation from
      collaborative or multi-institutional governance arrangements.
    alt_descriptions:
      nl: >-
        Aggregatie op fondsniveau die herkomstgebaseerde documentatie uit samenwerkings-
        of multi-institutionele bestuursregelingen bewaart.
      de: >-
        Bestandslevel-Aggregation, die herkunftsbasierte Dokumentation aus kollaborativen
        oder multi-institutionellen Governance-Vereinbarungen bewahrt.
      fr: >-
        Agrégation au niveau du fonds préservant la documentation basée sur la provenance
        issue d'arrangements de gouvernance collaborative ou multi-institutionnelle.
      es: >-
        Agregación a nivel de fondo que preserva documentación basada en procedencia de
        acuerdos de gobernanza colaborativa o multi-institucional.
      ar: >-
        تجميع على مستوى المجموعة يحافظ على الوثائق القائمة على المنشأ من ترتيبات الحوكمة التعاونية أو متعددة المؤسسات.
      id: >-
        Agregasi tingkat dana yang melestarikan dokumentasi berbasis provenance dari
        pengaturan tata kelola kolaboratif atau multi-institusional.
      zh: >-
        保存来自协作或多机构治理安排的基于来源的文档的全宗级聚合。
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:JointArchives"
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    comments:
    - 'Preserved from prior description: Fonds-level grouping for provenance-based records from shared governance contexts.'
