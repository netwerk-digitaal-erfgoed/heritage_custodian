classes:
  DigitalPlatformProfile:
    class_uri: org:Organization
    description: >-
      Consolidated profile record aggregating an organization's digital platform footprint
      and service metadata into a unified representation.
    alt_descriptions:
      nl: >-
        Geconsolideerd profilerecord die de digitale platformvoetafdruk van een organisatie
        en servicemetagegevens samenvoegt tot een verenigde representatie.
      de: >-
        Konsolidierter Profildatensatz, der den digitalen Plattform-Fußabdruck einer Organisation
        und Servicemetadaten zu einer einheitlichen Darstellung aggregiert.
      fr: >-
        Enregistrement de profil consolidé agrégeant l'empreinte de plateforme numérique d'une organisation
        et les métadonnées de service en une représentation unifiée.
      es: >-
        Registro de perfil consolidado que agrega la huella de plataforma digital de una organización
        y metadatos de servicio en una representación unificada.
      ar: >-
        سجل ملف شخصي موحد يجمع بصمة المنصة الرقمية للمؤسسة
        وبيانات الخدمة الوصفية في تمثيل موحد.
      id: >-
        Catatan profil terkonsolidasi yang mengagregasi jejak platform digital organisasi
        dan metadata layanan ke dalam representasi terpadu.
      zh: >-
        将组织的数字平台足迹和服务元数据聚合为统一表示的整合配置文件记录。
    structured_aliases:
    - literal_form: platformprofiel
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Plattformprofil
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: profil de plateforme
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: perfil de plataforma
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ملف المنصة الشخصي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: profil platform
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 平台档案
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - org:Organization
    close_mappings:
    - schema:Organization
    - dcat:Resource
    related_mappings:
    - prov:Entity
    slots:
    - has_metadata
    - has_status
    - has_data_quality
    - has_profile
    - has_digital_platform
    - has_contact_point
    - has_service
    - identified_by
    - has_provenance
    - related_to
    - has_url
    - has_homepage
    - has_name
    - has_type
    - refer_to
    - has_contact_details
    - has_facility
    - contain_collection
    comments:
    - Aggregates digital presence information across multiple platforms.
    - Provides unified view of an organization's online service portfolio.
    - "Preserved from prior description: Consolidated profile record for an organization's digital platform footprint and service metadata."
    keywords:
    - platform footprint
    - service metadata
    - digital presence profile
    - organization profile
