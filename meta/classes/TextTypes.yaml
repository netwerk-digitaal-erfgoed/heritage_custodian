    - literal_form: 演职员表文本
      in_language: zh
    keywords:
    - credits
    - acknowledgments
    - attribution
    - end credits
    - contributors
    slots:
    - identified_by
    - has_label
    - has_description
    - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/text-type/credits)
      has_code:
        ifabsent: string(CREDITS)
