    - has_description
    - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/text-type/url)
      has_code:
        ifabsent: string(URL)
      has_label:
        ifabsent: string(URL)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video OCR annotation domain.
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    - schema:Text
    - crm:E33_Linguistic_Object
    comments:
    - Web addresses shown on screen, often at the end of videos or during calls-to-action
    - Visual characteristics: URL format (www., https://, etc.), often lower third or end card, may be clickable in interactive video, branded styling
    - Heritage context: institution website, exhibition microsites, resource links, social media handles
  CreditsText:
    is_a: TextType
    class_uri: hc:CreditsText
    description: >-
      End credits, acknowledgments, and attribution information typically appearing at video conclusion.
    alt_descriptions:
      nl: Credits of attributietekst.
      de: Credits- oder Zuschreibungstext.
      fr: Texte de crédits ou d'attribution.
      es: Texto de créditos o atribución.
      ar: نص الاعتمادات أو الإسناد.
      id: Teks kredit atau atribusi.
      zh: 片尾字幕、致谢和归属信息文本。
    structured_aliases:
    - literal_form: creditstekst
