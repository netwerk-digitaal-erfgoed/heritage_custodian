    - literal_form: نص العلامة المائية
      in_language: ar
    - literal_form: teks watermark
      in_language: id
    - literal_form: 水印文本
      in_language: zh
    keywords:
    - watermark
    - branding
    - copyright
    - ownership
    - overlay
    slots:
    - identified_by
    - has_label
    - has_description
    - has_code
    slot_usage:
      identified_by:
        ifabsent: string(https://nde.nl/ontology/hc/text-type/watermark)
      has_code:
        ifabsent: string(WATERMARK)
      has_label:
        ifabsent: string(Watermark)
    annotations:
      specificity_score: '0.85'
      specificity_rationale: Specific to video OCR annotation domain.
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    - schema:Text
    - crm:E33_Linguistic_Object
    comments:
    - Persistent text overlays indicating ownership, copyright, or branding that appears throughout the video
    - Visual characteristics: semi-transparent overlay, fixed position (often corner), persistent throughout video, may include logos
    - Heritage context: institution branding, copyright notices, archive identification, broadcast watermarks
  UrlText:
    is_a: TextType
    class_uri: hc:UrlText
    description: >-
      Web addresses shown on screen, often at the end of videos or during calls-to-action.
