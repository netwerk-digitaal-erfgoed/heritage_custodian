id: https://nde.nl/ontology/hc/class/ContactDetails
name: ContactDetails
title: Contact Details Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  vcard: http://www.w3.org/2006/vcard/ns#
default_prefix: hc
imports:
- linkml:types
- ../metadata
- ../slots/include
classes:
