    class_uri: schema:ContactPoint
    description: >-
      Structured contact profile bundling communication channels for a person or organization.
    alt_descriptions:
      nl: Gestructureerd contactprofiel dat communicatiekanalen voor een persoon of organisatie bundelt.
      de: Strukturiertes Kontaktprofil, das Kommunikationskanäle einer Person oder Organisation bündelt.
      fr: Profil de contact structure regroupant les canaux de communication d'une personne ou d'une organisation.
      es: Perfil de contacto estructurado que agrupa canales de comunicacion de una persona u organizacion.
      ar: ملف اتصال منظم يجمع قنوات التواصل لشخص أو مؤسسة.
      id: Profil kontak terstruktur yang menggabungkan kanal komunikasi untuk orang atau organisasi.
      zh: 汇聚个人或机构通信渠道的结构化联系档案。
    close_mappings:
    - vcard:VCard
    broad_mappings:
    - schema:ContactPoint
    slots:
    - include
