      de: Abstraktes Taxonomiekonzept zur Kategorisierung von Familien von Metadatenstandards.
      fr: Concept taxonomique abstrait pour categoriser des familles de normes de metadonnees.
      es: Concepto taxonomico abstracto para categorizar familias de estandares de metadatos.
      ar: مفهوم تصنيفي تجريدي لتصنيف عائلات معايير البيانات الوصفية.
      id: Konsep taksonomi abstrak untuk mengategorikan keluarga standar metadata.
      zh: 用于对元数据标准家族进行分类的抽象分类学概念。
    structured_aliases:
    - {literal_form: type metadata-standaard, in_language: nl}
    - {literal_form: Metadatenstandard-Typ, in_language: de}
    - {literal_form: type de norme de metadonnees, in_language: fr}
    - {literal_form: tipo de estandar de metadatos, in_language: es}
    - {literal_form: نوع معيار بيانات وصفية, in_language: ar}
    - {literal_form: tipe standar metadata, in_language: id}
    - {literal_form: 元数据标准类型, in_language: zh}
    broad_mappings:
