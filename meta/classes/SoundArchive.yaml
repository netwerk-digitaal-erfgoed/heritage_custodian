classes:
  SoundArchive:
    description: >-
      Institution dedicated to acquiring, preserving, and providing access to audio recordings including music, spoken word, and environmental sounds.
    alt_descriptions:
      nl: >-
        Instelling die gewijd is aan het verwerven, conserveren en toegankelijk maken van audio-opnames waaronder muziek, gesproken woord en omgevingsgeluiden.
      de: >-
        Einrichtung, die dem Erwerb, der Konservierung und der Bereitstellung von Audioaufnahmen einschließlich Musik, gesprochenem Wort und Umgebungsgeräuschen gewidmet ist.
      fr: >-
        Institution dédiée à l'acquisition, la conservation et la mise à disposition d'enregistrements audio comprenant musique, parole et sons environnementaux.
      es: >-
        Institución dedicada a adquirir, preservar y proporcionar acceso a grabaciones de audio incluyendo música, palabras habladas y sonidos ambientales.
      ar: >-
        مؤسسة مكرسة لاقتناء وحفظ وتوفير الوصول إلى التسجيلات الصوتية بما في ذلك الموسيقى والكلمة المنطوقة والأصوات البيئية.
      id: >-
        Lembaga yang didedikasikan untuk memperoleh, mengawetkan, dan menyediakan akses ke rekaman audio termasuk musik, kata yang diucapkan, dan suara lingkungan.
      zh: >-
        专门收集、保存和提供包括音乐、口语和环境声音在内的音频录音访问的机构。
