id: https://nde.nl/ontology/hc/class/Habitat
name: Habitat
title: Habitat
description: The environment or habitat where a biological specimen was found or collected. MIGRATED from habitat slot per Rule 53. Follows dwc:habitat.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dwc: http://rs.tdwg.org/dwc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  Habitat:
    class_uri: hc:Habitat
    description: >-
      Environmental context where a biological specimen or observation is found,
      collected, or recorded.
    alt_descriptions:
      nl: Omgevingscontext waarin een biologisch specimen of waarneming is gevonden verzameld of geregistreerd.
      de: Umweltkontext in dem ein biologisches Exemplar oder eine Beobachtung gefunden gesammelt oder dokumentiert wurde.
      fr: Contexte environnemental dans lequel un specimen biologique ou une observation est trouve collecte ou consigne.
      es: Contexto ambiental donde un especimen biologico u observacion fue hallado recolectado o registrado.
      ar: السياق البيئي الذي وُجدت أو جُمعت أو سُجلت فيه عينة بيولوجية أو ملاحظة.
      id: Konteks lingkungan tempat spesimen biologis atau observasi ditemukan dikumpulkan atau dicatat.
      zh: 生物标本或观测被发现、采集或记录时所处的环境背景。
    structured_aliases:
    - {literal_form: leefomgeving, in_language: nl}
    - {literal_form: Lebensraum, in_language: de}
    - {literal_form: habitat, in_language: fr}
    - {literal_form: habitat, in_language: es}
    - {literal_form: موطن, in_language: ar}
    - {literal_form: habitat, in_language: id}
    - {literal_form: 生境, in_language: zh}
    close_mappings:
    - dwc:habitat
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
