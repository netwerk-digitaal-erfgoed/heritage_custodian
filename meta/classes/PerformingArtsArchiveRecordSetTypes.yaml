id: https://nde.nl/ontology/hc/class/PerformingArtsArchiveRecordSetTypes
name: PerformingArtsArchiveRecordSetTypes
title: PerformingArtsArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./PerformingArtsArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  TheatreRecordsFonds:
    is_a: PerformingArtsArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of governance, finance, staffing, and
      organizational documentation produced by stage-performance institutions.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van bestuurs-, financiele,
        personeels- en organisatiedocumentatie van podiuminstellingen.
      de: >-
        Provenienzbasierte Aggregation von Leitungs-, Finanz-, Personal- und
        Organisationsunterlagen aus Buehneninstitutionen.
      fr: >-
        Agregation fondee sur la provenance de documentation de gouvernance,
        finances, personnel et organisation produite par des institutions sceniques.
      es: >-
        Agregacion basada en procedencia de documentacion de gobierno,
        finanzas, personal y organizacion producida por instituciones escenicas.
      ar: >-
        تجميع قائم على المنشأ لوثائق الحوكمة والمالية والموارد البشرية
        والتنظيم الصادرة عن مؤسسات الفنون الأدائية.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi tata kelola,
        keuangan, kepegawaian, dan organisasi dari institusi seni pertunjukan.
      zh: >-
        基于来源原则聚合舞台表演机构形成的治理、财务、人事与组织文献。
    structured_aliases:
    - {literal_form: fonds podiumorganisatie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds einer Buehneninstitution, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds d'institution scenique, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de institucion escenica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: صندوق مؤسسة فنون أدائية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds institusi seni pertunjukan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 舞台机构文献全宗, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Governance, finance, staffing, and organizational documentation remain in scope for stage-performance institutions.
    - 'Preserved from prior description: Fonds-oriented record set type for theatre-company governance and administration records.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - PerformingArtsArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:TheatreRecordsFonds
      has_custodian:
        equals_string: hc:PerformingArtsArchive
      has_note:
        equals_string: This RecordSetType is typically held by PerformingArtsArchive custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  PerformanceDocumentationCollection:
    is_a: PerformingArtsArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body of program notes, posters, publicity
      artifacts, and contextual materials generated around staged events.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van programmatoelichtingen,
        affiches, publiciteitsdrukwerk en contextmateriaal rond podiumevenementen.
      de: >-
        Zusammengestellter Dokumentkoerper aus Programmheften,
        Plakaten, Werbematerialien und Kontextunterlagen zu Auffuehrungen.
      fr: >-
        Ensemble documentaire reuni de notes de programme,
        affiches, supports promotionnels et materiaux contextuels d'evenements sceniques.
      es: >-
        Cuerpo documental reunido de notas de programa,
        carteles, materiales de difusion y recursos contextuales de eventos escenicos.
      ar: >-
        جسم وثائقي مُجمع يضم مواد البرامج والملصقات والمواد الدعائية
        ووثائق السياق المرتبطة بالفعاليات الأدائية.
      id: >-
        Kumpulan dokumenter terhimpun berisi catatan program,
        poster, materi promosi, dan bahan konteks seputar acara panggung.
      zh: >-
        汇集演出节目说明、海报、宣传品与背景材料的文献整体。
    structured_aliases:
    - {literal_form: collectie podiumcontextmateriaal, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung von Auffuehrungskontextmaterial, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de materiaux contextuels de spectacle, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de materiales contextuales de escena, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة مواد سياقية للعروض, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi materi konteks pertunjukan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 演出语境文献汇编, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Contextual performance artifacts may be assembled from multiple creators and distribution channels.
    - 'Preserved from prior description: Collection-oriented record set type for performance documentation and ephemera.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - PerformingArtsArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:PerformanceDocumentationCollection
      has_custodian:
        equals_string: hc:PerformingArtsArchive
      has_note:
        equals_string: This RecordSetType is typically held by PerformingArtsArchive custodians. Inverse of rico:isOrWasHolderOf.
  PerformingArtsProductionRecordSeries:
    is_a: PerformingArtsArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence of planning artifacts,
      rehearsal coordination records, and execution logs for staged productions.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van planningsdocumenten,
        repetitiecoordinatie en uitvoeringslogboeken van podiumproducties.
      de: >-
        Geordnete Dokumentationsfolge aus Planungsunterlagen,
        Probenkoordination und Durchfuehrungsprotokollen von Produktionen.
      fr: >-
        Sequence documentaire ordonnee de supports de planification,
        de coordination des repetitions et de journaux d'execution de production.
      es: >-
        Secuencia documental ordenada de materiales de planificacion,
        coordinacion de ensayos y registros de ejecucion de producciones escenicas.
      ar: >-
        تسلسل وثائقي منظم لوثائق التخطيط وتنسيق البروفات
        وسجلات التنفيذ الخاصة بالإنتاجات الأدائية.
      id: >-
        Urutan dokumenter teratur dari artefak perencanaan,
        koordinasi latihan, dan log pelaksanaan produksi panggung.
      zh: >-
        由制作规划文档、排练协调记录与舞台执行日志构成的有序文献序列。
    structured_aliases:
    - {literal_form: reeks podiumproductie-uitvoering, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Folge von Produktionsdurchfuehrungsunterlagen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: sequence de dossiers d'execution scénique, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: secuencia de expedientes de ejecucion escenica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة وثائق تنفيذ الإنتاج الأدائي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: urutan berkas pelaksanaan produksi panggung, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 舞台制作执行文献序列, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Sequence ordering supports continuity across planning, rehearsal, and execution stages.
    - 'Preserved from prior description: Series-oriented record set type for production planning and execution records.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - PerformingArtsArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:PerformingArtsProductionRecordSeries
      has_custodian:
        equals_string: hc:PerformingArtsArchive
      has_note:
        equals_string: This RecordSetType is typically held by PerformingArtsArchive custodians. Inverse of rico:isOrWasHolderOf.
