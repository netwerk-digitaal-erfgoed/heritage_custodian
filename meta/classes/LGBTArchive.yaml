id: https://w3id.org/nde/ontology/LGBTArchive
name: LGBTArchive
title: LGBT Archive
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  LGBTArchive:
    description: >-
      Archive organization focused on preserving records and memory resources
      related to LGBTQIA+ histories, communities, and activism.
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    alt_descriptions:
      nl: Archieforganisatie gericht op het bewaren van archiefmateriaal en herinneringsbronnen over LGBTQIA+ geschiedenis gemeenschappen en activisme.
      de: Archivorganisation mit Fokus auf Erhalt von Unterlagen und Erinnerungsgut zu LGBTQIA+-Geschichte Gemeinschaften und Aktivismus.
      fr: Organisation archivistique consacree a la preservation de ressources memorielles et documentaires liees aux histoires et communautes LGBTQIA+.
      es: Organizacion archivistica centrada en preservar registros y recursos de memoria sobre historias comunidades y activismo LGBTQIA+.
      ar: منظمة أرشيفية تركز على حفظ السجلات ومصادر الذاكرة المتعلقة بتاريخ ومجتمعات ونشاط LGBTQIA+.
      id: Organisasi arsip yang berfokus melestarikan rekaman dan sumber memori terkait sejarah komunitas dan aktivisme LGBTQIA+.
      zh: 专注保存 LGBTQIA+ 历史、社群与行动相关档案与记忆资源的档案机构。
    structured_aliases:
    - {literal_form: queer archief, in_language: nl}
    - {literal_form: queeres Archiv, in_language: de}
    - {literal_form: archives LGBTQIA+, in_language: fr}
    - {literal_form: archivo LGBTQIA+, in_language: es}
    - {literal_form: أرشيف LGBTQIA+, in_language: ar}
    - {literal_form: arsip LGBTQIA+, in_language: id}
    - {literal_form: LGBTQIA+档案馆, in_language: zh}
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - skos:Concept
    - wd:Q61710689
    broad_mappings:
    - wd:Q166118
    slot_usage:
      identified_by:
      has_type:
        any_of:
        - equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: LGBT Archive
      skos:altLabel: LGBT-Archiv, archivo LGBT, archives LGBT, LGBTQ Archive, LGBTQ+ Archive, Queer Archive
      subject_domain: LGBT history and culture
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - CommunityArchive
    - FreeArchive
    - SocialMovementArchive
    - SpecializedArchive
    comments:
    - LGBT-Archiv (de)
    - archivo LGBT (es)
    - archives LGBT (fr)
    - Documents LGBT history, activism, and community life
    - Often community-based and volunteer-run
    - Important for preserving marginalized community histories
