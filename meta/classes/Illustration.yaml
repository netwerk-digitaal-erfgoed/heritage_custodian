id: https://nde.nl/ontology/hc/class/Illustration
name: Illustration
title: Illustration
description: An illustration in a document.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_image
classes:
  Illustration:
    class_uri: schema:ImageObject
    description: >-
      Visual explanatory or decorative image element embedded in a document or
      publication context.
    alt_descriptions:
      nl: Visueel verklarend of decoratief beeldelement ingebed in een document- of publicatiecontext.
      de: Visuelles erklaerendes oder dekoratives Bildelement in einem Dokument- oder Publikationskontext.
      fr: Element visuel explicatif ou decoratif integre dans un document ou une publication.
      es: Elemento visual explicativo o decorativo integrado en un documento o publicacion.
      ar: عنصر بصري توضيحي أو زخرفي مضمّن في سياق مستند أو منشور.
      id: Elemen visual penjelas atau dekoratif yang disematkan dalam konteks dokumen atau publikasi.
      zh: 嵌入文档或出版场景中的说明性或装饰性图像元素。
    structured_aliases:
    - {literal_form: illustratie, in_language: nl}
    - {literal_form: Illustration, in_language: de}
    - {literal_form: illustration, in_language: fr}
    - {literal_form: ilustracion, in_language: es}
    - {literal_form: رسم توضيحي, in_language: ar}
    - {literal_form: ilustrasi, in_language: id}
    - {literal_form: 插图, in_language: zh}
    broad_mappings:
    - schema:ImageObject
    slots:
    - has_description
    - has_image
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
