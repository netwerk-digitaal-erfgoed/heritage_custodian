classes:
  DigitalArchive:
    is_a: CustodianType
    class_uri: skos:Concept
    description: >-
      Organizational category for institutions whose primary custodial and access operations are conducted through digital infrastructure.
    alt_descriptions:
      nl: >-
        Organisatorische categorie voor instellingen wiens primaire beheer- en toegangsactiviteiten via digitale infrastructuur worden uitgevoerd.
      de: >-
        Organisatorische Kategorie für Institutionen, deren primäre Verwaltungs- und Zugangstätigkeiten über digitale Infrastruktur durchgeführt werden.
      fr: >-
        Catégorie organisationnelle pour les institutions dont les principales opérations de garde et d'accès sont effectuées via une infrastructure numérique.
      es: >-
        Categoría organizacional para instituciones cuyas operaciones principales de custodia y acceso se realizan a través de infraestructura digital.
      ar: >-
        فئة تنظيمية للمؤسسات التي تُجرى عمليات الحضانة والوصول الرئيسية عبر البنية التحتية الرقمية.
      id: >-
        Kategori organisasi untuk lembaga yang operasi pengelolaan dan akses utamanya dilakukan melalui infrastruktur digital.
      zh: >-
        主要保管和访问操作通过数字基础设施进行的机构的组织类别。
