id: https://nde.nl/ontology/hc/class/DocumentFormat
name: DocumentFormat
title: Document Format
description: The format of a document (e.g., PDF, HTML, XML). MIGRATED from financial_document_format slot per Rule 53. Follows dcterms:format.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
default_prefix: hc
classes:
  DocumentFormat:
    class_uri: dcterms:MediaType
    description: >-
      Controlled encoding specification describing the technical format and media type of a document resource.
    alt_descriptions:
      nl: >-
        Gecontroleerde coderingsspecificatie die het technische formaat en mediatype van een documentbron beschrijft.
      de: >-
        Kontrollierte Kodierungsspezifikation, die das technische Format und den Medientyp einer Dokumentenressource beschreibt.
      fr: >-
        Spécification d'encodage contrôlée décrivant le format technique et le type de média d'une ressource documentaire.
      es: >-
        Especificación de codificación controlada que describe el formato técnico y el tipo de medio de un recurso documental.
      ar: >-
        مواصفات ترميز مضبوطة تصف التنسيق التقني ونوع الوسائط لمورد وثائقي.
      id: >-
        Spesifikasi pengkodean terkendali yang menjelaskan format teknis dan tipe media sumber dokumen.
      zh: >-
        描述文档资源的技术格式和媒体类型的受控编码规范。
