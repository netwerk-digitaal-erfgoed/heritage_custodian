classes:
  CurationActivity:
    is_a: Activity
    class_uri: crm:E87_Curation_Activity
    description: >-
      Ongoing stewardship endeavor maintaining, enriching, or reorganizing curated holdings throughout their lifecycle.
    alt_descriptions:
      nl: >-
        Doorlopend beheerswerk dat gedurende hun levenscyclus beheerde collecties onderhoudt, verrijkt of reorganiseert.
      de: >-
        Laufende Bewahrungsbestrebung, die kuratierte Bestände während ihres Lebenszyklus pflegt, bereichert oder reorganisiert.
      fr: >-
        Effort de garde continu maintenant, enrichissant ou réorganisant les fonds conservés tout au long de leur cycle de vie.
      es: >-
        Esfuerzo continuo de custodia que mantiene, enriquece o reorganiza los fondos conservados durante su ciclo de vida.
      ar: >-
        جهد رعاية مستمر يحافظ على المجموعات المنسقة أو يثريها أو يعيد تنظيمها طوال دورة حياتها.
      id: >-
        Upaya pengelolaan berkelanjutan yang memelihara, memperkaya, atau mengorganisasi kembali koleksi terkurasi sepanjang siklus hidupnya.
      zh: >-
        在整个生命周期中维护、丰富或重组策展藏品的持续保管工作。
