id: https://nde.nl/ontology/hc/class/VariantTypes
name: VariantTypes
title: Variant Types Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
imports:
  - ./VariantType
  - linkml:types
  - ../metadata
default_prefix: hc
classes:
  AbbreviationVariant:
    is_a: VariantType
    class_uri: hc:AbbreviationVariant
    description: Shortened lexical form using initials or contracted wording.
    alt_descriptions:
      nl: Verkorte lexicale vorm met initialen of ingekorte formulering.
      de: Verkuerzte lexikalische Form mit Initialen oder kontrahierter Wortung.
      fr: Forme lexicale abregee utilisant initiales ou formulation contractee.
      es: Forma lexica abreviada que usa iniciales o formulacion contraida.
      ar: صيغة معجمية مختصرة تستخدم الأحرف الأولى أو تعبيرًا منقبضًا.
      id: Bentuk leksikal ringkas menggunakan inisial atau perumusan yang disingkat.
      zh: 使用首字母或缩约表达的简化词汇形式。
    structured_aliases:
    - literal_form: afkortingsvorm
      in_language: nl
    - literal_form: Kurzform
      in_language: de
    - literal_form: forme abregee
      in_language: fr
    - literal_form: forma abreviada
      in_language: es
    - literal_form: صيغة مختصرة
      in_language: ar
    - literal_form: bentuk singkatan
      in_language: id
    - literal_form: 缩略形式
      in_language: zh
    annotations:
      specificity_score: 0.35
      specificity_rationale: Abbreviations common across all naming contexts.
      custodian_types: '[''*'']'
      modeling_notes: |
        Use for role abbreviations, department abbreviations, and standard acronyms
        (e.g., "Dir." for "Director").
    broad_mappings:
    - skos:Concept
  SynonymVariant:
    is_a: VariantType
    class_uri: hc:SynonymVariant
    description: Alternative lexical form with equivalent meaning in context.
    alt_descriptions:
      nl: Alternatieve lexicale vorm met gelijkwaardige betekenis in context.
      de: Alternative lexikalische Form mit gleichwertiger Bedeutung im Kontext.
      fr: Forme lexicale alternative de signification equivalente selon le contexte.
      es: Forma lexica alternativa con significado equivalente en contexto.
      ar: صيغة معجمية بديلة ذات معنى مكافئ ضمن السياق.
      id: Bentuk leksikal alternatif dengan makna setara dalam konteks.
      zh: 在语境中意义等同的替代词汇形式。
    structured_aliases:
    - literal_form: synonieme vorm
      in_language: nl
    - literal_form: synonyme Form
      in_language: de
    - literal_form: forme synonyme
      in_language: fr
    - literal_form: forma sinonima
      in_language: es
    - literal_form: صيغة مترادفة
      in_language: ar
    - literal_form: bentuk sinonim
      in_language: id
    - literal_form: 同义表达形式
      in_language: zh
    annotations:
      specificity_score: 0.4
      specificity_rationale: Synonyms important for search and discovery.
      mapping_predicate: skos:altLabel
      modeling_notes: |
        Use for interchangeable labels such as role title synonyms,
        technical synonyms, and cross-cultural equivalents.
    broad_mappings:
    - skos:Concept
  RegionalVariant:
    is_a: VariantType
    class_uri: hc:RegionalVariant
    description: Locale-specific lexical form used within a geographic speech community.
    alt_descriptions:
      nl: Regio-specifieke lexicale vorm gebruikt binnen een geografische taalgemeenschap.
      de: Ortsgebundene lexikalische Form innerhalb einer geografischen Sprachgemeinschaft.
      fr: Forme lexicale propre a une aire geographique ou communaute linguistique.
      es: Forma lexica propia de una zona geografica o comunidad linguistica.
      ar: صيغة معجمية خاصة بإقليم أو جماعة لغوية جغرافية.
      id: Bentuk leksikal khas wilayah dalam komunitas tutur geografis.
      zh: 地域性语言社群内使用的地方词汇形式。
    structured_aliases:
    - literal_form: regionale vorm
      in_language: nl
    - literal_form: regionale Sprachform
      in_language: de
    - literal_form: forme regionale
      in_language: fr
    - literal_form: forma regional
      in_language: es
    - literal_form: صيغة إقليمية
      in_language: ar
    - literal_form: bentuk regional
      in_language: id
    - literal_form: 地域表达形式
      in_language: zh
    annotations:
      specificity_score: 0.45
      specificity_rationale: Regional variants important for international heritage.
      modeling_notes: |
        Use for geographic language differences, including country-specific and
        dialect-specific terminology (e.g., British vs. American usage).
    broad_mappings:
    - skos:Concept
  HistoricalVariant:
    is_a: VariantType
    class_uri: hc:HistoricalVariant
    description: Earlier lexical form associated with prior periods of use.
    alt_descriptions:
      nl: Eerdere lexicale vorm die met voorgaande gebruiksperioden is verbonden.
      de: Fruehere lexikalische Form aus vorherigen Nutzungsperioden.
      fr: Forme lexicale anterieure associee a des periodes d usage precedentes.
      es: Forma lexica anterior asociada a periodos de uso previos.
      ar: صيغة معجمية أقدم مرتبطة بفترات استعمال سابقة.
      id: Bentuk leksikal terdahulu yang terkait periode penggunaan sebelumnya.
      zh: 与早期使用时期相关的既往词汇形式。
    structured_aliases:
    - literal_form: historische vorm
      in_language: nl
    - literal_form: historische Sprachform
      in_language: de
    - literal_form: forme historique
      in_language: fr
    - literal_form: forma historica
      in_language: es
    - literal_form: صيغة تاريخية
      in_language: ar
    - literal_form: bentuk historis
      in_language: id
    - literal_form: 历史用语形式
      in_language: zh
    annotations:
      specificity_score: 0.5
      specificity_rationale: Historical variants important for heritage documentation.
      modeling_notes: |
        Use for obsolete job titles, legacy classifications, and period-specific
        terminology needed for historical fidelity.
    broad_mappings:
    - skos:Concept
  InformalVariant:
    is_a: VariantType
    class_uri: hc:InformalVariant
    description: Colloquial lexical form used in casual or non-formal contexts.
    alt_descriptions:
      nl: Informele lexicale vorm gebruikt in alledaagse of niet-formele contexten.
      de: Umgangssprachliche lexikalische Form fuer alltaegliche oder nicht-formale Kontexte.
      fr: Forme lexicale familiere employee dans des contextes non formels.
      es: Forma lexica coloquial usada en contextos casuales o no formales.
      ar: صيغة معجمية دارجة تُستخدم في سياقات غير رسمية.
      id: Bentuk leksikal kolokial yang digunakan dalam konteks santai atau nonformal.
      zh: 在口语或非正式语境中使用的词汇形式。
    structured_aliases:
    - literal_form: informele vorm
      in_language: nl
    - literal_form: umgangssprachliche Form
      in_language: de
    - literal_form: forme familiere
      in_language: fr
    - literal_form: forma coloquial
      in_language: es
    - literal_form: صيغة عامية
      in_language: ar
    - literal_form: bentuk kolokial
      in_language: id
    - literal_form: 口语形式
      in_language: zh
    annotations:
      specificity_score: 0.4
      specificity_rationale: Informal terms help with natural language search.
      modeling_notes: |
        Use for colloquial references and internal nicknames that occur in
        user-facing or unstructured language contexts.
    broad_mappings:
    - skos:Concept
  TranslationVariant:
    is_a: VariantType
    class_uri: hc:TranslationVariant
    description: Cross-language lexical form expressing the same concept.
    alt_descriptions:
      nl: Taaloverschrijdende lexicale vorm die hetzelfde concept uitdrukt.
      de: Sprachuebergreifende lexikalische Form mit demselben Konzept.
      fr: Forme lexicale interlinguistique exprimant le meme concept.
      es: Forma lexica interlinguistica que expresa el mismo concepto.
      ar: صيغة معجمية عابرة للغات تعبّر عن المفهوم نفسه.
      id: Bentuk leksikal lintas bahasa yang menyatakan konsep yang sama.
      zh: 跨语言表达同一概念的词汇形式。
    structured_aliases:
    - literal_form: vertaalvorm
      in_language: nl
    - literal_form: uebersetzte Form
      in_language: de
    - literal_form: forme traduite
      in_language: fr
    - literal_form: forma traducida
      in_language: es
    - literal_form: صيغة مترجمة
      in_language: ar
    - literal_form: bentuk terjemahan
      in_language: id
    - literal_form: 翻译形式
      in_language: zh
    annotations:
      specificity_score: 0.45
      specificity_rationale: Translations essential for multilingual heritage data.
      modeling_notes: |
        Use for multilingual labels where the same concept is expressed in
        another language; pair with explicit language tagging.
    broad_mappings:
    - skos:Concept
