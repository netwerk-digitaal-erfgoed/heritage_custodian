id: https://nde.nl/ontology/hc/class/GLAMORCUBESFIXPHDNTCode
name: GLAMORCUBESFIXPHDNTCode
title: GLAMORCUBESFIXPHDNT Code Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
  - ../slots/has_description
classes:
  GLAMORCUBESFIXPHDNTCode:
    class_uri: skos:Concept
    description: >-
      Controlled code value within the heritage institution classification
      taxonomy covering galleries, libraries, archives, museums, and related organizations.
    alt_descriptions:
      nl: >-
        Gecontroleerde codewaarde binnen de erfgoedinstellingenclassificatietaxonomie
        die galerieën, bibliotheken, archieven, musea en verwante organisaties omvat.
      de: >-
        Kontrollierter Codewert innerhalb der Klassifikationstaxonomie für
        Kulturerbe-Einrichtungen, Galerien, Bibliotheken, Archive und verwandte Organisationen umfasst.
      fr: >-
        Valeur de code contrôlée dans la taxonomie de classification des institutions
        patrimoniales couvrant galeries, bibliothèques, archives, musées et organisations apparentées.
      es: >-
        Valor de código controlado dentro de la taxonomía de clasificación de instituciones
        patrimoniales que cubre galerías, bibliotecas, archivos, museos y organizaciones relacionadas.
      ar: >-
        قيمة رمز مضبوطة ضمن تصنيف مؤسسات التراث الذي يغطي المعارض والمكتبات والأرشيفات والمتاحف والمنظمات ذات الصلة.
      id: >-
        Nilai kode terkendali dalam taksonomi klasifikasi institusi warisan yang mencakup
        galeri, perpustakaan, arsip, museum, dan organisasi terkait.
      zh: >-
        遗产机构分类分类法中的受控代码值，涵盖美术馆、图书馆、档案馆、博物馆和相关组织。
    broad_mappings:
      - skos:Concept
    slots:
      - has_label
      - has_description
    annotations:
      specificity_score: 0.3
      specificity_rationale: Taxonomy code class for institutional categorization.
      custodian_types: '["*"]'
