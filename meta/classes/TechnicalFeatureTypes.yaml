    - literal_form: download feature
      in_language: ar
    - literal_form: download feature
      in_language: id
    - literal_form: download feature
      in_language: zh
  IIIFFeature:
    is_a: TechnicalFeatureType
    description: >-
      International Image Interoperability Framework service for high-resolution image delivery.
    alt_descriptions:
      nl: International Image Interoperability Framework-service voor levering van hoge-resolutiebeelden.
      de: International Image Interoperability Framework-Service für die Bereitstellung hochauflösender Bilder.
      fr: Service International Image Interoperability Framework pour la livraison d'images haute résolution.
      es: Servicio International Image Interoperability Framework para entrega de imágenes de alta resolución.
      zh: 用于高分辨率图像传输的国际图像互操作性框架服务。
      ar: 'مفهوم لـ: International Image Interoperability Framework service for high-resolution image delivery.'
      id: 'Konsep untuk: International Image Interoperability Framework service for high-resolution image delivery.'
