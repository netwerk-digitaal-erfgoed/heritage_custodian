id: https://nde.nl/ontology/hc/class/TechnicalFeatureTypes
name: TechnicalFeatureTypes
title: Technical Feature Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
- ./TechnicalFeatureType
- linkml:types
classes:
  SearchFeature:
    is_a: TechnicalFeatureType
    description: >-
      Functionality for querying and retrieving content from collections or databases.
    alt_descriptions:
      nl: Functionaliteit voor het doorzoeken en ophalen van inhoud uit collecties of databases.
      de: Funktionalität zum Abfragen und Abrufen von Inhalten aus Sammlungen oder Datenbanken.
      fr: Fonctionnalité de recherche et de récupération de contenu dans des collections ou bases de données.
      es: Funcionalidad para consultar y recuperar contenido de colecciones o bases de datos.
      zh: 从馆藏或数据库中查询和检索内容的功能。
      ar: 'مفهوم لـ: Functionality for querying and retrieving content from collections or databases.'
      id: 'Konsep untuk: Functionality for querying and retrieving content from collections or databases.'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    keywords:
    - search
    - query
    - retrieval
    annotations:
      custodian_types: '[''*'']'
    structured_aliases:
    - literal_form: search feature
      in_language: nl
    - literal_form: search feature
      in_language: de
    - literal_form: search feature
      in_language: fr
    - literal_form: search feature
      in_language: es
    - literal_form: search feature
      in_language: ar
    - literal_form: search feature
      in_language: id
    - literal_form: search feature
      in_language: zh
  APIFeature:
    is_a: TechnicalFeatureType
    description: >-
      Programmatic interface for machine-to-machine data access and integration.
    alt_descriptions:
      nl: Programmatische interface voor machine-to-machine gegevenstoegang en -integratie.
      de: Programmatische Schnittstelle für Machine-to-Machine-Datenzugriff und -integration.
      fr: Interface programmatique pour l'accès et l'intégration de données machine-à-machine.
      es: Interfaz programática para acceso e integración de datos máquina a máquina.
      zh: 用于机器对机器数据访问和集成的编程接口。
      ar: 'مفهوم لـ: Programmatic interface for machine-to-machine data access and integration.'
      id: 'Konsep untuk: Programmatic interface for machine-to-machine data access and integration.'
    broad_mappings:
    - skos:Concept
    keywords:
    - API
    - programmatic access
    - machine-to-machine
    annotations:
      custodian_types: '[''*'']'
    structured_aliases:
    - literal_form: feature
      in_language: nl
    - literal_form: feature
      in_language: de
    - literal_form: feature
      in_language: fr
    - literal_form: feature
      in_language: es
    - literal_form: feature
      in_language: ar
    - literal_form: feature
      in_language: id
    - literal_form: feature
      in_language: zh
  DownloadFeature:
    is_a: TechnicalFeatureType
    description: >-
      Capability to export or content in various file formats.
    alt_descriptions:
      nl: Mogelijkheid om inhoud in verschillende bestandsformaten te exporteren of te downloaden.
      de: Fähigkeit, Inhalte in verschiedenen Dateiformaten zu exportieren oder herunterzuladen.
      fr: Capacité d'exporter ou de télécharger du contenu dans différents formats de fichiers.
      es: Capacidad de exportar o descargar contenido en varios formatos de archivo.
      zh: 以各种文件格式导出或下载内容的能力。
      ar: 'مفهوم لـ: Capability to export or content in various file formats.'
      id: 'Konsep untuk: Capability to export or content in various file formats.'
    broad_mappings:
    - skos:Concept
    keywords:
    - download
    - export
    - file format
    annotations:
      custodian_types: '[''*'']'
    structured_aliases:
    - literal_form: download feature
      in_language: nl
    - literal_form: download feature
      in_language: de
    - literal_form: download feature
      in_language: fr
    - literal_form: download feature
