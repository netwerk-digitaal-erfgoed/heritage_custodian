  SPARQLFeature:
    is_a: TechnicalFeatureType
    description: >-
      Protocol and RDF Query Language endpoint for linked data access.
    alt_descriptions:
      nl: SPARQL-protocol en RDF-querytaal-endpoint voor toegang tot linked data.
      de: SPARQL-Protokoll und RDF-Abfragesprache-Endpunkt für Linked-Data-Zugriff.
      fr: Point d'accès SPARQL Protocol and RDF Query Language pour l'accès aux données liées.
      es: Punto de acceso SPARQL Protocol and RDF Query Language para acceso a datos enlazados.
      zh: 用于关联数据访问的SPARQL协议和RDF查询语言端点。
      ar: 'مفهوم لـ: Protocol and RDF Query Language endpoint for linked data access.'
      id: 'Konsep untuk: Protocol and RDF Query Language endpoint for linked data access.'
