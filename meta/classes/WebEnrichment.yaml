id: https://nde.nl/ontology/hc/classes/WebEnrichment
name: WebEnrichment
title: WebEnrichment
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  pav: http://purl.org/pav/
imports:
- linkml:types
- ../slots/warrant
# default_range: string
classes:
  WebEnrichment:
    description: >-
      Supplementary metadata and extracted data from institutional online sources,
      including crawling outputs, archived pages, and derived assertions.
    alt_descriptions:
      nl: Webarchief-metadata en verrijkingsgegevens geëxtraheerd van institutionele websites.
      de: Webarchiv-Metadaten und Anreicherungsdaten von institutionellen Websites.
      fr: Métadonnées d'archive web et données d'enrichissement extraites de sites institutionnels.
      es: Metadatos de archivo web y datos de enriquecimiento extraídos de sitios institucionales.
      ar: بيانات تعريف أرشيف الويب وبيانات الإثراء المستخرجة من المواقع المؤسسية.
      id: Metadata arsip web dan data pengayaan yang diekstrak dari situs kelembagaan.
      zh: 从机构网站提取的网络档案元数据和增强数据。
    structured_aliases:
    - literal_form: webverrijking
      in_language: nl
    - literal_form: Web-Anreicherung
      in_language: de
    - literal_form: enrichissement web
      in_language: fr
    - literal_form: enriquecimiento web
      in_language: es
    - literal_form: إثراء الويب
      in_language: ar
    - literal_form: pengayaan web
      in_language: id
    - literal_form: 网页增强
      in_language: zh
    comments:
    - Captures web scraping results, archived pages, and domain registration info.
    - 'Preserved from prior description: Supplementary metadata and extracted data from institutional websites, including web scraping results, archived pages, and derived assertions.'
    class_uri: prov:Entity
    broad_mappings:
    - prov:Entity
    close_mappings:
    - pav:SourceAccessedAt
    related_mappings:
    - schema:WebPage
    - prov:Derivation
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_url
    - warrant
