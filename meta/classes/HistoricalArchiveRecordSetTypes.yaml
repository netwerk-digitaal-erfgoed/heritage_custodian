id: https://nde.nl/ontology/hc/class/HistoricalArchiveRecordSetTypes
name: HistoricalArchiveRecordSetTypes
title: Historical Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
  - ./HistoricalArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  HistoricalDocumentFonds:
    is_a: HistoricalArchiveRecordSetType
    class_uri: hc:HistoricalDocumentFonds
    description: >-
      Provenance-based aggregation of documentation preserved from earlier
      administrative, social, or institutional contexts.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie bewaard uit eerdere
        bestuurlijke, sociale of institutionele contexten.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen, die aus frueheren
        administrativen, sozialen oder institutionellen Kontexten erhalten sind.
      fr: >-
        Agregation fondee sur la provenance de documentation conservee
        issue de contextes administratifs, sociaux ou institutionnels anterieurs.
      es: >-
        Agregacion basada en procedencia de documentacion conservada
        de contextos administrativos, sociales o institucionales previos.
      ar: >-
        تجميع قائم على المنشأ لوثائق محفوظة من سياقات إدارية أو
        اجتماعية أو مؤسسية سابقة.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dipertahankan
        dari konteks administratif, sosial, atau institusional terdahulu.
      zh: >-
        基于来源原则聚合从早期行政、社会或机构语境中保存下来的文献。
    structured_aliases:
      - literal_form: provenancegebonden historisch documentcluster
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Bestand historischer Provenienzunterlagen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: ensemble documentaire historique de provenance
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: conjunto documental historico de procedencia
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: تجميع وثائقي تاريخي بحسب المنشأ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: himpunan dokumentasi historis berbasis asal-usul
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 历史来源文献聚合
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Historical context is treated as scope while provenance remains the primary organizing principle.
    keywords:
      - historical context
      - provenance aggregation
      - institutional memory
      - preserved documentation
    examples:
      - value:
          has_type: hc:HistoricalDocumentFonds
          has_custodian: hc:HistoricalArchive
          has_note: Legacy administrative registers and correspondence preserved by provenance.
        description: Earlier-context documentation grouped by originating provenance.
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:HistoricalDocumentFonds
      has_custodian:
        equals_string: hc:HistoricalArchive
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
  HistoricalManuscriptCollection:
    is_a: HistoricalArchiveRecordSetType
    class_uri: hc:HistoricalManuscriptCollection
    description: >-
      Assembled documentary body of manuscript heritage resources,
      gathered for research, access, or interpretive documentation.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van handschriften als erfgoed,
        verzameld voor onderzoek, raadpleging of documentatiedoeleinden.
      de: >-
        Zusammengestellter Dokumentkoerper aus handschriftlichen
        Kulturgutressourcen, gesammelt fuer Forschung, Nutzung oder Dokumentation.
      fr: >-
        Ensemble documentaire reuni de ressources manuscrites patrimoniales,
        rassemblees pour la recherche, l'acces ou la documentation.
      es: >-
        Cuerpo documental reunido de recursos manuscritos patrimoniales,
        reunidos para investigacion, acceso o documentacion.
      ar: >-
        جسم وثائقي مُجمع من موارد مخطوطة تراثية
        جُمعت لأغراض البحث أو الإتاحة أو التوثيق.
      id: >-
        Kumpulan dokumenter terhimpun dari sumber naskah warisan,
        dikumpulkan untuk penelitian, akses, atau dokumentasi.
      zh: >-
        汇集手稿类文化遗产资源的文献整体，用于研究、访问或解释性记录。
    structured_aliases:
      - literal_form: verzameling handschriftelijk erfgoed
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Sammlung handschriftlichen Kulturguts
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: collection de patrimoine manuscrit
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: coleccion de patrimonio manuscrito
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: مجموعة تراث مخطوط
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: koleksi warisan manuskrip
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 手稿遗产资源汇编
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Assembly may reflect documentation goals rather than strict provenance.
    keywords:
      - manuscript heritage
      - assembled documentation
      - research access
      - interpretive context
    examples:
      - value:
          has_type: hc:HistoricalManuscriptCollection
          has_custodian: hc:HistoricalArchive
          has_note: Manuscript facsimiles and catalog descriptions assembled for study.
        description: Manuscript heritage resources assembled for research access.
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:HistoricalManuscriptCollection
      has_custodian:
        equals_string: hc:HistoricalArchive
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
