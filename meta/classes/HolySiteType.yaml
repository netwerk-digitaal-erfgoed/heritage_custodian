id: https://nde.nl/ontology/hc/class/HolySiteType
name: HolySiteType
title: Holy Site Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
- ../slots/equivalent_to
classes:
  HolySiteType:
    class_uri: hc:HolySiteType
    description: >-
      Controlled vocabulary for categorizing sacred places, religious monuments,
      and worship-related heritage locations by tradition and function.
    alt_descriptions:
      nl: >-
        Gecontroleerde woordenlijst voor het categoriseren van heilige plaatsen, religieuze monumenten
        en eredienst-gerelateerde erfgoedlocaties naar traditie en functie.
      de: >-
        Kontrolliertes Vokabular zur Kategorisierung heiliger Stätten, religiöser Denkmäler
        und gottesdienstbezogener Heritage-Orte nach Tradition und Funktion.
      fr: >-
        Vocabulaire contrôlé pour catégoriser les lieux sacrés, monuments religieux
        et sites patrimoniaux liés au culte par tradition et fonction.
      es: >-
        Vocabulario controlado para categorizar lugares sagrados, monumentos religiosos
        y sitios patrimoniales relacionados con el culto por tradición y función.
      ar: >-
        مفردات خاضعة للرقابة لتصنيف الأماكن المقدسة والمعالم الدينية
        ومواقع التراث المتعلقة بالعبادة حسب التقليد والوظيفة.
      id: >-
        Kosakata terkontrol untuk mengkategorikan tempat suci, monumen keagamaan,
        dan lokasi warisan terkait ibadah berdasarkan tradisi dan fungsi.
      zh: >-
        用于按传统和功能对圣地、宗教纪念碑和与崇拜相关的遗产地点进行分类的受控词汇。
    slots:
    - identified_by
    - has_label
    - has_description
    - equivalent_to
    slot_usage:
      identified_by:
        required: true
      has_label:
        required: true
    broad_mappings:
    - skos:Concept
    structured_aliases:
    - literal_form: heilige-plaats-type
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Heiligtumstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de site sacré
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de sitio sagrado
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع الموقع المقدس
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe situs suci
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 圣地类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Migrated from holy_site_subtype slot (2026-01-28)
    - Provides structured classification for religious heritage sites
    - Links to Wikidata entities for semantic grounding
    - 'Preserved from prior description: Controlled subtype vocabulary for categorizing specific forms of sacred or worship-related heritage sites.'
    keywords:
    - sacred site
    - religious heritage
    - worship
    - holy place
    examples:
    - value:
        has_label: Church
        equivalent_to: wd:Q16970
      description: Christian church classification
    annotations:
      specificity_score: 0.5
      specificity_rationale: Controlled vocabulary for religious heritage site classification
      custodian_types: "['*']"
