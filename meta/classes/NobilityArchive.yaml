    comments:
    - Documents noble families, titles, estates, and heraldic history.
    - Essential for genealogy, social history, and aristocratic lineage research.
    - May be privately held by noble houses or deposited in public repositories.
    - 'Preserved from prior description: Archive organization preserving records related to noble families, titles, estates, and heraldic history.'
    keywords:
    - noble families
    - aristocratic archives
    - hereditary titles
    - heraldic records
