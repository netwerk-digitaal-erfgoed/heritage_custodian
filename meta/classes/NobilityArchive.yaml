classes:
  NobilityArchive:
    description: >-
      Archival organization preserving records documenting noble families, hereditary
      titles, estates, heraldic traditions, and aristocratic lineages.
    alt_descriptions:
      nl: >-
        Archiefinstelling die archieven bewaart die adellijke families, erfelijke titels,
        landgoederen, heraldische tradities en aristocratische afstammingslijnen documenteren.
      de: >-
        Archivinstitution, die Unterlagen bewahrt, die Adelsfamilien, Erbtitel, Güter,
        heraldische Traditionen und aristokratische Abstammungslinien dokumentieren.
      fr: >-
        Organisation archivistique préservant des documents sur les familles nobles, les titres héréditaires,
        les domaines, les traditions héraldiques et les lignées aristocratiques.
      es: >-
        Organización archivística que preserva registros que documentan familias nobles, títulos hereditarios,
        propiedades, tradiciones heráldicas y linajes aristocráticos.
      ar: >-
        منظمة أرشيفية تحافظ على السجلات التي توثق العائلات النبيلة والألقاب الوراثية
        والعقارات والتقاليد الشعارية والأنساب الأرستقراطية.
      id: >-
        Organisasi arsip yang melestarikan catatan yang mendokumentasikan keluarga bangsawan, gelar turun-temurun,
        tanah perdikan, tradisi heraldik, dan garis keturunan aristokrat.
      zh: >-
        保存记录贵族家庭、世袭头衔、庄园、纹章传统和贵族谱系的档案机构。
    structured_aliases:
