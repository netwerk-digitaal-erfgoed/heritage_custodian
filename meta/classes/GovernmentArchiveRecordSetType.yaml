id: https://nde.nl/ontology/hc/class/GovernmentArchiveRecordSetType
name: GovernmentArchiveRecordSetType
title: Government Archive Record Set Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_type
- ../slots/has_scope
- ../slots/has_score
classes:
  GovernmentArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Classification concept for documentary aggregations preserved by public-sector
      archival institutions at various administrative levels.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties bewaard door overheidsarchiefinstellingen
        op verschillende bestuurlijke niveaus.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die von öffentlichen Archivinstitutionen
        auf verschiedenen Verwaltungsebenen aufbewahrt werden.
      fr: >-
        Concept de classification pour les agrégations documentaires conservées par les institutions
        archivistiques du secteur public à divers niveaux administratifs.
      es: >-
        Concepto de clasificación para agregaciones documentales preservadas por instituciones
        archivísticas del sector público en varios niveles administrativos.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي تحفظها مؤسسات الأرشيف الحكومية
        على مختلف المستويات الإدارية.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dilestarikan oleh lembaga arsip
        sektor publik di berbagai tingkat administratif.
      zh: >-
        用于分类各级公共部门档案机构保存的文献聚合的分类概念。
    structured_aliases:
    - literal_form: overheidsarchief-recordsettype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Regierungsarchiv-RecordSet-Typ
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de fonds d'archives gouvernementales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de fondo de archivo gubernamental
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع مجموعة سجلات الأرشيف الحكومي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe set rekaman arsip pemerintah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 政府档案记录集类型
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_type
    - has_scope
    - has_score
    slot_usage:
      has_type:
        equals_string: GovernmentArchiveRecordSetType
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    comments:
    - Applies to national, regional, and local government archival holdings.
    - Used for public accountability and administrative history documentation.
    - 'Preserved from prior description: Record-set type used to classify holdings typically preserved by government archives.'
    keywords:
    - government archives
    - public records
    - administrative holdings
    - public-sector documentation
    examples:
    - value:
        has_type: GovernmentArchiveRecordSetType
        has_scope: Ministerial directives, council minutes, and policy dossiers.
      description: Documentary aggregation from public-sector administrative functions.
    annotations:
      specificity_score: 0.55
      specificity_rationale: Domain record-set typing for public-sector archival holdings.
      custodian_types: '["*"]'
