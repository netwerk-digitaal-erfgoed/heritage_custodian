id: https://nde.nl/ontology/hc/class/DocumentationSource
name: DocumentationSource
title: DocumentationSource
description: A source of documentation (e.g. bibliography, reference).
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
  - ../slots/has_url
classes:
  DocumentationSource:
    class_uri: schema:CreativeWork
    description: >-
      Cited reference providing evidentiary support or attribution for descriptive, technical, or historical information.
    alt_descriptions:
      nl: >-
        Geciteerde verwijzing die bewijsmateriaal of toeschrijving levert voor beschrijvende, technische of historische informatie.
      de: >-
        Zitierte Referenz, die Beweise oder Zuschreibung für beschreibende, technische oder historische Informationen liefert.
      fr: >-
        Référence citée fournissant un soutien probant ou une attribution pour des informations descriptives, techniques ou historiques.
      es: >-
        Referencia citada que proporciona evidencia o atribución para información descriptiva, técnica o histórica.
      ar: >-
        مرجع مقتبس يوفر دليلاً أو نسبة للمعلومات الوصفية أو التقنية أو التاريخية.
      id: >-
        Referensi yang dikutip yang menyediakan dukungan bukti atau atribusi untuk informasi deskriptif, teknis, atau historis.
      zh: >-
        为描述性、技术性或历史信息提供证据支持或归属的引用参考。
    structured_aliases:

      - literal_form: documentatiebron

        predicate: EXACT_SYNONYM

