id: https://nde.nl/ontology/hc/class/DualClassLink
name: DualClassLink
title: Dual Class Link
description: Structured link between paired class concepts.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
imports:
  - linkml:types
classes:
  DualClassLink:
    class_uri: rdfs:Resource
    description: >-
      Relationship node expressing correspondence between organization-level and record-set-level class constructs.
    alt_descriptions:
      nl: >-
        Relatieknooppunt dat overeenkomst uitdrukt tussen organisatieniveau- en recordset-niveau klasseconstructies.
      de: >-
        Beziehungsknoten, der die Entsprechung zwischen Klassifikationskonstrukten auf Organisations- und Bestandsebene ausdrückt.
      fr: >-
        Nœud de relation exprimant la correspondance entre les constructions de classe au niveau de l'organisation et du fonds de documents.
      es: >-
        Nodo de relación que expresa la correspondencia entre construcciones de clase a nivel organizativo y de conjunto de registros.
      ar: >-
        عقدة علاقة تعبر عن المراسلات بين بنيات الفئة على مستوى المنظمة ومستوى مجموعة السجلات.
      id: >-
        Simpul hubungan yang mengekspresikan korespondensi antara konstruksi kelas tingkat organisasi dan tingkat set rekaman.
      zh: >-
        表示组织层面和记录集层面类结构之间对应关系的关系节点。
    structured_aliases:

      - literal_form: DubbeleKlasseLink

        predicate: EXACT_SYNONYM

        in_language: nl

      - literal_form: DoppelteKlassenVerknüpfung

        predicate: EXACT_SYNONYM

        in_language: de

      - literal_form: LienDoubleClasse

        predicate: EXACT_SYNONYM

        in_language: fr

      - literal_form: EnlaceDeClaseDual

        predicate: EXACT_SYNONYM

        in_language: es

      - literal_form: رابط الفئة المزدوجة

        predicate: EXACT_SYNONYM

        in_language: ar

      - literal_form: TautanKelasGanda

        predicate: EXACT_SYNONYM

        in_language: id

      - literal_form: 双类链接

        predicate: EXACT_SYNONYM

        in_language: zh
