id: https://nde.nl/ontology/hc/class/TraditionalProductTypes
name: TraditionalProductTypes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - ./TraditionalProductType
  - linkml:types
classes:
  FoodProduct:
    is_a: TraditionalProductType
    description: Culinary goods prepared with inherited local recipes and methods.
    alt_descriptions:
      nl: Culinaire goederen bereid met overgeleverde lokale recepten en werkwijzen.
      de: Kulinarische Erzeugnisse nach ueberlieferten lokalen Rezepten und Verfahren.
      fr: Produits culinaires prepares selon des recettes et methodes locales transmises.
      es: Bienes culinarios elaborados con recetas y metodos locales heredados.
      ar: سلع طهوية تُحضَّر وفق وصفات وأساليب محلية موروثة.
      id: Produk kuliner yang dibuat dengan resep dan metode lokal turun-temurun.
      zh: 依据地方传承配方与工艺制作的饮食类产物。
    structured_aliases:
    - literal_form: traditioneel voedingsgoed
      in_language: nl
    - literal_form: traditionelles Nahrungsmittelgut
      in_language: de
    - literal_form: produit culinaire traditionnel
      in_language: fr
    - literal_form: bien culinario tradicional
      in_language: es
    - literal_form: منتج غذائي تقليدي
      in_language: ar
    - literal_form: produk kuliner tradisional
      in_language: id
    - literal_form: 传统饮食产物
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    keywords:
    - food
    - culinary heritage
    - traditional recipe
    - local cuisine
    - regional food
  TextileProduct:
    is_a: TraditionalProductType
    description: Fiber-based goods made through inherited weaving, spinning, or dyeing practices.
    alt_descriptions:
      nl: Vezelgebonden goederen gemaakt met overgeleverde weef-, spin- of verfpraktijken.
      de: Faserbasierte Erzeugnisse aus ueberlieferten Web-, Spinn- oder Faerbepraktiken.
      fr: Biens a base de fibres realises selon des pratiques transmises de tissage, filage ou teinture.
      es: Bienes basados en fibras elaborados con practicas heredadas de tejido, hilado o tintura.
      ar: منتجات قائمة على الألياف تُصنع بممارسات موروثة في النسج أو الغزل أو الصباغة.
      id: Produk berbasis serat yang dibuat dengan praktik tenun, pintal, atau pewarnaan turun-temurun.
      zh: 以纤维为基础、采用传承纺织纺纱染整技艺制作的产物。
    structured_aliases:
    - literal_form: traditioneel vezelgoed
      in_language: nl
    - literal_form: traditionelles Fasererzeugnis
      in_language: de
    - literal_form: produit textile traditionnel
      in_language: fr
    - literal_form: bien textil tradicional
      in_language: es
    - literal_form: منتج نسيجي تقليدي
      in_language: ar
    - literal_form: produk serat tradisional
      in_language: id
    - literal_form: 传统纤维工艺产物
      in_language: zh
    broad_mappings:
    - skos:Concept
    keywords:
    - textile
    - weaving
    - fiber craft
    - traditional fabric
    - handmade textile
  CraftProduct:
    is_a: TraditionalProductType
    description: Handmade goods produced with established artisanal techniques and regional styles.
    alt_descriptions:
      nl: Handgemaakte goederen vervaardigd met gevestigde ambachtelijke technieken en regionale stijlen.
      de: Handgefertigte Erzeugnisse mit etablierten handwerklichen Techniken und regionalen Stilen.
      fr: Biens faits main produits par des techniques artisanales etablies et des styles regionaux.
      es: Bienes hechos a mano elaborados con tecnicas artesanales establecidas y estilos regionales.
      ar: منتجات يدوية تُصنع بتقنيات حرفية راسخة وأنماط إقليمية.
      id: Produk buatan tangan yang dihasilkan dengan teknik kerajinan mapan dan gaya regional.
      zh: 采用成熟手工技艺与地域风格制作的手工产物。
    structured_aliases:
    - literal_form: traditioneel ambachtsgoed
      in_language: nl
    - literal_form: traditionelles Handwerkserzeugnis
      in_language: de
    - literal_form: produit artisanal traditionnel
      in_language: fr
    - literal_form: bien artesanal tradicional
      in_language: es
    - literal_form: منتج حرفي تقليدي
      in_language: ar
    - literal_form: produk kerajinan tradisional
      in_language: id
    - literal_form: 传统手工产物
      in_language: zh
    broad_mappings:
    - skos:Concept
    keywords:
    - craft
    - artisanal product
    - handmade goods
    - traditional craft
    - regional style
  BeverageProduct:
    is_a: TraditionalProductType
    description: Drinkable goods produced from customary ingredients and inherited preparation practices.
    alt_descriptions:
      nl: Drinkbare goederen gemaakt van gangbare ingrediënten en overgeleverde bereidingspraktijken.
      de: Trinkbare Erzeugnisse aus ueblichen Zutaten und ueberlieferten Herstellungspraktiken.
      fr: Produits a boire prepares avec des ingredients coutumiers et des pratiques transmises.
      es: Productos bebibles elaborados con ingredientes habituales y practicas heredadas.
      ar: منتجات شرابية تُحضَّر من مكونات متعارف عليها وممارسات إعداد موروثة.
      id: Produk minuman yang dibuat dari bahan lazim dan praktik pengolahan turun-temurun.
      zh: 采用惯常原料与传承工序制作的饮用类产物。
    structured_aliases:
    - literal_form: traditioneel drankgoed
      in_language: nl
    - literal_form: traditionelles Getraenkeerzeugnis
      in_language: de
    - literal_form: produit de boisson traditionnel
      in_language: fr
    - literal_form: bien de bebida tradicional
      in_language: es
    - literal_form: منتج شرابي تقليدي
      in_language: ar
    - literal_form: produk minuman tradisional
      in_language: id
    - literal_form: 传统饮品产物
      in_language: zh
    broad_mappings:
    - skos:Concept
    keywords:
    - beverage
    - traditional drink
    - regional beverage
    - customary preparation
    - heritage drink
