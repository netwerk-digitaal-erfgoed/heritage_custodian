id: https://nde.nl/ontology/hc/class/HeritageForm
name: HeritageForm
title: HeritageForm
description: A form of heritage, such as an intangible cultural heritage practice.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  HeritageForm:
    class_uri: skos:Concept
    description: >-
      Taxonomy concept for classifying heritage manifestations, such as
      tangible, intangible, documentary, or mixed forms.
    alt_descriptions:
      nl: Taxonomieconcept voor classificatie van erfgoedmanifestaties zoals tastbare immateriele documentaire of gemengde vormen.
      de: Taxonomiekonzept zur Klassifikation von Erbeauspraegungen wie materiellen immateriellen dokumentarischen oder gemischten Formen.
      fr: Concept taxonomique pour classifier les manifestations patrimoniales materielles immaterielles documentaires ou mixtes.
      es: Concepto taxonomico para clasificar manifestaciones patrimoniales tangibles intangibles documentales o mixtas.
      ar: مفهوم تصنيفي لتصنيف تمظهرات التراث مثل الأشكال المادية وغير المادية والوثائقية أو المختلطة.
      id: Konsep taksonomi untuk mengklasifikasikan bentuk perwujudan warisan seperti berwujud takbenda dokumenter atau campuran.
      zh: 用于分类遗产呈现形态（如有形、无形、文献型或混合型）的分类学概念。
    structured_aliases:
    - {literal_form: erfgoedvorm, in_language: nl}
    - {literal_form: Erbeform, in_language: de}
    - {literal_form: forme patrimoniale, in_language: fr}
    - {literal_form: forma patrimonial, in_language: es}
    - {literal_form: شكل تراثي, in_language: ar}
    - {literal_form: bentuk warisan, in_language: id}
    - {literal_form: 遗产形态, in_language: zh}
    broad_mappings:
    - skos:Concept
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
