  EmployeeBenefitsExpenses:
    is_a: ExpenseType
    description: Employee benefit costs such as pension and insurance contributions.
    alt_descriptions:
      nl: >-
        Kosten voor werknemersvoordelen zoals pensioen- en verzekeringspremies.
      de: >-
        Kosten fuer Mitarbeiterleistungen wie Renten- und Versicherungsbeitraege.
      fr: >-
        Couts des avantages sociaux comme les cotisations de retraite et d'assurance.
      es: >-
        Costos de beneficios para empleados como contribuciones de pension y seguro.
      ar: >-
        تكاليف مزايا الموظفين مثل معاشات التقاعد ومساهمات التأمين.
      id: >-
        Biaya tunjangan karyawan seperti kontribusi pensiun dan asuransi.
      zh: >-
        员工福利成本，如养老金和保险缴费。
    structured_aliases:
