        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Sozialleistungen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: avantages sociaux
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: beneficios laborales
