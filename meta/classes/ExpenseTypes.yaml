        Kosten gemaakt voor fondsenwerving en donateurontwikkeling.
      de: >-
        Kosten fuer Fundraising und Spenderentwicklung.
      fr: >-
        Couts engages pour la collecte de fonds et le developpement des donateurs.
      es: >-
        Costos incurridos en recaudacion de fondos y desarrollo de donantes.
      ar: >-
        التكاليف المترتبة على جمع التبرعات وأنشطة تطوير المتبرعين.
      id: >-
        Biaya yang dikeluarkan untuk penggalangan dana dan pengembangan donor.
      zh: >-
        用于筹款和捐赠者开发活动的成本。
    structured_aliases:
      - literal_form: wervingskosten
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Fundraising-Kosten
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: frais de collecte
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: gastos de recaudacion
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: تكاليف جمع التبرعات
        predicate: EXACT_SYNONYM
        in_language: ar
