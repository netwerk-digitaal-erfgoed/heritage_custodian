      nl: >-
        Kosten voor onderzoek, experimentatie en innovatie-initiatieven.
      de: >-
        Kosten fuer Forschung, Experimente und Innovationsinitiativen.
      fr: >-
        Couts pour la recherche, l'experimentation et les initiatives d'innovation.
      es: >-
        Costos para investigacion, experimentacion e iniciativas de innovacion.
      ar: >-
        تكاليف البحث والتجريب ومبادرات الابتكار.
      id: >-
