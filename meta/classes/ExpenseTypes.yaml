id: https://nde.nl/ontology/hc/class/ExpenseTypes
name: ExpenseTypes
title: Expense Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./ExpenseType
  - linkml:types
classes:
  PersonnelExpenses:
    is_a: ExpenseType
    description: >-
      Expenditures for employee compensation including salaries, wages,
      benefits, and related personnel costs.
    alt_descriptions:
      nl: >-
        Uitgaven voor werknemersvergoeding inclusief salarissen, lonen, secundaire
        voorwaarden en gerelateerde personeelskosten.
      de: >-
        Ausgaben fuer die Mitarbeiterverguetung einschliesslich Gehaelter, Loehne, Sozialleistungen
        und damit verbundene Personalkosten.
      fr: >-
        Depenses pour la remuneration des employes, y compris les salaires, les avantages
        sociaux et les couts du personnel connexes.
      es: >-
        Gastos de compensacion de empleados, incluyendo salarios, sueldos, beneficios
        y costos de personal relacionados.
      ar: >-
        نفقات تعويض الموظفين بما في ذلك الرواتب والأجور والمزايا وتكاليف الموظفين ذات الصلة.
      id: >-
        Pengeluaran untuk kompensasi karyawan termasuk gaji, upah, tunjangan, dan
        biaya personel terkait.
      zh: >-
        用于员工薪酬的支出，包括薪资、工资、福利和相关人员成本。
    structured_aliases:
      - literal_form: personeelskosten
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Personalkosten
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: frais de personnel
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: gastos de personal
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: تكاليف الموظفين
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: biaya personel
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 人员费用
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - personnel
      - salaries
      - wages
      - benefits
      - employee compensation
      - staffing costs
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
  AdministrativeExpenses:
    is_a: ExpenseType
    description: General management and administrative overhead costs.
    alt_descriptions:
      nl: >-
        Algemene beheers- en administratieve overheadkosten.
      de: >-
        Allgemeine Verwaltungs- und Gemeinkosten.
      fr: >-
        Frais generaux de gestion et d'administration.
      es: >-
        Gastos generales de gestion y administracion.
      ar: >-
        تكاليف الإدارة العامة والنفقات العامة الإدارية.
      id: >-
        Biaya umum manajemen dan administratif.
      zh: >-
        一般管理和行政费用。
    structured_aliases:
      - literal_form: administratieve lasten
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Verwaltungsausgaben
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: frais administratifs
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: gastos administrativos
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: مصاريف إدارية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: biaya administratif
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 行政开支
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - administrative
      - overhead
      - management
      - operations
      - general expenses
      - infrastructure
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
  ProgramExpenses:
    is_a: ExpenseType
    description: Expenses directly tied to mission program delivery.
    alt_descriptions:
      nl: >-
        Kosten die direct verband houden met de uitvoering van missieprogramma's.
      de: >-
        Ausgaben, die direkt mit der Umsetzung von Programmauftraegen verbunden sind.
      fr: >-
        Depenses directement liees a la realisation des programmes de mission.
      es: >-
        Gastos directamente relacionados con la ejecucion de programas misionales.
      ar: >-
        نفقات مرتبطة مباشرة بتنفيذ البرامج المهمة.
      id: >-
        Biaya yang terkait langsung dengan pelaksanaan program misi.
      zh: >-
        直接与使命计划执行相关的费用。
    structured_aliases:
      - literal_form: programmakosten
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Programmkosten
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: frais de programme
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: gastos de programa
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: نفقات البرامج
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: biaya program
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 项目费用
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - program
      - mission
      - service delivery
      - direct costs
      - core activities
      - operational
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
  FundraisingExpenses:
