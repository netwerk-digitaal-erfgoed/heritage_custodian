id: https://nde.nl/ontology/hc/class/SnapshotPath
name: SnapshotPath
title: Snapshot Path
description: >-
  A file path or URI pointing to a stored snapshot (e.g., an HTML snapshot).

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  SnapshotPath:
    class_uri: linkml:Any
    description: >-
      Storage locator pointing to an archived document capture preserved for historical reference.
    alt_descriptions:
      nl: >-
        Opslaglocator die verwijst naar een gearchiveerde documentopname bewaard voor historische naslag.
      de: >-
        Speicherort, der auf ein archiviertes Dokument verweist, das für historische Referenz aufbewahrt wird.
      fr: >-
        Localisateur de stockage pointant vers une capture de document archivée conservée pour référence historique.
      es: >-
        Localizador de almacenamiento que apunta a una captura de documento archivada conservada para referencia histórica.
      ar: >-
        محدد موقع التخزين الذي يشير إلى التقاط مستند مؤرشف محفوظ للمرجعية التاريخية.
      id: >-
        Lokator penyimpanan yang menunjuk ke tangkapan dokumen yang diarsipkan untuk referensi historis.
      zh: >-
        指向为历史参考保存的存档文档捕获的存储定位符。
