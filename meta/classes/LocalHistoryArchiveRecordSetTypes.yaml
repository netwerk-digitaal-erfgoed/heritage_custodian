id: https://nde.nl/ontology/hc/class/LocalHistoryArchiveRecordSetTypes
name: LocalHistoryArchiveRecordSetTypes
title: Local History Archive Record Set Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./LocalHistoryArchiveRecordSetType
  - linkml:types
  - ../slots/has_type
  - ../slots/has_score
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  LocalHistoryFonds:
    is_a: LocalHistoryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A fonds consisting of records documenting the history of a local community, its institutions, and everyday life.
    alt_descriptions:
      nl: >-
        Een fonds met archiefbescheiden die de geschiedenis van een lokale gemeenschap, haar instellingen en het dagelijks leven documenteren.
      de: >-
        Ein Fonds mit Unterlagen zur Dokumentation der Geschichte einer lokalen Gemeinschaft, ihrer Institutionen und des Alltags.
      fr: >-
        Un fonds de documents sur l'histoire d'une communaute locale, de ses institutions et de la vie quotidienne.
      es: >-
        Un fondo de documentos que registra la historia de una comunidad local, sus instituciones y la vida cotidiana.
      ar: >-
        صندوق من السجلات التي توثق تاريخ المجتمع المحلي ومؤسساته والحياة اليومية.
      id: >-
        Sebuah fonds catatan yang mendokumentasikan sejarah komunitas lokal, institusinya, dan kehidupan sehari-hari.
      zh: >-
        记录地方社区、其机构与日常生活历史的记录全宗。
    structured_aliases:
    - literal_form: lokaal historisch fonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Lokalgeschichtsfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds d'histoire locale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de historia local
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق التاريخ المحلي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds sejarah lokal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方史全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:LocalHistoryArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by LocalHistoryArchive custodians. Inverse of rico:isOrWasHolderOf."
    keywords:
    - local history
    - community history
    - everyday life
    - local institutions
    - municipal heritage
  CommunityPhotographCollection:
    is_a: LocalHistoryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A collection of photographs and visual materials documenting local people, places, and events.
    alt_descriptions:
      nl: >-
        Een collectie foto's en beeldmateriaal die lokale mensen, plaatsen en gebeurtenissen documenteert.
      de: >-
        Eine Sammlung von Fotografien und visuellen Materialien zur Dokumentation lokaler Personen, Orte und Ereignisse.
      fr: >-
        Une collection de photographies et de supports visuels documentant des personnes, des lieux et des evenements locaux.
      es: >-
        Una coleccion de fotografias y materiales visuales que documenta personas, lugares y eventos locales.
      ar: >-
        مجموعة من الصور والمواد البصرية التي توثق أشخاصاً وأماكن وأحداثاً محلية.
      id: >-
        Koleksi foto dan materi visual yang mendokumentasikan orang, tempat, dan peristiwa lokal.
      zh: >-
        记录本地人物、地点与事件的照片及视觉材料收藏。
    structured_aliases:
    - literal_form: lokale fotocollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: lokale Fotosammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de photographies locales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de fotografias locales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة صور محلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi foto lokal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方照片收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:LocalHistoryArchive"
      has_note:
        equals_string: "This RecordSetType is typically held by LocalHistoryArchive custodians. Inverse of rico:isOrWasHolderOf."
    keywords:
    - community photographs
