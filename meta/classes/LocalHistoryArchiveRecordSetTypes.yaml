    - visual materials
    - people places events
    - documentary photography
  LocalNewspaperCollection:
    is_a: LocalHistoryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      A collection of local newspaper issues preserved as evidence of community news, opinion, and public life.
    alt_descriptions:
      nl: >-
        Een collectie lokale krantenafleveringen, bewaard als bron voor nieuws, opinie en openbaar leven.
      de: >-
        Eine Sammlung lokaler Zeitungsnummern, bewahrt als Quelle fuer Nachrichten, Meinung und oeffentliches Leben.
      fr: >-
        Une collection de numeros de journaux locaux conservee comme source d'information, d'opinion et de vie publique.
      es: >-
        Una coleccion de ejemplares de periodicos locales conservada como fuente de noticias, opinion y vida publica.
      ar: >-
        مجموعة من أعداد الصحف المحلية محفوظة كمصدر للأخبار والرأي والحياة العامة.
      id: >-
        Koleksi edisi surat kabar lokal yang dipelihara sebagai sumber berita, opini, dan kehidupan publik.
      zh: >-
        作为社区新闻、舆论与公共生活证据而保存的地方报纸期刊收藏。
    structured_aliases:
    - literal_form: lokale krantencollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: lokale Zeitungssammlung
      predicate: EXACT_SYNONYM
