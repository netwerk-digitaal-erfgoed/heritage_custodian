      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方报纸收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
