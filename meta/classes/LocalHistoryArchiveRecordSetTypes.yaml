    - literal_form: collection de journaux locaux
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de periodicos locales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة الصحف المحلية
      predicate: EXACT_SYNONYM
