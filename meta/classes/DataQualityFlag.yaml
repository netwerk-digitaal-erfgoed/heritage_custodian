id: https://nde.nl/ontology/hc/class/DataQualityFlag
name: DataQualityFlag
title: DataQualityFlag
description: Flag indicating a data quality issue or status.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
classes:
  DataQualityFlag:
    class_uri: skos:Concept
    description: >-
      Controlled marker indicating validation anomalies, confidence caveats, or
      review outcomes attached to a record.
    alt_descriptions:
      nl: Gecontroleerde markering die validatieafwijkingen betrouwbaarheidskanttekeningen of beoordelingsuitkomsten aan een record koppelt.
      de: Kontrollierte Markierung fuer Validierungsabweichungen Vertrauenshinweise oder Pruefergebnisse an einem Datensatz.
      fr: Marqueur controle indiquant anomalies de validation reserves de confiance ou resultats de revue associes a un enregistrement.
      es: Marcador controlado que indica anomalias de validacion advertencias de confianza o resultados de revision en un registro.
      ar: وسم مضبوط يشير إلى شذوذات التحقق أو ملاحظات الثقة أو نتائج المراجعة المرتبطة بالسجل.
      id: Penanda terkendali yang menunjukkan anomali validasi catatan kepercayaan atau hasil tinjauan pada rekaman.
      zh: 用于标记记录中校验异常、可信度提示或复核结果的受控标志。
    structured_aliases:
    - {literal_form: kwaliteitsvlag, in_language: nl}
    - {literal_form: Qualitaetskennzeichen, in_language: de}
    - {literal_form: indicateur de qualite, in_language: fr}
    - {literal_form: indicador de calidad, in_language: es}
    - {literal_form: مؤشر جودة البيانات, in_language: ar}
    - {literal_form: penanda kualitas data, in_language: id}
    - {literal_form: 数据质量标记, in_language: zh}
    broad_mappings:
    - skos:Concept
    keywords:
    - validation warning
    - review marker
    - confidence signal
    slots:
    - has_label
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
