id: https://nde.nl/ontology/hc/class/ConservationPlan
name: ConservationPlan
title: Conservation Plan
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  ConservationPlan:
    class_uri: crm:E29_Design_or_Procedure
    description: >-
      Planned treatment strategy specifying intended interventions, sequence, and constraints for preservation work.
    alt_descriptions:
      nl: Geplande behandelingsstrategie met beoogde ingrepen, volgorde en randvoorwaarden voor conserveringswerk.
      de: Geplante Behandlungsstrategie mit vorgesehenen Eingriffen, Reihenfolge und Rahmenbedingungen fuer Erhaltungsarbeiten.
      fr: Strategie de traitement planifiee precisant interventions, sequence et contraintes pour les travaux de conservation.
      es: Estrategia de tratamiento planificada que especifica intervenciones, secuencia y restricciones para la conservacion.
      ar: استراتيجية معالجة مخططة تحدد التدخلات المقصودة وتسلسلها وقيود أعمال الحفظ.
      id: Strategi perawatan terencana yang menetapkan intervensi, urutan, dan batasan pekerjaan pelestarian.
      zh: 规定保护工作干预步骤、顺序与约束条件的计划性处理策略。
    exact_mappings:
    - crm:E29_Design_or_Procedure
    slots:
    - has_label
    - has_description
