id: https://nde.nl/ontology/hc/class/HeritageScore
name: HeritageScore
title: Heritage Score
description: A quantitative score representing heritage value or relevance. MIGRATED from general_heritage_score slot per Rule 53. Follows schema:Rating.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_score
default_prefix: hc
classes:
  HeritageScore:
    class_uri: schema:Rating
    description: >-
      Numeric score representing assessed heritage value, significance, or
      priority in an evaluation context.
    alt_descriptions:
      nl: Numerieke score die beoordeelde erfgoedwaarde betekenis of prioriteit in een evaluatiecontext weergeeft.
      de: Numerischer Wert zur Darstellung von bewerteter Erbe-Bedeutung Signifikanz oder Prioritaet im Bewertungskontext.
      fr: Score numerique representant la valeur l importance ou la priorite patrimoniale evaluee dans un contexte d evaluation.
      es: Puntuacion numerica que representa valor importancia o prioridad patrimonial evaluada en un contexto de evaluacion.
      ar: درجة رقمية تمثل قيمة التراث أو أهميته أو أولويته ضمن سياق تقييم.
      id: Skor numerik yang merepresentasikan nilai signifikansi atau prioritas warisan dalam konteks evaluasi.
      zh: 在评估情境中表示遗产价值、重要性或优先级的数值评分。
    structured_aliases:
    - {literal_form: erfgoedscore, in_language: nl}
    - {literal_form: Erbewert, in_language: de}
    - {literal_form: score patrimonial, in_language: fr}
    - {literal_form: puntuacion patrimonial, in_language: es}
    - {literal_form: درجة التراث, in_language: ar}
    - {literal_form: skor warisan, in_language: id}
    - {literal_form: 遗产评分, in_language: zh}
    slots:
    - has_score
    - has_description
    slot_usage:
      has_score:
        range: float
        required: true
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
