    is_a: CustodianType
    class_uri: skos:Concept
    description: >-
      Public repository institution at the French departement level,
      responsible for stewardship of regional administrative and civil records.
    alt_descriptions:
      nl: Openbare archiefinstelling op Frans departementsniveau voor beheer van regionale bestuurs- en burgerlijke documenten.
      de: Oeffentliche Archivinstitution auf franzoesischer Departementsebene zur Bewahrung regionaler Verwaltungs- und Personenstandsunterlagen.
      fr: Institution archivistique publique au niveau departemental francais chargee de la conservation des archives administratives et civiles.
      es: Institucion archivistica publica a nivel departamental frances responsable de registros administrativos y civiles regionales.
      ar: مؤسسة أرشيف عامة على مستوى المقاطعة في فرنسا مسؤولة عن حفظ السجلات الإدارية والمدنية الإقليمية.
      id: Lembaga arsip publik tingkat departemen di Prancis yang bertanggung jawab atas pengelolaan arsip administratif dan sipil regional.
      zh: 法国省级公共档案机构，负责区域行政与民事档案保管。
