      Preserved from prior description (commit 86b9dceb):

      "Departmental archives in France (archives d\xE9partementales).\n\n**Wikidata**: Q2860456 (archives d\xE9partementales)\n\n**\u26A0\uFE0F GEOGRAPHIC RESTRICTION: FRANCE ONLY**\n\nThis type applies ONLY to French d\xE9partement-level archives. For archives\nat comparable administrative levels in other countries, use:\n- DistrictArchiveGermany (Q130757255) for Kreisarchiv\n- ProvincialArchive (Q5403345) for provincial archives\n- RegionalArchive (Q27032392) for other regional archives\n\n**DEFINITION**:\n\nArchives d\xE9partementales are public archives at the d\xE9partement level in France.\nThey are the primary repositories for:\n- Pre-revolutionary records (ancien r\xE9gime documents)\n- Civil registration (\xE9tat civil) from 1792\n- Notarial archives\n- Cadastral/land records\n- Local government records\n- Regional ecclesiastical records\n\n**FRENCH TERRITORIAL ARCHIVE HIERARCHY**:\n\n```\nArchives nationales (national)\n  \u2514\u2500\u2500 Archives r\xE9gionales (regional)\n\
    annotations:
