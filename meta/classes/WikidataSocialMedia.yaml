id: https://nde.nl/ontology/hc/classes/WikidataSocialMedia
name: WikidataSocialMedia
title: Wikidata Social Media Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  foaf: http://xmlns.com/foaf/0.1/
  dcterms: http://purl.org/dc/terms/
imports:
  - linkml:types
classes:
  WikidataSocialMedia:
    description: >-
      Platform account identifiers and audience metrics for public networking
      channels.
    alt_descriptions:
      nl: >-
        Sociale media-identifiers en statistieken uit Wikidata inclusief platformspecifieke
        gebruikersnamen voor Instagram, LinkedIn, Twitter/X, Facebook, YouTube en volgersaantallen (P8687).
      de: >-
        Social-Media-Kennungen und Metriken aus Wikidata einschließlich plattformspezifischer
        Benutzernamen für Instagram, LinkedIn, Twitter/X, Facebook, YouTube und Follower-Zahlen (P8687).
      fr: >-
        Identifiants et métriques de réseaux sociaux extraits de Wikidata incluant les noms d'utilisateur
        spécifiques aux plateformes pour Instagram, LinkedIn, Twitter/X, Facebook, YouTube et les nombres d'abonnés (P8687).
      es: >-
        Identificadores y métricas de redes sociales extraídos de Wikidata incluyendo nombres de usuario
        específicos de plataforma para Instagram, LinkedIn, Twitter/X, Facebook, YouTube y conteos de seguidores (P8687).
      ar: >-
        معرفات ومقاييس وسائل التواصل الاجتماعي المستخرجة من ويكي بيانات تشمل أسماء مستخدمين
        خاصة بالمنصات لإنستغرام ولينكدإن وتويتر/إكس وفيسبوك ويوتيوب وأعداد المتابعين (P8687).
      id: >-
        Pengidentifikasi dan metrik media sosial yang diekstrak dari Wikidata termasuk nama pengguna
        spesifik platform untuk Instagram, LinkedIn, Twitter/X, Facebook, YouTube, dan jumlah pengikut (P8687).
      zh: >-
        从维基数据提取的社交媒体标识符和指标，包括Instagram、LinkedIn、Twitter/X、
        Facebook、YouTube的平台特定用户名和粉丝数(P8687)。
    close_mappings:
      - schema:ProfilePage
    related_mappings:
      - foaf:OnlineAccount
      - prov:Entity
      - schema:Organization
    slots: []
    comments:
      - Social media profiles are online accounts as defined by FOAF
      - Supports multiple platform accounts per organization
    keywords:
      - wikidata
      - social media
      - instagram
      - twitter
      - facebook
      - linkedin
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for social media data extraction
      custodian_types: "['*']"
      wikidata_property_ids: '["P8687"]'
    structured_aliases:
      - literal_form: wikidata-social media
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Wikidata-Social Media
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: réseaux sociaux Wikidata
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: redes sociales Wikidata
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: وسائل تواصل ويكي بيانات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: media sosial Wikidata
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 维基数据社交媒体
        predicate: EXACT_SYNONYM
        in_language: zh
