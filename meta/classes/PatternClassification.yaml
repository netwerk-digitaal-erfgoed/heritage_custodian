id: https://nde.nl/ontology/hc/classes/PatternClassification
name: PatternClassification
title: PatternClassification
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  skos: http://www.w3.org/2004/02/skos/core#
  dqv: http://www.w3.org/ns/dqv#
imports:
- linkml:types
# default_range: string
classes:
  PatternClassification:
    description: Record describing how an entity was automatically classified using a pattern-based method.
    alt_descriptions:
      nl: Registratie van hoe een entiteit automatisch is geclassificeerd met een patroon-gebaseerde methode.
      de: Eintrag der beschreibt wie eine Entitaet mittels musterbasierter Methode automatisch klassifiziert wurde.
      fr: Enregistrement de la facon dont une entite a ete classee automatiquement par une methode basee sur des motifs.
      es: Registro de como una entidad fue clasificada automaticamente mediante un metodo basado en patrones.
      ar: سجل يصف كيفية تصنيف كيان تلقائيا باستخدام طريقة تعتمد على الأنماط.
      id: Rekaman yang menjelaskan bagaimana entitas diklasifikasikan otomatis menggunakan metode berbasis pola.
      zh: 描述实体如何通过模式方法被自动分类的记录。
    structured_aliases:
    - {literal_form: patroonclassificatie, in_language: nl}
    - {literal_form: Musterklassifikation, in_language: de}
    - {literal_form: classification par motif, in_language: fr}
    - {literal_form: clasificacion por patron, in_language: es}
    - {literal_form: تصنيف بالنمط, in_language: ar}
    - {literal_form: klasifikasi pola, in_language: id}
    - {literal_form: 模式分类, in_language: zh}
    class_uri: skos:Concept
    close_mappings:
    - dqv:QualityMeasurement
    related_mappings:
    - prov:Activity
    - prov:Entity
    annotations:
      classification_method_examples: "regex, string_contains, prefix_match"
      confidence_semantics: Confidence score for the classification result
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_method
