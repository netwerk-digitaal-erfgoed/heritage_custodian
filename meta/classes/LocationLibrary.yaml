id: https://w3id.org/nde/ontology/LocationLibrary
name: LocationLibrary
title: Location Library Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_type
- ../slots/has_score
classes:
  LocationLibrary:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Specialized facility maintaining searchable references to geographic sites
      used in film, television, and photography production.
    alt_descriptions:
      nl: >-
        Gespecialiseerde faciliteit die doorzoekbare verwijzingen naar geografische locaties
        bijhoudt die gebruikt worden in film-, televisie- en fotografieproductie.
      de: >-
        Spezialisierte Einrichtung, die durchsuchbare Referenzen auf geografische Standorte
        verwaltet, die in Film-, Fernseh- und Fotografieproduktion verwendet werden.
      fr: >-
        Installation spécialisée maintenant des références consultables vers des sites
        géographiques utilisés dans la production cinématographique, télévisuelle et photographique.
      es: >-
        Instalación especializada que mantiene referencias buscables a sitios geográficos
        utilizados en producción de cine, televisión y fotografía.
      ar: >-
        منشأة متخصصة تحتفظ بمراجع قابلة للبحث عن المواقع الجغرافية المستخدمة في إنتاج الأفلام والتلفزيون والتصوير الفوتوغرافي.
      id: >-
        Fasilitas khusus yang memelihara referensi yang dapat dicari ke situs geografis
        yang digunakan dalam produksi film, televisi, dan fotografi.
      zh: >-
        维护用于电影、电视和摄影制作的地理位置可搜索引用的专门设施。
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_type
    - has_score
    annotations:
      subject_domain: film and photography production
      specificity_score: 0.45
      specificity_rationale: Specialized institutional type combining location documentation and discovery services.
      custodian_types: '["*"]'
    comments:
    - 'Preserved from prior description: Institution type maintaining searchable location references for film and photography production.'
