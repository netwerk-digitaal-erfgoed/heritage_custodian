      fr: Espace de traitement specialise pour neutraliser les materiaux papier acides et ralentir leur deterioration chimique.
      es: Espacio de tratamiento especializado para neutralizar materiales de papel acidos y frenar su deterioro quimico.
      ar: مساحة معالجة متخصصة لمعادلة المواد الورقية الحمضية وإبطاء تدهورها الكيميائي.
      id: Ruang perawatan khusus untuk menetralkan material kertas asam dan memperlambat kerusakan kimia.
      zh: 用于中和酸性纸质材料并减缓化学劣化的专业处理空间。
    structured_aliases:
    - {literal_form: ontzuringsruimte, in_language: nl}
    - {literal_form: Entsaeuerungsraum, in_language: de}
    - {literal_form: atelier de desacidification, in_language: fr}
    - {literal_form: sala de desacidificacion, in_language: es}
    - {literal_form: مرفق إزالة الحموضة, in_language: ar}
    - {literal_form: fasilitas deasidifikasi, in_language: id}
    - {literal_form: 去酸处理室, in_language: zh}
