id: https://nde.nl/ontology/hc/class/DeacidificationFacility
name: DeacidificationFacility
title: DeacidificationFacility
description: A facility for deacidifying paper materials.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
