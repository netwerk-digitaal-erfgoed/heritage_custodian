classes:
  DeacidificationFacility:
    class_uri: schema:Room
    description: >-
      Specialized treatment space equipped for neutralizing acidic paper-based
      materials to slow chemical deterioration.
    alt_descriptions:
      nl: Gespecialiseerde behandelingsruimte voor het neutraliseren van zure papieren materialen om chemische degradatie te vertragen.
