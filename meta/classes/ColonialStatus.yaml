id: https://nde.nl/ontology/hc/class/ColonialStatus
name: colonial_status_class
title: Colonial Status Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
- ../slots/temporal_extent
classes:
  ColonialStatus:
    class_uri: hc:ColonialStatus
    description: >-
      Historical-status marker expressing jurisdictional dependency relationships for territories over defined periods.
    alt_descriptions:
      nl: Historische statusaanduiding die jurisdictie-afhankelijkheidsrelaties van gebieden over bepaalde perioden weergeeft.
      de: Historischer Statusmarker zur Darstellung jurisdiktionaler Abhängigkeitsverhältnisse von Gebieten über definierte Zeiträume.
      fr: Marqueur de statut historique exprimant les relations de dépendance juridictionnelle des territoires sur des périodes définies.
      es: Marcador de estatus historico que expresa relaciones de dependencia jurisdiccional de territorios en periodos definidos.
      ar: وسم حالة تاريخية يعبّر عن علاقات التبعية القضائية للأقاليم عبر فترات زمنية محددة.
      id: Penanda status historis yang menyatakan relasi ketergantungan yuridiksional wilayah sepanjang periode tertentu.
      zh: 用于表达领土在特定时期司法从属关系的历史状态标记。
    close_mappings:
    - dcterms:spatial
    - schema:containedInPlace
    related_mappings:
    - skos:Concept
    slots:
    - has_label
    - identified_by
    - temporal_extent
