classes:
  CustodianCollection:
    is_a: ReconstructedEntity
    class_uri: crm:E78_Curated_Holding
    description: >-
      Curated aggregation of heritage materials governed by preservation policies and maintained for scholarly access.
    alt_descriptions:
      nl: >-
        Gecureerde aggregatie van erfgoedmateriaal die wordt beheerd volgens bewaarbeleid en toegankelijk wordt gehouden voor wetenschappelijk onderzoek.
      de: >-
        Kuratierte Aggregation von Kulturgütern, die durch Erhaltungsrichtlinien verwaltet und für wissenschaftlichen Zugang bereitgestellt wird.
      fr: >-
        Agrégation conservée de matériaux patrimoniaux régis par des politiques de préservation et maintenus pour l'accès savant.
      es: >-
        Agregación curada de materiales patrimoniales regidos por políticas de preservación y mantenidos para acceso académico.
      ar: >-
        تجميع منظم للمواد التراثية تخضع لسياسات الحفظ وتُدار للوصول الأكاديمي.
      id: >-
        Agregasi terkurasi bahan warisan yang dikelola oleh kebijakan pelestarian dan dipertahankan untuk akses ilmiah.
      zh: >-
        由保存政策管理并为学术访问维护的遗产材料策展集合。
