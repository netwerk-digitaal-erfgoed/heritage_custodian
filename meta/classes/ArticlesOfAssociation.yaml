imports:
  - linkml:types
  - ../enums/RecordsLifecycleStageEnum
  - ../slots/has_description
  - ../slots/has_format
  - ../slots/has_score
  - ../slots/has_status
  - ../slots/has_title
  - ../slots/has_type
  - ../slots/has_url
  - ../slots/has_version
  - ../slots/current
  - ../slots/amended_through
  - ../slots/archived_in
  - ../slots/derive_from
  - ../slots/effective_at
  - ../slots/generated_by
