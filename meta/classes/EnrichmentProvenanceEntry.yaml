# default_range: string
classes:
  EnrichmentProvenanceEntry:
    description: >-
      Atomic provenance record for one enrichment result, capturing derivation,
      integrity hash, and verification timestamp.
    class_uri: prov:Entity
    alt_descriptions:
      nl: Atomair provenance-item voor een verrijkingsresultaat met afleiding integriteitshash en verificatiemoment.
      de: Atomares Provenienzobjekt fuer ein Anreicherungsergebnis mit Ableitung Integritaetshash und Verifizierungszeitpunkt.
      fr: Enregistrement de provenance atomique pour un resultat d enrichissement avec derivation empreinte d integrite et horodatage de verification.
      es: Registro atomico de procedencia para un resultado de enriquecimiento con derivacion hash de integridad y marca temporal de verificacion.
      ar: سجل إسناد ذري لنتيجة إثراء واحدة يتضمن الاشتقاق وتجزئة السلامة والطابع الزمني للتحقق.
      id: Catatan provenance atomik untuk satu hasil pengayaan yang memuat derivasi hash integritas dan cap waktu verifikasi.
      zh: 针对单条富化结果的原子级溯源记录，包含派生关系、完整性哈希与校验时间戳。
    structured_aliases:
    - {literal_form: verrijkingsprovenance-item, in_language: nl}
    - {literal_form: Anreicherungsprovenienz-Eintrag, in_language: de}
    - {literal_form: entree de provenance d enrichissement, in_language: fr}
    - {literal_form: entrada de procedencia de enriquecimiento, in_language: es}
    - {literal_form: مدخل إسناد الإثراء, in_language: ar}
    - {literal_form: entri provenance pengayaan, in_language: id}
    - {literal_form: 富化溯源条目, in_language: zh}
    broad_mappings:
    - prov:Entity
    close_mappings:
    - prov:Derivation
    related_mappings:
    - prov:Activity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - encoded_as
