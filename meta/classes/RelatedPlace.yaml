id: https://nde.nl/ontology/hc/classes/RelatedPlace
name: RelatedPlace
title: RelatedPlace
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
classes:
  RelatedPlace:
    description: >-
      A related place from Google Maps representing nearby or associated locations
      with ratings and review information.
    alt_descriptions:
      nl: Een gerelateerde plaats van Google Maps met beoordelingsgegevens.
      de: Ein verwandter Ort von Google Maps mit Bewertungsinformationen.
    structured_aliases:
    - literal_form: gerelateerde plaats
      in_language: nl
    - literal_form: verwandter Ort
      in_language: de
    - literal_form: lieu connexe
      in_language: fr
    comments:
    - Represents a physical place with associated review/rating metadata from Google Maps.
    class_uri: schema:Place
    close_mappings:
    - schema:LocalBusiness
    related_mappings:
    - schema:Review
    broad_mappings:
    - schema:Place
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_name
