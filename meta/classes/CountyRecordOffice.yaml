classes:
  CountyRecordOffice:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Local-government archival institution in the United Kingdom responsible for
      preserving and providing access to county-level administrative records.
    alt_descriptions:
      nl: >-
        Lokale overheidsarchiefinstelling in het Verenigd Koninkrijk die verantwoordelijk is voor
        het behouden en ontsluiten van administratieve archieven op county-niveau.
      de: >-
        Lokale Regierungsarchivinstitution im Vereinigten Königreich, die für die Bewahrung
        und Bereitstellung von Verwaltungsunterlagen auf Grafschaftsebene verantwortlich ist.
      fr: >-
        Institution archivistique locale au Royaume-Uni responsable de la conservation
        et de l'accès aux documents administratifs au niveau du comté.
      es: >-
        Institución archivística de gobierno local en el Reino Unido responsable de preservar
        y proporcionar acceso a registros administrativos a nivel de condado.
      ar: >-
        مؤسسة أرشيف حكومية محلية في المملكة المتحدة مسؤولة عن الحفاظ على
        السجلات الإدارية على مستوى المقاطعة وتوفير الوصول إليها.
      id: >-
        Lembaga arsip pemerintah lokal di Britania Raya yang bertanggung jawab untuk melestarikan
        dan menyediakan akses ke catatan administratif tingkat kabupaten.
      zh: >-
        负责保存和提供县级行政记录访问的英国地方政府档案机构。
    structured_aliases:
    - literal_form: county-archiefdienst
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Grafschaftsarchivamt
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: bureau d'archives de comté
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: oficina de registros del condado
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مكتب سجلات المقاطعة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kantor catatan kabupaten
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 郡档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    - schema:ArchiveOrganization
    related_mappings:
    - wd:Q5177943
    slots:
    - has_type
    - branch_of
    - has_score
    slot_usage:
      has_type:
        equals_string: ArchiveOrganizationType
    comments:
    - UK-specific local government archive type.
    - Holds parish records, quarter sessions, and local administrative documents.
    - 'Preserved from prior description: Local-government archive institution in the United Kingdom responsible for county-level records stewardship.'
    keywords:
    - UK archives
    - county records
    - local government
    - public records
