  NanIsilEnrichment:
    description: >-
      Enrichment record documenting a successful match against the Dutch National Archives ISIL identifier registry.
    alt_descriptions:
      nl: >-
        Verrijkingsrecord dat een succesvolle match documenteert tegen het Nationaal Archief ISIL-identificatieregister.
      de: >-
        Anreicherungsdatensatz, der eine erfolgreiche Übereinstimmung mit dem ISIL-Identifikatorenregister des Niederländischen Nationalarchivs dokumentiert.
      fr: >-
        Enregistrement d'enrichissement documentant une correspondance réussie avec le registre d'identifiants ISIL des Archives nationales néerlandaises.
      es: >-
        Registro de enriquecimiento que documenta una coincidencia exitosa con el registro de identificadores ISIL del Archivo Nacional Holandés.
      ar: >-
        سجل إثراء يوثق تطابقًا ناجحًا مع سجل معرفات ISIL للأرشيف الوطني الهولندي.
      id: >-
        Catatan pengayaan yang mendokumentasikan kecocokan berhasil dengan registri pengenal ISIL Arsip Nasional Belanda.
      zh: >-
        记录与荷兰国家档案馆ISIL标识符注册表成功匹配的丰富记录。
