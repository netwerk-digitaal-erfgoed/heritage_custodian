id: https://nde.nl/ontology/hc/class/ProgramType
name: ProgramType
title: Program Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  ProgramType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract classification for categorizing organized activities by their primary purpose,
      target audience, or institutional function.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor het categoriseren van georganiseerde activiteiten
        naar hun primaire doel, doelgroep of institutionele functie.
      de: >-
        Abstrakte Klassifikation zur Kategorisierung organisierter Aktivitäten
        nach ihrem Hauptzweck, ihrer Zielgruppe oder institutionellen Funktion.
      fr: >-
        Classification abstraite pour catégoriser les activités organisées
        selon leur objectif principal, leur public cible ou leur fonction institutionnelle.
      es: >-
        Clasificación abstracta para categorizar actividades organizadas
        según su propósito principal, público objetivo o función institucional.
      ar: >-
        تصنيف مجرد لتصنيف الأنشطة المنظمة حسب غرضها الرئيسي
        أو جمهورها المستهدف أو وظيفتها المؤسسية.
      id: >-
        Klasifikasi abstrak untuk mengkategorikan aktivitas terorganisir
        berdasarkan tujuan utama, audiens target, atau fungsi institusional.
      zh: >-
        用于按主要目的、目标受众或机构职能对有组织活动进行分类的抽象分类。
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
    keywords:
      - program type
      - activity classification
      - institutional program
    structured_aliases:
      - literal_form: programmatype
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Programmtyp
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: type de programme
        predicate: EXACT_SYNONYM
        in_language: fr
    comments:
      - Categories include VOLUNTEER, EDUCATIONAL, OUTREACH, INTERNSHIP, FELLOWSHIP.
    slots:
      - identified_by
      - has_label
      - has_description
    annotations:
      specificity_score: '0.45'
      specificity_rationale: Moderately specific - program types common in institutions.
      custodian_types: "['*']"
    examples:
      - value:
          identified_by: https://nde.nl/program-type/volunteer
          has_label: Volunteer Program
        description: Volunteer program type classification
