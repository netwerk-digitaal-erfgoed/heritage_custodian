id: https://nde.nl/ontology/hc/class/PublicArchiveRecordSetTypes
name: PublicArchiveRecordSetTypes
title: PublicArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./PublicArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  PublicRecordsFonds:
    is_a: PublicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation generated by public-sector
      bodies in the exercise of statutory responsibilities.
    alt_descriptions:
      nl: Fondsgericht recordsettype voor archieven gevormd door publieke organen.
      de: Fondsorientierter Recordset-Typ fuer Unterlagen oeffentlicher Stellen.
      fr: Type de jeu de documents oriente fonds pour les archives de personnes morales publiques.
      es: Tipo de conjunto documental orientado a fondo para archivos producidos por organismos públicos.
      ar: نوع مجموعة سجلات موجّه بنمط الفوندس لسجلات الهيئات العامة.
      id: Tipe set rekaman berorientasi fonds untuk arsip yang dibuat oleh badan publik.
      zh: 面向公共机构形成档案的全宗型记录集类型。
    structured_aliases:
    - literal_form: overheidsfonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Fonds oeffentliche Stelle
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds public
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo público
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: فوندس جهة عامة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds badan publik
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公共机构全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - PublicArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:PublicRecordsFonds
      has_custodian:
        equals_string: hc:PublicArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by PublicArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Captures provenance from state, regional, and municipal public authorities.
    - Supports accountability and legal-rights evidence retrieval.
    - 'Preserved from prior description: Fonds-oriented record set type for records created by public bodies.'
    keywords:
    - public authority output
    - statutory function
    - provenance aggregation
    - civic accountability
    examples:
    - value:
        has_type: hc:PublicRecordsFonds
        has_custodian: hc:PublicArchive
        has_note: Municipal decrees, permit registers, and regulatory files.
      description: Public-sector documentation grouped by originating authority
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'

  CivicDocumentationCollection:
    is_a: PublicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body about civic life and community initiatives,
      gathered across programs, events, and participatory activities.
    alt_descriptions:
      nl: Collectiegericht recordsettype voor burgerlijke en gemeenschapsdocumentatie.
      de: Sammlungsorientierter Recordset-Typ fuer buergerliche und gemeinschaftliche Dokumentation.
      fr: Type de jeu de documents oriente collection pour la documentation civique et communautaire.
      es: Tipo de conjunto documental orientado a colección para documentación cívica y comunitaria.
      ar: نوع مجموعة سجلات موجّه بنمط المجموعات لتوثيق مدني ومجتمعي.
      id: Tipe set rekaman berorientasi koleksi untuk dokumentasi sipil dan komunitas.
      zh: 面向公民与社区文档的集合型记录集类型。
    structured_aliases:
    - literal_form: collectie burgerdocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung Buergerdokumentation
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection civique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección cívica
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة توثيق مدني
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi dokumentasi sipil
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公民文档集合
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - PublicArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:CivicDocumentationCollection
      has_custodian:
        equals_string: hc:PublicArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by PublicArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Brings together materials documenting civil participation and community action.
    - Useful where provenance spans multiple local programs or initiatives.
    - 'Preserved from prior description: Collection-oriented record set type for civic and community documentation.'
    keywords:
    - community initiatives
    - civic participation
    - assembled documentation
    - local society
    examples:
    - value:
        has_type: hc:CivicDocumentationCollection
        has_custodian: hc:PublicArchive
        has_note: Community council newsletters, neighborhood project files, and outreach materials.
      description: Multi-source civic documentation assembled for community history access

  AdministrativeCorrespondenceSeries:
    is_a: PublicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence of official communications exchanged during
      routine administrative decision-making and service delivery.
    alt_descriptions:
      nl: Reeksgericht recordsettype voor officiële correspondentie.
      de: Serienorientierter Recordset-Typ fuer amtliche Korrespondenz.
      fr: Type de jeu de documents oriente serie pour la correspondance officielle.
      es: Tipo de conjunto documental orientado a serie para correspondencia oficial.
      ar: نوع مجموعة سجلات موجّه بنمط السلاسل للمراسلات الرسمية.
      id: Tipe set rekaman berorientasi seri untuk korespondensi resmi.
      zh: 面向官方往来函件的系列型记录集类型。
    structured_aliases:
    - literal_form: reeks correspondentie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Serie Korrespondenz
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie de correspondance
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de correspondencia
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة مراسلات رسمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri korespondensi resmi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 官方函件系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - PublicArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:AdministrativeCorrespondenceSeries
      has_custodian:
        equals_string: hc:PublicArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by PublicArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Represents recurring communication workflows between offices, agencies, and citizens.
    - Supports timeline reconstruction for policy execution and case handling.
    - 'Preserved from prior description: Series-oriented record set type for official correspondence.'
    keywords:
    - official communication
    - administrative workflow
    - case handling
    - service delivery
    examples:
    - value:
        has_type: hc:AdministrativeCorrespondenceSeries
        has_custodian: hc:PublicArchive
        has_note: Permit inquiry letters, internal memos, and response chains.
      description: Recurring official communication sequence tied to administrative procedures
