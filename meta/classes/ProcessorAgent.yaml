id: https://nde.nl/ontology/hc/class/ProcessorAgent
name: ProcessorAgent
title: ProcessorAgent
description: >-
  Agent responsible for processing archival materials.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_name
classes:
  ProcessorAgent:
    class_uri: prov:Agent
    description: >-
      Entity that performs processing operations on archival or cultural heritage materials,
      including digitization, cataloguing, conservation treatment, or data transformation.
    alt_descriptions:
      nl: >-
        Entiteit die verwerkingshandelingen uitvoert op archief- of erfgoedmateriaal,
        zoals digitalisering, catalogiseren, conservering of gegevenstransformatie.
      de: >-
        Entität, die Verarbeitungsoperationen an Archiv- oder Kulturgutmaterialien durchführt,
        einschließlich Digitalisierung, Katalogisierung, Konservierung oder Datentransformation.
      fr: >-
        Entité qui effectue des opérations de traitement sur des matériaux d'archives ou de patrimoine culturel,
        y compris la numérisation, le catalogage, le traitement de conservation ou la transformation de données.
      es: >-
        Entidad que realiza operaciones de procesamiento en materiales de archivo o patrimonio cultural,
        incluyendo digitalización, catalogación, tratamiento de conservación o transformación de datos.
      ar: >-
        كيان يقوم بعمليات المعالجة على المواد الأرشيفية أو التراثية،
        بما في ذلك الرقمنة والفهرسة والحفظ وتحويل البيانات.
      id: >-
        Entitas yang melakukan operasi pemrosesan pada material arsip atau warisan budaya,
        termasuk digitalisasi, katalogisasi, perawatan konservasi, atau transformasi data.
      zh: >-
        对档案或文化遗产材料执行处理操作的实体，
        包括数字化、编目、保护处理或数据转换。
    broad_mappings:
      - prov:Agent
      - schema:Thing
    keywords:
      - agent
      - processing
      - archival processing
      - data transformation
    examples:
      - value: ProcessorAgent
        description: A digitization specialist processing photographic negatives
    structured_aliases:
      - literal_form: verwerkingsagent
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Verarbeitungsagent
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: agent de traitement
        predicate: EXACT_SYNONYM
        in_language: fr
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
      - has_name
