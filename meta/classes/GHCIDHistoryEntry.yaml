  - linkml:types
classes:
  GHCIDHistoryEntry:
    class_uri: prov:Entity
    description: >-
      Temporal snapshot capturing identifier lifecycle state including validity period, change rationale, and provenance metadata.
    alt_descriptions:
      nl: >-
        Tijdelijke momentopname die de levenscyclusstatus van een identifier vastlegt, inclusief geldigheidsperiode, veranderingsreden en herkomst-metadata.
      de: >-
        Zeitliche Momentaufnahme, die den Kennungs-Lebenszyklusstatus einschließlich Gültigkeitsdauer, Änderungsbegründung und Herkunftsmetadaten erfasst.
      fr: >-
        Instantané temporel capturant l'état du cycle de vie de l'identifiant, y compris la période de validité, le motif du changement et les métadonnées de provenance.
      es: >-
        Instantánea temporal que captura el estado del ciclo de vida del identificador, incluyendo el período de validez, el motivo del cambio y los metadatos de procedencia.
      ar: >-
        لقطة زمنية تلتقط حالة دورة حياة المعرف بما في ذلك فترة الصلاحية وسبب التغيير والبيانات الوصفية للمصدر.
      id: >-
        Snapshot temporal yang menangkap status siklus hidup pengidentifikasi termasuk periode validitas, alasan perubahan, dan metadata asal-usul.
      zh: >-
        捕获标识符生命周期状态的时间快照，包括有效期、变更原因和来源元数据。
