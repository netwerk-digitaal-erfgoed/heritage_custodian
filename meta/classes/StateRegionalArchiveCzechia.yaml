classes:
  StateRegionalArchiveCzechia:
    description: >-
      A state regional archive in the Czech Republic, responsible for preserving
      and providing access to historical records at the regional (kraj) level.
    alt_descriptions:
      cs: Státní oblastní archiv v České republice, zodpovědný za uchování a zpřístupnění historických záznamů na krajské úrovni.
      de: Ein staatliches Regionalarchiv in Tschechien, zuständig für die Erhaltung und Bereitstellung historischer Unterlagen auf regionaler Ebene.
      fr: Archives régionales d'État en République tchèque, responsables de la préservation et de l'accès aux documents historiques au niveau régional.
    structured_aliases:
    - literal_form: Státní oblastní archiv
      in_language: cs
    - literal_form: Staatliches Regionalarchiv
      in_language: de
    - literal_form: archives régionales d'État
      in_language: fr
    comments:
    - Supervises district archives within their region.
    - Primary archival authority for regional government records.
    - Czech-specific institution type.
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - related_to
    - identified_by
    close_mappings:
