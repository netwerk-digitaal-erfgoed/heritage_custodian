id: https://nde.nl/ontology/hc/class/MailingListArchiveRecordSetType
name: MailingListArchiveRecordSetType
title: Mailing List Archive Record Set Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_type
- ../slots/has_scope
- ../slots/has_score
classes:
  MailingListArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Classification concept for aggregated discussion-message corpora captured
      from subscription-based electronic correspondence channels.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor geaggregeerde discussieberichtencorpora,
        vastgelegd uit abonnementsgebaseerde elektronische
        correspondentiekanalen.
      de: >-
        Klassifikationskonzept für aggregierte Diskussionsnachrichtenkorpora,
        erfasst aus abonnementsbasierten elektronischen
        Korrespondenzkanälen.
      fr: >-
        Concept de classification pour des corpus agrégés de messages de
        discussion capturés depuis des canaux de correspondance électronique par
        abonnement.
      es: >-
        Concepto de clasificación para corpus agregados de mensajes de debate
        capturados de canales de correspondencia electrónica por suscripción.
      ar: >-
        مفهوم تصنيف لمجاميع رسائل نقاش مجمعة ملتقطة من قنوات مراسلة
        إلكترونية قائمة على الاشتراك.
      id: >-
        Konsep klasifikasi untuk korpus pesan diskusi teragregasi yang
        ditangkap dari saluran korespondensi elektronik berbasis langganan.
      zh: >-
        用于分类从订阅式电子通信渠道采集的讨论消息聚合语料的分类概念。
    slots:
    - has_type
    - has_scope
    - has_score
    structured_aliases:
    - literal_form: type voor discussieberichtencorpus
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ für Diskussionsnachrichtenkorpus
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de corpus de messages de discussion
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de corpus de mensajes de debate
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع مجموعة رسائل نقاش
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe korpus pesan diskusi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 讨论消息语料类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Groups archived electronic correspondence streams at documentary aggregation level.
    - Useful for preserving institutional deliberation and policy-development traces.
    - 'Preserved from prior description: Record-set type for classifying mailing-list archive holdings.'
    keywords:
    - electronic correspondence
    - discussion corpus
    - subscription channel
    - documentary aggregation
    examples:
    - value:
        has_type: MailingListArchiveRecordSetType
        has_scope: Curatorial policy list messages from 2012-2020.
      description: Aggregated correspondence corpus from a subscription channel.
    annotations:
      specificity_score: 0.5
      specificity_rationale: Record-set typing for structured email-discussion archive corpora.
      custodian_types: '["*"]'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
