        عقدة تصنيفية لتجميعات المخطوطات التحريرية وسجلات الإنتاج والمراسلات من أرشيفات دور النشر.
      id: >-
        Simpul taksonomi untuk agregasi naskah redaksional, catatan produksi, dan korespondensi
        dari arsip perusahaan penerbitan.
      zh: >-
        用于聚合来自出版企业档案的编辑手稿、生产记录和通信的分类法节点。
