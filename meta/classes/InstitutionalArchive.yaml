classes:
  InstitutionalArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Repository preserving records generated or accumulated by its parent organization in the course of administrative operations.
    alt_descriptions:
      nl: >-
        Bewaarplaats die archieven bewaart die door de bovenliggende organisatie zijn gegenereerd of verzameld in de loop van administratieve activiteiten.
      de: >-
        Repository, das Unterlagen bewahrt, die von der übergeordneten Organisation im Rahmen administrativer Vorgänge erstellt oder gesammelt wurden.
      fr: >-
        Dépôt préservant les archives générées ou accumulées par son organisation parente dans le cadre d'opérations administratives.
      es: >-
        Repositorio que preserva registros generados o acumulados por su organización matriz en el curso de operaciones administrativas.
      ar: >-
        مستودع يحافظ على السجلات التي أنشأتها أو جمعتها المنظمة الأم في سياق العمليات الإدارية.
      id: >-
        Repositori yang melestarikan catatan yang dihasilkan atau dikumpulkan oleh organisasi induknya dalam operasi administratif.
      zh: >-
        保存上级组织在行政运作过程中生成或积累的记录的存储库。
