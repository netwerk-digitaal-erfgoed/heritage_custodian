id: https://nde.nl/ontology/hc/class/Experience
name: Experience
title: Experience Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_description
- ../slots/has_score
classes:
  Experience:
    class_uri: skos:Concept
    description: >-
      Documented professional or personal background entry representing qualifications, employment history, or skill development.
    alt_descriptions:
      nl: >-
        Gedocumenteerde professionele of persoonlijke achtergrondvermelding die kwalificaties, arbeidsverleden of vaardigheidsontwikkeling vertegenwoordigt.
      de: >-
        Dokumentierter professioneller oder persönlicher Hintergrundeintrag, der Qualifikationen, Beschäftigungsverlauf oder Kompetenzentwicklung darstellt.
      fr: >-
        Entrée de contexte professionnel ou personnel documentée représentant les qualifications, l'historique d'emploi ou le développement des compétences.
      es: >-
        Entrada de antecedentes profesional o personal documentada que representa calificaciones, historial laboral o desarrollo de habilidades.
      ar: >-
        إدخال خلفية مهنية أو شخصية موثقة تمثل المؤهلات أو تاريخ التوظيف أو تطوير المهارات.
      id: >-
        Entri latar belakang profesional atau pribadi yang terdokumentasi yang mewakili kualifikasi, riwayat pekerjaan, atau pengembangan keterampilan.
      zh: >-
        代表资格、就业历史或技能发展的记录在案的专业或个人背景条目。
    structured_aliases:
    - literal_form: ervaring
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Erfahrung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: expérience
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: experiencia
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: خبرة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pengalaman
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 经历
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    - has_score
    comments:
    - Used in staff profiles, biographical records, and qualification documentation.
    - May include employment, education, volunteer work, or skill certifications.
    - 'Preserved from prior description: Documented background entry used in profiles, qualifications, or personal history.'
    keywords:
    - professional background
    - employment history
    - qualification record
    - skill development
    examples:
    - value:
        has_label: Senior Curator 2015-2024
        has_description: Curatorial leadership at Rijksmuseum.
      description: Professional experience entry
    annotations:
      specificity_score: 0.2
      specificity_rationale: General profile concept used across domains.
      custodian_types: '["*"]'
