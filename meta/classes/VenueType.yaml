id: https://nde.nl/ontology/hc/class/VenueType
name: VenueType
title: Venue Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  VenueType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Classification of physical or virtual locations where heritage events, exhibitions, and activities take place.
    alt_descriptions:
      nl: >-
        Classificatie van fysieke of virtuele locaties waar erfgoedevenementen, tentoonstellingen en activiteiten plaatsvinden.
      de: >-
        Klassifizierung physischer oder virtueller Orte, an denen Heritage-Veranstaltungen, Ausstellungen und Aktivitäten stattfinden.
      fr: >-
        Classification des lieux physiques ou virtuels où se déroulent événements patrimoniaux, expositions et activités.
      es: >-
        Clasificación de ubicaciones físicas o virtuales donde tienen lugar eventos patrimoniales, exposiciones y actividades.
      ar: >-
        تصنيف المواقع المادية أو الافتراضية التي تقام فيها فعاليات التراث والمعارض والأنشطة.
      id: >-
        Klasifikasi lokasi fisik atau virtual tempat acara warisan, pameran, dan kegiatan berlangsung.
      zh: >-
        遗产活动、展览和项目举办的物理或虚拟场所分类。
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
    keywords:
      - venue
      - location type
      - event space
      - exhibition venue
    slots:
      - identified_by
      - has_label
      - has_description
    annotations:
      specificity_score: 0.1
      custodian_types: "['*']"
