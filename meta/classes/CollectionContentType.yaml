id: https://nde.nl/ontology/hc/class/CollectionContentType
name: CollectionContentType
title: Collection Content Type (Base)
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
classes:
  CollectionContentType:
    abstract: true
    class_uri: skos:Concept
    description: >-
      Abstract taxonomy node defining material-category semantics used in holding profiles.
    alt_descriptions:
      nl: Abstracte taxonomieknoop die semantiek van materiaalcategorieen voor holdingsprofielen definieert.
      de: Abstrakter Taxonomieknoten zur Definition der Materialkategorie-Semantik in Bestandsprofilen.
      fr: Nœud taxonomique abstrait définissant la sémantique des catégories de matériaux dans les profils de fonds.
      es: Nodo taxonomico abstracto que define la semantica de categorias de materiales en perfiles de fondos.
      ar: عقدة تصنيفية مجردة تحدد دلالات فئات المواد المستخدمة في ملفات المقتنيات.
      id: Simpul taksonomi abstrak yang mendefinisikan semantik kategori material pada profil kepemilikan.
      zh: 定义馆藏画像中材料类别语义的抽象分类节点。
    broad_mappings:
    - skos:Concept
    close_mappings:
    - dcterms:type
    slots:
    - has_label
