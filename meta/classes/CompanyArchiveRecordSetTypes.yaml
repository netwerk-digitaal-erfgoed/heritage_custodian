id: https://nde.nl/ontology/hc/class/CompanyArchiveRecordSetTypes
name: CompanyArchiveRecordSetTypes
title: Company Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./CompanyArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
- ../slots/has_scope
classes:
  CorporateGovernanceFonds:
    is_a: CompanyArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a fonds for board, shareholder,
      executive, and constitutional governance evidence.
    alt_descriptions:
      nl: Documentaire aggregatie als fonds voor bestuur- aandeelhouders- directie- en statutaire governancebronnen.
      de: Dokumentarische Aggregation als Fonds fuer Vorstands- Aktionaers- Exekutiv- und Satzungsunterlagen.
      fr: Agregation documentaire organisee en fonds pour les preuves de gouvernance des organes dirigeants actionnaires et direction.
      es: Agregacion documental organizada como fondo para evidencias de gobierno corporativo de consejo accionistas y direccion.
      ar: تجميع وثائقي منظم كرصيد لأدلة حوكمة مجلس الإدارة والمساهمين والإدارة التنفيذية.
      id: Agregasi dokumenter dalam bentuk fonds untuk bukti tata kelola dewan pemegang saham eksekutif dan konstitusi perusahaan.
      zh: 以全宗方式组织的董事会、股东、管理层与章程治理证据文献聚合体。
    structured_aliases:
    - {literal_form: bedrijfsbestuurfonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds Unternehmensfuehrung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds de gouvernance d entreprise, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de gobierno corporativo, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: رصيد حوكمة الشركة, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds tata kelola perusahaan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 企业治理全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    keywords:
    - corporate governance
    - board records
    - shareholder documentation
    - executive decisions
    - fonds
    - constitutional records
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: CorporateGovernanceFonds
      has_scope:
        equals_string: '["board minutes", "shareholder records", "executive decisions", "corporate bylaws"]'

  ProductDevelopmentCollection:
    is_a: CompanyArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation grouped as a collection for research,
      engineering, design, testing, and prototype evidence.
    alt_descriptions:
      nl: Documentaire aggregatie als collectie voor onderzoek engineering ontwerp testen en prototypebewijs.
      de: Dokumentarische Aggregation als Sammlung fuer Forschung Engineering Design Tests und Prototypnachweise.
      fr: Agregation documentaire regroupee en collection pour preuves de recherche ingenierie conception essais et prototypes.
      es: Agregacion documental agrupada como coleccion para evidencia de investigacion ingenieria diseno pruebas y prototipos.
      ar: تجميع وثائقي مصنف كمجموعة لأدلة البحث والهندسة والتصميم والاختبارات والنماذج الأولية.
      id: Agregasi dokumenter yang dikelompokkan sebagai koleksi untuk bukti riset rekayasa desain pengujian dan prototipe.
      zh: 作为馆藏单元编组的研发、工程、设计、测试与原型证据文献聚合体。
    structured_aliases:
    - {literal_form: productontwikkelingscollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Produktentwicklungssammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de developpement de produits, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de desarrollo de productos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة تطوير المنتجات, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi pengembangan produk, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 产品开发文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    keywords:
    - product development
    - research and development
    - technical documentation
    - patent records
    - design files
    - prototype documentation
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: ProductDevelopmentCollection
      has_scope:
        equals_string: '["R&D files", "technical drawings", "patent files", "test reports", "prototype documentation"]'

  MarketingArchiveCollection:
    is_a: CompanyArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation grouped as a collection for campaigns, brand
      assets, promotional media, and market communication evidence.
    alt_descriptions:
      nl: Documentaire aggregatie als collectie voor campagnes merkassets promotiemedia en marktcommunicatie.
      de: Dokumentarische Aggregation als Sammlung fuer Kampagnen Markenmaterialien Werbemedien und Marktkommunikation.
      fr: Agregation documentaire regroupee en collection pour campagnes actifs de marque medias promotionnels et communication de marche.
      es: Agregacion documental agrupada como coleccion para campanas activos de marca medios promocionales y comunicacion de mercado.
      ar: تجميع وثائقي مصنف كمجموعة للحملات وأصول العلامة والمواد الترويجية واتصالات السوق.
      id: Agregasi dokumenter yang dikelompokkan sebagai koleksi untuk kampanye aset merek media promosi dan komunikasi pasar.
      zh: 作为馆藏单元编组的营销活动、品牌资产、宣传媒介与市场传播文献聚合体。
    structured_aliases:
    - {literal_form: marketingarchiefcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Marketingarchivsammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection d archives marketing, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de archivo de marketing, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أرشيف تسويقي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip pemasaran, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 市场传播文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    keywords:
    - marketing archives
    - brand assets
    - advertising campaigns
    - promotional materials
    - market communication
    - brand guidelines
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: MarketingArchiveCollection
      has_scope:
        equals_string: '["advertising campaigns", "brand guidelines", "packaging", "promotional materials"]'

  PersonnelRecordsSeries:
    is_a: CompanyArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a series for employment lifecycle,
      payroll administration, and workplace governance records.
    alt_descriptions:
      nl: Documentaire aggregatie als serie voor arbeidsloopbaan salarisadministratie en werkgerelateerde governancebronnen.
      de: Dokumentarische Aggregation als Serie fuer Beschaeftigungszyklus Lohnadministration und arbeitsbezogene Governance-Unterlagen.
      fr: Agregation documentaire organisee en serie pour le cycle d emploi la paie et les dossiers de gouvernance du travail.
      es: Agregacion documental organizada como serie para ciclo laboral administracion de nomina y registros de gobernanza del trabajo.
      ar: تجميع وثائقي منظم كسلسلة لسجل دورة التوظيف وإدارة الرواتب وحوكمة بيئة العمل.
      id: Agregasi dokumenter yang disusun sebagai seri untuk siklus ketenagakerjaan administrasi penggajian dan tata kelola ketenagakerjaan.
      zh: 以系列方式组织的雇佣周期、薪酬管理与劳动治理文献聚合体。
    structured_aliases:
    - {literal_form: personeelsdossierreeks, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Personalaktenserie, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de dossiers du personnel, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de expedientes de personal, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات الموظفين, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri arsip personalia, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 人事档案序列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    keywords:
    - personnel records
    - employment files
    - payroll administration
    - human resources
    - workplace governance
    - staff documentation
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: PersonnelRecordsSeries
      has_note:
        equals_string: Subject to privacy law and retention controls; access is commonly restricted for recent records.

  CorporatePublicationsSeries:
    is_a: CompanyArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a series for annual reporting,
      internal communication, and public-facing corporate publications.
    alt_descriptions:
      nl: Documentaire aggregatie als serie voor jaarverslagen interne communicatie en externe bedrijfspublicaties.
      de: Dokumentarische Aggregation als Serie fuer Jahresberichte interne Kommunikation und oeffentliche Unternehmenspublikationen.
      fr: Agregation documentaire organisee en serie pour rapports annuels communication interne et publications d entreprise a diffusion externe.
      es: Agregacion documental organizada como serie para informes anuales comunicacion interna y publicaciones corporativas externas.
      ar: تجميع وثائقي منظم كسلسلة للتقارير السنوية والاتصال الداخلي والمنشورات المؤسسية الموجهة للجمهور.
      id: Agregasi dokumenter yang disusun sebagai seri untuk laporan tahunan komunikasi internal dan publikasi korporat eksternal.
      zh: 以系列方式组织的年度报告、内部沟通与对外企业出版物文献聚合体。
    structured_aliases:
    - {literal_form: bedrijfspublicatiereeks, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie von Unternehmenspublikationen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de publications d entreprise, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de publicaciones corporativas, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة منشورات الشركة, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri publikasi korporat, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 企业出版物序列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: CorporatePublicationsSeries
      has_scope:
        equals_string: '["annual reports", "house magazines", "newsletters", "corporate histories"]'
