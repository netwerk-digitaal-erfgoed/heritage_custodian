id: https://nde.nl/ontology/hc/class/ProductCategories
name: ProductCategories
title: ProductCategories
description: >-
  Container for product categories.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/

default_prefix: hc

imports:
  - linkml:types
classes:
  ProductCategories:
    class_uri: hc:ProductCategories
    description: >-
      Collection or enumeration of product classifications used to organize
      and categorize items in a catalog, inventory, or e-commerce system.
    alt_descriptions:
      nl: >-
        Verzameling of opsomming van productclassificaties gebruikt om artikelen
        te organiseren en categoriseren in een catalogus, voorraad of e-commercesysteem.
      de: >-
        Sammlung oder Aufzählung von Produktklassifikationen, die zur Organisation
        und Kategorisierung von Artikeln in einem Katalog, Bestand oder E-Commerce-System verwendet werden.
      fr: >-
        Collection ou énumération de classifications de produits utilisées pour organiser
        et catégoriser des articles dans un catalogue, un inventaire ou un système e-commerce.
      es: >-
        Colección o enumeración de clasificaciones de productos utilizadas para organizar
        y categorizar artículos en un catálogo, inventario o sistema de comercio electrónico.
      ar: >-
        مجموعة أو تعداد لتصنيفات المنتجات المستخدمة لتنظيم وتصنيف العناصر
        في فهرس أو مخزون أو نظام تجارة إلكترونية.
      id: >-
        Koleksi atau enumerasi klasifikasi produk yang digunakan untuk mengorganisasi
        dan mengkategorikan item dalam katalog, inventaris, atau sistem e-commerce.
      zh: >-
        产品分类的集合或枚举，用于在目录、库存或电子商务系统中组织和分类项目。
    broad_mappings:
      - skos:Collection
      - schema:ItemList
    keywords:
      - product categories
      - classification
      - taxonomy
      - catalog
    examples:
      - value:
          categories:
            - paintings
            - sculptures
            - photographs
        description: Collection of fine art product categories
    structured_aliases:
      - literal_form: productcategorieën
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Produktkategorien
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: catégories de produits
        predicate: EXACT_SYNONYM
        in_language: fr
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    tree_root: true
