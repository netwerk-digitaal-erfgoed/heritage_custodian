id: https://nde.nl/ontology/hc/class/HandsOnFacility
name: HandsOnFacility
title: HandsOnFacility
description: A facility providing hands-on experiences.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
classes:
  HandsOnFacility:
    class_uri: schema:LocationFeatureSpecification
    description: >-
      Amenity feature indicating availability of interactive, practical learning
      or handling spaces for visitors and participants.
    alt_descriptions:
      nl: Voorzieningskenmerk dat aangeeft dat interactieve en praktische leer- of werkruimten beschikbaar zijn.
      de: Ausstattungsmerkmal fuer verfuegbare interaktive und praktische Lern- oder Arbeitsraeume.
      fr: Caracteristique d equipement indiquant la disponibilite d espaces interactifs et pratiques pour apprentissage ou manipulation.
      es: Caracteristica de equipamiento que indica disponibilidad de espacios interactivos y practicos de aprendizaje o manipulacion.
      ar: سمة مرفقية تشير إلى توفر مساحات تفاعلية وعملية للتعلم أو التعامل المباشر.
      id: Fitur amenitas yang menunjukkan ketersediaan ruang interaktif dan praktik untuk pembelajaran atau penanganan langsung.
      zh: 表示是否提供互动式实践学习或操作空间的设施特征。
    structured_aliases:
    - {literal_form: doe-faciliteit, in_language: nl}
    - {literal_form: Mitmachbereich, in_language: de}
    - {literal_form: espace pratique interactif, in_language: fr}
    - {literal_form: espacio practico interactivo, in_language: es}
    - {literal_form: مرفق تفاعلي عملي, in_language: ar}
    - {literal_form: fasilitas praktik interaktif, in_language: id}
    - {literal_form: 互动实践设施, in_language: zh}
    broad_mappings:
    - schema:LocationFeatureSpecification
    slots:
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
