id: https://nde.nl/ontology/hc/classes/MergeNote
name: MergeNote
title: MergeNote
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_source
classes:
  MergeNote:
    description: >-
      Provenance note documenting deduplication or merge decisions between
      records, including source and rationale.
    class_uri: prov:Entity
    alt_descriptions:
      nl: Provenantienotitie die deduplicatie- of mergebeslissingen tussen records documenteert inclusief bron en onderbouwing.
      de: Proveniznotiz zur Dokumentation von Deduplizierungs- oder Zusammenfuehrungsentscheidungen zwischen Datensaetzen inklusive Quelle und Begruendung.
      fr: Note de provenance documentant les decisions de dedoublonnage ou de fusion entre notices avec source et justification.
      es: Nota de procedencia que documenta decisiones de deduplicacion o fusion entre registros con fuente y justificacion.
      ar: ملاحظة إسناد توثّق قرارات إزالة التكرار أو الدمج بين السجلات، بما في ذلك المصدر والمبرر.
      id: Catatan provenance yang mendokumentasikan keputusan deduplikasi atau penggabungan antar rekaman termasuk sumber dan alasannya.
      zh: 记录去重或合并决策的溯源说明，包含来源与理由。
    structured_aliases:
    - {literal_form: merge-provenantienotitie, in_language: nl}
    - {literal_form: Zusammenfuehrungsnotiz, in_language: de}
    - {literal_form: note de fusion, in_language: fr}
    - {literal_form: nota de fusion de registros, in_language: es}
    - {literal_form: ملاحظة دمج سجلات, in_language: ar}
    - {literal_form: catatan penggabungan rekaman, in_language: id}
    - {literal_form: 记录合并说明, in_language: zh}
    broad_mappings:
    - prov:Entity
    close_mappings:
    - skos:note
    related_mappings:
    - prov:Activity
    - prov:Derivation
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    slots:
    - has_source
