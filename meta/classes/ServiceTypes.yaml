id: https://nde.nl/ontology/hc/class/ServiceTypes
name: ServiceTypes
title: Service Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./ServiceType
- linkml:types
classes:
  VisitorService:
    is_a: ServiceType
    description: Public-facing services for visitors (tours, audio guides).
    alt_descriptions:
      nl: Openbare diensten voor bezoekers (rondleidingen, audiotours).
      de: Öffentliche Dienste für Besucher (Führungen, Audioguides).
    structured_aliases:
    - literal_form: bezoekersdienst
      in_language: nl
    - literal_form: Besucher-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
  ResearchService:
    is_a: ServiceType
    description: Research support services (reference, consultations).
    alt_descriptions:
      nl: Onderzoeks-ondersteunende diensten (referentie, consultaties).
      de: Forschungsunterstützende Dienste (Referenz, Beratungen).
    structured_aliases:
    - literal_form: onderzoeks-dienst
      in_language: nl
    - literal_form: Forschungs-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
  ConservationService:
    is_a: ServiceType
    description: Conservation and restoration services.
    alt_descriptions:
      nl: Conserverings- en restauratiediensten.
      de: Konservierungs- und Restaurierungsdienste.
    structured_aliases:
    - literal_form: conserverings-dienst
      in_language: nl
    - literal_form: Konservierungs-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
  ReproductionService:
    is_a: ServiceType
    description: Reproduction and digitization services.
    alt_descriptions:
      nl: Reproductie- en digitaliseringsdiensten.
      de: Reproduktions- und Digitalisierungsdienste.
    structured_aliases:
    - literal_form: reproductie-dienst
      in_language: nl
    - literal_form: Reproduktions-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
  EducationalService:
    is_a: ServiceType
    description: Educational and learning services.
    alt_descriptions:
      nl: Educatieve en leer-diensten.
      de: Bildungs- und Lern-Dienstleistungen.
    structured_aliases:
    - literal_form: educatieve dienst
      in_language: nl
    - literal_form: Bildungs-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:EducationalOccupationalProgram
    - schema:Service
  LoanService:
    is_a: ServiceType
    description: Loan services for exhibitions or research.
    alt_descriptions:
      nl: Bruikleen-diensten voor tentoonstellingen of onderzoek.
      de: Leih-Dienstleistungen für Ausstellungen oder Forschung.
    structured_aliases:
    - literal_form: bruikleen-dienst
      in_language: nl
    - literal_form: Leih-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
  AccessibilityService:
    is_a: ServiceType
    description: Accessibility services for visitors with disabilities.
    alt_descriptions:
      nl: Toegankelijkheidsdiensten voor bezoekers met een beperking.
      de: Barrierefreiheits-Dienstleistungen für Besucher mit Behinderungen.
    structured_aliases:
    - literal_form: toegankelijkheids-dienst
      in_language: nl
    - literal_form: Barrierefreiheits-Dienstleistung
      in_language: de
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
  CommercialService:
    is_a: ServiceType
    description: >-
      Revenue-generating commercial activities offered by heritage institutions.
    alt_descriptions:
      nl: Inkomstengenererende commerciële activiteiten van erfgoedinstellingen.
      de: Einnahmengenerierende kommerzielle Aktivitäten von Heritage-Institutionen.
    structured_aliases:
    - literal_form: commerciële dienst
      in_language: nl
    - literal_form: Kommerzielle Dienstleistung
      in_language: de
    comments:
    - Includes admissions, retail, food/beverage, events, experiences, licensing, tourism packages, digital sales.
    - Created per slot_fixes.yaml migration for commercial_activity (2026-01-18).
    broad_mappings:
    - schema:Service
    - crm:E7_Activity
