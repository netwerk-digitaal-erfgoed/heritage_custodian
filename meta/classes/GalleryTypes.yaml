  - ./GalleryType
  - linkml:types
classes:
  CommercialGallery:
    is_a: GalleryType
    class_uri: hc:CommercialGallery
    description: >-
      Exhibition venue operating as a business enterprise combining artwork display with sales and artist representation services.
    alt_descriptions:
      nl: >-
        Tentoonstellingsruimte die als bedrijfsonderneming werkt en kunstpresentatie combineert met verkoop- en kunstenaarsvertegenwoordiging.
      de: >-
        Ausstellungsraum, der als gewerbliches Unternehmen Kunstpräsentation mit Verkaufs- und Künstlervertretungsdiensten verbindet.
      fr: >-
        Lieu d'exposition fonctionnant comme une entreprise commerciale combinant la présentation d'œuvres avec des services de vente et de représentation d'artistes.
      es: >-
        Espacio de exposición que opera como empresa comercial combinando la presentación de obras con servicios de venta y representación de artistas.
      ar: >-
        مساحة عرض تعمل كمشروع تجاري يجمع بين عرض الأعمال الفنية وخدمات البيع والتمثيل الفني.
      id: >-
        Ruang pameran yang beroperasi sebagai perusahaan bisnis yang menggabungkan presentasi karya seni dengan layanan penjualan dan perwakilan seniman.
      zh: >-
        作为商业企业运营的展览场所，将艺术品展示与销售和艺术家代理服务相结合。
