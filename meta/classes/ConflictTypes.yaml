id: https://nde.nl/ontology/hc/class/ConflictTypes
name: ConflictTypes
title: Conflict Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
  - ./ConflictType
  - linkml:types
classes:
  ArmedConflict:
    is_a: ConflictType
    class_uri: hc:ArmedConflict
    description: >-
      Crisis category for wars and hostilities involving organized armed force.
    alt_descriptions:
      nl: Crisiscategorie voor oorlogen en vijandelijkheden met georganiseerd gewapend geweld.
      de: Krisenkategorie fuer Kriege und Feindseligkeiten mit organisierter bewaffneter Gewalt.
      fr: Categorie de crise pour les guerres et hostilites impliquant une force armee organisee.
      es: Categoria de crisis para guerras y hostilidades con uso organizado de fuerza armada.
      ar: فئة أزمات للحروب والأعمال العدائية التي تنطوي على قوة مسلحة منظمة.
      id: Kategori krisis untuk perang dan permusuhan yang melibatkan kekuatan bersenjata terorganisasi.
      zh: 用于涉及有组织武装力量之战争与敌对行动的危机类别。
    structured_aliases:
      - literal_form: gewapend conflict
        in_language: nl
      - literal_form: bewaffneter Konflikt
        in_language: de
      - literal_form: conflit arme
        in_language: fr
      - literal_form: conflicto armado
        in_language: es
      - literal_form: نزاع مسلح
        in_language: ar
      - literal_form: konflik bersenjata
        in_language: id
      - literal_form: 武装冲突
        in_language: zh
    close_mappings:
      - wd:Q350604
    broad_mappings:
      - skos:Concept

  NaturalDisaster:
    is_a: ConflictType
    class_uri: hc:NaturalDisaster
    description: >-
      Crisis category for geophysical, meteorological, or climatological events
      causing widespread heritage damage.
    alt_descriptions:
      nl: Crisiscategorie voor geofysische, meteorologische of klimatologische gebeurtenissen met grootschalige erfgoedschade.
      de: Krisenkategorie fuer geophysikalische, meteorologische oder klimatologische Ereignisse mit weitreichenden Schaeden am Kulturerbe.
      fr: Categorie de crise pour les evenements geophysiques, meteorologiques ou climatologiques causant des dommages patrimoniaux etendus.
      es: Categoria de crisis para eventos geofisicos, meteorologicos o climatologicos que causan danos patrimoniales generalizados.
      ar: فئة أزمات للأحداث الجيوفيزيائية أو الجوية أو المناخية التي تسبب أضرارا واسعة للتراث.
      id: Kategori krisis untuk peristiwa geofisika, meteorologi, atau klimatologi yang menyebabkan kerusakan warisan secara luas.
      zh: 用于造成大范围遗产损害的地球物理、气象或气候事件类别。
    structured_aliases:
      - literal_form: natuurramp
        in_language: nl
      - literal_form: Naturkatastrophe
        in_language: de
      - literal_form: catastrophe naturelle
        in_language: fr
      - literal_form: desastre natural
        in_language: es
      - literal_form: كارثة طبيعية
        in_language: ar
      - literal_form: bencana alam
        in_language: id
      - literal_form: 自然灾害
        in_language: zh
    close_mappings:
      - wd:Q8065
    broad_mappings:
      - skos:Concept

  CivilUnrest:
    is_a: ConflictType
    class_uri: hc:CivilUnrest
    description: >-
      Crisis category for public disorder, riots, and large-scale civic turmoil
      affecting heritage safety and access.
    alt_descriptions:
      nl: Crisiscategorie voor openbare wanorde, rellen en grootschalige maatschappelijke onrust met impact op erfgoedveiligheid en toegang.
      de: Krisenkategorie fuer oeffentliche Unruhen, Ausschreitungen und grossflaechige gesellschaftliche Turbulenzen mit Auswirkungen auf Sicherheit und Zugang.
      fr: Categorie de crise pour les troubles publics, emeutes et agitations civiles de grande ampleur affectant la securite et l'acces au patrimoine.
      es: Categoria de crisis para desorden publico, disturbios y agitacion civica a gran escala que afecta seguridad y acceso al patrimonio.
      ar: فئة أزمات للاضطرابات العامة وأعمال الشغب والتوتر المدني واسع النطاق المؤثر على سلامة التراث وإتاحته.
      id: Kategori krisis untuk kerusuhan publik, huru-hara, dan gejolak sipil skala besar yang memengaruhi keselamatan serta akses warisan.
      zh: 用于影响遗产安全与可及性的公共骚乱、暴动及大规模社会动荡类别。
    structured_aliases:
      - literal_form: maatschappelijke onrust
        in_language: nl
      - literal_form: zivile Unruhen
        in_language: de
      - literal_form: troubles civils
        in_language: fr
      - literal_form: disturbios civiles
        in_language: es
      - literal_form: اضطرابات مدنية
        in_language: ar
      - literal_form: kerusuhan sipil
        in_language: id
      - literal_form: 社会骚乱
        in_language: zh
    close_mappings:
      - wd:Q686984
    broad_mappings:
      - skos:Concept

  Terrorism:
    is_a: ConflictType
    class_uri: hc:Terrorism
    description: >-
      Crisis category for ideologically motivated violence targeting people,
      institutions, or symbolic heritage assets.
    alt_descriptions:
      nl: Crisiscategorie voor ideologisch gemotiveerd geweld gericht op personen, instellingen of symbolische erfgoedobjecten.
      de: Krisenkategorie fuer ideologisch motivierte Gewalt gegen Personen, Einrichtungen oder symbolische Kulturerbeobjekte.
      fr: Categorie de crise pour les violences ideologiquement motivees visant des personnes, des institutions ou des biens patrimoniaux symboliques.
      es: Categoria de crisis para violencia motivada ideologicamente contra personas, instituciones o bienes patrimoniales simbolicos.
      ar: فئة أزمات للعنف المدفوع أيديولوجيا والموجه ضد الأشخاص أو المؤسسات أو الأصول التراثية الرمزية.
      id: Kategori krisis untuk kekerasan bermotif ideologis yang menargetkan orang, institusi, atau aset warisan simbolik.
      zh: 用于针对人员、机构或象征性遗产资产之意识形态暴力的危机类别。
    structured_aliases:
      - literal_form: terrorisme
        in_language: nl
      - literal_form: Terrorismus
        in_language: de
      - literal_form: terrorisme
        in_language: fr
      - literal_form: terrorismo
        in_language: es
      - literal_form: الإرهاب
        in_language: ar
      - literal_form: terorisme
        in_language: id
      - literal_form: 恐怖主义
        in_language: zh
    close_mappings:
      - wd:Q7283
    broad_mappings:
      - skos:Concept

  Looting:
    is_a: ConflictType
    class_uri: hc:Looting
    description: >-
      Crisis category for forcible or opportunistic seizure of heritage materials
      during instability.
    alt_descriptions:
      nl: Crisiscategorie voor gedwongen of opportunistische toe-eigening van erfgoedmateriaal tijdens instabiliteit.
      de: Krisenkategorie fuer gewaltsame oder opportunistische Aneignung von Kulturerbematerial waehrend Instabilitaet.
      fr: Categorie de crise pour la saisie forcee ou opportuniste de materiaux patrimoniaux en periode d'instabilite.
      es: Categoria de crisis para apropiacion forzada u oportunista de materiales patrimoniales durante periodos de inestabilidad.
      ar: فئة أزمات لنهب مواد التراث بالقوة أو انتهازيا خلال فترات عدم الاستقرار.
      id: Kategori krisis untuk perampasan paksa atau oportunistik atas materi warisan selama ketidakstabilan.
      zh: 用于动荡时期对遗产材料进行强夺或机会性掠夺的危机类别。
    structured_aliases:
      - literal_form: plundering
        in_language: nl
      - literal_form: Pluenderung
        in_language: de
      - literal_form: pillage
        in_language: fr
      - literal_form: saqueo
        in_language: es
      - literal_form: نهب
        in_language: ar
      - literal_form: penjarahan
        in_language: id
      - literal_form: 掠夺
        in_language: zh
    close_mappings:
      - wd:Q192623
    broad_mappings:
      - skos:Concept

  Neglect:
    is_a: ConflictType
    class_uri: hc:Neglect
    description: >-
      Crisis category for progressive deterioration caused by abandonment,
      underfunding, or prolonged maintenance failure.
    alt_descriptions:
      nl: Crisiscategorie voor geleidelijke achteruitgang door verwaarlozing, onderfinanciering of langdurig onderhoudsgebrek.
      de: Krisenkategorie fuer fortschreitende Schaeden durch Vernachlaessigung, Unterfinanzierung oder langfristiges Wartungsversagen.
      fr: Categorie de crise pour la deterioration progressive causee par l'abandon, le sous-financement ou le defaut d'entretien prolonge.
      es: Categoria de crisis para deterioro progresivo causado por abandono, falta de financiacion o fallo prolongado de mantenimiento.
      ar: فئة أزمات للتدهور التدريجي الناتج عن الإهمال أو ضعف التمويل أو فشل الصيانة لفترة طويلة.
      id: Kategori krisis untuk deteriorasi bertahap akibat penelantaran, kekurangan pendanaan, atau kegagalan pemeliharaan berkepanjangan.
      zh: 用于因弃置、资金不足或长期维护失效导致渐进性劣化的危机类别。
    structured_aliases:
      - literal_form: verwaarlozing
        in_language: nl
      - literal_form: Vernachlaessigung
        in_language: de
      - literal_form: negligence patrimoniale
        in_language: fr
      - literal_form: abandono patrimonial
        in_language: es
      - literal_form: إهمال
        in_language: ar
      - literal_form: pengabaian
        in_language: id
      - literal_form: 失管失护
        in_language: zh
    broad_mappings:
      - skos:Concept

  Occupation:
    is_a: ConflictType
    class_uri: hc:Occupation
    description: >-
      Crisis category for foreign or military control of territory that restricts
      heritage governance and institutional autonomy.
    alt_descriptions:
      nl: Crisiscategorie voor buitenlandse of militaire territoriale controle die erfgoedbestuur en institutionele autonomie beperkt.
      de: Krisenkategorie fuer auslaendische oder militaerische Gebietskontrolle, die Kulturerbeverwaltung und institutionelle Autonomie einschraenkt.
      fr: Categorie de crise pour le controle etranger ou militaire d'un territoire restreignant la gouvernance patrimoniale et l'autonomie institutionnelle.
      es: Categoria de crisis para control extranjero o militar del territorio que restringe la gobernanza patrimonial y la autonomia institucional.
      ar: فئة أزمات للسيطرة الأجنبية أو العسكرية على إقليم بما يقيّد حوكمة التراث واستقلال المؤسسات.
      id: Kategori krisis untuk kontrol asing atau militer atas wilayah yang membatasi tata kelola warisan dan otonomi institusi.
      zh: 用于因外国或军事占控而限制遗产治理与机构自主性的危机类别。
    structured_aliases:
      - literal_form: bezetting
        in_language: nl
      - literal_form: militaerische Besetzung
        in_language: de
      - literal_form: occupation militaire
        in_language: fr
      - literal_form: ocupacion militar
        in_language: es
      - literal_form: احتلال عسكري
        in_language: ar
      - literal_form: pendudukan militer
        in_language: id
      - literal_form: 军事占领
        in_language: zh
    close_mappings:
      - wd:Q188686
    broad_mappings:
      - skos:Concept

  Sanctions:
    is_a: ConflictType
    class_uri: hc:Sanctions
    description: >-
      Crisis category for coercive economic measures that constrain heritage
      operations, procurement, or international collaboration.
    alt_descriptions:
      nl: Crisiscategorie voor dwingende economische maatregelen die erfgoedoperaties, inkoop of internationale samenwerking beperken.
      de: Krisenkategorie fuer wirtschaftliche Zwangsmassnahmen, die Kulturerbebetrieb, Beschaffung oder internationale Zusammenarbeit einschraenken.
      fr: Categorie de crise pour les mesures economiques coercitives limitant les operations patrimoniales, les acquisitions ou la cooperation internationale.
      es: Categoria de crisis para medidas economicas coercitivas que limitan operaciones patrimoniales, adquisiciones o cooperacion internacional.
      ar: فئة أزمات للتدابير الاقتصادية القسرية التي تقيد العمليات التراثية أو التوريد أو التعاون الدولي.
      id: Kategori krisis untuk langkah ekonomi koersif yang membatasi operasi warisan, pengadaan, atau kolaborasi internasional.
      zh: 用于限制遗产机构运营、采购或国际合作之强制性经济措施的危机类别。
    structured_aliases:
      - literal_form: economische sancties
        in_language: nl
      - literal_form: Wirtschaftssanktionen
        in_language: de
      - literal_form: sanctions economiques
        in_language: fr
      - literal_form: sanciones economicas
        in_language: es
      - literal_form: عقوبات اقتصادية
        in_language: ar
      - literal_form: sanksi ekonomi
        in_language: id
      - literal_form: 经济制裁
        in_language: zh
    close_mappings:
      - wd:Q1248258
    broad_mappings:
      - skos:Concept
