id: https://nde.nl/ontology/hc/classes/GHCIDBlock
name: GHCIDBlock
title: GHCID Block Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
classes:
  GHCIDBlock:
    class_uri: dcterms:Identifier
    description: >-
      Metadata block capturing assignment, variants, and lifecycle history
      for Global Heritage Custodian Identifier values.
    alt_descriptions:
      nl: >-
        Metadatablok dat toewijzing, varianten en levenscyclusgeschiedenis vastlegt
        voor Global Heritage Custodian Identifier-waarden.
      de: >-
        Metadatenblock, der Zuweisung, Varianten und Lebenszyklushistorie
        für Global Heritage Custodian Identifier-Werte erfasst.
      fr: >-
        Bloc de métadonnées capturant l'attribution, les variantes et l'historique du cycle de vie
        pour les valeurs d'identifiant Global Heritage Custodian.
      es: >-
        Bloque de metadatos que captura la asignación, variantes e historial del ciclo de vida
        para valores del Identificador Global de Custodio de Patrimonio.
      ar: >-
        كتلة بيانات وصفية تسجل التخصيص والتباينات وتاريخ دورة الحياة
        لقيم معرف أمين التراث العالمي.
      id: >-
        Blok metadata yang menangkap penugasan, varian, dan riwayat siklus hidup
        untuk nilai Pengidentifikasi Kustodian Warisan Global.
      zh: >-
        捕获全球遗产保管人标识符值的分配、变体和生命周期历史的元数据块。
    broad_mappings:
    - dcterms:Identifier
    close_mappings:
    - prov:Entity
    related_mappings:
    - schema:PropertyValue
    - prov:Generation
    slots:
    - identified_by
    structured_aliases:
    - literal_form: GHCID-blok
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: GHCID-Block
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: bloc GHCID
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: bloque GHCID
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: كتلة GHCID
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: blok GHCID
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: GHCID块
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Manages lifecycle of heritage custodian identifiers
    - Tracks variant forms and assignment provenance
    - 'Preserved from prior description: Identifier metadata block capturing assignment, variants, and lifecycle history for GHCID values.'
    keywords:
    - identifier
    - GHCID
    - lifecycle
    - governance
    - variant tracking
    examples:
    - value:
        identified_by: GHCID-2025-NL-00001
      description: Heritage custodian identifier block
    annotations:
      specificity_score: 0.35
      specificity_rationale: Identifier lifecycle container for custody-level identifier governance.
      custodian_types: '["*"]'
