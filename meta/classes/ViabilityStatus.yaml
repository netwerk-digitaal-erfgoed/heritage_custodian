id: https://nde.nl/ontology/hc/class/ViabilityStatus
name: ViabilityStatus
title: Viability Status
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_code
- ../slots/has_label
classes:
  ViabilityStatus:
    class_uri: skos:Concept
    description: >-
      Assessment indicator expressing sustainability condition or operational continuity for heritage elements.
    alt_descriptions:
      nl: >-
        Beoordelingsindicator die de duurzaamheidsconditie of operationele continuïteit voor erfgoedelementen uitdrukt.
      de: >-
        Bewertungsindikator, der die Nachhaltigkeitsbedingung oder betriebliche Kontinuität für Heritage-Elemente ausdrückt.
      fr: >-
        Indicateur d'évaluation exprimant l'état de durabilité ou la continuité opérationnelle des éléments patrimoniaux.
      es: >-
        Indicador de evaluación que expresa la condición de sostenibilidad o continuidad operacional de elementos patrimoniales.
      ar: >-
        مؤشر تقييم يعبر عن حالة الاستدامة أو الاستمرارية التشغيلية لعناصر التراث.
      id: >-
        Indikator penilaian yang mengekspresikan kondisi keberlanjutan atau kontinuitas operasional untuk elemen warisan.
      zh: >-
        表达遗产元素可持续性状况或运营连续性的评估指标。
    structured_aliases:
    - literal_form: levensvatbaarheidsstatus
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Lebensfähigkeitsstatus
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: état de viabilité
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: estado de viabilidad
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: حالة الجدوى
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: status kelayakan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 存续状态
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_code
    - has_label
    broad_mappings:
    - skos:Concept
    comments:
    - Used for UNESCO ICH element endangerment classification.
    - Supports conservation priority setting and resource allocation.
    - 'Preserved from prior description: A viability status assessment. **USAGE**: Used for: - Intangible heritage viability (UNESCO) - Organizational viability - Collection viability'
    keywords:
    - sustainability assessment
    - endangerment status
    - conservation priority
    - heritage condition
    examples:
    - value:
        has_code: ENDANGERED
        has_label: Endangered
        assessment_date: '2024-12-01'
      description: Endangered viability status
    annotations:
      specificity_score: '0.55'
      specificity_rationale: More specific - viability relevant to UNESCO heritage lists.
      custodian_types: '[''*'']'
