id: https://nde.nl/ontology/hc/classes/ReferenceLink
name: ReferenceLink
title: ReferenceLink
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_url
# default_range: string
classes:
  ReferenceLink:
    description: >-
      Hyperlink reference extracted from a source document pointing to an external or internal web resource.
    alt_descriptions:
      nl: >-
        Hyperlinkverwijzing geëxtraheerd uit een brondocument dat naar een externe of interne webbron verwijst.
      de: >-
        Hyperlink-Referenz, die aus einem Quelldokument extrahiert wurde und auf eine externe oder interne Webressource verweist.
      fr: >-
        Référence de lien hypertexte extraite d'un document source pointant vers une ressource Web externe ou interne.
      es: >-
        Referencia de hipervínculo extraída de un documento fuente que apunta a un recurso web externo o interno.
      ar: >-
        مرجع ارتباط تشعبي مستخرج من مستند مصدر يشير إلى مورد ويب خارجي أو داخلي.
      id: >-
        Referensi tautan yang diekstrak dari dokumen sumber yang menunjuk ke sumber daya web eksternal atau internal.
      zh: >-
        从源文档中提取的指向外部或内部网络资源的超链接引用。
    structured_aliases:
    - literal_form: referentielink
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Referenzlink
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: lien de référence
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: enlace de referencia
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رابط مرجعي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tautan referensi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 参考链接
      predicate: EXACT_SYNONYM
      in_language: zh
    class_uri: schema:WebPage
    broad_mappings:
    - schema:WebPage
    related_mappings:
    - prov:Entity
    comments:
    - "Typically represented as a URL with optional human-readable label."
    - "Ontology alignment: schema:WebPage for a referenced web resource; prov:Entity for provenance tracking."
    - "Note: schema:URL is a datatype commonly used to represent the URL literal itself."
    - 'Preserved from prior description: Hyperlink reference extracted from a source document.'
    keywords:
    - hyperlink reference
    - web resource link
    - external reference
    - document link
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_url
    - has_label
