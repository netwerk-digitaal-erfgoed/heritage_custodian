id: https://nde.nl/ontology/hc/class/LocalCollection
name: LocalCollection
title: Local Collection Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_name
classes:
  LocalCollection:
    class_uri: schema:Collection
    description: >-
      Curated aggregation focused on materials relating to a specific geographic locality or community.
    alt_descriptions:
      nl: >-
        Gecureerde aggregatie gericht op materialen met betrekking tot een specifieke geografische locatie of gemeenschap.
      de: >-
        Kuratierte Aggregation, die sich auf Materialien bezieht, die sich auf eine bestimmte geografische Lokalität oder Gemeinschaft beziehen.
      fr: >-
        Agrégation conservée axée sur des matériaux relatifs à une localité géographique ou une communauté spécifique.
      es: >-
        Agregación curada enfocada en materiales relacionados con una localidad geográfica o comunidad específica.
      ar: >-
        تجميع منظم يركز على المواد المتعلقة بمحلية جغرافية أو مجتمع محدد.
      id: >-
        Agregasi terkurasi yang berfokus pada materi yang berkaitan dengan lokalitas geografis atau komunitas tertentu.
      zh: >-
        专注于与特定地理地点或社区相关材料的策展集合。
