id: https://nde.nl/ontology/hc/class/TitleTypes
name: TitleTypes
title: Title Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- ./TitleType
- linkml:types
classes:
  UniformTitle:
    is_a: TitleType
    class_uri: hc:UniformTitle
    description: >-
      Standardized or controlled form of used for cataloging and collocation purposes.
    alt_descriptions:
      nl: Gestandaardiseerde of gecontroleerde vorm van een titel voor catalogiserings- en samenbrengingsdoeleinden.
      de: Standardisierte oder kontrollierte Form eines Titels für Katalogisierungs- und Zusammenführungszwecke.
      fr: Forme normalisée ou contrôlée d'un titre utilisée pour le catalogage et le regroupement.
      es: Forma estandarizada o controlada de un título utilizada para fines de catalogación y colación.
      ar: شكل موحد أو مضبوط من العنوان يُستخدم لأغراض الفهرسة والتجميع.
      id: Bentuk judul yang distandarisasi atau dikontrol untuk tujuan katalogisasi dan pengelompokan.
      zh: 用于编目和汇集目的的标准化或受控形式的标题。
    structured_aliases:
    - literal_form: uniforme titel
      in_language: nl
    - literal_form: Einheitstitel
      in_language: de
    - literal_form: titre uniforme
      in_language: fr
    - literal_form: título uniforme
      in_language: es
    - literal_form: عنوان موحد
      in_language: ar
    - literal_form: judul seragam
      in_language: id
    - literal_form: 统一题名
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
  VariantTitle:
    is_a: TitleType
    class_uri: hc:VariantTitle
    description: >-
      Alternative form of differing from the uniform or main.
    alt_descriptions:
      nl: Alternatieve vorm van een titel die verschilt van de uniforme of hoofdtitle.
      de: Alternative Form eines Titels, die vom Einheits- oder Haupttitel abweicht.
      fr: Forme alternative d'un titre différente du titre uniforme ou principal.
      es: Forma alternativa de título que difiere del título uniforme o principal.
      ar: شكل بديل للعنوان يختلف عن العنوان الموحد أو الرئيسي.
      id: Bentuk judul alternatif yang berbeda dari judul seragam atau utama.
      zh: 与统一题名或主要题名不同的备选形式。
    structured_aliases:
    - literal_form: varianttitel
      in_language: nl
    - literal_form: Variantentitel
      in_language: de
    - literal_form: titre variant
      in_language: fr
    - literal_form: título variante
      in_language: es
    - literal_form: عنوان متغير
      in_language: ar
    - literal_form: judul varian
      in_language: id
    - literal_form: 变体题名
      in_language: zh
    broad_mappings:
    - skos:Concept
  TranslatedTitle:
    is_a: TitleType
    class_uri: hc:TranslatedTitle
    description: >-
      rendered in a language different from the original.
    alt_descriptions:
      nl: Titel weergegeven in een andere taal dan het origineel.
      de: Titel, der in einer anderen Sprache als dem Original wiedergegeben wird.
      fr: Titre rendu dans une langue différente de l'original.
      es: Título expresado en un idioma diferente al original.
      ar: عنوان مُترجم إلى لغة مختلفة عن الأصل.
      id: Judul yang diterjemahkan ke dalam bahasa yang berbeda dari aslinya.
      zh: 以不同于原文的语言呈现的标题。
    structured_aliases:
    - literal_form: vertaalde titel
      in_language: nl
    - literal_form: übersetzter Titel
      in_language: de
    - literal_form: titre traduit
      in_language: fr
    - literal_form: título traducido
      in_language: es
    - literal_form: عنوان مترجم
      in_language: ar
    - literal_form: judul terjemahan
      in_language: id
    - literal_form: 翻译题名
      in_language: zh
    broad_mappings:
    - skos:Concept
  AbbreviatedTitle:
    is_a: TitleType
    class_uri: hc:AbbreviatedTitle
    description: >-
      Shortened or condensed form of the full.
    alt_descriptions:
      nl: Verkorte of ingekorte vorm van de volledige titel.
      de: Verkürzte oder kondensierte Form des vollständigen Titels.
      fr: Forme raccourcie ou condensée du titre complet.
      es: Forma acortada o condensada del título completo.
      ar: شكل مختصر أو مكثف من العنوان الكامل.
      id: Bentuk pendek atau ringkas dari judul lengkap.
      zh: 完整标题的缩写或简化形式。
    structured_aliases:
    - literal_form: afgekorte titel
      in_language: nl
    - literal_form: abgekürzter Titel
      in_language: de
    - literal_form: titre abrégé
      in_language: fr
    - literal_form: título abreviado
      in_language: es
    - literal_form: عنوان مختصر
      in_language: ar
    - literal_form: judul singkat
      in_language: id
    - literal_form: 缩写题名
      in_language: zh
    broad_mappings:
    - skos:Concept
  ParallelTitle:
    is_a: TitleType
    class_uri: hc:ParallelTitle
    description: >-
      in another language appearing alongside the original on the same resource.
    alt_descriptions:
      nl: Titel in een andere taal die naast het origineel op dezelfde bron verschijnt.
      de: Titel in einer anderen Sprache, der neben dem Original auf derselben Ressource erscheint.
      fr: Titre dans une autre langue apparaissant à côté de l'original sur la même ressource.
      es: Título en otro idioma que aparece junto al original en el mismo recurso.
      ar: عنوان بلغة أخرى يظهر بجانب الأصل في نفس المصدر.
      id: Judul dalam bahasa lain yang muncul di samping aslinya pada sumber daya yang sama.
      zh: 与原文一同出现在同一资源上的另一种语言的标题。
    structured_aliases:
    - literal_form: parallele titel
      in_language: nl
    - literal_form: Paralleltitel
      in_language: de
    - literal_form: titre parallèle
      in_language: fr
    - literal_form: título paralelo
      in_language: es
    - literal_form: عنوان موازٍ
      in_language: ar
    - literal_form: judul paralel
      in_language: id
    - literal_form: 并列题名
      in_language: zh
    broad_mappings:
    - skos:Concept
  FormerTitle:
    is_a: TitleType
    class_uri: hc:FormerTitle
    description: >-
      Previous of a continuing resource before a name change.
    alt_descriptions:
      nl: Eerdere titel van een doorlopende bron vóór een naamswijziging.
      de: Früherer Titel einer fortlaufenden Ressource vor einer Namensänderung.
      fr: Titre précédent d'une ressource continue avant un changement de nom.
      es: Título anterior de un recurso continuo antes de un cambio de nombre.
      ar: العنوان السابق لمورد مستمر قبل تغيير الاسم.
      id: Judul sebelumnya dari sumber daya berkelanjutan sebelum perubahan nama.
      zh: 连续性资源在更名前的原有标题。
    structured_aliases:
    - literal_form: voormalige titel
      in_language: nl
    - literal_form: früherer Titel
      in_language: de
    - literal_form: ancien titre
      in_language: fr
    - literal_form: título anterior
      in_language: es
    - literal_form: عنوان سابق
      in_language: ar
    - literal_form: judul sebelumnya
      in_language: id
    - literal_form: 前题名
      in_language: zh
    broad_mappings:
    - skos:Concept
