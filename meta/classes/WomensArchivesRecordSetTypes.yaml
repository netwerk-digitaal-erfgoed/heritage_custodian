id: https://nde.nl/ontology/hc/class/WomensArchivesRecordSetTypes
name: WomensArchivesRecordSetTypes
title: WomensArchives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  wd: http://www.wikidata.org/entity/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- ./WomensArchivesRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  WomensOrganizationFonds:
    is_a: WomensArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-organized institutional documentation from women's groups,
      associations, and related bodies.
    alt_descriptions:
      nl: >-
        Naar herkomst geordende institutionele documentatie van vrouwengroepen,
        verenigingen en verwante organisaties.
      de: >-
        Provenienzorientierte institutionelle Dokumentation von Frauengruppen,
        Vereinen und verwandten Einrichtungen.
      fr: >-
        Documentation institutionnelle organisée par provenance provenant de
        groupes de femmes, d'associations et d'organismes apparentés.
      es: >-
        Documentación institucional organizada por procedencia de grupos de
        mujeres, asociaciones y entidades relacionadas.
      ar: >-
        توثيق مؤسسي منظم حسب المنشأ صادر عن مجموعات النساء والجمعيات والهيئات
        ذات الصلة.
      id: >-
        Dokumentasi institusional berbasis asal-usul dari kelompok perempuan,
        asosiasi, dan badan terkait.
      zh: >-
        按来源组织的妇女团体、协会及相关机构的机构性文献。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - WomensArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:WomensOrganizationFonds
      has_custodian:
        equals_string: "hc:WomensArchives"
      has_note:
        equals_string: This RecordSetType is typically held by WomensArchives custodians. Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: vrouwenorganisatie-fonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Frauenorganisationsbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds d'organisation de femmes
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de organización de mujeres
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق منظمة نسائية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: dana organisasi perempuan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 妇女组织全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    comments:
    - "Preserved from prior description: Fonds-organized organizational records from women's groups, associations, and institutions."
    keywords:
    - women's organizations
    - institutional archives
    - associations
    - women's groups
    - provenance-based
  FeministPapersCollection:
    is_a: WomensArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Thematically grouped documentation from gender-equality movements,
      personal archives, and activism.
    alt_descriptions:
      nl: >-
        Thematisch gegroepeerde documentatie uit gendergelijkheidsbewegingen,
        persoonlijke archieven en activisme.
      de: >-
        Thematisch gruppierte Dokumentation aus Gleichstellungsbewegungen,
        persönlichen Archiven und Aktivismus.
      fr: >-
        Documentation regroupée thématiquement issue de mouvements pour
        l'égalité des genres, d'archives personnelles et de l'activisme.
      es: >-
        Documentación agrupada temáticamente de movimientos por la igualdad de
        género, archivos personales y activismo.
      ar: >-
        توثيق مجمّع موضوعياً من حركات المساواة بين الجنسين والأرشيفات الشخصية
        والنشاط.
      id: >-
        Dokumentasi yang dikelompokkan secara tematis dari gerakan kesetaraan
        gender, arsip pribadi, dan aktivisme.
      zh: >-
        来自性别平等运动、个人档案与行动主义的主题聚合文献。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - WomensArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:FeministPapersCollection
      has_custodian:
        equals_string: "hc:WomensArchives"
      has_note:
        equals_string: This RecordSetType is typically held by WomensArchives custodians. Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: feministische papieren collectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: feministische Papiersammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de papiers féministes
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de papeles feministas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة أوراق نسوية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi kertas feminis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 女权文件藏品
      predicate: EXACT_SYNONYM
      in_language: zh
    annotations:
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: Collection-organized papers and documentation from feminist movements, personal archives, and activism.'
    keywords:
    - feminist movement
    - gender equality
    - activism
    - personal archives
    - feminist papers
  WomensHistoryCollection:
    is_a: WomensArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Thematically grouped documentation on women's past, including biographical
      materials, oral testimonies, and research resources.
    alt_descriptions:
      nl: >-
        Thematisch gegroepeerde documentatie over het verleden van vrouwen,
        inclusief biografisch materiaal, orale getuigenissen en
        onderzoeksbronnen.
      de: >-
        Thematisch gruppierte Dokumentation zur Geschichte von Frauen,
        einschließlich biografischer Materialien, mündlicher Zeugnisse und
        Forschungsressourcen.
      fr: >-
        Documentation regroupée thématiquement sur le passé des femmes,
        incluant des matériaux biographiques, des témoignages oraux et des
        ressources de recherche.
      es: >-
        Documentación agrupada temáticamente sobre el pasado de las mujeres,
        incluyendo materiales biográficos, testimonios orales y recursos de
        investigación.
      ar: >-
        توثيق مجمّع موضوعياً عن ماضي النساء، بما في ذلك مواد سيرية وشهادات
        شفوية وموارد بحثية.
      id: >-
        Dokumentasi yang dikelompokkan secara tematis tentang masa lalu
        perempuan, termasuk materi biografis, kesaksian lisan, dan sumber daya
        penelitian.
      zh: >-
        关于女性过去的主题聚合文献，包括传记材料、口述证词与研究资源。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - WomensArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:WomensHistoryCollection
      has_custodian:
        equals_string: "hc:WomensArchives"
      has_note:
        equals_string: This RecordSetType is typically held by WomensArchives custodians. Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: vrouwengeschiedenis collectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Frauengeschichtssammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection d'histoire des femmes
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de historia de mujeres
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة تاريخ النساء
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi sejarah perempuan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 妇女历史藏品
      predicate: EXACT_SYNONYM
      in_language: zh
    annotations:
      custodian_types: "['*']"
    comments:
    - "Preserved from prior description: Collection-organized women's history documentation, including biographical materials, oral histories, and research resources."
    keywords:
    - women's history
    - biographical materials
    - oral histories
    - gender history
    - women's past
