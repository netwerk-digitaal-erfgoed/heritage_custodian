classes:
  CoordinateProvenance:
    class_uri: prov:Activity
    description: >-
      Provenance record documenting the origin, derivation method, or validation process for geospatial coordinates.
    alt_descriptions:
      nl: >-
        Herkomstrapport dat de oorsprong, afleidingsmethode of validatieproces voor geospatiale coördinaten documenteert.
      de: >-
        Herkunftsaufzeichnung, die Ursprung, Ableitungsmethode oder Validierungsprozess für geospatiale Koordinaten dokumentiert.
      fr: >-
        Enregistrement de provenance documentant l'origine, la méthode de dérivation ou le processus de validation des coordonnées géospatiales.
      es: >-
        Registro de procedencia que documenta el origen, método de derivación o proceso de validación de coordenadas geoespaciales.
      ar: >-
        سجل المنشأ الذي يوثق أصل أو طريقة الاشتقاق أو عملية التحقق من الإحداثيات الجغرافية المكانية.
      id: >-
        Catatan asal-usul yang mendokumentasikan asal, metode derivasi, atau proses validasi koordinat geospasial.
      zh: >-
        记录地理空间坐标的来源、推导方法或验证过程的溯源记录。
