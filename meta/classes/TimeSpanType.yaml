id: https://nde.nl/ontology/hc/class/TimeSpanType
name: TimeSpanType
title: Time Span Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  TimeSpanType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Category for classifying bounded temporal periods such as fiscal years, calendar years, and academic years.
    alt_descriptions:
      nl: Categorie voor het classificeren van begrensde tijdsperioden zoals boekjaren, kalenderjaren en academische jaren.
      de: Kategorie zur Klassifizierung begrenzter Zeitperioden wie Geschäftsjahre, Kalenderjahre und akademische Jahre.
      fr: Catégorie pour classer les périodes temporelles bornées telles que les exercices fiscaux, les années civiles et les années académiques.
      es: Categoría para clasificar períodos temporales delimitados como ejercicios fiscales, años calendario y años académicos.
      ar: فئة لتصنيف الفترات الزمنية المحددة مثل السنوات المالية والسنوات التقويمية والسنوات الأكاديمية.
      id: Kategori untuk mengklasifikasikan periode waktu terbatas seperti tahun fiskal, tahun kalender, dan tahun akademik.
      zh: 用于分类有界时间周期的类别，如财政年度、日历年度和学年度。
    structured_aliases:
    - literal_form: tijdspannetype
      in_language: nl
    - literal_form: Zeitspannentyp
      in_language: de
    - literal_form: type d'étendue temporelle
      in_language: fr
    - literal_form: tipo de lapso de tiempo
      in_language: es
    - literal_form: نوع الفترة الزمنية
      in_language: ar
    - literal_form: tipe rentang waktu
      in_language: id
    - literal_form: 时间跨度类型
      in_language: zh
    broad_mappings:
    - skos:Concept
    slots:
    - has_label
    - has_description
    comments:
    - MIGRATED from fiscal_year_start/end slots per Rule 0b
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
