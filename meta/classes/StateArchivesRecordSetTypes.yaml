    alt_descriptions:
      nl: >-
        Reeks-niveau ordening van belasting- en financiële documentatie.
      de: >-
        Serienordnung für Steuer- und Finanzdokumentation.
      fr: >-
        Organisation en série des documents fiscaux et financiers.
      es: >-
        Organización en serie de documentación fiscal y financiera.
      ar: >-
        ترتيب على مستوى السلسلة للوثائق الضريبية والمالية.
      id: >-
        Pengaturan tingkat seri dokumentasi perpajakan dan fiskal.
      zh: >-
        税务与财政文书的系列级整理。
    structured_aliases:
    - {literal_form: reeks belastingdossiers, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie Steuerunterlagen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: série fiscale, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie fiscal, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات ضريبية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri arsip perpajakan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 税务档案系列, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Fiscal and taxation evidence remains central to this sequence-oriented class.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    keywords:
    - tax records
    - fiscal documentation
    - taxation archives
    - series
    see_also:
    - StateArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:TaxRecordsSeries
      has_custodian:
        equals_string: hc:StateArchives
      has_note:
        equals_string: This RecordSetType is typically held by StateArchives custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      custodian_types: '[''*'']'
