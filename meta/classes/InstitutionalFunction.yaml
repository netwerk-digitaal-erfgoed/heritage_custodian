classes:
  InstitutionalFunction:
    class_uri: rico:Function
    description: >-
      Formal role, responsibility, or mandate assigned to or performed by an organization in its operational capacity.
    alt_descriptions:
      nl: >-
        Formele rol, verantwoordelijkheid of mandaat toegewezen aan of uitgevoerd door een organisatie in haar operationele capaciteit.
      de: >-
        Formelle Rolle, Verantwortung oder Mandat, die einer Organisation in ihrer operativen Kapazität zugewiesen oder von ihr ausgeübt wird.
      fr: >-
        Rôle formel, responsabilité ou mandat attribué ou exercé par une organisation dans sa capacité opérationnelle.
      es: >-
        Rol formal, responsabilidad o mandato asignado o desempeñado por una organización en su capacidad operativa.
      ar: >-
        دور رسمي أو مسؤولية أو تفويض مخصص أو يؤديه منظمة في قدرتها التشغيلية.
      id: >-
        Peran formal, tanggung jawab, atau mandat yang ditugaskan atau dilakukan oleh organisasi dalam kapasitas operasionalnya.
      zh: >-
        分配给组织或由组织以其运作能力执行的正式角色、职责或授权。
