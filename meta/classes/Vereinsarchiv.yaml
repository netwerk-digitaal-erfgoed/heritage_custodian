classes:
  Vereinsarchiv:
    description: >-
      Institution preserving the historical records, membership registers, and
      activity documentation of voluntary associations in German-speaking regions.
    alt_descriptions:
      nl: >-
        Instelling die de historische verslagen, lederegisters en activiteitendocumentatie
        van vrijwillige verenigingen in Duitstalige regio's bewaart.
      de: >-
        Institution, die die historischen Unterlagen, Mitgliederregister und Aktivitätsdokumentation
        freiwilliger Vereinigungen im deutschsprachigen Raum bewahrt.
      fr: >-
        Institution préservant les archives historiques, les registres des membres et la
        documentation des activités des associations volontaires dans les régions germanophones.
      es: >-
        Institución que preserva los registros históricos, registros de miembros y documentación
        de actividades de asociaciones voluntarias en regiones germanoparlantes.
      ar: >-
        مؤسسة تحافظ على السجلات التاريخية وسجلات العضوية ووثائق الأنشطة للجمعيات التطوعية في المناطق الناطقة بالألمانية.
      id: >-
        Institusi yang melestarikan catatan sejarah, daftar anggota, dan dokumentasi aktivitas
        asosiasi sukarela di wilayah berbahasa Jerman.
      zh: >-
        保存德语地区志愿协会的历史记录、成员名册和活动文件的机构。
    is_a: CustodianType
    class_uri: skos:Concept
    close_mappings:
    - wd:Q130758889
    slots:
    - has_type
    - has_score
    - related_to
    - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
      related_to:
        range: WikidataAlignment
        inlined: true
      has_label:
        equals_string: Vereinsarchiv
    see_also:
    - AssociationArchive
    - ClubArchive
    - SocietyArchive
    - CommunityArchive
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: An archive of a German association or club (Verein). Vereinsarchive preserve the historical records of voluntary associations, societies, clubs, and similar membership organizations in German-speaking countries. These archives document the activities, governance, membership, and cultural contributions of civil society organizations.'
