id: https://nde.nl/ontology/hc/class/HistoricalArchiveRecordSetType
name: HistoricalArchiveRecordSetType
title: Historical Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../classes/CollectionType
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  HistoricalArchiveRecordSetType:
    class_uri: hc:HistoricalArchiveRecordSetType
    is_a: CollectionType
    description: >-
      Taxonomy root for aggregations of primary source materials documenting
      past events, persons, and organizational activities.
    alt_descriptions:
      nl: >-
        Taxonomiewortel voor aggregaties van primaire bronnen die vroegere gebeurtenissen,
        personen en organisatorische activiteiten documenteren.
      de: >-
        Taxonomie-Wurzel für Aggregationen von Primärquellenmaterialien, die vergangene
        Ereignisse, Personen und organisatorische Aktivitäten dokumentieren.
      fr: >-
        Racine taxonomique pour les agrégations de matériaux de sources primaires documentant
        les événements passés, les personnes et les activités organisationnelles.
      es: >-
        Raíz taxonómica para agregaciones de materiales de fuentes primarias que documentan
        eventos pasados, personas y actividades organizativas.
      ar: >-
        جذر تصنيفي لتجميعات مواد المصادر الأولية التي توثق الأحداث الماضية والأشخاص والأنشطة التنظيمية.
      id: >-
        Akar taksonomi untuk agregasi materi sumber primer yang mendokumentasikan peristiwa
        masa lalu, orang, dan aktivitas organisasi.
      zh: >-
        用于记录过去事件、人物和组织活动的原始资料聚合的分类法根。
    structured_aliases:
      - literal_form: historisch-archiefbestandtype
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Historisches-Archiv-Bestandstyp
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: type d'ensemble documentaire d'archive historique
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: tipo de conjunto documental de archivo historico
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: نوع مجموعة سجلات أرشيف تاريخي
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: tipe set arsip historis
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 历史档案记录集类型
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - primary source materials
      - past events documentation
      - organizational activities
      - historical taxonomy
    slots:
      - has_type
      - has_score
      - has_scope
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
