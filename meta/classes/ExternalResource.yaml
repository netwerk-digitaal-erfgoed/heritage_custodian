id: https://nde.nl/ontology/hc/class/ExternalResource
name: ExternalResource
title: External Resource Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_url
classes:
  ExternalResource:
    class_uri: schema:CreativeWork
    description: >-
      Referenced material linked from a local record, finding aid, or catalog entry
      for extended consultation or verification.
    alt_descriptions:
      nl: >-
        Extern materiaal waarnaar wordt verwezen vanuit een lokaal record, finding aid
        of catalogusregistratie voor uitgebreid consultatie of verificatie.
      de: >-
        Externes Material, auf das aus einem lokalen Datensatz, Finding Aid
        oder Katalogeintrag zur erweiterten Konsultation oder Verifizierung verwiesen wird.
      fr: >-
        Matériel externe référencé depuis un enregistrement local, instrument de recherche
        ou entrée de catalogue pour consultation ou vérification approfondie.
      es: >-
        Material externo referenciado desde un registro local, guía de búsqueda
        o entrada de catálogo para consulta o verificación ampliada.
      ar: >-
        مادة خارجية مُشار إليها من سجل محلي أو أداة بحث أو إدخال فهرس
        للاستشارة أو التحقق الموسع.
      id: >-
        Material eksternal yang dirujuk dari catatan lokal, alat temuan
        atau entri katalog untuk konsultasi atau verifikasi yang diperluas.
      zh: >-
        从本地记录、检索工具或目录条目引用的外部材料，
        用于扩展咨询或验证。
    broad_mappings:
    - schema:CreativeWork
    slots:
    - has_label
    - has_url
    structured_aliases:
    - literal_form: externe bron
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: externe Ressource
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: ressource externe
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: recurso externo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مورد خارجي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: sumber eksternal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 外部资源
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Links to supplementary or authoritative materials outside the local system
    - Used for extended context, verification, or further research
    - 'Preserved from prior description: Referenced external resource linked from a local record or finding aid.'
    keywords:
    - reference
    - link
    - finding aid
    - catalog
    examples:
    - value:
        has_label: Digital Collections Portal
        has_url: https://example.org/digital-collections
      description: Link to external digital repository
    annotations:
      specificity_score: 0.25
      specificity_rationale: Generic link target for external descriptive resources.
      custodian_types: '["*"]'
