id: https://nde.nl/ontology/hc/class/GeospatialLocation
name: GeospatialLocation
title: Geospatial Location Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_location
classes:
  GeospatialLocation:
    class_uri: schema:GeoCoordinates
    description: >-
      Coordinate-based spatial position defined by geographic reference values
      for location identification and mapping.
    alt_descriptions:
      nl: >-
        Op coördinaten gebaseerde ruimtelijke positie gedefinieerd door geografische referentiewaarden
        voor locatie-identificatie en kaartweergave.
      de: >-
        Koordinatenbasierte räumliche Position, definiert durch geografische Referenzwerte
        zur Standortidentifikation und Kartierung.
      fr: >-
        Position spatiale basée sur des coordonnées définie par des valeurs de référence géographiques
        pour l'identification de localisation et la cartographie.
      es: >-
        Posición espacial basada en coordenadas definida por valores de referencia geográficos
        para identificación de ubicación y mapeo.
      ar: >-
        موقع مكاني قائم على الإحداثيات محدد بقيم مرجعية جغرافية
        لتحديد الموقع والخرائط.
      id: >-
        Posisi spasial berbasis koordinat yang didefinisikan oleh nilai referensi geografis
        untuk identifikasi lokasi dan pemetaan.
      zh: >-
        由地理参考值定义的基于坐标的空间位置，用于位置识别和制图。
    structured_aliases:
    - literal_form: geospatiale locatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Geospatiale Position
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: localisation géospatiale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: ubicación geoespacial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: موقع جغرافي مكاني
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: lokasi geospasial
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地理空间位置
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:GeoCoordinates
    slots:
    - has_location
    comments:
    - Wraps coordinate data for heritage site geocoding.
    - Supports mapping integration and spatial search functionality.
    - 'Preserved from prior description: Coordinate-based geospatial location.'
    keywords:
    - spatial position
    - geographic coordinates
    - location identification
    - geospatial reference
    annotations:
      specificity_score: 0.25
      specificity_rationale: Coordinate wrapper used in geospatial modeling.
      custodian_types: '["*"]'
