id: https://nde.nl/ontology/hc/class/UserCommunityType
name: UserCommunityType
title: User Community Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  UserCommunityType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract category for classifying audience groups by usage profile,
      expertise, and engagement context.
    alt_descriptions:
      nl: Abstracte categorie voor het indelen van doelgroepen op gebruiksprofiel, expertise en betrokkenheidscontext.
      de: Abstrakte Kategorie zur Einordnung von Zielgruppen nach Nutzungsprofil, Expertise und Beteiligungskontext.
      fr: Categorie abstraite pour classer les publics selon profil d usage, niveau d expertise et contexte d engagement.
      es: Categoria abstracta para clasificar comunidades usuarias por perfil de uso, experiencia y contexto de participacion.
      ar: فئة تجريدية لتصنيف جماعات المستخدمين حسب نمط الاستخدام والخبرة وسياق التفاعل.
      id: Kategori abstrak untuk mengklasifikasikan komunitas pengguna berdasarkan profil penggunaan, keahlian, dan konteks keterlibatan.
      zh: 用于按使用画像、专业水平与参与情境对用户群体分类的抽象类别。
    structured_aliases:
    - literal_form: gebruikersgroeptype
      in_language: nl
    - literal_form: Nutzergruppentyp
      in_language: de
    - literal_form: type de communaute d usagers
      in_language: fr
    - literal_form: tipo de comunidad usuaria
      in_language: es
    - literal_form: نوع مجتمع المستخدمين
      in_language: ar
    - literal_form: tipe komunitas pengguna
      in_language: id
    - literal_form: 用户群体类型
      in_language: zh
    keywords:
    - research audience
    - public audience
    - educational audience
    slots:
    - identified_by
    - has_label
    - has_description
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: '0.40'
      specificity_rationale: Moderately specific - user types relevant to institutions.
      custodian_types: "['*']"
