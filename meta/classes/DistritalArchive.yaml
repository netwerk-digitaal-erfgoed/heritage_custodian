id: https://nde.nl/ontology/hc/class/DistritalArchive
name: DistritalArchive
title: Distrital Archive (Portugal)
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/hold_record_set
- ../slots/has_score
classes:
  DistritalArchive:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      District-level archival institution in Portugal responsible for preserving
      and providing access to regional administrative records.
    alt_descriptions:
      nl: >-
        Archiefinstelling op districtsniveau in Portugal die verantwoordelijk is voor het behouden
        en ontsluiten van regionale administratieve archieven.
      de: >-
        Archivinstitution auf Bezirksebene in Portugal, die für die Bewahrung und Bereitstellung
        regionaler Verwaltungsunterlagen verantwortlich ist.
      fr: >-
        Institution archivistique de niveau district au Portugal responsable de la conservation
        et de l'accès aux documents administratifs régionaux.
      es: >-
        Institución archivística de nivel distrital en Portugal responsable de preservar
        y proporcionar acceso a registros administrativos regionales.
      ar: >-
        مؤسسة أرشيفية على مستوى المنطقة في البرتغال مسؤولة عن الحفاظ على
        السجلات الإدارية الإقليمية وتوفير الوصول إليها.
      id: >-
        Lembaga arsip tingkat distrik di Portugal yang bertanggung jawab untuk melestarikan
        dan menyediakan akses ke catatan administratif regional.
      zh: >-
        负责保存和提供地区行政记录访问的葡萄牙区级档案机构。
    structured_aliases:
    - literal_form: districtaal archief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Distriktarchiv
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: archives districtales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: archivo distrital
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: أرشيف المقاطعة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip distrik
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    - schema:ArchiveOrganization
    close_mappings:
    - rico:CorporateBody
    slots:
    - identified_by
    - hold_record_set
    - has_score
    comments:
    - Portuguese district archives hold notarial, civil registration, and administrative records.
    - Part of the Portuguese national archival system under DGAB.
    - 'Preserved from prior description: District-level repository institution in Portugal responsible for regional records stewardship and access services.'
    keywords:
    - Portuguese archives
    - district archives
    - regional records
    - distrital archives
