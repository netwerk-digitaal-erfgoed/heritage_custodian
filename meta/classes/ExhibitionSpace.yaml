    notes:
    - |
      Exhibition space, gallery, or display area operated by a heritage custodian
      at a location separate from the main facility.

      **DEFINITION**:

      An ExhibitionSpace is a dedicated area for displaying collections or
      exhibitions at a secondary location. This may be a satellite gallery,
      exhibition pavilion, temporary exhibition venue, or partner venue where
      the heritage custodian presents its collections.

      **GETTY AAT ALIGNMENT**:

      `aat:300005768` (exhibition spaces) - "Spaces designed and equipped for
      the display and viewing of objects, artworks, or specimens."

      **WIKIDATA TYPE LINKAGE**:

      This class can be further classified using either:

      1. **MuseumTypeEnum** (187 types) - For museum-style exhibition spaces:
         - Q3196771 (art museum - institution)
         - Q16735822 (history museum)
         - Q588140 (science museum)

      2. **GalleryTypeEnum** (78 types) - For gallery-style exhibition spaces:
         - Q1007870 (art gallery)
         - Q1060829 (exhibition hall)
         - Q856584 (kunsthalle)
    annotations:
      specificity_score: 0.45
      specificity_rationale: Place model for display infrastructure and visitor-facing facilities.
      custodian_types: '["*"]'
    comments:
