      - literal_form: 'Preserved from prior description: Event of content being published, following CIDOC-CRM activity pattern. MIGRATED from published_at datetime slot per Rule 53/56 (2026-01-17). **Why Event Wrapper?** - Enables fuzzy temporal boundaries (uncertainty in publication dates) - Supports multiple publication events (republications, versions) - Links to agents/locations involved in publication - Follows ontology best practices (CIDOC-CRM activity modeling) **USE CASES**: - Social media posts: Precise publication timestamp - Historical documents: "Published sometime in 1892" - Archival records: "Published between 1800-1805" **FOR PRECISE TIMESTAMPS**: Set all four TimeSpan boundaries to the same instant.'

