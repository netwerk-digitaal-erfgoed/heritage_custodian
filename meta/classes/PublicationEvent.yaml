id: https://nde.nl/ontology/hc/class/PublicationEvent
name: publication_event_class
title: Publication Event Class
description: 'Event representing the publication of content, following CIDOC-CRM event modeling. CREATED 2026-01-17 per Rule 53/56: Provides structured publication event representation instead of simple datetime. Enables rich temporal modeling including fuzzy date boundaries. Supports: - Social media posts with publication timestamps - Document publications with date ranges - Historical publications with uncertain dates'
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_score
- ../slots/temporal_extent
default_prefix: hc
classes:
  PublicationEvent:
    class_uri: crm:E7_Activity
    description: >-
      Formal activity marking the release or dissemination of a resource to a public or restricted audience.
    alt_descriptions:
      nl: >-
        Formele activiteit die de vrijgave of verspreiding van een bron naar een openbaar of beperkt publiek markeert.
      de: >-
        Formelle Aktivität, die die Veröffentlichung oder Verbreitung einer Ressource an ein öffentliches oder eingeschränktes Publikum markiert.
      fr: >-
        Activité formelle marquant la publication ou la diffusion d'une ressource à un public ou une audience restreinte.
      es: >-
        Actividad formal que marca el lanzamiento o difusión de un recurso a un público o audiencia restringida.
      ar: >-
