id: https://nde.nl/ontology/hc/class/MuseumArchiveRecordSetType
name: MuseumArchiveRecordSetType
title: Museum Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  MuseumArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: Record-set classifier for holdings typically managed by museum archive organizations.
    alt_descriptions:
      nl: Recordsetclassificatie voor collecties die doorgaans door museumarchieven worden beheerd.
      de: Recordset-Klassifikator fuer Bestaende die typischerweise von Museumsarchiven verwaltet werden.
      fr: Classificateur de lots documentaires pour fonds generalement geres par des archives de musee.
      es: Clasificador de conjuntos documentales para fondos gestionados habitualmente por archivos de museo.
      ar: مصنف مجموعات سجلات للمقتنيات التي تديرها عادة أرشيفات المتاحف.
      id: Pengklasifikasi record set untuk koleksi yang umumnya dikelola arsip museum.
      zh: 用于博物馆档案机构常见馆藏的记录集分类器。
    structured_aliases:
    - {literal_form: type museumarchiefrecordset, in_language: nl}
    - {literal_form: Typ Museumsarchiv-Recordset, in_language: de}
    - {literal_form: type de lot d archive de musee, in_language: fr}
    - {literal_form: tipo de conjunto de archivo de museo, in_language: es}
    - {literal_form: نوع مجموعة سجلات أرشيف متحفي, in_language: ar}
    - {literal_form: tipe record set arsip museum, in_language: id}
    - {literal_form: 博物馆档案记录集类型, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MuseumArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
