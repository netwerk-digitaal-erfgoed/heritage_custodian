id: https://nde.nl/ontology/hc/classes/SourceReference
name: SourceReference
title: Source Reference
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  oa: http://www.w3.org/ns/oa#
  dcterms: http://purl.org/dc/terms/
imports:
- linkml:types
# default_range: string
classes:
  SourceReference:
    description: >-
      Text-position selector used to reference and locate a specific passage within a source document for claim substantiation.
    alt_descriptions:
      nl: >-
        Tekstpositie-selector gebruikt om te verwijzen naar en lokaliseren van een specifieke passage
        binnen een brondocument voor claimonderbouwing.
      de: >-
        Textpositions-Selektor, der verwendet wird, um auf eine bestimmte Passage in einem Quelldokument
        zur Behauptungsuntermauerung zu verweisen und diese zu lokalisieren.
      fr: >-
        Sélecteur de position de texte utilisé pour référencer et localiser un passage spécifique
        dans un document source pour étayer une affirmation.
      es: >-
        Selector de posición de texto utilizado para referenciar y localizar un pasaje específico
        dentro de un documento fuente para fundamentar afirmaciones.
      ar: >-
        محدد موضع نص يُستخدم للإشارة إلى وتحديد موقع مقطع معين
        ضمن مستند مصدر لتأكيد الادعاء.
      id: >-
        Pemilih posisi teks yang digunakan untuk mereferensikan dan menemukan lokasi bagian tertentu
        dalam dokumen sumber untuk mendukung klaim.
      zh: >-
        用于引用和定位源文档中特定段落以支持主张的文本位置选择器。
    structured_aliases:
    - literal_form: bronverwijzing
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Quellenverweis
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: référence de source
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: referencia de fuente
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مرجع المصدر
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: referensi sumber
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 来源引用
      predicate: EXACT_SYNONYM
      in_language: zh
    class_uri: oa:TextPositionSelector
    broad_mappings:
    - oa:TextPositionSelector
    close_mappings:
    - prov:PrimarySource
    - dcterms:BibliographicResource
    related_mappings:
    - schema:Quotation
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
    comments:
    - Intended for fine-grained source references (e.g., excerpt + character offsets) when such fields are modeled.
    - 'Preserved from prior description: Text-position selector used to reference a source passage for a claim.'
    keywords:
    - text selector
    - passage reference
    - citation anchor
    - source定位
