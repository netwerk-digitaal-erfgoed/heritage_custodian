id: https://nde.nl/ontology/hc/class/UNESCOListStatus
name: UNESCOListStatus
title: UNESCO List Status
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_code
classes:
  UNESCOListStatus:
    class_uri: skos:Concept
    description: >-
      Controlled inclusion state assigned within international heritage
      programmes, including inscription, nomination, referral, or removal.
    alt_descriptions:
      nl: Gecontroleerde lijststatus binnen UNESCO-erfgoedprogramma's, waaronder inschrijving, nominatie, verwijzing of verwijdering.
      de: Kontrollierter Listenstatus in UNESCO-Erbeprogrammen, einschliesslich Einschreibung, Nominierung, Rueckverweisung oder Streichung.
      fr: Etat controle attribue dans les programmes patrimoniaux de l UNESCO, incluant inscription, candidature, renvoi ou retrait.
      es: Estado controlado asignado en programas patrimoniales de la UNESCO, incluyendo inscripcion, nominacion, remision o retirada.
      ar: حالة إدراج مضبوطة ضمن برامج اليونسكو للتراث، تشمل الإدراج أو الترشيح أو الإحالة أو الشطب.
      id: Status daftar terkontrol dalam program warisan UNESCO, termasuk inskripsi, nominasi, rujukan, atau penghapusan.
      zh: UNESCO遗产项目中的受控名录状态，包括列入、提名、退回或移除等结果。
    structured_aliases:
    - literal_form: UNESCO-lijststatus
      in_language: nl
    - literal_form: UNESCO-Listenstatus
      in_language: de
    - literal_form: statut de liste UNESCO
      in_language: fr
    - literal_form: estado de lista UNESCO
      in_language: es
    - literal_form: حالة قائمة اليونسكو
      in_language: ar
    - literal_form: status daftar UNESCO
      in_language: id
    - literal_form: UNESCO名录状态
      in_language: zh
    slots:
    - has_code
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: '0.60'
      specificity_rationale: More specific - UNESCO status heritage-domain.
      custodian_types: '[''*'']'
    examples:
    - value:
        has_code: INSCRIBED
        list_name: Representative List of ICH
        inscription_date: '2023-12-06'
      description: UNESCO ICH inscription status
