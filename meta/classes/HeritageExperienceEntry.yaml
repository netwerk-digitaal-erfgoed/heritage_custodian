id: https://nde.nl/ontology/hc/classes/HeritageExperienceEntry
name: HeritageExperienceEntry
title: HeritageExperienceEntry
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  org: http://www.w3.org/ns/org#
imports:
- linkml:types
# default_range: string
classes:
  HeritageExperienceEntry:
    is_a: Entity
    description: >-
      Work-history entry describing professional roles, responsibilities, or
      projects within heritage-sector contexts.
    alt_descriptions:
      nl: Werkervaringsitem dat professionele rollen verantwoordelijkheden of projecten binnen erfgoedcontexten beschrijft.
      de: Berufsverlaufs-Eintrag fuer Rollen Verantwortlichkeiten oder Projekte in Kulturerbe-Kontexten.
      fr: Entree d experience professionnelle decrivant des roles responsabilites ou projets dans des contextes patrimoniaux.
      es: Entrada de experiencia laboral que describe funciones responsabilidades o proyectos en contextos patrimoniales.
      ar: مدخل خبرة مهنية يصف الأدوار أو المسؤوليات أو المشاريع ضمن سياقات قطاع التراث.
      id: Entri riwayat kerja yang menjelaskan peran tanggung jawab atau proyek dalam konteks sektor warisan.
      zh: 描述遗产领域职业角色、职责或项目的工作经历条目。
    structured_aliases:
    - {literal_form: erfgoed werkervaring, in_language: nl}
    - {literal_form: Kulturerbe-Berufserfahrungseintrag, in_language: de}
    - {literal_form: entree d experience patrimoniale, in_language: fr}
    - {literal_form: entrada de experiencia patrimonial, in_language: es}
    - {literal_form: مدخل خبرة تراثية, in_language: ar}
    - {literal_form: entri pengalaman kerja warisan, in_language: id}
    - {literal_form: 遗产领域经历条目, in_language: zh}
    class_uri: org:Membership
    close_mappings:
    - schema:OrganizationRole
    related_mappings:
    - prov:Entity
    - schema:Occupation
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '["*"]'
    slots:
    - has_type
