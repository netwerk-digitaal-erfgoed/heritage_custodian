classes:
  StateArchivesSection:
    description: >-
      Local branch or division of a national archival system providing regional
      access to archival services and preserving locally significant records.
    alt_descriptions:
      nl: >-
        Lokale afdeling of divisie van een nationaal archiefsysteem dat regionale
        toegang tot archiefdiensten biedt en lokaal significante archieven bewaart.
      de: >-
        Lokale Zweigstelle oder Abteilung eines nationalen Archivsystems, die regionalen
        Zugang zu Archivdiensten bietet und lokal bedeutsame Unterlagen bewahrt.
      fr: >-
        Succursale locale ou division d'un système archivistique national fournissant
        un accès régional aux services d'archives et préservant des documents d'importance locale.
      es: >-
        Sucursal local o división de un sistema archivístico nacional que proporciona
        acceso regional a servicios de archivos y preserva registros de importancia local.
      ar: >-
        فرع محلي أو قسم من نظام أرشيف وطني يوفر وصولاً إقليمياً
        إلى الخدمات الأرشيفية ويحفظ السجلات ذات الأهمية المحلية.
      id: >-
        Cabang lokal atau divisi sistem arsip nasional yang menyediakan akses regional
        ke layanan arsip dan melestarikan catatan signifikan secara lokal.
      zh: >-
        国家档案系统的本地分支或部门，提供区域档案服务访问并保存具有地方重要性的记录。
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    close_mappings:
      - wd:Q44796387
      - rico:CorporateBody
    broad_mappings:
      - wd:Q166118
      - skos:Concept
    keywords:
      - state archives section
      - archive branch
      - regional archive office
    structured_aliases:
      - literal_form: sectie staatsarchief
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Staatsarchiv-Abteilung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: sezione di archivio di Stato
        predicate: EXACT_SYNONYM
        in_language: it
    slots:
      - has_type
      - hold_record_set
      - has_score
      - related_to
      - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
      related_to:
        range: WikidataAlignment
        inlined: true
    see_also:
      - StateArchives
      - NationalArchives
      - RegionalArchive
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '["*"]'
