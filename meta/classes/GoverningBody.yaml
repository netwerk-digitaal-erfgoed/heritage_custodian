id: https://nde.nl/ontology/hc/class/GoverningBody
name: GoverningBody
title: Governing Body Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  schema: http://schema.org/
  cpov: http://data.europa.eu/m8g/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_name
classes:
  GoverningBody:
    class_uri: org:Organization
    description: >-
      Institutional authority responsible for establishing policy, oversight, and
      strategic direction for an organization.
    alt_descriptions:
      nl: >-
        Institutionele autoriteit verantwoordelijk voor het vaststellen van beleid, toezicht
        en strategische koers voor een organisatie.
      de: >-
        Institutionelle Autorität, die für die Festlegung von Richtlinien, Aufsicht
        und strategische Ausrichtung einer Organisation verantwortlich ist.
      fr: >-
        Autorité institutionnelle chargée d'établir la politique, la supervision
        et l'orientation stratégique d'une organisation.
      es: >-
        Autoridad institucional responsable de establecer políticas, supervisión
        y dirección estratégica para una organización.
      ar: >-
        سلطة مؤسسية مسؤولة عن وضع السياسات والإشراف
        والتوجه الاستراتيجي لمنظمة.
      id: >-
        Otoritas institusional yang bertanggung jawab untuk menetapkan kebijakan, pengawasan,
        dan arah strategis untuk sebuah organisasi.
      zh: >-
        负责制定政策、监督和战略方向的组织机构权威。
    structured_aliases:
    - literal_form: bestuursorgaan
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Verwaltungsgremium
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: organe de gouvernance
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: órgano rector
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: هيئة حاكمة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: badan pengurus
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 管理机构
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - org:Organization
    close_mappings:
    - cpov:PublicOrganisation
    - rico:CorporateBody
    - schema:Organization
    slots:
    - identified_by
    - has_name
    comments:
    - Represents board structures, supervisory councils, and governing committees.
    - Used for attribution of institutional authority and accountability.
    - 'Preserved from prior description: Body responsible for establishing and governing an entity.'
    keywords:
    - institutional authority
    - governance structure
    - oversight body
    - board organization
    examples:
    - value:
        has_name: Board of Trustees
      description: Governing body for museum institution
    annotations:
      specificity_score: 0.45
      specificity_rationale: Governance body model for institutional authority attribution.
      custodian_types: '["*"]'
