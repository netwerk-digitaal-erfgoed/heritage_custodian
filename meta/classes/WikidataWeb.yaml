id: https://nde.nl/ontology/hc/classes/WikidataWeb
name: WikidataWeb
title: Wikidata Web Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  foaf: http://xmlns.com/foaf/0.1/
  dcterms: http://purl.org/dc/terms/
imports:
  - linkml:types
classes:
  WikidataWeb:
    description: >-
      Online presence endpoints such as official sites, descriptive pages, and
      blog addresses.
    alt_descriptions:
      nl: >-
        Webpresence-informatie uit Wikidata inclusief officiële website-URL's (P856),
        beschrijvings-URL's (P973) en officiële blog-URL's (P1581) voor institutionele online aanwezigheid.
      de: >-
        Webpräsenz-Informationen aus Wikidata einschließlich offizieller Website-URLs (P856),
        Beschreibungs-URLs (P973) und offizieller Blog-URLs (P1581) für institutionelle Online-Präsenz.
      fr: >-
        Informations de présence web de Wikidata incluant les URLs de site officiel (P856),
        URLs de description (P973) et URLs de blog officiel (P1581) pour la présence en ligne institutionnelle.
      es: >-
        Información de presencia web de Wikidata incluyendo URLs de sitio web oficial (P856),
        URLs de descripción (P973) y URLs de blog oficial (P1581) para presencia en línea institucional.
      ar: >-
        معلومات التواجد على الويب من ويكي بيانات تشمل عناوين URL للموقع الرسمي (P856)
        وعناوين URL للوصف (P973) وعناوين URL للمدونة الرسمية (P1581) للتواجد المؤسسي عبر الإنترنت.
      id: >-
        Informasi kehadiran web dari Wikidata termasuk URL situs web resmi (P856),
        URL deskripsi (P973), dan URL blog resmi (P1581) untuk kehadiran online kelembagaan.
      zh: >-
        来自维基数据的网络存在信息，包括官方网站URL(P856)、
        描述URL(P973)和官方博客URL(P1581)，用于机构在线存在。
    close_mappings:
      - foaf:Document
    related_mappings:
      - schema:WebSite
      - prov:Entity
      - schema:Organization
    slots: []
    comments:
      - Aggregates web presence information (websites, blogs, description pages)
      - Supports multiple URLs per property
    keywords:
      - wikidata
      - web
      - website
      - url
      - online presence
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for web presence data extraction
      custodian_types: "['*']"
      wikidata_property_ids: '["P856","P973","P1581"]'
    structured_aliases:
      - literal_form: wikidata-web
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Wikidata-Web
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: web Wikidata
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: web Wikidata
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: ويب ويكي بيانات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: web Wikidata
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 维基数据网站信息
        predicate: EXACT_SYNONYM
        in_language: zh
