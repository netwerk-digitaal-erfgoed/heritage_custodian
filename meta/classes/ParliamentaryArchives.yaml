classes:
  ParliamentaryArchives:
    description: >-
      Archival organization preserving records generated by legislative bodies, including
      debates, bills, committee proceedings, and official parliamentary documentation.
    alt_descriptions:
      nl: >-
        Archiefinstelling die archieven bewaart die door wetgevende organen zijn geproduceerd, inclusief
        debatten, wetsontwerpen, commissieprocedures en officiële parlementaire documentatie.
      de: >-
        Archivinstitution, die von Gesetzgebungsorganen erzeugte Unterlagen bewahrt, einschließlich
        Debatten, Gesetzentwürfen, Ausschussverfahren und offizieller parlamentarischer Dokumentation.
      fr: >-
        Organisation archivistique préservant les documents produits par les organes législatifs, y compris
        les débats, projets de loi, procédures de commission et documentation parlementaire officielle.
      es: >-
        Organización archivística que preserva registros generados por órganos legislativos, incluyendo
        debates, proyectos de ley, procedimientos de comités y documentación parlamentaria oficial.
      ar: >-
        منظمة أرشيفية تحافظ على السجلات التي أنتجها الهيئات التشريعية، بما في ذلك
        المناقشات ومشاريع القوانين وإجراءات اللجان والوثائق البرلمانية الرسمية.
      id: >-
        Organisasi arsip yang melestarikan catatan yang dihasilkan oleh badan legislatif, termasuk
        debat, rancangan undang-undang, prosedur komite, dan dokumentasi parlemen resmi.
      zh: >-
        保存立法机构产生的记录的档案机构，包括辩论、法案、委员会程序和官方议会文件。
    structured_aliases:
    - literal_form: parlementaire archieven
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Parlamentsarchive
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: archives parlementaires
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: archivos parlamentarios
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: الأرشيفات البرلمانية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip parlemen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 议会档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - wd:Q53251146
    broad_mappings:
    - schema:ArchiveOrganization
    - wd:Q166118
    slot_usage:
      identified_by:
    annotations:
      skos:prefLabel: Parliamentary Archives
      skos:altLabel: Parlamentsarchiv, archivo parlamentario, archives parlementaires, Legislative Archives
      subject_domain: political/legislative
      custodian_status: governmental
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - PoliticalArchive
    - GovernmentArchive
    - NationalArchives
    comments:
    - Preserves legislative and parliamentary records essential for political and constitutional history.
    - Often maintained by parliament itself as institutional archives.
    - 'Preserved from prior description: Archive organization preserving records of parliaments and legislative bodies, including debates, bills, and committee documentation.'
    keywords:
    - legislative archives
    - parliamentary records
    - political documentation
    - legislative history
