id: https://nde.nl/ontology/hc/class/ThreatTypes
name: ThreatTypes
title: Threat Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- ./ThreatType
- linkml:types
classes:
  UrbanizationThreat:
    is_a: ThreatType
    class_uri: hc:UrbanizationThreat
    description: >-
      Urban development and modernization disrupting traditional practices and physical heritage sites.
    alt_descriptions:
      nl: Stedelijke ontwikkeling en modernisering die traditionele praktijken en fysieke erfgoedsites verstoren.
      de: Stadtentwicklung und Modernisierung, die traditionelle Praktiken und physische Erbestätten stören.
      fr: Développement urbain et modernisation perturbant les pratiques traditionnelles et les sites patrimoniaux physiques.
      es: Desarrollo urbano y modernización que interrumpen prácticas tradicionales y sitios patrimoniales físicos.
      ar: التنمية الحضرية والتحديث اللذان يعطلان الممارسات التقليدية ومواقع التراث المادي.
      id: Pembangunan perkotaan dan modernisasi yang mengganggu praktik tradisional dan situs warisan fisik.
      zh: 城市发展和现代化打乱传统做法和物质遗产遗址。
    structured_aliases:
    - literal_form: verstedelijking
      in_language: nl
    - literal_form: Urbanisierung
      in_language: de
    - literal_form: urbanisation
      in_language: fr
    - literal_form: urbanización
      in_language: es
    - literal_form: تحضر
      in_language: ar
    - literal_form: urbanisasi
      in_language: id
    - literal_form: 城市化
      in_language: zh
    keywords:
    - urbanization
    - development
    - modernization
    - disruption
    - physical heritage
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  GlobalizationThreat:
    is_a: ThreatType
    class_uri: hc:GlobalizationThreat
    description: >-
      Global integration and cultural homogenization eroding local traditions and practices.
    alt_descriptions:
      nl: Wereldwijde integratie en culturele homogenisering die lokale tradities en praktijken aantasten.
      de: Globale Integration und kulturelle Homogenisierung, die lokale Traditionen und Praktiken untergraben.
      fr: Intégration mondiale et homogénéisation culturelle érodant les traditions et pratiques locales.
      es: Integración global y homogeneización cultural que erosionan tradiciones y prácticas locales.
      ar: التكامل العالمي والتجانس الثقافي اللذان يقوضان التقاليد والممارسات المحلية.
      id: Integrasi global dan homogenisasi budaya yang mengikis tradisi dan praktik lokal.
      zh: 全球一体化和文化同质化侵蚀地方传统和做法。
    structured_aliases:
    - literal_form: globalisering
      in_language: nl
    - literal_form: Globalisierung
      in_language: de
    - literal_form: mondialisation
      in_language: fr
    - literal_form: globalización
      in_language: es
    - literal_form: عولمة
      in_language: ar
    - literal_form: globalisasi
      in_language: id
    - literal_form: 全球化
      in_language: zh
    keywords:
    - globalization
    - cultural homogenization
    - local traditions
    - erosion
    - integration
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  EconomicPressureThreat:
    is_a: ThreatType
    class_uri: hc:EconomicPressureThreat
    description: >-
      Financial constraints and market forces affecting heritage authenticity and preservation.
    alt_descriptions:
      nl: Financiële beperkingen en marktkrachten die de authenticiteit en behoud van erfgoed beïnvloeden.
      de: Finanzielle Zwänge und Marktkräfte, die die Authentizität und Erhaltung des Erbes beeinträchtigen.
      fr: Contraintes financières et forces du marché affectant l'authenticité et la préservation du patrimoine.
      es: Restricciones financieras y fuerzas del mercado que afectan la autenticidad y preservación del patrimonio.
      ar: القيود المالية وقوى السوق التي تؤثر على أصالة التراث والحفاظ عليه.
      id: Kendala keuangan dan kekuatan pasar yang memengaruhi keaslian dan pelestarian warisan.
      zh: 影响遗产真实性和保护的财政限制和市场力量。
    structured_aliases:
    - literal_form: economische druk
      in_language: nl
    - literal_form: wirtschaftlicher Druck
      in_language: de
    - literal_form: pression économique
      in_language: fr
    - literal_form: presión económica
      in_language: es
    - literal_form: ضغط اقتصادي
      in_language: ar
    - literal_form: tekanan ekonomi
      in_language: id
    - literal_form: 经济压力
      in_language: zh
    keywords:
    - economic pressure
    - financial constraints
    - market forces
    - authenticity
    - preservation
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  PractitionerLossThreat:
    is_a: ThreatType
    class_uri: hc:PractitionerLossThreat
    description: >-
      Risk category concerning erosion of bearer communities and skilled knowledge carriers.
    alt_descriptions:
      nl: Afname van bekwame beoefenaars door veroudering, overlijden of loopbaanveranderingen.
      de: Rückgang qualifizierter Praktiker durch Alterung, Tod oder Karrierewechsel.
      fr: Diminution des praticiens qualifiés due au vieillissement, au décès ou aux changements de carrière.
      es: Disminución de practicantes calificados debido al envejecimiento, fallecimiento o cambios de carrera.
      ar: تناقص الممارسين المهرة بسبب الشيخوخة أو الوفاة أو تغييرات المهنة.
      id: Penurunan praktisi terampil karena penuaan, kematian, atau perubahan karier.
      zh: 因老龄化、死亡或职业变更而导致熟练从业者减少。
    structured_aliases:
    - literal_form: verlies van beoefenaars
      in_language: nl
    - literal_form: Verlust von Praktikern
      in_language: de
    - literal_form: perte de praticiens
      in_language: fr
    - literal_form: pérdida de practicantes
      in_language: es
    - literal_form: فقدان الممارسين
      in_language: ar
    - literal_form: kehilangan praktisi
      in_language: id
    - literal_form: 从业者流失
      in_language: zh
    keywords:
    - practitioner loss
    - skilled knowledge
    - bearer communities
    - aging
    - knowledge carriers
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  TransmissionGapThreat:
    is_a: ThreatType
    class_uri: hc:TransmissionGapThreat
    description: >-
      Interruption in knowledge and skill transfer to younger generations.
    alt_descriptions:
      nl: Onderbreking van de overdracht van kennis en vaardigheden aan jongere generaties.
      de: Unterbrechung der Weitergabe von Wissen und Fähigkeiten an jüngere Generationen.
      fr: Interruption de la transmission des connaissances et compétences aux jeunes générations.
      es: Interrupción en la transferencia de conocimientos y habilidades a las generaciones más jóvenes.
      ar: انقطاع نقل المعرفة والمهارات إلى الأجيال الشابة.
      id: Terputusnya transfer pengetahuan dan keterampilan ke generasi muda.
      zh: 向年轻一代传授知识和技能的中断。
    structured_aliases:
    - literal_form: overdrachtshiaat
      in_language: nl
    - literal_form: Übertragungslücke
      in_language: de
    - literal_form: rupture de transmission
      in_language: fr
    - literal_form: brecha de transmisión
      in_language: es
    - literal_form: فجوة النقل
      in_language: ar
    - literal_form: kesenjangan transmisi
      in_language: id
    - literal_form: 传承断层
      in_language: zh
    keywords:
    - transmission gap
    - knowledge transfer
    - skill transfer
    - younger generations
    - intergenerational
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  FundingThreat:
    is_a: ThreatType
    class_uri: hc:FundingThreat
    description: >-
      Inadequate financial resources and institutional support for heritage preservation.
    alt_descriptions:
      nl: Onvoldoende financiële middelen en institutionele steun voor erfgoedbehoud.
      de: Unzureichende finanzielle Mittel und institutionelle Unterstützung für die Erhaltung des Erbes.
      fr: Ressources financières et soutien institutionnel insuffisants pour la préservation du patrimoine.
      es: Recursos financieros insuficientes y apoyo institucional inadecuado para la preservación del patrimonio.
      ar: الموارد المالية غير الكافية والدعم المؤسسي غير الملائم للحفاظ على التراث.
      id: Sumber daya keuangan yang tidak memadai dan dukungan institusional untuk pelestarian warisan.
      zh: 遗产保护资金不足和机构支持不够。
    structured_aliases:
    - literal_form: financieringstekort
      in_language: nl
    - literal_form: Finanzierungsmangel
      in_language: de
    - literal_form: manque de financement
      in_language: fr
    - literal_form: amenaza de financiación
      in_language: es
    - literal_form: تهديد التمويل
      in_language: ar
    - literal_form: ancaman pendanaan
      in_language: id
    - literal_form: 资金威胁
      in_language: zh
    keywords:
    - funding
    - financial resources
    - institutional support
    - preservation
    - inadequate resources
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  PolicyThreat:
    is_a: ThreatType
    class_uri: hc:PolicyThreat
    description: >-
      Unfavorable regulations, policies, or lack of legal protection mechanisms.
    alt_descriptions:
      nl: Ongunstige regelgeving, beleid of gebrek aan wettelijke beschermingsmechanismen.
      de: Ungünstige Vorschriften, Richtlinien oder mangelnder rechtlicher Schutz.
      fr: Réglementations défavorables, politiques ou manque de mécanismes de protection juridique.
      es: Regulaciones desfavorables, políticas o falta de mecanismos de protección legal.
      ar: اللوائح غير المواتية أو السياسات أو نقص آليات الحماية القانونية.
      id: Peraturan yang tidak menguntungkan, kebijakan, atau kurangnya mekanisme perlindungan hukum.
      zh: 不利的法规、政策或缺乏法律保护机制。
    structured_aliases:
    - literal_form: beleidsbedreiging
      in_language: nl
    - literal_form: politische Bedrohung
      in_language: de
    - literal_form: menace politique
      in_language: fr
    - literal_form: amenaza de política
      in_language: es
    - literal_form: تهديد سياسي
      in_language: ar
    - literal_form: ancaman kebijakan
      in_language: id
    - literal_form: 政策威胁
      in_language: zh
    keywords:
    - policy
    - regulations
    - legal protection
    - unfavorable
    - mechanisms
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  ClimateChangeThreat:
    is_a: ThreatType
    class_uri: hc:ClimateChangeThreat
    description: >-
      Environmental shifts and degradation caused by global climate change.
    alt_descriptions:
      nl: Milieuveranderingen en -degradatie veroorzaakt door klimaatverandering.
      de: Umweltveränderungen und -verschlechterung durch den Klimawandel.
      fr: Changements environnementaux et dégradation dus au changement climatique.
      es: Cambios ambientales y degradación causados por el cambio climático global.
      ar: التحولات البيئية والتدهور الناجم عن تغير المناخ العالمي.
      id: Perubahan lingkungan dan degradasi yang disebabkan oleh perubahan iklim global.
      zh: 全球气候变化引起的环境变化和退化。
    structured_aliases:
    - literal_form: klimaatverandering
      in_language: nl
    - literal_form: Klimawandel
      in_language: de
    - literal_form: changement climatique
      in_language: fr
    - literal_form: cambio climático
      in_language: es
    - literal_form: تغير المناخ
      in_language: ar
    - literal_form: perubahan iklim
      in_language: id
    - literal_form: 气候变化
      in_language: zh
    keywords:
    - climate change
    - environmental shifts
    - degradation
    - global warming
    - environmental
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  NaturalDisasterThreat:
    is_a: ThreatType
    class_uri: hc:NaturalDisasterThreat
    description: >-
      Catastrophic events including floods, earthquakes, fires, and storms.
    alt_descriptions:
      nl: Catastrofale natuurlijke gebeurtenissen zoals overstromingen, aardbevingen, branden en stormen.
      de: Katastrophale Naturereignisse wie Überschwemmungen, Erdbeben, Brände und Stürme.
      fr: Événements naturels catastrophiques tels qu'inondations, séismes, incendies et tempêtes.
      es: Eventos catastróficos naturales como inundaciones, terremotos, incendios y tormentas.
      ar: أحداث كارثية طبيعية تشمل الفيضانات والزلازل والحرائق والعواصف.
      id: Peristiwa bencana alam termasuk banjir, gempa bumi, kebakaran, dan badai.
      zh: 包括洪水、地震、火灾和风暴在内的灾难性自然灾害。
    structured_aliases:
    - literal_form: natuurramp
      in_language: nl
    - literal_form: Naturkatastrophe
      in_language: de
    - literal_form: catastrophe naturelle
      in_language: fr
    - literal_form: desastre natural
      in_language: es
    - literal_form: كارثة طبيعية
      in_language: ar
    - literal_form: bencana alam
      in_language: id
    - literal_form: 自然灾害
      in_language: zh
    keywords:
    - natural disaster
    - floods
    - earthquakes
    - fires
    - storms
    - catastrophic
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  ArmedConflictThreat:
    is_a: ThreatType
    class_uri: hc:ArmedConflictThreat
    description: >-
      Warfare, military operations, and political instability endangering heritage.
    alt_descriptions:
      nl: Oorlogvoering, militaire operaties en politieke instabiliteit die erfgoed in gevaar brengen.
      de: Kriegsführung, militärische Operationen und politische Instabilität, die das Erbe gefährden.
      fr: Guerre, opérations militaires et instabilité politique menaçant le patrimoine.
      es: Guerra, operaciones militares e inestabilidad política que ponen en peligro el patrimonio.
      ar: الحرب والعمليات العسكرية وعدم الاستقرار السياسي الذي يهدد التراث.
      id: Perang, operasi militer, dan ketidakstabilan politik yang membahayakan warisan.
      zh: 危及遗产的战争、军事行动和政治动荡。
    structured_aliases:
    - literal_form: gewapend conflict
      in_language: nl
    - literal_form: bewaffneter Konflikt
      in_language: de
    - literal_form: conflit armé
      in_language: fr
    - literal_form: conflicto armado
      in_language: es
    - literal_form: صراع مسلح
      in_language: ar
    - literal_form: konflik bersenjata
      in_language: id
    - literal_form: 武装冲突
      in_language: zh
    keywords:
    - armed conflict
    - warfare
    - military operations
    - political instability
    - endangering
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  PersecutionThreat:
    is_a: ThreatType
    class_uri: hc:PersecutionThreat
    description: >-
      Systematic oppression, discrimination, or suppression of heritage practitioners and traditions.
    alt_descriptions:
      nl: Systematische onderdrukking, discriminatie of suppressie van erfgoedbeoefenaars en tradities.
      de: Systematische Unterdrückung, Diskriminierung oder Unterdrückung von Erbepraktikern und Traditionen.
      fr: Oppression systématique, discrimination ou suppression des praticiens et traditions du patrimoine.
      es: Opresión sistemática, discriminación o supresión de practicantes y tradiciones patrimoniales.
      ar: الاضطهاد المنهجي أو التمييز أو قمع ممارسي التراث والتقاليد.
      id: Penindasan sistematis, diskriminasi, atau penekanan terhadap praktisi warisan dan tradisi.
      zh: 对遗产从业者和传统的系统性压迫、歧视或压制。
    structured_aliases:
    - literal_form: vervolging
      in_language: nl
    - literal_form: Verfolgung
      in_language: de
    - literal_form: persécution
      in_language: fr
    - literal_form: persecución
      in_language: es
    - literal_form: اضطهاد
      in_language: ar
    - literal_form: penganiayaan
      in_language: id
    - literal_form: 迫害
      in_language: zh
    keywords:
    - persecution
    - oppression
    - discrimination
    - suppression
    - practitioners
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  DeteriorationThreat:
    is_a: ThreatType
    class_uri: hc:DeteriorationThreat
    description: >-
      Physical decay, structural damage, or material degradation over time.
    alt_descriptions:
      nl: Fysiek verval, structurele schade of materiaalafbraak in de loop der tijd.
      de: Physischer Verfall, strukturelle Schäden oder Materialabbau im Laufe der Zeit.
      fr: Dégradation physique, dommages structurels ou détérioration des matériaux au fil du temps.
      es: Deterioro físico, daño estructural o degradación de materiales con el tiempo.
      ar: التدهور المادي أو الضرر الهيكلي أو تدهور المواد بمرور الوقت.
      id: Kerusakan fisik, kerusakan struktural, atau degradasi material seiring waktu.
      zh: 随时间发生的物理衰变、结构损坏或材料退化。
    structured_aliases:
    - literal_form: verval
      in_language: nl
    - literal_form: Verfall
      in_language: de
    - literal_form: détérioration
      in_language: fr
    - literal_form: deterioro
      in_language: es
    - literal_form: تدهور
      in_language: ar
    - literal_form: deteriorasi
      in_language: id
    - literal_form: 劣化
      in_language: zh
    keywords:
    - deterioration
    - physical decay
    - structural damage
    - material degradation
    - over time
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  VandalismThreat:
    is_a: ThreatType
    class_uri: hc:VandalismThreat
    description: >-
      Intentional destruction, theft, or malicious damage to heritage assets.
    alt_descriptions:
      nl: Opzettelijke vernieling, diefstal of kwaadwillige schade aan erfgoed.
      de: Vorsätzliche Zerstörung, Diebstahl oder böswillige Beschädigung von Kulturerbe.
      fr: Destruction intentionnelle, vol ou dommage malveillant au patrimoine.
      es: Destrucción intencional, robo o daño malicioso a bienes patrimoniales.
      ar: التدمير المتعمد أو السرقة أو الأضرار الخبيثة للأصول التراثية.
      id: Penghancuran sengaja, pencurian, atau kerusakan berbahaya terhadap aset warisan.
      zh: 对遗产资产的故意破坏、盗窃或恶意损坏。
    structured_aliases:
    - literal_form: vandalisme
      in_language: nl
    - literal_form: Vandalismus
      in_language: de
    - literal_form: vandalisme
      in_language: fr
    - literal_form: vandalismo
      in_language: es
    - literal_form: تخريب
      in_language: ar
    - literal_form: vandalisme
      in_language: id
    - literal_form: 破坏
      in_language: zh
    keywords:
    - vandalism
    - intentional destruction
    - theft
    - malicious damage
    - heritage assets
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
  DevelopmentThreat:
    is_a: ThreatType
    class_uri: hc:DevelopmentThreat
    description: >-
      Construction projects, land use changes, and infrastructure pressures.
    alt_descriptions:
      nl: Bouwprojecten, landgebruikswijzigingen en ontwikkelingsdruk door infrastructuur.
      de: Bauprojekte, Landnutzungsänderungen und Infrastrukturentwicklungsdruck.
      fr: Projets de construction, changements d'utilisation des terres et pressions de développement.
      es: Proyectos de construcción, cambios de uso del suelo y presiones de desarrollo de infraestructura.
      ar: مشاريع البناء وتغييرات استخدام الأراضي وضغوط تطوير البنية التحتية.
      id: Proyek konstruksi, perubahan penggunaan lahan, dan tekanan pengembangan infrastruktur.
      zh: 建筑项目、土地用途变更和基础设施开发压力。
    structured_aliases:
    - literal_form: ontwikkelingsdruk
      in_language: nl
    - literal_form: Entwicklungsdruck
      in_language: de
    - literal_form: pression de développement
      in_language: fr
    - literal_form: amenaza de desarrollo
      in_language: es
    - literal_form: تهديد التنمية
      in_language: ar
    - literal_form: ancaman pembangunan
      in_language: id
    - literal_form: 开发威胁
      in_language: zh
    keywords:
    - development
    - construction projects
    - land use changes
    - infrastructure
    - pressures
    annotations:
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E3_Condition_State
    - skos:Concept
    - crm:E55_Type
