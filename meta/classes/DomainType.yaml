id: https://nde.nl/ontology/hc/class/DomainType
name: DomainType
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  DomainType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract classification for subject-matter categories, thematic areas, and knowledge domains covered by collections.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor onderwerpcategorieën, thematische gebieden en kennisdomeinen die door collecties worden gedekt.
      de: >-
        Abstrakte Klassifikation für Themenkategorien, thematische Bereiche und Wissensgebiete, die von Sammlungen abgedeckt werden.
      fr: >-
        Classification abstraite pour les catégories de sujets, les domaines thématiques et les domaines de connaissances couverts par les collections.
      es: >-
        Clasificación abstracta para categorías de temas, áreas temáticas y dominios de conocimiento cubiertos por colecciones.
      ar: >-
        تصنيف تجريدي لفئات الموضوعات والمجالات المواضيعية ومجالات المعرفة التي تغطيها المجموعات.
      id: >-
        Klasifikasi abstrak untuk kategori subjek, area tematis, dan domain pengetahuan yang dicakup oleh koleksi.
      zh: >-
        藏品涵盖的主题类别、主题领域和知识领域的抽象分类。
