id: https://nde.nl/ontology/hc/class/EducationFacilityType
name: EducationFacilityType
title: Education Facility Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
classes:
  EducationFacilityType:
    class_uri: skos:Concept
    description: >-
      Taxonomy concept used to classify educational facility profiles in
      custodian data.
    alt_descriptions:
      nl: Taxonomieconcept voor classificatie van profielen van onderwijsvoorzieningen in instellingsdata.
      de: Taxonomiekonzept zur Klassifikation von Profilen von Bildungseinrichtungen in Institutionsdaten.
      fr: Concept taxonomique pour classifier les profils de structures educatives dans les donnees institutionnelles.
      es: Concepto taxonomico para clasificar perfiles de instalaciones educativas en datos institucionales.
      ar: مفهوم تصنيفي لتصنيف ملفات مرافق التعليم في بيانات المؤسسة.
      id: Konsep taksonomi untuk mengklasifikasikan profil fasilitas pendidikan dalam data institusi.
      zh: 用于对机构数据中教育设施画像进行分类的分类学概念。
    structured_aliases:
    - {literal_form: type onderwijsvoorziening, in_language: nl}
    - {literal_form: Bildungseinrichtungstyp, in_language: de}
    - {literal_form: type de structure educative, in_language: fr}
    - {literal_form: tipo de instalacion educativa, in_language: es}
    - {literal_form: نوع مرفق تعليمي, in_language: ar}
    - {literal_form: tipe fasilitas pendidikan, in_language: id}
    - {literal_form: 教育设施类型, in_language: zh}
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:DefinedTerm
    slots:
    - has_label
    - identified_by
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.7
      specificity_rationale: Classification for education centers.
