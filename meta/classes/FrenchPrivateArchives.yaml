id: https://w3id.org/nde/ontology/FrenchPrivateArchives
name: FrenchPrivateArchives
title: French Private Archives
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  wd: http://www.wikidata.org/entity/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../classes/ArchiveOrganizationType
  - ../slots/identified_by
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/hold_record_set
classes:
  FrenchPrivateArchives:
    class_uri: hc:FrenchPrivateArchives
    is_a: ArchiveOrganizationType
    description: >-
      Private archival institution category in the French legal context, covering
      non-public custodians such as families, associations, foundations, and firms.
    alt_descriptions:
      nl: Categorie van particuliere archiefinstellingen binnen de Franse rechtscontext, inclusief families, verenigingen, stichtingen en bedrijven.
      de: Kategorie privater Archiveinrichtungen im franzoesischen Rechtskontext, einschliesslich Familien, Vereinen, Stiftungen und Unternehmen.
      fr: Categorie d'institutions d'archives privees dans le contexte juridique francais, incluant familles, associations, fondations et entreprises.
      es: Categoria de instituciones archivisticas privadas en el marco juridico frances, incluidas familias, asociaciones, fundaciones y empresas.
      ar: فئة مؤسسات الأرشيف الخاص في السياق القانوني الفرنسي، وتشمل العائلات والجمعيات والمؤسسات والشركات.
      id: Kategori institusi arsip privat dalam konteks hukum Prancis, mencakup keluarga, asosiasi, yayasan, dan perusahaan.
      zh: 法国法律语境下的私人档案机构类别，涵盖家族、协会、基金会与企业等非公共保管者。
    structured_aliases:
      - literal_form: Franse particuliere archieven
        in_language: nl
      - literal_form: franzoesische Privatarchive
        in_language: de
      - literal_form: archives privees francaises
        in_language: fr
      - literal_form: archivos privados franceses
        in_language: es
      - literal_form: الأرشيفات الخاصة الفرنسية
        in_language: ar
      - literal_form: arsip privat Prancis
        in_language: id
      - literal_form: 法国私人档案
        in_language: zh
    slots:
      - has_type
      - hold_record_set
      - has_score
      - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    close_mappings:
      - wd:Q2860565
      - rico:CorporateBody
    broad_mappings:
      - schema:ArchiveOrganization
      - wd:Q166118
    comments:
      - Wikidata item kept as close (not exact) because current evidence is country-scoped subclassing without explicit P31 archive-type typing.
