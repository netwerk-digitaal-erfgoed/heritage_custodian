id: https://nde.nl/ontology/hc/class/DistrictArchiveGermany
name: DistrictArchiveGermany
title: District Archive (Germany)
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/hold_record_set
  - ../slots/has_score
classes:
  DistrictArchiveGermany:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      German sub-state repository institution responsible for custody and access
      to administrative documentation produced at Kreis level governance.
    alt_descriptions:
      nl: >-
        Duitse substaatelijke bewaarinstelling verantwoordelijk voor het beheer en de toegang
        tot administratieve documentatie geproduceerd op Kreisz-bestuursniveau.
      de: >-
        Deutsche substaatliche Aufbewahrungseinrichtung, verantwortlich für die Verwahrung
        und den Zugang zu Verwaltungsdokumentation auf Kreisebene.
      fr: >-
        Dépôt allemand de niveau sub-étatique responsable de la garde et de l'accès à la
        documentation administrative produite au niveau de gouvernance de l'arrondissement.
      es: >-
        Institución de depósito alemana de nivel subestatal responsable de la custodia y
        acceso a la documentación administrativa producida a nivel de gobierno de distrito.
      ar: >-
        مؤسسة إيداع ألمانية دون مستوى الولاية مسؤولة عن حفظ والوصول إلى الوثائق الإدارية المنتجة على مستوى حوكمة الدائرة.
      id: >-
        Lembaga penyimpanan sub-negara bagian Jerman yang bertanggung jawab atas pengelolaan
        dan akses ke dokumentasi administratif yang dihasilkan pada tingkat pemerintahan Kreis.
      zh: >-
        负责保管和访问Kreis级别治理产生的行政文件的德国次州级存储机构。
    broad_mappings:
      - skos:Concept
      - schema:ArchiveOrganization
    close_mappings:
      - rico:CorporateBody
    slots:
      - hold_record_set
      - has_score
    comments:
      - |
        Preserved from prior description (commit d52149a5):

        "Archive type specific to Germany at the Kreis (district) level.\nThese archives serve administrative districts (Landkreise) and \npreserve records of district-level government and administration.\n\n**Wikidata**: Q130757255\n\n**German term**: Kreisarchiv\n\n**Geographic Restriction**: Germany (DE) only.\nThis constraint is enforced via LinkML `rules` with `postconditions`.\n\n**Scope**:\nKreisarchive preserve:\n- District government records (Kreistag, Landrat)\n- Administrative files from Landkreis authorities\n- Historical district documentation\n- Civil registry records (transferred from municipalities)\n- Building permits and planning documents\n- Maps and cadastral records\n\n**Administrative Context**:\nIn the German archival system:\n- Bundesarchiv (federal level)\n- Landesarchive (state/Land level)\n- Kreisarchive (district level) \u2190 This type\n- Stadtarchive/Gemeindearchive (municipal level)\n\n**Related Types**:\n- MunicipalArchive (Q604177) - City/town level\n\
