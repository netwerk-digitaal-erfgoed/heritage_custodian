id: https://nde.nl/ontology/hc/class/ComprehensiveOverview
name: ComprehensiveOverview
title: ComprehensiveOverview
description: >-
  A comprehensive overview or summary.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/

default_prefix: hc

imports:
- linkml:types
- ../slots/has_description
classes:
  ComprehensiveOverview:
    class_uri: schema:CreativeWork
    description: >-
      Consolidated narrative document presenting integrated context, scope,
      findings, and key references for a subject area.
    alt_descriptions:
      nl: Geconsolideerd narratief document met geïntegreerde context reikwijdte bevindingen en kernreferenties voor een onderwerp.
      de: Konsolidiertes narrativ aufgebautes Dokument mit integriertem Kontext Umfang Befunden und Schluesselreferenzen zu einem Thema.
      fr: Document narratif consolide presentant contexte perimetre resultats et references essentielles pour un domaine.
      es: Documento narrativo consolidado que presenta contexto alcance hallazgos y referencias clave de un tema.
      ar: وثيقة سردية موحدة تعرض السياق والنطاق والنتائج والمراجع الأساسية لمجال موضوعي.
      id: Dokumen naratif terkonsolidasi yang menyajikan konteks cakupan temuan dan rujukan kunci suatu topik.
      zh: 用于呈现某主题背景、范围、结论与关键参考的整合性叙述文档。
    structured_aliases:
    - {literal_form: totaaloverzicht, in_language: nl}
    - {literal_form: Gesamtueberblick, in_language: de}
    - {literal_form: vue d ensemble complete, in_language: fr}
    - {literal_form: vision integral, in_language: es}
    - {literal_form: نظرة شاملة, in_language: ar}
    - {literal_form: ikhtisar komprehensif, in_language: id}
    - {literal_form: 综合总览, in_language: zh}
    broad_mappings:
    - schema:CreativeWork
    keywords:
    - synthesized summary
    - cross-source context
    - reference overview
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
    - has_description
