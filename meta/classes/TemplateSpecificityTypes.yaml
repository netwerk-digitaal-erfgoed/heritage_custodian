  ArchiveSearchTemplate:
    is_a: TemplateSpecificityType
    class_uri: hc:ArchiveSearchTemplate
    description: >-
      Query-pattern grouping tuned for retrieval across archival finding and inventory systems.
    alt_descriptions:
      nl: Templatetype voor archiefinstellingqueries.
      de: Vorlagentyp für Archivinstitutionenabfragen.
      fr: Type de modèle pour les requêtes d'institutions archivistiques.
      es: 'Concepto para: Query pattern category for archival institution searches, finding aids, and records management.'
      ar: 'مفهوم لـ: Query pattern category for archival institution searches, finding aids, and records management.'
      id: 'Konsep untuk: Query pattern category for archival institution searches, finding aids, and records management.'
      zh: 用于以下内容的概念：Query pattern category for archival institution searches, finding aids, and records management.
    structured_aliases:
    - literal_form: archiefzoektemplate
      in_language: nl
    - literal_form: Archivsuchvorlage
      in_language: de
    - literal_form: modèle de recherche d'archives
      in_language: fr
    - literal_form: archive search template
      in_language: es
    - literal_form: archive search template
      in_language: ar
    - literal_form: archive search template
      in_language: id
    - literal_form: archive search template
      in_language: zh
    annotations:
      template_code: archive_search
      specificity_score: 0.6
      specificity_rationale: Specific to archive domain but applicable across multiple contexts.
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    comments:
    - Relevant for finding aids and archival descriptions, records management systems, archival collections and fonds, EAD/RiC-O metadata
