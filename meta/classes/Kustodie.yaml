classes:
  Kustodie:
    is_a: ArchiveOrganizationType
    class_uri: hc:Kustodie
    description: >-
      University-based custodial unit managing institutional art and heritage
      collections, often including archives, objects, and exhibition stewardship.
    alt_descriptions:
      nl: Universitaire beheereenheid voor kunst- en erfgoedcollecties, vaak met archief- en tentoonstellingsverantwoordelijkheid.
      de: Universitaere Kustodieeinheit zur Verwaltung institutioneller Kunst- und Erbesammlungen inklusive Ausstellungsbetreuung.
      fr: Unite curatoriale universitaire chargee de la gestion des collections d'art et de patrimoine de l'institution.
      es: Unidad universitaria de custodia que gestiona colecciones de arte y patrimonio institucional, incluida su exhibicion.
      ar: وحدة حفظ جامعية تدير مجموعات الفن والتراث المؤسسي، بما يشمل الرعاية والعرض.
      id: Unit kustodian berbasis universitas yang mengelola koleksi seni dan warisan institusi, termasuk tata pamer.
      zh: 负责高校机构艺术与遗产藏品管理及展示工作的大学保管单元。
