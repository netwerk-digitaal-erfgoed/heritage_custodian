    - literal_form: wässrige Reinigung
      in_language: de
    - literal_form: nettoyage aqueux
      in_language: fr
    - literal_form: limpieza acuosa
      in_language: es
    - literal_form: تنظيف مائي
      in_language: ar
    - literal_form: pembersihan akuosa
      in_language: id
    - literal_form: 水性清洁
      in_language: zh
  SolventCleaning:
    is_a: CleaningTechnique
    description: >-
      Removal of coatings, adhesives, or deposits using organic solvents such as acetone, ethanol, or white spirit.
    alt_descriptions:
      nl: Verwijdering van coatings, lijmen of afzettingen met organische oplosmiddelen zoals aceton, ethanol of wasbenzine.
      de: Entfernung von Beschichtungen, Klebstoffen oder Ablagerungen mit organischen Lösungsmitteln wie Aceton, Ethanol oder White Spirit.
      fr: Élimination des revêtements, adhésifs ou dépôts avec des solvants organiques comme l'acétone, l'éthanol ou le white spirit.
      es: Eliminación de recubrimientos, adhesivos o depósitos con disolventes orgánicos como acetona, etanol o aguarrás.
      ar: إزالة الطلاءات أو اللاصقات أو الرواسب باستخدام المذيبات العضوية مثل الأسيتون أو الإيثانول.
      id: Penghilangan lapisan, perekat, atau endapan menggunakan pelarut organik seperti aseton, etanol, atau white spirit.
      zh: 使用丙酮、乙醇或白精油等有机溶剂去除涂层、粘合剂或沉积物。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - aat:300379752
    keywords:
    - solvent cleaning
    - organic solvent
    - varnish removal
    examples:
    - value:
        has_label: Acetone/white spirit cleaning
        has_description: Removal of yellowed varnish using 50:50 acetone/white spirit
    structured_aliases:
    - literal_form: oplosmiddelreiniging
      in_language: nl
    - literal_form: Lösemittelreinigung
      in_language: de
    - literal_form: nettoyage au solvant
      in_language: fr
    - literal_form: limpieza con disolvente
      in_language: es
    - literal_form: تنظيف بالمذيب
      in_language: ar
    - literal_form: pembersihan pelarut
      in_language: id
    - literal_form: 溶剂清洁
      in_language: zh
  MechanicalCleaning:
    is_a: CleaningTechnique
    description: >-
      Physical removal of deposits using hand tools such as scalpels, brushes, or erasers.
    alt_descriptions:
      nl: Fysieke verwijdering van afzettingen met handgereedschap zoals scalpels, penselen of gummen.
      de: Physische Entfernung von Ablagerungen mit Handwerkzeugen wie Skalpellen, Bürsten oder Radiergummis.
      fr: Élimination physique des dépôts avec des outils manuels comme des scalpels, brosses ou gommes.
      es: Eliminación física de depósitos con herramientas manuales como bisturíes, cepillos o gomas de borrar.
      ar: الإزالة المادية للرواسب باستخدام أدوات يدوية مثل المشارط أو الفرش أو الممحيات.
      id: Penghilangan fisik endapan menggunakan alat tangan seperti skalpel, kuas, atau penghapus.
      zh: 使用手术刀、刷子或橡皮等手工工具物理去除沉积物。
