  CleaningTechnique:
    is_a: ConservationTechnique
    abstract: true
    description: >-
      Methods for removing unwanted surface deposits, coatings, or accretions from objects.
    alt_descriptions:
      nl: Methoden voor het verwijderen van ongewenste oppervlakteafzettingen, coatings of aangroeiingen van objecten.
      de: Methoden zur Entfernung unerwünschter Oberflächenablagerungen, Beschichtungen oder Anhaftungen von Objekten.
      fr: Méthodes d'élimination des dépôts, revêtements ou accretions indésirables à la surface des objets.
      es: Métodos para eliminar depósitos, recubrimientos o incrustaciones no deseados de los objetos.
      ar: طرق إزالة الرواسب أو الطلاءات أو التراكمات غير المرغوب فيها من الأسطح.
      id: Metode untuk menghilangkan endapan, lapisan, atau akresi yang tidak diinginkan dari permukaan objek.
      zh: 从物体上去除不需要的表面沉积物、涂层或附着物的方法。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - aat:300053052
    keywords:
    - cleaning
    - surface removal
    - deposit removal
    structured_aliases:
    - literal_form: reinigingstechniek
      in_language: nl
    - literal_form: Reinigungstechnik
      in_language: de
    - literal_form: technique de nettoyage
      in_language: fr
    - literal_form: técnica de limpieza
      in_language: es
    - literal_form: تقنية التنظيف
      in_language: ar
    - literal_form: teknik pembersihan
      in_language: id
    - literal_form: 清洁技术
      in_language: zh
  AqueousCleaning:
    is_a: CleaningTechnique
    description: >-
      Removal of surface deposits using water-based solutions.
    alt_descriptions:
      nl: Verwijdering van oppervlakteafzettingen met waterige oplossingen.
      de: Entfernung von Oberflächenablagerungen mit wasserbasierten Lösungen.
      fr: Élimination des dépôts de surface avec des solutions aqueuses.
      es: Eliminación de depósitos superficiales con soluciones acuosas.
      ar: إزالة الرواسب السطحية باستخدام محاليل مائية.
      id: Penghilangan endapan permukaan menggunakan larutan berbasis air.
      zh: 使用水基溶液去除表面沉积物。
