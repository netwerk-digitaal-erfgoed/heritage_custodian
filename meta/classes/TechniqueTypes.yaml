  ConservationTechnique:
    is_a: TechniqueType
    abstract: true
    description: >-
      Methods for preserving and stabilizing heritage objects through treatment interventions.
    alt_descriptions:
      nl: Methoden voor het behouden en stabiliseren van erfgoedobjecten door behandelingsinterventies.
      de: Methoden zur Erhaltung und Stabilisierung von Heritage-Objekten durch Behandlungsinterventionen.
      fr: Méthodes de préservation et de stabilisation des objets patrimoniaux par interventions de traitement.
      es: Métodos para preservar y estabilizar objetos patrimoniales mediante intervenciones de tratamiento.
      ar: طرق الحفاظ على وتثبيت الأشياء التراثية من خلال تدخلات العلاج.
      id: Metode untuk melestarikan dan menstabilkan objek warisan melalui intervensi perawatan.
      zh: 通过处理干预来保存和稳定遗产对象的方法。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - aat:300053044
    keywords:
    - conservation
    - treatment
    - preservation
    annotations:
      custodian_types: '[''*'']'
    structured_aliases:
