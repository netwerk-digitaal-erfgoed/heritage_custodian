    description: >-
      Retouching that closely imitates surrounding original paint, also called deceptive or illusionistic retouching.
    alt_descriptions:
      nl: Retoucheren dat oorspronkelijke verf nauwkeurig imiteert, ook wel illusionistisch retoucheren genoemd.
      de: Retuschierung, die die umliegende Originalfarbe genau nachahmt, auch täuschende oder illusionistische Retusche genannt.
      fr: Retouche imitant étroitement la peinture originale environnante, également appelée retouche illusionniste.
      es: Retoque que imita de cerca la pintura original circundante, también llamado retoque ilusionista.
      ar: الترميم الذي يحاكي عن كثب الطلاء الأصلي المحيط، ويسمى أيضًا الترميم الخادع أو الوهمي.
      id: Retouching yang meniru dengan cermat cat asli di sekitarnya, juga disebut retouching deceiving atau ilusionistik.
      zh: 紧密模仿周围原画的润色，也称为欺骗性或错觉润色。
