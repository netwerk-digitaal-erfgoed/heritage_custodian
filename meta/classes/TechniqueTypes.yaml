  TratteggioInpainting:
    is_a: InpaintingTechnique
    description: >-
      Italian technique using fine parallel brushstrokes distinguishable at close range but integrating at viewing distance.
    alt_descriptions:
      nl: Italiaanse techniek met fijne parallelle penseelstreken die van dichtbij onderscheidbaar zijn maar op kijkafstand integreren.
      de: Italienische Technik mit feinen parallelen Pinselstrichen, die aus der Nähe unterscheidbar sind, aber aus Betrachtungsabstand integrieren.
      fr: Technique italienne utilisant de fins coups de pinceau parallèles, distinguables de près mais s'intégrant à distance de vision.
      es: Técnica italiana con finas pinceladas paralelas distinguibles de cerca pero que se integran a distancia de visión.
      ar: تقنية إيطالية باستخدام ضربات فرشاة متوازية دقيقة يمكن تمييزها عن قرب ولكنها تندمج على مسافة المشاهدة.
      id: Teknik Italia menggunakan sapuan kuas paralel halus yang dapat dibedakan dari dekat tetapi terintegrasi pada jarak pandang.
      zh: 意大利技术，使用精细的平行笔触，近看可分辨，远看则融合。
