    description: >-
      Ablation of surface deposits using focused laser energy.
    alt_descriptions:
      nl: Ablatie van oppervlakteafzettingsen met gefocusseerde laserenergie.
      de: Ablation von Oberflächenablagerungen mit fokussierter Laserenergie.
      fr: Ablation des dépôts de surface avec une énergie laser focalisée.
