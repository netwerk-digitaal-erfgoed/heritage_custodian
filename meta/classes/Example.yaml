id: https://nde.nl/ontology/hc/class/Example
name: Example
title: Example Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_description
- ../slots/has_url
- ../slots/has_score
classes:
  Example:
    class_uri: skos:Concept
    description: >-
      Illustrative instance demonstrating a definition, modeling pattern, or
      conceptual type through concrete representation.
    alt_descriptions:
      nl: >-
        Illustratief voorbeeld dat een definitie, modelleringspatroon of conceptueel type
        demonstreert door concrete representatie.
      de: >-
        Illustratives Beispiel, das eine Definition, ein Modellierungsmuster oder
        einen konzeptionellen Typ durch konkrete Repräsentation demonstriert.
      fr: >-
        Instance illustrative démontrant une définition, un motif de modélisation ou
        un type conceptuel par une représentation concrète.
      es: >-
        Instancia ilustrativa que demuestra una definición, patrón de modelado o
        tipo conceptual mediante representación concreta.
      ar: >-
        مثال توضيحي يوضح تعريفًا أو نمط نمذجة أو نوع مفاهيمي
        من خلال تمثيل ملموس.
      id: >-
        Contoh ilustratif yang mendemonstrasikan definisi, pola pemodelan, atau
        tipe konseptual melalui representasi konkret.
      zh: >-
        通过具体表示演示定义、建模模式或概念类型的说明性实例。
    structured_aliases:
    - literal_form: voorbeeld
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Beispiel
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: exemple
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: ejemplo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مثال
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: contoh
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 示例
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:CreativeWork
    slots:
    - identified_by
    - has_label
    - has_description
    - has_url
    - has_score
    comments:
    - Used for documentation and educational purposes in modeling guides.
    - Provides concrete instances to clarify abstract concepts.
    - 'Preserved from prior description: Illustrative instance used to clarify a definition, type, or modeling pattern.'
    keywords:
    - illustrative instance
    - documentation example
    - modeling demonstration
    - conceptual clarification
    annotations:
      specificity_score: 0.2
      specificity_rationale: Utility concept for documentation and modeling examples.
      custodian_types: '["*"]'
