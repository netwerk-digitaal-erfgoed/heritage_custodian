id: https://nde.nl/ontology/hc/class/Heritage
name: Heritage
title: Heritage Class
description: Broad concept used to indicate cultural, natural, or intangible heritage relevance.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  Heritage:
    class_uri: skos:Concept
    description: >-
      Broad conceptual category used to mark entities, activities, or resources
      as relevant to cultural, natural, or intangible heritage contexts.
    alt_descriptions:
      nl: Brede conceptuele categorie om entiteiten activiteiten of bronnen als cultureel natuurlijk of immaterieel erfgoedrelevant te markeren.
      de: Breite konzeptionelle Kategorie zur Kennzeichnung von Entitaeten Aktivitaeten oder Ressourcen als kultur- natur- oder immateriell-erberelevant.
      fr: Categorie conceptuelle large pour marquer entites activites ou ressources comme pertinentes pour les contextes patrimoniaux.
      es: Categoria conceptual amplia para marcar entidades actividades o recursos como relevantes para contextos patrimoniales.
      ar: فئة مفاهيمية واسعة لتمييز الكيانات أو الأنشطة أو الموارد ذات الصلة بسياقات التراث الثقافي أو الطبيعي أو غير المادي.
      id: Kategori konseptual luas untuk menandai entitas aktivitas atau sumber daya sebagai relevan bagi konteks warisan budaya alam atau takbenda.
      zh: 用于标记实体、活动或资源与文化、自然或非物质遗产情境相关性的广义概念类别。
    structured_aliases:
    - {literal_form: erfgoeddomein, in_language: nl}
    - {literal_form: Erbebereich, in_language: de}
    - {literal_form: domaine patrimonial, in_language: fr}
    - {literal_form: dominio patrimonial, in_language: es}
    - {literal_form: مجال التراث, in_language: ar}
    - {literal_form: ranah warisan, in_language: id}
    - {literal_form: 遗产领域, in_language: zh}
    broad_mappings:
    - skos:Concept
    related_mappings:
    - crm:E1_CRM_Entity
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Broad heritage domain concept.
      custodian_types: "['*']"
