id: https://nde.nl/ontology/hc/class/FeatureType
name: FeatureType
title: Feature Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
  - ../slots/has_description
classes:
  FeatureType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomy node for categorizing physical, geographic, or built
      environment features in heritage documentation.
    alt_descriptions:
      nl: >-
        Abstract taxonomieknooppunt voor het categoriseren van fysieke, geografische of
        gebouwde omgevingskenmerken in erfgoeddocumentatie.
      de: >-
        Abstrakter Taxonomieknoten zur Kategorisierung physischer, geografischer oder
        bebauter Umweltmerkmale in der Kulturerbedokumentation.
      fr: >-
        Nœud taxonomique abstrait pour catégoriser les caractéristiques physiques,
        géographiques ou bâties dans la documentation patrimoniale.
      es: >-
        Nodo taxonómico abstracto para categorizar características físicas, geográficas
        o del entorno construido en la documentación patrimonial.
      ar: >-
        عقدة تصنيفية مجردة لتصنيف المعالم المادية أو الجغرافية أو البيئية المبنية في توثيق التراث.
      id: >-
        Simpul taksonomi abstrak untuk mengkategorikan fitur fisik, geografis, atau
        lingkungan binaan dalam dokumentasi warisan.
      zh: >-
        用于对遗产文档中的物理、地理或建筑环境特征进行分类的抽象分类法节点。
    broad_mappings:
      - skos:Concept
    slots:
      - has_label
      - has_description
    annotations:
      specificity_score: 0.3
      specificity_rationale: Shared taxonomy base for feature classification.
      custodian_types: '["*"]'
