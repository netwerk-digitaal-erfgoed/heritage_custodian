- linkml:types
- ../enums/EducationProviderTypeEnum
- ../enums/RoomUnitTypeEnum
- ../slots/has_accessibility_feature
- ../slots/has_contact_details
- ../slots/has_description
- ../slots/has_equipment
- ../slots/has_facility
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_quantity
- ../slots/has_score
- ../slots/has_time_interval
