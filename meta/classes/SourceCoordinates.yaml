id: https://nde.nl/ontology/hc/classes/SourceCoordinates
name: SourceCoordinates
title: SourceCoordinates
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  geo: http://www.w3.org/2003/01/geo/wgs84_pos#
imports:
  - linkml:types
  - ../slots/has_latitude
  - ../slots/has_longitude
  - ../slots/has_source
default_prefix: hc
# default_range: string
classes:
  SourceCoordinates:
    description: >-
      Geographic coordinate pair with provenance metadata indicating the
      geocoding source or methodology used.
    alt_descriptions:
      nl: >-
        Geografisch coördinatenpaar met herkomstmetagegevens die de gebruikte geocodingbron
        of -methodologie aangeven.
      de: >-
        Geografisches Koordinatenpaar mit Provenienzmetadaten, die die verwendete Geokodierungsquelle
        oder -methodologie angeben.
      fr: >-
        Paire de coordonnées géographiques avec métadonnées de provenance indiquant la
        source de géocodage ou la méthodologie utilisée.
      es: >-
        Par de coordenadas geográficas con metadatos de procedencia que indican la fuente
        de geocodificación o metodología utilizada.
      ar: >-
        زوج إحداثيات جغرافية مع بيانات وصفية للأصل تشير إلى مصدر الترميز الجغرافي أو المنهجية المستخدمة.
      id: >-
        Pasangan koordinat geografis dengan metadata provenance yang menunjukkan sumber
        geocoding atau metodologi yang digunakan.
      zh: >-
        带有来源元数据的地理坐标对，指示所使用的地理编码来源或方法。
