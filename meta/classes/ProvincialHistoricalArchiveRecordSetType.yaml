id: https://nde.nl/ontology/hc/class/ProvincialHistoricalArchiveRecordSetType
name: ProvincialHistoricalArchiveRecordSetType
title: ProvincialHistoricalArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  ProvincialHistoricalArchiveRecordSetType:
    description: >-
      Classification concept for documentary aggregations maintained by regional
      government repositories at the provincial administrative level.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties die worden beheerd door regionale
        overheidsrepository's op provinciaal bestuurlijk niveau.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die von regionalen
        Regierungsarchiven auf provinzieller Verwaltungsebene verwaltet werden.
      fr: >-
        Concept de classification pour les agrégations documentaires maintenues par les
        dépôts gouvernementaux régionaux au niveau administratif provincial.
      es: >-
        Concepto de clasificación para agregaciones documentales mantenidas por repositorios
        gubernamentales regionales a nivel administrativo provincial.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي تديرها مستودعات حكومية إقليمية
        على المستوى الإداري للمحافظة.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dikelola oleh repositori
        pemerintah regional pada tingkat administrasi provinsi.
      zh: >-
        由省级政府档案库维护的文献聚合的分类概念。
    structured_aliases:
    - literal_form: provinciaal historisch archief collectietype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Provinzialarchiv-Sammlungstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de collection d'archives provinciales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de colección de archivo provincial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع مجموعة الأرشيف الإقليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe koleksi arsip provinsi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 省档案馆馆藏类型
      predicate: EXACT_SYNONYM
      in_language: zh
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - ProvincialHistoricalArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: hc:ProvincialHistoricalArchiveRecordSetType
    comments:
    - Applies to regional-level government archival collections.
    - Distinguished from municipal archives by provincial jurisdiction scope.
    - 'Preserved from prior description: A rico:RecordSetType for classifying collections held by ProvincialHistoricalArchive custodians.'
    keywords:
    - provincial archives
    - regional records
    - government collections
    - administrative level
    examples:
    - value:
        has_type: ProvincialHistoricalArchiveRecordSetType
        has_scope: Provincial governance records, notarial acts, court proceedings.
      description: Documentary collection type for provincial heritage repositories
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
