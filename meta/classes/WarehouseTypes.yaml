id: https://nde.nl/ontology/hc/class/WarehouseTypes
name: WarehouseTypes
title: Warehouse Types - Concrete Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- ./WarehouseType
- linkml:types
- ../slots/has_code
classes:
  CentralDepot:
    is_a: WarehouseType
    class_uri: hc:CentralDepot
    description: >-
      Primary storage facility at the main institutional site with full infrastructure,
      environmental controls, and comprehensive collection management capabilities.
    alt_descriptions:
      nl: Magazijntype voor hoofd-/centrale opslagfaciliteiten.
      de: Lagertyp für Haupt-/Zentrallager.
      fr: Type d'entrepôt pour les installations de stockage principales/centrales.
      es: Tipo de almacén para instalaciones de almacenamiento principales/centrales.
      ar: نوع المستودع لمرافق التخزين الرئيسية/المركزية.
      id: Jenis gudang untuk fasilitas penyimpanan utama/pusat.
      zh: 主要/中央存储设施的仓库类型。
    structured_aliases:
    - literal_form: hoofddepot
      in_language: nl
    - literal_form: Zentraldepot
      in_language: de
    - literal_form: dépôt central
      in_language: fr
    - literal_form: depósito central
      in_language: es
    - literal_form: مستودع مركزي
      in_language: ar
    - literal_form: depos pusat
      in_language: id
    - literal_form: 中央仓库
      in_language: zh
    comments:
    - Primary storage at main institutional site with full infrastructure.
    slot_usage:
      has_code:
        equals_string: CENTRAL_DEPOT
    annotations:
      specificity_score: '0.60'
      skos:prefLabel: Central Depot
      skos:altLabel: hoofddepot, Zentraldepot, main depot
      custodian_types: '[''*'']'
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
  OffsiteDepot:
    is_a: WarehouseType
    class_uri: hc:OffsiteDepot
    description: >-
      Remote storage facility located away from the main institutional site,
      typically used for overflow collections or low-access materials.
    alt_descriptions:
      nl: Magazijntype voor externe opslaglocaties.
      de: Lagertyp für externe Auswärtslager.
      fr: Type d'entrepôt pour les sites de stockage externes.
      es: Tipo de almacén para ubicaciones de almacenamiento externas.
      ar: نوع المستودع لمواقع التخزين الخارجية.
      id: Jenis gudang untuk lokasi penyimpanan luar.
      zh: 外部存储位置的仓库类型。
    structured_aliases:
    - literal_form: externe opslag
      in_language: nl
    - literal_form: Außendepot
      in_language: de
    - literal_form: dépôt externe
      in_language: fr
    - literal_form: depósito externo
      in_language: es
    - literal_form: مستودع خارجي
      in_language: ar
    - literal_form: depos luar
      in_language: id
    - literal_form: 外部仓库
      in_language: zh
    slot_usage:
      has_code:
        equals_string: OFFSITE_DEPOT
    annotations:
      specificity_score: '0.60'
      skos:prefLabel: Offsite Depot
      skos:altLabel: "externe opslag, Außendepot, remote storage"
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
  SatelliteDepot:
    is_a: WarehouseType
    class_uri: hc:SatelliteDepot
    description: >-
      Branch storage facility connected to but geographically separate from
      the main institution, serving regional collection access needs.
    alt_descriptions:
      nl: Magazijntype voor filiaal-/satellietopslaglocaties.
      de: Lagertyp für Zweigstellenlager.
      fr: Type d'entrepôt pour les sites de stockage satellites.
      es: Tipo de almacén para ubicaciones de almacenamiento satélite.
      ar: نوع المستودع لمواقع التخزين الفرعية.
      id: Jenis gudang untuk lokasi penyimpanan satelit.
      zh: 卫星存储位置的仓库类型。
    structured_aliases:
    - literal_form: filiaalopslag
      in_language: nl
    - literal_form: Nebenstelle
      in_language: de
    - literal_form: dépôt satellite
      in_language: fr
    - literal_form: depósito satélite
      in_language: es
    - literal_form: مستودع فرعي
      in_language: ar
    - literal_form: depos satelit
      in_language: id
    - literal_form: 卫星仓库
      in_language: zh
    slot_usage:
      has_code:
        equals_string: SATELLITE_DEPOT
    annotations:
      specificity_score: '0.60'
      skos:prefLabel: Satellite Depot
      skos:altLabel: filiaalopslag, Nebenstelle
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
  StudyStorage:
    is_a: WarehouseType
    class_uri: hc:StudyStorage
    description: >-
      Access-oriented repository area designed for direct researcher use,
      with reading spaces and material-handling capacity on-site.
    alt_descriptions:
      nl: Magazijntype voor onderzoek-toegankelijke opslagruimtes.
      de: Lagertyp für forschungszugängliche Lagerbereiche.
      fr: Type d'entrepôt pour les espaces de stockage accessibles aux chercheurs.
      es: Tipo de almacén para espacios de almacenamiento accesibles para investigadores.
      ar: نوع المستودع لمساحات التخزين المتاحة للباحثين.
      id: Jenis gudang untuk ruang penyimpanan yang dapat diakses peneliti.
      zh: 研究人员可直接访问的存储空间的仓库类型。
    structured_aliases:
    - literal_form: studiedepot
      in_language: nl
    - literal_form: Studiensammlung
      in_language: de
    - literal_form: dépôt d'étude
      in_language: fr
    - literal_form: depósito de estudio
      in_language: es
    - literal_form: مستودع دراسة
      in_language: ar
    - literal_form: depos studi
      in_language: id
    - literal_form: 研究存储
      in_language: zh
    slot_usage:
      has_code:
        equals_string: STUDY_STORAGE
    annotations:
      specificity_score: '0.65'
      skos:prefLabel: Study Storage
      skos:altLabel: studiedepot, Studiensammlung, visible storage
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
    comments:
    - 'Preserved from prior description: Storage area designed for direct researcher access to collections, with study spaces and material handling facilities on-site.'
  QuarantineDepot:
    is_a: WarehouseType
    class_uri: hc:QuarantineDepot
    description: >-
      Isolation facility for newly acquired or potentially contaminated materials
      requiring inspection and treatment before integration into main collections.
    alt_descriptions:
      nl: Magazijntype voor isolatie- en quarantainegebieden.
      de: Lagertyp für Isolations- und Quarantänebereiche.
      fr: Type d'entrepôt pour les zones d'isolement et de quarantaine.
      es: Tipo de almacén para áreas de aislamiento y cuarentena.
      ar: نوع المستودع لمناطق العزل والحجر الصحي.
      id: Jenis gudang untuk area isolasi dan karantina.
      zh: 隔离和检疫区域的仓库类型。
    structured_aliases:
    - literal_form: quarantaine depot
      in_language: nl
    - literal_form: Quarantänelager
      in_language: de
    - literal_form: dépôt de quarantaine
      in_language: fr
    - literal_form: depósito de cuarentena
      in_language: es
    - literal_form: مستودع حجر صحي
      in_language: ar
    - literal_form: depos karantina
      in_language: id
    - literal_form: 隔离仓库
      in_language: zh
    slot_usage:
      has_code:
        equals_string: QUARANTINE_DEPOT
    annotations:
      specificity_score: '0.70'
      skos:prefLabel: Quarantine Depot
      skos:altLabel: "quarantaine depot, Quarantänelager"
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
  TransitStorage:
    is_a: WarehouseType
    class_uri: hc:TransitStorage
    description: >-
      Short-term holding area for materials in movement between locations or
      undergoing processing, loans, or exhibition rotation.
    alt_descriptions:
      nl: Magazijntype voor tijdelijke doorvoeropslag.
      de: Lagertyp für temporäre Zwischenlager.
      fr: Type d'entrepôt pour le stockage temporaire de transit.
      es: Tipo de almacén para almacenamiento temporal de tránsito.
      ar: نوع المستودع للتخزين المؤقت للعبور.
      id: Jenis gudang untuk penyimpanan transit sementara.
      zh: 中转临时存储的仓库类型。
    structured_aliases:
    - literal_form: transitopslag
      in_language: nl
    - literal_form: Zwischenlager
      in_language: de
    - literal_form: stockage de transit
      in_language: fr
    - literal_form: almacenamiento de tránsito
      in_language: es
    - literal_form: تخزين عبور
      in_language: ar
    - literal_form: penyimpanan transit
      in_language: id
    - literal_form: 中转存储
      in_language: zh
    slot_usage:
      has_code:
        equals_string: TRANSIT_STORAGE
    annotations:
      specificity_score: '0.60'
      skos:prefLabel: Transit Storage
      skos:altLabel: transitopslag, Zwischenlager, staging area
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
    comments:
    - 'Preserved from prior description: Short-term holding area for materials in transit between locations or undergoing processing, loans, or exhibition rotation.'
  ColdStorageFacility:
    is_a: WarehouseType
    class_uri: hc:ColdStorageFacility
    description: >-
      Temperature-controlled repository for heat-sensitive materials including
      biological specimens, photographic media, and perishable holdings.
    alt_descriptions:
      nl: Magazijntype voor gekoelde/bevroren opslagfaciliteiten.
      de: Lagertyp für Kühl- und Gefrierlager.
      fr: Type d'entrepôt pour les installations de stockage réfrigéré/congelé.
      es: Tipo de almacén para instalaciones de almacenamiento refrigerado/congelado.
      ar: نوع المستودع لمرافق التخزين المبرد/المجمد.
      id: Jenis gudang untuk fasilitas penyimpanan dingin/beku.
      zh: 冷藏/冷冻存储设施的仓库类型。
    structured_aliases:
    - literal_form: koudopslag
      in_language: nl
    - literal_form: Kühlhaus
      in_language: de
    - literal_form: stockage frigorifique
      in_language: fr
    - literal_form: almacenamiento frigorífico
      in_language: es
    - literal_form: تخزين بارد
      in_language: ar
    - literal_form: penyimpanan dingin
      in_language: id
    - literal_form: 冷藏存储
      in_language: zh
    slot_usage:
      has_code:
        equals_string: COLD_STORAGE_FACILITY
    annotations:
      specificity_score: '0.70'
      skos:prefLabel: Cold Storage Facility
      skos:altLabel: "koudopslag, Kühlhaus, cold vault"
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
    comments:
    - 'Preserved from prior description: Temperature-controlled facility for cold-sensitive materials including biological specimens, photographic materials, and perishable collections.'
  HighSecurityVault:
    is_a: WarehouseType
    class_uri: hc:HighSecurityVault
    description: >-
      Maximum-protection repository with enhanced access control, monitoring,
      and environmental protection for sensitive or exceptional-value holdings.
    alt_descriptions:
      nl: Magazijntype voor maximaal beveiligde opslagruimtes.
      de: Lagertyp für Hochsicherheitslager.
      fr: Type d'entrepôt pour les espaces de stockage à sécurité maximale.
      es: Tipo de almacén para espacios de almacenamiento de máxima seguridad.
      ar: نوع المستودع لمناطق التخزين ذات الأمان الأقصى.
      id: Jenis gudang untuk ruang penyimpanan keamanan maksimum.
      zh: 最高安全存储空间的仓库类型。
    structured_aliases:
    - literal_form: schatkamer
      in_language: nl
    - literal_form: Tresor
      in_language: de
    - literal_form: chambre forte
      in_language: fr
    - literal_form: cámara acorazada
      in_language: es
    - literal_form: خزنة عالية الأمان
      in_language: ar
    - literal_form: brankas keamanan tinggi
      in_language: id
    - literal_form: 高安全金库
      in_language: zh
    slot_usage:
      has_code:
        equals_string: HIGH_SECURITY_VAULT
    annotations:
      specificity_score: '0.75'
      skos:prefLabel: High Security Vault
      skos:altLabel: schatkamer, Tresor, strong room
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
    comments:
    - 'Preserved from prior description: Maximum security facility with enhanced access controls, monitoring, and environmental protection for high-value or sensitive collections.'
  OpenStorage:
    is_a: WarehouseType
    class_uri: hc:OpenStorage
    description: >-
      Publicly visible repository area allowing visitors to view preserved
      holdings while supporting education and transparency.
    alt_descriptions:
      nl: Magazijntype voor zichtbare/toegankelijke opslagruimtes.
      de: Lagertyp für sichtbare Lagerbereiche.
      fr: Type d'entrepôt pour les espaces de stockage visibles/accessibles.
      es: Tipo de almacén para espacios de almacenamiento visibles/accesibles.
      ar: نوع المستودع لمناطق التخزين المرئية/المتاحة.
      id: Jenis gudang untuk ruang penyimpanan terlihat/terbuka.
      zh: 可见/开放存储空间的仓库类型。
    structured_aliases:
    - literal_form: zichtdepot
      in_language: nl
    - literal_form: Schaulager
      in_language: de
    - literal_form: dépôt visible
      in_language: fr
    - literal_form: depósito visible
      in_language: es
    - literal_form: مستودع مرئي
      in_language: ar
    - literal_form: depos terbuka
      in_language: id
    - literal_form: 开放存储
      in_language: zh
    slot_usage:
      has_code:
        equals_string: OPEN_STORAGE
    annotations:
      specificity_score: '0.65'
      skos:prefLabel: Open Storage
      skos:altLabel: zichtdepot, Schaulager, visible storage
    broad_mappings:
    - schema:Place
    - crm:E27_Site
    - rico:Place
    - skos:Concept
    comments:
    - 'Preserved from prior description: Publicly visible storage area allowing visitors to view stored collections, combining preservation with educational display and transparency.'
