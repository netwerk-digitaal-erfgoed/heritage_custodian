classes:
  VideoFrames:
    class_uri: schema:QuantitativeValue
    description: >-
      Quantitative measurement of discrete visual units within a video sequence, typically used for computational analysis tasks.
    alt_descriptions:
      nl: >-
        Kwantitatieve meting van discrete visuele eenheden binnen een videosequentie, doorgaans gebruikt voor computationele analysetaken.
      de: >-
        Quantitative Messung diskreter visueller Einheiten innerhalb einer Videosequenz, typischerweise verwendet für computerbasierte Analyseaufgaben.
      fr: >-
        Mesure quantitative d'unités visuelles discrètes dans une séquence vidéo, généralement utilisée pour des tâches d'analyse computationnelle.
      es: >-
        Medición cuantitativa de unidades visuales discretas dentro de una secuencia de video, típicamente utilizada para tareas de análisis computacional.
      ar: >-
        قياس كمي للوحدات البصرية المنفصلة ضمن تسلسل فيديو، يُستخدم عادةً لمهام التحليل الحسابي.
      id: >-
        Pengukuran kuantitatif unit visual diskrit dalam urutan video, biasanya digunakan untuk tugas analisis komputasional.
      zh: >-
        视频序列中离散视觉单元的定量测量，通常用于计算分析任务。
