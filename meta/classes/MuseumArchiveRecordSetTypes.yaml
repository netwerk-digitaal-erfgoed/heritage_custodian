id: https://nde.nl/ontology/hc/class/MuseumArchiveRecordSetTypes
name: MuseumArchiveRecordSetTypes
title: Museum Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./MuseumArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
classes:
  MuseumAdministrationFonds:
    is_a: MuseumArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Fonds of museum governance, administration, and internal operations records.
    alt_descriptions:
      nl: Fonds met archiefstukken over museumbestuur administratie en interne bedrijfsvoering.
      de: Fonds mit Unterlagen zu Museumsleitung Verwaltung und internen Betriebsablaeufen.
      fr: Fonds de documents sur la gouvernance du musee l administration et les operations internes.
      es: Fondo de registros sobre gobernanza del museo administracion y operaciones internas.
      ar: فوندس يضم سجلات حوكمة المتحف وإدارته وعملياته الداخلية.
      id: Fonds arsip tata kelola museum administrasi dan operasi internal.
      zh: 收录博物馆治理、行政与内部运营记录的全宗。
    structured_aliases:
    - {literal_form: fonds museumadministratie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds Museumsverwaltung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds d administration du musee, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de administracion del museo, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس إدارة المتحف, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds administrasi museum, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 博物馆行政全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    - skos:Concept
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MuseumAdministrationFonds

  CollectionDocumentationSeries:
    is_a: MuseumArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Series documenting collection management, object files, and provenance workflows.
    alt_descriptions:
      nl: Reeks die collectiebeheer objectdossiers en provenancewerkprocessen documenteert.
      de: Serie zur Dokumentation von Sammlungsmanagement Objektakten und Provenienzprozessen.
      fr: Serie documentant la gestion des collections les dossiers d objets et les flux de provenance.
      es: Serie que documenta gestion de colecciones expedientes de objetos y flujos de procedencia.
      ar: سلسلة توثّق إدارة المجموعات وملفات القطع ومسارات الإثبات المصدرية.
      id: Seri yang mendokumentasikan manajemen koleksi berkas objek dan alur provenance.
      zh: 记录藏品管理、对象档案与来源流程的系列档案。
    structured_aliases:
    - {literal_form: reeks collectiedocumentatie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie Sammlungsdokumentation, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie de documentation des collections, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de documentacion de colecciones, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة توثيق المجموعات, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri dokumentasi koleksi, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 藏品文献系列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    - skos:Concept
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:CollectionDocumentationSeries

  ExhibitionRecordCollection:
    is_a: MuseumArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of exhibition planning, interpretation, and implementation documentation.
    alt_descriptions:
      nl: Collectie documentatie over tentoonstellingsplanning interpretatie en uitvoering.
      de: Sammlung von Unterlagen zu Ausstellungsplanung Vermittlung und Umsetzung.
      fr: Collection de documents sur la planification l interpretation et la mise en oeuvre des expositions.
      es: Coleccion de documentacion sobre planificacion interpretacion e implementacion de exposiciones.
      ar: مجموعة وثائق حول تخطيط المعارض وتفسيرها وتنفيذها.
      id: Koleksi dokumentasi perencanaan interpretasi dan pelaksanaan pameran.
      zh: 收录展览策划、诠释与实施文档的集合。
    structured_aliases:
    - {literal_form: collectie tentoonstellingsdossiers, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Ausstellungsunterlagen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection des dossiers d exposition, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de expedientes de exposiciones, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة سجلات المعارض, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip pameran, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 展览档案集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - skos:Concept
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:ExhibitionRecordCollection
