id: https://nde.nl/ontology/hc/class/SupplierTypes
name: supplier_types
title: Supplier Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./SupplierType
- linkml:types
classes:
  PrintSupplier:
    is_a: SupplierType
    description: >-
      Supplier providing print-on-demand and art reproduction services.
    alt_descriptions:
      nl: Leverancier van print-on-demand en kunstreproductie-diensten.
      de: Lieferant für Print-on-Demand und Kunstreproduktionsdienste.
    structured_aliases:
    - literal_form: drukleverancier
      in_language: nl
    - literal_form: Drucklieferant
      in_language: de
    comments:
    - Examples include King & McGaw, Artful, Fine Art America.
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
  ReproductionSupplier:
    is_a: SupplierType
    description: >-
      Supplier providing museum-quality reproductions of artifacts and artworks.
    alt_descriptions:
      nl: Leverancier van museumkwaliteit-reproducties van artefacten en kunstwerken.
      de: Lieferant für Museum-Qualitäts-Reproduktionen von Artefakten und Kunstwerken.
    structured_aliases:
    - literal_form: reproductieleverancier
      in_language: nl
    - literal_form: Reproduktionslieferant
      in_language: de
    comments:
    - Examples include Museum Reproductions Ltd, Alva Studios.
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  PublicationDistributor:
    is_a: SupplierType
    description: >-
      Distributor for books, catalogs, and publications.
    alt_descriptions:
      nl: Distributeur voor boeken, catalogi en publicaties.
      de: Distributor für Bücher, Kataloge und Publikationen.
    structured_aliases:
    - literal_form: publicatiedistributeur
      in_language: nl
    - literal_form: Publikationsvertrieb
      in_language: de
    comments:
    - Examples include Yale University Press, Thames & Hudson.
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  ArtisanSupplier:
    is_a: SupplierType
    description: >-
      Local artisan or craftsperson providing handmade items.
    alt_descriptions:
      nl: Lokale ambachtsman of vakman die handgemaakte items levert.
      de: Lokaler Handwerker oder Kunsthandwerker für handgefertigte Artikel.
    structured_aliases:
    - literal_form: ambachtsleverancier
      in_language: nl
    - literal_form: Handwerkerlieferant
      in_language: de
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  LicenseHolder:
    is_a: SupplierType
    description: >-
      Entity holding exclusive licensing rights for merchandise.
    alt_descriptions:
      nl: Entiteit die exclusieve licentierechten voor merchandise bezit.
      de: Entität mit exklusiven Lizenzrechten für Merchandise.
    structured_aliases:
    - literal_form: licentiehouder
      in_language: nl
    - literal_form: Lizenzinhaber
      in_language: de
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  ServiceProvider:
    is_a: SupplierType
    description: >-
      Supplier providing services rather than products.
    alt_descriptions:
      nl: Leverancier die diensten levert in plaats van producten.
      de: Lieferant, der Dienstleistungen statt Produkte anbietet.
    structured_aliases:
    - literal_form: dienstverlener
      in_language: nl
    - literal_form: Dienstleister
      in_language: de
    comments:
    - Examples include photography services, framing services, packaging.
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  WholesaleSupplier:
    is_a: SupplierType
    description: >-
      Bulk/wholesale supplier for general merchandise.
    alt_descriptions:
      nl: Groothandelleverancier voor algemene koopwaar.
      de: Großhandelslieferant für allgemeine Waren.
    structured_aliases:
    - literal_form: groothandelleverancier
      in_language: nl
    - literal_form: Großhandelslieferant
      in_language: de
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
  DigitalContentSupplier:
    is_a: SupplierType
    description: >-
      Supplier of digital products and content.
    alt_descriptions:
      nl: Leverancier van digitale producten en content.
      de: Lieferant für digitale Produkte und Inhalte.
    structured_aliases:
    - literal_form: digitale content-leverancier
      in_language: nl
    - literal_form: Digital-Content-Lieferant
      in_language: de
    comments:
    - Examples include digital image libraries, audio guide providers.
    broad_mappings:
    - crm:E39_Actor
    - schema:Organization
