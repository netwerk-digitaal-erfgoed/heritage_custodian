classes:
  SwedishSectorFonds:
    is_a: SectorOfArchivesInSwedenRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation produced within Swedish
      sector-specific administrative and public-service domains.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die is gevormd binnen
        Zweedse sectorspecifieke bestuurs- en publieke dienstdomeinen.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen aus schwedischen
        sektorspezifischen Verwaltungs- und oeffentlichen Dienstbereichen.
      fr: >-
        Agregation fondee sur la provenance de documentation produite dans des
        domaines suédois sectoriels d'administration et de service public.
      es: >-
        Agregacion basada en procedencia de documentacion producida en dominios
        suecos sectoriales de administracion y servicio publico.
      ar: >-
        تجميع قائم على المنشأ لوثائق أُنتجت ضمن مجالات قطاعية سويدية
        للإدارة والخدمة العامة.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan dalam
        domain sektoral Swedia untuk administrasi dan layanan publik.
      zh: >-
        基于来源原则聚合瑞典各行业行政与公共服务领域形成的文献。
      sv: >-
        Proveniensbaserad aggregering av dokumentation skapad inom svenska
        sektorspecifika domaner for forvaltning och offentlig tjanst.
