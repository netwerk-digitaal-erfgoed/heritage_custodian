classes:
  Material:
    class_uri: crm:E57_Material
    description: >-
      Physical substance or medium constituting the compositional basis of cultural heritage objects.
    alt_descriptions:
      nl: >-
        Fysieke stof of medium die de samenstellingsbasis vormt van cultureel erfgoedobjecten.
      de: >-
        Physische Substanz oder Medium, die die materielle Grundlage von Kulturgütern bildet.
      fr: >-
        Substance physique ou milieu constituant la base compositionnelle des objets du patrimoine culturel.
      es: >-
        Sustancia física o medio que constituye la base compositiva de los objetos del patrimonio cultural.
      ar: >-
        مادة مادية أو وسيط يشكل الأساس التركيبي لأشياء التراث الثقافي.
      id: >-
        Zat fisik atau medium yang menjadi dasar komposisi objek warisan budaya.
      zh: >-
        构成文化遗产物品成分基础的物理物质或介质。
