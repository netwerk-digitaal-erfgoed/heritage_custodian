classes:
  FacilityType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract classification scheme for categorizing physical infrastructure, amenities, and service facilities.
    alt_descriptions:
      nl: >-
        Abstract classificatieschema voor het categoriseren van fysieke infrastructuur, voorzieningen en servicefaciliteiten.
      de: >-
        Abstraktes Klassifizierungsschema zur Kategorisierung physischer Infrastruktur, Annehmlichkeiten und Serviceeinrichtungen.
      fr: >-
        Schéma de classification abstrait pour catégoriser l'infrastructure physique, les commodités et les installations de service.
      es: >-
        Esquema de clasificación abstracto para categorizar infraestructura física, servicios e instalaciones de servicio.
      ar: >-
        مخطط تصنيف تجريدي لتصنيف البنية التحتية المادية والمرافق وخدمات المنشآت.
      id: >-
        Skema klasifikasi abstrak untuk mengkategorikan infrastruktur fisik, fasilitas, dan fasilitas layanan.
      zh: >-
        用于分类物理基础设施、便利设施和服务设施的抽象分类方案。
