id: https://nde.nl/ontology/hc/class/CurrentArchiveRecordSetType
name: CurrentArchiveRecordSetType
title: CurrentArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_scope
classes:
  CurrentArchiveRecordSetType:
    is_a: CollectionType
    abstract: true
    class_uri: rico:RecordSetType
    description: >-
      Abstract classification node for documentary aggregations maintained during
      the operational phase of institutional custody.
    alt_descriptions:
      nl: >-
        Abstract classificatieknooppunt voor documentaire aggregaties die tijdens
        de operationele fase van institutionele bewaring worden beheerd.
      de: >-
        Abstrakter Klassifikationsknoten für Dokumentaggregationen, die in der
        operativen Phase institutioneller Verwahrung geführt werden.
      fr: >-
        Nœud de classification abstrait pour des agrégations documentaires gérées
        pendant la phase opérationnelle de conservation institutionnelle.
      es: >-
        Nodo de clasificación abstracto para agregaciones documentales gestionadas
        durante la fase operativa de custodia institucional.
      ar: >-
        عقدة تصنيف مجردة للتجمعات الوثائقية التي تُدار خلال المرحلة التشغيلية
        من الحفظ المؤسسي.
      id: >-
        Simpul klasifikasi abstrak untuk agregasi dokumenter yang dikelola
        selama fase operasional penyimpanan institusional.
      zh: >-
        用于机构保管运营阶段文献聚合体的抽象分类节点。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    structured_aliases:
    - literal_form: type lopende institutionele documentaggregatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ operativer Institutionsdokumentation
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'agregation documentaire operationnelle
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de agregacion documental operativa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع تجميع وثائقي تشغيلي مؤسسي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe agregasi dokumenter operasional institusi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 在营机构文献聚合类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Serves as a reusable abstract parent for operational-phase documentary categorizations.
    - Supports harmonized lifecycle modeling before long-term historical custody.
    - 'Preserved from prior description: Abstract taxonomy node for active-phase record-set categories maintained by current archive institutions.'
    keywords:
    - lifecycle management
    - operational custody
    - documentary aggregation
    - abstract taxonomy
    examples:
    - value:
        has_scope: materials retained for active institutional workflows
      description: Generic abstract node used to specialize operational holdings
    slots:
    - has_scope
