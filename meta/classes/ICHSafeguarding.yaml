id: https://nde.nl/ontology/hc/class/ICHSafeguarding
name: ICHSafeguarding
title: ICH Safeguarding
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_objective
- ../slots/has_type
classes:
  ICHSafeguarding:
    class_uri: hc:ICHSafeguarding
    description: >-
      Coordinated action designed to ensure the viability, intergenerational transmission,
      and ongoing practice of intangible cultural heritage traditions.
    alt_descriptions:
      nl: >-
        Gecoördineerde actie ontworpen om de levensvatbaarheid, intergenerationele overdracht
        en doorlopende beoefening van immaterieel cultureel erfgoedtradities te waarborgen.
      de: >-
        Koordinierte Maßnahme zur Sicherstellung der Lebensfähigkeit, intergenerationellen Weitergabe
        und fortlaufenden Praxis immaterieller Kulturerbetraditionen.
      fr: >-
        Action coordonnée conçue pour assurer la viabilité, la transmission intergénérationnelle
        et la pratique continue des traditions du patrimoine culturel immatériel.
      es: >-
        Acción coordinada diseñada para asegurar la viabilidad, transmisión intergeneracional
        y práctica continua de tradiciones de patrimonio cultural inmaterial.
      ar: >-
        إجراء منسق مصمم لضمان جدوى ونقل الأجيال والممارسة المستمرة
        لتقاليد التراث الثقافي غير المادي.
      id: >-
        Tindakan terkoordinasi yang dirancang untuk memastikan kelayakan, transmisi antargenerasi,
        dan praktik berkelanjutan tradisi warisan budaya takbenda.
      zh: >-
        旨在确保非物质文化遗产传统的存续性、代际传承和持续实践的协调行动。
    structured_aliases:
    - literal_form: ICH-bescherming
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: ICH-Bewahrung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sauvegarde PCI
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: salvaguarda PCI
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صون التراث غير المادي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: perlindungan ICH
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 非遗保护
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_label
    - has_type
    - has_objective
    broad_mappings:
    - schema:Action
    comments:
    - Aligned with UNESCO 2003 Convention safeguarding measures.
    - Supports community-based transmission and documentation initiatives.
    - 'Preserved from prior description: Coordinated action designed to ensure viability, transmission, and continuity of intangible cultural heritage practices.'
    keywords:
    - heritage safeguarding
    - intergenerational transmission
    - community practice
    - ICH viability
