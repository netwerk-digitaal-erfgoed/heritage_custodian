id: https://nde.nl/ontology/hc/class/ResponsibilityTypes
name: ResponsibilityTypes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- ./ResponsibilityType
- linkml:types
classes:
  CurationResponsibility:
    is_a: ResponsibilityType
    description: Collection curation responsibilities.
    alt_descriptions:
      nl: Collectie-curatietaken.
      de: Sammlungskuratorverantwortlichkeiten.
      fr: Responsabilités de conservation de collection.
    structured_aliases:
    - literal_form: curatietaken
      in_language: nl
    - literal_form: Kuratorenverantwortung
      in_language: de
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
  ConservationResponsibility:
    is_a: ResponsibilityType
    description: Conservation responsibilities.
    alt_descriptions:
      nl: Conserveringstaken.
      de: Konservierungsverantwortlichkeiten.
      fr: Responsabilités de conservation.
    structured_aliases:
    - literal_form: conserveringstaken
      in_language: nl
    - literal_form: Konservierungsverantwortung
      in_language: de
    broad_mappings:
    - skos:Concept
  DigitizationResponsibility:
    is_a: ResponsibilityType
    description: Digitization responsibilities.
    alt_descriptions:
      nl: Digitaliseringstaken.
      de: Digitalisierungsverantwortlichkeiten.
      fr: Responsabilités de numérisation.
    structured_aliases:
    - literal_form: digitaliseringstaken
      in_language: nl
    - literal_form: Digitalisierungsverantwortung
      in_language: de
    broad_mappings:
    - skos:Concept
  AccessResponsibility:
    is_a: ResponsibilityType
    description: Access and reference responsibilities.
    alt_descriptions:
      nl: Toegangs- en referentietaken.
      de: Zugangs- und Referenzverantwortlichkeiten.
      fr: Responsabilités d'accès et de référence.
    structured_aliases:
    - literal_form: toegangstaken
      in_language: nl
    - literal_form: Zugangsverantwortung
      in_language: de
    broad_mappings:
    - skos:Concept
