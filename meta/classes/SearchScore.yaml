classes:
  SearchScore:
    class_uri: schema:Rating
    description: >-
      Quantitative relevance metric indicating how well a result matches a search
      query within discovery interfaces.
    alt_descriptions:
      nl: >-
        Kwantitatieve relevantiemetric die aangeeft hoe goed een resultaat overeenkomt met een zoekopdracht
        binnen ontdekkingsinterfaces.
      de: >-
        Quantitative Relevanzmetrik, die angibt, wie gut ein Ergebnis mit einer Suchanfrage
        in Discovery-Schnittstellen übereinstimmt.
      fr: >-
        Métrique de pertinence quantitative indiquant dans quelle mesure un résultat correspond
        à une requête de recherche dans les interfaces de découverte.
      es: >-
        Métrica de relevancia cuantitativa que indica qué tan bien un resultado coincide
        con una consulta de búsqueda en interfaces de descubrimiento.
      ar: >-
        مقياس صلة كمي يشير إلى مدى تطابق النتيجة مع استعلام البحث
        في واجهات الاكتشاف.
      id: >-
        Metrik relevansi kuantitatif yang menunjukkan seberapa baik hasil cocok dengan kueri pencarian
        dalam antarmuka penemuan.
      zh: >-
        指示结果在发现界面中与搜索查询匹配程度的量化相关性指标。
    structured_aliases:
