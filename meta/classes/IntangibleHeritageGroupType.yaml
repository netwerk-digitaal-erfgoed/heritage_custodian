    is_a: CustodianType
    class_uri: skos:Concept
    description: >-
      Organizational classification for institutions safeguarding and transmitting non-physical cultural expressions, oral traditions, and performative practices.
    alt_descriptions:
      nl: >-
        Organisatorische classificatie voor instellingen die niet-fysieke culturele uitingen, mondelinge tradities en uitvoerende praktijken bewaken en doorgeven.
      de: >-
        Organisatorische Klassifikation für Institutionen, die immaterielle kulturelle Ausdrucksformen, mündliche Traditionen und performative Praktiken bewahren und übertragen.
      fr: >-
        Classification organisationnelle pour les institutions sauvegardant et transmettant les expressions culturelles non physiques, les traditions orales et les pratiques performatives.
      es: >-
        Clasificación organizacional para instituciones que salvaguardan y transmiten expresiones culturales no físicas, tradiciones orales y prácticas performativas.
      ar: >-
        تصنيف تنظيمي للمؤسسات التي تحمي وتنقل التعبيرات الثقافية غير المادية والتقاليد الشفهية والممارسات الأدائية.
      id: >-
        Klasifikasi organisasi untuk lembaga yang menjaga dan mentransmisikan ekspresi budaya non-fisik, tradisi lisan, dan praktik performatif.
      zh: >-
        用于保护和传承非物质文化表现形式、口头传统和表演实践的机构的组织分类。
