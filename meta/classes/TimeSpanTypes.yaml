id: https://nde.nl/ontology/hc/class/TimeSpanTypes
name: TimeSpanTypes
title: Time Span Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
imports:
- ./TimeSpanType
- linkml:types
default_prefix: hc
classes:
  FiscalYear:
    is_a: TimeSpanType
    class_uri: hc:FiscalYear
    description: >-
      Twelve-month period used for financial reporting, budgeting, and accounting purposes.
    alt_descriptions:
      nl: Periode van twaalf maanden die wordt gebruikt voor financiële verslaggeving, begroting en boekhouding.
      de: Zwölfmonatszeitraum für Finanzberichterstattung, Budgetierung und Buchhaltung.
      fr: Période de douze mois utilisée pour les rapports financiers, la budgétisation et la comptabilité.
      es: Período de doce meses utilizado para informes financieros, presupuestos y contabilidad.
      ar: فترة اثني عشر شهرًا تُستخدم للتقارير المالية والميزانية والمحاسبة.
      id: Periode dua belas bulan yang digunakan untuk pelaporan keuangan, penganggaran, dan akuntansi.
      zh: 用于财务报告、预算编制和会计核算的十二个月周期。
    structured_aliases:
    - literal_form: boekjaar
      in_language: nl
    - literal_form: Geschäftsjahr
      in_language: de
    - literal_form: exercice fiscal
      in_language: fr
    - literal_form: ejercicio fiscal
      in_language: es
    - literal_form: سنة مالية
      in_language: ar
    - literal_form: tahun fiskal
      in_language: id
    - literal_form: 财政年度
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - crm:E52_Time-Span
    - schema:Duration
    - skos:Concept
  CalendarYear:
    is_a: TimeSpanType
    class_uri: hc:CalendarYear
    description: >-
      Twelve-month period beginning January 1st following the Gregorian.
    alt_descriptions:
      nl: Periode van twaalf maanden beginnend op 1 januari volgens de Gregoriaanse kalender.
      de: Zwölfmonatszeitraum ab dem 1. Januar nach dem gregorianischen Kalender.
      fr: Période de douze mois commençant le 1er janvier selon le calendrier grégorien.
      es: Período de doce meses que comienza el 1 de enero según el calendario gregoriano.
      ar: فترة اثني عشر شهرًا تبدأ في 1 يناير حسب التقويم الميلادي.
      id: Periode dua belas bulan yang dimulai pada 1 Januari menurut kalender Gregorian.
      zh: 公历1月1日开始的十二个月周期。
    structured_aliases:
    - literal_form: kalenderjaar
      in_language: nl
    - literal_form: Kalenderjahr
      in_language: de
    - literal_form: année civile
      in_language: fr
    - literal_form: año calendario
      in_language: es
    - literal_form: سنة ميلادية
      in_language: ar
    - literal_form: tahun kalender
      in_language: id
    - literal_form: 日历年度
      in_language: zh
    broad_mappings:
    - crm:E52_Time-Span
    - schema:Duration
    - skos:Concept
  AcademicYear:
    is_a: TimeSpanType
    class_uri: hc:AcademicYear
    description: >-
      Annual period used by educational institutions for scheduling and enrollment.
    alt_descriptions:
      nl: Jaarlijkse periode die door onderwijsinstellingen wordt gebruikt voor academische planning en inschrijving.
      de: Jahreszeitraum, den Bildungseinrichtungen für akademische Planung und Einschreibung verwenden.
      fr: Période annuelle utilisée par les établissements d'enseignement pour la planification académique et l'inscription.
      es: Período anual utilizado por las instituciones educativas para la planificación académica y la inscripción.
      ar: فترة سنوية تستخدمها المؤسسات التعليمية للجدولة الأكاديمية والتسجيل.
      id: Periode tahunan yang digunakan oleh lembaga pendidikan untuk penjadwalan akademik dan pendaftaran.
      zh: 教育机构用于学术安排和招生的年度周期。
    structured_aliases:
    - literal_form: academisch jaar
      in_language: nl
    - literal_form: akademisches Jahr
      in_language: de
    - literal_form: année académique
      in_language: fr
    - literal_form: año académico
      in_language: es
    - literal_form: عام دراسي
      in_language: ar
    - literal_form: tahun akademik
      in_language: id
    - literal_form: 学年
      in_language: zh
    broad_mappings:
    - crm:E52_Time-Span
    - schema:Duration
    - skos:Concept
