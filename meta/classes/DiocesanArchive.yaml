classes:
  DiocesanArchive:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Ecclesiastical repository institution of a diocese responsible for
      preserving administrative, pastoral, and sacramental documentary records.
    alt_descriptions:
      nl: Kerkelijke archiefinstelling van een bisdom die bestuurlijke pastorale en sacramentele documentatie bewaart.
      de: Kirchliche Archivinstitution einer Dioezese zur Bewahrung administrativer pastoraler und sakramentaler Unterlagen.
      fr: Institution archivistique ecclesiastique d un diocese chargee de conserver les documents administratifs pastoraux et sacramentels.
      es: Institucion archivistica eclesiastica de una diocesis responsable de conservar registros administrativos pastorales y sacramentales.
      ar: مؤسسة أرشيف كنسية تابعة لأبرشية تتولى حفظ السجلات الإدارية والرعوية والسَّرّية.
      id: Lembaga arsip gerejawi tingkat keuskupan yang bertanggung jawab atas pelestarian catatan administratif pastoral dan sakramental.
      zh: 隶属教区、负责保存行政、牧灵与圣事文献记录的教会档案机构。
    structured_aliases:
    - {literal_form: bisdomarchief, in_language: nl}
    - {literal_form: Dioezesanarchiv, in_language: de}
    - {literal_form: archive diocesaine, in_language: fr}
    - {literal_form: archivo diocesano, in_language: es}
    - {literal_form: أرشيف الأبرشية, in_language: ar}
    - {literal_form: arsip keuskupan, in_language: id}
    - {literal_form: 教区档案机构, in_language: zh}
    close_mappings:
    - wd:Q11906839
    broad_mappings:
