    - wd:Q166118
    related_mappings:
    - wd:Q2877653
    - wd:Q34544468
    - wd:Q132201761
    - wd:Q27030561
    slots:
    - require
    - has_type
    - originate_from
    - part_of
    - hold_record_set
    - has_score
    - identified_by
    slot_usage:
      originate_from:
        range: Diocese
      part_of:
        range: Organization
        any_of:
