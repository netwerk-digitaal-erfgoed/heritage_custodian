    comments:
    - Archive-as-organization type; not a record-set classifier
    - Access may include canonical or diocesan authorization constraints
    notes:
    - |
      Preserved from prior description (commit d52149a5):

      "Archive of a bishopric (diocese) - ecclesiastical administrative unit.\n\n**Wikidata**: Q11906839 (diocesan archive / Bisch\xF6fliches Archiv)\n\n**DEFINITION**:\n\nDiocesan Archive preserves records created by or relating to a Catholic\nor Anglican diocese (bishopric). Holdings typically include:\n\n- Episcopal correspondence and decrees\n- Diocesan administrative records\n- Personnel files (clergy appointments, ordinations)\n- Parish records (copies or originals)\n- Matrimonial dispensation records\n- Visitation records\n- Financial/property records of the diocese\n\n**ECCLESIASTICAL HIERARCHY**:\n\n```\nVatican Archives (central)\n  \u251C\u2500\u2500 Archdioceses \u2192 Archdiocesan Archives\n  \u2502     \u2514\u2500\u2500 Dioceses \u2192 DIOCESAN ARCHIVE (THIS TYPE)\n  \u2502           \u2514\u2500\u2500 Parishes \u2192 Parish Archives\n  \u2514\u2500\u2500 Religious Orders \u2192 Order Archives\n```\n\n**HISTORICAL SIGNIFICANCE**:\n\nDiocesan archives are critical\
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
