id: https://nde.nl/ontology/hc/classes/OriginalEntryIdentifier
name: OriginalEntryIdentifier
title: OriginalEntryIdentifier
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  dcterms: http://purl.org/dc/terms/
imports:
- linkml:types
# default_range: string
classes:
  OriginalEntryIdentifier:
    description: >-
      Identifier value preserved from an original source entry during data migration
      or transformation processes.
    alt_descriptions:
      nl: >-
        Identificatiewaarde bewaard uit een oorspronkelijke bronvermelding tijdens gegevensmigratie
        of transformatieprocessen.
      de: >-
        Kennungswert, der während Datenmigration oder Transformationsprozessen aus einem
        ursprünglichen Quelleneintrag bewahrt wurde.
      fr: >-
        Valeur d'identifiant préservée d'une entrée source originale lors des processus
        de migration ou de transformation de données.
      es: >-
        Valor de identificador preservado de una entrada de fuente original durante procesos
        de migración o transformación de datos.
      ar: >-
        قيمة معرّف محفوظة من إدخال المصدر الأصلي خلال عمليات
        ترحيل البيانات أو تحويلها.
      id: >-
        Nilai pengidentifikasi yang dilestarikan dari entri sumber asli selama proses
        migrasi atau transformasi data.
      zh: >-
        在数据迁移或转换过程中从原始来源条目保留的标识符值。
    structured_aliases:
    - literal_form: oorspronkelijke vermelding-id
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Original-Eintrag-Kennung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: identifiant d'entrée originale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: identificador de entrada original
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: معرّف الإدخال الأصلي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pengidentifikasi entri asli
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 原始条目标识符
      predicate: EXACT_SYNONYM
      in_language: zh
    class_uri: dcterms:Identifier
    broad_mappings:
    - dcterms:Identifier
    close_mappings:
    - schema:PropertyValue
    related_mappings:
    - prov:Entity
    comments:
    - "Often represents property-value identifier pairs (see schema:PropertyValue)."
    - "Note: schema:identifier is a predicate commonly used to attach identifier values to entities."
    - 'Preserved from prior description: Identifier value preserved from an original source entry.'
    keywords:
    - source identifier
    - migration preservation
    - original entry
    - data provenance
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
