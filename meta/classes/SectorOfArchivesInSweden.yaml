id: https://w3id.org/nde/ontology/SectorOfArchivesInSweden
name: SectorOfArchivesInSweden
title: Sector of Archives in Sweden
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- ../classes/AgentType
- linkml:types
- ../slots/identified_by
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  SectorOfArchivesInSweden:
    description: >-
      The archival sector in Sweden, representing the collective system of archival
      institutions and practices including Riksarkivet, regional archives, municipal
      archives, and private archives.
    alt_descriptions:
      sv: Arkivsektorn i Sverige, som representerar det gemensamma systemet av arkivinstitutioner inklusive Riksarkivet, landsarkiv, kommunarkiv och privata arkiv.
      de: Der Archivsektor in Schweden, repräsentiert das kollektive System der Archivinstitutionen einschließlich Riksarkivet, Regionalarchive, Kommunalarchive und private Archive.
    structured_aliases:
    - literal_form: Arkivsektorn i Sverige
      in_language: sv
    - literal_form: Archivwesen in Schweden
      in_language: de
    - literal_form: Secteur des archives en Suède
      in_language: fr
    comments:
    - Describes Swedish archival infrastructure as a whole rather than individual institutions.
    - Includes national, regional, and local archives.
    - Functions as an official public-sector archival domain classification in Sweden.
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - skos:Concept
    - wd:Q84171278
    broad_mappings:
    - wd:Q166118
    slot_usage:
      identified_by:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: Sector of Archives in Sweden
      skos:altLabel: Archivwesen in Schweden, Swedish Archival Sector
      geographic_restriction: Sweden only
      custodian_only: 'true'
      sector_term: 'yes'
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - RegionalStateArchives
    - Landsarkiv
    - NationalArchives
