id: https://nde.nl/ontology/hc/class/KeyArchive
name: KeyArchive
title: Key Archive
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_name
classes:
  KeyArchive:
    class_uri: hc:KeyArchive
    description: >-
      Priority repository designated as the primary archival source for a
      specific subject domain, historical period, or community.
    alt_descriptions:
      nl: >-
        Prioriteitsbewaarplaats aangewezen als de primaire archiefbron voor een specifiek
        onderwerpdomein, historische periode of gemeenschap.
      de: >-
        Prioritätsarchiv, das als primäre Archivquelle für einen bestimmten Fachbereich,
        historischen Zeitraum oder eine Gemeinschaft ausgewiesen ist.
      fr: >-
        Dépôt prioritaire désigné comme source archivistique principale pour un domaine
        thématique, une période historique ou une communauté spécifique.
      es: >-
        Repositorio prioritario designado como fuente archivística principal para un
        dominio temático, período histórico o comunidad específicos.
      ar: >-
        مستودع ذو أولوية مُعيَّن كمصدر أرشيفي أساسي لمجال موضوعي أو فترة تاريخية أو مجتمع محدد.
      id: >-
        Repositori prioritas yang ditetapkan sebagai sumber arsip utama untuk domain
        subjek, periode sejarah, atau komunitas tertentu.
      zh: >-
        被指定为特定主题领域、历史时期或社区的主要档案来源的优先存储库。
    slots:
      - has_name
      - identified_by
    broad_mappings:
      - rico:RecordSet
