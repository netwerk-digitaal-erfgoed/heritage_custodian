id: https://nde.nl/ontology/hc/class/custodian-place
name: custodian_place_class
title: CustodianPlace Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  geo: http://www.opengis.net/ont/geosparql#
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - ./ReconstructedEntity
  - linkml:types
  - ../slots/in_country
  - ../slots/related_to
  - ../slots/has_geographic_subdivision
  - ../slots/has_location
  - ../slots/has_score
  - ../slots/derive_from
  - ../slots/generated_by
  - ../slots/refer_to
  - ../slots/in_language
  - ../slots/has_label
  - ../slots/has_note
  - ../slots/specified_as
  - ../slots/has_locality
  - ../slots/temporal_extent
classes:
  CustodianPlace:
    is_a: ReconstructedEntity
    class_uri: crm:E53_Place
    description: >-
      Reconstructed nominal location expression identifying the geographic context
      where a heritage custodian operates or is situated.
    alt_descriptions:
      nl: >-
        Gereconstrueerde nominale locatie-uitdrukking die de geografische context identificeert
        waar een erfgoedbeheerder opereert of gevestigd is.
      de: >-
        Rekonstruierter nominaler Standortausdruck, der den geografischen Kontext identifiziert,
        in dem ein Kulturerbeverwalter tätig ist oder angesiedelt ist.
      fr: >-
        Expression nominale de lieu reconstituée identifiant le contexte géographique où
        un dépositaire patrimonial opère ou est situé.
      es: >-
        Expresión nominal de lugar reconstruida que identifica el contexto geográfico donde
        opera o está situado un custodio patrimonial.
      ar: >-
        تعبير مكاني اسمي معاد بناؤه يحدد السياق الجغرافي الذي يعمل فيه أو يقع فيه أمين التراث.
      id: >-
        Ekspresi lokasi nominal yang direkonstruksi yang mengidentifikasi konteks geografis
        tempat kustodian warisan beroperasi atau berada.
      zh: >-
        标识遗产保管人运营或所在地理环境的重建名义地点表达式。
    structured_aliases:
      - literal_form: beheerderslocatie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: instellingsplaats
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Verwahrer-Standort
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Institutioneller Ort
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: lieu du dépositaire
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: localisation institutionnelle
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: ubicación del custodio
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: lugar institucional
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: موقع الأمين
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: موقع المؤسسة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: lokasi pengelola
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: lokasi kelembagaan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 托管人地点
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: 机构位置
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - custodian place
      - institution location
      - heritage site
      - organizational address
      - custodial location
    broad_mappings:
      - crm:E53_Place
      - schema:Place
    close_mappings:
      - dcterms:Location
      - geo:Feature
    related_mappings:
      - prov:Entity
    slots:
      - related_to
      - in_country
      - has_location
      - in_language
      - has_label
      - has_note
      - specified_as
      - refer_to
      - has_locality
      - has_geographic_subdivision
      - has_score
      - temporal_extent
      - derive_from
      - generated_by
