classes:
  IntangibleHeritageEvent:
    class_uri: schema:Event
    description: >-
      Concrete occurrence or enactment of a living heritage tradition, celebration, or customary practice.
    alt_descriptions:
      nl: >-
        Concrete gebeurtenis of uitvoering van een levende erfgoedtraditie, viering of gebruikelijke praktijk.
      de: >-
        Konkretes Ereignis oder Inszenierung einer lebendigen Kulturerbetradition, Feier oder üblichen Praxis.
      fr: >-
        Occurrence concrète ou mise en œuvre d'une tradition patrimoniale vivante, d'une célébration ou d'une pratique coutumière.
      es: >-
        Ocurrencia concreta o puesta en práctica de una tradición patrimonial viva, celebración o práctica consuetudinaria.
      ar: >-
        مناسبة ملموسة أو تمثيل لتقليد تراثي حي أو احتفال أو ممارسة عرفية.
      id: >-
        Kejadian konkret atau pelaksanaan tradisi warisan hidup, perayaan, atau praktik adat.
      zh: >-
        活态遗产传统、庆典或习俗实践的具体发生或实施。
