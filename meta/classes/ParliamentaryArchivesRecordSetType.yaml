id: https://nde.nl/ontology/hc/class/ParliamentaryArchivesRecordSetType
name: ParliamentaryArchivesRecordSetType
title: ParliamentaryArchives Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  ParliamentaryArchivesRecordSetType:
    description: >-
      Taxonomy node for aggregations of legislative deliberations, bills, committee proceedings,
      and official government documentation.
    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties van wetgevingsberaden, wetsontwerpen, commissievergaderingen
        en officiële overheidsdocumentatie.
      de: >-
        Taxonomieknoten für Aggregationen von Gesetzgebungsberatungen, Gesetzentwürfen, Ausschussverhandlungen
        und offizieller Regierungsdokumentation.
      fr: >-
        Nœud taxonomique pour les agrégations de délibérations législatives, projets de loi, procédures
        de commission et documentation gouvernementale officielle.
      es: >-
        Nodo taxonómico para agregaciones de deliberaciones legislativas, proyectos de ley, procedimientos
        de comisión y documentación gubernamental oficial.
      ar: >-
        عقدة تصنيفية لتجميعات المداولات التشريعية ومشاريع القوانين وإجراءات اللجان والوثائق الحكومية الرسمية.
      id: >-
        Simpul taksonomi untuk agregasi deliberasi legislatif, rancangan undang-undang, prosedur komite,
        dan dokumentasi pemerintah resmi.
      zh: >-
        用于聚合立法审议、法案、委员会程序和官方政府文件的分类法节点。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - ParliamentaryArchives
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: ParliamentaryArchivesRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: Record set type used to classify materials typically held by parliamentary archives.'
