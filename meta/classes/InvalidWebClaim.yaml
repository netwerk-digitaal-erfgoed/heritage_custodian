  - ../slots/has_url
  - ../slots/retrieved_at
  - ../slots/has_provenance
classes:
  InvalidWebClaim:
    class_uri: rdf:Statement
    description: >-
      Web-derived assertion that failed validation checks, retained for quality assurance auditing.
    alt_descriptions:
      nl: >-
        Van het web afgeleide bewering die validatiecontroles niet heeft doorstaan, bewaard voor kwaliteitsborgingsauditing.
      de: >-
        Web-basierte Behauptung, die Validierungsprüfungen nicht bestanden hat, für Qualitätssicherungs-Audits aufbewahrt.
      fr: >-
        Assertion issue du web qui a échoué aux contrôles de validation, conservée pour l'audit d'assurance qualité.
      es: >-
        Afirmación derivada de la web que no pasó las verificaciones de validación, conservada para auditoría de aseguramiento de calidad.
      ar: >-
        تأكيد مشتق من الويب فشل في فحوصات التحقق، محفوظ لتدقيق ضمان الجودة.
      id: >-
        Klaim berbasis web yang gagal dalam pemeriksaan validasi, disimpan untuk audit jaminan kualitas.
      zh: >-
        未能通过验证检查的网页派生断言，保留用于质量保证审计。
