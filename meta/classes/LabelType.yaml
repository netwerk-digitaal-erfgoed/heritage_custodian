id: https://nde.nl/ontology/hc/class/LabelType
name: LabelType
title: Label Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_code
- ../slots/has_description
- ../slots/has_label
classes:
  LabelType:
    class_uri: hc:LabelType
    abstract: true
    description: >-
      Controlled classification root for distinguishing roles of designations such as
      official name, alias, abbreviated form, or alphanumeric identifier.
    alt_descriptions:
      nl: >-
        Gecontroleerde classificatiewortel voor het onderscheiden van rollen van benamingen zoals
        officiële naam, alias, afgekorte vorm of alfanumerieke identificatie.
      de: >-
        Kontrollierte Klassifikationswurzel zur Unterscheidung von Rollen von Bezeichnungen wie
        offizieller Name, Alias, abgekürzte Form oder alphanumerische Kennung.
      fr: >-
        Racine de classification contrôlée pour distinguer les rôles des désignations telles que
        nom officiel, alias, forme abrégée ou identifiant alphanumérique.
      es: >-
        Raíz de clasificación controlada para distinguir roles de designaciones como
        nombre oficial, alias, forma abreviada o identificador alfanumérico.
      ar: >-
        جذر تصنيف مضبوط للتمييز بين أدوار التسميات مثل
        الاسم الرسمي أو الاسم المستعار أو الشكل المختصر أو المعرف الأبجدي الرقمي.
      id: >-
        Akar klasifikasi terkontrol untuk membedakan peran penunjukan seperti
        nama resmi, alias, bentuk singkat, atau pengidentifikasi alfanumerik.
      zh: >-
        用于区分官方名称、别名、缩写形式或字母数字标识符等指定角色的受控分类根节点。
    structured_aliases:
    - literal_form: naamroltype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Bezeichnungsrollentyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de rôle de désignation
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de rol de designación
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع دور التسمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe peran penunjukan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 指定角色类型
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_label
    - has_code
    - has_description
    slot_usage:
      has_code:
        required: true
    broad_mappings:
    - skos:Concept
    comments:
    - Abstract base for all designation role taxonomies.
    - Subclasses define specific naming conventions for heritage entities.
    - 'Preserved from prior description: Controlled classification root for distinguishing roles of labels such as official name, alias, short form, or code.'
    keywords:
    - designation taxonomy
    - naming conventions
    - classification root
    - controlled vocabulary
    examples:
    - value:
        has_label: Official Name
        has_code: OFFICIAL
        has_description: Formal designation recognized by authoritative bodies.
      description: Official designation role specification
