        Geografische Positionsdaten, die wörtlich aus einer ursprünglichen Datenquelle ohne Transformation bewahrt wurden.
      fr: >-
        Données de positionnement géographique conservées textuellement à partir d'une source de données d'origine sans transformation.
      es: >-
        Datos de posicionamiento geográfico conservados textualmente de una fuente de datos original sin transformación.
      ar: >-
        بيانات تحديد الموقع الجغرافي المحفوظة حرفياً من مصدر البيانات الأصلي دون تحويل.
