classes:
  Manager:
    class_uri: hc:Manager
    description: >-
      Individual holding a supervisory role with responsibility for directing operations, personnel, or programs.
    alt_descriptions:
      nl: >-
        Persoon met een leidinggevende functie die verantwoordelijk is voor het sturen van activiteiten, personeel of programma's.
      de: >-
        Person mit einer Führungsrolle, die für die Leitung von Operationen, Personal oder Programmen verantwortlich ist.
      fr: >-
        Personne occupant un rôle de supervision responsable de la direction des opérations, du personnel ou des programmes.
      es: >-
        Persona con un rol supervisor responsable de dirigir operaciones, personal o programas.
      ar: >-
        فرد يشغل دور إشرافي مسؤول عن توجيه العمليات أو الموظفين أو البرامج.
      id: >-
        Individu yang memegang peran pengawasan dengan tanggung jawab mengarahkan operasi, personel, atau program.
      zh: >-
        担任监督角色，负责指导运营、人员或项目的个人。
