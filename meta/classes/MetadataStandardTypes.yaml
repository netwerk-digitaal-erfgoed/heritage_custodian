id: https://nde.nl/ontology/hc/class/MetadataStandardTypes
name: MetadataStandardTypes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- ./MetadataStandardType
- linkml:types
classes:
  DublinCoreStandard:
    is_a: MetadataStandardType
    description: Metadata-standard family defined by the Dublin Core element set.
    alt_descriptions:
      nl: Familie van metadata-standaarden gebaseerd op de Dublin Core-elementenset.
      de: Familie von Metadatenstandards auf Basis des Dublin-Core-Elementsets.
      fr: Famille de normes de metadonnees definie par l ensemble d elements Dublin Core.
      es: Familia de estandares de metadatos definida por el conjunto de elementos Dublin Core.
      ar: عائلة معايير بيانات وصفية معرّفة عبر مجموعة عناصر دبلن كور.
      id: Keluarga standar metadata yang ditentukan oleh himpunan elemen Dublin Core.
      zh: 由都柏林核心元素集定义的元数据标准家族。
    structured_aliases:
    - {literal_form: Dublin Core-profiel, in_language: nl}
    - {literal_form: Dublin-Core-Standardfamilie, in_language: de}
    - {literal_form: famille Dublin Core, in_language: fr}
    - {literal_form: familia Dublin Core, in_language: es}
    - {literal_form: عائلة دبلن كور, in_language: ar}
    - {literal_form: keluarga Dublin Core, in_language: id}
    - {literal_form: 都柏林核心标准家族, in_language: zh}
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
  MARCStandard:
    is_a: MetadataStandardType
    description: Bibliographic metadata-standard family based on MARC field structures.
    alt_descriptions:
      nl: Familie van bibliografische metadata-standaarden gebaseerd op MARC-veldstructuren.
      de: Familie bibliografischer Metadatenstandards auf Grundlage von MARC-Feldstrukturen.
      fr: Famille de normes bibliographiques fondee sur les structures de champs MARC.
      es: Familia de estandares bibliograficos basada en estructuras de campos MARC.
      ar: عائلة معايير بيانات ببليوغرافية مبنية على بنى حقول مارك.
      id: Keluarga standar metadata bibliografis berbasis struktur bidang MARC.
      zh: 基于MARC字段结构的书目元数据标准家族。
    structured_aliases:
    - {literal_form: MARC-standaardfamilie, in_language: nl}
    - {literal_form: MARC-Standardfamilie, in_language: de}
    - {literal_form: famille MARC, in_language: fr}
    - {literal_form: familia MARC, in_language: es}
    - {literal_form: عائلة معيار مارك, in_language: ar}
    - {literal_form: keluarga standar MARC, in_language: id}
    - {literal_form: MARC标准家族, in_language: zh}
    broad_mappings:
    - skos:Concept
  EADStandard:
    is_a: MetadataStandardType
    description: XML-encoding standard family for archival finding-aid descriptions.
    alt_descriptions:
      nl: Familie van XML-coderingsstandaarden voor beschrijvingen van archivistische toegangen.
      de: Familie von XML-Kodierungsstandards fuer archivische Findmittelbeschreibungen.
      fr: Famille de normes d encodage XML pour les descriptions d instruments de recherche archivistiques.
      es: Familia de estandares de codificacion XML para descripciones de instrumentos archivisticos.
      ar: عائلة معايير ترميز XML لوصف وسائل الإيجاد الأرشيفية.
      id: Keluarga standar pengodean XML untuk deskripsi finding aid kearsipan.
      zh: 用于档案检索工具描述的XML编码标准家族。
    structured_aliases:
    - {literal_form: EAD-standaardfamilie, in_language: nl}
    - {literal_form: EAD-Standardfamilie, in_language: de}
    - {literal_form: famille EAD, in_language: fr}
    - {literal_form: familia EAD, in_language: es}
    - {literal_form: عائلة معيار EAD, in_language: ar}
    - {literal_form: keluarga standar EAD, in_language: id}
    - {literal_form: EAD标准家族, in_language: zh}
    broad_mappings:
    - skos:Concept
  LIDOStandard:
    is_a: MetadataStandardType
    description: Museum-metadata standard family using the LIDO event-centric model.
    alt_descriptions:
      nl: Familie van museum-metadata-standaarden met het gebeurtenisgerichte LIDO-model.
      de: Familie von Museumsmetadatenstandards mit dem ereigniszentrierten LIDO-Modell.
      fr: Famille de normes de metadonnees museales utilisant le modele evenementiel LIDO.
      es: Familia de estandares de metadatos museisticos que usa el modelo orientado a eventos LIDO.
      ar: عائلة معايير بيانات متحفية تستخدم نموذج LIDO المرتكز على الحدث.
      id: Keluarga standar metadata museum yang menggunakan model LIDO berbasis peristiwa.
      zh: 采用LIDO事件中心模型的博物馆元数据标准家族。
    structured_aliases:
    - {literal_form: LIDO-standaardfamilie, in_language: nl}
    - {literal_form: LIDO-Standardfamilie, in_language: de}
    - {literal_form: famille LIDO, in_language: fr}
    - {literal_form: familia LIDO, in_language: es}
    - {literal_form: عائلة معيار LIDO, in_language: ar}
    - {literal_form: keluarga standar LIDO, in_language: id}
    - {literal_form: LIDO标准家族, in_language: zh}
    broad_mappings:
    - skos:Concept
  EDMStandard:
    is_a: MetadataStandardType
    description: Aggregation-oriented metadata-standard family defined by the Europeana Data Model.
    alt_descriptions:
      nl: Aggregatiegerichte familie van metadata-standaarden gedefinieerd door het Europeana Data Model.
      de: Aggregationsorientierte Familie von Metadatenstandards definiert durch das Europeana Data Model.
      fr: Famille de normes de metadonnees orientee aggregation definie par le modele de donnees Europeana.
      es: Familia de estandares de metadatos orientada a agregacion definida por el Europeana Data Model.
      ar: عائلة معايير بيانات وصفية موجهة للتجميع يحددها نموذج بيانات يوروبيانا.
      id: Keluarga standar metadata berorientasi agregasi yang didefinisikan oleh Europeana Data Model.
      zh: 由Europeana数据模型定义、面向聚合的元数据标准家族。
    structured_aliases:
    - {literal_form: EDM-standaardfamilie, in_language: nl}
    - {literal_form: EDM-Standardfamilie, in_language: de}
    - {literal_form: famille EDM, in_language: fr}
    - {literal_form: familia EDM, in_language: es}
    - {literal_form: عائلة معيار EDM, in_language: ar}
    - {literal_form: keluarga standar EDM, in_language: id}
    - {literal_form: EDM标准家族, in_language: zh}
    broad_mappings:
    - skos:Concept
