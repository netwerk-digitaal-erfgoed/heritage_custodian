id: https://nde.nl/ontology/hc/class/GeoNamesIdentifier
name: GeoNamesIdentifier
title: GeoNames Identifier Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  gn: http://www.geonames.org/ontology#
default_prefix: hc
imports:
  - linkml:types
classes:
  GeoNamesIdentifier:
    is_a: Identifier
    class_uri: hc:GeoNamesIdentifier
    description: >-
      External reference code linking to a geographic feature entry in the
      GeoNames geographical gazetteer database.
    alt_descriptions:
      nl: >-
        Externe verwijzingscode die koppelt aan een geografische feature-ingang in de
        GeoNames geografische gazetteer-database.
      de: >-
        Externer Referenzcode, der mit einem geografischen Merkmalseintrag in der
        GeoNames-Gazetteer-Datenbank verknüpft.
      fr: >-
        Code de référence externe lié à une entrée d'entité géographique dans la base
        de données du gazetteer géographique GeoNames.
      es: >-
        Código de referencia externo que enlaza con una entrada de característica geográfica
        en la base de datos de gazetteer geográfico GeoNames.
      ar: >-
        رمز مرجعي خارجي يربط بإدخال معلم جغرافي في قاعدة بيانات الموقع الجغرافي GeoNames.
      id: >-
        Kode referensi eksternal yang menautkan ke entri fitur geografis dalam database
        gazetteer geografis GeoNames.
      zh: >-
        链接到GeoNames地理地名词典数据库中地理要素条目的外部参考代码。
    close_mappings:
      - dcterms:Identifier
    related_mappings:
      - gn:geonamesID
    annotations:
      specificity_score: 0.3
      specificity_rationale: Specialized external place identifier class.
      custodian_types: '["*"]'
