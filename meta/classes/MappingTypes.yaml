classes:
  ExactMapping:
    is_a: MappingType
    class_uri: hc:ExactMapping
    description: >-
      Mapping type indicating semantic equivalence between local and external concepts.
    alt_descriptions:
      nl: >-
        Toewijzingstype dat semantische equivalentie aangeeft tussen lokale en externe concepten.
      de: >-
        Zuordnungstyp, der semantische Äquivalenz zwischen lokalen und externen Konzepten anzeigt.
      fr: >-
        Type de mappage indiquant l'équivalence sémantique entre les concepts locaux et externes.
      es: >-
        Tipo de mapeo que indica equivalencia semántica entre conceptos locales y externos.
      ar: >-
        نوع التعيين الذي يشير إلى التكافؤ الدلالي بين المفاهيم المحلية والخارجية.
      id: >-
        Jenis pemetaan yang menunjukkan kesetaraan semantik antara konsep lokal dan eksternal.
      zh: >-
        指示本地概念与外部概念之间语义等价关系的映射类型。
