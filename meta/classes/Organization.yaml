    - CorporateBody
    - OrganizationalSubdivision
    comments:
    - Organisation (de)
    - "organización (es)"
    - organisation (fr)
    - Broad category - prefer more specific types
    - Maps to org:Organization in W3C Organization Ontology
    - Base concept for formal entities with archival functions
