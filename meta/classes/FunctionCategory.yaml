id: https://nde.nl/ontology/hc/class/FunctionCategory
name: FunctionCategory
title: Function Category
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  FunctionCategory:
    class_uri: hc:FunctionCategory
    description: >-
      Controlled high-level grouping used to organize institutional functions by
      operational purpose.
    alt_descriptions:
      nl: Gecontroleerde hoofdindeling om institutionele functies naar operationeel doel te ordenen.
      de: Kontrollierte Oberkategorie zur Ordnung institutioneller Funktionen nach betrieblichem Zweck.
      fr: Categorie controlee de haut niveau pour organiser les fonctions institutionnelles selon leur finalite operationnelle.
      es: Agrupacion controlada de alto nivel para organizar funciones institucionales por finalidad operativa.
      ar: تصنيف علوي مضبوط لتنظيم الوظائف المؤسسية بحسب الغرض التشغيلي.
      id: Pengelompokan tingkat tinggi terkendali untuk mengatur fungsi kelembagaan berdasarkan tujuan operasional.
      zh: 用于按运营目的组织机构职能的受控高层分类。
    structured_aliases:
      - literal_form: functiecategorie
        in_language: nl
      - literal_form: Funktionskategorie
        in_language: de
      - literal_form: categorie fonctionnelle
        in_language: fr
      - literal_form: categoria funcional
        in_language: es
      - literal_form: فئة الوظيفة
        in_language: ar
      - literal_form: kategori fungsi
        in_language: id
      - literal_form: 职能类别
        in_language: zh
    slots:
      - has_label
      - has_description
    broad_mappings:
      - skos:Concept
