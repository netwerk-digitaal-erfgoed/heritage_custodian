id: https://nde.nl/ontology/hc/class/LocalGovernmentArchiveRecordSetType
name: LocalGovernmentArchiveRecordSetType
title: Local Government Archive Record Set Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_type
- ../slots/has_scope
- ../slots/has_score
classes:
  LocalGovernmentArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Classification concept for documentary aggregations created by municipal
      and regional public-administration bodies.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties die zijn gevormd
        door gemeentelijke en regionale overheidsorganen.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die von
        kommunalen und regionalen öffentlichen Verwaltungsstellen erzeugt wurden.
      fr: >-
        Concept de classification pour des agrégations documentaires produites
        par des organismes d'administration publique municipaux et régionaux.
      es: >-
        Concepto de clasificación para agregaciones documentales creadas por
        organismos de administración pública municipal y regional.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي أنشأتها هيئات الإدارة العامة
        البلدية والإقليمية.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dihasilkan oleh
        badan administrasi publik tingkat kota dan wilayah.
      zh: >-
        用于分类由市级和区域公共行政机构形成的文献聚合体的分类概念。
    slots:
    - has_type
    - has_scope
    - has_score
    slot_usage:
      has_type:
        equals_string: LocalGovernmentArchiveRecordSetType
    structured_aliases:
    - literal_form: type lokale overheidsdocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ kommunaler Verwaltungsdokumentation
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'agrégation documentaire d'administration locale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de agregación documental de gobierno local
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع تجميع وثائقي للحكومة المحلية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe agregasi dokumenter pemerintah daerah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地方政府文献聚合类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Supports categorization of documentary output from local public-administration functions.
    - Useful for municipal accountability, governance reconstruction, and civic-history research.
    - 'Preserved from prior description: Record-set type for classifying local-government archival holdings.'
    keywords:
    - municipal administration
    - regional governance
    - documentary aggregation
    - public accountability
    examples:
    - value:
        has_type: LocalGovernmentArchiveRecordSetType
        has_scope: Council minutes, permits, and budget dossiers.
      description: Documentary aggregation from municipal and regional administration.
    annotations:
      specificity_score: 0.55
      specificity_rationale: Record-set typing for local public-administration archive materials.
      custodian_types: '["*"]'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
