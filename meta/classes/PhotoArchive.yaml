    - wd:Q166118
    slot_usage:
      identified_by:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: Photo Archive
      skos:altLabel: "Fotoarchiv, archivo fotográfico, archive photographique, Photograph Archive, Photographic Archive"
