id: https://nde.nl/ontology/hc/class/MilitaryArchiveRecordSetTypes
name: MilitaryArchiveRecordSetTypes
title: Military Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./MilitaryArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
- ../slots/has_scope
classes:
  MilitaryOperationsFonds:
    is_a: MilitaryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Fonds-oriented records of command, operations, and campaign execution.
    keywords:
    - military operations
    - campaigns
    - battles
    - command
    - strategy
    - fonds
    alt_descriptions:
      nl: Fondsgerichte records over bevelvoering operaties en campagne-uitvoering.
      de: Fondsorientierte Unterlagen zu Fuehrung Operationen und Kampagnendurchfuehrung.
      fr: Documents de type fonds sur le commandement les operations et la conduite des campagnes.
      es: Registros de tipo fondo sobre mando operaciones y ejecucion de campanas militares.
      ar: سجلات على مبدأ الفوندس تتعلق بالقيادة والعمليات وتنفيذ الحملات العسكرية.
      id: Rekaman berbasis fonds mengenai komando operasi dan pelaksanaan kampanye militer.
      zh: 采用全宗原则组织的指挥、行动与战役执行记录。
    structured_aliases:
    - {literal_form: militaire operatiefonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Militaeroperationsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds des operations militaires, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de operaciones militares, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس عمليات عسكرية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds operasi militer, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 军事行动全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MilitaryOperationsFonds

  MilitaryPersonnelSeries:
    is_a: MilitaryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Series of personnel-service records for enlistment, career events, and discharge.
    keywords:
    - personnel
    - service records
    - enlistment
    - discharge
    - military career
    - series
    alt_descriptions:
      nl: Reeks personeelsdossiers over aanstelling loopbaan en ontslag uit militaire dienst.
      de: Serien von Personalakten zu Eintritt Laufbahnereignissen und Entlassung aus dem Militaerdienst.
      fr: Series de dossiers du personnel couvrant engagement parcours de service et sortie.
      es: Series de expedientes de personal sobre alistamiento trayectoria de servicio y baja.
      ar: سلاسل ملفات الأفراد الخاصة بالتجنيد ومسار الخدمة والتسريح.
      id: Seri arsip personel untuk pendaftaran riwayat dinas dan pemberhentian.
      zh: 涵盖入伍、服役经历与退役的人事档案系列。
    structured_aliases:
    - {literal_form: militaire personeelsserie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie Militaerpersonalakten, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie des dossiers du personnel militaire, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de expedientes de personal militar, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات الأفراد العسكريين, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri arsip personel militer, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 军事人员档案系列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MilitaryPersonnelSeries

  UnitHistoryCollection:
    is_a: MilitaryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Assembled documentation of regiments, battalions, and other unit histories.
    keywords:
    - unit history
    - regiment
    - battalion
    - military units
    - documentation
    - collection
    alt_descriptions:
      nl: Samengestelde documentatie over de geschiedenis van regimenten bataljons en andere eenheden.
      de: Zusammengetragene Dokumentation zur Geschichte von Regimentern Bataillonen und weiteren Einheiten.
      fr: Documentation rassemblee sur l histoire des regiments bataillons et autres unites.
      es: Documentacion reunida sobre la historia de regimientos batallones y otras unidades.
      ar: توثيق مجمّع لتاريخ الأفواج والكتائب والوحدات العسكرية الأخرى.
      id: Dokumentasi terhimpun mengenai sejarah resimen batalyon dan unit militer lainnya.
      zh: 汇集团、营及其他部队历史的组合型文献记录。
    structured_aliases:
    - {literal_form: collectie eenheidsgeschiedenis, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung zur Einheitengeschichte, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection d histoire d unite, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de historia de unidades, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة تاريخ الوحدات, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi sejarah satuan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 部队历史文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:UnitHistoryCollection

  MilitaryMapsCollection:
    is_a: MilitaryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of strategic maps, battle plans, and military cartographic materials.
    keywords:
    - maps
    - cartography
    - strategic
    - battle plans
    - military geography
    - collection
    alt_descriptions:
      nl: Collectie van strategische kaarten gevechtsplannen en militaire cartografische materialen.
      de: Sammlung strategischer Karten Gefechtsplaene und militaerischer Kartographie.
      fr: Collection de cartes strategiques plans de bataille et materiels cartographiques militaires.
      es: Coleccion de mapas estrategicos planes de batalla y materiales cartograficos militares.
      ar: مجموعة خرائط استراتيجية وخطط معارك ومواد خرائطية عسكرية.
      id: Koleksi peta strategis rencana pertempuran dan bahan kartografi militer.
      zh: 收录战略地图、作战计划与军事制图资料的馆藏集合。
    structured_aliases:
    - {literal_form: militaire kaartencollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung militaerischer Karten, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de cartes militaires, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de mapas militares, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة الخرائط العسكرية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi peta militer, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 军事地图文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MilitaryMapsCollection

  VeteransDocumentationCollection:
    is_a: MilitaryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection documenting veterans, memorialization, and post-conflict remembrance.
    keywords:
    - veterans
    - memorialization
    - remembrance
    - post-conflict
    - commemoration
    - collection
    alt_descriptions:
      nl: Collectie met documentatie over veteranen herdenkingspraktijken en herinneringscultuur na conflicten.
      de: Sammlung zur Dokumentation von Veteranen Gedenken und Erinnerungskultur nach Konflikten.
      fr: Collection documentant anciens combattants commemorations et memoire apres conflit.
      es: Coleccion que documenta veteranos conmemoracion y memoria posterior al conflicto.
      ar: مجموعة توثق شؤون المحاربين القدامى وإحياء الذكرى وثقافة التذكر بعد النزاعات.
      id: Koleksi dokumentasi veteran kegiatan peringatan dan memori pascakonflik.
      zh: 记录退伍军人、纪念实践与战后记忆文化的馆藏集合。
    structured_aliases:
    - {literal_form: veteranendocumentatiecollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Veteranendokumentation, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de documentation des anciens combattants, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de documentacion de veteranos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة توثيق المحاربين القدامى, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi dokumentasi veteran, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 退伍军人文献集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:VeteransDocumentationCollection
