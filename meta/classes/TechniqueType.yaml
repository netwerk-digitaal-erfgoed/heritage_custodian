id: https://nde.nl/ontology/hc/class/TechniqueType
name: TechniqueType
title: Technique Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  aat: http://vocab.getty.edu/aat/
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
default_prefix: hc
classes:
  TechniqueType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Classification of methods and procedures used in heritage conservation, examination, production, and documentation.
    alt_descriptions:
      nl: Classificatie van methoden en procedures gebruikt bij erfgoedconservering, onderzoek, productie en documentatie.
      de: Klassifizierung von Methoden und Verfahren, die in der Heritage-Konservierung, -Untersuchung, -Produktion und -Dokumentation verwendet werden.
      fr: Classification des méthodes et procédures utilisées dans la conservation, l'examen, la production et la documentation du patrimoine.
      es: Clasificación de métodos y procedimientos utilizados en conservación, examen, producción y documentación patrimonial.
      ar: تصنيف الأساليب والإجراءات المستخدمة في حفظ التراث والفحص والإنتاج والتوثيق.
      id: Klasifikasi metode dan prosedur yang digunakan dalam konservasi, pemeriksaan, produksi, dan dokumentasi warisan.
      zh: 用于遗产保护、检查、生产和文档化的方法和程序分类。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - aat:300264237
    slots:
    - identified_by
    - has_label
    - has_description
    slot_usage:
      identified_by:
        examples:
        - value: aat:300053052
      has_label:
        examples:
        - value: Solvent Cleaning
        - value: Infrared Reflectography
    keywords:
    - technique type
    - conservation method
    - examination method
    - production technique
    comments:
    - Subclasses include conservation, examination, production, and documentation techniques
    annotations:
      specificity_score: 0.1
      custodian_types: "['*']"
    structured_aliases:
    - literal_form: technique type
      in_language: nl
    - literal_form: technique type
      in_language: de
    - literal_form: technique type
      in_language: fr
    - literal_form: technique type
      in_language: es
    - literal_form: technique type
      in_language: ar
    - literal_form: technique type
      in_language: id
    - literal_form: technique type
      in_language: zh
