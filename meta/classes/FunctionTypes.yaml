id: https://nde.nl/ontology/hc/class/FunctionTypes
name: FunctionTypes
title: Function Types
description: >-
  Taxonomy of organizational function categories representing operational
  responsibilities and service domains within heritage institutions.
alt_descriptions:
  nl: >-
    Taxonomie van organisatorische functiecategorieën die operationele
    verantwoordelijkheden en servicedomeinen binnen erfgoedinstanties vertegenwoordigen.
  de: >-
    Taxonomie organisatorischer Funktionskategorien, die betriebliche
    Zuständigkeiten und Servicebereiche in Heritage-Institutionen darstellen.
  fr: >-
    Taxonomie des catégories de fonctions organisationnelles représentant les
    responsabilités opérationnelles et les domaines de service dans les institutions patrimoniales.
  es: >-
    Taxonomía de categorías de funciones organizacionales que representan
    responsabilidades operativas y dominios de servicio en instituciones patrimoniales.
  ar: >-
    تصنيف فئات الوظائف التنظيمية التي تمثل المسؤوليات التشغيلية
    ومجالات الخدمة في مؤسسات التراث.
  id: >-
    Taksonomi kategori fungsi organisasional yang mewakili tanggung jawab
    operasional dan domain layanan di lembaga warisan.
  zh: >-
    代表遗产机构内运营职责和服务领域的组织功能类别分类法。
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./FunctionType
  - linkml:types
