id: https://nde.nl/ontology/hc/class/FileAPI
name: FileAPI
title: File API Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcat: http://www.w3.org/ns/dcat#
default_prefix: hc
imports:
- ./DataServiceEndpoint
- linkml:types
- ../slots/has_format
- ../slots/access_restricted
- ../slots/has_score
classes:
  FileAPI:
    is_a: DataServiceEndpoint
    class_uri: dcat:DataService
    description: >-
      Digital service interface enabling retrieval of binary assets, documents, and multimedia files from institutional repositories.
    alt_descriptions:
      nl: >-
        Digitale service-interface die het ophalen van binaire bestanden, documenten en multimediabestanden uit institutionele repositories mogelijk maakt.
      de: >-
        Digitale Dienstschnittstelle, die den Abruf von Binärdateien, Dokumenten und Multimediadateien aus institutionellen Repositorien ermöglicht.
      fr: >-
        Interface de service numérique permettant la récupération de fichiers binaires, de documents et de fichiers multimédias depuis des dépôts institutionnels.
      es: >-
        Interfaz de servicio digital que permite la recuperación de archivos binarios, documentos y archivos multimedia de repositorios institucionales.
      ar: >-
        واجهة خدمة رقمية تمكن استرداد الملفات الثنائية والمستندات وملفات الوسائط المتعددة من المستودعات المؤسسية.
      id: >-
        Antarmuka layanan digital yang memungkinkan pengambilan file biner, dokumen, dan file multimedia dari repositori kelembagaan.
      zh: >-
        数字服务接口，支持从机构存储库检索二进制文件、文档和多媒体文件。
