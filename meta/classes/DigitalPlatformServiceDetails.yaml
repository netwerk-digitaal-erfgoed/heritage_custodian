id: https://nde.nl/ontology/hc/class/DigitalPlatformServiceDetails
name: DigitalPlatformServiceDetails
title: Digital Platform Service Details
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
classes:
  DigitalPlatformServiceDetails:
    class_uri: schema:OpeningHoursSpecification
    description: >-
      Specification block defining service availability windows, support channels,
      and operational constraints for digital platform delivery.
    alt_descriptions:
      nl: >-
        Specificatieblok dat de beschikbaarheidsvensters voor diensten, ondersteuningskanalen
        en operationele beperkingen voor digitale platformlevering definieert.
      de: >-
        Spezifikationsblock, der Dienstverfügbarkeitsfenster, Supportkanäle und betriebliche
        Einschränkungen für die digitale Plattformbereitstellung definiert.
      fr: >-
        Bloc de spécification définissant les fenêtres de disponibilité des services, les
        canaux d'assistance et les contraintes opérationnelles pour la prestation de plateforme numérique.
      es: >-
        Bloque de especificación que define ventanas de disponibilidad de servicio, canales
        de soporte y restricciones operativas para la entrega de plataforma digital.
      ar: >-
        كتلة مواصفات تحدد نوافذ توفر الخدمة وقنوات الدعم والقيود التشغيلية لتقديم المنصة الرقمية.
      id: >-
        Blok spesifikasi yang menentukan jendela ketersediaan layanan, saluran dukungan,
        dan kendala operasional untuk pengiriman platform digital.
      zh: >-
        定义数字平台交付的服务可用性窗口、支持渠道和操作约束的规范块。
    broad_mappings:
      - schema:OpeningHoursSpecification
    close_mappings:
      - schema:Service
    slots: []
