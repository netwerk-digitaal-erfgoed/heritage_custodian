id: https://nde.nl/ontology/hc/class/FellowsProgram
name: FellowsProgram
title: Fellows Program Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_name
classes:
  FellowsProgram:
    class_uri: schema:Project
    description: >-
      Structured program offering short-term or long-term residency opportunities
      for researchers, scholars, or professionals at a cultural or academic institution.
    alt_descriptions:
      nl: >-
        Gestructureerd programma dat kortdurende of langdurige verblijfsmogelijkheden biedt
        voor onderzoekers, wetenschappers of professionals bij een culturele of academische instelling.
      de: >-
        Strukturiertes Programm, das kurz- oder langfristige Aufenthaltsmöglichkeiten
        für Forscher, Wissenschaftler oder Fachleute an einer kulturellen oder akademischen Einrichtung bietet.
      fr: >-
        Programme structuré offrant des opportunités de résidence à court ou long terme
        pour chercheurs, universitaires ou professionnels dans une institution culturelle ou académique.
      es: >-
        Programa estructurado que ofrece oportunidades de residencia a corto o largo plazo
        para investigadores, académicos o profesionales en una institución cultural o académica.
      ar: >-
        برنامج منظم يوفر فرص إقامة قصيرة أو طويلة الأجل
        للباحثين أو الأكاديميين أو المحترفين في مؤسسة ثقافية أو أكاديمية.
      id: >-
        Program terstruktur yang menawarkan kesempatan residensi jangka pendek atau panjang
        bagi peneliti, cendekiawan, atau profesional di lembaga budaya atau akademik.
      zh: >-
        为研究人员、学者或专业人士在文化或学术机构提供短期或长期驻留机会的结构化项目。
    broad_mappings:
    - schema:Project
    slots:
    - has_name
    structured_aliases:
    - literal_form: fellowship-programma
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Stipendienprogramm
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: programme de bourses
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: programa de becas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: برنامج الزمالة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: program fellowship
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 研究员项目
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Supports visiting scholars and research residencies
    - May include stipends, workspace, and access to collections
    - 'Preserved from prior description: Fellowship or visiting researcher program operated by an institution.'
    keywords:
    - fellowship
    - residency
    - visiting scholar
    - research program
    - academic exchange
    examples:
    - value:
        has_name: Digital Humanities Fellowship
      description: Annual fellowship program for digital scholarship
    annotations:
      specificity_score: 0.35
      specificity_rationale: Programmatic class for institutional research and fellowship initiatives.
      custodian_types: '["*"]'
