id: https://nde.nl/ontology/hc/class/Locker
name: Locker
title: Locker Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
classes:
  Locker:
    class_uri: schema:LocationFeatureSpecification
    description: >-
      Secure storage compartment provided as a visitor or staff amenity for temporary personal item retention.
    alt_descriptions:
      nl: >-
        Beveiligd bergvak aangeboden als voorziening voor bezoekers of personeel voor tijdelijke bewaring van persoonlijke bezittingen.
      de: >-
        Sicheres Abteil, das als Besuchsdienstleistung für die vorübergehende Aufbewahrung persönlicher Gegenstände bereitgestellt wird.
      fr: >-
        Compartiment de stockage sécurisé fourni comme aménité pour les visiteurs ou le personnel pour la rétention temporaire d'objets personnels.
      es: >-
        Compartimento de almacenamiento seguro proporcionado como servicio para visitantes o personal para la retención temporal de objetos personales.
      ar: >-
        حجرة تخزين آمنة مقدمة كمرفق للزوار أو الموظفين للاحتفاظ المؤقت بالأغراض الشخصية.
      id: >-
        Kompartemen penyimpanan aman yang disediakan sebagai fasilitas pengunjung atau staf untuk penyimpanan sementara barang pribadi.
      zh: >-
        作为访客或员工设施提供的用于临时存放个人物品的安全储物隔间。
    structured_aliases:
    - literal_form: kluisje
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Schließfach
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: casier
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: casillero
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: خزانة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: loker
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 储物柜
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:LocationFeatureSpecification
    slots:
    - has_description
    comments:
    - Supports visitor convenience and security policies.
    - May include key, code, or digital access mechanisms.
    - 'Preserved from prior description: Secure locker amenity for temporary visitor or staff storage.'
    keywords:
    - secure storage
    - visitor amenity
    - personal locker
    - temporary retention
    examples:
    - value:
        has_description: Coin-operated lockers near main entrance.
      description: Museum locker facility description
    annotations:
      specificity_score: 0.25
      specificity_rationale: Facility amenity class for onsite storage services.
      custodian_types: '["*"]'
