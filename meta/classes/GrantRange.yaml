classes:
  GrantRange:
    class_uri: crm:E54_Dimension
    description: >-
      Structured monetary interval specifying minimum and maximum funding
      eligibility thresholds for grant applications.
    alt_descriptions:
      nl: >-
        Gestructureerd monetair interval dat minimale en maximale subsidiegeschiktheidsdrempels
        voor subsidieaanvragen specificeert.
      de: >-
        Strukturiertes Währungsintervall, das Mindest- und Höchstförderberechtigungsgrenzen
        für Stipendienanträge festlegt.
      fr: >-
        Intervalle monétaire structuré spécifiant les seuils minimum et maximum d'éligibilité
        au financement pour les demandes de subvention.
      es: >-
        Intervalo monetario estructurado que especifica los umbrales mínimos y máximos de
        elegibilidad para solicitudes de subvención.
      ar: >-
        فاصل نقدي منظم يحدد الحدود الدنيا والقصوى للأهلية للتمويل لطلبات المنح.
      id: >-
        Interval moneter terstruktur yang menentukan ambang kelayakan pendanaan minimum
        dan maksimum untuk aplikasi hibah.
      zh: >-
        为资助申请指定最低和最高资助资格门槛的结构化货币区间。
