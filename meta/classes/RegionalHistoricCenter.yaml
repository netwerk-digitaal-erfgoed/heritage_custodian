id: https://w3id.org/nde/ontology/RegionalHistoricCenter
name: RegionalHistoricCenter
title: Regional Historic Center
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ../classes/AgentType
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_score
classes:
  RegionalHistoricCenter:
    description: >-
      Collaborative archival institution in the Netherlands formed through partnership
      between multiple municipalities and the national archives service to preserve regional heritage.
    alt_descriptions:
      nl: >-
        Samenwerkende archiefinstelling in Nederland gevormd door partnerschap
        tussen meerdere gemeenten en de landelijke archiefdienst om regionaal erfgoed te bewaren.
      de: >-
        Kollaborative Archiveinrichtung in den Niederlanden, die durch Partnerschaft
        zwischen mehreren Gemeinden und dem nationalen Archivdienst gebildet wurde.
      fr: >-
        Institution archivistique collaborative aux Pays-Bas formée par le partenariat
        entre plusieurs municipalités et le service national des archives.
      es: >-
        Institución archivística colaborativa en los Países Bajos formada mediante asociación
        entre múltiples municipios y el servicio nacional de archivos.
      ar: >-
        مؤسسة أرشيفية تعاونية في هولندا تشكلت من خلال شراكة
        بين عدة بلديات ودخدمة الأرشيف الوطني للحفاظ على التراث الإقليمي.
      id: >-
        Institusi arsip kolaboratif di Belanda yang dibentuk melalui kemitraan
        antara beberapa kotamadya dan layanan arsip nasional untuk melestarikan warisan regional.
      zh: >-
        荷兰的合作档案机构，由多个市政当局与国家档案服务部门合作形成，
        以保存区域遗产。
    is_a: CustodianType
    class_uri: skos:Concept
    broad_mappings:
      - skos:Concept
    keywords:
      - regional historic center
      - RHC
      - dutch archive
      - collaborative archive
    structured_aliases:
      - literal_form: Regionaal Historisch Centrum
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: RHC
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Regionales Geschichtszentrum
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: centre régional d'histoire
        predicate: EXACT_SYNONYM
        in_language: fr
    comments:
      - Serves as regional repository for archival materials from participating organizations
      - Netherlands-specific collaborative archive model
      - Examples include RHC Limburg, RHC Drents Archief
    slots:
      - has_score
      - identified_by
    slot_usage:
      identified_by: {}
    annotations:
      skos:prefLabel: Regional Historic Center
      skos:altLabel: Regionalhistorisches Zentrum, centre régional historique, RHC
      organizational_model: collaborative
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
      - RegionalArchive
      - JointArchives
      - MunicipalArchive
