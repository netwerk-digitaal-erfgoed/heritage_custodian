id: https://nde.nl/ontology/hc/class/DigitalPresenceType
name: digital_presence_type_class
title: DigitalPresenceType Class (Abstract)

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
classes:
  DigitalPresenceType:
    class_uri: schema:Intangible
    abstract: true
    description: >-
      Abstract taxonomy node for categorizing forms of online institutional
      presence and channel strategy.
    alt_descriptions:
      nl: Abstract taxonomieknooppunt voor categorisering van vormen van online institutionele aanwezigheid en kanaalstrategie.
      de: Abstrakter Taxonomieknoten zur Kategorisierung von Formen institutioneller Online-Praesenz und Kanalstrategie.
      fr: Noeud taxonomique abstrait pour categoriser les formes de presence institutionnelle en ligne et la strategie de canal.
      es: Nodo taxonomico abstracto para categorizar formas de presencia institucional en linea y estrategia de canal.
      ar: عقدة تصنيفية مجردة لفئات أشكال الحضور المؤسسي عبر الإنترنت واستراتيجية القنوات.
      id: Simpul taksonomi abstrak untuk mengategorikan bentuk kehadiran institusional daring dan strategi kanal.
      zh: 用于分类机构线上存在形态与渠道策略的抽象分类节点。
    structured_aliases:
    - {literal_form: type digitale aanwezigheid, in_language: nl}
    - {literal_form: Typ digitale Praesenz, in_language: de}
    - {literal_form: type de presence numerique, in_language: fr}
    - {literal_form: tipo de presencia digital, in_language: es}
    - {literal_form: نوع الحضور الرقمي, in_language: ar}
    - {literal_form: tipe kehadiran digital, in_language: id}
    - {literal_form: 数字存在类型, in_language: zh}
    broad_mappings:
    - schema:Intangible
    - skos:Concept

    slots:
    - identified_by
    - has_label

    slot_usage:
      identified_by:
#         range: string # uriorcurie
        required: false
      has_label:
#         range: string
        required: true

    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.6
      type_types_pattern: base
      type_types_related: DigitalPresenceTypes
