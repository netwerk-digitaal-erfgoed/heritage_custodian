id: https://nde.nl/ontology/hc/class/DigitalPlatformOrganizationStatus
name: DigitalPlatformOrganizationStatus
title: Digital Platform Organization Status
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
classes:
  DigitalPlatformOrganizationStatus:
    class_uri: org:Organization
    description: >-
      Operational and legal standing classification for the organizational entity operating a digital platform.
    alt_descriptions:
      nl: >-
        Operationele en juridische statusclassificatie voor de organisatie-entiteit die een digitaal platform beheert.
      de: >-
        Operative und rechtliche Statusklassifizierung für die Organisationseinheit, die eine digitale Plattform betreibt.
      fr: >-
        Classification du statut opérationnel et juridique pour l'entité organisationnelle exploitant une plateforme numérique.
      es: >-
        Clasificación del estado operativo y legal para la entidad organizativa que opera una plataforma digital.
      ar: >-
        تصنيف الوضع التشغيلي والقانوني للكيان التنظيمي الذي يدير منصة رقمية.
      id: >-
        Klasifikasi status operasional dan hukum untuk entitas organisasi yang mengoperasikan platform digital.
      zh: >-
        运营数字平台的组织实体的运营和法律地位分类。
    structured_aliases:
    - literal_form: organisatiestatus
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Organisationsstatus
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: statut organisationnel
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: estatus organizacional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: حالة المنظمة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: status organisasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 组织状态
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - org:Organization
    close_mappings:
    - org:FormalOrganization
    - schema:Organization
    slots:
    - has_legal_form
    - has_label
    comments:
    - Captures legal entity type, operational status, and organizational form.
    - Used for platform governance and compliance documentation.
    - 'Preserved from prior description: Operational and legal standing statement for the organization behind a platform.'
    keywords:
    - organizational status
    - legal standing
    - platform governance
    - entity classification
    examples:
    - value:
        has_legal_form: Non-profit Foundation
        has_label: Active
      description: Operational status for heritage platform organization
