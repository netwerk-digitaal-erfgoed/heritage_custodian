id: https://nde.nl/ontology/hc/class/GovernanceAuthority
name: GovernanceAuthority
title: Governance Authority Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_name
- ../slots/has_description
classes:
  GovernanceAuthority:
    class_uri: org:Organization
    description: >-
      Entity exercising formal oversight, regulatory, or supervisory control
      over an organization or administrative unit.
    alt_descriptions:
      nl: >-
        Entiteit die formeel toezicht, regelgeving of bestuurlijke controle uitoefent
        over een organisatie of administratieve eenheid.
      de: >-
        Entität, die formelle Aufsicht, Regulierung oder Verwaltungskontrolle
        über eine Organisation oder Verwaltungseinheit ausübt.
      fr: >-
        Entité exerçant un contrôle formel de supervision, de régulation ou de contrôle administratif
        sur une organisation ou une unité administrative.
      es: >-
        Entidad que ejerce supervisión formal, regulación o control administrativo
        sobre una organización o unidad administrativa.
      ar: >-
        كيان يمارس الرقابة الرسمية أو التنظيمية أو السيطرة الإدارية
        على منظمة أو وحدة إدارية.
      id: >-
        Entitas yang menjalankan pengawasan formal, regulasi, atau kontrol administratif
        atas suatu organisasi atau unit administratif.
      zh: >-
        对组织或行政单位行使正式监督、监管或行政控制的实体。
    broad_mappings:
    - org:Organization
    close_mappings:
    - schema:Organization
    slots:
    - identified_by
    - has_name
    - has_description
    structured_aliases:
    - literal_form: bestuursorgaan
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Aufsichtsbehörde
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: autorité de gouvernance
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: autoridad de gobernanza
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلطة الحوكمة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: otoritas tata kelola
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 治理机构
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Represents hierarchical oversight relationships
    - May include ministries, boards, or regulatory bodies
    - 'Preserved from prior description: Organization that holds formal governance authority over an entity.'
    keywords:
    - governance
    - oversight
    - authority
    - supervision
    - regulatory
    examples:
    - value:
        has_name: Ministry of Culture
        has_description: National cultural heritage oversight body
      description: Government ministry with heritage governance authority
    annotations:
      specificity_score: 0.4
      specificity_rationale: Governance actor model for formal oversight relationships.
      custodian_types: '["*"]'
