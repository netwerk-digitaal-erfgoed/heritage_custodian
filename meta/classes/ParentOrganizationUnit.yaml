classes:
  ParentOrganizationUnit:
    description: >-
      Entity exercising administrative authority over one or more subsidiary organizational units within a hierarchical structure.
    alt_descriptions:
      nl: >-
        Entiteit die administratief gezag uitoefent over een of meer dochterorganisatorische eenheden binnen een hiërarchische structuur.
      de: >-
        Entität, die administrative Autorität über eine oder mehrere untergeordnete Organisationseinheiten innerhalb einer hierarchischen Struktur ausübt.
      fr: >-
        Entité exerçant une autorité administrative sur une ou plusieurs unités organisationnelles subsidiaires au sein d'une structure hiérarchique.
      es: >-
        Entidad que ejerce autoridad administrativa sobre una o más unidades organizativas subsidiarias dentro de una estructura jerárquica.
      ar: >-
        كيان يمارس سلطة إدارية على واحد أو أكثر من الوحدات التنظيمية التابعة ضمن هيكل هرمي.
      id: >-
        Entitas yang menjalankan otoritas administratif atas satu atau lebih unit organisasi anak dalam struktur hierarkis.
      zh: >-
        在层级结构中对一个或多个下属组织单位行使行政权力的实体。
