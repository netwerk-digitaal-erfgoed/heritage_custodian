classes:
  NewspaperClippingsArchive:
    description: >-
      Institution specializing in collecting, organizing, and providing access to newspaper and periodical cuttings organized by subject or entity.
    alt_descriptions:
      nl: >-
        Instelling die gespecialiseerd is in het verzamelen, organiseren en toegankelijk maken van kranten- en tijdschriftknipsels georganiseerd op onderwerp of entiteit.
      de: >-
        Einrichtung, die sich auf das Sammeln, Organisieren und Zugänglichmachen von Zeitungs- und Zeitschriftenausschnitten spezialisiert hat, organisiert nach Thema oder Entität.
      fr: >-
        Institution spécialisée dans la collecte, l'organisation et la mise à disposition de coupures de journaux et de périodiques organisées par sujet ou entité.
      es: >-
        Institución especializada en recopilar, organizar y proporcionar acceso a recortes de periódicos y revistas organizados por tema o entidad.
      ar: >-
        مؤسسة متخصصة في جمع وتنظيم وتوفير الوصول إلى قصاصات الصحف والمجلات منظمة حسب الموضوع أو الكيان.
      id: >-
        Lembaga yang berspesialisasi dalam mengumpulkan, mengorganisir, dan menyediakan akses ke kliping koran dan majalah yang diorganisir berdasarkan subjek atau entitas.
      zh: >-
        专门收集、整理和提供按主题或实体组织的报纸和期刊剪报访问的机构。
