id: https://nde.nl/ontology/hc/class/ResponsibilityType
name: ResponsibilityType
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
classes:
  ResponsibilityType:
    description: >-
      Abstract base class for responsibility type taxonomy.
    alt_descriptions:
      nl: Abstracte basisklasse voor verantwoordelijkheidstype-taxonomie.
      de: Abstrakte Basisklasse für Verantwortungstyp-Taxonomie.
      fr: Classe de base abstraite pour la taxonomie des types de responsabilité.
    structured_aliases:
    - literal_form: verantwoordelijkheidstype
      in_language: nl
    - literal_form: Verantwortungstyp
      in_language: de
    - literal_form: type de responsabilité
      in_language: fr
    comments:
    - Defines classification of duties and roles within a heritage organization.
    - Includes curatorial, administrative, conservation, and public engagement responsibilities.
    class_uri: skos:Concept
    abstract: true
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
