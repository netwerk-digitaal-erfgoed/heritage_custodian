id: https://nde.nl/ontology/hc/class/GeometryType
name: GeometryType
title: Geometry Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_description
classes:
  GeometryType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomic concept for categorizing spatial shape representations used in geographic and geometric modeling.
    alt_descriptions:
      nl: >-
        Abstract taxonomisch concept voor het categoriseren van ruimtelijke vormrepresentaties
        die worden gebruikt in geografische en geometrische modellering.
      de: >-
        Abstraktes taxonomisches Konzept zur Kategorisierung räumlicher Formrepräsentationen,
        die in geografischer und geometrischer Modellierung verwendet werden.
      fr: >-
        Concept taxonomique abstrait pour catégoriser les représentations de formes spatiales
        utilisées dans la modélisation géographique et géométrique.
      es: >-
        Concepto taxonómico abstracto para categorizar representaciones de formas espaciales
        utilizadas en modelado geográfico y geométrico.
      ar: >-
        مفهوم تصنيفي تجريدي لتصنيف تمثيلات الأشكال المكانية
        المستخدمة في النمذجة الجغرافية والهندسية.
      id: >-
        Konsep taksonomi abstrak untuk mengategorikan representasi bentuk spasial
        yang digunakan dalam pemodelan geografis dan geometris.
      zh: >-
        用于对地理和几何建模中使用的空间形状表示进行分类的抽象分类概念。
    structured_aliases:
    - literal_form: geometrietype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Geometrietyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de géométrie
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de geometría
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع الهندسة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe geometri
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 几何类型
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    slots:
    - has_label
    - has_description
    comments:
    - Base class for point, line, polygon, and other geometric primitives.
    - Used in GIS data modeling and spatial data infrastructure.
    - 'Preserved from prior description: Abstract controlled concept for geometry shape types.'
    keywords:
    - spatial shape
    - geometric primitive
    - GIS taxonomy
    - spatial data model
    examples:
    - value:
        has_label: Polygon
        has_description: Closed area defined by connected line segments.
      description: 2D area geometry type
    annotations:
      specificity_score: 0.25
      specificity_rationale: Geometry shape taxonomy base class.
      custodian_types: '["*"]'
