id: https://nde.nl/ontology/hc/class/DetectedObject
name: DetectedObject
title: DetectedObject
description: An object detected in media content.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/generated_by
classes:
  DetectedObject:
    class_uri: schema:Thing
    description: >-
      Detection result representing a physical or symbolic object localized in
      media content.
    alt_descriptions:
      nl: Detectieresultaat van een fysiek of symbolisch object gelokaliseerd in mediacontent.
      de: Erkennungsergebnis eines physischen oder symbolischen Objekts das in Medieninhalten lokalisiert wurde.
      fr: Resultat de detection d un objet physique ou symbolique localise dans un contenu media.
      es: Resultado de deteccion de un objeto fisico o simbolico localizado en contenido multimedia.
      ar: نتيجة كشف لكائن مادي أو رمزي محدد الموضع داخل محتوى وسائطي.
      id: Hasil deteksi objek fisik atau simbolik yang dilokalisasi dalam konten media.
      zh: 在媒体内容中定位到的实体或符号对象检测结果。
    structured_aliases:
    - {literal_form: gedetecteerd object, in_language: nl}
    - {literal_form: erkanntes Objekt, in_language: de}
    - {literal_form: objet detecte, in_language: fr}
    - {literal_form: objeto detectado, in_language: es}
    - {literal_form: كائن مكتشف, in_language: ar}
    - {literal_form: objek terdeteksi, in_language: id}
    - {literal_form: 检测对象, in_language: zh}
    broad_mappings:
    - schema:Thing
    slots:
    - has_label
    - generated_by

    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
