id: https://nde.nl/ontology/hc/class/UNESCODomainType
name: UNESCODomainType
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  UNESCODomainType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract category for classifying intangible heritage according to the
      thematic model used in the 2003 Convention for safeguarding intangible
      cultural heritage.
    alt_descriptions:
      nl: Abstracte categorie voor het indelen van immaterieel erfgoed volgens het domeinmodel van de UNESCO-Conventie van 2003.
      de: Abstrakte Kategorie zur Einordnung immateriellen Kulturerbes nach dem thematischen Domainenmodell der UNESCO-Konvention von 2003.
      fr: Categorie abstraite pour classer le patrimoine immateriel selon le modele de domaines thematiques de la Convention UNESCO de 2003.
      es: Categoria abstracta para clasificar el patrimonio inmaterial segun el modelo de dominios tematicos de la Convencion UNESCO de 2003.
      ar: فئة تجريدية لتصنيف التراث غير المادي وفق نموذج المجالات الموضوعية في اتفاقية اليونسكو لعام 2003.
      id: Kategori abstrak untuk mengklasifikasikan warisan takbenda menurut model domain tematik Konvensi UNESCO 2003.
      zh: 用于按《2003年教科文组织公约》主题领域模型分类非遗的抽象类别。
    structured_aliases:
    - literal_form: UNESCO-domeintype
      in_language: nl
    - literal_form: UNESCO-Domaenentyp
      in_language: de
    - literal_form: type de domaine UNESCO
      in_language: fr
    - literal_form: tipo de dominio UNESCO
      in_language: es
    - literal_form: نوع مجال اليونسكو
      in_language: ar
    - literal_form: tipe domain UNESCO
      in_language: id
    - literal_form: UNESCO领域类型
      in_language: zh
    slots:
    - identified_by
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
