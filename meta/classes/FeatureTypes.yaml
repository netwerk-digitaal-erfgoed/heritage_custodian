      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: monument
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: monumento
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نصب تذكاري
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: monumen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 纪念碑
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - monument
    - commemorative
    - memorial
    - heritage structure
    - remembrance
    comments:
    - 'Preserved from prior description: Monument-oriented feature type.'
  LandscapeFeature:
    is_a: FeatureType
    class_uri: aat:300008372
    description: >-
      Natural or human-modified terrain element contributing to the character of a geographical area.
    alt_descriptions:
      nl: >-
        Natuurlijk of door mensen gemodificeerd terreinelement dat bijdraagt aan het karakter van een geografisch gebied.
      de: >-
        Natürliches oder vom Menschen verändertes Geländeelement, das zum Charakter eines geografischen Gebiets beiträgt.
      fr: >-
        Élément de terrain naturel ou modifié par l'homme contribuant au caractère d'une zone géographique.
      es: >-
        Elemento del terreno natural o modificado por el hombre que contribuye al carácter de un área geográfica.
      ar: >-
        عنصر تضاريس طبيعي أو معدّل من قبل الإنسان يساهم في طابع منطقة جغرافية.
      id: >-
        Elemen medan alami atau yang dimodifikasi manusia yang berkontribusi pada karakter area geografis.
      zh: >-
        对地理区域特征有贡献的天然或人为改造的地形元素。
    structured_aliases:
    - literal_form: landschapselement
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Landschaftselement
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: élément paysager
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: elemento paisajístico
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: عنصر طبيعي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: elemen lansekap
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 景观特征
      predicate: EXACT_SYNONYM
      in_language: zh
