classes:
  Building:
    is_a: FeatureType
    class_uri: aat:300004792
    description: >-
      Human-made construction enclosing space for residential, commercial, or institutional use.
    alt_descriptions:
      nl: >-
        Door mensen gemaakt bouwwerk dat ruimte omsluit voor woon-, commercieel of institutioneel gebruik.
      de: >-
        Vom Menschen geschaffenes Bauwerk, das Raum für Wohn-, Gewerbe- oder Institutionelle Nutzung einschließt.
      fr: >-
        Construction humaine enfermant un espace à usage résidentiel, commercial ou institutionnel.
      es: >-
        Construcción humana que encierra espacio para uso residencial, comercial o institucional.
      ar: >-
        مبنى من صنع الإنسان يحيط بمساحة للاستخدام السكني أو التجاري أو المؤسسي.
      id: >-
        Konstruksi buatan manusia yang menutup ruang untuk penggunaan tempat tinggal, komersial, atau institusional.
      zh: >-
        围合空间供居住、商业或机构使用的人造建筑物。
    structured_aliases:
    - literal_form: gebouw
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Gebäude
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: bâtiment
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: edificio
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مبنى
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: bangunan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 建筑物
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - building
    - construction
    - architecture
    - structure
    - heritage feature
    comments:
    - 'Preserved from prior description: Building-oriented feature type.'
  Site:
    is_a: FeatureType
    class_uri: aat:300000809
    description: >-
      Geographically bounded location with heritage significance, including archaeological and cultural landscapes.
    alt_descriptions:
      nl: >-
        Geografisch begrensde locatie met erfgoedwaarde, inclusief archeologische en culturele landschappen.
      de: >-
        Geografisch begrenzter Ort mit Heritage-Bedeutung, einschließlich archäologischer und kultureller Landschaften.
      fr: >-
        Lieu géographiquement délimité ayant une importance patrimoniale, y compris les paysages archéologiques et culturels.
      es: >-
        Ubicación geográficamente delimitada con importancia patrimonial, incluyendo paisajes arqueológicos y culturales.
      ar: >-
        موقع محدد جغرافياً ذو أهمية تراثية، بما في ذلك المناظر الطبيعية الأثرية والثقافية.
      id: >-
        Lokasi yang dibatasi secara geografis dengan signifikansi warisan, termasuk bentang alam arkeologi dan budaya.
      zh: >-
        具有遗产意义的地理边界位置，包括考古和文化景观。
    structured_aliases:
    - literal_form: vindplaats
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Stätte
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: site
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: sitio
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: موقع
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: situs
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 遗址
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    - crm:E53_Place
    - skos:Concept
    - crm:E55_Type
    keywords:
    - site
    - archaeological
    - cultural landscape
    - heritage location
    - geographical area
    comments:
    - 'Preserved from prior description: Site-oriented feature type.'
  Monument:
    is_a: FeatureType
    class_uri: aat:300006958
    description: >-
      Commemorative structure erected to preserve the memory of persons, events, or ideas.
    alt_descriptions:
      nl: >-
        Herdenkingsstructuur opgericht om de herinnering aan personen, gebeurtenissen of ideeën te bewaren.
      de: >-
        Gedenkstruktur, die errichtet wurde, um die Erinnerung an Personen, Ereignisse oder Ideen zu bewahren.
      fr: >-
        Structure commémorative érigée pour préserver la mémoire de personnes, d'événements ou d'idées.
      es: >-
        Estructura conmemorativa erigida para preservar la memoria de personas, eventos o ideas.
      ar: >-
        نصب تذكاري أقيم للحفاظ على ذكرى الأشخاص أو الأحداث أو الأفكار.
      id: >-
        Struktur peringatan yang didirikan untuk mengawetkan kenangan orang, peristiwa, atau gagasan.
      zh: >-
        为纪念人物、事件或思想而建立的纪念性结构。
    structured_aliases:
