id: https://nde.nl/ontology/hc/class/LightArchivesRecordSetTypes
name: LightArchivesRecordSetTypes
title: LightArchives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./LightArchivesRecordSetType
- linkml:types
- ../slots/has_type
- ../slots/has_score
- ../slots/has_note
classes:
  MinimalProcessingCollection:
    is_a: LightArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for holdings made accessible with
      minimal processing, arrangement, or mediation.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor holdings die met minimale bewerking ordening of bemiddeling toegankelijk zijn gemaakt.
      de: Sammlungsorientierter Recordsettyp fuer Bestaende die mit minimaler Bearbeitung Ordnung oder Vermittlung zugaenglich gemacht werden.
      fr: Type de lot documentaire oriente collection pour fonds rendus accessibles avec un traitement et une mediation minimaux.
      es: Tipo de conjunto documental orientado a coleccion para fondos accesibles con procesamiento ordenacion o mediacion minimos.
      ar: نوع مجموعة سجلات قائم على التجميع لمقتنيات متاحة مع حد أدنى من المعالجة أو الترتيب أو الوساطة.
      id: Tipe record set berbasis koleksi untuk himpunan yang dibuka aksesnya dengan pemrosesan penataan atau mediasi minimal.
      zh: 面向馆藏编组的记录集类型，用于以最少处理、编排或中介即可开放访问的档案材料。
    structured_aliases:
    - {literal_form: minimaal bewerkte collectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: minimal erschlossene Sammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection a traitement minimal, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de procesamiento minimo, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة معالجة دنيا, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi pemrosesan minimal, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 最小处理集合, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MinimalProcessingCollection
    keywords:
    - minimal processing
    - minimal description
    - quick access
    - light arrangement
    - on-demand processing
