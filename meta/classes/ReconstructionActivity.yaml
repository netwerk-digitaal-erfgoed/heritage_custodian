default_prefix: hc
classes:
  ReconstructionActivity:
    class_uri: prov:Activity
    description: >-
      Process that reconciles multiple conflicting or duplicate observations into a single authoritative entity representation.
    alt_descriptions:
      nl: >-
        Proces dat meerdere tegenstrijdige of dubbele observaties verzoent tot één gezaghebbende entiteitsweergave.
      de: >-
        Prozess, der mehrere widersprüchliche oder doppelte Beobachtungen in eine einzelne autoritative Entitätsdarstellung abgleicht.
      fr: >-
        Processus qui concilie plusieurs observations contradictoires ou en double en une seule représentation d'entité faisant autorité.
      es: >-
        Proceso que concilia múltiples observaciones contradictorias o duplicadas en una única representación de entidad autorizada.
      ar: >-
        عملية توفق بين ملاحظات متعددة متضاربة أو مكررة في تمثيل كيان موثوق واحد.
      id: >-
        Proses yang mendamaikan beberapa observasi yang bertentangan atau duplikat menjadi satu representasi entitas yang otoritatif.
      zh: >-
        将多个相互冲突或重复的观察协调为单一权威实体表示的过程。
