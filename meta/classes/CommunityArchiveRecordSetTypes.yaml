id: https://nde.nl/ontology/hc/class/CommunityArchiveRecordSetTypes
name: CommunityArchiveRecordSetTypes
title: CommunityArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./CommunityArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  CommunityOrganizationFonds:
    is_a: CommunityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation arranged as a fonds for records of local groups,
      associations, and grassroots initiatives.
    alt_descriptions:
      nl: Documentaire aggregatie als fonds voor bronnen van lokale groepen verenigingen en grassroots-initiatieven.
      de: Dokumentarische Aggregation als Fonds fuer Unterlagen lokaler Gruppen Vereine und Basisinitiativen.
      fr: Agregation documentaire organisee en fonds pour les traces de groupes locaux associations et initiatives citoyennes.
      es: Agregacion documental organizada como fondo para registros de grupos locales asociaciones e iniciativas de base.
      ar: تجميع وثائقي منظم كرصيد لأرشيف جماعات محلية وجمعيات ومبادرات قاعدية.
      id: Agregasi dokumenter yang disusun sebagai fonds untuk catatan kelompok lokal asosiasi dan inisiatif akar rumput.
      zh: 以全宗方式组织的本地社群组织与草根倡议文献聚合体。
    structured_aliases:
    - {literal_form: gemeenschapsorganisatiefonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Fonds von Gemeinschaftsorganisationen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds d organisations communautaires, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de organizaciones comunitarias, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: رصيد وثائق منظمات مجتمعية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds organisasi komunitas, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 社区组织全宗, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Grassroots and association provenance remains central for fonds-level community documentation.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:CommunityOrganizationFonds
      has_custodian:
        equals_string: hc:CommunityArchive
      has_note:
        equals_string: This RecordSetType is typically held by CommunityArchive custodians.

  OralHistoryCollection:
    is_a: CommunityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation grouped as a collection for interviews, testimony,
      and memory narratives from community participants.
    alt_descriptions:
      nl: Documentaire aggregatie als collectie voor interviews getuigenissen en herinneringsverhalen van gemeenschapsparticipanten.
      de: Dokumentarische Aggregation als Sammlung fuer Interviews Zeugnisse und Erinnerungserzaehlungen aus der Gemeinschaft.
      fr: Agregation documentaire regroupee en collection pour entretiens temoignages et recits memoriels de participants communautaires.
      es: Agregacion documental agrupada como coleccion para entrevistas testimonios y relatos de memoria de participantes comunitarios.
      ar: تجميع وثائقي مصنف كمجموعة للمقابلات والشهادات وسرديات الذاكرة من أفراد المجتمع.
      id: Agregasi dokumenter yang dikelompokkan sebagai koleksi untuk wawancara kesaksian dan narasi memori dari partisipan komunitas.
      zh: 作为馆藏单元编组的社区口述访谈、证言与记忆叙事文献聚合体。
    structured_aliases:
    - {literal_form: orale-geschiedeniscollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Oral-History-Sammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection d histoire orale, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de historia oral, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة تاريخ شفهي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi sejarah lisan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 口述历史合集, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Testimony and memory narratives are often assembled across campaigns and participant networks.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:OralHistoryCollection
      has_custodian:
        equals_string: hc:CommunityArchive
      has_note:
        equals_string: This RecordSetType is typically held by CommunityArchive custodians.

  LocalEventDocumentation:
    is_a: CommunityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Documentary aggregation grouped as a collection for records of neighborhood
      events, campaigns, and civic activities.
    alt_descriptions:
      nl: Documentaire aggregatie als collectie voor bronnen over buurtgebeurtenissen campagnes en maatschappelijke activiteiten.
      de: Dokumentarische Aggregation als Sammlung fuer Unterlagen zu Nachbarschaftsereignissen Kampagnen und zivilen Aktivitaeten.
      fr: Agregation documentaire regroupee en collection pour les traces d evenements de quartier campagnes et activites civiques.
      es: Agregacion documental agrupada como coleccion para registros de eventos vecinales campanas y actividades civicas.
      ar: تجميع وثائقي مصنف كمجموعة لسجلات فعاليات الأحياء والحملات والأنشطة المدنية.
      id: Agregasi dokumenter yang dikelompokkan sebagai koleksi untuk catatan peristiwa lingkungan kampanye dan aktivitas sipil.
      zh: 作为馆藏单元编组的社区活动、倡议与公民行动文献聚合体。
    structured_aliases:
    - {literal_form: documentatie-lokale-evenementen, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Dokumentation lokaler Ereignisse, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: documentation des evenements locaux, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: documentacion de eventos locales, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: توثيق فعاليات محلية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: dokumentasi acara lokal, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 地方事件文献集, predicate: EXACT_SYNONYM, in_language: zh}
    comments:
    - Note preserved: Event and campaign materials may aggregate multiple creators and formats within one collecting unit.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:LocalEventDocumentation
      has_custodian:
        equals_string: hc:CommunityArchive
      has_note:
        equals_string: This RecordSetType is typically held by CommunityArchive custodians.
