id: https://nde.nl/ontology/hc/class/DigitalPlatformTypes
name: digital_platform_types
title: Digital Platform Types Collection
description: >-
  Taxonomy of digital platform classifications representing repositories,
  aggregators, discovery services, and interactive heritage platforms.
alt_descriptions:
  nl: >-
    Taxonomie van digitale platformclassificaties die repositories,
    aggregatoren, ontdekkingsdiensten en interactieve erfgoedplatforms vertegenwoordigen.
  de: >-
    Taxonomie digitaler Plattformklassifikationen, die Repositorien,
    Aggregatoren, Discovery-Dienste und interaktive Heritage-Plattformen darstellen.
  fr: >-
    Taxonomie des classifications de plateformes numériques représentant les dépôts,
    les agrégateurs, les services de découverte et les plateformes patrimoniales interactives.
  es: >-
    Taxonomía de clasificaciones de plataformas digitales que representan repositorios,
    agregadores, servicios de descubrimiento y plataformas patrimoniales interactivas.
  ar: >-
    تصنيف تصنيفات المنصات الرقمية التي تمثل المستودعات
    والجامعين وخدمات الاكتشاف والمنصات التراثية التفاعلية.
  id: >-
    Taksonomi klasifikasi platform digital yang mewakili repositori,
    agregator, layanan penemuan, dan platform warisan interaktif.
  zh: >-
    代表存储库、聚合器、发现服务和交互式遗产平台的数字平台分类法。
