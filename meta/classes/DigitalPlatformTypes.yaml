        equals_string: REPOSITORY
      related_to:
        equals_string: wikidata:Q212805
    comments:
    - 'Preserved from prior description: Online database of digital objects stored in electronic media formats and accessible via computers. **PURPOSE**: Provide organized access to digital collections including books, journals, manuscripts, images, audio, and video materials. **CHARACTERISTICS**: - Structured metadata for discovery - Full-text search capabilities - Persistent access to digital objects - May include both digitized and born-digital content **EXAMPLES**: Gallica (BnF), HathiTrust, Internet Archive Books'
