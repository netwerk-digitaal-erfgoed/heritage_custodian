      nl: 'Onlinedatabase van digitale objecten opgeslagen in elektronische mediaformaten en toegankelijk via computers.'
      de: 'Onlinedatenbank digitaler Objekte, die in elektronischen Medienformaten gespeichert und über Computer zugänglich sind.'
