id: https://nde.nl/ontology/hc/class/OrganizationalUnitTypes
name: OrganizationalUnitTypes
title: Organizational Unit Types - Concrete Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- ./OrganizationalUnitType
- linkml:types
- ../slots/has_code
classes:
  DirectorateUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:DirectorateUnit
    description: Unit type for executive-level directorate functions.
    alt_descriptions:
      nl: Eenheidstype voor directie- en bestuursfuncties op uitvoerend niveau.
      de: Einheitstyp fuer Leitungs- und Direktoratsfunktionen auf oberster Ebene.
      fr: Type d unite pour les fonctions de direction executive.
      es: Tipo de unidad para funciones directivas de nivel ejecutivo.
      ar: نوع وحدة لوظائف الإدارة التنفيذية.
      id: Tipe unit untuk fungsi direktorat tingkat eksekutif.
      zh: 适用于执行层级总署/局级管理职能的单元类型。
    structured_aliases:
    - {literal_form: directie-eenheid, in_language: nl}
    - {literal_form: Direktoratseinheit, in_language: de}
    - {literal_form: unite de direction, in_language: fr}
    - {literal_form: unidad de direccion, in_language: es}
    - {literal_form: وحدة مديرية, in_language: ar}
    - {literal_form: unit direktorat, in_language: id}
    - {literal_form: 董事层单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: DIRECTORATE
    broad_mappings:
    - schema:Organization

  DepartmentUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:DepartmentUnit
    description: Unit type for primary departmental divisions.
    alt_descriptions:
      nl: Eenheidstype voor primaire afdelingen binnen de organisatie.
      de: Einheitstyp fuer primaere Abteilungen innerhalb der Organisation.
      fr: Type d unite pour les departements principaux de l organisation.
      es: Tipo de unidad para departamentos primarios de la organizacion.
      ar: نوع وحدة للأقسام الرئيسية في المنظمة.
      id: Tipe unit untuk departemen utama dalam organisasi.
      zh: 适用于机构主要部门的单元类型。
    structured_aliases:
    - {literal_form: afdelings-eenheid, in_language: nl}
    - {literal_form: Abteilungseinheit, in_language: de}
    - {literal_form: unite departementale, in_language: fr}
    - {literal_form: unidad departamental, in_language: es}
    - {literal_form: وحدة قسم, in_language: ar}
    - {literal_form: unit departemen, in_language: id}
    - {literal_form: 部门单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: DEPARTMENT
    broad_mappings:
    - schema:Organization

  DivisionUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:DivisionUnit
    description: Unit type for secondary divisions within departments.
    alt_descriptions:
      nl: Eenheidstype voor secundaire divisies binnen afdelingen.
      de: Einheitstyp fuer sekundaere Divisionen innerhalb von Abteilungen.
      fr: Type d unite pour les divisions secondaires au sein des departements.
      es: Tipo de unidad para divisiones secundarias dentro de departamentos.
      ar: نوع وحدة للشعب الثانوية داخل الأقسام.
      id: Tipe unit untuk divisi sekunder di dalam departemen.
      zh: 适用于部门内部次级处室的单元类型。
    structured_aliases:
    - {literal_form: divisie-eenheid, in_language: nl}
    - {literal_form: Divisionseinheit, in_language: de}
    - {literal_form: unite de division, in_language: fr}
    - {literal_form: unidad de division, in_language: es}
    - {literal_form: وحدة شعبة, in_language: ar}
    - {literal_form: unit divisi, in_language: id}
    - {literal_form: 分部单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: DIVISION
    broad_mappings:
    - schema:Organization

  SectionUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:SectionUnit
    description: Unit type for specialized sections within divisions.
    alt_descriptions:
      nl: Eenheidstype voor gespecialiseerde secties binnen divisies.
      de: Einheitstyp fuer spezialisierte Sektionen innerhalb von Divisionen.
      fr: Type d unite pour les sections specialisees au sein des divisions.
      es: Tipo de unidad para secciones especializadas dentro de divisiones.
      ar: نوع وحدة للأقسام المتخصصة داخل الشعب.
      id: Tipe unit untuk seksi khusus dalam divisi.
      zh: 适用于分部内部专业科组的单元类型。
    structured_aliases:
    - {literal_form: sectie-eenheid, in_language: nl}
    - {literal_form: Sektionseinheit, in_language: de}
    - {literal_form: unite de section, in_language: fr}
    - {literal_form: unidad de seccion, in_language: es}
    - {literal_form: وحدة قسم فرعي, in_language: ar}
    - {literal_form: unit seksi, in_language: id}
    - {literal_form: 科组单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: SECTION
    broad_mappings:
    - schema:Organization

  ConservationLabUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:ConservationLabUnit
    description: Unit type for conservation laboratory functions.
    alt_descriptions:
      nl: Eenheidstype voor conserverings- en restauratielaboratoriumfuncties.
      de: Einheitstyp fuer Funktionen von Konservierungs- und Restaurierungslaboren.
      fr: Type d unite pour les fonctions de laboratoire de conservation.
      es: Tipo de unidad para funciones de laboratorio de conservacion.
      ar: نوع وحدة لوظائف مختبر الحفظ والترميم.
      id: Tipe unit untuk fungsi laboratorium konservasi.
      zh: 适用于保护修复实验室职能的单元类型。
    structured_aliases:
    - {literal_form: conserveringslab-eenheid, in_language: nl}
    - {literal_form: Konservierungslabor-Einheit, in_language: de}
    - {literal_form: unite de laboratoire de conservation, in_language: fr}
    - {literal_form: unidad de laboratorio de conservacion, in_language: es}
    - {literal_form: وحدة مختبر حفظ, in_language: ar}
    - {literal_form: unit laboratorium konservasi, in_language: id}
    - {literal_form: 修复实验室单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: CONSERVATION_LAB
    broad_mappings:
    - schema:Organization

  DigitizationUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:DigitizationUnit
    description: Unit type for digitization and digital-surrogate production functions.
    alt_descriptions:
      nl: Eenheidstype voor digitalisering en productie van digitale reproducties.
      de: Einheitstyp fuer Digitalisierung und Erstellung digitaler Surrogate.
      fr: Type d unite pour la numerisation et la production de substituts numeriques.
      es: Tipo de unidad para digitalizacion y produccion de sustitutos digitales.
      ar: نوع وحدة لوظائف الرقمنة وإنتاج النسخ الرقمية البديلة.
      id: Tipe unit untuk digitalisasi dan produksi salinan pengganti digital.
      zh: 适用于数字化及数字替代件制作职能的单元类型。
    structured_aliases:
    - {literal_form: digitaliserings-eenheid, in_language: nl}
    - {literal_form: Digitalisierungseinheit, in_language: de}
    - {literal_form: unite de numerisation, in_language: fr}
    - {literal_form: unidad de digitalizacion, in_language: es}
    - {literal_form: وحدة رقمنة, in_language: ar}
    - {literal_form: unit digitalisasi, in_language: id}
    - {literal_form: 数字化单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: DIGITIZATION_UNIT
    broad_mappings:
    - schema:Organization

  EducationUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:EducationUnit
    description: Unit type for education and public-engagement programming.
    alt_descriptions:
      nl: Eenheidstype voor educatie en publieksprogrammering.
      de: Einheitstyp fuer Bildung und Programme der Oeffentlichkeitsarbeit.
      fr: Type d unite pour l education et les programmes d engagement des publics.
      es: Tipo de unidad para educacion y programacion de participacion publica.
      ar: نوع وحدة للتعليم وبرامج إشراك الجمهور.
      id: Tipe unit untuk pendidikan dan program pelibatan publik.
      zh: 适用于教育与公众参与项目的单元类型。
    structured_aliases:
    - {literal_form: educatie-eenheid, in_language: nl}
    - {literal_form: Bildungseinheit, in_language: de}
    - {literal_form: unite d education, in_language: fr}
    - {literal_form: unidad educativa, in_language: es}
    - {literal_form: وحدة تعليمية, in_language: ar}
    - {literal_form: unit edukasi, in_language: id}
    - {literal_form: 教育单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: EDUCATION
    broad_mappings:
    - schema:Organization

  ReadingRoomUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:ReadingRoomUnit
    description: Unit type for reading-room and researcher-support services.
    alt_descriptions:
      nl: Eenheidstype voor studiezaal- en onderzoekersondersteunende diensten.
      de: Einheitstyp fuer Lesesaal- und Forschendenservice.
      fr: Type d unite pour les services de salle de lecture et d appui aux chercheurs.
      es: Tipo de unidad para servicios de sala de lectura y apoyo a investigadores.
      ar: نوع وحدة لخدمات قاعات الاطلاع ودعم الباحثين.
      id: Tipe unit untuk layanan ruang baca dan dukungan peneliti.
      zh: 适用于阅览室及研究者支持服务的单元类型。
    structured_aliases:
    - {literal_form: studiezaal-eenheid, in_language: nl}
    - {literal_form: Lesesaal-Einheit, in_language: de}
    - {literal_form: unite de salle de lecture, in_language: fr}
    - {literal_form: unidad de sala de lectura, in_language: es}
    - {literal_form: وحدة قاعة مطالعة, in_language: ar}
    - {literal_form: unit ruang baca, in_language: id}
    - {literal_form: 阅览室单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: READING_ROOM
    broad_mappings:
    - schema:Organization

  BranchUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:BranchUnit
    description: Unit type for branch or satellite locations.
    alt_descriptions:
      nl: Eenheidstype voor filialen of satellietlocaties.
      de: Einheitstyp fuer Zweigstellen oder Satellitenstandorte.
      fr: Type d unite pour les antennes ou sites satellites.
      es: Tipo de unidad para sucursales o sedes satelite.
      ar: نوع وحدة للفروع أو المواقع التابعة.
      id: Tipe unit untuk cabang atau lokasi satelit.
      zh: 适用于分支或卫星地点的单元类型。
    structured_aliases:
    - {literal_form: filiaal-eenheid, in_language: nl}
    - {literal_form: Zweigstelleneinheit, in_language: de}
    - {literal_form: unite de branche, in_language: fr}
    - {literal_form: unidad de sucursal, in_language: es}
    - {literal_form: وحدة فرع, in_language: ar}
    - {literal_form: unit cabang, in_language: id}
    - {literal_form: 分支单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: BRANCH
    broad_mappings:
    - schema:Organization

  RegistrationUnit:
    is_a: OrganizationalUnitType
    class_uri: hc:RegistrationUnit
    description: Unit type for collection registration and documentation control.
    alt_descriptions:
      nl: Eenheidstype voor collectie-registratie en documentatiebeheer.
      de: Einheitstyp fuer Sammlungsregistrierung und Dokumentationssteuerung.
      fr: Type d unite pour l enregistrement des collections et le controle documentaire.
      es: Tipo de unidad para registro de colecciones y control documental.
      ar: نوع وحدة لتسجيل المجموعات وضبط التوثيق.
      id: Tipe unit untuk registrasi koleksi dan kontrol dokumentasi.
      zh: 适用于藏品登记与文档管控的单元类型。
    structured_aliases:
    - {literal_form: registratie-eenheid, in_language: nl}
    - {literal_form: Registrierungseinheit, in_language: de}
    - {literal_form: unite d enregistrement, in_language: fr}
    - {literal_form: unidad de registro, in_language: es}
    - {literal_form: وحدة تسجيل, in_language: ar}
    - {literal_form: unit registrasi, in_language: id}
    - {literal_form: 登记单元, in_language: zh}
    slot_usage:
      has_code:
        equals_string: REGISTRATION
    broad_mappings:
    - schema:Organization
