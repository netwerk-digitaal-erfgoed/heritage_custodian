id: https://nde.nl/ontology/hc/class/Frequency
name: Frequency
title: Frequency
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
classes:
  Frequency:
    class_uri: hc:Frequency
    description: >-
      Recurrence pattern indicating how often a process, observation, or action
      takes place.
    alt_descriptions:
      nl: Herhalingspatroon dat aangeeft hoe vaak een proces, observatie of handeling plaatsvindt.
      de: Wiederholungsmuster, das angibt, wie haeufig ein Prozess, eine Beobachtung oder eine Handlung stattfindet.
      fr: Motif de recurrence indiquant la frequence d'un processus, d'une observation ou d'une action.
      es: Patron de recurrencia que indica la frecuencia con que ocurre un proceso, observacion o accion.
      ar: نمط تكرار يوضح مدى تكرار عملية أو ملاحظة أو إجراء.
      id: Pola keterulangan yang menunjukkan seberapa sering suatu proses, observasi, atau tindakan terjadi.
      zh: 表示某一流程、观测或动作发生频率的重复模式。
    structured_aliases:
      - literal_form: frequentie
        in_language: nl
      - literal_form: Frequenz
        in_language: de
      - literal_form: frequence
        in_language: fr
      - literal_form: frecuencia
        in_language: es
      - literal_form: التواتر
        in_language: ar
      - literal_form: frekuensi
        in_language: id
      - literal_form: 频率
        in_language: zh
    slots:
      - has_label
    broad_mappings:
      - schema:Schedule
