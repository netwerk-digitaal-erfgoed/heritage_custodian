id: https://nde.nl/ontology/hc/classes/TimeSlot
name: TimeSlot
title: Time Slot
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  time: http://www.w3.org/2006/time#
imports:
- linkml:types
classes:
  TimeSlot:
    description: >-
      Day-and- specification representing a recurring moment within a weekly schedule.
    alt_descriptions:
      nl: Dag-en-tijdspecificatie die een terugkerend moment binnen een wekelijks schema vertegenwoordigt.
      de: Tages- und Zeitangabe, die einen wiederkehrenden Zeitpunkt in einem Wochenplan darstellt.
      fr: Spécification de jour et d'heure représentant un moment récurrent dans un horaire hebdomadaire.
      es: Especificación de día y hora que representa un momento recurrente en un horario semanal.
      ar: تحديد يوم ووقت يمثل نقطة متكررة ضمن جدول أسبوعي.
      id: Spesifikasi hari dan waktu yang merepresentasikan titik berulang dalam jadwal mingguan.
      zh: 周计划中某一重复时点的日期与时间规范。
    structured_aliases:
    - literal_form: tijdslot
      in_language: nl
    - literal_form: Zeitfenster
      in_language: de
    - literal_form: plage horaire
      in_language: fr
    - literal_form: franja horaria
      in_language: es
    - literal_form: فترة زمنية
      in_language: ar
    - literal_form: slot waktu
      in_language: id
    - literal_form: 时间段
      in_language: zh
    class_uri: time:Instant
    broad_mappings:
    - schema:Time
    related_mappings:
    - schema:OpeningHoursSpecification
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots: []
