    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties van persknipsels, artikeluittreksels en journalistieke
        excerpten georganiseerd op onderwerp of tijdsperiode.
      de: >-
        Taxonomieknoten für Aggregationen von Presseausschnitten, Artikelextrakten und journalistischen
        Auszügen, organisiert nach Thema oder Zeitraum.
      fr: >-
        Nœud taxonomique pour les agrégations de coupures de presse, extraits d'articles et
        extraits journalistiques organisés par sujet ou période.
      es: >-
        Nodo taxonómico para agregaciones de recortes de prensa, extractos de artículos y
        extractos periodísticos organizados por tema o período.
      ar: >-
        عقدة تصنيفية لتجميعات قصاصات الصحف ومقتطفات المقالات والمقتطفات الصحفية المنظمة حسب الموضوع أو الفترة الزمنية.
      id: >-
        Simpul taksonomi untuk agregasi guntingan pers, ekstrak artikel, dan kutipan jurnalistik
        yang diorganisir berdasarkan topik atau periode waktu.
      zh: >-
        用于按主题或时间段组织的新闻剪报、文章摘录和新闻摘录聚合的分类法节点。
