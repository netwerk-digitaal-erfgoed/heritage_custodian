        على مستوى الولاية والتي توثق الأنشطة الحكومية والإدارية.
      id: >-
        Klasifikasi untuk koleksi catatan yang dikelola oleh institusi arsip
        tingkat negara bagian yang mendokumentasikan aktivitas pemerintahan dan administratif.
      zh: >-
        由州级档案机构维护的记录政府和管理活动的记录集合分类。
