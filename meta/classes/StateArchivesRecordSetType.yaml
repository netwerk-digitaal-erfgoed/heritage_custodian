        Classificatie voor archiefcollecties die worden beheerd door archiefinstellingen
        op staatsniveau die overheids- en bestuurlijke activiteiten documenteren.
      de: >-
        Klassifikation für Archivbestände, die von staatlichen Archivinstitutionen
        gepflegt werden und staatliche und Verwaltungsaktivitäten dokumentieren.
