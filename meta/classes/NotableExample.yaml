id: https://nde.nl/ontology/hc/class/NotableExample
name: NotableExample-class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/located_at
- ../slots/has_label
- ../slots/has_note
- ../slots/identified_by
classes:
  NotableExample:
    class_uri: hc:NotableExample
    description: >-
      Concrete illustrative case used to clarify the scope, boundaries, or
      application of a class definition.
    alt_descriptions:
      nl: >-
        Concreet illustratief geval gebruikt om de reikwijdte, grenzen of toepassing
        van een klassedefinitie te verduidelijken.
      de: >-
        Konkreter illustrativer Fall zur Klärung des Umfangs, der Grenzen oder Anwendung
        einer Klassendefinition.
      fr: >-
        Cas illustratif concret utilisé pour clarifier la portée, les limites ou
        l'application d'une définition de classe.
      es: >-
        Caso ilustrativo concreto utilizado para clarificar el alcance, límites o
        aplicación de una definición de clase.
      ar: >-
        حالة توضيحية ملموسة تُستخدم لتوضيح النطاق أو الحدود أو تطبيق تعريف الفئة.
      id: >-
        Kasus ilustratif konkret yang digunakan untuk memperjelas ruang lingkup,
        batasan, atau penerapan definisi kelas.
      zh: >-
        用于阐明类定义的范围、边界或应用的具体说明性案例。
    slots:
    - has_label
    - located_at
    - identified_by
    - has_note
    annotations:
      specificity_score: 0.3
      specificity_rationale: Universal utility for concrete examples
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: Real-world example used to clarify the scope of a class.'
