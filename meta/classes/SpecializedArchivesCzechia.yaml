classes:
  SpecializedArchivesCzechia:
    description: >-
      Archival institution within the Czech national framework focused on collecting
      and preserving documentation within specific subject areas, formats, or thematic domains.
    alt_descriptions:
      nl: >-
        Archiefinstelling binnen het Tsjechische nationale kader die zich richt op het verzamelen
        en bewaren van documentatie binnen specifieke vakgebieden, formaten of thematische domeinen.
      de: >-
        Archivinstitution im tschechischen nationalen Rahmen, die sich auf das Sammeln
        und Bewahren von Dokumentation in bestimmten Fachgebieten, Formaten oder thematischen Bereichen konzentriert.
      fr: >-
        Institution archivistique dans le cadre national tchèque spécialisée dans la collecte
        et la préservation de documentation dans des domaines spécifiques, formats ou domaines thématiques.
      es: >-
        Institución archivística dentro del marco nacional checo enfocada en recopilar
        y preservar documentación en áreas temáticas, formatos o dominios temáticos específicos.
      ar: >-
        مؤسسة أرشيفية ضمن الإطار الوطني التشيكي متخصصة في جمع
        وحفظ الوثائق في مجالات موضوعية أو أشكال أو مجالات مواضيعية محددة.
      id: >-
        Institusi arsip dalam kerangka nasional Ceko yang berfokus pada pengumpulan
        dan pelestarian dokumentasi dalam area subjek, format, atau domain tematik tertentu.
      zh: >-
        捷克国家框架内的档案机构，专注于收集和保存特定主题领域、格式或主题领域的文档。
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    exact_mappings:
      - wd:Q101470010
    close_mappings:
      - rico:CorporateBody
    broad_mappings:
      - wd:Q166118
      - skos:Concept
    keywords:
      - specialized archive czechia
      - czech specialized archive
      - thematic archive
    structured_aliases:
      - literal_form: gespecialiseerd archief Tsjechië
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Facharchiv Tschechien
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: archives spécialisées tchèques
        predicate: EXACT_SYNONYM
        in_language: fr
    slots:
      - has_type
      - hold_record_set
      - has_score
      - related_to
      - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
      related_to:
        range: WikidataAlignment
        inlined: true
    see_also:
      - SpecializedArchive
      - StateDistrictArchive
      - StateRegionalArchiveCzechia
      - SecurityArchives
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '["*"]'
