id: https://nde.nl/ontology/hc/class/ExhibitionLocation
name: ExhibitionLocation
title: Exhibition Location Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_description
- ../slots/has_score
classes:
  ExhibitionLocation:
    class_uri: crm:E53_Place
    description: >-
      Spatial designation where heritage objects are presented within a curatorial display context.
    alt_descriptions:
      nl: >-
        Ruimtelijke aanduiding waar erfgoedobjecten worden gepresenteerd binnen een curatiele weergavecontext.
      de: >-
        Räumliche Bezeichnung, in der Heritage-Objekte in einem kuratorischen Ausstellungskontext präsentiert werden.
      fr: >-
        Désignation spatiale où les objets patrimoniaux sont présentés dans un contexte d'exposition curatoriale.
      es: >-
        Designación espacial donde se presentan objetos patrimoniales en un contexto de exposición curatorial.
      ar: >-
        تسمية مكانية حيث يتم عرض القطع التراثية في سياق عرض تنظيمي.
      id: >-
        Penunjukan spasial tempat objek warisan dipresentasikan dalam konteks tampilan kuratorial.
      zh: >-
        在策展展示语境中展示遗产物品的空间指定。
    structured_aliases:
    - literal_form: tentoonstellingslocatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Ausstellungsort
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: lieu d'exposition
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: lugar de exposición
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: موقع المعرض
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: lokasi pameran
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 展览地点
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - crm:E53_Place
    close_mappings:
    - schema:Place
    slots:
    - identified_by
    - has_label
    - has_description
    - has_score
    comments:
    - Represents gallery spaces, display cases, or exhibition halls.
    - May include room identifiers, floor numbers, or zone designations.
    - 'Preserved from prior description: Place where an object is displayed within an exhibition context.'
    keywords:
    - display space
    - gallery location
    - curatorial placement
    - exhibition venue
    examples:
    - value:
        has_label: Gallery 3
        has_description: Main exhibition hall on first floor.
      description: Museum gallery location for object display
    annotations:
      specificity_score: 0.2
      specificity_rationale: Reusable place node for display context.
      custodian_types: '["*"]'
