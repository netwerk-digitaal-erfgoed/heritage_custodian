id: https://nde.nl/ontology/hc/class/NationalArchivesRecordSetTypes
name: NationalArchivesRecordSetTypes
title: NationalArchives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./NationalArchivesRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  GovernmentAdministrativeFonds:
    is_a: NationalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation for documentation produced by central-state
      ministries, agencies, and coordinating executive offices.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie voor documentatie van centrale ministeries,
        agentschappen en coördinerende uitvoerende diensten.
      de: >-
        Provenienzbasierte Aggregation für Unterlagen zentralstaatlicher
        Ministerien, Behörden und koordinierender Exekutivstellen.
      fr: >-
        Agrégation fondée sur la provenance pour la documentation produite par
        les ministères, agences et services exécutifs centraux de l'État.
      es: >-
        Agregación basada en procedencia para documentación producida por
        ministerios, agencias y oficinas ejecutivas centrales del Estado.
      ar: >-
        تجميع قائم على المنشأ لوثائق تصدرها الوزارات والهيئات والمكاتب
        التنفيذية المركزية للدولة.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan kementerian,
        badan, dan kantor eksekutif pusat negara.
      zh: >-
        基于来源原则对国家中央部委、机构及协调性行政机关形成文献进行聚合。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - NationalArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:GovernmentAdministrativeFonds
      has_custodian:
        equals_string: hc:NationalArchives
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NationalArchives custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: centrale overheidsdocumentatie-aggregatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Aggregation zentralstaatlicher Verwaltungsunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: aggregation documentaire de l'administration centrale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: agregacion documental de administracion central
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تجميع وثائق الإدارة المركزية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: agregasi dokumentasi administrasi pusat negara
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 中央国家行政文献聚合
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Represents central executive provenance at the highest aggregation level.
    - Useful for state-level accountability, governance, and policy history analysis.
    - 'Preserved from prior description: Fonds-level administrative records created by national ministries and agencies.'
    keywords:
    - ministries
    - executive agencies
    - state governance
    - provenance aggregation
    examples:
    - value:
        has_type: hc:GovernmentAdministrativeFonds
        has_custodian: hc:NationalArchives
        has_note: Cabinet office directives, inter-ministerial memoranda, and policy files.
      description: Central-state executive documentation grouped by provenance
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  LegislativeRecordSeries:
    is_a: NationalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence generated by national law-making bodies,
      capturing bill development, debate, amendment, and promulgation traces.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van nationale wetgevende organen met sporen
        van wetsontwikkeling, debat, amendement en afkondiging.
      de: >-
        Geordnete Dokumentationsfolge nationaler gesetzgebender Organe mit
        Nachweisen zu Entwurf, Debatte, Aenderung und Verkuendung.
      fr: >-
        Sequence documentaire ordonnee issue des organes nationaux de
        fabrication de la loi, retraçant élaboration, débat, amendement et promulgation.
      es: >-
        Secuencia documental ordenada generada por organos nacionales de
        elaboracion normativa, con trazas de debate, enmienda y promulgacion.
      ar: >-
        تسلسل وثائقي منظم صادر عن هيئات صنع القوانين على المستوى الوطني،
        يوثق إعداد مشاريع القوانين والنقاش والتعديل والإصدار.
      id: >-
        Urutan dokumenter teratur dari badan pembentuk undang-undang nasional,
        merekam perancangan, perdebatan, amandemen, dan pengundangan.
      zh: >-
        由国家立法机关形成的有序文献序列，记录法案拟制、审议、修订与颁布过程。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - NationalArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:LegislativeRecordSeries
      has_custodian:
        equals_string: hc:NationalArchives
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NationalArchives custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: reeks parlementaire wetsvorming
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge parlamentarischer Gesetzgebungsunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence documentaire de fabrication de la loi
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia documental de elaboracion legislativa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة وثائق صناعة التشريع
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan dokumentasi pembentukan undang-undang
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 国家立法流程文献序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Captures parliamentary workflow continuity across sessions and procedural stages.
    - Supports legislative provenance tracing and legal-history research.
    - 'Preserved from prior description: Series of parliamentary and legislative records.'
    keywords:
    - parliament
    - bill workflow
    - amendment history
    - promulgation trace
    examples:
    - value:
        has_type: hc:LegislativeRecordSeries
        has_custodian: hc:NationalArchives
        has_note: Draft bill dossiers with committee reports and final promulgation files.
      description: National law-making workflow documentation organized as a recurring sequence
  DiplomaticCorrespondenceCollection:
    is_a: NationalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body of intergovernmental communications, dispatches,
      memoranda, and negotiation-related evidence across foreign-affairs activity.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van intergouvernementele communicatie,
        depêches, memoranda en onderhandelingssporen binnen buitenlandse zaken.
      de: >-
        Zusammengestellter Dokumentkoerper aus zwischenstaatlicher Kommunikation,
        Depeschen, Memoranden und Verhandlungsunterlagen im Aussenbezug.
      fr: >-
        Ensemble documentaire réuni de communications intergouvernementales,
        dépêches, mémorandums et pièces liées aux négociations extérieures.
      es: >-
        Cuerpo documental reunido de comunicaciones intergubernamentales,
        despachos, memorandos y evidencias de negociacion exterior.
      ar: >-
        جسم وثائقي مُجمع يضم المراسلات بين الحكومات والبرقيات والمذكرات
        ومواد مرتبطة بالتفاوض في الشؤون الخارجية.
      id: >-
        Kumpulan dokumenter terhimpun berisi komunikasi antarpemerintah,
        dispatch, memorandum, dan bukti terkait negosiasi urusan luar negeri.
      zh: >-
        汇集跨政府沟通、公函、备忘录及对外交涉证据的文献整体。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - NationalArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:DiplomaticCorrespondenceCollection
      has_custodian:
        equals_string: hc:NationalArchives
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NationalArchives custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: diplomatieke communicatieverzameling
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung diplomatischer Korrespondenzunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: ensemble documentaire diplomatique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: conjunto documental diplomatico
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تجميعة وثائق دبلوماسية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: himpunan dokumentasi diplomatik
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 外交往来文献汇编
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Includes communication artifacts connected to bilateral and multilateral relations.
    - Useful for treaty, negotiation, and foreign-policy reconstruction work.
    - 'Preserved from prior description: Collection of diplomatic correspondence and related international-relations records.'
    keywords:
    - foreign affairs
    - diplomatic dispatches
    - negotiation records
    - intergovernmental communication
    examples:
    - value:
        has_type: hc:DiplomaticCorrespondenceCollection
        has_custodian: hc:NationalArchives
        has_note: Embassy telegrams, negotiation memoranda, and treaty drafting correspondence.
      description: Assembled body of foreign-relations communication documentation
  NationalStatisticsSeries:
    is_a: NationalArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence containing census tabulations,
      socio-economic indicators, and methodology files used for state reporting.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks met volkstellingstabellen,
        sociaaleconomische indicatoren en methodebestanden voor staatsrapportage.
      de: >-
        Geordnete Dokumentationsfolge mit Volkszaehlungstabellen,
        soziooekonomischen Indikatoren und Methodikunterlagen fuer staatliche Berichte.
      fr: >-
        Sequence documentaire ordonnee contenant tableaux de recensement,
        indicateurs socio-economiques et dossiers methodologiques de reporting public.
      es: >-
        Secuencia documental ordenada con tabulaciones censales,
        indicadores socioeconomicos y expedientes metodologicos para reporte estatal.
      ar: >-
        تسلسل وثائقي منظم يضم جداول التعداد والمؤشرات الاجتماعية الاقتصادية
        وملفات المنهجية المستخدمة في التقارير الحكومية.
      id: >-
        Urutan dokumenter teratur berisi tabulasi sensus,
        indikator sosial-ekonomi, dan berkas metodologi untuk pelaporan negara.
      zh: >-
        包含人口普查汇总、社会经济指标与国家报送方法文件的有序文献序列。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - NationalArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:NationalStatisticsSeries
      has_custodian:
        equals_string: hc:NationalArchives
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NationalArchives custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: reeks nationale indicatorendocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge staatlicher Statistikunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence documentaire d'indicateurs nationaux
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia documental de indicadores nacionales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة وثائق المؤشرات الوطنية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan dokumentasi indikator nasional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 国家指标文献序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Groups measurement outputs and methodological files used in official reporting cycles.
    - Supports longitudinal analysis of demographic and socio-economic trends.
    - 'Preserved from prior description: Series containing census and national statistical records.'
    keywords:
    - census tabulation
    - socio-economic indicators
    - official reporting
    - methodological documentation
    examples:
    - value:
        has_type: hc:NationalStatisticsSeries
        has_custodian: hc:NationalArchives
        has_note: Census aggregates, indicator compendia, and method revision bulletins.
      description: Official indicator documentation organized as a recurring sequence
