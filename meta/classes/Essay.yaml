id: https://nde.nl/ontology/hc/class/Essay
name: Essay
title: Essay
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  Essay:
    class_uri: hc:Essay
    description: >-
      Interpretive prose resource that contextualizes objects, collections, or
      exhibitions.
    alt_descriptions:
      nl: Interpreterende tekstbron die objecten, collecties of tentoonstellingen contextualiseert.
      de: Interpretativer Text, der Objekte, Sammlungen oder Ausstellungen kontextualisiert.
      fr: Ressource de prose interpretative contextualisant des objets, des collections ou des expositions.
      es: Recurso de prosa interpretativa que contextualiza objetos, colecciones o exposiciones.
      ar: مورد نصي تفسيري يقدّم سياقا للأشياء أو المجموعات أو المعارض.
      id: Sumber prosa interpretatif yang memberi konteks pada objek, koleksi, atau pameran.
      zh: 为对象、馆藏或展览提供语境的解释性文本资源。
    structured_aliases:
      - literal_form: toelichtende tekst
        in_language: nl
      - literal_form: interpretativer Text
        in_language: de
      - literal_form: texte interpretatif
        in_language: fr
      - literal_form: texto interpretativo
        in_language: es
      - literal_form: نص تفسيري
        in_language: ar
      - literal_form: esai interpretatif
        in_language: id
      - literal_form: 诠释文章
        in_language: zh
    slots:
      - has_description
      - has_label
    broad_mappings:
      - schema:Article
    annotations:
      specificity_score: "0.25"
      specificity_rationale: Interpretive textual artifact for curatorial context.
      custodian_types: "['*']"
