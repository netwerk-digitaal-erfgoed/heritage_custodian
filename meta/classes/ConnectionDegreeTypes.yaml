id: https://nde.nl/ontology/hc/class/ConnectionDegreeTypes
name: connection_degree_types_class
title: Connection Degree Types Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ./ConnectionDegreeType
  - linkml:types
classes:
  FirstDegreeConnection:
    is_a: ConnectionDegreeType
    class_uri: hc:FirstDegreeConnection
    description: >-
      Direct relationship link between two entities with no intermediary
      nodes in the relationship path.
    alt_descriptions:
      nl: >-
        Directe relatiekoppeling tussen twee entiteiten zonder tussenliggende knooppunten
        in het relatietraject.
      de: >-
        Direkte Beziehungsverbindung zwischen zwei Entitäten ohne Zwischenknoten im Beziehungspfad.
      fr: >-
        Lien relationnel direct entre deux entités sans nœuds intermédiaires dans le
        chemin de relation.
      es: >-
        Enlace relacional directo entre dos entidades sin nodos intermedios en la ruta de relación.
      ar: >-
        رابط علاقي مباشر بين كيانين دون عقد وسيطة في مسار العلاقة.
      id: >-
        Tautan relasional langsung antara dua entitas tanpa simpul perantara dalam jalur hubungan.
      zh: >-
        两个实体之间的直接关系链接，关系路径中没有中间节点。
    broad_mappings:
      - skos:Concept
    annotations:
      degree_numeric: 1
      degree_value: 1st

  SecondDegreeConnection:
    is_a: ConnectionDegreeType
    class_uri: hc:SecondDegreeConnection
    description: Connection reached through one intermediary profile.
    alt_descriptions:
      nl: Relatie bereikt via één tussenpersoon.
      de: Verbindung über einen Vermittler erreicht.
      fr: Relation atteinte par un intermédiaire.
      es: Conexión alcanzada a través de un intermediario.
      ar: علاقة تتم عبر وسيط واحد.
      id: Koneksi yang dicapai melalui satu perantara.
      zh: 通过一个中介人建立的关系。
    structured_aliases:
    - literal_form: tweedegraadsverbinding
      in_language: nl
    - literal_form: zweiten Grades Verbindung
      in_language: de
    - literal_form: connexion de deuxième degré
      in_language: fr
    - literal_form: conexión de segundo grado
      in_language: es
    - literal_form: اتصال من الدرجة الثانية
      in_language: ar
    - literal_form: koneksi tingkat dua
      in_language: id
    - literal_form: 二度人脉
      in_language: zh
    keywords:
    - second degree
    - intermediary
    - indirect
    broad_mappings:
      - skos:Concept
    annotations:
      degree_numeric: 2
      degree_value: 2nd

  ThirdPlusDegreeConnection:
    is_a: ConnectionDegreeType
    class_uri: hc:ThirdPlusDegreeConnection
    description: Connection reached through two or more intermediary profiles.
    alt_descriptions:
      nl: Relatie bereikt via twee of meer tussenpersonen.
      de: Verbindung über zwei oder mehr Vermittler erreicht.
      fr: Relation atteinte par deux intermédiaires ou plus.
      es: Conexión alcanzada a través de dos o más intermediarios.
      ar: علاقة تتم عبر وسيطين أو أكثر.
      id: Koneksi yang dicapai melalui dua perantara atau lebih.
      zh: 通过两个或更多中介人建立的关系。
    structured_aliases:
    - literal_form: derdegraadsverbinding
      in_language: nl
    - literal_form: dritten Grades Verbindung
      in_language: de
    - literal_form: connexion de troisième degré
      in_language: fr
    - literal_form: conexión de tercer grado
      in_language: es
    - literal_form: اتصال من الدرجة الثالثة
      in_language: ar
    - literal_form: koneksi tingkat tiga
      in_language: id
    - literal_form: 三度人脉
      in_language: zh
    keywords:
    - third degree
    - multiple intermediaries
    - extended network
    broad_mappings:
      - skos:Concept
    annotations:
      degree_numeric: 3
      degree_value: 3rd+
