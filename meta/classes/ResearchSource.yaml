id: https://nde.nl/ontology/hc/classes/ResearchSource
name: ResearchSource
title: ResearchSource
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  cito: http://purl.org/spar/cito/
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
- linkml:types
classes:
  ResearchSource:
    description: >-
      A research source consulted during location resolution or other investigative processes.
    alt_descriptions:
      nl: Een onderzoeksbron geraadpleegd tijdens locatiebepaling of andere onderzoeksprocessen.
      de: Eine Forschungsquelle, die während der Standortauflösung oder anderen Untersuchungsprozessen konsultiert wurde.
      fr: Une source de recherche consultée lors de la résolution de localisation ou d'autres processus d'enquête.
    structured_aliases:
    - literal_form: onderzoeksbron
      in_language: nl
    - literal_form: Forschungsquelle
      in_language: de
    - literal_form: source de recherche
      in_language: fr
    comments:
    - Records the type of source (Wikidata, web archive, official documents), identifiers, URLs.
    - Includes structured data obtained from consultation.
    class_uri: prov:PrimarySource
    close_mappings:
    - cito:CitationAct
    related_mappings:
    - schema:CreativeWork
    - prov:Entity
    broad_mappings:
    - prov:PrimarySource
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    slots:
    - has_note
    - has_coordinates
    - has_source
