id: https://nde.nl/ontology/hc/class/EnvironmentalRequirement
name: EnvironmentalRequirement
title: Environmental Requirement
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  EnvironmentalRequirement:
    class_uri: hc:EnvironmentalRequirement
    description: >-
      Normative parameter constraint defining acceptable environmental ranges for
      preserving designated material groups.
    alt_descriptions:
      nl: Normatieve parameterbeperking die aanvaardbare omgevingsbereiken voor behoud van aangewezen materiaalgroepen vastlegt.
      de: Normative Parametergrenze, die zulaessige Umweltbereiche fuer den Erhalt bestimmter Materialgruppen festlegt.
      fr: Contrainte parametrique normative definissant les plages environnementales acceptables pour la conservation de groupes de materiaux designes.
      es: Restriccion parametrica normativa que define rangos ambientales aceptables para preservar grupos de materiales designados.
      ar: قيد معياري للمعلمات يحدد النطاقات البيئية المقبولة لحفظ مجموعات مواد محددة.
      id: Batas parameter normatif yang mendefinisikan rentang lingkungan yang dapat diterima untuk pelestarian kelompok material tertentu.
      zh: 为特定材料组保存定义可接受环境范围的规范性参数约束。
    structured_aliases:
      - literal_form: klimaateis
        in_language: nl
      - literal_form: Klimaanforderung
        in_language: de
      - literal_form: exigence environnementale
        in_language: fr
      - literal_form: requisito ambiental
        in_language: es
      - literal_form: متطلب بيئي
        in_language: ar
      - literal_form: persyaratan lingkungan
        in_language: id
      - literal_form: 环境要求
        in_language: zh
    slots:
      - has_label
      - has_description
    broad_mappings:
      - schema:PropertyValue
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.3"
      specificity_rationale: Parameter requirement concept for preventive conservation.
