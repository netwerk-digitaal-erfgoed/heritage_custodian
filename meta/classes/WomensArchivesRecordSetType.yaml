      Archival grouping classification for documentation on women's movements,
      organizations, and lived experiences.
    alt_descriptions:
      nl: Classificatie voor archiefcollecties die de geschiedenis van vrouwen, feministische bewegingen en vrouwenervaringen documenteren, volgens RiC-O RecordSetType.
      de: Klassifikation für Archivbestände, die die Frauengeschichte, feministische Bewegungen und Frauenerfahrungen dokumentieren, gemäß RiC-O RecordSetType.
      fr: Classification pour les collections d'archives documentant l'histoire des femmes, les mouvements féministes et les expériences des femmes, selon RiC-O RecordSetType.
      es: Clasificación para colecciones de archivo que documentan la historia de las mujeres, movimientos feministas y experiencias de las mujeres, según RiC-O RecordSetType.
      ar: تصنيف للمجموعات الأرشيفية التي توثق تاريخ النساء والحركات النسوية وتجارب النساء، وفقًا لـ RiC-O RecordSetType.
      id: Klasifikasi untuk koleksi arsip yang mendokumentasikan sejarah perempuan, gerakan feminis, dan pengalaman perempuan, sesuai RiC-O RecordSetType.
      zh: 记录妇女历史、女权运动和妇女经验的档案藏品分类， 遵循RiC-O RecordSetType。
