id: https://nde.nl/ontology/hc/class/NotarialArchiveRecordSetType
name: NotarialArchiveRecordSetType
title: NotarialArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  NotarialArchiveRecordSetType:
    description: >-
      Classification concept for documentary units created through legally
      authenticated civil transactions by public legal officers.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire eenheden die ontstaan uit
        juridisch geauthenticeerde civiele transacties door openbaar bevoegde
        rechtsfunctionarissen.
      de: >-
        Klassifikationskonzept für dokumentarische Einheiten, die aus rechtlich
        beglaubigten zivilrechtlichen Vorgängen durch öffentlich bestellte
        Rechtsorgane entstehen.
      fr: >-
        Concept de classification pour des unités documentaires issues de
        transactions civiles légalement authentifiées par des officiers publics.
      es: >-
        Concepto de clasificación para unidades documentales derivadas de
        transacciones civiles autenticadas legalmente por fedatarios públicos.
      ar: >-
        مفهوم تصنيف لوحدات توثيقية ناتجة عن معاملات مدنية موثقة قانونياً
        على يد موظفين قانونيين عموميين.
      id: >-
        Konsep klasifikasi untuk unit dokumenter yang dihasilkan dari transaksi
        perdata yang diautentikasi secara hukum oleh pejabat hukum publik.
      zh: >-
        用于分类由公共法律官员依法认证的民事交易所形成文献单元的分类概念。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - NotarialArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: hc:NotarialArchiveRecordSetType
    structured_aliases:
    - literal_form: type voor notariële documenteenheden
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ für notariell beurkundete Dokumenteinheiten
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'unités documentaires notariales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de unidades documentales notariales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع وحدات توثيق موثقة قانونياً
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe unit dokumenter notarial
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公证文献单元类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Applies to documentary units generated from authenticated civil-law acts.
    - Useful for legal provenance analysis and jurisdiction-specific description workflows.
    - 'Preserved from prior description: Record set type used to classify materials typically held by notarial archives.'
    keywords:
    - civil law documentation
    - legal authentication
    - provenance classification
    - documentary units
    examples:
    - value:
        has_type: hc:NotarialArchiveRecordSetType
        has_scope: Deeds, powers of attorney, and testament instruments.
      description: Documentary unit category for authenticated civil instruments
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
