classes:
  Extension:
    class_uri: prov:Activity
    description: >-
      Formal modification action that prolongs or expands the duration, scope, or terms of an existing agreement.
    alt_descriptions:
      nl: >-
        Formele wijzigingsactie die de duur, reikwijdte of voorwaarden van een bestaande overeenkomst verlengt of uitbreidt.
      de: >-
        Formelle Änderungsaktion, die die Dauer, den Umfang oder die Bedingungen einer bestehenden Vereinbarung verlängert oder erweitert.
      fr: >-
        Action de modification formelle qui prolonge ou étend la durée, la portée ou les termes d'un accord existant.
      es: >-
        Acción de modificación formal que prolonga o amplía la duración, el alcance o los términos de un acuerdo existente.
      ar: >-
        إجراء تعديل رسمي يطيل أو يوسع مدة أو نطاق أو شروط اتفاق قائم.
      id: >-
        Tindakan modifikasi formal yang memperpanjang atau memperluas durasi, cakupan, atau ketentuan perjanjian yang ada.
      zh: >-
        延长或扩展现有协议的期限、范围或条款的正式修改行为。
