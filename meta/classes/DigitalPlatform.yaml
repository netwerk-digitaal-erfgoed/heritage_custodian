id: https://nde.nl/ontology/hc/class/digital-platform
name: digital_platform_class
title: DigitalPlatform Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcat: http://www.w3.org/ns/dcat#
  doap: http://usefulinc.com/ns/doap#
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
- linkml:types
- ../classes/Custodian
- ../slots/has_endpoint
- ../slots/has_url
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_type
- ../slots/has_level
- ../slots/refer_to
- ../slots/has_standard
- ../slots/has_linked_data
- ../slots/temporal_extent
- ../slots/has_score
- ../slots/derive_from
- ../slots/generated_by
classes:
  DigitalPlatform:
    is_a: ReconstructedEntity
    class_uri: schema:WebSite
    description: >-
      Web-based service interface operated by a heritage custodian for resource discovery, access, and delivery.
    alt_descriptions:
      nl: >-
        Webgebaseerde service-interface beheerd door een erfgoedbeheerder voor bronontdekking,
        toegang en levering.
      de: >-
        Webbasierte Dienstschnittstelle, die von einem Heritage-Verwalter für Ressourcenentdeckung,
        Zugang und Bereitstellung betrieben wird.
      fr: >-
        Interface de service Web exploitée par un dépositaire du patrimoine pour la découverte,
        l'accès et la livraison des ressources.
      es: >-
        Interfaz de servicio web operada por un depositario patrimonial para el descubrimiento,
        acceso y entrega de recursos.
      ar: >-
        واجهة خدمة قائمة على الويب يديرها أمين تراث للاكتشاف والوصول
        وتسليم الموارد.
      id: >-
        Antarmuka layanan berbasis web yang dioperasikan oleh kustodian warisan untuk penemuan,
        akses, dan pengiriman sumber daya.
      zh: >-
        由遗产保管人运营的基于网络的服务界面，用于资源发现、访问和交付。
    structured_aliases:
    - literal_form: digitaal platform
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: digitale Plattform
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: plateforme numérique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: plataforma digital
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: منصة رقمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: platform digital
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 数字平台
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:WebSite
    close_mappings:
    - schema:WebApplication
    - dcat:DataService
    - dcat:Catalog
    - doap:Project
    related_mappings:
    - schema:SoftwareApplication
    - prov:Entity
    slots:
    - has_endpoint
    - has_url
    - identified_by
    - has_label
    - has_type
    - has_level
    - refer_to
    - has_standard
    - has_linked_data
    - temporal_extent
    - has_score
    - derive_from
    - generated_by
    slot_usage:
      refer_to:
        range: Custodian
        required: true
    comments:
    - 'Preserved from prior description: Digital service surface operated by a custodian for discovery, access, and delivery of heritage resources.'
