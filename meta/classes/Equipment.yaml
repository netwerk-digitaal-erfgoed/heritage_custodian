id: https://nde.nl/ontology/hc/class/Equipment
name: Equipment
title: Equipment
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  sosa: http://www.w3.org/ns/sosa/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
  - ../slots/has_type
classes:
  Equipment:
    class_uri: hc:Equipment
    description: >-
      Physical apparatus used to perform storage, treatment, monitoring, or
      digitization operations.
    alt_descriptions:
      nl: Fysiek apparaat dat wordt gebruikt voor opslag-, behandelings-, monitoring- of digitaliseringswerkzaamheden.
      de: Physische Ausruestung fuer Lagerung, Behandlung, Ueberwachung oder Digitalisierung.
      fr: Equipement physique utilise pour les operations de stockage, traitement, suivi ou numerisation.
      es: Equipo fisico utilizado para operaciones de almacenamiento, tratamiento, monitoreo o digitalizacion.
      ar: جهاز مادي يُستخدم في عمليات التخزين أو المعالجة أو المراقبة أو الرقمنة.
      id: Peralatan fisik yang digunakan untuk operasi penyimpanan, perlakuan, pemantauan, atau digitalisasi.
      zh: 用于存储、处理、监测或数字化作业的物理设备。
    structured_aliases:
      - literal_form: uitrusting
        in_language: nl
      - literal_form: Ausruestung
        in_language: de
      - literal_form: equipement
        in_language: fr
      - literal_form: equipamiento
        in_language: es
      - literal_form: معدات
        in_language: ar
      - literal_form: peralatan
        in_language: id
      - literal_form: 设备
        in_language: zh
    slots:
      - has_label
      - has_description
      - has_type
    broad_mappings:
      - sosa:Platform
      - schema:Product
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.3"
      specificity_rationale: Generic physical asset used in operational workflows.
