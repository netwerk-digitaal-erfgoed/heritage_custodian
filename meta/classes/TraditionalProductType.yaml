id: https://nde.nl/ontology/hc/class/TraditionalProductType
name: TraditionalProductType
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  TraditionalProductType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract category for customary outputs rooted in inherited local
      knowledge, techniques, or material culture.
    alt_descriptions:
      nl: Abstracte categorie voor traditionele producten die geworteld zijn in overgeleverde lokale kennis, technieken of materiele cultuur.
      de: Abstrakte Kategorie fuer traditionelle Produkte, die in ueberliefertem lokalen Wissen, Techniken oder materieller Kultur verankert sind.
      fr: Categorie abstraite pour des produits traditionnels ancrés dans des savoirs locaux transmis, des techniques ou la culture materielle.
      es: Categoria abstracta para productos tradicionales arraigados en conocimientos locales heredados, tecnicas o cultura material.
      ar: فئة تجريدية لمنتجات تقليدية متجذرة في معرفة محلية موروثة أو تقنيات أو ثقافة مادية.
      id: Kategori abstrak untuk produk tradisional yang berakar pada pengetahuan lokal turun-temurun, teknik, atau budaya material.
      zh: 用于分类植根于地方传承知识、工艺或物质文化的传统产品的抽象类别。
    structured_aliases:
    - literal_form: traditioneel producttype
      in_language: nl
    - literal_form: traditioneller Produkttyp
      in_language: de
    - literal_form: type de produit traditionnel
      in_language: fr
    - literal_form: tipo de producto tradicional
      in_language: es
    - literal_form: نوع منتج تقليدي
      in_language: ar
    - literal_form: tipe produk tradisional
      in_language: id
    - literal_form: 传统产品类型
      in_language: zh
    slots:
    - identified_by
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
