id: https://nde.nl/ontology/hc/class/ClassificationStatusType
name: ClassificationStatusType
title: Classification Status Type - Abstract Base Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  ClassificationStatusType:
    abstract: true
    class_uri: skos:Concept
    description: >-
      Abstract taxonomy node representing maturity or uncertainty states in institutional categorization workflows.
    alt_descriptions:
      nl: >-
        Abstract taxonomieknooppunt dat volwassenheids- of onzekerheidsstaten vertegenwoordigt in institutionele categorisatieworkflows.
      de: >-
        Abstrakter Taxonomieknoten, der Reifegrade oder Unsicherheitszustände in institutionellen Kategorisierungsworkflows darstellt.
      fr: >-
        Nœud taxonomique abstrait représentant les états de maturité ou d'incertitude dans les workflows de catégorisation institutionnelle.
      es: >-
        Nodo taxonómico abstracto que representa estados de madurez o incertidumbre en flujos de trabajo de categorización institucional.
      ar: >-
        عقدة تصنيفية مجردة تمثل حالات النضج أو عدم اليقين في مهام سير العمل التصنيفية المؤسسية.
      id: >-
        Simpul taksonomi abstrak yang mewakili status kematangan atau ketidakpastian dalam alur kerja kategorisasi kelembagaan.
      zh: >-
        抽象分类节点，表示机构分类工作流中的成熟度或不确定性状态。
    structured_aliases:

      - literal_form: Classificatiestatus

        predicate: EXACT_SYNONYM

