      - literal_form: Klassifizierungsstatus

        predicate: EXACT_SYNONYM

        in_language: de

      - literal_form: Statut de classification

        predicate: EXACT_SYNONYM

        in_language: fr

      - literal_form: Estado de clasificación

        predicate: EXACT_SYNONYM

        in_language: es

      - literal_form: حالة التصنيف

        predicate: EXACT_SYNONYM

        in_language: ar

      - literal_form: Status Klasifikasi

        predicate: EXACT_SYNONYM

        in_language: id

      - literal_form: 分类状态

        predicate: EXACT_SYNONYM

        in_language: zh
