id: https://nde.nl/ontology/hc/class/IoTDevice
name: IoTDevice
title: IoT Device Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  sosa: http://www.w3.org/ns/sosa/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
classes:
  IoTDevice:
    class_uri: sosa:Sensor
    description: >-
      Connected sensor apparatus deployed in heritage environments for monitoring,
      measurement, or environmental data collection.
    alt_descriptions:
      nl: >-
        Verbonden sensorapparaat ingezet in erfgoedomgevingen voor monitoring,
        meting of verzameling van omgevingsgegevens.
      de: >-
        Vernetztes Sensorgerät, das in Heritage-Umgebungen für Überwachung,
        Messung oder Umweltdatenerfassung eingesetzt wird.
      fr: >-
        Appareil capteur connecté déployé dans les environnements patrimoniaux
        pour la surveillance, la mesure ou la collecte de données environnementales.
      es: >-
        Dispositivo sensor conectado desplegado en entornos patrimoniales
        para monitoreo, medición o recopilación de datos ambientales.
      ar: >-
        جهاز استشعار متصل منتشر في بيئات التراث
        للمراقبة أو القياس أو جمع البيانات البيئية.
      id: >-
        Perangkat sensor terhubung yang dikerahkan di lingkungan warisan
        untuk pemantauan, pengukuran, atau pengumpulan data lingkungan.
      zh: >-
        部署在遗产环境中的联网传感器设备，
        用于监测、测量或环境数据收集。
    broad_mappings:
    - sosa:Sensor
    close_mappings:
    - schema:Thing
    slots:
    - identified_by
    - has_label
    structured_aliases:
    - literal_form: IoT-apparaat
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: IoT-Gerät
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: appareil IoT
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: dispositivo IoT
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: جهاز إنترنت الأشياء
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: perangkat IoT
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 物联网设备
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Used for environmental monitoring in archives and museums
    - Supports IoT deployments for heritage preservation
    - 'Preserved from prior description: Device type or instance used for sensing in connected heritage environments.'
    keywords:
    - sensor
    - IoT
    - monitoring
    - environmental data
    - connected device
    examples:
    - value:
        has_label: Temperature Sensor
        identified_by: sensor-temp-001
      description: Environmental monitoring sensor in storage facility
    annotations:
      specificity_score: 0.4
      specificity_rationale: Sensor-device class for IoT deployment modeling.
      custodian_types: '["*"]'
