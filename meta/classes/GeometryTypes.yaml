    description: >-
      Collection of zero or more line string instances forming a composite linear geometry.
    alt_descriptions:
      nl: Verzameling van nul of meer lijnstringinstanties die een samengestelde lineaire geometrie vormen.
      de: Sammlung von null oder mehr LineString-Instanzen, die eine zusammengesetzte lineare Geometrie bilden.
      fr: Collection de zero ou plusieurs instances de chaines de lignes formant une geometrie lineaire composite.
      es: Coleccion de cero o mas instancias de cadenas de lineas que forman una geometria lineal compuesta.
      ar: مجموعة من صفر أو أكثر من حالات سلاسل الخطوط تشكل هندسة خطية مركبة.
      id: Kumpulan nol atau lebih instance line string yang membentuk geometri linier komposit.
      zh: 由零个或多个线串实例组成的复合线性几何。
