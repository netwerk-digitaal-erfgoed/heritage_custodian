      Collection of zero or more point instances forming a composite zero-dimensional geometry.
    alt_descriptions:
      nl: Verzameling van nul of meer punteninstanties die een samengestelde nuldimensionale geometrie vormen.
      de: Sammlung von null oder mehr Punktinstanzen, die eine zusammengesetzte nulldimensionale Geometrie bilden.
      fr: Collection de zero ou plusieurs instances de points formant une geometrie composite de dimension zero.
      es: Coleccion de cero o mas instancias de puntos que forman una geometria compuesta de dimension cero.
      ar: مجموعة من صفر أو أكثر من حالات النقاط تشكل هندسة مركبة ذات بعد صفر.
      id: Kumpulan nol atau lebih instance titik yang membentuk geometri komposit dimensi nol.
      zh: 由零个或多个点实例组成的复合零维几何。
