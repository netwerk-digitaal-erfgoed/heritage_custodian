id: https://nde.nl/ontology/hc/class/GeometryTypes
name: GeometryTypes
title: Geometry Types Class Module
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  sf: http://www.opengis.net/ont/sf#
  geo: http://www.opengis.net/ont/geosparql#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./GeometryType
  - linkml:types
classes:
  Point:
    is_a: GeometryType
    class_uri: sf:Point
    description: >-
      Zero-dimensional geometric primitive representing a single location in coordinate space.
    alt_descriptions:
      nl: Nuldimensionale geometrische primitieve die een enkele locatie in de coordinatenruimte vertegenwoordigt.
      de: Nulldimensionales geometrisches Primitiv, das einen einzelnen Ort im Koordinatenraum darstellt.
      fr: Primitif geometrique de dimension zero representant un emplacement unique dans l'espace de coordonnees.
      es: Primitiva geometrica de dimension cero que representa una unica ubicacion en el espacio de coordenadas.
      ar: بدائية هندسية ذات بعد صفر تمثل موقعًا واحدًا في فضاء الإحداثيات.
      id: Primitif geometris dimensi nol yang mewakili lokasi tunggal dalam ruang koordinat.
      zh: 表示坐标空间中单个位置的零维几何基元。
    structured_aliases:
      - literal_form: punt
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Punkt
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: point
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: punto
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: نقطة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: titik
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 点
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - point
      - location
      - coordinate
      - zero-dimensional
      - position
      - spatial
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - geo:Geometry
  Polygon:
    is_a: GeometryType
    class_uri: sf:Polygon
    description: >-
      Two-dimensional geometric region bounded by a closed ring of line segments.
    alt_descriptions:
      nl: Tweedimensionaal geometrisch gebied begrensd door een gesloten ring van lijnsegmenten.
      de: Zweidimensionale geometrische Region, die durch einen geschlossenen Ring von Liniensegmenten begrenzt wird.
      fr: Region geometrique bidimensionnelle delimitee par un anneau ferme de segments de ligne.
      es: Region geometrica bidimensional limitada por un anillo cerrado de segmentos de linea.
      ar: منطقة هندسية ثنائية الأبعاد يحدها حلقة مغلقة من القطع المستقيمة.
      id: Wilayah geometris dua dimensi yang dibatasi oleh cincin tertutup dari segmen garis.
      zh: 由闭合线段环包围的二维几何区域。
    structured_aliases:
      - literal_form: polygoon
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Polygon
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: polygone
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: poligono
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: مضلع
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: poligon
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 多边形
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - polygon
      - area
      - boundary
      - two-dimensional
      - closed ring
      - region
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - geo:Geometry
  MultiPolygon:
    is_a: GeometryType
    class_uri: sf:MultiPolygon
    description: >-
      Collection of zero or more polygon instances forming a composite two-dimensional shape.
    alt_descriptions:
      nl: Verzameling van nul of meer polygooninstanties die een samengestelde tweedimensionale vorm vormen.
      de: Sammlung von null oder mehr Polygoninstanzen, die eine zusammengesetzte zweidimensionale Form bilden.
      fr: Collection de zero ou plusieurs instances de polygones formant une forme bidimensionnelle composite.
      es: Coleccion de cero o mas instancias de poligonos que forman una forma bidimensional compuesta.
      ar: مجموعة من صفر أو أكثر من حالات المضلعات تشكل شكلاً ثنائي الأبعاد مركبًا.
      id: Kumpulan nol atau lebih instance poligon yang membentuk bentuk dua dimensi komposit.
      zh: 由零个或多个多边形实例组成的复合二维形状。
    structured_aliases:
      - literal_form: multipolygoon
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: MultiPolygon
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: multipolygone
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: multipoligono
