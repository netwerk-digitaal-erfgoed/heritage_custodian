        in_language: id
      - literal_form: 多多边形
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - multipolygon
      - composite
      - collection
      - two-dimensional
      - multiple areas
      - complex shape
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
      - geo:Geometry
  LineString:
    is_a: GeometryType
    class_uri: sf:LineString
    description: >-
      One-dimensional geometric object composed of a sequence of two or more coordinate points.
    alt_descriptions:
      nl: Eendimensionaal geometrisch object samengesteld uit een reeks van twee of meer coordinaatpunten.
      de: Eindimensionales geometrisches Objekt, das aus einer Folge von zwei oder mehr Koordinatenpunkten besteht.
      fr: Objet geometrique unidimensionnel compose d'une sequence de deux points de coordonnees ou plus.
      es: Objeto geometrico unidimensional compuesto por una secuencia de dos o mas puntos de coordenadas.
      ar: كائن هندسي أحادي البعد مكون من تسلسل من نقطتين إحداثيتين أو أكثر.
      id: Objek geometris satu dimensi yang terdiri dari urutan dua titik koordinat atau lebih.
      zh: 由两个或多个坐标点序列组成的一维几何对象。
    structured_aliases:
      - literal_form: lijnstring
        predicate: EXACT_SYNONYM
        in_language: nl
