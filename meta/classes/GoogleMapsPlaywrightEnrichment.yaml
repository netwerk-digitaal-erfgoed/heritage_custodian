id: https://nde.nl/ontology/hc/classes/GoogleMapsPlaywrightEnrichment
name: GoogleMapsPlaywrightEnrichment
title: Google Maps Playwright Enrichment Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_method
- ../slots/has_url
- ../slots/has_name
- ../slots/has_description
- ../slots/has_operating_hours
classes:
  GoogleMapsPlaywrightEnrichment:
    class_uri: prov:Entity
    description: >-
      Data extraction result captured via browser automation from mapping
      platform interfaces for location enrichment workflows.
    alt_descriptions:
      nl: >-
        Gegevensextractieresultaat vastgelegd via browserautomatisering van kaartplatforms
        voor locatieverrijkingsworkflows.
      de: >-
        Datenextraktionsergebnis, das über Browser-Automatisierung von Kartenplattform-Schnittstellen
        für Standortanreicherungs-Workflows erfasst wurde.
      fr: >-
        Résultat d'extraction de données capturé via l'automatisation de navigateur depuis
        les interfaces de plateforme cartographique pour les flux d'enrichissement de localisation.
      es: >-
        Resultado de extracción de datos capturado mediante automatización de navegador
        desde interfaces de plataformas de mapas para flujos de enriquecimiento de ubicación.
      ar: >-
        نتيجة استخراج بيانات ملتقطة عبر أتمتة المتصفح من واجهات منصة الخرائط لعمليات إثراء الموقع.
      id: >-
        Hasil ekstraksi data yang diambil melalui otomatisasi browser dari antarmuka
        platform pemetaan untuk alur kerja pengayaan lokasi.
      zh: >-
        通过浏览器自动化从地图平台接口捕获的用于位置丰富工作流的数据提取结果。
    close_mappings:
    - schema:PropertyValue
    related_mappings:
    - schema:Place
    - schema:LocalBusiness
    slots:
    - has_method
    - has_url
    - has_name
    - has_description
    - has_operating_hours
    annotations:
      specificity_score: 0.45
      specificity_rationale: Enrichment entity documenting browser-mediated extraction.
      custodian_types: '["*"]'
    broad_mappings:
    - prov:Entity
