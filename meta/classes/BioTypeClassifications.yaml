      - literal_form: öffentliche biologische Einrichtung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: institution biologique publique
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: institución biológica pública
        predicate: EXACT_SYNONYM
        in_language: es
