        in_language: nl
      - literal_form: Bildungseinrichtung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: institution axée sur l'éducation
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: institución enfocada en educación
        predicate: EXACT_SYNONYM
        in_language: es
  ExhibitionFocusedClassification:
