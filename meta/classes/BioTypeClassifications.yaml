        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: institution axée sur la recherche
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: institución enfocada en investigación
        predicate: EXACT_SYNONYM
