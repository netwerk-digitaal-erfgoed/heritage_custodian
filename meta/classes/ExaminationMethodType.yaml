id: https://nde.nl/ontology/hc/class/ExaminationMethodType
name: ExaminationMethodType
title: Examination Method Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
classes:
  ExaminationMethodType:
    class_uri: skos:Concept
    description: >-
      Taxonomic node for categorizing analytical procedures used in heritage assessment and conservation.
    alt_descriptions:
      nl: >-
        Taxonomisch knooppunt voor het categoriseren van analytische procedures die worden gebruikt
        bij erfgoedbeoordeling en conservering.
      de: >-
        Taxonomischer Knoten zur Kategorisierung analytischer Verfahren, die bei der Heritage-Bewertung
        und Konservierung verwendet werden.
      fr: >-
        Nœud taxonomique pour catégoriser les procédures analytiques utilisées dans l'évaluation
        et la conservation patrimoniale.
      es: >-
        Nodo taxonómico para categorizar procedimientos analíticos utilizados en la evaluación
        y conservación patrimonial.
      ar: >-
        عقدة تصنيفية لتصنيف الإجراءات التحليلية المستخدمة في تقييم التراث والحفاظ عليه.
      id: >-
        Simpul taksonomi untuk mengkategorikan prosedur analitik yang digunakan dalam
        penilaian dan pelestarian warisan.
      zh: >-
        用于对遗产评估和保护中使用的分析程序进行分类的分类节点。
    structured_aliases:
    - literal_form: onderzoeksproceduretype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Untersuchungsverfahrenstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de procédure d'examen
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de procedimiento de examen
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع إجراء الفحص
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe prosedur pemeriksaan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 检查程序类型
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:DefinedTerm
    slots:
    - has_label
    comments:
    - Groups analytical techniques by methodology, equipment, or application domain.
    - Used for documenting conservation interventions and scientific analyses.
    - 'Preserved from prior description: Taxonomy node used to group examination methods.'
    keywords:
    - analytical procedure
    - conservation analysis
    - heritage assessment
    - diagnostic technique
    examples:
    - value:
        has_label: X-ray Fluorescence Spectroscopy
      description: Non-destructive elemental analysis technique
    annotations:
      specificity_score: 0.25
      specificity_rationale: Classification helper for examination methods.
      custodian_types: '["*"]'
