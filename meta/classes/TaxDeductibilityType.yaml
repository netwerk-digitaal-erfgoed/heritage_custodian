id: https://nde.nl/ontology/hc/class/TaxDeductibilityType
name: tax_deductibility_type_class
title: Tax Deductibility Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  TaxDeductibilityType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Classification of fiscal benefit status for charitable donations.
    alt_descriptions:
      nl: Classificatie van fiscale voordeelstatus voor liefdadigheidsdonaties.
      de: Klassifizierung des steuerlichen Vorteilsstatus für Wohltätigkeitsspenden.
      fr: Classification du statut d'avantage fiscal pour les dons caritatifs.
      es: Clasificación del estado de beneficio fiscal para donaciones benéficas.
      ar: تصنيف حالة الفائدة الضريبية للتبرعات الخيرية.
      id: Klasifikasi status manfaat fiskal untuk donasi amal.
      zh: 慈善捐赠的税收优惠状态分类。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - schema:PropertyValue
    slots:
    - has_label
    - has_description
    slot_usage:
      has_label:
        required: true
    keywords:
    - tax status
    - donation benefit
    - fiscal classification
    comments:
    - Subclasses include FullyDeductible, PartiallyDeductible, NotDeductible, ConditionallyDeductible
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.45
      replaces_enum: DeductibilityStatusEnum
      migration_date: "2026-01-23"
    structured_aliases:
    - literal_form: deductibility type
