    - literal_form: deductibility type
      in_language: de
    - literal_form: deductibility type
      in_language: fr
    - literal_form: deductibility type
      in_language: es
    - literal_form: deductibility type
      in_language: ar
    - literal_form: deductibility type
      in_language: id
    - literal_form: deductibility type
      in_language: zh
