    class_uri: hc:HouseArchiveRecordSetType
    is_a: CollectionType
    description: >-
      Abstract classification for record-set categories documenting noble, aristocratic, or dynastic family histories and estate administrations.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor recordset-categorieën die adellijke, aristocratische of dynastieke familiegoederen en landgoederen documenteren.
      de: >-
        Abstrakte Klassifikation für Datensatzkategorien, die adelige, aristokratische oder dynastische Familiengeschichten und Gutsverwaltungen dokumentieren.
      fr: >-
        Classification abstraite pour les catégories de jeux d'enregistrements documentant les histoires familiales nobles, aristocratiques ou dynastiques et les administrations domaniales.
      es: >-
        Clasificación abstracta para categorías de conjuntos de registros que documentan historias familiares nobles, aristocráticas o dinásticas y administraciones de propiedades.
      ar: >-
        تصنيف تجريدي لفئات مجموعات السجلات التي توثق التاريخ العائلي النبيل أو الأرستقراطي أو السلالي وإدارات العقارات.
      id: >-
        Klasifikasi abstrak untuk kategori kumpulan catatan yang mendokumentasikan sejarah keluarga bangsawan, aristokrat, atau dinasti dan administrasi tanah.
      zh: >-
        记录贵族、世家或王朝家族历史和庄园管理记录集类别的抽象分类。
