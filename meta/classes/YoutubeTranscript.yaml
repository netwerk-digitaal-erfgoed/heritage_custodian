id: https://nde.nl/ontology/hc/classes/YoutubeTranscript
name: YoutubeTranscript
title: YoutubeTranscript
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  oa: http://www.w3.org/ns/oa#
imports:
- linkml:types
- ../slots/in_language
classes:
  YoutubeTranscript:
    description: >-
      Text representation of spoken media content with language and generation
      method metadata.
    alt_descriptions:
      nl: YouTube-video transcript inclusief video-ID, taal, transcripttype (handmatig of automatisch gegenereerd), volledige tekst en extractiemetadata voor toegankelijkheid en inhoudsanalyse.
      de: YouTube-Video-Transkript einschließlich Video-ID, Sprache, Transkripttyp (manuell oder automatisch generiert), Volltext und Extraktionsmetadaten für Barrierefreiheit und Inhaltsanalyse.
      fr: Transcription de vidéo YouTube incluant l'ID vidéo, la langue, le type de transcription (manuel ou généré automatiquement), le texte complet et les métadonnées d'extraction pour l'accessibilité et l'analyse de contenu.
      es: Transcripción de video de YouTube incluyendo ID de video, idioma, tipo de transcripción (manual o generada automáticamente), texto completo y metadatos de extracción para accesibilidad y análisis de contenido.
      ar: نسخ فيديو YouTube بما في ذلك معرف الفيديو واللغة ونوع النسخ (يدوي أو مولد تلقائيًا) والنص الكامل وبيانات الاستخراج الوصفية للوصول وتحليل المحتوى.
      id: Transkrip video YouTube termasuk ID video, bahasa, jenis transkrip (manual atau dihasilkan otomatis), teks lengkap, dan metadata ekstraksi untuk aksesibilitas dan analisis konten.
      zh: YouTube视频字幕，包括视频ID、语言、字幕类型（手动或自动生成）、 全文和提取元数据，用于无障碍访问和内容分析。
    class_uri: hc:YoutubeTranscript
    close_mappings:
    - schema:MediaObject
    related_mappings:
    - oa:TextualBody
    - prov:Entity
    slots:
    - in_language
    structured_aliases:
    - literal_form: YouTube-transcript
      in_language: nl
    - literal_form: YouTube-Transkript
      in_language: de
    - literal_form: transcription YouTube
      in_language: fr
    - literal_form: transcripción de YouTube
      in_language: es
    - literal_form: نسخ يوتيوب
      in_language: ar
    - literal_form: transkrip YouTube
      in_language: id
    - literal_form: YouTube字幕
      in_language: zh
    comments:
    - Textual representation of video/audio content
    - Can be manual or auto-generated
    keywords:
    - transcript
    - subtitle
    - accessibility
    - speech-to-text
    - video caption
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
