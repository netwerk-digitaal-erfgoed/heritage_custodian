    description: >-
      Fallback classification used when available evidence is insufficient or
      contradictory for institutional categorization.
    broad_mappings:
    - skos:Concept
    related_mappings:
    - schema:Organization
    - crm:E74_Group
    - schema:Thing
    - prov:Entity
    - prov:Activity
    slots:
    - has_status
    - has_type
    - based_on
    - evaluated_through
    - has_score
    - assert
    slot_usage:
      has_status:
#         range: string # uriorcurie
        # range: ClassificationStatus
        required: true
        inlined: false # Fixed invalid inline for primitive type
        examples:
        - value:
            has_type:
              has_label: Indeterminate
            has_description: Type indeterminate - insufficient evidence
        - value:
            has_type:
              has_label: Ambiguous
            has_description: 'Sources conflict: museum (website) vs archive (ISIL)'
        - value:
            has_type:
              has_label: Transitional
            has_description: Type transitional - merger in progress
        - value: Website offline, Phone disconnected, No email response
        - value: 'Conflicting sources: museum vs. archive'
      assert:
#         range: string # uriorcurie
        # range: Hypothesis
        multivalued: true
        required: false
        inlined_as_list: false # Fixed invalid inline for primitive type
        examples:
        - value: Possibly collecting society (mentions archival holdings)
        - value: Possibly advocacy organization (described as preservation group)
      based_on:
#         range: string
        multivalued: true
        required: true
        examples:
        - value: National Archives search (no results), Local society queried
        - value: Website checked (offline), Email sent (no response)
        - value: Wikidata search, ICOM directory, Regional museum
      evaluated_through:
#         range: string
        required: true
        examples:
        - value: Requires specialist research, Low priority, Consider removing
        - value: High priority - recently mentioned in journal, Re-investigate
        - value: Medium priority - waiting for archival cataloging, Review 2026
        - value: 'evidence_quality: minimal, source_count: 1'
        - value: 'completeness: 30%, last_updated: 2025-11-23'
      has_type:
        equals_string: hc:UnspecifiedType
