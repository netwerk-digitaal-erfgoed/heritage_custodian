classes:
  UnspecifiedType:
    is_a: CustodianType
    class_uri: skos:Concept
    alt_descriptions:
      nl: Custodian-type voor instellingen waarvan het type op basis van beschikbare gegevens niet betrouwbaar kan worden vastgesteld.
      de: Custodian-Typ fuer Einrichtungen, deren Typ anhand verfuegbarer Evidenz nicht verlaesslich bestimmbar ist.
      fr: Type de custodian pour des institutions dont le type ne peut pas etre determine de maniere fiable selon les preuves disponibles.
      es: Tipo de custodian para instituciones cuyo tipo no puede determinarse de forma fiable con la evidencia disponible.
      ar: نوع جهة حافظة للمؤسسات التي لا يمكن تحديد نوعها بشكل موثوق وفق الأدلة المتاحة.
      id: Tipe custodian untuk institusi yang tipenya tidak dapat ditentukan secara andal dari bukti yang tersedia.
      zh: 用于在现有证据下无法可靠判定机构类型的保管机构类型。
    annotations:
      skos:prefLabel: Unspecified Type
      skos:altLabel: unknown type, unclassified, indeterminate, heritage organization, cultural organization
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
      modeling_notes: |
        Use this type when classification is indeterminate because evidence is
        insufficient, conflicting, transitional, or genuinely outside current type
        categories.

        This is a data-quality/uncertainty marker and should be reviewed over time.

        Distinction

        - UnspecifiedType: type cannot be determined.
        - MixedCustodianType: multiple known types apply.
