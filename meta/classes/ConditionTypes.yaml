id: https://nde.nl/ontology/hc/class/ConditionTypes
name: ConditionTypes
title: Condition Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./ConditionType
  - linkml:types
classes:
  ExcellentCondition:
    is_a: ConditionType
    description: >-
      Category indicating near-pristine material integrity with negligible wear and
      no active deterioration.
    alt_descriptions:
      nl: >-
        Categorie die een vrijwel onberispelijke materiele integriteit aangeeft,
        met verwaarloosbare slijtage en geen actieve achteruitgang.
      de: >-
        Kategorie fuer nahezu makellose materielle Integritaet mit vernachlaessigbarer
        Abnutzung und ohne aktive Verschlechterung.
      fr: >-
        Categorie indiquant une integrite materielle quasi intacte, avec une usure
        negligeable et sans deterioration active.
      es: >-
        Categoria que indica integridad material casi impecable, con desgaste minimo
        y sin deterioro activo.
      ar: >-
        فئة تدل على سلامة مادية شبه كاملة مع اهتراء طفيف جدا ودون تدهور نشط.
      id: >-
        Kategori yang menunjukkan integritas material hampir sempurna, dengan keausan
        sangat kecil dan tanpa deteriorasi aktif.
      zh: >-
        表示材料完整性近乎完好、磨损极轻且无主动劣化的类别。
    structured_aliases:
      - literal_form: uitstekende staat
        in_language: nl
      - literal_form: ausgezeichneter Zustand
        in_language: de
      - literal_form: etat excellent
        in_language: fr
      - literal_form: estado excelente
        in_language: es
      - literal_form: حالة ممتازة
        in_language: ar
      - literal_form: kondisi sangat baik
        in_language: id
      - literal_form: 极佳状态
        in_language: zh
    keywords:
      - excellent condition
      - pristine
      - mint
      - near-perfect
      - conservation state
    broad_mappings:
      - crm:E3_Condition_State
      - crm:E55_Type
      - skos:Concept

  GoodCondition:
    is_a: ConditionType
    description: >-
      Category indicating stable material integrity with minor handling wear and no
      immediate conservation risk.
    alt_descriptions:
      nl: Stabiele materiele integriteit met lichte gebruikssporen en zonder direct conserveringsrisico.
      de: Stabile materielle Integritaet mit leichten Gebrauchsspuren und ohne unmittelbares Konservierungsrisiko.
      fr: Integrite materielle stable avec une usure mineure et sans risque immediat pour la conservation.
      es: Integridad material estable con desgaste menor y sin riesgo inmediato de conservacion.
      ar: سلامة مادية مستقرة مع آثار استخدام طفيفة ودون خطر حفظ فوري.
      id: Integritas material stabil dengan keausan ringan dan tanpa risiko konservasi langsung.
      zh: 材料完整性稳定，仅有轻微使用痕迹且无即时保护风险。
    structured_aliases:
      - literal_form: goede staat
        in_language: nl
      - literal_form: guter Zustand
        in_language: de
      - literal_form: bon etat
        in_language: fr
      - literal_form: buen estado
        in_language: es
      - literal_form: حالة جيدة
        in_language: ar
      - literal_form: kondisi baik
        in_language: id
      - literal_form: 良好状态
        in_language: zh
    keywords:
      - good condition
      - stable
      - minor wear
      - sound condition
      - conservation state
    broad_mappings:
      - crm:E3_Condition_State
      - crm:E55_Type
      - skos:Concept

  FairCondition:
    is_a: ConditionType
    description: >-
      Category indicating moderate wear or damage that remains manageable but
      warrants periodic monitoring.
    alt_descriptions:
      nl: Categorie met matige slijtage of schade die beheersbaar blijft maar periodieke monitoring vereist.
      de: Kategorie mit maessiger Abnutzung oder Schaeden, die beherrschbar bleiben, aber regelmaessige Kontrolle erfordern.
      fr: Categorie indiquant une usure ou des dommages moderes, gerables mais necessitant un suivi periodique.
      es: Categoria con desgaste o dano moderado, manejable pero que requiere seguimiento periodico.
      ar: فئة تشير إلى اهتراء أو ضرر متوسط يمكن التحكم فيه لكنه يتطلب متابعة دورية.
      id: Kategori dengan keausan atau kerusakan sedang yang masih dapat dikelola namun memerlukan pemantauan berkala.
      zh: 表示存在中等磨损或损伤、仍可管理但需定期监测的类别。
    structured_aliases:
      - literal_form: redelijke staat
        in_language: nl
      - literal_form: befriedigender Zustand
        in_language: de
      - literal_form: etat moyen
        in_language: fr
      - literal_form: estado regular
        in_language: es
      - literal_form: حالة متوسطة
        in_language: ar
      - literal_form: kondisi sedang
        in_language: id
      - literal_form: 一般状态
        in_language: zh
    keywords:
      - fair condition
      - moderate wear
      - manageable damage
      - periodic monitoring
      - conservation state
    broad_mappings:
      - crm:E3_Condition_State
      - crm:E55_Type
      - skos:Concept

  PoorCondition:
    is_a: ConditionType
    description: >-
      Category indicating substantial deterioration that limits handling and
      requires targeted intervention.
    alt_descriptions:
      nl: Categorie met aanzienlijke achteruitgang die raadpleging beperkt en gerichte ingrepen vereist.
      de: Kategorie met deutlicher Verschlechterung, die die Nutzung einschraenkt und gezielte Massnahmen erfordert.
      fr: Categorie indiquant une deterioration importante limitant la manipulation et necessitant une intervention ciblee.
      es: Categoria con deterioro importante que limita la manipulacion y requiere intervencion especifica.
      ar: فئة تدل على تدهور كبير يحد من التداول ويتطلب تدخلا موجها.
      id: Kategori dengan deteriorasi signifikan yang membatasi penanganan dan membutuhkan intervensi terarah.
      zh: 表示显著劣化、限制使用并需要定向干预的类别。
    structured_aliases:
      - literal_form: slechte staat
        in_language: nl
      - literal_form: schlechter Zustand
        in_language: de
      - literal_form: mauvais etat
        in_language: fr
      - literal_form: estado deficiente
        in_language: es
      - literal_form: حالة متدهورة
        in_language: ar
      - literal_form: kondisi buruk
        in_language: id
      - literal_form: 较差状态
        in_language: zh
    keywords:
      - poor condition
      - substantial deterioration
      - limited handling
      - intervention needed
      - conservation state
    broad_mappings:
      - crm:E3_Condition_State
      - crm:E55_Type
      - skos:Concept

  CriticalCondition:
    is_a: ConditionType
    description: >-
      Category indicating severe instability with imminent loss risk and urgent
      conservation priority.
    alt_descriptions:
      nl: Categorie met ernstige instabiliteit, direct verliesrisico en urgente conserveringsprioriteit.
      de: Kategorie met schwerer Instabilitaet, akutem Verlustrisiko und dringendem Konservierungsbedarf.
      fr: Categorie signalant une instabilite severe, un risque de perte imminent et une priorite de conservation urgente.
      es: Categoria que senala inestabilidad grave, riesgo inminente de perdida y prioridad urgente de conservacion.
      ar: فئة تشير إلى عدم استقرار شديد وخطر فقدان وشيك وأولوية حفظ عاجلة.
      id: Kategori yang menunjukkan ketidakstabilan berat, risiko kehilangan segera, dan prioritas konservasi mendesak.
      zh: 表示严重不稳定、存在迫切损失风险并需紧急保护优先处理的类别。
    structured_aliases:
      - literal_form: kritieke staat
        in_language: nl
      - literal_form: kritischer Zustand
        in_language: de
      - literal_form: etat critique
        in_language: fr
      - literal_form: estado critico
        in_language: es
      - literal_form: حالة حرجة
        in_language: ar
      - literal_form: kondisi kritis
        in_language: id
      - literal_form: 危急状态
        in_language: zh
    keywords:
      - critical condition
      - severe instability
      - imminent loss
      - urgent conservation
      - conservation priority
    broad_mappings:
      - crm:E3_Condition_State
      - crm:E55_Type
      - skos:Concept

  AccessCondition:
    is_a: ConditionType
    description: >-
      Category for prerequisites and constraints governing consultation,
      registration, or supervised access.
    alt_descriptions:
      nl: Categorie voor voorwaarden en beperkingen rond raadpleging, registratie of begeleide toegang.
      de: Kategorie fuer Voraussetzungen und Einschraenkungen bei Einsicht, Registrierung oder beaufsichtigtem Zugang.
      fr: Categorie pour les prealables et contraintes de consultation, d'inscription ou d'acces surveille.
      es: Categoria para requisitos y restricciones de consulta, registro o acceso supervisado.
      ar: فئة للمتطلبات والقيود المتعلقة بالاطلاع أو التسجيل أو الوصول الخاضع للإشراف.
      id: Kategori untuk prasyarat dan batasan terkait konsultasi, registrasi, atau akses terawasi.
      zh: 用于查阅、登记或受监督访问前提与限制的类别。
    structured_aliases:
      - literal_form: toegangsvoorwaarde
        in_language: nl
      - literal_form: Zugangsvoraussetzung
        in_language: de
      - literal_form: condition d'acces
        in_language: fr
      - literal_form: condicion de acceso
        in_language: es
      - literal_form: شرط الوصول
        in_language: ar
      - literal_form: syarat akses
        in_language: id
      - literal_form: 访问条件
        in_language: zh
    keywords:
      - access condition
      - access restrictions
      - consultation requirements
      - registration
      - supervised access
    broad_mappings:
      - crm:E55_Type
      - skos:Concept

  UseCondition:
    is_a: ConditionType
    description: >-
      Category for constraints on handling, citation, and permitted forms of use.
    alt_descriptions:
      nl: Categorie voor beperkingen op hantering, citeren en toegestane gebruiksvormen.
      de: Kategorie fuer Einschraenkungen bei Handhabung, Zitierweise und erlaubten Nutzungsformen.
      fr: Categorie pour les contraintes de manipulation, de citation et de formes d'usage autorisees.
      es: Categoria para restricciones de manipulacion, citacion y formas de uso permitidas.
      ar: فئة لقيود المناولة والاستشهاد وأشكال الاستخدام المسموح بها.
      id: Kategori untuk pembatasan penanganan, sitasi, dan bentuk penggunaan yang diizinkan.
      zh: 用于处理、引用及允许使用方式限制的类别。
    structured_aliases:
      - literal_form: gebruiksvoorwaarde
        in_language: nl
      - literal_form: Nutzungsauflage
        in_language: de
      - literal_form: condition d'utilisation
        in_language: fr
      - literal_form: condicion de uso
        in_language: es
      - literal_form: شرط الاستخدام
        in_language: ar
      - literal_form: ketentuan penggunaan
        in_language: id
      - literal_form: 使用条件
        in_language: zh
    keywords:
      - use condition
      - usage restrictions
      - handling constraints
      - citation requirements
      - permitted use
    broad_mappings:
      - crm:E55_Type
      - skos:Concept

  ReproductionCondition:
    is_a: ConditionType
    description: >-
      Category for permissions, attribution duties, and technical constraints on
      copying or publishing surrogates.
    alt_descriptions:
      nl: Categorie voor toestemmingen, naamsvermelding en technische beperkingen bij reproductie of publicatie.
      de: Kategorie fuer Genehmigungen, Quellenangabe und technische Auflagen bei Reproduktion oder Veroeffentlichung.
      fr: Categorie pour les autorisations, obligations d'attribution et contraintes techniques de reproduction ou publication.
      es: Categoria para permisos, obligaciones de atribucion y restricciones tecnicas en reproduccion o publicacion.
      ar: فئة للتصاريح ومتطلبات الإسناد والقيود التقنية على النسخ أو النشر.
      id: Kategori untuk izin, kewajiban atribusi, dan batasan teknis pada penyalinan atau publikasi.
      zh: 用于复制或发布替代件时许可、署名义务与技术限制的类别。
    structured_aliases:
      - literal_form: reproductievoorwaarde
        in_language: nl
      - literal_form: Reproduktionsauflage
        in_language: de
      - literal_form: condition de reproduction
        in_language: fr
      - literal_form: condicion de reproduccion
        in_language: es
      - literal_form: شرط الاستنساخ
        in_language: ar
      - literal_form: ketentuan reproduksi
        in_language: id
      - literal_form: 复制条件
        in_language: zh
    keywords:
      - reproduction condition
      - copy permission
      - attribution
      - publishing rights
      - image use
    broad_mappings:
      - skos:Concept

  LoanCondition:
    is_a: ConditionType
    description: >-
      Category for insurance, transport, environmental, and supervision
      requirements attached to outgoing or incoming loans.
    alt_descriptions:
      nl: Categorie voor verzekerings-, transport-, omgevings- en toezichtseisen bij bruiklenen.
      de: Kategorie fuer Versicherungs-, Transport-, Umwelt- und Aufsichtsanforderungen bei Leihverkehr.
      fr: Categorie pour les exigences d'assurance, de transport, d'environnement et de surveillance des prets.
      es: Categoria para requisitos de seguro, transporte, ambiente y supervision en prestamos.
      ar: فئة لمتطلبات التأمين والنقل والبيئة والإشراف المرتبطة بالإعارة.
      id: Kategori untuk persyaratan asuransi, transportasi, lingkungan, dan pengawasan pada peminjaman.
      zh: 用于外借或借入时保险、运输、环境与监管要求的类别。
    structured_aliases:
      - literal_form: bruikleenvoorwaarde
        in_language: nl
      - literal_form: Leihbedingung
        in_language: de
      - literal_form: condition de pret
        in_language: fr
      - literal_form: condicion de prestamo
        in_language: es
      - literal_form: شرط الإعارة
        in_language: ar
      - literal_form: ketentuan peminjaman
        in_language: id
      - literal_form: 借展条件
        in_language: zh
    keywords:
      - loan condition
      - lending requirements
      - insurance requirements
      - transport conditions
      - exhibition loan
    broad_mappings:
      - skos:Concept

  DigitizationCondition:
    is_a: ConditionType
    description: >-
      Category for capture quality, metadata completeness, and derivative-use
      constraints in digitization workflows.
    alt_descriptions:
      nl: Categorie voor opnamekwaliteit, metadata-volledigheid en gebruiksbeperkingen bij digitalisering.
      de: Kategorie fuer Erfassungsqualitaet, Metadatenvollstaendigkeit und Nutzungsauflagen in Digitalisierungsablaeufen.
      fr: Categorie pour la qualite de capture, l'exhaustivite des metadonnees et les contraintes d'usage en numerisation.
      es: Categoria para calidad de captura, completitud de metadatos y restricciones de uso en digitalizacion.
      ar: فئة لمتطلبات جودة الالتقاط واكتمال البيانات الوصفية وقيود الاستخدام في الرقمنة.
      id: Kategori untuk kualitas tangkapan, kelengkapan metadata, dan batasan penggunaan dalam alur digitalisasi.
      zh: 用于数字化流程中采集质量、元数据完整性与衍生使用限制的类别。
    structured_aliases:
      - literal_form: digitaliseringsvoorwaarde
        in_language: nl
      - literal_form: Digitalisierungsauflage
        in_language: de
      - literal_form: condition de numerisation
        in_language: fr
      - literal_form: condicion de digitalizacion
        in_language: es
      - literal_form: شرط الرقمنة
        in_language: ar
      - literal_form: ketentuan digitalisasi
        in_language: id
      - literal_form: 数字化条件
        in_language: zh
    keywords:
      - digitization condition
      - capture quality
      - metadata requirements
      - scanning requirements
      - digital surrogate
    broad_mappings:
      - skos:Concept
