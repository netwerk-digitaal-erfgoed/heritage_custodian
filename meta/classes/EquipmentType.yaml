id: https://nde.nl/ontology/hc/class/EquipmentType
name: EquipmentType
title: Equipment Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_label
classes:
  EquipmentType:
    class_uri: hc:EquipmentType
    description: >-
      Controlled category used to classify apparatus by operational function or
      technical role.
    alt_descriptions:
      nl: Gecontroleerde categorie voor classificatie van apparaten op basis van functie of technische rol.
      de: Kontrollierte Kategorie zur Klassifikation von Geraeten nach Funktion oder technischer Rolle.
      fr: Categorie controlee utilisee pour classer les equipements selon leur fonction ou role technique.
      es: Categoria controlada para clasificar equipos por funcion operativa o rol tecnico.
      ar: فئة مضبوطة لتصنيف الأجهزة حسب الوظيفة التشغيلية أو الدور التقني.
      id: Kategori terkendali untuk mengklasifikasikan peralatan berdasarkan fungsi operasional atau peran teknis.
      zh: 按运行功能或技术角色对设备进行分类的受控类别。
    structured_aliases:
      - literal_form: uitrustingstype
        in_language: nl
      - literal_form: Ausruestungstyp
        in_language: de
      - literal_form: type d'equipement
        in_language: fr
      - literal_form: tipo de equipo
        in_language: es
      - literal_form: نوع المعدات
        in_language: ar
      - literal_form: tipe peralatan
        in_language: id
      - literal_form: 设备类型
        in_language: zh
    slots:
      - has_label
      - identified_by
    broad_mappings:
      - skos:Concept
    close_mappings:
      - schema:DefinedTerm
    annotations:
      custodian_types: '["*"]'
      specificity_score: "0.35"
      specificity_rationale: Functional taxonomy class for equipment categorization.
