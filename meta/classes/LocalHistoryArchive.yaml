id: https://w3id.org/nde/ontology/LocalHistoryArchive
name: LocalHistoryArchive
title: Local History Archive Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_type
- ../slots/hold_record_set
- ../slots/has_score
classes:
  LocalHistoryArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Institution preserving documentary evidence of community heritage, municipal
      development, and regional cultural traditions.
    alt_descriptions:
      nl: >-
        Instelling die documentair bewijs van gemeentelijk erfgoed, stedelijke ontwikkeling
        en regionale culturele tradities bewaart.
      de: >-
        Institution, die dokumentarische Belege kommunalen Erbes, städtischer Entwicklung
        und regionaler kultureller Traditionen bewahrt.
      fr: >-
        Institution préservant les preuves documentaires du patrimoine communautaire, du
        développement municipal et des traditions culturelles régionales.
      es: >-
        Institución que preserva evidencia documental del patrimonio comunitario, desarrollo
        municipal y tradiciones culturales regionales.
      ar: >-
        مؤسسة تحافظ على الأدلة الوثائقية للتراث المجتمعي والتنمية البلدية والتقاليد الثقافية الإقليمية.
      id: >-
        Institusi yang melestarikan bukti dokumenter warisan komunitas, pembangunan kota,
        dan tradisi budaya regional.
      zh: >-
        保存社区遗产、城市发展和区域文化传统的文献证据的机构。
    broad_mappings:
    - schema:ArchiveOrganization
    - wd:Q166118
    slots:
    - identified_by
    - has_type
    - hold_record_set
    - has_score
    annotations:
      subject_domain: local history
      specificity_score: 0.6
      specificity_rationale: Archive organization type scoped to place-based historical memory stewardship.
      custodian_types: '["*"]'
    comments:
    - 'Preserved from prior description: Archive organization focused on preserving records and documentation of local community history.'
