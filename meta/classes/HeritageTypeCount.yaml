id: https://nde.nl/ontology/hc/class/HeritageTypeCount
name: HeritageTypeCount
title: Heritage Type Count
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ./HeritageTypeCode
  - ../slots/has_quantity
  - ../slots/has_score
  - ../slots/has_code
classes:
  HeritageTypeCount:
    class_uri: hc:HeritageTypeCount
    description: >-
      Quantified tally associating a heritage classification code with the
      number of matching entities in a given analytical context.
    alt_descriptions:
      nl: >-
        Gekwantificeerde telling die een erfgoedclassificatiecode koppelt aan het aantal
        overeenkomende entiteiten in een bepaalde analytische context.
      de: >-
        Quantifizierte Zählung, die einen Kulturerbe-Klassifikationscode mit der Anzahl
        übereinstimmender Entitäten in einem bestimmten Analysekontext verknüpft.
      fr: >-
        Comptage quantifié associant un code de classification patrimoniale au nombre
        d'entités correspondantes dans un contexte analytique donné.
      es: >-
        Recuento cuantificado que asocia un código de clasificación patrimonial con el
        número de entidades coincidentes en un contexto analítico dado.
      ar: >-
        تعداد كمي يربط رمز تصنيف التراث بعدد الكيانات المطابقة في سياق تحليلي معين.
      id: >-
        Tally terkuantifikasi yang mengaitkan kode klasifikasi warisan dengan jumlah
        entitas yang cocok dalam konteks analitik tertentu.
      zh: >-
        将遗产分类代码与给定分析上下文中的匹配实体数量关联的量化计数。
    slots:
      - has_code
      - has_quantity
      - has_score
    slot_usage:
      has_code:
        range: HeritageTypeCode
        required: true
      has_quantity:
        range: integer
        required: true
    broad_mappings:
      - schema:PropertyValue
