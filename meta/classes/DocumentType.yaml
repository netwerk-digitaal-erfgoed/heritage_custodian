id: https://nde.nl/ontology/hc/class/DocumentType
name: DocumentType
title: Document Type Class
description: Abstract base class for document types. MIGRATED from document_type string (2026-01-26).
prefixes:
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  DocumentType:
    class_uri: crm:E55_Type
    abstract: true
    description: >-
      Abstract taxonomy node for categorizing documentary resource forms and
      material manifestations in archival and bibliographic contexts.
    alt_descriptions:
      nl: >-
        Abstract taxonomieknooppunt voor het categoriseren van documentvormen
        en materiële manifestaties in archief- en bibliografische contexten.
      de: >-
        Abstrakter Taxonomieknoten zur Kategorisierung von Dokumentformen
        und materiellen Manifestationen in archivischen und bibliografischen Kontexten.
      fr: >-
        Nœud taxonomique abstrait pour catégoriser les formes documentaires
        et les manifestations matérielles dans les contextes archivistiques et bibliographiques.
      es: >-
        Nodo taxonómico abstracto para categorizar formas documentales
        y manifestaciones materiales en contextos archivísticos y bibliográficos.
      ar: >-
        عقدة تصنيفية مجردة لتصنيف أشكال الوثائق
        والتجليات المادية في السياقات الأرشيفية والببليوغرافية.
      id: >-
        Simpul taksonomi abstrak untuk mengkategorikan bentuk dokumen
        dan manifestasi material dalam konteks arsip dan bibliografi.
      zh: >-
        用于分类档案和书目语境中文献形式和物质表现的抽象分类节点。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
    - schema:DefinedTerm
    slots:
    - has_label
    - has_description
    structured_aliases:
    - literal_form: documenttype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Dokumenttyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de document
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de documento
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع الوثيقة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: jenis dokumen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 文献类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Abstract base class - use concrete subclasses for specific document forms
    - Supports archival and bibliographic classification hierarchies
    - 'Preserved from prior description: Abstract taxonomy node for categorizing documentary resource kinds.'
    keywords:
    - document classification
    - material form
    - archival category
    - bibliographic type
    examples:
    - value:
        has_label: Manuscript
        has_description: Handwritten or typed unpublished document
      description: A concrete document type subclass
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
