classes:
  ExhibitionCatalog:
    class_uri: schema:Book
    description: >-
      Scholarly publication documenting displayed works, curatorial essays, and contextual information for a curated presentation.
    alt_descriptions:
      nl: >-
        Wetenschappelijke publicatie die tentoongestelde werken, curatoriale essays en contextuele informatie voor een gecureerde presentatie documenteert.
      de: >-
        Wissenschaftliche Publikation, die ausgestellte Werke, kuratorische Essays und Kontextinformationen für eine kuratierte Präsentation dokumentiert.
      fr: >-
        Publication savante documentant les œuvres exposées, les essais curatoriaux et les informations contextuelles d'une présentation curatée.
      es: >-
        Publicación académica que documenta obras expuestas, ensayos curatoriales e información contextual para una presentación curada.
      ar: >-
        منشور علمي يوثق الأعمال المعروضة والمقالات التنظيمية والمعلومات السياقية لعرض منسق.
      id: >-
        Publikasi ilmiah yang mendokumentasikan karya yang dipamerkan, esai kuratorial, dan informasi kontekstual untuk presentasi terkurasi.
      zh: >-
        记录策展展示的展品、策展论文和背景信息的学术出版物。
