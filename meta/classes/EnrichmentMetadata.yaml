id: https://nde.nl/ontology/hc/class/EnrichmentMetadata
name: EnrichmentMetadata
title: Enrichment Metadata Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#

default_prefix: hc

imports:
- linkml:types
- ../metadata
- ../slots/has_description
- ../slots/has_method
- ../slots/temporal_extent
classes:
  EnrichmentMetadata:
    class_uri: prov:Activity
    description: >-
      Process-level metadata that documents how enrichment was performed,
      including method and time span.
    alt_descriptions:
      nl: Procesmetadata die vastlegt hoe verrijking is uitgevoerd inclusief methode en tijdsduur.
      de: Prozessmetadaten zur Dokumentation der Durchfuehrung von Anreicherung inklusive Methode und Zeitspanne.
      fr: Metadonnees de processus documentant la facon dont l enrichissement a ete realise avec methode et periode.
      es: Metadatos de proceso que documentan como se realizo el enriquecimiento incluyendo metodo y periodo temporal.
      ar: بيانات وصفية على مستوى العملية توثق كيفية تنفيذ الإثراء بما في ذلك الطريقة والفترة الزمنية.
      id: Metadata tingkat proses yang mendokumentasikan bagaimana pengayaan dilakukan termasuk metode dan rentang waktu.
      zh: 记录富化过程如何执行的过程级元数据，包括方法与时间范围。
    structured_aliases:
    - {literal_form: verrijkingsmetadata, in_language: nl}
    - {literal_form: Anreicherungsmetadaten, in_language: de}
    - {literal_form: metadonnees d enrichissement, in_language: fr}
    - {literal_form: metadatos de enriquecimiento, in_language: es}
    - {literal_form: بيانات إثراء وصفية, in_language: ar}
    - {literal_form: metadata pengayaan, in_language: id}
    - {literal_form: 富化元数据, in_language: zh}
    broad_mappings:
    - prov:Activity
    close_mappings:
    - schema:Action

    slots:
    - has_description
    - has_method
    - temporal_extent

    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.2
      specificity_rationale: Provenance metadata.
