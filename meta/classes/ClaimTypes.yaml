id: https://nde.nl/ontology/hc/class/ClaimTypes
name: ClaimTypes
title: ClaimTypes - Concrete claim type subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- ./ClaimType
- linkml:types
default_prefix: hc
classes:
  IdentityClaim:
    is_a: ClaimType
    class_uri: hc:IdentityClaim
    description: 'Claim types for organization identity information.

      Includes names, descriptions, and identity verification claims.

      '
    alt_descriptions:
      nl: >-
        Claimtypen voor identiteitsinformatie van een organisatie.
        Bevat naam-, beschrijvings- en identiteitsverificatieclaims.
      de: >-
        Claimtypen fuer Identitaetsinformationen einer Organisation.
        Umfasst Namens-, Beschreibungs- und Identitaetsverifikations-Claims.
      fr: >-
        Types de revendications pour les informations d'identite d'une organisation.
        Inclut des revendications de nom, de description et de verification d'identite.
      es: >-
        Tipos de reclamaciones para la informacion de identidad de una organizacion.
        Incluye reclamaciones de nombre, descripcion y verificacion de identidad.
      ar: >-
        انواع المطالبات لمعلومات هوية المنظمة.
        تشمل مطالبات الاسم والوصف والتحقق من الهوية.
      id: >-
        Jenis klaim untuk informasi identitas organisasi.
        Mencakup klaim nama, deskripsi, dan verifikasi identitas.
      zh: >-
        用于组织身份信息的声明类型。
        包括名称、描述以及身份验证类声明。
    comments:
    - 'Expected locations: <title>, <h1>, logo, meta tags, about sections'
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
  FullNameClaim:
    is_a: IdentityClaim
    class_uri: hc:FullNameClaim
    description: 'Official full name of the organization.

      Expected in: <title>, <h1>, logo text, meta og:title

      '
    alt_descriptions:
      nl: >-
        Officiele volledige naam van de organisatie.
        Verwacht in: <title>, <h1>, logotekst, meta og:title.
      de: >-
        Offizieller vollstaendiger Name der Organisation.
        Erwartet in: <title>, <h1>, Logotext, meta og:title.
      fr: >-
        Nom officiel complet de l'organisation.
        Attendu dans : <title>, <h1>, texte du logo, meta og:title.
      es: >-
        Nombre oficial completo de la organizacion.
        Esperado en: <title>, <h1>, texto del logo, meta og:title.
      ar: >-
        الاسم الرسمي الكامل للمنظمة.
        متوقع في: <title> و <h1> ونص الشعار و meta og:title.
      id: >-
        Nama resmi lengkap organisasi.
        Diharapkan pada: <title>, <h1>, teks logo, meta og:title.
      zh: >-
        组织的官方全称。
        常见位置：<title>、<h1>、logo 文本、meta og:title。
    broad_mappings:
    - skos:Concept
  ShortNameClaim:
    is_a: IdentityClaim
    class_uri: hc:ShortNameClaim
    description: 'Abbreviated or short name of the organization.

      Expected in: <h1>, logo, header

      '
    alt_descriptions:
      nl: >-
        Afgekorte of korte naam van de organisatie.
        Verwacht in: <h1>, logo, header.
      de: >-
        Abgekuerzter oder kurzer Name der Organisation.
        Erwartet in: <h1>, Logo, Header.
      fr: >-
        Nom abrege ou nom court de l'organisation.
        Attendu dans : <h1>, logo, en-tete.
      es: >-
        Nombre abreviado o corto de la organizacion.
        Esperado en: <h1>, logo, encabezado.
      ar: >-
        الاسم المختصر او القصير للمنظمة.
        متوقع في: <h1> والشعار والترويسة.
      id: >-
        Nama singkat atau singkatan organisasi.
        Diharapkan pada: <h1>, logo, header.
      zh: >-
        组织的简称或缩写名称。
        常见位置：<h1>、logo、页眉。
    broad_mappings:
    - skos:Concept
  DescriptionClaim:
    is_a: IdentityClaim
    class_uri: hc:DescriptionClaim
    description: 'Description or about text for the organization.

      Expected in: <meta name=''description''>, about section

      '
    alt_descriptions:
      nl: >-
        Beschrijving of "over"-tekst van de organisatie.
        Verwacht in: <meta name='description'>, over-sectie.
      de: >-
        Beschreibung oder "Ueber"-Text der Organisation.
        Erwartet in: <meta name='description'>, Ueber-uns-Bereich.
      fr: >-
        Description ou texte "a propos" de l'organisation.
        Attendu dans : <meta name='description'>, section a propos.
      es: >-
        Descripcion o texto "acerca de" de la organizacion.
        Esperado en: <meta name='description'>, seccion acerca de.
      ar: >-
        نص الوصف او "حول" للمنظمة.
        متوقع في: <meta name='description'> وقسم حول.
      id: >-
        Deskripsi atau teks "tentang" untuk organisasi.
        Diharapkan pada: <meta name='description'>, bagian tentang.
      zh: >-
        组织的简介或“关于”文本。
        常见位置：<meta name='description'>、关于页面/板块。
    broad_mappings:
    - skos:Concept
  LegalNameClaim:
    is_a: IdentityClaim
    class_uri: hc:LegalNameClaim
    description: 'Full legal/registered name of the organization.

      May differ from display name.

      '
    alt_descriptions:
      nl: >-
        Volledige wettelijke/geregistreerde naam van de organisatie.
        Kan verschillen van de weergavenaam.
      de: >-
        Vollstaendiger rechtlicher/registrierter Name der Organisation.
        Kann vom Anzeigenamen abweichen.
      fr: >-
        Nom legal/enregistre complet de l'organisation.
        Peut differer du nom affiche.
      es: >-
        Nombre legal/registrado completo de la organizacion.
        Puede diferir del nombre mostrado.
      ar: >-
        الاسم القانوني/المسجل الكامل للمنظمة.
        قد يختلف عن الاسم المعروض.
      id: >-
        Nama legal/terdaftar lengkap organisasi.
        Dapat berbeda dari nama tampilan.
      zh: >-
        组织的法定/注册全称。
        可能与展示名称不同。
    broad_mappings:
    - skos:Concept
  CustodianNameClaim:
    is_a: IdentityClaim
    class_uri: hc:CustodianNameClaim
    description: 'Official custodian name.

      May differ from display name in heritage context.

      '
    alt_descriptions:
      nl: >-
        Officiele naam van de beheerder/custodian.
        Kan in erfgoedcontext afwijken van de weergavenaam.
      de: >-
        Offizieller Name des Custodians.
        Kann im Kulturerbekontext vom Anzeigenamen abweichen.
      fr: >-
        Nom officiel du depositaire (custodian).
        Peut differer du nom affiche dans un contexte patrimonial.
      es: >-
        Nombre oficial del custodio.
        Puede diferir del nombre mostrado en contexto patrimonial.
      ar: >-
        الاسم الرسمي للجهة الحاضنة/المشرفة.
        قد يختلف عن الاسم المعروض في سياق التراث.
      id: >-
        Nama resmi kustodian.
        Dapat berbeda dari nama tampilan dalam konteks warisan.
      zh: >-
        馆藏/保管机构（custodian）的官方名称。
        在遗产语境下可能与展示名称不同。
    broad_mappings:
    - skos:Concept
  NameVerifiedClaim:
    is_a: IdentityClaim
    class_uri: hc:NameVerifiedClaim
    description: 'Flag indicating name has been verified against authoritative source.

      '
    alt_descriptions:
      nl: >-
        Vlag die aangeeft dat de naam is geverifieerd tegen een gezaghebbende bron.
      de: >-
        Kennzeichen, das angibt, dass der Name gegen eine autoritative Quelle verifiziert wurde.
      fr: >-
        Indicateur signalant que le nom a ete verifie a partir d'une source faisant autorite.
      es: >-
        Indicador de que el nombre ha sido verificado contra una fuente autorizada.
      ar: >-
        مؤشر يدل على ان الاسم تم التحقق منه مقابل مصدر موثوق.
      id: >-
        Penanda bahwa nama telah diverifikasi terhadap sumber otoritatif.
      zh: >-
        表示名称已对照权威来源完成核验的标志。
    broad_mappings:
    - skos:Concept
  ContactClaim:
    is_a: ClaimType
    class_uri: hc:ContactClaim
    description: 'Claim types for contact information.

      Includes email, phone, and general contact methods.

      '
    alt_descriptions:
      nl: >-
        Claimtypen voor contactinformatie.
        Bevat e-mail, telefoon en algemene contactmethoden.
      de: >-
        Claimtypen fuer Kontaktinformationen.
        Umfasst E-Mail, Telefon und allgemeine Kontaktwege.
      fr: >-
        Types de revendications pour les informations de contact.
        Inclut email, telephone et moyens de contact generaux.
      es: >-
        Tipos de reclamaciones para informacion de contacto.
        Incluye correo electronico, telefono y metodos de contacto generales.
      ar: >-
        انواع المطالبات لمعلومات الاتصال.
        تشمل البريد الالكتروني والهاتف وطرق الاتصال العامة.
      id: >-
        Jenis klaim untuk informasi kontak.
        Mencakup email, telepon, dan metode kontak umum.
      zh: >-
        用于联系信息的声明类型。
        包括电子邮件、电话以及通用联系方式。
    comments:
    - 'Expected locations: contact page, footer, structured data'
    broad_mappings:
    - skos:Concept
  EmailClaim:
    is_a: ContactClaim
    class_uri: hc:EmailClaim
    description: 'Contact email address.

      Expected in: <a href=''mailto:...''>, contact page, footer

      '
    alt_descriptions:
      nl: >-
        Contact-e-mailadres.
        Verwacht in: <a href='mailto:...'>, contactpagina, footer.
      de: >-
        Kontakt-E-Mail-Adresse.
        Erwartet in: <a href='mailto:...'>, Kontaktseite, Footer.
      fr: >-
        Adresse email de contact.
        Attendue dans : <a href='mailto:...'>, page contact, pied de page.
      es: >-
        Direccion de correo electronico de contacto.
        Esperada en: <a href='mailto:...'>, pagina de contacto, pie de pagina.
      ar: >-
        عنوان البريد الالكتروني للتواصل.
        متوقع في: <a href='mailto:...'> وصفحة الاتصال والتذييل.
      id: >-
        Alamat email kontak.
        Diharapkan pada: <a href='mailto:...'>, halaman kontak, footer.
      zh: >-
        联系邮箱地址。
        常见位置：<a href='mailto:...'>、联系页面、页脚。
    broad_mappings:
    - skos:Concept
  PhoneClaim:
    is_a: ContactClaim
    class_uri: hc:PhoneClaim
    description: 'Contact phone number.

      Expected in: <a href=''tel:...''>, contact page, footer

      '
    alt_descriptions:
      nl: >-
        Contacttelefoonnummer.
        Verwacht in: <a href='tel:...'>, contactpagina, footer.
      de: >-
        Kontakttelefonnummer.
        Erwartet in: <a href='tel:...'>, Kontaktseite, Footer.
      fr: >-
        Numero de telephone de contact.
        Attendu dans : <a href='tel:...'>, page contact, pied de page.
      es: >-
        Numero de telefono de contacto.
        Esperado en: <a href='tel:...'>, pagina de contacto, pie de pagina.
      ar: >-
        رقم هاتف للتواصل.
        متوقع في: <a href='tel:...'> وصفحة الاتصال والتذييل.
      id: >-
        Nomor telepon kontak.
        Diharapkan pada: <a href='tel:...'>, halaman kontak, footer.
      zh: >-
        联系电话号码。
        常见位置：<a href='tel:...'>、联系页面、页脚。
    broad_mappings:
    - skos:Concept
  AddressClaim:
    is_a: ContactClaim
    class_uri: hc:AddressClaim
    description: 'Physical address (complete).

      Expected in: contact page, footer, structured data

      '
    alt_descriptions:
      nl: >-
        Fysiek adres (volledig).
        Verwacht in: contactpagina, footer, structured data.
      de: >-
        Physische Adresse (vollstaendig).
        Erwartet in: Kontaktseite, Footer, strukturierte Daten.
      fr: >-
        Adresse postale (complete).
        Attendue dans : page contact, pied de page, donnees structurees.
      es: >-
        Direccion fisica (completa).
        Esperada en: pagina de contacto, pie de pagina, datos estructurados.
      ar: >-
        العنوان الفعلي (كامل).
        متوقع في: صفحة الاتصال والتذييل والبيانات المنظمة.
      id: >-
        Alamat fisik (lengkap).
        Diharapkan pada: halaman kontak, footer, data terstruktur.
      zh: >-
        实体地址（完整）。
        常见位置：联系页面、页脚、结构化数据。
    broad_mappings:
    - skos:Concept
  WebsiteClaim:
    is_a: ContactClaim
    class_uri: hc:WebsiteClaim
    description: 'Website URL (may differ from source_url).

      Expected in: contact page, links

      '
    alt_descriptions:
      nl: >-
        Website-URL (kan verschillen van source_url).
        Verwacht in: contactpagina, links.
      de: >-
        Website-URL (kann von source_url abweichen).
        Erwartet in: Kontaktseite, Links.
      fr: >-
        URL du site web (peut differer de source_url).
        Attendue dans : page contact, liens.
      es: >-
        URL del sitio web (puede diferir de source_url).
        Esperada en: pagina de contacto, enlaces.
      ar: >-
        رابط الموقع (قد يختلف عن source_url).
        متوقع في: صفحة الاتصال والروابط.
      id: >-
        URL situs web (dapat berbeda dari source_url).
        Diharapkan pada: halaman kontak, tautan.
      zh: >-
        网站 URL（可能与 source_url 不同）。
        常见位置：联系页面、链接列表。
    broad_mappings:
    - skos:Concept
  SocialMediaClaim:
    is_a: ClaimType
    class_uri: hc:SocialMediaClaim
    description: 'General social media profile links.

      Used when platform is not specified or for aggregate.

      '
    alt_descriptions:
      nl: >-
        Algemene links naar socialmediaprofielen.
        Gebruikt wanneer het platform niet is gespecificeerd of voor aggregatie.
      de: >-
        Allgemeine Links zu Social-Media-Profilen.
        Verwendet, wenn die Plattform nicht angegeben ist oder fuer Aggregation.
      fr: >-
        Liens generaux vers des profils sur les reseaux sociaux.
        Utilise lorsque la plateforme n'est pas specifiee ou pour l'agregation.
      es: >-
        Enlaces generales a perfiles de redes sociales.
        Se usa cuando la plataforma no se especifica o para agregacion.
      ar: >-
        روابط عامة لملفات وسائل التواصل الاجتماعي.
        تستخدم عندما لا يتم تحديد المنصة او للتجميع.
      id: >-
        Tautan umum profil media sosial.
        Digunakan saat platform tidak ditentukan atau untuk agregasi.
      zh: >-
        通用社交媒体账号链接声明。
        用于未指定平台或用于聚合的情况。
    broad_mappings:
    - skos:Concept
  FacebookClaim:
    is_a: SocialMediaClaim
    class_uri: hc:FacebookClaim
    description: Facebook page URL.
    alt_descriptions:
      nl: Facebook-pagina-URL.
      de: URL der Facebook-Seite.
      fr: URL de la page Facebook.
      es: URL de la pagina de Facebook.
      ar: رابط صفحة فيسبوك.
      id: URL halaman Facebook.
      zh: Facebook 页面 URL。
    broad_mappings:
    - skos:Concept
  TwitterClaim:
    is_a: SocialMediaClaim
    class_uri: hc:TwitterClaim
    description: Twitter/X profile URL.
    alt_descriptions:
      nl: Twitter/X-profiel-URL.
      de: URL des Twitter/X-Profils.
      fr: URL du profil Twitter/X.
      es: URL del perfil de Twitter/X.
      ar: رابط ملف تويتر/اكس.
      id: URL profil Twitter/X.
      zh: Twitter/X 账号 URL。
    broad_mappings:
    - skos:Concept
  InstagramClaim:
    is_a: SocialMediaClaim
    class_uri: hc:InstagramClaim
    description: Instagram profile URL.
    alt_descriptions:
      nl: Instagram-profiel-URL.
      de: URL des Instagram-Profils.
      fr: URL du profil Instagram.
      es: URL del perfil de Instagram.
      ar: رابط ملف انستغرام.
      id: URL profil Instagram.
      zh: Instagram 账号 URL。
    broad_mappings:
    - skos:Concept
  LinkedInClaim:
    is_a: SocialMediaClaim
    class_uri: hc:LinkedInClaim
    description: LinkedIn page URL.
    alt_descriptions:
      nl: LinkedIn-pagina-URL.
      de: URL der LinkedIn-Seite.
      fr: URL de la page LinkedIn.
      es: URL de la pagina de LinkedIn.
      ar: رابط صفحة لينكدان.
      id: URL halaman LinkedIn.
      zh: LinkedIn 页面 URL。
    broad_mappings:
    - skos:Concept
  YouTubeClaim:
    is_a: SocialMediaClaim
    class_uri: hc:YouTubeClaim
    description: YouTube channel URL.
    alt_descriptions:
      nl: YouTube-kanaal-URL.
      de: URL des YouTube-Kanals.
      fr: URL de la chaine YouTube.
      es: URL del canal de YouTube.
      ar: رابط قناة يوتيوب.
      id: URL kanal YouTube.
      zh: YouTube 频道 URL。
    broad_mappings:
    - skos:Concept
  MediaClaim:
    is_a: ClaimType
    class_uri: hc:MediaClaim
    description: 'Claim types for media assets.

      Includes logos, favicons, and social sharing images.

      '
    alt_descriptions:
      nl: >-
        Claimtypen voor media-assets.
        Bevat logo's, favicons en social sharing-afbeeldingen.
      de: >-
        Claimtypen fuer Medienassets.
        Umfasst Logos, Favicons und Social-Sharing-Bilder.
      fr: >-
        Types de revendications pour les ressources media.
        Inclut les logos, les favicons et les images de partage social.
      es: >-
        Tipos de reclamaciones para recursos multimedia.
        Incluye logotipos, favicons e imagenes para compartir en redes.
      ar: >-
        انواع المطالبات لاصول الوسائط.
        تشمل الشعارات والايقونات المفضلة وصور المشاركة الاجتماعية.
      id: >-
        Jenis klaim untuk aset media.
        Mencakup logo, favicon, dan gambar berbagi sosial.
      zh: >-
        用于媒体资源的声明类型。
        包括 logo、favicon 以及社交分享图片。
    comments:
    - 'Expected locations: header, <link> tags, meta og: tags'
    broad_mappings:
    - skos:Concept
  LogoUrlClaim:
    is_a: MediaClaim
    class_uri: hc:LogoUrlClaim
    description: 'Organization logo image URL.

      Expected in: <img> in header/nav, og:image meta tag.

      Look for: logo, brand, emblem, icon in class/id/alt attributes.

      Priority: SVG > PNG > JPG for quality.

      '
    alt_descriptions:
      nl: >-
        URL van een logo-afbeelding van de organisatie.
        Verwacht in: <img> in header/nav, og:image meta tag.
        Let op: logo, brand, emblem, icon in class/id/alt-attributen.
        Voorkeur: SVG > PNG > JPG.
      de: >-
        URL eines Logo-Bildes der Organisation.
        Erwartet in: <img> im Header/Nav, og:image-Meta-Tag.
        Suche nach: logo, brand, emblem, icon in class/id/alt-Attributen.
        Prioritaet: SVG > PNG > JPG.
      fr: >-
        URL de l'image du logo de l'organisation.
        Attendu dans : <img> dans l'en-tete/navigation, meta og:image.
        Rechercher : logo, brand, emblem, icon dans les attributs class/id/alt.
        Priorite : SVG > PNG > JPG.
      es: >-
        URL de la imagen del logotipo de la organizacion.
        Esperado en: <img> en encabezado/nav, meta og:image.
        Buscar: logo, brand, emblem, icon en atributos class/id/alt.
        Prioridad: SVG > PNG > JPG.
      ar: >-
        رابط صورة شعار المنظمة.
        متوقع في: <img> في الترويسة/التنقل، ووسم meta og:image.
        ابحث عن: logo و brand و emblem و icon في سمات class/id/alt.
        الاولوية: SVG ثم PNG ثم JPG.
      id: >-
        URL gambar logo organisasi.
        Diharapkan pada: <img> di header/nav, meta og:image.
        Cari: logo, brand, emblem, icon pada atribut class/id/alt.
        Prioritas: SVG > PNG > JPG.
      zh: >-
        组织 logo 图片的 URL。
        常见位置：header/nav 中的 <img>、meta og:image。
        可查找：class/id/alt 属性中的 logo、brand、emblem、icon。
        优先级：SVG > PNG > JPG。
    broad_mappings:
    - skos:Concept
  FaviconUrlClaim:
    is_a: MediaClaim
    class_uri: hc:FaviconUrlClaim
    description: 'Website favicon URL.

      Expected in: <link rel=''icon''>, <link rel=''shortcut icon''>.

      Usually: /favicon.ico, /favicon.png

      '
    alt_descriptions:
      nl: >-
        URL van de website-favicon.
        Verwacht in: <link rel='icon'>, <link rel='shortcut icon'>.
        Meestal: /favicon.ico, /favicon.png.
      de: >-
        URL des Website-Favicons.
        Erwartet in: <link rel='icon'>, <link rel='shortcut icon'>.
        Ueblich: /favicon.ico, /favicon.png.
      fr: >-
        URL du favicon du site.
        Attendu dans : <link rel='icon'>, <link rel='shortcut icon'>.
        Souvent : /favicon.ico, /favicon.png.
      es: >-
        URL del favicon del sitio web.
        Esperado en: <link rel='icon'>, <link rel='shortcut icon'>.
        Usualmente: /favicon.ico, /favicon.png.
      ar: >-
        رابط ايقونة الموقع (favicon).
        متوقع في: <link rel='icon'> و <link rel='shortcut icon'>.
        عادة: /favicon.ico و /favicon.png.
      id: >-
        URL favicon situs web.
        Diharapkan pada: <link rel='icon'>, <link rel='shortcut icon'>.
        Biasanya: /favicon.ico, /favicon.png.
      zh: >-
        网站 favicon 的 URL。
        常见位置：<link rel='icon'>、<link rel='shortcut icon'>。
        常见路径：/favicon.ico、/favicon.png。
    broad_mappings:
    - skos:Concept
  OgImageUrlClaim:
    is_a: MediaClaim
    class_uri: hc:OgImageUrlClaim
    description: 'Open Graph image URL (social sharing image).

