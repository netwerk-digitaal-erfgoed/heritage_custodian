id: https://nde.nl/ontology/hc/class/RecordSetType
name: RecordSetType
title: Record Set Type
description: Abstract base class for types of record sets (e.g., Series, Fonds, File). MIGRATED from filing_type slot per Rule 53. Follows RiC-O RecordSet type hierarchy.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
default_prefix: hc
classes:
  RecordSetType:
    class_uri: rico:RecordSetType
    abstract: true
    description: >-
      Abstract classification for categorizing archival aggregations such as fonds,
      series, or files according to their arrangement level or functional nature.
    alt_descriptions:
      nl: >-
        Abstracte classificatie voor het categoriseren van archiefaggregaties zoals archieven,
        series of dossiers volgens hun ordeningsniveau of functionele aard.
      de: >-
        Abstrakte Klassifikation zur Kategorisierung archivischer Aggregationen wie Bestände,
        Serien oder Akten nach ihrem Ordnungsniveau oder ihrer funktionalen Natur.
      fr: >-
        Classification abstraite pour catégoriser les agrégations archivistiques telles que fonds,
        séries ou dossiers selon leur niveau de classement ou leur nature fonctionnelle.
      es: >-
        Clasificación abstracta para categorizar agregaciones archivísticas como fondos,
        series o expedientes según su nivel de organización o naturaleza funcional.
      ar: >-
        تصنيف مجرد لتصنيف التجميعات الأرشيفية مثل الأرصدة
        أو السلاسل أو الملفات حسب مستوى ترتيبها أو طبيعتها الوظيفية.
      id: >-
        Klasifikasi abstrak untuk mengkategorikan agregasi arsip seperti fond,
        seri, atau berkas menurut tingkat pengaturan atau sifat fungsionalnya.
      zh: >-
        用于按排列级别或功能性质对档案聚合（如全宗、系列或案卷）进行分类的抽象分类。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    - rico:RecordSetType
    keywords:
    - record set type
    - archival arrangement
    - fonds
    - series
    structured_aliases:
    - literal_form: archiefbestandtype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Bestandstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de fonds
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de fondo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع المجموعة الأرشيفية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe fond
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 全宗类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Migrated from filing_type slot per Rule 53; follows RiC-O RecordSet type hierarchy
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
