id: https://nde.nl/ontology/hc/class/ClimateArchiveRecordSetType
name: ClimateArchiveRecordSetType
title: ClimateArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  ClimateArchiveRecordSetType:
    description: >-
      Taxonomic category for documentary aggregations maintained by repository
      institutions focused on historical atmospheric evidence.
    alt_descriptions:
      nl: Taxonomische categorie voor documentaire aggregaties die worden beheerd door instellingen gericht op historische atmosferische gegevens.
      de: Taxonomische Kategorie fuer dokumentarische Aggregationen, die von Einrichtungen mit Fokus auf historische Atmosphaerendaten verwaltet werden.
      fr: Categorie taxonomique pour des ensembles documentaires geres par des institutions axees sur les donnees atmospheriques historiques.
      es: Categoria taxonomica para agregaciones documentales mantenidas por instituciones centradas en evidencia atmosferica historica.
      ar: فئة تصنيفية لتجميعات وثائقية تديرها مؤسسات تركز على الأدلة الجوية التاريخية.
      id: Kategori taksonomi untuk agregasi dokumenter yang dikelola institusi berfokus pada bukti atmosfer historis.
      zh: 由关注历史大气证据的机构维护之文献聚合体的分类类型。
    structured_aliases:
    - literal_form: klimaatrecordsettype
      in_language: nl
    - literal_form: Klimaarchiv-Bestandsart
      in_language: de
    - literal_form: type de fonds d archives climatiques
      in_language: fr
    - literal_form: tipo de conjunto documental climatico
      in_language: es
    - literal_form: نوع مجموعة سجلات ارشيف مناخي
      in_language: ar
    - literal_form: jenis set catatan arsip iklim
      in_language: id
    - literal_form: 气候档案记录集类型
      in_language: zh
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - skos:Concept
    - rico:RecordSetType
    related_mappings:
    - wd:Q1676725
    keywords:
    - record set taxonomy
    - climate evidence archives
    - archival arrangement
    examples:
    - value:
        has_type: ClimateDataCollection
        has_score: 0.9
    comments:
    - Used for classifying documentary units, not archive organizations
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - ClimateArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
