id: https://nde.nl/ontology/hc/classes/WebCollection
name: WebCollection
title: WebCollection
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  dcmitype: http://purl.org/dc/dcmitype/
imports:
- linkml:types
# default_range: string
classes:
  WebCollection:
    description: >-
      Aggregation of items documented on an institution's online presence, such
      as oral-history recordings, photo holdings, or document sets.
    alt_descriptions:
      nl: Collectie gedocumenteerd op de website van een erfgoedinstelling.
      de: Sammlung.
      fr: Collection documentée sur le site web d'une institution patrimoniale.
      es: Colección documentada en el sitio web de una institución patrimonial.
      ar: مجموعة موثقة على موقع مؤسسة التراث.
      id: Koleksi yang didokumentasikan di situs web lembaga warisan budaya.
      zh: 在遗产机构网站上记录的藏品。
    structured_aliases:
    - literal_form: webcollectie
      in_language: nl
    - literal_form: Web-Sammlung
      in_language: de
    - literal_form: collection web
      in_language: fr
    - literal_form: colección web
      in_language: es
    - literal_form: مجموعة ويب
      in_language: ar
    - literal_form: koleksi web
      in_language: id
    - literal_form: 网络藏品
      in_language: zh
    comments:
    - Captures metadata including name, description, URL, type, and item count.
    - 'Preserved from prior description: Aggregation of items documented on a heritage institution website, such as oral history recordings, photograph archives, or document sets.'
    class_uri: dcmitype:Collection
    broad_mappings:
    - dcmitype:Collection
    close_mappings:
    - schema:Collection
    related_mappings:
    - prov:Entity
    - schema:CreativeWork
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_name
