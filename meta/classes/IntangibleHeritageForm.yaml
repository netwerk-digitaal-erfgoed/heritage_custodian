classes:
  IntangibleHeritageForm:
    is_a: HeritageForm
    class_uri: crm:E28_Conceptual_Object
    description: >-
      Recognized living cultural practice, tradition, or expression transmitted across generations within a community.
    alt_descriptions:
      nl: >-
        Erkende levende culturele praktijk, traditie of uitdrukking die over generaties binnen een gemeenschap wordt doorgegeven.
      de: >-
        Anerkannte lebendige kulturelle Praxis, Tradition oder Ausdrucksform, die über Generationen innerhalb einer Gemeinschaft weitergegeben wird.
      fr: >-
        Pratique culturelle vivante, tradition ou expression reconnue transmise entre générations au sein d'une communauté.
      es: >-
        Práctica cultural viviente, tradición o expresión reconocida transmitida entre generaciones dentro de una comunidad.
      ar: >-
        ممارسة ثقافية حية معترف بها أو تقليد أو تعبير يُنقل عبر الأجيال داخل مجتمع.
      id: >-
        Praktik budaya hidup, tradisi, atau ekspresi yang diakui dan ditransmisikan lintas generasi dalam komunitas.
      zh: >-
        在社区内代代相传的公认活态文化习俗、传统或表现形式。
