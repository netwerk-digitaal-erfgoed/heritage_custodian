      fr: Classe de base abstraite pour les sous-types d'institutions du patrimoine culinaire et olfactif.
      es: Clase base abstracta para subtipos de instituciones patrimoniales culinarias y olfativas.
      ar: فئة أساسية مجردة للأنواع الفرعية لمؤسسات التراث الذوقي والشمّي.
      id: Kelas dasar abstrak untuk subtipe lembaga warisan kuliner dan olfaktori.
      zh: 味觉与嗅觉遗产机构子类型的抽象基类。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    close_mappings:
