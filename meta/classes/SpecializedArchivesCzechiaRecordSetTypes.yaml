classes:
  CzechSpecializedFonds:
    is_a: SpecializedArchivesCzechiaRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation produced by Czech
      domain-specific archival institutions and specialist repositories.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die is gevormd door
        Tsjechische domeinspecifieke archiefinstellingen en specialistische depots.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen aus tschechischen
        fachspezifischen Archivinstitutionen und Spezialbestaenden.
      fr: >-
        Agregation fondee sur la provenance de documentation produite par des
        institutions archivistiques specialisees en Tchequie.
      es: >-
        Agregacion basada en procedencia de documentacion producida por
        instituciones archivisticas especializadas en Chequia.
      ar: >-
        تجميع قائم على المنشأ لوثائق أُنتجت بواسطة مؤسسات أرشيفية متخصصة
        في التشيك ومستودعات موضوعية.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan oleh
        institusi arsip khusus dan repositori spesialis di Ceko.
      zh: >-
        基于来源原则聚合捷克专业档案机构与专题保存库形成的文献。
    structured_aliases:
    - literal_form: fonds gespecialiseerd archief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Spezialarchiv-Fonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds d archive specialisee
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de archivo especializado
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: فوندس أرشيف متخصص
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds arsip khusus
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 专业档案全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: This class is intended for specialist-domain archival provenance in Czechia.
    - 'Preserved from prior description: Fonds-oriented record set type for Czech specialized archives.'
    keywords:
    - specialist repository
    - domain archive
    - Czechia archives
    - fonds provenance
    examples:
    - value:
        has_type: hc:CzechSpecializedFonds
        has_custodian: hc:SpecializedArchivesCzechia
        has_note: Thematic institutional files, specialist registers, and domain reports.
      description: Czech specialist-archive documentation grouped by originating institutional provenance.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - SpecializedArchivesCzechiaRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:CzechSpecializedFonds
      has_custodian:
        equals_string: hc:SpecializedArchivesCzechia
      has_note:
        equals_string: This RecordSetType is typically held by SpecializedArchivesCzechia custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
