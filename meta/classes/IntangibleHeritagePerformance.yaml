classes:
  IntangibleHeritagePerformance:
    class_uri: schema:PerformanceRole
    description: >-
      Individual enactment or demonstration of a living cultural tradition, practice, or performing art within a specific temporal and spatial context.
    alt_descriptions:
      nl: >-
        Individuele uitvoering of demonstratie van een levende culturele traditie, praktijk of podiumkunst binnen een specifieke temporele en ruimtelijke context.
      de: >-
        Individuelle Aufführung oder Demonstration einer lebendigen kulturellen Tradition, Praxis oder darstellenden Kunst in einem spezifischen zeitlichen und räumlichen Kontext.
      fr: >-
        Mise en œuvre ou démonstration individuelle d'une tradition culturelle vivante, pratique ou art du spectacle dans un contexte temporel et spatial spécifique.
      es: >-
        Representación o demostración individual de una tradición cultural viva, práctica o arte escénico dentro de un contexto temporal y espacial específico.
      ar: >-
        أداء فردي أو عرض لتقليد ثقافي حي أو ممارسة أو فن أدائي في سياق زماني ومكاني محدد.
      id: >-
        Penampilan atau demonstrasi individual dari tradisi budaya hidup, praktik, atau seni pertunjukan dalam konteks temporal dan spasial tertentu.
      zh: >-
        在特定时空背景下对活态文化传统、实践或表演艺术的个别演出或演示。
