id: https://nde.nl/ontology/hc/class/Species
name: Species
title: Species
description: >-
  A biological species.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/

default_prefix: hc

imports:
  - linkml:types
  - ../slots/has_label
classes:
  Species:
    class_uri: schema:Taxon
    description: >-
      Biological classification rank below genus, comprising organisms capable
      of interbreeding and producing fertile offspring.
    alt_descriptions:
      nl: >-
        Biologisch classificatieniveau onder geslacht, dat organismen omvat die in staat zijn
        tot kruisen en vruchtbare nakomelingen te produceren.
      de: >-
        Biologische Klassifikationsebene unterhalb der Gattung, die Organismen umfasst,
        die zur Kreuzung und zur Produktion fruchtbarer Nachkommen fähig sind.
      fr: >-
        Niveau de classification biologique inférieur au genre, comprenant des organismes
        capables de se croiser et de produire une descendance fertile.
      es: >-
        Nivel de clasificación biológica por debajo del género, que comprende organismos
        capaces de cruzarse y producir descendencia fértil.
      ar: >-
        مستوى تصنيف بيولوجي أدنى من الجنس، يضم كائنات حية قادرة
        على التهجين وإنتاج نسل خصب.
      id: >-
        Tingkat klasifikasi biologis di bawah genus, yang mencakup organisme
        yang mampu kawin silang dan menghasilkan keturunan yang subur.
      zh: >-
        属以下的生物分类级别，包括能够杂交并产生可育后代的生物。
    broad_mappings:
      - schema:Taxon
      - schema:Thing
    keywords:
      - species
      - biological classification
      - taxonomy
      - organism
    structured_aliases:
      - literal_form: soort
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Art
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: espèce
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: especie
        predicate: EXACT_SYNONYM
        in_language: es
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class created during migration
      custodian_types: '["*"]'
    slots:
      - has_label
