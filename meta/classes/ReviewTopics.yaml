id: https://nde.nl/ontology/hc/classes/ReviewTopics
name: ReviewTopics
title: ReviewTopics
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
  - linkml:types
default_prefix: hc
# default_range: string
classes:
  ReviewTopics:
    description: >-
      Dictionary structure mapping theme identifiers to their corresponding mention frequencies in user-generated feedback.
    alt_descriptions:
      nl: >-
        Woordenboekstructuur die thema-ID's toewijst aan hun bijbehorende vermeldingsfrequenties in door gebruikers gegenereerde feedback.
      de: >-
        Wörterbuchstruktur, die Themen-IDs ihren entsprechenden Erwähnungshäufigkeiten in benutzergeneriertem Feedback zuordnet.
      fr: >-
        Structure de dictionnaire mappant les identifiants de thèmes à leurs fréquences de mention correspondantes dans les commentaires générés par les utilisateurs.
      es: >-
        Estructura de diccionario que mapea identificadores de temas a sus frecuencias de mención correspondientes en comentarios generados por usuarios.
      ar: >-
        هيكل قاموس يعين معرفات الموضوعات لترددات ذكرها المقابلة في تعليقات المستخدمين.
      id: >-
        Struktur kamus yang memetakan pengidentifikasi tema ke frekuensi penyebutan yang sesuai dalam umpan balik yang dibuat pengguna.
      zh: >-
        将主题标识符映射到用户生成反馈中相应提及频率的字典结构。
    structured_aliases:

      - literal_form: Recensieonderwerpen

        predicate: EXACT_SYNONYM

        in_language: nl

      - literal_form: Bewertungsthemen

        predicate: EXACT_SYNONYM

        in_language: de

      - literal_form: Sujets d'avis

        predicate: EXACT_SYNONYM

        in_language: fr

      - literal_form: Temas de reseñas

        predicate: EXACT_SYNONYM

        in_language: es

      - literal_form: مواضيع المراجعات

        predicate: EXACT_SYNONYM

        in_language: ar

      - literal_form: Topik Ulasan

        predicate: EXACT_SYNONYM

        in_language: id

      - literal_form: 评论主题

        predicate: EXACT_SYNONYM

        in_language: zh
