id: https://nde.nl/ontology/hc/classes/WikidataIdentifiers
name: WikidataIdentifiers
title: Wikidata Identifiers Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
classes:
  WikidataIdentifiers:
    description: >-
      Keyed set of external authority codes resolved for one referenced entity.
    alt_descriptions:
      nl: >-
        Sleutel-waardeset van externe autoriteitscodes die voor één
        gerefereerde entiteit zijn opgelost.
      de: >-
        Schlüssel-Wert-Satz externer Normdatenkennungen, die für eine
        referenzierte Entität aufgelöst wurden.
      fr: >-
        Ensemble clé-valeur de codes d'autorité externes résolus pour une
        entité référencée.
      es: >-
        Conjunto clave-valor de códigos de autoridad externos resueltos para
        una entidad referenciada.
      ar: >-
        مجموعة مفاتيح-قيم لرموز سلطات خارجية تم حلها لكيان مُشار إليه.
      id: >-
        Set kunci-nilai kode otoritas eksternal yang telah diurai untuk satu
        entitas yang dirujuk.
      zh: >-
        为单个被引用实体解析得到的外部权威代码键值集合。
    broad_mappings:
    - linkml:Any
    slots: []
    comments:
    - Keys are identifier scheme names (isni, viaf, gnd, etc.)
    - Values are identifier strings from those schemes
    - 'Preserved from prior description: Keyed set of external authority identifiers resolved for one entity.'
    keywords:
    - wikidata
    - identifiers
    - external
    - isni
    - viaf
    - gnd
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for external identifier storage
      custodian_types: "['*']"
    structured_aliases:
    - literal_form: wikidata-identifiers
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Wikidata-Kennungen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: identifiants Wikidata
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: identificadores Wikidata
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: معرّفات ويكي بيانات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: pengidentifikasi Wikidata
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 维基数据外部标识
      predicate: EXACT_SYNONYM
      in_language: zh
