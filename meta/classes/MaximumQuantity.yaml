classes:
  MaximumQuantity:
    is_a: Quantity
    class_uri: qudt:Quantity
    description: >-
      Upper-bound numeric value defining the ceiling of a quantifiable constraint or permissible range.
    alt_descriptions:
      nl: >-
        Bovengrens numerieke waarde die het plafond van een kwantificeerbare beperking of toegestane reeks definieert.
      de: >-
        Obergrenzenwert, der die Decke einer quantifizierbaren Einschränkung oder eines zulässigen Bereichs definiert.
      fr: >-
        Valeur numérique de limite supérieure définissant le plafond d'une contrainte quantifiable ou d'une plage autorisée.
      es: >-
        Valor numérico de límite superior que define el techo de una restricción cuantificable o rango permitido.
      ar: >-
        قيمة عددية عليا تحدد سقف قيد كمي أو نطاق مسموح به.
      id: >-
        Nilai numerik batas atas yang menentukan langit-langkit kendala terkuantifikasi atau rentang yang diizinkan.
      zh: >-
        定义可量化约束或允许范围上限的上限数值。
