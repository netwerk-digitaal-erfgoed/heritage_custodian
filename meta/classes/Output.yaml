id: https://nde.nl/ontology/hc/class/Output
name: Output
title: Output
description: Output generated by a process or activity.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
