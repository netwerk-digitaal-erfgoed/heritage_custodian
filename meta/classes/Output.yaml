- ../slots/has_label
classes:
  Output:
    class_uri: prov:Entity
    description: >-
      Tangible or intangible product resulting from execution of a process, workflow, or operational activity.
    alt_descriptions:
      nl: >-
        Materieel of immaterieel product voortkomend uit de uitvoering van een proces, workflow of operationele activiteit.
      de: >-
        Materielles oder immaterielles Produkt, das aus der Ausführung eines Prozesses, Workflows oder einer operativen Tätigkeit entsteht.
      fr: >-
        Produit tangible ou intangible résultant de l'exécution d'un processus, d'un flux de travail ou d'une activité opérationnelle.
      es: >-
        Producto tangible o intangible resultante de la ejecución de un proceso, flujo de trabajo o actividad operativa.
      ar: >-
        منتج مادي أو غير مادي ناتج عن تنفيذ عملية أو سير عمل أو نشاط تشغيلي.
      id: >-
        Produk berwujud atau tidak berwujud yang dihasilkan dari pelaksanaan proses, alur kerja, atau aktivitas operasional.
      zh: >-
        执行过程、工作流或操作活动产生的有形或无形产品。
