    comments:
    - FundingOrganisation provides FINANCIAL RESOURCES, not governance or services
    - Relationship with custodians is transactional (grant-based)
    - Distinguished from UMBRELLA (no governance authority)
    - Distinguished from NETWORK (no ongoing services)
    - Use schema:funder property to link to funded custodians
    - Mapping specificity: schema:FundingAgency is broader than this domain-constrained funding-body subtype
    - 'Preserved from prior description: A grant-giving organization that provides FINANCIAL RESOURCES to heritage custodians through funding schemes, grants, and subsidies. Distinguished from other EncompassingBody types by the FINANCIAL relationship rather than governance, services, or collaboration. **Characteristics**: - **Financial support**: Provides grants, subsidies, funding to custodians - **Funding schemes**: Implements structured programs with application processes - **No governance**: Does NOT govern recipients (unlike UmbrellaOrganisation) - **No ongoing services**: Does NOT provide operational services (unlike NetworkOrganisation) - **Evaluation and monitoring**: Assesses applications, monitors outcomes - **Time-limited relationships**: Grant periods define relationship duration **Relationship Model**: Unlike other EncompassingBody types that have ongoing structural relationships, FundingOrganisation has TRANSACTIONAL relationships: - Funder → (awards grant) → Custodian - Grant has start date, end date, amount, purpose - Multiple custodians may receive funding simultaneously - Same custodian may receive multiple grants over time **Examples**: - **Mondriaan Fund** (Mondriaan Fonds, Q2714299) - Dutch public fund for visual arts and cultural heritage - Instance of "funding body" (Q5509032) in Wikidata - Provides grants for exhibitions, acquisitions, conservation - Government-funded through Ministry of OCW, operates independently - **European Research Council** (ERC, Q1377836) - EU agency funding frontier research - Starting Grants, Consolidator Grants, Advanced Grants - Operates under Horizon Europe framework - **Creative Europe** (Q17084973) - EU programme supporting cultural and creative sectors - 2021-2027 programming period - Funds transnational cooperation projects - **DC4EU** (Digital Credentials for Europe) - EU Digital Europe Programme project - Funds digital infrastructure for heritage sector - **National Endowment for the Humanities** (NEH) - US federal agency for humanities funding - Preservation, research, public programs - **Heritage Lottery Fund** (now National Lottery Heritage Fund) - UK lottery distributor for heritage projects - Major funder of UK heritage custodians **Distinction from UmbrellaOrganisation**: - **FundingOrganisation**: Provides money, NO governance authority - **UmbrellaOrganisation**: Legal parent WITH governance authority - A ministry may BOTH fund AND govern - in that case use UMBRELLA (the governance relationship is primary) **Distinction from NetworkOrganisation**: - **FundingOrganisation**: One-way financial relationship (funder → recipient) - **NetworkOrganisation**: Ongoing service provision relationship **When a Ministry is UMBRELLA vs FUNDING_BODY**: - Ministry of OCW → National Archives: UMBRELLA (governs) - Ministry of OCW → Mondriaan Fund: UMBRELLA (governs the fund) - Mondriaan Fund → Museum X: FUNDING_BODY (only provides grant) **Ontological Alignment**: - Schema.org: `schema:FundingAgency` - "An organization that implements FundingSchemes and manages the granting process (via Grants)" - Schema.org: `schema:FundingScheme` - structured funding programs - Schema.org: `schema:Grant` / `schema:MonetaryGrant` - individual awards - Wikidata: Q5509032 (funding body) - FOAF: `foaf:fundedBy` (legacy, use schema:funder instead)'
    examples:
