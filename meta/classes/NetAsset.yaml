id: https://nde.nl/ontology/hc/class/NetAsset
name: NetAsset
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
  - linkml:types
classes:
  NetAsset:
    class_uri: schema:MonetaryAmount
    description: >-
      Residual value calculated by subtracting total liabilities from total assets, representing organizational equity.
    alt_descriptions:
      nl: >-
        Restwaarde berekend door totale verplichtingen af te trekken van totale bezittingen, wat het eigen vermogen van de organisatie vertegenwoordigt.
      de: >-
        Restwert, berechnet durch Abzug der Gesamtverbindlichkeiten von den Gesamtaktiven, der das Organisationsvermögen darstellt.
      fr: >-
        Valeur résiduelle calculée en soustrayant le total des passifs du total des actifs, représentant les capitaux propres de l'organisation.
      es: >-
        Valor residual calculado restando el total de pasivos del total de activos, representando el patrimonio organizacional.
      ar: >-
        القيمة المتبقية المحسوبة بطرح إجمالي الالتزامات من إجمالي الأصول، والتي تمثل حقوق ملكية المنظمة.
      id: >-
        Nilai residual yang dihitung dengan mengurangi total kewajiban dari total aset, mewakili ekuitas organisasi.
      zh: >-
        通过从总资产中减去总负债计算出的剩余价值，代表组织权益。
