id: https://nde.nl/ontology/hc/classes/WikidataMedia
name: WikidataMedia
title: Wikidata Media Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  foaf: http://xmlns.com/foaf/0.1/
  dcterms: http://purl.org/dc/terms/
imports:
- linkml:types
classes:
  WikidataMedia:
    description: >-
      Referenced visual assets such as images, logos, heraldic symbols, and
      Wikimedia Commons linkage values.
    alt_descriptions:
      nl: >-
        Verwezen visuele middelen zoals afbeeldingen, logo's, heraldische
        symbolen en Wikimedia Commons-koppelingen.
      de: >-
        Referenzierte visuelle Ressourcen wie Bilder, Logos, heraldische
        Symbole und Wikimedia-Commons-Verknüpfungen.
      fr: >-
        Ressources visuelles référencées telles que des images, des logos, des
        symboles héraldiques et des liens vers Wikimedia Commons.
      es: >-
        Recursos visuales referenciados como imágenes, logotipos, símbolos
        heráldicos y enlaces a Wikimedia Commons.
      ar: >-
        أصول مرئية مُشار إليها مثل الصور والشعارات والرموز الشعارية وروابط
        ويكيميديا كومنز.
      id: >-
        Aset visual yang dirujuk seperti gambar, logo, simbol heraldik, dan
        tautan Wikimedia Commons.
      zh: >-
        引用的视觉资源，如图像、标识、纹章符号以及指向维基共享资源的链接。
    close_mappings:
    - schema:MediaObject
    - foaf:Image
    related_mappings:
    - dcterms:MediaType
    - prov:Entity
    slots: []
    comments:
    - Represents media file references from Wikidata/Commons
    - Many properties are image-related
    - 'Preserved from prior description: Referenced media assets such as images, logos, heraldic symbols, and Commons linkage values.'
    keywords:
    - wikidata
    - media
    - image
    - logo
    - commons
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for media file references
      custodian_types: "['*']"
      wikidata_property_ids: '["P18","P154","P373","P935","P94","P41"]'
    structured_aliases:
    - literal_form: wikidata-media
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Wikidata-Medien
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: médias Wikidata
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: medios Wikidata
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: وسائط ويكي بيانات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: media Wikidata
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 维基数据媒体资源
      predicate: EXACT_SYNONYM
      in_language: zh
