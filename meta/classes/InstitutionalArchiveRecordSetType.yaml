id: https://nde.nl/ontology/hc/class/InstitutionalArchiveRecordSetType
name: InstitutionalArchiveRecordSetType
title: Institutional Archive Record Set Type Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_type
- ../slots/has_scope
- ../slots/has_score
classes:
  InstitutionalArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Classification concept for documentary aggregations maintained within the
      long-term memory function of a parent body.
    alt_descriptions:
      nl: >-
        Classificatieconcept voor documentaire aggregaties die worden beheerd
        binnen de langetermijngeheugenfunctie van een moederinstelling.
      de: >-
        Klassifikationskonzept für dokumentarische Aggregationen, die innerhalb
        der Langzeitgedächtnisfunktion einer Trägerinstitution verwaltet werden.
      fr: >-
        Concept de classification pour des agrégations documentaires conservées
        au sein de la fonction de mémoire à long terme d'un organisme de tutelle.
      es: >-
        Concepto de clasificación para agregaciones documentales mantenidas en la
        función de memoria a largo plazo de una entidad matriz.
      ar: >-
        مفهوم تصنيف للتجميعات الوثائقية التي تُدار ضمن وظيفة الذاكرة طويلة
        الأمد لهيئة أم.
      id: >-
        Konsep klasifikasi untuk agregasi dokumenter yang dikelola dalam fungsi
        memori jangka panjang suatu badan induk.
      zh: >-
        用于分类由母体机构长期记忆职能维护的文献聚合体的分类概念。
    slots:
    - has_type
    - has_scope
    - has_score
    structured_aliases:
    - literal_form: type voor documentaire aggregatie van moederinstelling
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ dokumentarischer Aggregation einer Trägerinstitution
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'agrégation documentaire d'organisme de tutelle
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de agregación documental de entidad matriz
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع تجميع وثائقي لهيئة أم
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe agregasi dokumenter badan induk
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 母体机构文献聚合类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Captures documentary groupings linked to the enduring memory function of an organization.
    - Intended for holdings governed by internal mandates, retention, and accountability practices.
    - 'Preserved from prior description: Record-set type used to classify holdings typically managed by institutional archives.'
    keywords:
    - documentary aggregation
    - organizational memory
    - provenance classification
    - retention governance
    examples:
    - value:
        has_type: InstitutionalArchiveRecordSetType
        has_scope: Board minutes and internal policy dossiers.
      description: Documentary grouping maintained by a parent institution
    annotations:
      specificity_score: 0.5
      specificity_rationale: Domain record-set typing for parent-institution archival holdings.
      custodian_types: '["*"]'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
