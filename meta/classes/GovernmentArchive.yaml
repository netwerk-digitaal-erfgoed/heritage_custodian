id: https://w3id.org/nde/ontology/GovernmentArchive
name: GovernmentArchive
title: Government Archive Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_type
  - ../slots/hold_record_set
  - ../slots/has_score
classes:
  GovernmentArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Publicly mandated institution responsible for preserving and providing access
      to official state, national, or municipal administrative documentation.
    alt_descriptions:
      nl: >-
        Publiek verplichte instelling verantwoordelijk voor het bewaren en toegankelijk maken
        van officiële staats-, nationale of gemeentelijke administratieve documentatie.
      de: >-
        Öffentlich mandatierte Institution, die für die Bewahrung und Bereitstellung des
        Zugangs zu offizieller staatlicher, nationaler oder kommunaler Verwaltungsdokumentation verantwortlich ist.
      fr: >-
        Institution publiquement mandatée responsable de la préservation et de l'accès à la
        documentation administrative officielle de l'État, nationale ou municipale.
      es: >-
        Institución públicamente mandatada responsable de preservar y proporcionar acceso
        a la documentación administrativa oficial estatal, nacional o municipal.
      ar: >-
        مؤسسة ذات تفويض عام مسؤولة عن الحفاظ وتوفير الوصول إلى الوثائق الإدارية الرسمية للدولة أو الوطنية أو البلدية.
      id: >-
        Institusi yang dimandatkan secara publik yang bertanggung jawab untuk melestarikan dan
        menyediakan akses ke dokumentasi administratif resmi negara, nasional, atau munisipal.
      zh: >-
        负责保存和提供对官方国家或市政行政文件访问的公共授权机构。
    broad_mappings:
      - schema:ArchiveOrganization
      - wd:Q166118
    slots:
      - identified_by
      - has_type
      - hold_record_set
      - has_score
    annotations:
      custodian_status: governmental
      specificity_score: 0.65
      specificity_rationale: Archive organization type defined by legal public-records stewardship.
      custodian_types: '["*"]'
