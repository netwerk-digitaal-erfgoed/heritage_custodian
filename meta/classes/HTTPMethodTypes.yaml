classes:
  GETMethod:
    is_a: HTTPMethodType
    class_uri: hc:GETMethod
    description: >-
      Hypertext Transfer Protocol method for retrieving resource representations without causing server-side state changes.
    alt_descriptions:
      nl: >-
        Hypertext Transfer Protocol-methode voor het ophalen van resource-representaties zonder server-side statuswijzigingen.
      de: >-
        Hypertext Transfer Protocol-Methode zum Abrufen von Ressourcenrepräsentationen ohne serverseitige Zustandsänderungen.
      fr: >-
        Méthode Hypertext Transfer Protocol pour récupérer des représentations de ressources sans provoquer de changements d'état côté serveur.
      es: >-
        Método Hypertext Transfer Protocol para recuperar representaciones de recursos sin causar cambios de estado en el servidor.
      ar: >-
        طريقة بروتوكول نقل النص التشعبي لاسترداد تمثيلات الموارد دون إحداث تغييرات في حالة الخادم.
      id: >-
        Metode Hypertext Transfer Protocol untuk mengambil representasi sumber daya tanpa menyebabkan perubahan status sisi server.
      zh: >-
        用于检索资源表示而不引起服务器端状态变更的超文本传输协议方法。
