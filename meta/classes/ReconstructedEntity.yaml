id: https://nde.nl/ontology/hc/class/ReconstructedEntity
name: reconstructed_entity_class
title: Reconstructed Entity Abstract Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
imports:
  - linkml:types
  - ../slots/has_score
  - ../slots/generated_by
classes:
  ReconstructedEntity:
    class_uri: prov:Entity
    abstract: true
    description: >-
      Abstract base category for entities synthesized or inferred through computational reconstruction processes.
    alt_descriptions:
      nl: >-
        Abstracte basiscategorie voor entiteiten die gesynthetiseerd of afgeleid zijn via computationele reconstructieprocessen.
      de: >-
        Abstrakte Basiskategorie für Entitäten, die durch computerunterstützte Rekonstruktionsprozesse synthetisiert oder abgeleitet wurden.
      fr: >-
        Catégorie de base abstraite pour les entités synthétisées ou inférées par des processus de reconstruction computationnelle.
      es: >-
        Categoría base abstracta para entidades sintetizadas o inferidas a través de procesos de reconstrucción computacional.
      ar: >-
        فئة أساسية مجردة للكيانات المركبة أو المستنتجة من خلال عمليات إعادة البناء الحاسوبية.
      id: >-
        Kategori dasar abstrak untuk entitas yang disintesis atau disimpulkan melalui proses rekonstruksi komputasional.
      zh: >-
        通过计算重建过程合成或推断的实体的抽象基础类别。
    structured_aliases:
      - literal_form: GereconstrueerdeEntiteit
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: RekonstruierteEntität
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: EntitéReconstruite
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: EntidadReconstruida
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: كيان معاد بناؤه
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: EntitasRekonstruksi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 重建实体
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - "RDFS semantics: used to enforce domain/range for generates/generated_by inverse relationships (ReconstructionActivity <-> ReconstructedEntity)."
      - "PROV-O alignment: prov:Entity (entities may be physical, digital, conceptual, real, or imaginary)."
      - "Subclasses represent reconstructed aspects of a custodian (e.g., legal status, standardized name, location, collections, digital platform, organization branch)."
      - "Usage pattern: ReconstructionActivity generates one or more ReconstructedEntity instances; each generated entity links back via generated_by."
    examples:
      - value:
          generated_by: https://nde.nl/ontology/hc/activity/isil-reg-2024
    broad_mappings:
    - prov:Entity
    slots:
    - has_score
    - generated_by
    slot_usage:
      generated_by:
        required: false
    notes:
      - |
        Preserved from prior description (commit 6251b84d):

        Preserved from prior description (commit 6251b84d):

        "Abstract base class for all entities that are generated by a ReconstructionActivity.\n\n**RDFS Compliance**:\nThis class exists to ensure proper RDFS domain/range semantics for the\n`generates`/`generated_by` inverse relationship:\n- `generates`: domain=ReconstructionActivity, range=ReconstructedEntity\n- `generated_by`: domain=ReconstructedEntity, range=ReconstructionActivity\n\n**PROV-O Alignment**:\nMaps to `prov:Entity` - \"An entity is a physical, digital, conceptual, or\nother kind of thing with some fixed aspects; entities may be real or imaginary.\"\n\n**Subclasses**:\nAll reconstructed aspects of a custodian inherit from this class:\n- CustodianLegalStatus (formal legal entity)\n- CustodianName (standardized name)\n- CustodianPlace (physical location)\n- CustodianCollection (collection metadata)\n- DigitalPlatform (digital infrastructure)\n- OrganizationBranch (organizational units)\n- And other aspect entities...\n\n**Usage Pattern**:\n```yaml\n# ReconstructionActivity\
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
