name: GHCIdentifier
title: GHC Identifier Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
  - linkml:types
classes:
  GHCIdentifier:
    is_a: Identifier
    class_uri: hc:GHCIdentifier
    description: >-
      Persistent identifier uniquely assigned to a heritage custodian within the global heritage custodian identifier system.
    alt_descriptions:
      nl: >-
        Permanente identificatiecode uniek toegekend aan een erfgoedbeheerder binnen het wereldwijde erfgoedbeheerder-identificatiesysteem.
      de: >-
        Persistenter Identifikator, der einem Kulturgutverwalter innerhalb des globalen Kulturgutverwalter-Identifikationssystems eindeutig zugewiesen wird.
      fr: >-
        Identifiant persistant attribué de manière unique à un dépositaire du patrimoine dans le système mondial d'identification des dépositaires du patrimoine.
      es: >-
        Identificador persistente asignado de manera única a un custodio patrimonial dentro del sistema global de identificación de custodios patrimoniales.
      ar: >-
        معرف دائم يُخصص بشكل فريد لوصي تراث ضمن نظام تعريف أمناء التراث العالمي.
      id: >-
        Pengenal persisten yang ditugaskan secara unik kepada pengelola warisan dalam sistem pengenal pengelola warisan global.
      zh: >-
        在全球遗产托管人标识符系统中唯一分配给遗产托管人的持久标识符。
