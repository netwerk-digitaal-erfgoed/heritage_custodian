id: https://nde.nl/ontology/hc/class/ClassificationType
name: ClassificationType
title: ClassificationType
description: >-
  Type of classification.

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: hc

imports:
- linkml:types
- ../slots/has_label
classes:
  ClassificationType:
    class_uri: skos:Concept
    description: >-
      Taxonomic concept indicating the kind of categorization framework applied in an assignment.
    alt_descriptions:
      nl: Taxonomisch concept dat aangeeft welk soort categorisatiekader bij een toekenning is gebruikt.
      de: Taxonomisches Konzept, das die Art des bei einer Zuordnung verwendeten Kategorisierungsrahmens angibt.
      fr: Concept taxonomique indiquant le type de cadre de catégorisation appliqué lors d'une attribution.
      es: Concepto taxonómico que indica el tipo de marco de categorización aplicado en una asignación.
      ar: مفهوم تصنيفي يحدد نوع إطار التصنيف المطبق في الإسناد.
      id: Konsep taksonomi yang menunjukkan jenis kerangka kategorisasi yang diterapkan pada penetapan.
      zh: 指示某次归类所采用分类框架类型的分类学概念。
    structured_aliases:
    - literal_form: type indelingskader
      in_language: nl
    - literal_form: Typ des Klassifikationsrahmens
      in_language: de
    - literal_form: type de cadre de catégorisation
      in_language: fr
    - literal_form: tipo de marco de categorización
      in_language: es
    - literal_form: نوع إطار التصنيف
      in_language: ar
    - literal_form: jenis kerangka klasifikasi
      in_language: id
    - literal_form: 分类框架类型
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: "Generic utility class created during migration"
      custodian_types: '["*"]'
    slots:
    - has_label
