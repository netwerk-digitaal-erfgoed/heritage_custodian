classes:
  IcelandicRegionalFonds:
    is_a: RegionalArchivesInIcelandRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation produced by regional
      public authorities in the Icelandic administrative context.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die is gevormd door
        regionale overheidsautoriteiten in de IJslandse bestuurscontext.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen regionaler
        oeffentlicher Behoerden im islaendischen Verwaltungskontext.
      fr: >-
        Agregation fondee sur la provenance de documentation produite par des
        autorites publiques regionales dans le contexte administratif islandais.
      es: >-
        Agregacion basada en procedencia de documentacion producida por
        autoridades publicas regionales en el contexto administrativo islandes.
      ar: >-
        تجميع قائم على المنشأ لوثائق أصدرتها سلطات عامة إقليمية ضمن
        السياق الإداري الآيسلندي.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan otoritas
        publik regional dalam konteks administrasi Islandia.
      zh: >-
        基于来源原则聚合冰岛行政语境中区域公共机构形成的文献。
      is: >-
        Upprunamiuduð samloðun skjala sem mynduð eru af héraðsbundnum
        opinberum stjórnvöldum í islensku stjórnsýsluumhverfi.
    structured_aliases:
    - literal_form: íslenskt héraðsfé
      predicate: EXACT_SYNONYM
      in_language: is
    - literal_form: isländischer Regionalbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: ijslands regionaal overheidsfonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: fonds administratif regional islandais
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo administrativo regional islandes
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق إداري إقليمي آيسلندي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds administrasi regional Islandia
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 冰岛区域行政文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Follows the fonds organizational principle as defined by rico-rst:Fonds.
    - Note preserved: Icelandic terminology remains available for local archival interoperability.
    - 'Preserved from prior description: A rico:RecordSetType for Icelandic regional administrative records.'
    keywords:
    - Icelandic region
    - public authority
    - administrative provenance
    - fonds arrangement
    examples:
    - value:
        has_type: hc:IcelandicRegionalFonds
        has_custodian: hc:RegionalArchivesInIceland
        has_note: District administrative files, permits, and public-office correspondence.
      description: Icelandic regional public-administration documentation grouped by provenance.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - RegionalArchivesInIcelandRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:IcelandicRegionalFonds
      has_custodian:
        equals_string: hc:RegionalArchivesInIceland
      has_note:
        equals_string: This RecordSetType is typically held by RegionalArchivesInIceland custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
