id: https://nde.nl/ontology/hc/class/LGBTArchiveRecordSetTypes
name: LGBTArchiveRecordSetTypes
title: LGBTArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./LGBTArchiveRecordSetType
- linkml:types
- ../slots/has_type
- ../slots/has_score
- ../slots/has_note
classes:
  LGBTOrganizationFonds:
    is_a: LGBTArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Fonds-oriented record set type for records created by LGBTQIA+
      organizations and community bodies.
    alt_descriptions:
      nl: Fondsgerichte recordsettype voor records gevormd door LGBTQIA+-organisaties en gemeenschapsgroepen.
      de: Fondsorientierter Recordsettyp fuer Unterlagen von LGBTQIA+-Organisationen und Gemeinschaftsstrukturen.
      fr: Type de lot documentaire oriente fonds pour les documents crees par des organisations et collectivites LGBTQIA+.
      es: Tipo de conjunto documental orientado a fondo para registros producidos por organizaciones y colectivos LGBTQIA+.
      ar: نوع مجموعة سجلات موجّه للفوندس لسجلات أنشأتها منظمات وهيئات مجتمع LGBTQIA+.
      id: Tipe record set berbasis fonds untuk arsip yang dibuat organisasi dan komunitas LGBTQIA+.
      zh: 面向全宗编组的记录集类型，用于 LGBTQIA+ 组织与社群机构形成的档案记录。
    structured_aliases:
    - {literal_form: fonds LGBTQIA+-organisatie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: LGBTQIA+-Organisationsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds d organisation LGBTQIA+, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de organizacion LGBTQIA+, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس منظمة LGBTQIA+, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds organisasi LGBTQIA+, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: LGBTQIA+组织档案全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    keywords:
    - LGBTQIA+ organization
    - community archives
    - queer fonds
    - organizational records
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:LGBTOrganizationFonds

  ActivistPapersCollection:
    is_a: LGBTArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for personal papers of activists,
      including correspondence, notes, and advocacy materials.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor persoonlijke papieren van activisten inclusief correspondentie notities en belangenmateriaal.
      de: Sammlungsorientierter Recordsettyp fuer persoenliche Unterlagen von Aktivistinnen und Aktivisten mit Korrespondenz und Kampagnenmaterial.
      fr: Type de lot documentaire oriente collection pour papiers personnels d activistes avec correspondance notes et documents de plaidoyer.
      es: Tipo de conjunto documental orientado a coleccion para papeles personales de activistas con correspondencia y materiales de incidencia.
      ar: نوع مجموعة سجلات قائم على التجميع للأوراق الشخصية للنشطاء، بما في ذلك المراسلات والملاحظات ومواد المناصرة.
      id: Tipe record set berbasis koleksi untuk arsip pribadi aktivis termasuk korespondensi catatan dan materi advokasi.
      zh: 面向馆藏编组的记录集类型，用于活动人士个人文献，包括通信、笔记与倡议材料。
    structured_aliases:
    - {literal_form: activistenpapierencollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Aktivistenpapiersammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de papiers d activistes, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de papeles de activistas, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أوراق ناشطين, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip pribadi aktivis, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 活动人士文献合集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    keywords:
    - activist papers
    - personal archives
    - advocacy materials
    - correspondence collection
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:ActivistPapersCollection

  PrideEventCollection:
    is_a: LGBTArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type documenting pride events,
      commemorations, and related public activities.
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor documentatie van pride-evenementen herdenkingen en verwante publieke activiteiten.
      de: Sammlungsorientierter Recordsettyp zur Dokumentation von Pride-Veranstaltungen Gedenkanlaessen und verwandten oeffentlichen Aktivitaeten.
      fr: Type de lot documentaire oriente collection documentant evenements pride commemorations et activites publiques associees.
      es: Tipo de conjunto documental orientado a coleccion que documenta eventos pride conmemoraciones y actividades publicas relacionadas.
      ar: نوع مجموعة سجلات قائم على التجميع يوثق فعاليات الفخر والإحياءات والأنشطة العامة ذات الصلة.
      id: Tipe record set berbasis koleksi yang mendokumentasikan acara pride peringatan dan aktivitas publik terkait.
      zh: 面向馆藏编组的记录集类型，用于记录骄傲活动、纪念事件及相关公共活动。
    structured_aliases:
    - {literal_form: pride-evenementencollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Pride-Veranstaltungssammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection d evenements pride, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de eventos pride, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة فعاليات الفخر, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi acara pride, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 骄傲活动文献合集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    keywords:
    - pride events
    - LGBTQIA+ commemoration
    - public demonstrations
    - celebration archives
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:PrideEventCollection
