id: https://nde.nl/ontology/hc/class/DistrictArchiveGermanyRecordSetType
name: DistrictArchiveGermanyRecordSetType
title: DistrictArchiveGermany Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./CollectionType
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  DistrictArchiveGermanyRecordSetType:
    is_a: CollectionType
    abstract: true
    class_uri: rico:RecordSetType
    description: >-
      Abstract classification node for documentary aggregations associated with
      county-level public administration in a federal Central European context.
    alt_descriptions:
      nl: >-
        Abstract classificatieknooppunt voor documentaire aggregaties die horen
        bij bestuurlijke taken op districtsniveau in Duitsland.
      de: >-
        Abstrakter Klassifikationsknoten für Dokumentaggregationen im Umfeld
        kreisbezogener öffentlicher Verwaltung in Deutschland.
      fr: >-
        Nœud de classification abstrait pour les agrégations documentaires liées
        à l'administration publique de niveau arrondissement en Allemagne.
      es: >-
        Nodo de clasificación abstracto para agregaciones documentales vinculadas
        a la administración pública de nivel distrital en Alemania.
      ar: >-
        عقدة تصنيف مجردة للتجمعات الوثائقية المرتبطة بالإدارة العامة على مستوى
        المقاطعة في ألمانيا.
      id: >-
        Simpul klasifikasi abstrak untuk agregasi dokumenter yang terkait dengan
        administrasi publik tingkat distrik di Jerman.
      zh: >-
        用于德国县级公共行政相关文献聚合体的抽象分类节点。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    structured_aliases:
    - literal_form: type districtsniveau bestuursdocumentatie Duitsland
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ kreisbezogener Verwaltungsdokumentation in Deutschland
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de documentation administrative d'arrondissement en Allemagne
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de documentacion administrativa distrital en Alemania
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع توثيق إداري على مستوى المقاطعة في ألمانيا
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe dokumentasi administrasi tingkat distrik di Jerman
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 德国县级行政文献类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Provides an abstract parent for German county-level documentary categorizations.
    - Intended for subclasses that model provenance and arrangement patterns used by regional custodians.
    - 'Preserved from prior description: Abstract taxonomy node for district-archive record aggregations in the German context.'
    keywords:
    - German districts
    - public administration
    - documentary aggregation
    - abstract taxonomy
    examples:
    - value:
        has_type: hc:DistrictArchiveGermanyRecordSetType
        has_scope: county authority documentation in Germany
      description: Abstract node specialized by fonds- and series-level county documentation classes
    slots:
    - has_type
    - has_score
    - has_scope
