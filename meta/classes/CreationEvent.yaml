classes:
  CreationEvent:
    class_uri: crm:E65_Creation
    description: >-
      Originating occurrence through which an entity, work, or artifact is brought into existence.
    alt_descriptions:
      nl: >-
        Oorspronkelijke gebeurtenis waardoor een entiteit, werk of artefact tot stand komt.
      de: >-
        Ursprüngliches Ereignis, durch das eine Entität, ein Werk oder ein Artefakt ins Dasein gebracht wird.
      fr: >-
        Occurrence originaire par laquelle une entité, une œuvre ou un artefact est mise en existence.
      es: >-
        Ocurrencia originaria a través de la cual una entidad, obra o artefacto es traído a la existencia.
      ar: >-
        حدث أصلي يتم من خلاله إيجاد كيان أو عمل أو قطعة أثرية.
      id: >-
        Kejadian asal yang melalui mana entitas, karya, atau artefak dibawa ke dalam eksistensi.
      zh: >-
        使实体、作品或人工制品得以产生的起源事件。
