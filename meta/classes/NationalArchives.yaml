    - StateArchives
    - RegionalArchive
    comments:
    - Principal archival institution of a nation
    - Legal mandate for government records
    - 'Examples: NARA (US), TNA (UK), Archives nationales (FR)'
    - 'Preserved from prior description: Principal archival institution responsible for preserving and providing access to records of national-level governance.'
