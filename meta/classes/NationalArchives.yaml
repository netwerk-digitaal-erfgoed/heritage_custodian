    - schema:ArchiveOrganization
    slot_usage:
      identified_by:
    keywords:
    - state archives
    - governmental records
    - national heritage
    - official documents
    examples:
    - value:
        has_type: NationalArchives
        has_scope: National government records
      description: National Archives and Records Administration (NARA)
    annotations:
      skos:prefLabel: National Archives
      skos:altLabel: Nationalarchiv, archivo nacional, archives nationales, National Archive, State Archives
      admin_level: national
      custodian_status: governmental
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
