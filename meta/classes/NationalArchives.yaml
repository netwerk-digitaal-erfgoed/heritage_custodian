classes:
  NationalArchives:
    description: >-
      Principal governmental archival organization mandated to preserve and provide access
      to records of nationwide governance and state administration.
    alt_descriptions:
      nl: >-
        Principale overheidsarchiefinstelling die belast is met het behouden en toegankelijk maken
        van records van landelijke governance en staatsadministratie.
      de: >-
        Vornehmliche staatliche Archivorganisation, die mit der Bewahrung und Bereitstellung
        von Unterlagen der landesweiten Regierung und Staatsverwaltung betraut ist.
      fr: >-
        Organisation archivistique gouvernementale principale chargée de préserver et de donner accès
        aux documents de la gouvernance nationale et de l'administration étatique.
      es: >-
        Organización archivística gubernamental principal encargada de preservar y proporcionar acceso
        a los registros de la gobernanza nacional y la administración estatal.
      ar: >-
        المنظمة الأرشيفية الحكومية الرئيسية المكلفة بالحفاظ على سجلات الحوكمة الوطنية
        والإدارة الحكومية وتوفير الوصول إليها.
      id: >-
        Organisasi arsip pemerintah utama yang diamanatkan untuk melestarikan dan menyediakan akses
        ke catatan tata kelola nasional dan administrasi negara.
      zh: >-
        负责保存和提供国家治理及国家行政记录访问的主要政府档案组织。
    structured_aliases:
    - literal_form: nationaal archief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Nationalarchiv
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: archives nationales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: archivo nacional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: الأرشيف الوطني
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip nasional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 国家档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - has_scope
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - wd:Q2122214
    broad_mappings:
