id: https://nde.nl/ontology/hc/class/ParliamentaryArchivesRecordSetTypes
name: ParliamentaryArchivesRecordSetTypes
title: ParliamentaryArchives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./ParliamentaryArchivesRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  ParliamentaryProceedingsFonds:
    is_a: ParliamentaryArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation produced through plenary
      deliberation, debate, and formal decision-making sessions.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die ontstaat uit plenaire
        beraadslagingen, debat en formele besluitvormingszittingen.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen aus Plenardebatten,
        Beratungen und formalen Entscheidungsverfahren.
      fr: >-
        Agrégation fondée sur la provenance de documentation issue des débats
        pléniers, délibérations et séances décisionnelles formelles.
      es: >-
        Agregación basada en procedencia de documentación generada en debates
        plenarios, deliberaciones y sesiones formales de decisión.
      ar: >-
        تجميع قائم على المنشأ لوثائق ناتجة عن المناقشات العامة والجلسات
        التداولية واجتماعات اتخاذ القرار الرسمية.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dihasilkan melalui
        sidang pleno, perdebatan, dan sesi pengambilan keputusan formal.
      zh: >-
        基于来源原则聚合由全体审议、辩论与正式决策会议形成的文献。
    structured_aliases:
    - literal_form: fonds parlementaire beraadslaging
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Fonds parlamentarischer Plenarvorgaenge
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds de deliberations plenieres
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de deliberaciones plenarias
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رصيد مداولات برلمانية عامة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds sidang pleno parlemen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 议会全体审议文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Parliamentary debate and procedure materials follow fonds-level provenance logic.
    - 'Preserved from prior description: Fonds containing parliamentary debates and proceedings.'
    keywords:
    - plenary debate
    - deliberation record
    - parliamentary procedure
    - decision workflow
    examples:
    - value:
        has_type: hc:ParliamentaryProceedingsFonds
        has_custodian: hc:ParliamentaryArchives
        has_note: Plenary transcripts, voting records, and procedural agendas.
      description: Parliamentary session documentation grouped by institutional provenance.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - ParliamentaryArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:ParliamentaryProceedingsFonds
      has_custodian:
        equals_string: hc:ParliamentaryArchives
      has_note:
        equals_string: This RecordSetType is typically held by ParliamentaryArchives custodians. Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  CommitteeRecordSeries:
    is_a: ParliamentaryArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence generated by committee workflows,
      including hearings, reports, amendments, and recommendation stages.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks uit commissiewerkprocessen,
        inclusief hoorzittingen, verslagen, amendementen en adviesfasen.
      de: >-
        Geordnete Dokumentationsfolge aus Ausschussablaeufen,
        einschliesslich Anhoerungen, Berichten, Aenderungen und Empfehlungen.
      fr: >-
        Sequence documentaire ordonnee issue des processus de commission,
        incluant auditions, rapports, amendements et recommandations.
      es: >-
        Secuencia documental ordenada generada por comisiones,
        con audiencias, informes, enmiendas y fases de recomendación.
      ar: >-
        تسلسل وثائقي منظم ناتج عن سير أعمال اللجان، ويشمل جلسات الاستماع
        والتقارير والتعديلات ومراحل التوصية.
      id: >-
        Urutan dokumenter teratur dari alur kerja komite,
        termasuk dengar pendapat, laporan, amandemen, dan rekomendasi.
      zh: >-
        由委员会工作流程形成的有序文献序列，涵盖听证、报告、修订与建议环节。
    structured_aliases:
    - literal_form: commissieprocesreeks
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge parlamentarischer Ausschussunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence des travaux de commission
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia de trabajo de comisiones
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة وثائق عمل اللجان
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan dokumentasi komite parlemen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 委员会流程文献序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Committee materials remain organized as recurring procedural sequences.
    - 'Preserved from prior description: Series containing parliamentary committee documentation.'
    keywords:
    - committee hearing
    - amendment record
    - recommendation process
    - parliamentary workflow
    examples:
    - value:
        has_type: hc:CommitteeRecordSeries
        has_custodian: hc:ParliamentaryArchives
        has_note: Hearing transcripts, committee reports, and amendment logs.
      description: Committee workflow documentation arranged as a recurring sequence.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - ParliamentaryArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:CommitteeRecordSeries
      has_custodian:
        equals_string: hc:ParliamentaryArchives
      has_note:
        equals_string: This RecordSetType is typically held by ParliamentaryArchives custodians. Inverse of rico:isOrWasHolderOf.
  LegislativeDraftCollection:
    is_a: ParliamentaryArchivesRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body of draft bills, revision layers,
      and supporting traces from legislative preparation and negotiation.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van wetsontwerpen, revisielagen
        en ondersteunende sporen uit wetgevingsvoorbereiding en onderhandeling.
      de: >-
        Zusammengestellter Dokumentkoerper aus Gesetzentwuerfen,
        Revisionsstufen und Nachweisen zur Gesetzesvorbereitung und Verhandlung.
      fr: >-
        Ensemble documentaire réuni de projets de loi, couches de révision
        et traces d'appui provenant de la préparation législative.
      es: >-
        Cuerpo documental reunido de borradores normativos, capas de revisión
        y trazas de apoyo de la preparación y negociación legislativa.
      ar: >-
        جسم وثائقي مُجمع يضم مسودات القوانين وطبقات المراجعة
        والآثار الداعمة لمسار الإعداد والتفاوض التشريعي.
      id: >-
        Kumpulan dokumenter terhimpun berisi rancangan undang-undang,
        lapisan revisi, dan jejak pendukung dari persiapan legislasi.
      zh: >-
        汇集法案草案、修订层次及立法准备与协商过程支撑痕迹的文献整体。
    structured_aliases:
    - literal_form: verzameling wetsontwerpdocumentatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung legislativer Entwurfsunterlagen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: ensemble de projets legislatifs
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: conjunto de borradores legislativos
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: تجميعة مسودات تشريعية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: himpunan rancangan legislasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 立法草案文献汇编
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Note preserved: Draft layers and supporting files are often assembled across multiple procedural actors.
    - 'Preserved from prior description: Collection of bill drafts and supporting legislative history.'
    keywords:
    - draft bill
    - revision layer
    - legislative preparation
    - negotiation trace
    examples:
    - value:
        has_type: hc:LegislativeDraftCollection
        has_custodian: hc:ParliamentaryArchives
        has_note: Draft bills with committee edits and explanatory memoranda.
      description: Legislative draft materials assembled from preparatory workflows.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - ParliamentaryArchivesRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:LegislativeDraftCollection
      has_custodian:
        equals_string: hc:ParliamentaryArchives
      has_note:
        equals_string: This RecordSetType is typically held by ParliamentaryArchives custodians. Inverse of rico:isOrWasHolderOf.
