id: https://nde.nl/ontology/hc/class/ProvincialArchiveRecordSetType
name: ProvincialArchiveRecordSetType
title: ProvincialArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
  - linkml:types
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  ProvincialArchiveRecordSetType:
    description: >-
      Classification category for record collections maintained by provincial-level
      archival institutions, organizing materials by provenance, function, or document type.
    alt_descriptions:
      nl: >-
        Classificatiecategorie voor archiefcollecties die worden beheerd door provinciale
        archiefinstellingen, organiserend materiaal naar herkomst, functie of documenttype.
      de: >-
        Klassifikationskategorie für Bestände, die von Archiven auf Provinzebene
        verwaltet werden, organisiert nach Provenienz, Funktion oder Dokumententyp.
      fr: >-
        Catégorie de classification pour les collections de documents conservées par
        les institutions archivistiques provinciales, organisées par provenance, fonction ou type de document.
      es: >-
        Categoría de clasificación para colecciones de registros mantenidas por
        instituciones archivísticas provinciales, organizando materiales por procedencia, función o tipo de documento.
      ar: >-
        فئة تصنيف لمجموعات السجلات التي تحتفظ بها المؤسسات الأرشيفية على المستوى الإقليمي،
        تنظم المواد حسب المنشأ أو الوظيفة أو نوع الوثيقة.
      id: >-
        Kategori klasifikasi untuk koleksi catatan yang dikelola oleh institusi arsip
        tingkat provinsi, mengorganisasi material berdasarkan provenance, fungsi, atau jenis dokumen.
      zh: >-
        省级档案机构维护的记录集合的分类类别，
        按来源、职能或文档类型组织材料。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
    keywords:
      - provincial archive records
      - regional records
      - government records
    structured_aliases:
      - literal_form: provinciaal archiefbestandstype
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Provinzarchivbestandstyp
        predicate: EXACT_SYNONYM
        in_language: de
    slots:
      - has_type
      - has_score
      - has_scope
    see_also:
      - ProvincialArchive
      - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: hc:ProvincialArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
