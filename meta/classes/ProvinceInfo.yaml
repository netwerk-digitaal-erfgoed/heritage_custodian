id: https://nde.nl/ontology/hc/classes/ProvinceInfo
name: ProvinceInfo
title: ProvinceInfo
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  locn: http://www.w3.org/ns/locn#
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
  - linkml:types
# default_range: string
classes:
  ProvinceInfo:
    description: >-
      Administrative region or subdivision data containing the name and ISO 3166-2 code
      for provincial or state-level geographic identification.
    alt_descriptions:
      nl: >-
        Administratieve regio- of subdivisiegegevens met de naam en ISO 3166-2-code
        voor provinciale of staatsniveau geografische identificatie.
      de: >-
        Verwaltungsregion- oder Unterteilungsdaten mit Name und ISO 3166-2-Code
        für geografische Identifizierung auf Provinz- oder Landesebene.
      fr: >-
        Données de région administrative ou de subdivision contenant le nom et le code ISO 3166-2
        pour l'identification géographique au niveau provincial ou étatique.
      es: >-
        Datos de región administrativa o subdivisión que contienen el nombre y código ISO 3166-2
        para identificación geográfica a nivel provincial o estatal.
      ar: >-
        بيانات المنطقة الإدارية أو التقسيم الفرعي التي تحتوي على الاسم والرمز ISO 3166-2
        للتعريف الجغرافي على مستوى المقاطعة أو الولاية.
      id: >-
        Data wilayah administratif atau subdivisi yang berisi nama dan kode ISO 3166-2
        untuk identifikasi geografis tingkat provinsi atau negara bagian.
      zh: >-
        包含名称和ISO 3166-2代码的行政区域或分区数据，
        用于省级或州级地理识别。
    class_uri: hc:ProvinceInfo
    close_mappings:
      - schema:AdministrativeArea
    related_mappings:
      - prov:Entity
      - schema:Place
    broad_mappings:
      - schema:Place
    keywords:
      - province
      - administrative region
      - subdivision
      - ISO 3166-2
    structured_aliases:
      - literal_form: provincie-info
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Provinzinformation
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: informations sur la province
        predicate: EXACT_SYNONYM
        in_language: fr
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '["*"]'
    slots:
      - has_name
