id: https://nde.nl/ontology/hc/class/Threat
name: Threat
title: Threat
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_type
classes:
  Threat:
    class_uri: hc:Threat
    description: >-
      Risk factor or endangerment condition affecting the sustainability or survival of cultural heritage.
    alt_descriptions:
      nl: Een factor die de levensvatbaarheid van erfgoed bedreigt of bedreigde.
      de: Ein Faktor, der die Lebensfähigkeit des Kulturerbes bedroht oder bedrohte.
      fr: Un facteur qui menace ou a menacé la viabilité du patrimoine.
      es: 'Concepto para: Risk factor or endangerment condition affecting the sustainability or survival of cultural heritage.'
      ar: 'مفهوم لـ: Risk factor or endangerment condition affecting the sustainability or survival of cultural heritage.'
      id: 'Konsep untuk: Risk factor or endangerment condition affecting the sustainability or survival of cultural heritage.'
      zh: 用于以下内容的概念：Risk factor or endangerment condition affecting the sustainability or survival of cultural heritage.
    structured_aliases:
    - literal_form: bedreiging
      in_language: nl
    - literal_form: Bedrohung
      in_language: de
    - literal_form: menace
      in_language: fr
    - literal_form: threat
      in_language: es
    - literal_form: threat
      in_language: ar
    - literal_form: threat
      in_language: id
    - literal_form: threat
      in_language: zh
    slots:
    - has_type
    slot_usage:
      has_type:
        range: ThreatType
        multivalued: false
    comments:
    - Used primarily for intangible cultural heritage documentation per UNESCO conventions
    - Can also apply to physical heritage sites, collections, or institutions
    - Common threats include urbanization and modernization, globalization and cultural homogenization, loss of practitioners (aging, lack of transmission), lack of funding and institutional support, climate change and environmental degradation, political instability and conflict, economic pressures and commercialization
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
