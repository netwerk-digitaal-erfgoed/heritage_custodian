id: https://nde.nl/ontology/hc/class/ProvincialArchiveRecordSetTypes
name: ProvincialArchiveRecordSetTypes
title: ProvincialArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./ProvincialArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  ProvincialAdministrationFonds:
    is_a: ProvincialArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation created by subnational
      executive and representative authorities.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die is gevormd door
        provinciale uitvoerende en representatieve bestuursorganen.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen, die durch
        provinzielle Exekutiv- und Vertretungsorgane entstanden sind.
      fr: >-
        Agrégation fondée sur la provenance de documentation produite par des
        autorités provinciales exécutives et représentatives.
      es: >-
        Agregación basada en procedencia de documentación creada por
        autoridades provinciales ejecutivas y representativas.
      ar: >-
        تجميع قائم على المنشأ لوثائق أنشأتها السلطات التنفيذية والتمثيلية
        على المستوى الإقليمي.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dibentuk oleh
        otoritas provinsi eksekutif dan representatif.
      zh: >-
        基于来源原则聚合由省级行政与代表机构形成的文献。
    structured_aliases:
    - literal_form: provinciefonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Provinzfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds provincial
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo provincial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: فوندس إقليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds provinsi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 省级全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - ProvincialArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:ProvincialAdministrationFonds
      has_custodian:
        equals_string: hc:ProvincialArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by ProvincialArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Captures policy, oversight, and administrative outputs of provincial authorities.
    - Preserves originating office structures and governance provenance.
    - 'Preserved from prior description: Fonds-oriented record set type for provincial government records.'
    keywords:
    - provincial governance
    - subnational administration
    - executive records
    - representative authority
    examples:
    - value:
        has_type: hc:ProvincialAdministrationFonds
        has_custodian: hc:ProvincialArchive
        has_note: Provincial executive directives, committee minutes, and policy dossiers.
      description: Subnational governance documentation grouped by originating authority
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'

  RegionalPlanningCollection:
    is_a: ProvincialArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled documentary body concerning spatial development,
      infrastructure strategy, and long-horizon territorial planning.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel over ruimtelijke ontwikkeling,
        infrastructuurstrategie en langetermijnplanning van het gebied.
      de: >-
        Zusammengestellter Dokumentkoerper zu raeumlicher Entwicklung,
        Infrastrukturstrategie und langfristiger Gebietsplanung.
      fr: >-
        Ensemble documentaire réuni sur le développement spatial,
        la stratégie d'infrastructure et la planification territoriale de long terme.
      es: >-
        Cuerpo documental reunido sobre desarrollo espacial,
        estrategia de infraestructura y planificación territorial de largo plazo.
      ar: >-
        جسم وثائقي مُجمع يتعلق بالتنمية المكانية واستراتيجية البنية التحتية
        والتخطيط الإقليمي طويل الأمد.
      id: >-
        Kumpulan dokumenter terhimpun mengenai pengembangan spasial,
        strategi infrastruktur, dan perencanaan wilayah jangka panjang.
      zh: >-
        汇集关于空间发展、基础设施战略与长期区域规划的文献整体。
    structured_aliases:
    - literal_form: collectie ruimtelijke ordening
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung Regionalplanung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection d aménagement
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de planificación regional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة تخطيط إقليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi perencanaan regional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区域规划集合
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - ProvincialArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:RegionalPlanningCollection
      has_custodian:
        equals_string: hc:ProvincialArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by ProvincialArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Brings together planning artifacts from multi-agency territorial development programs.
    - Frequently arranged by project, corridor, or planning period.
    - 'Preserved from prior description: Collection-oriented record set type for regional development and planning documentation.'
    keywords:
    - spatial planning
    - infrastructure strategy
    - development program
    - territorial policy
    examples:
    - value:
        has_type: hc:RegionalPlanningCollection
        has_custodian: hc:ProvincialArchive
        has_note: Zoning maps, transport corridor studies, and environmental impact dossiers.
      description: Multi-source territorial development documentation assembled for planning access

  ProvincialCourtSeries:
    is_a: ProvincialArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence generated by subnational judicial forums,
      capturing case progression, rulings, and procedural filings.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks die is gevormd door provinciale
        rechtscolleges en die zaakverloop, uitspraken en processtukken vastlegt.
      de: >-
        Geordnete Dokumentationsfolge aus provinziellen Gerichtsinstanzen,
        die Fallverlauf, Entscheidungen und Verfahrensakten nachweist.
      fr: >-
        Sequence documentaire ordonnee produite par des juridictions
        provinciales, retraçant progression des affaires, décisions et pièces.
      es: >-
        Secuencia documental ordenada generada por foros judiciales
        provinciales, con trazas de tramitación, resoluciones y actuaciones.
      ar: >-
        تسلسل وثائقي منظم صادر عن هيئات قضائية إقليمية، يوثق سير القضايا
        والأحكام والملفات الإجرائية.
      id: >-
        Urutan dokumenter teratur yang dibentuk forum peradilan provinsi,
        mencatat perkembangan perkara, putusan, dan berkas prosedural.
      zh: >-
        由省级司法机构形成的有序文献序列，记录案件进程、裁决与程序性文书。
    structured_aliases:
    - literal_form: reeks gerechtelijke dossiers
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Serie Gerichtsakten
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie judiciaire provinciale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie judicial provincial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة سجلات قضائية إقليمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri arsip peradilan provinsi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 省级司法系列
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - ProvincialArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:ProvincialCourtSeries
      has_custodian:
        equals_string: hc:ProvincialArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by ProvincialArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    comments:
    - Reflects recurring adjudication workflows and filing sequences.
    - Supports legal-history reconstruction across jurisdictions and periods.
    - 'Preserved from prior description: Series-oriented record set type for provincial judicial records.'
    keywords:
    - judicial filing
    - case progression
    - court ruling
    - procedural sequence
    examples:
    - value:
        has_type: hc:ProvincialCourtSeries
        has_custodian: hc:ProvincialArchive
        has_note: Docket entries, hearing briefs, and judgment registers.
      description: Subnational adjudication documentation arranged as a recurring sequence
