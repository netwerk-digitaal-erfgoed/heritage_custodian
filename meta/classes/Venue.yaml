id: https://nde.nl/ontology/hc/class/Venue
name: Venue
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
  - linkml:types
  - ../slots/has_type
classes:
  Venue:
    class_uri: schema:Place
    broad_mappings:
    - schema:Place
    description: >-
      Physical site used for exhibitions, programs, performances, or events,
      modeled as a place rather than as the managing organization.
    alt_descriptions:
      nl: Fysieke locatie voor tentoonstellingen, programma's, uitvoeringen of evenementen, gemodelleerd als plaats en niet als beherende organisatie.
      de: Physischer Ort fuer Ausstellungen, Programme, Auffuehrungen oder Veranstaltungen, als Ort statt als traegende Organisation modelliert.
      fr: Site physique utilise pour expositions, programmes, performances ou evenements, modele comme lieu et non comme organisation gestionnaire.
      es: Sitio fisico usado para exposiciones, programas, actuaciones o eventos, modelado como lugar y no como organizacion gestora.
      ar: موقع مادي للمعارض والبرامج والعروض أو الفعاليات، يُنمذج كمكان لا كجهة إدارية.
      id: Lokasi fisik untuk pameran, program, pertunjukan, atau acara, dimodelkan sebagai tempat bukan organisasi pengelola.
      zh: 用于展览、活动或演出的实体场所，建模为地点而非管理机构。
    structured_aliases:
    - literal_form: evenementlocatie
      in_language: nl
    - literal_form: Veranstaltungsort
      in_language: de
    - literal_form: lieu d evenement
      in_language: fr
    - literal_form: sede de evento
      in_language: es
    - literal_form: موقع الفعالية
      in_language: ar
    - literal_form: lokasi acara
      in_language: id
    - literal_form: 活动场地
      in_language: zh
    slots:
    - has_type
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
