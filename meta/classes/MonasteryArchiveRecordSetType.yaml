id: https://nde.nl/ontology/hc/class/MonasteryArchiveRecordSetType
name: MonasteryArchiveRecordSetType
title: Monastery Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  MonasteryArchiveRecordSetType:
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: Record-set classifier for holdings commonly found in monastic archival custody.
    alt_descriptions:
      nl: Recordsetclassificatie voor collecties die vaak in monastieke archiefzorg voorkomen.
      de: Recordset-Klassifikator fuer Bestaende die typischerweise in monastischer Archivverwahrung vorkommen.
      fr: Classificateur de lots documentaires pour fonds couramment conserves dans des archives monastiques.
      es: Clasificador de conjuntos documentales para fondos habituales en custodia archivistica monastica.
      ar: مصنف مجموعات سجلات للمقتنيات الشائعة في الحفظ الأرشيفي الرهباني.
      id: Pengklasifikasi record set untuk koleksi yang lazim berada dalam kustodi arsip biara.
      zh: 用于修道院档案保管场景常见馆藏的记录集分类器。
    structured_aliases:
    - {literal_form: type kloosterarchiefrecordset, in_language: nl}
    - {literal_form: Typ Klosterarchiv-Recordset, in_language: de}
    - {literal_form: type de lot d archive monastique, in_language: fr}
    - {literal_form: tipo de conjunto de archivo monastico, in_language: es}
    - {literal_form: نوع مجموعة سجلات أرشيف ديري, in_language: ar}
    - {literal_form: tipe record set arsip biara, in_language: id}
    - {literal_form: 修道院档案记录集类型, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MonasteryArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
