id: https://nde.nl/ontology/hc/class/GeographicExtent
name: GeographicExtent
title: Geographic Extent Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
classes:
  GeographicExtent:
    class_uri: dcterms:Location
    description: >-
      Spatial area designation used to define geographic applicability, coverage,
      or jurisdictional boundaries.
    alt_descriptions:
      nl: >-
        Ruimtelijk gebiedsaanduiding gebruikt om geografische toepasbaarheid, dekking
        of jurisdictiegrenzen te definiëren.
      de: >-
        Räumliche Gebietsbezeichnung zur Definition geografischer Anwendbarkeit,
        Abdeckung oder Zuständigkeitsgrenzen.
      fr: >-
        Désignation de zone spatiale utilisée pour définir l'applicabilité géographique,
        la couverture ou les limites de juridiction.
      es: >-
        Designación de área espacial utilizada para definir la aplicabilidad geográfica,
        cobertura o límites jurisdiccionales.
      ar: >-
        تسمية المنطقة المكانية المستخدمة لتحديد قابلية التطبيق الجغرافي
        أو التغطية أو حدود الاختصاص.
      id: >-
        Penunjukan area spasial yang digunakan untuk mendefinisikan keterapan geografis,
        cakupan, atau batasan yurisdiksi.
      zh: >-
        用于定义地理适用性、覆盖范围或管辖边界的空间区域指定。
    structured_aliases:
    - literal_form: geografische reikwijdte
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: geografische Ausdehnung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: étendue géographique
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: extensión geográfica
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: المدى الجغرافي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: cakupan geografis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 地理范围
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - dcterms:Location
    close_mappings:
    - schema:Place
    slots:
    - identified_by
    - has_label
    comments:
    - Defines spatial scope for policies, services, or collection coverage.
    - Used in eligibility determination and jurisdictional mapping.
    - 'Preserved from prior description: Geographic area used to define spatial applicability or coverage.'
    keywords:
    - spatial coverage
    - geographic scope
    - jurisdictional extent
    - area designation
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.3
      specificity_rationale: Spatial scope descriptor for policies and eligibility.
