classes:
  SpecializedArchivesCzechiaRecordSetType:
    description: >-
      Classification for record collections maintained by specialized archives
      operating within the Czech national archival framework and legal system.
    alt_descriptions:
      nl: >-
        Classificatie voor archiefcollecties die worden beheerd door gespecialiseerde archieven
        die binnen het Tsjechische nationale archiefkader en rechtssysteem opereren.
      de: >-
        Klassifikation für Archivbestände, die von Facharchiven verwaltet werden,
        die im tschechischen nationalen Archivrahmen und Rechtssystem tätig sind.
      fr: >-
        Classification pour les collections de documents conservées par des archives spécialisées
        opérant dans le cadre archivistique national tchèque et le système juridique.
      es: >-
        Clasificación para colecciones de registros mantenidas por archivos especializados
        que operan dentro del marco archivístico nacional checo y el sistema legal.
      ar: >-
        تصنيف لمجموعات السجلات التي تحتفظ بها الأرشيفات المتخصصة
        العاملة ضمن الإطار الأرشيفي الوطني التشيكي والنظام القانوني.
      id: >-
        Klasifikasi untuk koleksi catatan yang dikelola oleh arsip khusus
        yang beroperasi dalam kerangka arsip nasional Ceko dan sistem hukum.
      zh: >-
        在捷克国家档案框架和法律体系内运作的专业档案维护的记录集合分类。
