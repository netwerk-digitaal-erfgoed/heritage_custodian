id: https://nde.nl/ontology/hc/class/DigitalPlatformTransformationMetadata
name: DigitalPlatformTransformationMetadata
title: Digital Platform Transformation Metadata
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
- linkml:types
classes:
  DigitalPlatformTransformationMetadata:
    class_uri: prov:Activity
    description: >-
      Process-trace activity capturing how profile records are generated,
      normalized, or reshaped across pipeline stages.
    alt_descriptions:
      nl: >-
        Procestrace-activiteit die vastlegt hoe profielrecords worden
        gegenereerd, genormaliseerd of hervormd over pijplijnfasen heen.
      de: >-
        Prozessspur-Aktivität, die erfasst, wie Profildatensätze über
        Pipeline-Stufen hinweg erzeugt, normalisiert oder umgeformt werden.
      fr: >-
        Activité de traçage de processus capturant la manière dont les
        enregistrements de profil sont générés, normalisés ou remaniés au fil
        des étapes du pipeline.
      es: >-
        Actividad de traza de proceso que captura cómo los registros de perfil
        se generan, normalizan o remodelan a través de etapas del pipeline.
      ar: >-
        نشاط تتبع للعملية يلتقط كيفية توليد سجلات الملف التعريفي أو
        تطبيعها أو إعادة تشكيلها عبر مراحل خط المعالجة.
      id: >-
        Aktivitas pelacakan proses yang menangkap bagaimana rekaman profil
        dihasilkan, dinormalisasi, atau dibentuk ulang di berbagai tahap
        pipeline.
      zh: >-
        用于记录资料记录在各处理流水线阶段如何生成、规范化或重塑的过程追踪活动。
    broad_mappings:
    - prov:Activity
    related_mappings:
    - prov:Entity
    - prov:used
    - prov:wasGeneratedBy
    structured_aliases:
    - literal_form: procestrace-activiteit
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Prozessspur-Aktivität
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: activité de traçage de processus
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: actividad de traza de proceso
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نشاط تتبع العملية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: aktivitas jejak proses
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 过程追踪活动
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Records operational provenance for normalization and transformation steps.
    - Supports reproducibility and auditability of profile-processing workflows.
    - 'Preserved from prior description: Transformation metadata describing how platform profile records were generated or normalized.'
    keywords:
    - process provenance
    - normalization step
    - transformation trace
    - pipeline audit
    examples:
    - value:
        has_label: ProfileNormalizationJob
        has_description: Canonicalized employer and role strings from source payload.
      description: Process trace documenting normalization of profile payload fields.
    slots: []
