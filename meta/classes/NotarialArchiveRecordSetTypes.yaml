id: https://nde.nl/ontology/hc/class/NotarialArchiveRecordSetTypes
name: NotarialArchiveRecordSetTypes
title: NotarialArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./NotarialArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  NotarialActsSeries:
    is_a: NotarialArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence containing formally authenticated civil
      instruments such as deeds, contracts, and attestations.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks met formeel geauthenticeerde civiele
        instrumenten zoals akten, contracten en attestaties.
      de: >-
        Geordnete Dokumentationsfolge mit formell beglaubigten
        zivilrechtlichen Urkunden wie Akten, Vertraegen und Bestaetigungen.
      fr: >-
        Sequence documentaire ordonnee contenant des instruments civils
        officiellement authentifies, tels que actes, contrats et attestations.
      es: >-
        Secuencia documental ordenada con instrumentos civiles autenticados
        formalmente, como escrituras, contratos y atestaciones.
      ar: >-
        تسلسل وثائقي منظم يضم صكوكاً مدنية موثقة رسمياً مثل العقود والوثائق
        والإقرارات.
      id: >-
        Urutan dokumenter terstruktur yang memuat instrumen perdata yang
        diautentikasi secara formal, seperti akta, kontrak, dan pengesahan.
      zh: >-
        按序编排的文献序列，包含经正式认证的民事文书，如契据、合同与证明文档。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - NotarialArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:NotarialActsSeries
      has_custodian:
        equals_string: hc:NotarialArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NotarialArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: reeks geauthenticeerde civiele instrumenten
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge beglaubigter zivilrechtlicher Instrumente
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence d'instruments civils authentifies
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia de instrumentos civiles autenticados
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة صكوك مدنية موثقة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan instrumen perdata terautentikasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 经认证民事文书序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Focuses on legally validated civil instruments created by public legal officers.
    - Often arranged chronologically or by office jurisdiction.
    - 'Preserved from prior description: Series of notarial deeds, contracts, and related legal acts.'
    keywords:
    - deed documentation
    - legal contracts
    - civil-law instruments
    - authenticated acts
    examples:
    - value:
        has_type: hc:NotarialActsSeries
        has_custodian: hc:NotarialArchive
        has_note: Deeds of sale and powers of attorney, 1890-1910.
      description: Documentary sequence of authenticated civil instruments
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  ProtocolSeries:
    is_a: NotarialArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Ordered documentary sequence of office registers that capture formal
      transaction entries, validation metadata, and procedural chronology.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van kantoorregisters met formele
        transactie-inschrijvingen, validatiemetadata en procedurele chronologie.
      de: >-
        Geordnete Dokumentationsfolge von Amtsregistern mit formalen
        Transaktionseintraegen, Validierungsmetadaten und Verfahrenschronologie.
      fr: >-
        Sequence documentaire ordonnee de registres de bureau consignant les
        transactions formelles, les metadonnees de validation et la chronologie.
      es: >-
        Secuencia documental ordenada de registros de oficina que recogen
        transacciones formales, metadatos de validacion y cronologia del tramite.
      ar: >-
        تسلسل وثائقي منظم لسجلات مكتبية توثق إدخالات المعاملات الرسمية
        وبيانات التحقق الوصفية والتسلسل الإجرائي.
      id: >-
        Urutan dokumenter teratur dari register kantor yang mencatat entri
        transaksi formal, metadata validasi, dan kronologi prosedural.
      zh: >-
        按序组织的办公登记文献序列，记录正式交易条目、校验元数据与流程时间顺序。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - NotarialArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:ProtocolSeries
      has_custodian:
        equals_string: hc:NotarialArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by NotarialArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: reeks formele transactieregisters
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Folge formaler Transaktionsregister
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: sequence de registres transactionnels formels
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: secuencia de registros formales de transacciones
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة سجلات معاملات رسمية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: urutan register transaksi formal
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 正式交易登记序列
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Captures register-based control documentation produced during legal office workflows.
    - Useful for tracing validation sequences and transaction chronology.
    - 'Preserved from prior description: Series of notarial protocol records.'
    keywords:
    - register entries
    - legal workflow
    - validation metadata
    - transaction chronology
    examples:
    - value:
        has_type: hc:ProtocolSeries
        has_custodian: hc:NotarialArchive
        has_note: Sequential protocol volumes recording validated deed entries.
      description: Register-based documentary sequence for formal transaction tracking
    annotations:
      custodian_types: '[''*'']'
