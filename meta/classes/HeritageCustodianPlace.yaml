id: https://nde.nl/ontology/hc/class/HeritageCustodianPlace
name: HeritageCustodianPlace
title: Heritage Custodian Place
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
classes:
  HeritageCustodianPlace:
    class_uri: schema:Place
    description: >-
      Place associated with a heritage custodian, such as repository,
      storage, service, or exhibition location.
    alt_descriptions:
      nl: Plaats geassocieerd met een erfgoedbeheerder zoals depot- opslag- dienstverlenings- of tentoonstellingslocatie.
      de: Ort mit Bezug zu einer Kulturerbe-Institution etwa Depot- Lager- Service- oder Ausstellungsstandort.
      fr: Lieu associe a un detenteur patrimonial par exemple depot stockage service ou exposition.
      es: Lugar asociado a un custodio patrimonial como repositorio almacenamiento servicio o sede de exposicion.
      ar: مكان مرتبط بجهة حفظ التراث مثل موقع الإيداع أو التخزين أو الخدمة أو العرض.
      id: Tempat yang terkait dengan kustodian warisan seperti repositori penyimpanan layanan atau lokasi pameran.
      zh: 与遗产保管机构相关的地点，如库房、存储、服务或展陈场所。
    structured_aliases:
    - {literal_form: erfgoedlocatie beheerder, in_language: nl}
    - {literal_form: Ort der Kulturerbe-Institution, in_language: de}
    - {literal_form: lieu du detenteur patrimonial, in_language: fr}
    - {literal_form: lugar de custodio patrimonial, in_language: es}
    - {literal_form: موقع جهة التراث, in_language: ar}
    - {literal_form: lokasi kustodian warisan, in_language: id}
    - {literal_form: 遗产保管机构地点, in_language: zh}
    broad_mappings:
    - schema:Place
    annotations:
      specificity_score: 0.5
      specificity_rationale: Moderately specific - custodian places heritage-domain.
      custodian_types: '[''*'']'
    examples:
    - value:
        place_name: Rijksarchief Noord-Holland
        custodian_uri: https://nde.nl/custodian/nha
        place_type: ARCHIVE
      description: Archive location
    slots:
    - has_label
