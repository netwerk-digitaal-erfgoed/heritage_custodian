id: https://nde.nl/ontology/hc/class/GeographicScope
name: GeographicScope
title: Geographic Scope Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label
  - ../slots/has_description
classes:
  GeographicScope:
    class_uri: skos:Concept
    description: >-
      Controlled vocabulary concept defining the territorial extent or coverage area of a collection or service.
    alt_descriptions:
      nl: >-
        Gecontroleerd vocabulaireconcept dat het territoriale bereik of de dekkingsgebied van een collectie of dienst definieert.
      de: >-
        Kontrolliertes Vokabularkonzept, das die territoriale Ausdehnung oder den Abdeckungsbereich einer Sammlung oder eines Dienstes definiert.
      fr: >-
        Concept de vocabulaire contrôlé définissant l'étendue territoriale ou la zone de couverture d'une collection ou d'un service.
      es: >-
        Concepto de vocabulario controlado que define la extensión territorial o el área de cobertura de una colección o servicio.
      ar: >-
        مفهوم مفردات مضبوطة يحدد المدى الإقليمي أو منطقة التغطية لمجموعة أو خدمة.
      id: >-
        Konsep kosakata terkendali yang mendefinisikan luas wilayah atau area cakupan koleksi atau layanan.
      zh: >-
        定义收藏或服务的领土范围或覆盖区域的受控词汇概念。
