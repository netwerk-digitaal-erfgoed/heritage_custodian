id: https://nde.nl/ontology/hc/class/VenueTypes
name: VenueTypes
title: Venue Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
  - ./VenueType
  - linkml:types
classes:
  MuseumVenue:
    is_a: VenueType
    description: >-
      Exhibition and collection display space within a museum institution.
    alt_descriptions:
      nl: >-
        Tentoonstellings- en collectieruimte binnen een museuminstelling.
      de: >-
        Ausstellungs- und Sammlungspräsentationsraum innerhalb einer Museumsinstitution.
      fr: >-
        Espace d'exposition et de présentation de collections au sein d'une institution muséale.
      es: >-
        Espacio de exhibición y presentación de colecciones dentro de una institución museística.
      zh: >-
        博物馆机构内的展览和藏品展示空间。
    broad_mappings:
      - skos:Concept
      - crm:E55_Type
    keywords:
      - museum
      - exhibition space
      - collection display
    annotations:
      custodian_types: '[''*'']'
  GalleryVenue:
    is_a: VenueType
    description: >-
      Art display and exhibition space, typically focused on visual arts.
    alt_descriptions:
      nl: >-
        Kunstweergave- en tentoonstellingsruimte, meestal gericht op beeldende kunst.
      de: >-
        Kunstdarstellungs- und Ausstellungsraum, typischerweise auf bildende Kunst ausgerichtet.
      fr: >-
        Espace de présentation et d'exposition d'art, généralement axé sur les arts visuels.
      es: >-
        Espacio de exhibición y presentación artística, típicamente enfocado en artes visuales.
      zh: >-
        艺术展示和展览空间，通常专注于视觉艺术。
    broad_mappings:
      - skos:Concept
    keywords:
      - gallery
      - art space
      - visual arts
    annotations:
      custodian_types: '[''*'']'
  LibraryVenue:
    is_a: VenueType
    description: >-
      Reading room, exhibition space, or event area within a library.
    alt_descriptions:
      nl: >-
        Leeszaal, tentoonstellingsruimte of evenementenruimte binnen een bibliotheek.
      de: >-
        Lesesaal, Ausstellungsraum oder Veranstaltungsbereich innerhalb einer Bibliothek.
      fr: >-
        Salle de lecture, espace d'exposition ou zone événementielle dans une bibliothèque.
      es: >-
        Sala de lectura, espacio de exhibición o área de eventos dentro de una biblioteca.
      zh: >-
        图书馆内的阅览室、展览空间或活动区域。
    broad_mappings:
      - skos:Concept
    keywords:
      - library
      - reading room
      - public event space
    annotations:
      custodian_types: '[''*'']'
  ArchiveVenue:
    is_a: VenueType
    description: >-
      Research room, exhibition space, or public area within an archival institution.
    alt_descriptions:
      nl: >-
        Onderzoeksruimte, tentoonstellingsruimte of openbaar gebied binnen een archiefinstelling.
      de: >-
        Forschungsraum, Ausstellungsraum oder öffentlicher Bereich innerhalb einer Archivinstitution.
      fr: >-
        Salle de recherche, espace d'exposition ou zone publique au sein d'une institution d'archives.
      es: >-
        Sala de investigación, espacio de exhibición o área pública dentro de una institución archivística.
      zh: >-
        档案机构内的研究室、展览空间或公共区域。
    broad_mappings:
      - skos:Concept
    keywords:
      - archive
      - research room
      - public access
    annotations:
      custodian_types: '[''*'']'
  CulturalCenterVenue:
    is_a: VenueType
    description: >-
      Multi-purpose cultural facility hosting events, exhibitions, and community activities.
    alt_descriptions:
      nl: >-
        Multifunctionele culturele faciliteit voor evenementen, tentoonstellingen en gemeenschapsactiviteiten.
      de: >-
        Multifunktionale kulturelle Einrichtung für Veranstaltungen, Ausstellungen und Gemeinschaftsaktivitäten.
      fr: >-
        Établissement culturel polyvalent accueillant événements, expositions et activités communautaires.
      es: >-
        Instalación cultural polivalente que acoge eventos, exposiciones y actividades comunitarias.
      zh: >-
        举办活动、展览和社区活动的多功能文化设施。
    broad_mappings:
      - skos:Concept
    keywords:
      - cultural center
      - community space
      - multi-purpose venue
    annotations:
      custodian_types: '[''*'']'
