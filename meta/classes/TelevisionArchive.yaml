      de: Ein Kulturerbeverwalter, der auf das Sammeln, Bewahren und Zugänglichmachen von Fernsehprogrammen, Aufnahmen und Sendungen spezialisiert ist.
      fr: Un dépositaire du patrimoine spécialisé dans la collecte, la préservation et la mise à disposition des programmes, enregistrements et émissions de télévision.
      es: 'Concepto para: A heritage custodian specialized in collecting, preserving, and providing access to programs, recordings, and broadcasts.'
