id: https://nde.nl/ontology/hc/class/ProgramTypes
name: ProgramTypes
title: Program Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - ./ProgramType
  - linkml:types
classes:
  VolunteerProgram:
    is_a: ProgramType
    description: >-
      Organized activity enabling public participation through unpaid service
      to support institutional operations and community engagement.
    alt_descriptions:
      nl: >-
        Georganiseerde activiteit die publieke deelname mogelijk maakt door onbetaalde dienstverlening
        ter ondersteuning van institutionele activiteiten en gemeenschapsbetrokkenheid.
      de: >-
        Organisierte Aktivität, die öffentliche Teilnahme durch unbezahlte Dienstleistung ermöglicht
        zur Unterstützung institutioneller Abläufe und des Community Engagements.
      fr: >-
        Activité organisée permettant la participation du public par un service non rémunéré
        pour soutenir les opérations institutionnelles et l'engagement communautaire.
      es: >-
        Actividad organizada que permite la participación pública a través de servicio no remunerado
        para apoyar las operaciones institucionales y el compromiso comunitario.
    structured_aliases:
      - literal_form: vrijwilligersprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Freiwilligenprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '["*"]'
  EducationalProgram:
    is_a: ProgramType
    description: >-
      Structured learning opportunity designed to transmit knowledge,
      develop skills, or foster understanding among diverse audiences.
    alt_descriptions:
      nl: >-
        Gestructureerde leermogelijkheid ontworpen om kennis over te dragen,
        vaardigheden te ontwikkelen of begrip te bevorderen bij diverse doelgroepen.
      de: >-
        Strukturierte Lerngelegenheit, die darauf ausgelegt ist, Wissen zu vermitteln,
        Fähigkeiten zu entwickeln oder das Verständnis bei verschiedenen Zielgruppen zu fördern.
      fr: >-
        Opportunité d'apprentissage structurée conçue pour transmettre des connaissances,
        développer des compétences ou favoriser la compréhension auprès de divers publics.
      es: >-
        Oportunidad de aprendizaje estructurada diseñada para transmitir conocimientos,
        desarrollar habilidades o fomentar la comprensión entre diversos públicos.
    structured_aliases:
      - literal_form: onderwijsprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Bildungsprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: '["*"]'
  OutreachProgram:
    is_a: ProgramType
    description: >-
      Initiative extending institutional services beyond physical boundaries
      to engage underserved or geographically distant communities.
    alt_descriptions:
      nl: >-
        Initiatief dat institutionele diensten uitbreidt buiten fysieke grenzen
        om onderbediende of geografisch afgelegen gemeenschappen te bereiken.
      de: >-
        Initiative, die institutionelle Dienstleistungen über physische Grenzen hinaus erweitert,
        um unterversorgte oder geografisch entfernte Gemeinschaften zu erreichen.
      fr: >-
        Initiative étendant les services institutionnels au-delà des frontières physiques
        pour atteindre les communautés mal desservies ou géographiquement éloignées.
      es: >-
        Iniciativa que extiende los servicios institucionales más allá de los límites físicos
        para alcanzar comunidades desatendidas o geográficamente distantes.
    structured_aliases:
      - literal_form: outreachprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Outreach-Programm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: '["*"]'
  InternshipProgram:
    is_a: ProgramType
    description: >-
      Supervised practical experience opportunity for students or early-career professionals
      to gain industry-specific skills and professional development.
    alt_descriptions:
      nl: >-
        Begeleide praktijkervaring voor studenten of jonge professionals
        om branchespecifieke vaardigheden en professionele ontwikkeling op te doen.
      de: >-
        Überwachte praktische Erfahrung für Studierende oder Berufseinsteiger,
        um branchenspezifische Fähigkeiten und berufliche Entwicklung zu erwerben.
      fr: >-
        Expérience pratique supervisée pour les étudiants ou jeunes professionnels
        afin d'acquérir des compétences spécifiques au secteur et un développement professionnel.
      es: >-
        Oportunidad de experiencia práctica supervisada para estudiantes o profesionales principiantes
        para adquirir habilidades específicas de la industria y desarrollo profesional.
    structured_aliases:
      - literal_form: stageprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Praktikumsprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: '["*"]'
  FellowshipProgram:
    is_a: ProgramType
    description: >-
      Competitive award providing scholars with funding, resources, and institutional access
      to conduct advanced research or creative work.
    alt_descriptions:
      nl: >-
        Competitieve toekenning die wetenschappers financiering, middelen en institutionele toegang biedt
        voor het uitvoeren van geavanceerd onderzoek of creatief werk.
      de: >-
        Wettbewerbsorientierte Auszeichnung, die Wissenschaftlern Finanzierung, Ressourcen und institutionellen Zugang
        für fortgeschrittene Forschung oder kreative Arbeit bietet.
      fr: >-
        Prix compétitif offrant aux chercheurs un financement, des ressources et un accès institutionnel
        pour mener des recherches avancées ou un travail créatif.
      es: >-
        Premio competitivo que proporciona a los académicos financiación, recursos y acceso institucional
        para realizar investigación avanzada o trabajo creativo.
    structured_aliases:
      - literal_form: fellowshipprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Stipendienprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: '["*"]'
  MembershipProgram:
    is_a: ProgramType
    description: >-
      Structured affiliation scheme offering benefits, privileges, or exclusive access
      in exchange for periodic financial support or subscription.
    alt_descriptions:
      nl: >-
        Gestructureerd lidmaatschapsregeling die voordelen, voorrechten of exclusieve toegang biedt
        in ruil voor periodieke financiële steun of abonnement.
      de: >-
        Strukturiertes Mitgliedschaftssystem, das Vorteile, Privilegien oder exklusiven Zugang
        im Austausch für regelmäßige finanzielle Unterstützung oder Abonnement bietet.
      fr: >-
        Régime d'affiliation structuré offrant des avantages, des privilèges ou un accès exclusif
        en échange d'un soutien financier périodique ou d'un abonnement.
      es: >-
        Esquema de afiliación estructurado que ofrece beneficios, privilegios o acceso exclusivo
        a cambio de apoyo financiero periódico o suscripción.
    structured_aliases:
      - literal_form: lidmaatschapsprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Mitgliedschaftsprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: '["*"]'
  AccessibilityProgram:
    is_a: ProgramType
    description: >-
      Initiative designed to remove barriers and ensure equitable access
      to services, collections, or spaces for persons with disabilities.
    alt_descriptions:
      nl: >-
        Initiatief ontworpen om barrières weg te nemen en gelijke toegang te waarborgen
        tot diensten, collecties of ruimtes voor mensen met een beperking.
      de: >-
        Initiative, die darauf ausgelegt ist, Barrieren zu beseitigen und gerechten Zugang
        zu Diensten, Sammlungen oder Räumen für Menschen mit Behinderungen zu gewährleisten.
      fr: >-
        Initiative conçue pour éliminer les obstacles et assurer un accès équitable
        aux services, collections ou espaces pour les personnes handicapées.
      es: >-
        Iniciativa diseñada para eliminar barreras y garantizar acceso equitativo
        a servicios, colecciones o espacios para personas con discapacidad.
    structured_aliases:
      - literal_form: toegankelijkheidsprogramma
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Barrierefreiheitsprogramm
        predicate: EXACT_SYNONYM
        in_language: de
    broad_mappings:
      - skos:Concept
      - crm:E7_Activity
    annotations:
      custodian_types: "['*']"
