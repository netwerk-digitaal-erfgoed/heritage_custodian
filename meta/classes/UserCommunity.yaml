id: https://nde.nl/ontology/hc/class/UserCommunity
name: UserCommunity
title: User Community
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_type
classes:
  UserCommunity:
    class_uri: schema:Audience
    alt_descriptions:
      nl: Doelgroep of gebruikersgemeenschap die door een instelling wordt bediend.
      de: Zielgruppe oder Nutzergemeinschaft, die von einer Institution bedient wird.
      fr: Public ou communaute d usagers servi par une institution.
      es: Audiencia o comunidad de usuarios atendida por una institucion.
      ar: جمهور أو مجتمع مستخدمين تخدمه مؤسسة.
      id: Komunitas pengguna atau audiens yang dilayani oleh institusi.
      zh: 由机构服务的用户群体或受众社区。
    structured_aliases:
    - literal_form: gebruikersgemeenschap
      in_language: nl
    - literal_form: Nutzergemeinschaft
      in_language: de
    - literal_form: communaute d usagers
      in_language: fr
    - literal_form: comunidad de usuarios
      in_language: es
    - literal_form: مجتمع مستخدمين
      in_language: ar
    - literal_form: komunitas pengguna
      in_language: id
    - literal_form: 用户社区
      in_language: zh
    description: Audience segment served by an institution for access, engagement, or service design.
    slots:
    - has_type
    broad_mappings:
    - schema:Audience
    annotations:
      specificity_score: '0.40'
      specificity_rationale: Moderately specific - user communities relevant to all
        institutions.
      custodian_types: '[''*'']'
      modeling_notes: Use for target audiences, user groups, and stakeholder communities.
    examples:
    - value:
        has_type: Researchers
