id: https://nde.nl/ontology/hc/class/NationalArchivesRecordSetType
name: NationalArchivesRecordSetType
title: NationalArchives Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
classes:
  NationalArchivesRecordSetType:
    description: >-
      Taxonomy node for aggregations of governmental records, state papers,
      and nationally significant documentary heritage.
    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties van overheidsverslagen, staatsstukken
        en nationaal significant documentair erfgoed.
      de: >-
        Taxonomieknoten für Aggregationen staatlicher Unterlagen, Staatspapiere und
        national bedeutsamer dokumentarischer Erbschaft.
      fr: >-
        Nœud taxonomique pour les agrégations de dossiers gouvernementaux, de documents
        d'État et de patrimoine documentaire d'importance nationale.
      es: >-
        Nodo taxonómico para agregaciones de registros gubernamentales, documentos de estado
        y patrimonio documental de importancia nacional.
      ar: >-
        عقدة تصنيفية لتجميعات السجلات الحكومية والوثائق الرسمية والتراث الوثائقي ذو الأهمية الوطنية.
      id: >-
        Simpul taksonomi untuk agregasi catatan pemerintah, dokumen negara, dan warisan
        dokumenter yang signifikan secara nasional.
      zh: >-
        用于聚合政府记录、国家文件和具有国家意义的文献遗产的分类法节点。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    structured_aliases:
    - {literal_form: nationaal archief recordsettype, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Nationalarchiv-Recordsettyp, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: type de jeu de documents des archives nationales, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: tipo de conjunto documental de archivos nacionales, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: نوع مجموعة سجلات الأرشيف الوطني, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: tipe set rekaman arsip nasional, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 国家档案记录集类型, predicate: EXACT_SYNONYM, in_language: zh}
    keywords:
    - governmental records
    - state papers
    - documentary heritage
    - national significance
    see_also:
    - NationalArchives
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    slot_usage:
      has_type:
        equals_string: NationalArchivesRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
