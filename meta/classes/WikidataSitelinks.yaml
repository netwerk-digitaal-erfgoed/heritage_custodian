id: https://nde.nl/ontology/hc/classes/WikidataSitelinks
name: WikidataSitelinks
title: Wikidata Sitelinks Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
  - linkml:types
classes:
  WikidataSitelinks:
    description: >-
      Language-specific Wikipedia article links keyed by site code.
    alt_descriptions:
      nl: >-
        Wikipedia-sitelinks uit Wikidata opgeslagen als woordenboek dat wiki-identifiers
        (bijv. enwiki, nlwiki, dewiki) koppelt aan hun bijbehorende artikeltitels.
      de: >-
        Wikipedia-Sitelinks aus Wikidata, gespeichert als Wörterbuch, das Wiki-Kennungen
        (z.B. enwiki, nlwiki, dewiki) ihren entsprechenden Artikeltiteln zuordnet.
      fr: >-
        Sitelinks Wikipedia de Wikidata stockés comme dictionnaire mappant les identifiants wiki
        (ex. enwiki, nlwiki, dewiki) à leurs titres d'article correspondants.
      es: >-
        Sitelinks de Wikipedia de Wikidata almacenados como diccionario que mapea identificadores wiki
        (ej. enwiki, nlwiki, dewiki) a sus títulos de artículo correspondientes.
      ar: >-
        روابط مواقع ويكيبيديا من ويكي بيانات مخزنة كقاموس يربط معرفات الويكي
        (مثل enwiki، nlwiki، dewiki) بعناوين مقالاتها المقابلة.
      id: >-
        Sitelink Wikipedia dari Wikidata disimpan sebagai kamus yang memetakan pengidentifikasi wiki
        (mis. enwiki, nlwiki, dewiki) ke judul artikel yang sesuai.
      zh: >-
        来自维基数据的维基百科站点链接，存储为字典，
        将wiki标识符（如enwiki、nlwiki、dewiki）映射到其对应的文章标题。
    broad_mappings:
      - linkml:Any
    slots: []
    comments:
      - Keys are wiki identifiers (enwiki, nlwiki, etc.)
      - Values are article titles on that Wikipedia
      - Links Wikidata entities to Wikipedia articles across languages
    keywords:
      - wikidata
      - sitelinks
      - wikipedia
      - articles
      - multilingual
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for sitelink storage
      custodian_types: "['*']"
    structured_aliases:
      - literal_form: wikidata-sitelinks
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Wikidata-Sitelinks
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: sitelinks Wikidata
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: enlaces Wikidata
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: روابط مواقع ويكي بيانات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: sitelink Wikidata
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 维基数据站点链接
        predicate: EXACT_SYNONYM
        in_language: zh
