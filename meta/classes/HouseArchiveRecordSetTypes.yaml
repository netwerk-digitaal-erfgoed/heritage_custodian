id: https://nde.nl/ontology/hc/class/HouseArchiveRecordSetTypes
name: HouseArchiveRecordSetTypes
title: House Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./HouseArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  HouseRecordsFonds:
    is_a: HouseArchiveRecordSetType
    class_uri: hc:HouseRecordsFonds
    description: >-
      A fonds of household and lineage records maintained according to provenance.
    alt_descriptions:
      nl: >-
        Een fonds met huishoudelijke en familie- of geslachtslijnarchieven, geordend volgens herkomst.
      de: >-
        Ein Fonds mit Haushalts- und Familien- bzw. Linienunterlagen, nach Provenienz geordnet.
      fr: >-
        Un fonds de documents domestiques et de lignage, conserve selon le principe de provenance.
      es: >-
        Un fondo de documentos domesticos y de linaje, conservado segun el principio de procedencia.
      ar: >-
        صندوق من سجلات الأسر والسلالات محفوظ وفق مبدأ المصدر/المنشأ.
      id: >-
        Sebuah fonds catatan rumah tangga dan garis keturunan yang dipelihara menurut prinsip provenance.
      zh: >-
        按来源原则保存的家族与家务相关记录全宗。
    structured_aliases:
    - literal_form: huisarchief fonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Hausarchivfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds d'archives de maison
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo de archivo de casa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: صندوق أرشيف المنزل
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds arsip rumah
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 家族档案全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - house records fonds
      - lineage records
      - family fonds
      - provenance-based archive
      - household documents
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:HouseArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds
  FamilyPapersCollection:
    is_a: HouseArchiveRecordSetType
    class_uri: hc:FamilyPapersCollection
    description: >-
      A collection of family papers and correspondence assembled for preservation and access.
    alt_descriptions:
      nl: >-
        Een collectie familiepapieren en correspondentie, samengesteld voor behoud en toegang.
      de: >-
        Eine Sammlung von Familienpapieren und Korrespondenz, zusammengestellt fuer Erhaltung und Zugang.
      fr: >-
        Une collection de papiers de famille et de correspondance constituee pour la conservation et l'acces.
      es: >-
        Una coleccion de papeles familiares y correspondencia reunida para su conservacion y acceso.
      ar: >-
        مجموعة من أوراق العائلة والمراسلات جُمعت للحفظ وإتاحة الاطلاع.
      id: >-
        Koleksi surat-menyurat dan dokumen keluarga yang dihimpun untuk pelestarian dan akses.
      zh: >-
        为保存与利用而汇集的家族文书与通信材料收藏。
    structured_aliases:
    - literal_form: familiepapieren collectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Familiensammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de papiers de famille
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de papeles familiares
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة أوراق العائلة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi dokumen keluarga
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 家族文书收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - family papers
      - personal correspondence
      - family documents
      - genealogical papers
      - ancestral records
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:HouseArchive"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
  EstateDocumentSeries:
    is_a: HouseArchiveRecordSetType
    class_uri: hc:EstateDocumentSeries
    description: >-
      A series of files documenting estate administration and property management.
    alt_descriptions:
      nl: >-
        Een serie dossiers over boedelbeheer en beheer van eigendommen.
      de: >-
        Eine Serie von Akten zur Nachlassverwaltung und Vermoegens- bzw. Liegenschaftsverwaltung.
      fr: >-
        Une serie de dossiers relatifs a l'administration d'une succession et a la gestion des biens.
      es: >-
        Una serie de expedientes sobre administracion de herencias y gestion de propiedades.
      ar: >-
        سلسلة ملفات توثق إدارة التركة وإدارة الممتلكات.
      id: >-
        Seri berkas yang mendokumentasikan administrasi warisan dan pengelolaan properti.
      zh: >-
        记录遗产管理与财产管理事务的文件系列。
    structured_aliases:
    - literal_form: boedeldossierserie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Nachlassaktenserie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie de dossiers successoraux
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de expedientes de herencia
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة ملفات التركة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri berkas warisan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 遗产管理文件系列
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - estate documents
      - property management
      - inheritance records
      - land administration
      - estate administration
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:HouseArchive"
    broad_mappings:
