classes:
  PublicArchive:
    description: >-
      Government-funded institution that preserves official records and provides citizen access to administrative documentation.
    alt_descriptions:
      nl: >-
        Door de overheid gefinancierde instelling die officiële archieven bewaart en burgers toegang geeft tot administratieve documentatie.
      de: >-
        Staatlich finanzierte Einrichtung, die offizielle Unterlagen bewahrt und Bürgern Zugang zu Verwaltungsdokumenten gewährt.
      fr: >-
        Institution financée par l'État qui préserve les archives officielles et fournit aux citoyens l'accès à la documentation administrative.
      es: >-
        Institución financiada por el gobierno que preserva registros oficiales y proporciona acceso ciudadano a documentación administrativa.
      ar: >-
        مؤسسة ممولة من الحكومة تحافظ على السجلات الرسمية وتوفر للمواطنين الوصول إلى الوثائق الإدارية.
      id: >-
        Lembaga yang didanai pemerintah yang melestarikan catatan resmi dan menyediakan akses warga ke dokumentasi administratif.
      zh: >-
        保存官方记录并向公民提供行政文件访问的政府资助机构。
