id: https://nde.nl/ontology/hc/classes/ValidationMetadata
name: ValidationMetadata
title: ValidationMetadata
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  shacl: http://www.w3.org/ns/shacl#
  dqv: http://www.w3.org/ns/dqv#
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
  - linkml:types
  - ../slots/generated_by
# default_range: string
classes:
  ValidationMetadata:
    alt_descriptions:
      nl: Metadata over validatie van claims, inclusief methode, tijdstip en uitkomst.
      de: Metadaten zur Validierung von Claims, einschliesslich Methode, Zeitstempel und Ergebnis.
      fr: Metadonnees de validation des assertions, incluant methode, horodatage et resultat.
      es: Metadatos de validacion de afirmaciones, incluyendo metodo, marca temporal y resultado.
      ar: بيانات وصفية لعملية التحقق من الادعاءات تشمل المنهجية والطابع الزمني والنتيجة.
      id: Metadata validasi klaim, termasuk metode, cap waktu, dan hasil.
      zh: 关于声明校验的元数据，包含方法、时间戳与结果。
    structured_aliases:
    - literal_form: validatiemetadata
      in_language: nl
    - literal_form: Validierungsmetadaten
      in_language: de
    - literal_form: metadonnees de validation
      in_language: fr
    - literal_form: metadatos de validacion
      in_language: es
    - literal_form: بيانات التحقق الوصفية
      in_language: ar
    - literal_form: metadata validasi
      in_language: id
    - literal_form: 校验元数据
      in_language: zh
    description: >-
      Process documentation capturing methods, timestamps, and outcomes of
      rule-based claim checking against quality criteria.
    class_uri: prov:Activity
    close_mappings:
    - dqv:QualityMeasurement
    related_mappings:
    - shacl:ValidationResult
    - prov:Entity
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
      modeling_notes: |
        Mapping rationale

        - class_uri: prov:Activity (validation is an activity)
        - close_mappings: dqv:QualityMeasurement (quality assessment outcome)
        - related_mappings: shacl:ValidationResult and prov:Entity
    slots:
    - generated_by
