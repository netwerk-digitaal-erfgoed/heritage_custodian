id: https://nde.nl/ontology/hc/class/TranscriptFormat
name: TranscriptFormat
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dct: http://purl.org/dc/terms/
imports:
  - linkml:types
  - ../slots/has_format
classes:
  TranscriptFormat:
    class_uri: dct:MediaType
    description: >-
      Media encoding specification for time-aligned textual renderings of spoken
      content.
    alt_descriptions:
      nl: Mediatype voor het coderen van tijdgesynchroniseerde transcripties of ondertitels.
      de: Medienformat zur Kodierung zeitlich synchronisierter Transkripte oder Untertitel.
      fr: Format de media servant a encoder des transcriptions ou sous-titres synchronises.
      es: Formato de medio para codificar transcripciones o subtitulos sincronizados en el tiempo.
      ar: صيغة وسائط لترميز نصوص تفريغ أو ترجمات متزامنة زمنيًا.
      id: Format media untuk pengodean transkrip atau teks terjemahan yang tersinkron waktu.
      zh: 用于编码时间对齐转写或字幕文本的媒体格式。
    structured_aliases:
    - literal_form: transcriptformaat
      in_language: nl
    - literal_form: Transkriptformat
      in_language: de
    - literal_form: format de transcription
      in_language: fr
    - literal_form: formato de transcripcion
      in_language: es
    - literal_form: تنسيق التفريغ النصي
      in_language: ar
    - literal_form: format transkrip
      in_language: id
    - literal_form: 转写格式
      in_language: zh
    keywords:
    - VTT
    - SRT
    - caption format
    slots:
    - has_format
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
