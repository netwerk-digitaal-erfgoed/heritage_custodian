id: https://w3id.org/nde/ontology/RegionalEconomicArchive
name: RegionalEconomicArchive
title: Regional Economic Archive
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- ../classes/AgentType
- linkml:types
- ../slots/identified_by
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  RegionalEconomicArchive:
    description: >-
      Archive documenting the economic history of a region, focusing on business,
      industrial, and commercial history within a specific geographic region.
    alt_descriptions:
      nl: Archief dat de economische geschiedenis van een regio documenteert.
      de: Archiv zur Dokumentation der Wirtschaftsgeschichte einer Region.
      fr: Archives documentant l'histoire économique d'une région.
    structured_aliases:
    - literal_form: regionaal economisch archief
      in_language: nl
    - literal_form: regionales Wirtschaftsarchiv
      in_language: de
    - literal_form: archives économiques régionales
      in_language: fr
    comments:
    - May hold records of regional businesses, trade associations, chambers of commerce.
    - Documents regional economic development.
    - Complements general regional archives.
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - skos:Concept
    - wd:Q2138319
    broad_mappings:
    - wd:Q166118
    slot_usage:
      identified_by:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: Regional Economic Archive
      skos:altLabel: "regionales Wirtschaftsarchiv, archivo económico regional"
      subject_domain: economic history
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - EconomicArchive
    - BusinessArchive
    - RegionalArchive
