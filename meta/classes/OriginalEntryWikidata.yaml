    description: >-
      Structured reference preserving Wikidata entity identifiers, labels, and metadata obtained from the source knowledge base.
    alt_descriptions:
      nl: >-
        Gestructureerde verwijzing die Wikidata-entiteitsidentificatoren, labels en metadata uit de bronkennisbank bewaart.
      de: >-
        Strukturierte Referenz, die Wikidata-Entitätskennungen, Bezeichnungen und Metadaten aus der Quell-Wissensbasis bewahrt.
      fr: >-
        Référence structurée préservant les identifiants d'entités, les étiquettes et les métadonnées Wikidata obtenus de la base de connaissances source.
      es: >-
        Referencia estructurada que preserva identificadores de entidades, etiquetas y metadatos de Wikidata obtenidos de la base de conocimientos fuente.
      ar: >-
        مرجع منظم يحافظ على معرفات كيانات ويكيبيديا والتسميات والبيانات الوصفية التي تم الحصول عليها من قاعدة المعرفة المصدر.
      id: >-
        Referensi terstruktur yang mempertahankan pengidentifikasi entitas, label, dan metadata Wikidata yang diperoleh dari basis pengetahuan sumber.
      zh: >-
        保留从源知识库获得的Wikidata实体标识符、标签和元数据的结构化引用。
