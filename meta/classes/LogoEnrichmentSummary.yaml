id: https://nde.nl/ontology/hc/classes/LogoEnrichmentSummary
name: LogoEnrichmentSummary
title: Logo Enrichment Summary Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
classes:
  LogoEnrichmentSummary:
    class_uri: schema:QuantitativeValue
    description: >-
      Aggregated quantitative metrics describing brand imagery extraction outcomes
      from web enrichment workflows.
    alt_descriptions:
      nl: >-
        Geaggregeerde kwantitatieve metrics die resultaten van merkbeeldextractie
        uit webverrijkingsworkflows beschrijven.
      de: >-
        Aggregierte quantitative Metriken, die Markengrafik-Extraktionsergebnisse
        aus Web-Anreicherungsworkflows beschreiben.
      fr: >-
        Métriques quantitatives agrégées décrivant les résultats d'extraction d'images de marque
        à partir de flux d'enrichissement Web.
      es: >-
        Métricas cuantitativas agregadas que describen resultados de extracción de imágenes de marca
        de flujos de enriquecimiento web.
      ar: >-
        مقاييس كمية مجمعة تصف نتائج استخراج صور العلامة التجارية
        من سير عمل إثراء الويب.
      id: >-
        Metrik kuantitatif teragregasi yang mendeskripsikan hasil ekstraksi gambar merek
        dari alur kerja pengayaan web.
      zh: >-
        描述从网络丰富工作流中提取品牌图像结果的聚合量化指标。
    structured_aliases:
    - literal_form: logo-verrijkings samenvatting
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Logo-Anreicherungszusammenfassung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: résumé d'enrichissement de logo
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: resumen de enriquecimiento de logotipo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: ملخص إثراء الشعار
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: ringkasan pengayaan logo
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 标识丰富摘要
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:QuantitativeValue
    related_mappings:
    - schema:PropertyValue
    comments:
    - Captures success rates, confidence scores, and extraction counts.
    - Used for monitoring enrichment pipeline performance.
    - 'Preserved from prior description: Summary metrics describing logo-enrichment extraction outcomes.'
    keywords:
    - extraction metrics
    - brand imagery
    - enrichment summary
    - pipeline performance
    annotations:
      specificity_score: 0.3
      specificity_rationale: Aggregated quantitative summary for logo extraction runs.
      custodian_types: '["*"]'
