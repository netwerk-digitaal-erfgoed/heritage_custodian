id: https://nde.nl/ontology/hc/class/WebArchiveRecordSetTypes
name: WebArchiveRecordSetTypes
title: WebArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./WebArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  WebCaptureCollection:
    is_a: WebArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Aggregation of harvested online-site snapshots produced through automated
      or manual born-digital preservation workflows.
    alt_descriptions:
      nl: RecordSetType voor website-captures.
      de: RecordSetType für Website-Erfassungen.
      fr: Type de collection pour les captures de sites web.
      es: Tipo de colección para capturas de sitios web.
      ar: نوع المجموعة لالتقاطات مواقع الويب.
      id: Tipe koleksi untuk tangkapan situs web.
      zh: 网站捕获的收藏类型。
    structured_aliases:
    - literal_form: website-capturecollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Website-Capture-Sammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de captures web
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de capturas web
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة التقاطات الويب
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi tangkapan web
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 网页捕获收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - RiC-O specialized RecordSetType for website capture collections.
    - 'Preserved from prior description: Aggregation of captured websites harvested through automated or manual web archiving processes.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - WebArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:WebCaptureCollection
      has_custodian:
        equals_string: hc:WebArchive
      has_note:
        equals_string: This RecordSetType is typically held by WebArchive custodians. Inverse of rico:isOrWasHolderOf.
    keywords:
    - website capture
    - web harvest
    - born-digital preservation
    - automated capture
    - snapshot collection
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  SocialMediaCollection:
    is_a: WebArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Aggregation of preserved networked-platform content including posts,
      profiles, and interactions from multiple services.
    alt_descriptions:
      nl: RecordSetType voor sociale media-archieven.
      de: RecordSetType für Social-Media-Archive.
      fr: Type de collection pour les archives des médias sociaux.
      es: Tipo de colección para archivos de redes sociales.
      ar: نوع المجموعة لأرشيفات وسائل التواصل الاجتماعي.
      id: Tipe koleksi untuk arsip media sosial.
      zh: 社交媒体档案的收藏类型。
    structured_aliases:
    - literal_form: socialemediacollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Social-Media-Sammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de médias sociaux
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: colección de redes sociales
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة وسائل التواصل
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi media sosial
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 社交媒体收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - RiC-O specialized RecordSetType for social media archive collections.
    - 'Preserved from prior description: Aggregation of archived social media content including posts, profiles, and interactions from various platforms.'
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - WebArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:SocialMediaCollection
      has_custodian:
        equals_string: hc:WebArchive
      has_note:
        equals_string: This RecordSetType is typically held by WebArchive custodians. Inverse of rico:isOrWasHolderOf.
    keywords:
    - social media
    - platform content
    - posts
    - profiles
    - interactions
    - networked platforms
