id: https://nde.nl/ontology/hc/class/FoundationArchiveRecordSetTypes
name: FoundationArchiveRecordSetTypes
title: Foundation Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
  - ./FoundationArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  FoundationAdministrationFonds:
    is_a: FoundationArchiveRecordSetType
    class_uri: hc:FoundationAdministrationFonds
    description: >-
      Provenance-based aggregation of governance and operational documentation
      produced by philanthropic endowment management bodies.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van bestuurs- en operationele documentatie
        van filantropische vermogens- en fondsbeheerorganen.
      de: >-
        Provenienzbasierte Aggregation von Leitungs- und Betriebsunterlagen
        von Organen zur Verwaltung philanthropischer Vermoegen.
      fr: >-
        Agregation fondee sur la provenance de documentation de gouvernance
        et d'exploitation produite par des organes de gestion philanthropique.
      es: >-
        Agregacion basada en procedencia de documentacion de gobierno
        y operacion producida por organos de gestion filantropica.
      ar: >-
        تجميع قائم على المنشأ لوثائق الحوكمة والتشغيل الصادرة عن
        هيئات إدارة الأموال الخيرية.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi tata kelola
        dan operasional yang dihasilkan badan pengelola dana filantropi.
      zh: >-
        基于来源原则聚合慈善基金管理机构形成的治理与运营文献。
    structured_aliases:
      - literal_form: fonds beheer filantropisch vermogen
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Fonds philanthropischer Vermoegensverwaltung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: fonds de gestion philanthropique
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: fondo de gestion filantropica
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: رصيد إدارة تمويل خيري
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: fonds pengelolaan filantropi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 慈善基金管理文献全宗
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Scope covers both governance decisions and operational administration.
    keywords:
      - philanthropic governance
      - endowment management
      - operational administration
      - provenance aggregation
    examples:
      - value:
          has_type: hc:FoundationAdministrationFonds
          has_custodian: hc:FoundationArchive
          has_note: Board minutes, statutes, and internal policy dossiers.
        description: Governance documentation grouped by originating management body.
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:FoundationAdministrationFonds
      has_custodian:
        equals_string: hc:FoundationArchive
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Fonds

  GrantRecordSeries:
    is_a: FoundationArchiveRecordSetType
    class_uri: hc:GrantRecordSeries
    description: >-
      Ordered documentary sequence of funding requests, award decisions,
      reporting cycles, and compliance evidence.
    alt_descriptions:
      nl: >-
        Geordende documentaire reeks van financieringsaanvragen,
        toekenningsbesluiten, rapportagecycli en nalevingsbewijzen.
      de: >-
        Geordnete Dokumentationsfolge von Foerderantraegen,
        Bewilligungsentscheidungen, Berichtzyklen und Compliance-Nachweisen.
      fr: >-
        Sequence documentaire ordonnee de demandes de financement,
        decisions d'attribution, cycles de rapportage et preuves de conformite.
      es: >-
        Secuencia documental ordenada de solicitudes de financiacion,
        decisiones de concesion, ciclos de informes y evidencia de cumplimiento.
      ar: >-
        تسلسل وثائقي منظم لطلبات التمويل وقرارات المنح
        ودورات التقارير وأدلة الامتثال.
      id: >-
        Urutan dokumenter teratur untuk permohonan pendanaan,
        keputusan pemberian, siklus pelaporan, dan bukti kepatuhan.
      zh: >-
        由资助申请、授予决策、报告周期与合规证据构成的有序文献序列。
    structured_aliases:
      - literal_form: reeks financieringsaanvraagtrajecten
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Folge von Foerderverfahren
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: sequence des parcours de financement
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: secuencia de tramites de financiacion
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: سلسلة مسارات التمويل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: urutan proses pendanaan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 资助流程文献序列
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Includes decision-making and post-award accountability cycles.
    keywords:
      - funding request
      - award decision
      - reporting cycle
      - compliance evidence
    examples:
      - value:
          has_type: hc:GrantRecordSeries
          has_custodian: hc:FoundationArchive
          has_note: Application dossiers with award letters and reporting submissions.
        description: Funding lifecycle documentation arranged as a recurring sequence.
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:GrantRecordSeries
      has_custodian:
        equals_string: hc:FoundationArchive
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Series

  ProjectDocumentationCollection:
    is_a: FoundationArchiveRecordSetType
    class_uri: hc:ProjectDocumentationCollection
    description: >-
      Assembled documentary body of funded-activity outputs,
      evaluation materials, and supporting contextual evidence.
    alt_descriptions:
      nl: >-
        Samengesteld documentaire geheel van outputs van gefinancierde activiteiten,
        evaluatiemateriaal en ondersteunend contextueel bewijsmateriaal.
      de: >-
        Zusammengestellter Dokumentkoerper aus Ergebnissen gefoerderter Aktivitaeten,
        Evaluationsmaterialien und unterstuetzenden Kontextnachweisen.
      fr: >-
        Ensemble documentaire reuni de productions d'activites financees,
        de materiaux d'evaluation et de preuves contextuelles.
      es: >-
        Cuerpo documental reunido de resultados de actividades financiadas,
        materiales de evaluacion y evidencias contextuales.
      ar: >-
        جسم وثائقي مُجمع من مخرجات أنشطة ممولة ومواد تقييم
        وأدلة سياقية داعمة.
      id: >-
        Kumpulan dokumenter terhimpun dari keluaran aktivitas didanai,
        materi evaluasi, dan bukti konteks pendukung.
      zh: >-
        汇集受资助活动产出、评估材料与背景证据的文献整体。
    structured_aliases:
      - literal_form: collectie output en evaluatie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Sammlung von Ergebnissen und Evaluationen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: collection de productions et evaluations
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: coleccion de resultados y evaluaciones
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: مجموعة مخرجات وتقييمات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: koleksi keluaran dan evaluasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 产出与评估文献汇编
        predicate: EXACT_SYNONYM
        in_language: zh
    comments:
      - Note preserved: Assembles evidence used to assess outcomes and contextualize funded activity.
    keywords:
      - funded output
      - evaluation material
      - contextual evidence
      - assembled documentation
    examples:
      - value:
          has_type: hc:ProjectDocumentationCollection
          has_custodian: hc:FoundationArchive
          has_note: Final reports, evaluation rubrics, and outcome evidence attachments.
        description: Output and evaluation evidence assembled for accountability and learning.
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_type:
        equals_string: hc:ProjectDocumentationCollection
      has_custodian:
        equals_string: hc:FoundationArchive
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
