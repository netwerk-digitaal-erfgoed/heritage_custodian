id: https://nde.nl/ontology/hc/classes/LayoutMetadata
name: LayoutMetadata
title: Layout Metadata
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
classes:
  LayoutMetadata:
    class_uri: hc:LayoutMetadata
    description: >-
      Structural analysis summary describing page layout extraction outcomes for archived web content snapshots.
    alt_descriptions:
      nl: >-
        Structurele analysesamenvatting die de resultaten van paginalay-outextractie voor gearchiveerde webinhoudsnapshots beschrijft.
      de: >-
        Strukturanalyse-Zusammenfassung, die die Ergebnisse der Seitenlayout-Extraktion für archivierte Web-Inhalts-Momentaufnahmen beschreibt.
      fr: >-
        Résumé d'analyse structurelle décrivant les résultats d'extraction de mise en page pour les instantanés de contenu Web archivés.
      es: >-
        Resumen de análisis estructural que describe los resultados de extracción de diseño de página para instantáneas de contenido web archivado.
      ar: >-
        ملخص تحليل هيكلي يصف نتائج استخراج تخطيط الصفحة للقطات محتوى الويب المؤرشفة.
      id: >-
        Ringkasan analisis struktural yang mendeskripsikan hasil ekstraksi tata letak halaman untuk snapshot konten web yang diarsipkan.
      zh: >-
        描述存档网页内容快照的页面布局提取结果的结构分析摘要。
    structured_aliases:
    - literal_form: lay-outmetadata
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Layout-Metadaten
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: métadonnées de mise en page
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: metadatos de diseño
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: بيانات تخطيط الصفحة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: metadata tata letak
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 布局元数据
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_page_count
    - has_provenance_path
    broad_mappings:
    - prov:Entity
    close_mappings:
    - schema:DataCatalog
    comments:
    - Captures page structure metrics from web archive processing.
    - Used for quality assessment of archived web content extraction.
    - 'Preserved from prior description: Structural extraction summary describing page-layout analysis outcomes for archived web content snapshots.'
    keywords:
    - page layout
    - web archive analysis
    - structural extraction
    - content snapshot
