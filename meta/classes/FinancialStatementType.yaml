id: https://nde.nl/ontology/hc/class/FinancialStatementType
name: FinancialStatementType
title: FinancialStatementType
imports:
- linkml:types
- ../slots/has_label
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
classes:
  FinancialStatementType:
    class_uri: skos:Concept
    description: >-
      Taxonomy concept for classifying the documentary form of a financial
      statement, such as annual report or audit report.
    alt_descriptions:
      nl: Taxonomieconcept voor classificatie van de documentaire vorm van een financieel verslag zoals jaarverslag of accountantsrapport.
      de: Taxonomiekonzept zur Klassifikation der dokumentarischen Form eines Finanzberichts etwa Jahresbericht oder Pruefbericht.
      fr: Concept taxonomique pour classer la forme documentaire d un etat financier comme rapport annuel ou rapport d audit.
      es: Concepto taxonomico para clasificar la forma documental de un estado financiero como informe anual o de auditoria.
      ar: مفهوم تصنيفي لتصنيف الشكل الوثائقي للبيان المالي مثل التقرير السنوي أو تقرير التدقيق.
      id: Konsep taksonomi untuk mengklasifikasikan bentuk dokumenter laporan keuangan seperti laporan tahunan atau audit.
      zh: 用于对财务报表文献形态进行分类的分类学概念，如年报或审计报告。
    structured_aliases:
    - {literal_form: type financieel verslag, in_language: nl}
    - {literal_form: Finanzberichtstyp, in_language: de}
    - {literal_form: type d etat financier, in_language: fr}
    - {literal_form: tipo de estado financiero, in_language: es}
    - {literal_form: نوع البيان المالي, in_language: ar}
    - {literal_form: tipe laporan keuangan, in_language: id}
    - {literal_form: 财务报表类型, in_language: zh}
    broad_mappings:
    - skos:Concept
    slots:
    - has_label
    annotations:
      custodian_types: '["*"]'
