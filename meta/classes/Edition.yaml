id: https://nde.nl/ontology/hc/class/Edition
name: Edition
title: Edition Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  bf: http://id.loc.gov/ontologies/bibframe/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
- ../metadata
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_note
classes:
  Edition:
    class_uri: bf:Edition
    description: >-
      Bibliographic designation indicating a particular issued version of a
      work, including numbering and revision statements.
    alt_descriptions:
      nl: Bibliografische aanduiding van een specifieke uitgaveversie van een werk inclusief nummering en revisievermeldingen.
      de: Bibliografische Bezeichnung einer bestimmten Ausgabeversion eines Werks mit Nummerierung und Revisionshinweisen.
      fr: Designation bibliographique indiquant une version publiee particuliere d une oeuvre avec numerotation et mentions de revision.
      es: Designacion bibliografica que indica una version publicada concreta de una obra con numeracion y notas de revision.
      ar: توصيف ببليوغرافي يحدد نسخة منشورة معينة من عمل ما مع الترقيم وبيانات المراجعة.
      id: Penanda bibliografis yang menunjukkan versi terbit tertentu dari suatu karya termasuk penomoran dan pernyataan revisi.
      zh: 标示作品特定发行版本的书目说明，含版本编号与修订声明。
    structured_aliases:
    - {literal_form: editie, in_language: nl}
    - {literal_form: Ausgabe, in_language: de}
    - {literal_form: edition, in_language: fr}
    - {literal_form: edicion, in_language: es}
    - {literal_form: طبعة, in_language: ar}
    - {literal_form: edisi, in_language: id}
    - {literal_form: 版本次, in_language: zh}
    exact_mappings:
    - bf:Edition
    slots:
    - identified_by
    - has_label
    - has_note
    slot_usage:
      identified_by:
      has_label:
      has_note:
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.4
      specificity_rationale: Common bibliographic and event metadata.
