id: https://nde.nl/ontology/hc/class/PermissionType
name: PermissionType
title: Permission Type (Abstract Base)
description: >-
  Abstract base class for types of permissions/authorizations required to access
  heritage materials.

  **TYPE/TYPES PATTERN (Rule 0b)**:
  - This file: Abstract base class (PermissionType.yaml)
  - Subclasses file: Concrete permission types (PermissionTypes.yaml)

  **USE CASES**:
  - Ecclesiastical archives requiring bishop's permission
  - Research archives requiring institutional affiliation
  - Restricted collections requiring special clearance

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#

default_prefix: hc

imports:
- linkml:types
classes:
  PermissionType:
    class_uri: hc:PermissionType
    abstract: true
    description: >-
      Abstract base class for permission/authorization types.
      Subclasses define specific permission categories.
    alt_descriptions:
      nl: Abstract basistype voor typen toestemmingen of autorisaties.
      de: Abstrakter Basistyp fuer Arten von Genehmigungen oder Autorisierungen.
      fr: Type de base abstrait pour les categories d autorisations.
      es: Tipo base abstracto para categorias de permisos o autorizaciones.
      ar: نوع أساس مجرد لفئات الأذونات أو التفويضات.
      id: Tipe dasar abstrak untuk kategori izin atau otorisasi.
      zh: 用于权限/授权类别的抽象基础类型。
    structured_aliases:
    - {literal_form: type toestemming, in_language: nl}
    - {literal_form: Genehmigungstyp, in_language: de}
    - {literal_form: type d autorisation, in_language: fr}
    - {literal_form: tipo de permiso, in_language: es}
    - {literal_form: نوع إذن, in_language: ar}
    - {literal_form: tipe izin, in_language: id}
    - {literal_form: 权限类型, in_language: zh}
    close_mappings:
    - rico:AccessCondition
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.5
