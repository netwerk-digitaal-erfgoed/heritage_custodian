id: https://nde.nl/ontology/hc/class/PermissionTypes
name: PermissionTypes
title: Permission Types (Concrete Subclasses)
description: 'Concrete permission type subclasses.

  **TYPE/TYPES PATTERN (Rule 0b)**: - Base class file: PermissionType.yaml (abstract) - This file: Concrete subclasses'
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- ./PermissionType
- linkml:types
classes:
  BishopsPermission:
    is_a: PermissionType
    class_uri: hc:BishopsPermission
    description: Permission granted by a bishop as a prerequisite for access to restricted ecclesiastical records.
    alt_descriptions:
      nl: Toestemming van een bisschop als voorwaarde voor toegang tot beperkte kerkelijke archieven.
      de: Von einem Bischof erteilte Genehmigung als Voraussetzung fuer den Zugang zu eingeschraenkten kirchlichen Unterlagen.
      fr: Autorisation accordee par un eveque comme condition d acces a des archives ecclesiastiques restreintes.
      es: Permiso otorgado por un obispo como condicion para acceder a archivos eclesiasticos restringidos.
      ar: إذن يمنحه الأسقف كشرط للوصول إلى سجلات كنسية مقيّدة.
      id: Izin yang diberikan uskup sebagai prasyarat akses ke arsip gerejawi yang dibatasi.
      zh: 由主教授予、作为访问受限教会档案之先决条件的许可。
    structured_aliases:
    - {literal_form: bisschoppelijke toestemming, in_language: nl}
    - {literal_form: bischofliche Genehmigung, in_language: de}
    - {literal_form: autorisation episcopale, in_language: fr}
    - {literal_form: permiso del obispo, in_language: es}
    - {literal_form: إذن الأسقف, in_language: ar}
    - {literal_form: izin uskup, in_language: id}
    - {literal_form: 主教许可, in_language: zh}
    keywords:
    - bishop permission
    - ecclesiastical
    - church archives
    - restricted access
    annotations:
      custodian_types: '["H"]'
      specificity_score: 0.8
    broad_mappings:
    - skos:Concept
  InstitutionalAffiliation:
    is_a: PermissionType
    class_uri: hc:InstitutionalAffiliation
    description: Requirement that a user is affiliated with an accredited institution.
    alt_descriptions:
      nl: Vereiste dat een gebruiker verbonden is aan een erkende instelling.
      de: Anforderung dass eine Person einer anerkannten Einrichtung angehoert.
      fr: Exigence d affiliation a un organisme accredite.
      es: Requisito de afiliacion a una institucion acreditada.
      ar: شرط الانتماء إلى مؤسسة معتمدة.
      id: Persyaratan afiliasi dengan institusi terakreditasi.
      zh: 要求使用者隶属于经认可的机构。
    structured_aliases:
    - {literal_form: institutionele affiliatie, in_language: nl}
    - {literal_form: institutionelle Zugehoerigkeit, in_language: de}
    - {literal_form: affiliation institutionnelle, in_language: fr}
    - {literal_form: afiliacion institucional, in_language: es}
    - {literal_form: انتماء مؤسسي, in_language: ar}
    - {literal_form: afiliasi institusi, in_language: id}
    - {literal_form: 机构隶属要求, in_language: zh}
    keywords:
    - institutional affiliation
    - accredited institution
    - academic access
    - membership
    annotations:
      custodian_types: '["A", "L", "R"]'
      specificity_score: 0.6
    broad_mappings:
    - skos:Concept

  SecurityClearance:
    is_a: PermissionType
    class_uri: hc:SecurityClearance
    description: Requirement that a user holds a security clearance of a specified level.
    alt_descriptions:
      nl: Vereiste dat een gebruiker een beveiligingsmachtiging van een bepaald niveau heeft.
      de: Anforderung dass eine Person eine Sicherheitsfreigabe einer bestimmten Stufe besitzt.
      fr: Exigence qu un utilisateur detienne une habilitation de securite d un niveau donne.
      es: Requisito de que un usuario posea una autorizacion de seguridad de un nivel especifico.
      ar: شرط امتلاك المستخدم تصريحا امنيا بمستوى محدد.
      id: Persyaratan bahwa pengguna memiliki izin keamanan pada tingkat tertentu.
      zh: 要求使用者具有特定等级的安全许可。
    structured_aliases:
    - {literal_form: beveiligingsmachtiging, in_language: nl}
    - {literal_form: Sicherheitsfreigabe, in_language: de}
    - {literal_form: habilitation de securite, in_language: fr}
    - {literal_form: autorizacion de seguridad, in_language: es}
    - {literal_form: تصريح امني, in_language: ar}
    - {literal_form: izin keamanan, in_language: id}
    - {literal_form: 安全许可, in_language: zh}
    keywords:
    - security clearance
    - classified access
    - authorization level
    - vetting
    annotations:
      custodian_types: '["O", "A"]'
      specificity_score: 0.7
    broad_mappings:
    - skos:Concept

  OwnerConsent:
    is_a: PermissionType
    class_uri: hc:OwnerConsent
    description: Requirement that access is granted by the owner, donor, or rights holder.
    alt_descriptions:
      nl: Vereiste dat toegang wordt verleend door de eigenaar schenker of rechthebbende.
      de: Anforderung dass der Zugang durch Eigentuermer Stifter oder Rechteinhaber gewaehrt wird.
      fr: Exigence d autorisation du proprietaire donateur ou titulaire de droits.
      es: Requisito de autorizacion del propietario donante o titular de derechos.
      ar: شرط الحصول على موافقة المالك أو المتبرع أو صاحب الحقوق.
      id: Persyaratan persetujuan dari pemilik donor atau pemegang hak.
      zh: 要求由所有者、捐赠者或权利人授权访问。
    structured_aliases:
    - {literal_form: toestemming eigenaar, in_language: nl}
    - {literal_form: Zustimmung des Eigentuemers, in_language: de}
    - {literal_form: accord du proprietaire, in_language: fr}
    - {literal_form: consentimiento del propietario, in_language: es}
    - {literal_form: موافقة المالك, in_language: ar}
    - {literal_form: persetujuan pemilik, in_language: id}
    - {literal_form: 所有者同意, in_language: zh}
    keywords:
    - owner consent
    - donor permission
    - rights holder
    - authorization
    annotations:
      custodian_types: '["P", "A"]'
      specificity_score: 0.6
    broad_mappings:
    - skos:Concept

  AppointmentRequired:
    is_a: PermissionType
    class_uri: hc:AppointmentRequired
    description: Requirement that access is scheduled by appointment.
    alt_descriptions:
      nl: Vereiste dat toegang op afspraak plaatsvindt.
      de: Anforderung dass der Zugang nach Terminvereinbarung erfolgt.
      fr: Exigence d acces sur rendez-vous.
      es: Requisito de acceso con cita previa.
      ar: شرط الوصول عبر موعد مسبق.
      id: Persyaratan akses dengan janji terlebih dahulu.
      zh: 要求预约后方可访问。
    structured_aliases:
    - {literal_form: toegang op afspraak, in_language: nl}
    - {literal_form: Zugang nach Termin, in_language: de}
    - {literal_form: acces sur rendez-vous, in_language: fr}
    - {literal_form: acceso con cita, in_language: es}
    - {literal_form: وصول بموعد, in_language: ar}
    - {literal_form: akses dengan janji, in_language: id}
    - {literal_form: 预约访问, in_language: zh}
    keywords:
    - appointment
    - scheduled access
    - booking required
    - reservation
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.4
    broad_mappings:
    - skos:Concept

  RegistrationRequired:
    is_a: PermissionType
    class_uri: hc:RegistrationRequired
    description: Requirement that a user registers (e.g., gets a reader card) before access.
    alt_descriptions:
      nl: Vereiste dat een gebruiker zich registreert (bijv. lezerspas) voor toegang.
      de: Anforderung dass sich eine Person vor dem Zugang registriert (z.B. Lesekarte).
      fr: Exigence d inscription (par ex. carte de lecteur) avant l acces.
      es: Requisito de registro (p. ej. carnet de lector) antes del acceso.
      ar: شرط التسجيل (مثل بطاقة قارئ) قبل الوصول.
      id: Persyaratan pendaftaran (mis. kartu pembaca) sebelum akses.
      zh: 要求先行登记（如读者证）后方可访问。
    structured_aliases:
    - {literal_form: registratie verplicht, in_language: nl}
    - {literal_form: Registrierung erforderlich, in_language: de}
    - {literal_form: inscription requise, in_language: fr}
    - {literal_form: registro requerido, in_language: es}
    - {literal_form: التسجيل مطلوب, in_language: ar}
    - {literal_form: pendaftaran wajib, in_language: id}
    - {literal_form: 需注册, in_language: zh}
    keywords:
    - registration
    - reader card
    - signup required
    - membership
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.3
    broad_mappings:
    - skos:Concept
