id: https://nde.nl/ontology/hc/class/TargetHumidity
name: TargetHumidity
title: Target Humidity Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  qudt: http://qudt.org/schema/qudt/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_measurement_unit
- ../slots/has_value
classes:
  TargetHumidity:
    class_uri: schema:QuantitativeValue
    description: >-
      Desired relative level for environmental control in heritage preservation contexts.
    alt_descriptions:
      nl: Gewenst relatief vochtigheidsniveau voor omgevingsbeheersing in erfgoedbehoud.
      de: Gewünschte relative Luftfeuchtigkeit für die Umweltkontrolle in der Denkmalpflege.
      fr: Niveau d'humidité relative cible pour le contrôle environnemental en conservation du patrimoine.
      es: Nivel de humedad relativa objetivo para el control ambiental en conservación del patrimonio.
      ar: مستوى الرطوبة النسبية المستهدف للتحكم البيئي في حفظ التراث.
      id: Tingkat kelembaban relatif target untuk pengendalian lingkungan dalam pelestarian warisan.
      zh: 遗产保护环境控制的目标相对湿度水平。
    broad_mappings:
    - schema:QuantitativeValue
    keywords:
    - humidity
    - environmental control
    - conservation
    - setpoint
    slots:
    - has_value
    - has_measurement_unit
    slot_usage:
      has_value:
        range: float
        required: true
      has_measurement_unit:
        ifabsent: string(%)
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class.
      custodian_types: "['*']"
    structured_aliases:
    - literal_form: target humidity
      in_language: nl
    - literal_form: target humidity
      in_language: de
    - literal_form: target humidity
      in_language: fr
    - literal_form: target humidity
      in_language: es
    - literal_form: target humidity
      in_language: ar
    - literal_form: target humidity
      in_language: id
    - literal_form: target humidity
      in_language: zh
