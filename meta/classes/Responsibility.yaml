id: https://nde.nl/ontology/hc/class/Responsibility
name: Responsibility
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  skos: http://www.w3.org/2004/02/skos/core#
imports:
- linkml:types
- ../slots/has_type
classes:
  Responsibility:
    class_uri: org:Role
    description: >-
      A responsibility or duty assigned to a person or position within a heritage organization.
    alt_descriptions:
      nl: Een verantwoordelijkheid of taak toegewezen aan een persoon of positie binnen een erfgoedorganisatie.
      de: Eine Verantwortung oder Pflicht, die einer Person oder Position innerhalb einer Heritage-Organisation zugewiesen ist.
      fr: Une responsabilité ou un devoir assigné à une personne ou un poste au sein d'une organisation patrimoniale.
    structured_aliases:
    - literal_form: verantwoordelijkheid
      in_language: nl
    - literal_form: Verantwortung
      in_language: de
    - literal_form: responsabilité
      in_language: fr
    comments:
    - Responsibilities define scope of work, authority, and accountability for specific functions.
    - Linked to positions and people through organizational role assignments.
    - Maps to org:Role from W3C Organization Ontology.
    broad_mappings:
    - org:Role
    slots:
    - has_type
    slot_usage:
      has_type:
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
