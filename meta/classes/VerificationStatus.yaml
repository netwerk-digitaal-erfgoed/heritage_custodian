id: https://nde.nl/ontology/hc/class/VerificationStatus
name: VerificationStatus
title: Verification Status
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
classes:
  VerificationStatus:
    class_uri: skos:Concept
    description: >-
      Controlled concept indicating whether a claim, value, or entity has been
      checked and what confidence outcome resulted from that check.
    alt_descriptions:
      nl: >-
        Gecontroleerd concept dat aangeeft of een claim, waarde of entiteit is
        nagekeken en welke betrouwbaarheidsuitkomst daaruit volgde.
      de: >-
        Kontrolliertes Konzept, das angibt, ob eine Aussage, ein Wert oder eine
        Entität geprüft wurde und welches Vertrauensempfinden daraus resultierte.
      fr: >-
        Concept contrôlé indiquant si une affirmation, une valeur ou une entité
        a été vérifiée et quel niveau de confiance en résulte.
      es: >-
        Concepto controlado que indica si una afirmación, valor o entidad fue
        comprobada y qué resultado de confianza se obtuvo.
      ar: >-
        مفهوم مضبوط يوضح ما إذا كانت دعوى أو قيمة أو كيان قد تم التحقق منه
        وما نتيجة الثقة الناتجة عن ذلك.
      id: >-
        Konsep terkontrol yang menunjukkan apakah klaim, nilai, atau entitas
        telah diperiksa dan hasil tingkat kepercayaan yang dihasilkan.
      zh: >-
        受控概念，用于说明某项主张、数值或实体是否已被核验及其置信结果。
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    structured_aliases:
    - literal_form: controle-uitkomstconcept
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Prüfungsresultat-Konzept
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: concept de résultat de contrôle
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: concepto de resultado de comprobación
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مفهوم نتيجة التحقق
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: konsep hasil pemeriksaan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 核验结果概念
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Supports trust and quality signals in curation and enrichment workflows.
    - Intended as a controlled vocabulary term rather than a free-text field.
    - Preserved usage scope: data verification status, quality-assurance flags, and approval tracking.
    - 'Preserved from prior description: Verification status of a record or entity. **USAGE**: Used for: - Data verification status - Quality assurance flags - Approval status'
    keywords:
    - data quality
    - confidence assessment
    - curation workflow
    - controlled vocabulary
    annotations:
      specificity_score: 0.4
      specificity_rationale: Moderately specific - verification common in data quality.
      custodian_types: '[''*'']'
    examples:
    - value:
        status: VERIFIED
        verified_date: '2025-01-14T10:30:00Z'
        verifier: curator@museum.nl
      description: Verified status record
    slots: []
