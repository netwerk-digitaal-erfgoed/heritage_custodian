id: https://nde.nl/ontology/hc/class/non-profit-type
name: non_profit_type
title: NonProfitType
description: 'Specialized CustodianType for non-profit organizations (NGOs) focused on heritage preservation, advocacy, education, or support activities that don''t fit other specialized types. Coverage: Corresponds to ''N'' (NGO) in GLAMORCUBESFIXPHDNT taxonomy. '
