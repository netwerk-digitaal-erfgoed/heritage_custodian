classes:
  NonProfitType:
    is_a: CustodianType
    class_uri: skos:Concept
    alt_descriptions:
      nl: Custodian-type voor erfgoedgerichte non-profitorganisaties die vooral belangenbehartiging
      de: Custodian-Typ fuer gemeinnuetzige
      fr: Type de custodian pour organisations patrimoniales a but non lucratif axeessur plaidoyer
      es: Tipo de custodian para organizaciones patrimoniales sin fines de lucro centradas en defensa
      ar: نوع جهة حافظة لمنظمات تراثية غير ربحية تركز على المناصرة أو الدعم أو التمويل.
      id: Tipe custodian untuk organisasi warisan nirlaba yang berfokus pada advokasi
      zh: 面向以倡导、支持或资助为主的非营利遗产机构的保管机构类型。
    annotations:
      skos:prefLabel: Non-Profit Organization
      skos:altLabel: NGO, non-profit, foundation, stichting, vereniging
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
      modeling_notes: |
        Use this residual type when an organization is clearly non-profit and
        heritage-focused but does not fit more specific custodian categories.

        Distinction examples

        - vs HeritageSociety: society types usually collect/publish directly.
        - vs FeatureCustodian: feature custodians manage specific heritage sites.
        - vs OfficialInstitution: official institutions are governmental bodies.
