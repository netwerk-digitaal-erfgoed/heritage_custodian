    description: >-
      Custodian type for heritage-focused non-profit organizations that primarily
      provide advocacy, support services, capacity building, or grant-making.
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:NGO
    - crm:E74_Group
    - foaf:Organization
    - schema:NonProfit
    related_mappings:
    - schema:Organization
    - schema:EducationalOrganization
    - schema:FundingAgency
    slots:
    - has_beneficiary
    - has_type
    - has_hyponym
    - has_mission_statement
    - has_partner
    - has_score
    slot_usage:
      has_mission_statement:
#         range: string
        required: true
        examples:
        - value: Heritage advocacy, Awareness, Policy influence
        - value: Grant-making for endangered heritage
        - value: Professional development, Training, Standards
        - value: Annual grants, Emergency funding, Scholarships
        - value: Training workshops, Webinars, Certifications
        - value: Global, 100+ countries, 10 regional offices
        - value: National (Netherlands), 500 members
      has_beneficiary:
#         range: string
        multivalued: true
        required: true
        examples:
        - value: Heritage organizations, Communities, Policy makers
        - value: Conservation professionals, Students
        - value: Museums, Libraries, Heritage managers
      has_partner:
#         range: string
        required: true
        examples:
        - value: Membership network, Co-funded programs, Coalitions
        - value: Academic partnerships, Government advisory
        - value: Grassroots coalition, Community partnerships
        - value: Projects funded, Success rate, Beneficiaries
        - value: Professionals trained, Knowledge retention
      has_type:
        equals_string: NonProfitType
