id: https://nde.nl/ontology/hc/classes/PhotoMetadata
name: PhotoMetadata
title: PhotoMetadata
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
# default_range: string
classes:
  PhotoMetadata:
    description: >-
      Metadata about photos from Google Maps including dimensions and author attributions.
      Extends basic photo information with creator/contributor tracking.
    alt_descriptions:
      nl: Metadata over foto's van Google Maps inclusief afmetingen en auteursvermeldingen.
      de: Metadaten zu Fotos von Google Maps mit Abmessungen und Autorenzuordnungen.
      fr: Métadonnées sur les photos de Google Maps avec dimensions et attributions.
    structured_aliases:
    - literal_form: fotometadata
      in_language: nl
    - literal_form: Foto-Metadaten
      in_language: de
    comments:
    - Extends basic photo information with creator/contributor tracking.
    class_uri: schema:ImageObject
    broad_mappings:
    - schema:ImageObject
    close_mappings:
    - schema:Photograph
    related_mappings:
    - prov:Entity
    - schema:MediaObject
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_name
