id: https://nde.nl/ontology/hc/class/MediaArchiveRecordSetTypes
name: MediaArchiveRecordSetTypes
title: MediaArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
default_prefix: hc
imports:
- ./MediaArchiveRecordSetType
- linkml:types
- ../slots/has_type
- ../slots/has_score
- ../slots/has_note
classes:
  MediaProductionFonds:
    is_a: MediaArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Fonds-oriented record set type for records created by media-production
      organizations.
    keywords:
    - media production
    - audiovisual
    - broadcasting
    - fonds
    - television
    - radio
    - film
    alt_descriptions:
      nl: Fondsgericht recordsettype voor archiefstukken die door mediaproductieorganisaties zijn gevormd.
      de: Fondsorientierter Recordset-Typ fuer Unterlagen die von Medienproduktionsorganisationen erstellt wurden.
      fr: Type de fonds pour des documents produits par des organisations de production mediatique.
      es: Tipo de fondo para registros creados por organizaciones de produccion de medios.
      ar: نوع مجموعة سجلات بصيغة الصندوق لوثائق أنشأتها مؤسسات إنتاج إعلامي.
      id: Tipe fonds untuk arsip yang dihasilkan oleh organisasi produksi media.
      zh: 面向媒体制作机构所形成记录的宗卷式记录集合类型。
    structured_aliases:
    - {literal_form: mediaproductie-fonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Medienproduktionsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds de production mediatique, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de produccion de medios, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: صندوق إنتاج إعلامي, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds produksi media, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 媒体制作宗卷, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MediaProductionFonds

  BroadcastCollection:
    is_a: MediaArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Collection-oriented record set type for broadcast recordings and
      transmission-related media assets.
    keywords:
    - broadcast
    - transmission
    - recording
    - radio
    - television
    - media assets
    - collection
    alt_descriptions:
      nl: Collectiegerichte recordsettype voor omroepopnamen en transmissiegerelateerde media-assets.
      de: Sammlungsorientierter Recordset-Typ fuer Rundfunkaufnahmen und uebertragungsbezogene Medienbestaende.
      fr: Type de collection pour enregistrements de diffusion et ressources mediatiques liees a la transmission.
      es: Tipo de coleccion para grabaciones de difusion y activos de medios relacionados con la transmision.
      ar: نوع مجموعة موجه للمقتنيات لتسجيلات البث والأصول الإعلامية المرتبطة بالإرسال.
      id: Tipe koleksi untuk rekaman siaran dan aset media terkait transmisi.
      zh: 面向广播录音与传输相关媒体资产的集合式记录集合类型。
    structured_aliases:
    - {literal_form: omroepcollectie, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Rundfunksammlung, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de diffusion, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de radiodifusion, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة بث, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi siaran, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 广播集合, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_note
    - has_score
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:BroadcastCollection
