id: https://nde.nl/ontology/hc/class/ComarcalArchiveRecordSetType
name: ComarcalArchiveRecordSetType
title: ComarcalArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
classes:
  ComarcalArchiveRecordSetType:
    abstract: true
    is_a: CollectionType
    class_uri: rico:RecordSetType
    description: >-
      Abstract taxonomy node for aggregations maintained by Catalan comarca-level
      repositories serving intermediate territorial governance units.
    alt_descriptions:
      nl: >-
        Abstract taxonomieknooppunt voor aggregaties beheerd door Catalaanse comarca-niveau
        bewaarinstellingen die intermediaire territoriale bestuurseenheden bedienen.
      de: >-
        Abstrakter Taxonomieknoten für Aggregationen, die von katalanischen Comarca-Level-
        Repositorien verwaltet werden und intermediären Gebietskörperschaften dienen.
      fr: >-
        Nœud taxonomique abstrait pour les agrégations maintenues par les dépôts de niveau
        comarcal catalan servant des unités territoriales intermédiaires.
      es: >-
        Nodo taxonómico abstracto para agregaciones mantenidas por repositorios de nivel
        comarcal catalán que sirven a unidades territoriales intermedias.
      ar: >-
        عقدة تصنيفية مجردة للتجميعات التي تحتفظ بها مستودعات مستوى الكماركا الكاتالونية
        التي تخدم وحدات إقليمية وسيطة.
      id: >-
        Simpul taksonomi abstrak untuk agregasi yang dipelihara oleh repositori tingkat
        comarca Catalan yang melayani unit teritorial perantara.
      zh: >-
        由加泰罗尼亚县级存储库维护的、服务于中间领土单位的聚合的抽象分类法节点。
    structured_aliases:
      - {literal_form: comarca-archiefrecordsettype, predicate: EXACT_SYNONYM, in_language: nl}
      - {literal_form: Comarca-Archiv-Recordsettyp, predicate: EXACT_SYNONYM, in_language: de}
      - {literal_form: type de lot documentaire d archive comarcale, predicate: EXACT_SYNONYM, in_language: fr}
      - {literal_form: tipo de conjunto documental de archivo comarcal, predicate: EXACT_SYNONYM, in_language: es}
      - {literal_form: نوع مجموعة سجلات أرشيف الكماركا, predicate: EXACT_SYNONYM, in_language: ar}
      - {literal_form: tipe record set arsip comarca, predicate: EXACT_SYNONYM, in_language: id}
      - {literal_form: 县级档案记录集类型, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    keywords:
      - comarca archives
      - Catalan territorial
      - intermediate governance
      - regional repositories
    slots:
      - has_type
      - has_score
