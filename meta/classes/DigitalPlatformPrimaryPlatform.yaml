id: https://nde.nl/ontology/hc/class/DigitalPlatformPrimaryPlatform
name: DigitalPlatformPrimaryPlatform
title: Digital Platform Primary Platform
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcat: http://www.w3.org/ns/dcat#
default_prefix: hc
imports:
- linkml:types
classes:
  DigitalPlatformPrimaryPlatform:
    class_uri: schema:WebSite
    description: >-
      Principal web interface designated as the main public access point
      for an organization's digital presence and services.
    alt_descriptions:
      nl: >-
        Hoofdwebinterface aangewezen als het belangrijkste openbare toegangspunt
        voor de digitale aanwezigheid en diensten van een organisatie.
      de: >-
        Haupt-Weboberfläche, die als Haupteingangspunkt für die digitale Präsenz
        und Dienste einer Organisation bestimmt ist.
      fr: >-
        Interface web principale désignée comme point d'accès public principal
        pour la présence numérique et les services d'une organisation.
      es: >-
        Interfaz web principal designada como punto de acceso público principal
        para la presencia digital y servicios de una organización.
      ar: >-
        واجهة الويب الرئيسية المحددة كنقطة الوصول العامة الرئيسية
        للوجود الرقمي وخدمات المؤسسة.
      id: >-
        Antarmuka web utama yang ditetapkan sebagai titik akses publik utama
        untuk kehadiran digital dan layanan organisasi.
      zh: >-
        指定为组织数字存在和服务的主要公共访问点的主网络界面。
    broad_mappings:
    - schema:WebSite
    close_mappings:
    - schema:WebApplication
    - dcat:DataService
    slots:
    - identified_by
    - has_url
    - has_type
    - has_label
    - in_language
    structured_aliases:
    - literal_form: primair platform
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: primäre Plattform
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: plateforme principale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: plataforma principal
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: المنصة الأساسية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: platform utama
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 主平台
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Primary institutional website or portal
    - May be multilingual with language variants
    - 'Preserved from prior description: Primary web surface designated as the main public access point for an organization.'
    keywords:
    - primary platform
    - main website
    - public access
    - institutional web presence
    examples:
    - value:
        has_url: https://www.rijksmuseum.nl
        in_language: nl
      description: Primary website for Rijksmuseum
    annotations:
      specificity_score: 0.3
      specificity_rationale: Primary platform designation for institutional web presence
      custodian_types: "['*']"
