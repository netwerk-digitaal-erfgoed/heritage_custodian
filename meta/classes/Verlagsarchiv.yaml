id: https://nde.nl/ontology/hc/class/Verlagsarchiv
name: Verlagsarchiv
title: Verlagsarchiv Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- ../classes/AgentType
- linkml:types
- ../slots/has_type
- ../slots/identified_by
- ../slots/has_score
- ../slots/related_to
- ../slots/has_label
classes:
  Verlagsarchiv:
    description: >-
      Institution preserving editorial records, manuscript collections, production
      documentation, and business correspondence from a publishing enterprise.
    alt_descriptions:
      nl: >-
        Instelling die redactionele archieven, manuscriptcollecties, productiedocumentatie
        en zakelijke correspondentie van een uitgeverij bewaart.
      de: >-
        Institution, die redaktionelle Unterlagen, Manuskriptsammlungen, Produktionsdokumentation
        und Geschäftskorrespondenz eines Verlagsunternehmens bewahrt.
      fr: >-
        Institution préservant les archives éditoriales, les collections de manuscrits, la
        documentation de production et la correspondance commerciale d'une maison d'édition.
      es: >-
        Institución que preserva archivos editoriales, colecciones de manuscritos, documentación
        de producción y correspondencia comercial de una empresa editorial.
      ar: >-
        مؤسسة تحافظ على السجلات التحريرية ومجموعات المخطوطات ووثائق الإنتاج والمراسلات التجارية لشركة نشر.
      id: >-
        Institusi yang melestarikan arsip redaksional, koleksi naskah, dokumentasi produksi,
        dan korespondensi bisnis dari perusahaan penerbitan.
      zh: >-
        保存出版企业的编辑档案、手稿收藏、生产文档和商业通信的机构。
    is_a: CustodianType
    class_uri: skos:Concept
    close_mappings:
    - wd:Q130759004
    slots:
    - has_type
    - has_score
    - related_to
    - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
      related_to:
        range: WikidataAlignment
        inlined: true
      has_label:
        equals_string: Verlagsarchiv
    see_also:
    - LiteraryArchive
    - CompanyArchives
    - PressArchive
    - MediaArchive
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    comments:
    - 'Preserved from prior description: An archive of a publishing house (Verlag). Verlagsarchive preserve the historical records of publishing companies in German-speaking countries, including correspondence with authors, manuscript submissions, editorial files, contracts, marketing materials, and documentation of book production and distribution activities.'
