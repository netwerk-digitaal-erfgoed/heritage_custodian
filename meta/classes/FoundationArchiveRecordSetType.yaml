id: https://nde.nl/ontology/hc/class/FoundationArchiveRecordSetType
name: FoundationArchiveRecordSetType
title: Foundation Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../classes/CollectionType
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  FoundationArchiveRecordSetType:
    class_uri: hc:FoundationArchiveRecordSetType
    is_a: CollectionType
    description: >-
      Classification root for documentary aggregates typically maintained by
      foundation-based archival institutions.
    alt_descriptions:
      nl: Classificatieroot voor documentaire gehelen die doorgaans worden beheerd door stichtingsarchieven.
      de: Klassifikationswurzel fuer Dokumentaggregate, die typischerweise in Stiftungsarchiven gefuehrt werden.
      fr: Racine de classification pour les ensembles documentaires generalement conserves par des archives de fondation.
      es: Raiz de clasificacion para agregados documentales mantenidos habitualmente por archivos de fundacion.
      ar: جذر تصنيفي للتجمعات الوثائقية التي تحفظها عادة الأرشيفات التابعة للمؤسسات الوقفية.
      id: Akar klasifikasi untuk agregat dokumenter yang lazim dipelihara oleh arsip yayasan.
      zh: 用于基金会档案机构常见文献聚合体的分类根节点。
    structured_aliases:
      - literal_form: stichtingsarchiefbestandtype
        in_language: nl
      - literal_form: Stiftungsarchiv-Bestandstyp
        in_language: de
      - literal_form: type d'ensemble documentaire de fondation
        in_language: fr
      - literal_form: tipo de conjunto documental de fundacion
        in_language: es
      - literal_form: نوع مجموعة سجلات مؤسسة
        in_language: ar
      - literal_form: tipe set arsip yayasan
        in_language: id
      - literal_form: 基金会档案记录集类型
        in_language: zh
    slots:
      - has_type
      - has_score
      - has_scope
    broad_mappings:
      - rico:RecordSetType
    see_also:
      - FoundationArchive
