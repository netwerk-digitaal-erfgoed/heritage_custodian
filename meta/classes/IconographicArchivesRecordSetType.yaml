classes:
  IconographicArchivesRecordSetType:
    class_uri: hc:IconographicArchivesRecordSetType
    is_a: CollectionType
    description: >-
      Taxonomy root for categorizing pictorial, illustrative, and visual
      documentation holdings managed by image-focused repositories.
    alt_descriptions:
      nl: >-
        Taxonomiewortel voor het categoriseren van beeldmateriaal-, illustratie- en visuele
        documentatiebezittingen beheerd door beeldgerichte bewaarinstellingen.
      de: >-
        Taxonomie-Wurzel für die Kategorisierung von Bild-, Illustrations- und visueller
        Dokumentationsbeständen, die von bildorientierten Repositorien verwaltet werden.
      fr: >-
        Racine taxonomique pour catégoriser les fonds de documentation iconographique,
        illustrative et visuelle gérés par des dépôts axés sur l'image.
      es: >-
        Raíz taxonómica para categorizar fondos de documentación pictórica, ilustrativa
        y visual gestionados por repositorios enfocados en imágenes.
      ar: >-
        جذر تصنيفي لتصنيف مقتنيات الوثائق التصويرية والتوضيحية والبصرية التي تديرها مستودعات تركز على الصور.
      id: >-
        Akar taksonomi untuk mengkategorikan koleksi dokumentasi bergambar, ilustratif,
        dan visual yang dikelola oleh repositori berfokus gambar.
      zh: >-
        用于对由图像焦点存储库管理的图像、插图和视觉文档馆藏进行分类的分类法根。
