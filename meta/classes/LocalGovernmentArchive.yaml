id: https://w3id.org/nde/ontology/LocalGovernmentArchive
name: LocalGovernmentArchive
title: Local Government Archive Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_type
  - ../slots/hold_record_set
  - ../slots/has_score
classes:
  LocalGovernmentArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Publicly mandated repository preserving administrative records, policy
      documents, and civic proceedings of municipal or regional governance.
    alt_descriptions:
      nl: >-
        Publiek verplichte bewaarplaats die administratieve verslagen, beleidsdocumenten
        en burgerlijke procedures van gemeentelijk of regionaal bestuur bewaart.
      de: >-
        Öffentlich mandatiertes Repositorium, das Verwaltungsunterlagen, Dokumente zur
        Politikgestaltung und kommunale Verfahren der Gemeinde- oder Regionalverwaltung bewahrt.
      fr: >-
        Dépôt publiquement mandaté préservant les dossiers administratifs, les documents
        politiques et les procédures civiques de la gouvernance municipale ou régionale.
      es: >-
        Repositorio públicamente mandatado que preserva registros administrativos, documentos
        de políticas y procedimientos cívicos de gobernanza municipal o regional.
      ar: >-
        مستودع مفوض علناً يحافظ على السجلات الإدارية ووثائق السياسة والإجراءات المدنية للحوكمة البلدية أو الإقليمية.
      id: >-
        Repositori yang dimandatkan secara publik yang melestarikan catatan administratif,
        dokumen kebijakan, dan prosedur sipil tata kelola munisipal atau regional.
      zh: >-
        保存市政或地区治理的行政记录、政策文件和公民程序的公共授权存储库。
    broad_mappings:
      - schema:ArchiveOrganization
      - wd:Q166118
    slots:
      - identified_by
      - has_type
      - hold_record_set
      - has_score
    annotations:
      admin_level: local government
      custodian_status: governmental
      specificity_score: 0.65
      specificity_rationale: Archive organization type anchored in municipal and local public-records stewardship.
      custodian_types: '["*"]'
