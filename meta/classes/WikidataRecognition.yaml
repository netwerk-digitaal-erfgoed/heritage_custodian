id: https://nde.nl/ontology/hc/classes/WikidataRecognition
name: WikidataRecognition
title: Wikidata Recognition Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
  - linkml:types
classes:
  WikidataRecognition:
    description: >-
      Extracted distinctions, certifications, and honors associated with an
      institution.
    alt_descriptions:
      nl: >-
        Prijzen en formele erkenning uit Wikidata-eigenschap P166 (onderscheiding ontvangen),
        registrerend erebetoningen, certificeringen en onderscheidingen ontvangen door erfgoedinstellingen.
      de: >-
        Auszeichnungen und formelle Anerkennung aus Wikidata-Eigenschaft P166 (Auszeichnung erhalten),
        die Ehrenbezeugungen, Zertifizierungen und Auszeichnungen von Heritage-Institutionen verfolgt.
      fr: >-
        Prix et reconnaissance formelle extraits de la propriété Wikidata P166 (prix reçu),
        suivant les honneurs, certifications et distinctions reçus par les institutions patrimoniales.
      es: >-
        Premios y reconocimiento formal extraídos de la propiedad Wikidata P166 (premio recibido),
        rastreando honores, certificaciones y distinciones recibidas por instituciones patrimoniales.
      ar: >-
        الجوائز والاعتراف الرسمي المستخرج من خاصية ويكي بيانات P166 (الجائزة المستلمة)،
        لتتبع التكريمات والشهادات والتقديرات التي تتلقاها المؤسسات التراثية.
      id: >-
        Penghargaan dan pengakuan formal yang diekstrak dari properti Wikidata P166 (penghargaan diterima),
        melacak kehormatan, sertifikasi, dan perbedaan yang diterima oleh institusi warisan.
      zh: >-
        从维基数据属性P166（获奖）提取的奖项和正式认可，
        跟踪遗产机构获得的荣誉、认证和殊荣。
    broad_mappings:
      - prov:Entity
    related_mappings:
      - crm:E7_Activity
      - schema:Organization
    slots: []
    comments:
      - Extracted recognition data, not the award event itself
      - Used to track institutional quality assessment and honors
    keywords:
      - wikidata
      - recognition
      - awards
      - honors
      - certification
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for recognition data extraction
      custodian_types: "['*']"
      wikidata_property_ids: '["P166"]'
    structured_aliases:
      - literal_form: wikidata-erkenning
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Wikidata-Auszeichnung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: reconnaissance Wikidata
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: reconocimiento Wikidata
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: اعتراف ويكي بيانات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: pengakuan Wikidata
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 维基数据荣誉信息
        predicate: EXACT_SYNONYM
        in_language: zh
