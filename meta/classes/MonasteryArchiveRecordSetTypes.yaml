id: https://nde.nl/ontology/hc/class/MonasteryArchiveRecordSetTypes
name: MonasteryArchiveRecordSetTypes
title: Monastery Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./MonasteryArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
classes:
  MonasticRecordsFonds:
    is_a: MonasteryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Fonds-level records produced by monastic governance and administration.
    keywords:
    - monastic
    - monastery
    - governance
    - administration
    - religious
    - fonds
    alt_descriptions:
      nl: Fondsniveau-archiefstukken voortgekomen uit monastiek bestuur en administratie.
      de: Unterlagen auf Fondsebene aus klosterlicher Leitung und Verwaltung.
      fr: Documents de niveau fonds produits par la gouvernance et l administration monastiques.
      es: Registros de nivel fondo producidos por la gobernanza y la administracion monastica.
      ar: سجلات على مستوى الفوندس ناتجة عن حوكمة الأديرة وإدارتها.
      id: Arsip tingkat fonds yang dihasilkan oleh tata kelola dan administrasi monastik.
      zh: 由修道院治理与行政活动形成的全宗级记录。
    structured_aliases:
    - {literal_form: monastiek bestuursfonds, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: klosterlicher Verwaltungsfonds, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: fonds de gouvernance monastique, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: fondo de gobernanza monastica, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: فوندس إدارة رهبانية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: fonds tata kelola monastik, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 修道院治理全宗, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    slots:
    - has_type
    - has_score
    - has_note
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MonasticRecordsFonds

  MonasticManuscriptCollection:
    is_a: MonasteryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of manuscripts, codices, and related written heritage from monastic contexts.
    keywords:
    - manuscripts
    - codices
    - written heritage
    - monastic
    - medieval
    - collection
    alt_descriptions:
      nl: Collectie van handschriften codices en aanverwant schriftelijk erfgoed uit monastieke contexten.
      de: Sammlung von Handschriften Kodizes und verwandtem schriftlichem Erbe aus klosterlichen Kontexten.
      fr: Collection de manuscrits codex et patrimoine ecrit associe provenant de contextes monastiques.
      es: Coleccion de manuscritos codices y patrimonio escrito relacionado de contextos monasticos.
      ar: مجموعة مخطوطات ومدونات وتراث كتابي ذي صلة من السياقات الرهبانية.
      id: Koleksi manuskrip kodeks dan warisan tulisan terkait dari konteks monastik.
      zh: 来自修道院语境的手稿、古抄本及相关书写遗产集合。
    structured_aliases:
    - {literal_form: collectie monastieke handschriften, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung klosterlicher Handschriften, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de manuscrits monastiques, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de manuscritos monasticos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة مخطوطات رهبانية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi manuskrip monastik, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 修道院手稿集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    slots:
    - has_type
    - has_score
    - has_note
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MonasticManuscriptCollection

  PropertyRecordsSeries:
    is_a: MonasteryArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Series documenting land, rights, and property administration of monastic institutions.
    keywords:
    - property
    - land
    - rights
    - real estate
    - monastic
    - series
    alt_descriptions:
      nl: Reeks die grondbezit rechten en vastgoedadministratie van monastieke instellingen documenteert.
      de: Serie zur Dokumentation von Grundbesitz Rechten und Liegenschaftsverwaltung klosterlicher Einrichtungen.
      fr: Serie documentant terres droits et administration des biens des institutions monastiques.
      es: Serie que documenta tierras derechos y administracion patrimonial de instituciones monasticas.
      ar: سلسلة توثّق الأراضي والحقوق وإدارة الممتلكات لدى المؤسسات الرهبانية.
      id: Seri yang mendokumentasikan tanah hak dan administrasi properti lembaga monastik.
      zh: 记录修道机构土地、权利与不动产管理事务的系列档案。
    structured_aliases:
    - {literal_form: reeks eigendomsregisters klooster, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie klosterlicher Eigentumsunterlagen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie des archives foncieres monastiques, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de registros patrimoniales monasticos, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة سجلات ممتلكات رهبانية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri catatan properti monastik, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 修道院产权记录系列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    slots:
    - has_type
    - has_score
    - has_note
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:PropertyRecordsSeries
