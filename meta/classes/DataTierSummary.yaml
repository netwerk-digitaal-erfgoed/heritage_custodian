id: https://nde.nl/ontology/hc/classes/DataTierSummary
name: DataTierSummary
title: DataTierSummary
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  dqv: http://www.w3.org/ns/dqv#
imports:
- linkml:types
classes:
  DataTierSummary:
    class_uri: dqv:QualityAnnotation
    description: >-
      Aggregated quality-provenance digest reporting distribution of trust
      levels across fields in a modeled entry.
    alt_descriptions:
      nl: Geaggregeerd kwaliteits- en provenanceoverzicht dat de verdeling van betrouwbaarheidsniveaus over velden in een record rapporteert.
      de: Aggregierte Qualitaets- und Provenienzzusammenfassung zur Verteilung von Vertrauensstufen ueber Felder eines Eintrags.
      fr: Synthese agregee qualite-provenance indiquant la repartition des niveaux de confiance sur les champs d une entree.
      es: Resumen agregado de calidad y procedencia que informa la distribucion de niveles de confianza por campo en una entrada.
      ar: ملخص مجمع للجودة والمصدر يوضح توزيع مستويات الثقة عبر حقول السجل.
      id: Ringkasan agregat kualitas-provenans yang melaporkan distribusi tingkat kepercayaan pada bidang-bidang entri.
      zh: 汇总质量与溯源摘要，用于报告条目各字段可信层级分布。
    structured_aliases:
    - {literal_form: tiersamenvatting, in_language: nl}
    - {literal_form: Tierzusammenfassung, in_language: de}
    - {literal_form: resume des niveaux de confiance, in_language: fr}
    - {literal_form: resumen de niveles de confianza, in_language: es}
    - {literal_form: ملخص مستويات الثقة, in_language: ar}
    - {literal_form: ringkasan tingkat tier data, in_language: id}
    - {literal_form: 数据层级摘要, in_language: zh}
    broad_mappings:
    - dqv:QualityAnnotation
    close_mappings:
    - prov:Entity
    - schema:PropertyValue
    related_mappings:
    - dqv:QualityMeasurement
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    slots: []
