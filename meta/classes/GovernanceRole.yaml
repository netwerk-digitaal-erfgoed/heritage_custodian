id: https://nde.nl/ontology/hc/class/GovernanceRole
name: GovernanceRole
title: Governance Role Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/identified_by
- ../slots/has_label
- ../slots/has_description
classes:
  GovernanceRole:
    class_uri: org:Role
    description: >-
      Functional designation used within governance bodies to define decision-making
      authority and membership responsibilities.
    alt_descriptions:
      nl: >-
        Functionele aanduiding gebruikt binnen bestuursorganen om besluitvormingsbevoegdheid
        en lidmaatschapsverantwoordelijkheden te definiëren.
      de: >-
        Funktionale Bezeichnung, die in Governance-Gremien verwendet wird, um Entscheidungsbefugnisse
        und Mitgliedschaftsverantwortlichkeiten zu definieren.
      fr: >-
        Désignation fonctionnelle utilisée dans les organes de gouvernance pour définir
        l'autorité décisionnelle et les responsabilités des membres.
      es: >-
        Designación funcional utilizada dentro de los órganos de gobernanza para definir
        la autoridad de toma de decisiones y las responsabilidades de membresía.
      ar: >-
        تسمية وظيفية تُستخدم ضمن هيئات الحوكمة لتحديد
        سلطة اتخاذ القرار ومسؤوليات العضوية.
      id: >-
        Penunjukan fungsional yang digunakan dalam badan tata kelola untuk mendefinisikan
        wewenang pengambilan keputusan dan tanggung jawab keanggotaan.
      zh: >-
        用于在治理机构内定义决策权限和成员职责的功能性指定。
    structured_aliases:
    - literal_form: bestuursrol
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Führungsrolle
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: rôle de gouvernance
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: rol de gobernanza
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: دور الحوكمة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: peran tata kelola
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 治理角色
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - org:Role
    close_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    comments:
    - Defines positions within board structures and governance committees.
    - Used for tracking board composition and decision-making authority.
    - 'Preserved from prior description: Role type used within governance membership and decision structures.'
    keywords:
    - governance position
    - board role
    - decision authority
    - organizational function
    examples:
    - value:
        has_label: Board Chairperson
        has_description: Presiding officer responsible for board meetings.
      description: Governance role for board leadership position
    annotations:
      specificity_score: 0.35
      specificity_rationale: Role vocabulary for governance composition and mandates.
      custodian_types: '["*"]'
