id: https://nde.nl/ontology/hc/class/RegionalEconomicArchiveRecordSetTypes
name: RegionalEconomicArchiveRecordSetTypes
title: RegionalEconomicArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./RegionalEconomicArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_custodian
- ../slots/has_note
classes:
  RegionalBusinessFonds:
    is_a: RegionalEconomicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based aggregation of documentation generated by regional
      commercial enterprises, trade associations, and economic actors.
    alt_descriptions:
      nl: >-
        Herkomstgebaseerde aggregatie van documentatie die is gevormd door
        regionale ondernemingen, brancheverenigingen en economische actoren.
      de: >-
        Provenienzbasierte Aggregation von Unterlagen regionaler Unternehmen,
        Wirtschaftsverbaende und wirtschaftlicher Akteure.
      fr: >-
        Agrégation fondée sur la provenance de documentation produite par des
        entreprises régionales, associations professionnelles et acteurs économiques.
      es: >-
        Agregación basada en procedencia de documentación generada por
        empresas regionales, asociaciones sectoriales y actores económicos.
      ar: >-
        تجميع قائم على المنشأ لوثائق أنشأتها مؤسسات تجارية إقليمية
        وجمعيات مهنية وفاعلون اقتصاديون.
      id: >-
        Agregasi berbasis asal-usul untuk dokumentasi yang dibentuk oleh
        perusahaan regional, asosiasi perdagangan, dan pelaku ekonomi.
      zh: >-
        基于来源原则聚合由区域企业、行业协会与经济主体形成的文献。
    structured_aliases:
    - literal_form: regionaal bedrijfsarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Regionaler Wirtschaftsbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds economique regional
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo economico regional
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رصيد اقتصادي إقليمي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds ekonomi regional
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 区域经济文献全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Follows the fonds organizational principle as defined by rico-rst:Fonds.
    - Note preserved: This class remains focused on economic provenance at the regional level.
    - 'Preserved from prior description: A rico:RecordSetType for regional business records.'
    keywords:
    - regional enterprise
    - trade association
    - economic governance
    - business provenance
    examples:
    - value:
        has_type: hc:RegionalBusinessFonds
        has_custodian: hc:RegionalEconomicArchive
        has_note: Chamber records, trade ledgers, and regional industry correspondence.
      description: Regional economic documentation grouped by originating commercial body
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - RegionalEconomicArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:RegionalBusinessFonds
      has_custodian:
        equals_string: hc:RegionalEconomicArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by RegionalEconomicArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    annotations:
      specificity_score: "0.1"
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
