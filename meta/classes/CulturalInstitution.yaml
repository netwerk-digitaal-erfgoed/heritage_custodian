    comments:
    - |
      Preserved from prior description (commit 5e94e52b):

      "Broad category for organizations that work for the preservation or promotion of culture.\n\n**Wikidata**: Q3152824 (cultural institution / kulturelle Organisation)\n\n**DEFINITION**:\n\nCultural Institution is a BROAD supertype that encompasses:\n- Galleries (G)\n- Libraries (L)\n- Archives (A)\n- Museums (M)\n- And other cultural heritage organizations\n\n**USAGE NOTE**:\n\nIn the GLAMORCUBESFIXPHDNT taxonomy, prefer SPECIFIC types when applicable:\n- Use GalleryOrganizationType for art galleries\n- Use LibraryOrganizationType for libraries\n- Use ArchiveOrganizationType for archives\n- Use MuseumOrganizationType for museums\n\nCulturalInstitution is used when:\n1. Institution spans multiple types (use with MIXED/X)\n2. Specific type cannot be determined\n3. Institution is cultural but outside GLAM scope\n\n**MULTILINGUAL LABELS**:\n- kulturelle Organisation (de)\n- instituci\xF3n cultural (es)\n- institution culturelle (fr)\n\n**RELATED CONCEPTS**:\n- GLAM (Q1030034)\
    - 'Preserved from prior description: Broad institutional category for organizations mandated to preserve, interpret, or promote cultural heritage.'
