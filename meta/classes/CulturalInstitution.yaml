classes:
  CulturalInstitution:
    is_a: CustodianType
    class_uri: skos:Concept
    description: >-
      Broad organizational mandate category for entities charged with preserving, interpreting, or
      advancing tangible and intangible heritage assets.
    alt_descriptions:
      nl: >-
        Brede organisatorische mandaatcategorie voor entiteiten belast met het behouden, interpreteren of
        bevorderen van materiële en immaterieel erfgoedgoederen.
      de: >-
        Breite organisatorische Mandatskategorie für Einrichtungen, die mit der Bewahrung, Interpretation oder
        Förderung von materiellem und immateriellem Kulturerbe betraut sind.
      fr: >-
        Catégorie large de mandat organisationnel pour les entités chargées de préserver, interpréter ou
        promouvoir les biens patrimoniaux matériels et immatériels.
      es: >-
        Amplia categoría de mandato organizacional para entidades encargadas de preservar, interpretar o
        promover bienes patrimoniales tangibles e intangibles.
      ar: >-
        فئة ولاية تنظيمية واسعة للكيانات المكلفة بالحفاظ على التراث المادي وغير المادي أو تفسيره أو تعزيزه.
      id: >-
        Kategori mandat organisasi yang luas untuk entitas yang bertugas melestarikan, menafsirkan, atau
        memajukan aset warisan berwujud dan tak berwujud.
      zh: >-
        负责保存、阐释或推进有形和无形遗产资产的实体的广泛组织使命类别。
