id: https://nde.nl/ontology/hc/class/Liability
name: Liability
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_liability
- ../slots/has_currency
classes:
  Liability:
    class_uri: schema:MonetaryAmount
    description: >-
      Monetary obligation or outstanding amount owed by an entity at a given
      reporting moment.
    alt_descriptions:
      nl: Financiele verplichting of uitstaand bedrag dat een entiteit op een bepaald rapportagemoment verschuldigd is.
      de: Finanzielle Verpflichtung oder ausstehender Betrag den eine Entitaet zu einem Berichtszeitpunkt schuldet.
      fr: Obligation monetaire ou montant restant du par une entite a un moment de reference.
      es: Obligacion monetaria o importe pendiente que una entidad adeuda en un momento de reporte.
      ar: التزام مالي أو مبلغ مستحق على كيان في لحظة تقرير محددة.
      id: Kewajiban moneter atau jumlah terutang yang masih harus dibayar entitas pada saat pelaporan tertentu.
      zh: 某一报告时点实体所负担的货币性义务或未偿金额。
    structured_aliases:
    - {literal_form: verplichting, in_language: nl}
    - {literal_form: Verbindlichkeit, in_language: de}
    - {literal_form: passif, in_language: fr}
    - {literal_form: pasivo, in_language: es}
    - {literal_form: التزام مالي, in_language: ar}
    - {literal_form: kewajiban, in_language: id}
    - {literal_form: 负债金额, in_language: zh}
    broad_mappings:
    - schema:MonetaryAmount
    slots:
    - has_liability
    - has_currency
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
