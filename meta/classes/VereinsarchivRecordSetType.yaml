id: https://nde.nl/ontology/hc/class/VereinsarchivRecordSetType
name: VereinsarchivRecordSetType
title: Vereinsarchiv Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- ./WikidataAlignment
- linkml:types
- ../slots/identified_by
- ../slots/has_score
- ../slots/applicable_in
- ../slots/related_to
classes:
  VereinsarchivRecordSetType:
    description: >-
      Classification concept for record sets originating from German-speaking
      association and club archives (Vereinsarchive).
    alt_descriptions:
      nl: >-
        Classificatieconcept voor archiefbestanden afkomstig van Duitstalige
        verenigings- en clubarchieven (Vereinsarchive).
      de: >-
        Klassifikationskonzept für Bestände aus deutschsprachigen
        Vereins- und Clubarchiven.
      fr: >-
        Concept de classification pour les fonds d'archives provenant des
        archives d'associations et clubs germanophones.
      es: >-
        Concepto de clasificación para conjuntos de registros procedentes de
        archivos de asociaciones y clubes germanoparlantes.
      ar: >-
        مفهوم تصنيف لمجموعات السجلات من أرشيفات
        الجمعيات والنوادي الناطقة بالألمانية.
      id: >-
        Konsep klasifikasi untuk set catatan yang berasal dari
        arsip asosiasi dan klub berbahasa Jerman.
      zh: >-
        用于分类来自德语协会和俱乐部档案的记录集的分类概念。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    close_mappings:
    - wd:Q130758889
    slots:
    - has_score
    - related_to
    - identified_by
    - applicable_in
    slot_usage:
      related_to:
        range: WikidataAlignment
        inlined: true
      applicable_in:
        equals_string: DE, AT, CH
    see_also:
    - Vereinsarchiv
    structured_aliases:
    - literal_form: verenigingsarchief-collectietype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Vereinsarchiv-Bestandstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de fonds d'association
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de fondo de asociación
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع أرشيف الجمعية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe arsip asosiasi
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 协会档案类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Applies to German-speaking countries (DE, AT, CH)
    - Covers archives of clubs, societies, and voluntary associations
    - 'Preserved from prior description: A rico:RecordSetType for classifying collections from German association and club archives.'
    keywords:
    - association archive
    - club archive
    - Vereinsarchiv
    - German heritage
    examples:
    - value:
        has_label: Sportverein Records
        applicable_in: DE, AT, CH
      description: Record set type for sports club archives
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
