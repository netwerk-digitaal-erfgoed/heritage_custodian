id: https://nde.nl/ontology/hc/class/URLTypes
name: URLTypes
title: URL Types Classes
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ./URLType
  - linkml:types
classes:
  LinkedInProfileURL:
    is_a: URLType
    description: Address pointing to a professional networking account page for a person or organization.
    alt_descriptions:
      nl: Adres dat verwijst naar een accountpagina op een professioneel netwerk voor persoon of organisatie.
      de: Adresse zu einer Kontoseite in einem beruflichen Netzwerk fuer Person oder Organisation.
      fr: Adresse pointant vers une page de compte sur un reseau professionnel pour une personne ou une organisation.
      es: Direccion que apunta a una pagina de cuenta en una red profesional para persona u organizacion.
      ar: عنوان يشير إلى صفحة حساب على شبكة مهنية لشخص أو جهة.
      id: Alamat yang menunjuk ke halaman akun jaringan profesional untuk orang atau organisasi.
      zh: 指向个人或机构职业社交账号页面的地址。
    structured_aliases:
    - literal_form: professioneel netwerkadres
      in_language: nl
    - literal_form: berufliches Netzwerkprofiladresse
      in_language: de
    - literal_form: adresse de profil reseau pro
      in_language: fr
    - literal_form: direccion de perfil de red profesional
      in_language: es
    - literal_form: عنوان حساب شبكة مهنية
      in_language: ar
    - literal_form: alamat akun jaringan profesional
      in_language: id
    - literal_form: 职业社交账号地址
      in_language: zh
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
  OfficialWebsite:
    is_a: URLType
    description: Primary public web presence maintained by an entity.
    alt_descriptions:
      nl: Primaire publieke webaanwezigheid die door een entiteit wordt beheerd.
      de: Primaere oeffentliche Webpraesenz, die von einer Entitaet gepflegt wird.
      fr: Presence web publique principale maintenue par une entite.
      es: Presencia web publica principal mantenida por una entidad.
      ar: الواجهة الشبكية العامة الرئيسية التي تديرها جهة ما.
      id: Kehadiran web publik utama yang dikelola oleh suatu entitas.
      zh: 由实体维护的主要公共网络呈现地址。
    structured_aliases:
    - literal_form: primaire site-adres
      in_language: nl
    - literal_form: Hauptpraesenzadresse
      in_language: de
    - literal_form: adresse de presence principale
      in_language: fr
    - literal_form: direccion de presencia principal
      in_language: es
    - literal_form: عنوان الواجهة الرئيسية
      in_language: ar
    - literal_form: alamat laman utama resmi
      in_language: id
    - literal_form: 主站地址
      in_language: zh
    broad_mappings:
    - skos:Concept
  SocialMediaURL:
    is_a: URLType
    description: Address for an account page on a public networking platform.
    alt_descriptions:
      nl: Adres van een accountpagina op een openbaar netwerkplatform.
      de: Adresse einer Kontoseite auf einer oeffentlichen Netzwerkplattform.
      fr: Adresse d une page de compte sur une plateforme de reseautage publique.
      es: Direccion de una pagina de cuenta en una plataforma publica de redes.
      ar: عنوان صفحة حساب على منصة تواصل عامة.
      id: Alamat halaman akun pada platform jejaring publik.
      zh: 公共社交平台账号页面地址。
    structured_aliases:
    - literal_form: sociaal platformadres
      in_language: nl
    - literal_form: oeffentliche Netzwerkadresse
      in_language: de
    - literal_form: adresse de compte social
      in_language: fr
    - literal_form: direccion de cuenta social
      in_language: es
    - literal_form: عنوان حساب اجتماعي
      in_language: ar
    - literal_form: alamat akun jejaring sosial
      in_language: id
    - literal_form: 社交账号地址
      in_language: zh
    broad_mappings:
    - skos:Concept
