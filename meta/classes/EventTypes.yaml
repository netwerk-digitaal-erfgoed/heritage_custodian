id: https://nde.nl/ontology/hc/class/EventTypes
name: EventTypes
title: Event Types
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ./EventType
  - linkml:types
  - ../slots/include
classes:
  EventTypes:
    class_uri: hc:EventTypes
    description: >-
      Curated concept scheme grouping and maintaining controlled categories for
      temporal occurrence classification.
    alt_descriptions:
      nl: Beheerd conceptschema dat gecontroleerde categorieen voor classificatie van temporele gebeurtenissen groepeert en onderhoudt.
      de: Kuratiertes Begriffsschema zur Gruppierung und Pflege kontrollierter Kategorien fuer die Klassifikation zeitlicher Vorgaenge.
      fr: Schema de concepts curate regroupant et maintenant des categories controlees pour la classification des occurrences temporelles.
      es: Esquema de conceptos curado que agrupa y mantiene categorias controladas para clasificacion de ocurrencias temporales.
      ar: مخطط مفاهيم منسق يجمع ويُدير الفئات المضبوطة لتصنيف الوقوعات الزمنية.
      id: Skema konsep terkurasi yang mengelompokkan dan memelihara kategori terkendali untuk klasifikasi kejadian temporal.
      zh: 用于汇集并维护时间发生分类受控类别的策展化概念方案。
    structured_aliases:
      - literal_form: gebeurtenistypenlijst
        in_language: nl
      - literal_form: Ereignistypen-Schema
        in_language: de
      - literal_form: schema des types d'evenements
        in_language: fr
      - literal_form: esquema de tipos de evento
        in_language: es
      - literal_form: مخطط أنواع الأحداث
        in_language: ar
      - literal_form: skema tipe peristiwa
        in_language: id
      - literal_form: 事件类型方案
        in_language: zh
    slots:
      - include
    slot_usage:
      include:
        multivalued: true
        inlined: false
    broad_mappings:
      - skos:ConceptScheme
    comments:
      - Container class for controlled event type vocabularies.
    annotations:
      specificity_score: "0.2"
      specificity_rationale: Vocabulary scheme artifact for event type governance.
      custodian_types: '["*"]'
