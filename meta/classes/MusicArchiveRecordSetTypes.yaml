id: https://nde.nl/ontology/hc/class/MusicArchiveRecordSetTypes
name: MusicArchiveRecordSetTypes
title: Music Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- ./MusicArchiveRecordSetType
- linkml:types
- ../slots/has_score
- ../slots/has_type
- ../slots/has_note
classes:
  MusicManuscriptCollection:
    is_a: MusicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of scores, manuscript notation, and related compositional materials.
    alt_descriptions:
      nl: Collectie partituren handschriftnotaties en verwante compositorische materialen.
      de: Sammlung von Partituren handschriftlicher Notation und zugehoerigen kompositorischen Materialien.
      fr: Collection de partitions notations manuscrites et materiaux compositionnels associes.
      es: Coleccion de partituras notacion manuscrita y materiales compositivos relacionados.
      ar: مجموعة نوتات ومخطوطات تدوين موسيقي ومواد تأليفية ذات صلة.
      id: Koleksi partitur notasi manuskrip dan bahan komposisi terkait.
      zh: 收录乐谱、手稿谱记与相关作曲材料的集合。
    structured_aliases:
    - {literal_form: collectie muziekmanuscripten, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Musikmanuskripte, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection de manuscrits musicaux, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de manuscritos musicales, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة مخطوطات موسيقية, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi manuskrip musik, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 音乐手稿集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    - skos:Concept
    related_mappings:
    - rico-rst:Collection
    keywords:
    - scores
    - manuscript notation
    - compositional materials
    - music manuscripts
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:MusicManuscriptCollection

  PerformanceRecordingSeries:
    is_a: MusicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Series of live-performance, studio, and broadcast recording records.
    alt_descriptions:
      nl: Reeks registraties van live-optredens studio-opnamen en omroepopnamen.
      de: Serie von Aufzeichnungen zu Liveauffuehrungen Studioaufnahmen und Rundfunkmitschnitten.
      fr: Serie d enregistrements de concerts de studio et de diffusion radiophonique ou televisee.
      es: Serie de registros de actuaciones en vivo estudio y grabaciones de radiodifusion.
      ar: سلسلة تسجيلات للعروض الحية وتسجيلات الاستوديو والبث.
      id: Seri rekaman pertunjukan langsung studio dan siaran.
      zh: 涵盖现场演出、录音室与广播录音记录的系列档案。
    structured_aliases:
    - {literal_form: reeks uitvoeringsopnamen, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Serie Auffuehrungsaufnahmen, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: serie d enregistrements de performance, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: serie de grabaciones de actuaciones, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: سلسلة تسجيلات الأداء, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: seri rekaman pertunjukan, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 演出录音系列, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    - skos:Concept
    related_mappings:
    - rico-rst:Series
    keywords:
    - live recordings
    - studio recordings
    - broadcast recordings
    - performance documentation
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:PerformanceRecordingSeries

  ComposerPapersCollection:
    is_a: MusicArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: Collection of personal papers and working documentation of composers.
    alt_descriptions:
      nl: Collectie met persoonlijke papieren en werkdocumentatie van componisten.
      de: Sammlung persoenlicher Unterlagen und Arbeitsdokumentation von Komponistinnen und Komponisten.
      fr: Collection de papiers personnels et de documentation de travail de compositrices et compositeurs.
      es: Coleccion de papeles personales y documentacion de trabajo de compositores.
      ar: مجموعة أوراق شخصية ووثائق عمل للمؤلفين الموسيقيين.
      id: Koleksi dokumen pribadi dan dokumentasi kerja para komponis.
      zh: 收录作曲家个人文书与工作文档的集合。
    structured_aliases:
    - {literal_form: collectie componistenarchief, predicate: EXACT_SYNONYM, in_language: nl}
    - {literal_form: Sammlung Komponistenpapiere, predicate: EXACT_SYNONYM, in_language: de}
    - {literal_form: collection des papiers de compositeurs, predicate: EXACT_SYNONYM, in_language: fr}
    - {literal_form: coleccion de papeles de compositores, predicate: EXACT_SYNONYM, in_language: es}
    - {literal_form: مجموعة أوراق المؤلفين الموسيقيين, predicate: EXACT_SYNONYM, in_language: ar}
    - {literal_form: koleksi arsip komponis, predicate: EXACT_SYNONYM, in_language: id}
    - {literal_form: 作曲家文书集, predicate: EXACT_SYNONYM, in_language: zh}
    broad_mappings:
    - rico:RecordSetType
    - crm:E55_Type
    - skos:Concept
    related_mappings:
    - rico-rst:Collection
    keywords:
    - personal papers
    - working documentation
    - composer archives
    - musical sketches
    slots: [has_type, has_score, has_note]
    slot_usage:
      has_type:
        any_of:
        - equals_string: hc:ComposerPapersCollection
