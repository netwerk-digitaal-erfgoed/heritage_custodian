    - literal_form: museum film
      in_language: id
    - literal_form: 电影资料馆
      in_language: zh
    - literal_form: 电影博物馆
      in_language: zh
    broad_mappings:
    - schema:ArchiveOrganization
    - skos:Concept
    related_mappings:
