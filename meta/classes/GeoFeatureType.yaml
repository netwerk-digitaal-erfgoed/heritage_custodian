classes:
  GeoFeatureType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract taxonomic category for classifying physical and administrative territorial entities in geospatial datasets.
    alt_descriptions:
      nl: >-
        Abstracte taxonomische categorie voor het classificeren van fysieke en administratieve territoriale entiteiten in geospatiale datasets.
      de: >-
        Abstrakte taxonomische Kategorie zur Klassifizierung physischer und administrativer Gebietskörperschaften in Geodatenbeständen.
      fr: >-
        Catégorie taxonomique abstraite pour classer les entités territoriales physiques et administratives dans les jeux de données géospatiales.
      es: >-
        Categoría taxonómica abstracta para clasificar entidades territoriales físicas y administrativas en conjuntos de datos geoespaciales.
      ar: >-
        فئة تصنيفية تجريدية لتصنيف الكيانات الإقليمية المادية والإدارية في مجموعات البيانات الجغرافية المكانية.
      id: >-
        Kategori taksonomi abstrak untuk mengklasifikasikan entitas teritorial fisik dan administratif dalam dataset geospasial.
      zh: >-
        用于分类地理空间数据集中的物理和行政领土实体的抽象分类类别。
