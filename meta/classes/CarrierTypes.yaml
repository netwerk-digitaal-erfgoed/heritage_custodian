    annotations:
      custodian_types: '[''*'']'
    structured_aliases:
    - literal_form: lichtgevoelige beelddrager
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: lichtempfindlicher Bildtraeger
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: support d'image photosensible
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: soporte de imagen fotosensible
