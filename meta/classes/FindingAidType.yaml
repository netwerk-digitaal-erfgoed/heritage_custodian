classes:
  FindingAidType:
    class_uri: rico:DocumentaryFormType
    abstract: true
    description: >-
      Abstract classification concept for documentary forms of finding aids,
      such as inventories, guides, catalogs, lists, and indexes.
    alt_descriptions:
      nl: Abstract classificatieconcept voor documentaire vormen van vindmiddelen zoals inventarissen gidsen en catalogi.
      de: Abstraktes Klassifikationskonzept fuer dokumentarische Formen von Findmitteln wie Inventare Guides und Kataloge.
      fr: Concept abstrait de classification des formes documentaires d instruments de recherche telles que inventaires et guides.
      es: Concepto abstracto de clasificacion para formas documentales de instrumentos de descripcion como inventarios guias y catalogos.
      ar: مفهوم تصنيفي مجرد للأشكال الوثائقية لأدوات الإرشاد والوصف مثل الجردات والأدلة والفهارس.
      id: Konsep klasifikasi abstrak untuk bentuk dokumenter sarana temu balik seperti inventaris panduan dan katalog.
      zh: 用于检索工具文献形态（如清单、指南、目录、索引）分类的抽象概念。
