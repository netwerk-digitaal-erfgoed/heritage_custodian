classes:
  NotarialArchive:
    description: >-
      Archival organization preserving authenticated legal instruments and transaction
      documentation created by licensed civil-law notaries.
    alt_descriptions:
      nl: >-
        Archiefinstelling die geauthenticeerde juridische instrumenten en transactiedocumentatie
        bewaart die door beëdigde civielrechtelijke notarissen zijn opgemaakt.
      de: >-
        Archivinstitution, die authentifizierte Rechtsinstrumente und Transaktionsdokumentation
        bewahrt, die von zugelassenen Zivilrechtsnotaren erstellt wurden.
      fr: >-
        Organisation archivistique préservant les instruments juridiques authentifiés et la documentation
        transactionnelle créés par des notaires de droit civil agréés.
      es: >-
        Organización archivística que preserva instrumentos legales autenticados y documentación
        transaccional creada por notarios de derecho civil autorizados.
      ar: >-
        منظمة أرشيفية تحافظ على الصكوك القانونية الموثقة والوثائق المعاملاتية
        التي أنشأها موثقون قانونيون مدنيون مرخصون.
      id: >-
        Organisasi arsip yang melestarikan instrumen hukum terautentikasi dan dokumentasi transaksi
        yang dibuat oleh notaris hukum perdata berlisensi.
      zh: >-
        保存由执业民法公证人制作的经认证法律文书和交易文件的档案机构。
    structured_aliases:
    - literal_form: notarieel archief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Notariatsarchiv
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: archives notariales
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: archivo notarial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: أرشيف التوثيق
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip notarial
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 公证档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    close_mappings:
    - rico:CorporateBody
    - wd:Q8203685
    broad_mappings:
    - schema:ArchiveOrganization
    - wd:Q166118
    slot_usage:
      identified_by:
    annotations:
      skos:prefLabel: Notarial Archive
      skos:altLabel: Notariatsarchiv, archivo notarial, archives notariales, Notary Archive
      subject_domain: legal/notarial
      record_type: notarial instruments
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - LegalArchive
    - CourtRecords
    - MunicipalArchive
    - DistritalArchive
    comments:
    - Contains contracts, wills, property records, and civil transactions.
    - Essential for genealogy, legal history, and property research.
    - Often held by municipal or regional archives in some jurisdictions.
    - 'Preserved from prior description: Archive organization preserving records created by notaries, including legal instruments and transaction documentation.'
    keywords:
    - notarial records
    - legal instruments
    - civil transactions
    - property documentation
