classes:
  SRUEndpoint:
    is_a: DataServiceEndpointType
    class_uri: hc:SRUEndpoint
    description: Search/Retrieve via URL service interface classification.
    alt_descriptions:
      nl: Service-interface voor zoeken/ophalen via URL-classificatie.
      de: Search/Retrieve via URL Service-Interface-Klassifikation.
      fr: Classification d'interface de service de recherche/récupération via URL.
      es: Clasificación de interfaz de servicio de búsqueda/recuperación vía URL.
      ar: تصنيف واجهة خدمة البحث/الاسترجاع عبر عنوان الويب.
      id: Klasifikasi antarmuka layanan pencarian/pengambilan melalui URL.
      zh: 通过URL进行搜索/检索的服务接口分类。
    structured_aliases:
    - literal_form: SRU-eindpunt
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: SRU-Endpunkt
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: point de terminaison SRU
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: punto final SRU
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نقطة نهاية SRU
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: titik akhir SRU
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: SRU端点
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - SRU
    - search retrieve
    - library protocol
    - CQL
    - federated search
    slot_usage:
      has_specification:
        ifabsent: uri(http://www.loc.gov/standards/sru/)
      has_format:
        ifabsent: string(application/xml)
      has_method:
        ifabsent: string(GET)
    comments:
    - Library-focused search protocol - successor to Z39.50
    - Uses CQL (Contextual Query Language)
    - 'Preserved from prior description: Classification for SRU (Search/Retrieve via URL) endpoints. **Protocol**: SRU/SRW **Purpose**: Library search and retrieval **Standard**: http://www.loc.gov/standards/sru/ **Heritage Sector Usage**: SRU is the successor to Z39.50, commonly used by: - Library union catalogs (WorldCat, GBV) - National library portals - Federated library search **Query Language**: CQL (Contextual Query Language)'
    slots:
    - has_score
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  OpenSearch:
    is_a: DataServiceEndpointType
    class_uri: hc:OpenSearch
    description: Federated search-description and result-discovery interface classification.
    alt_descriptions:
      nl: Federatieve zoekbeschrijving- en resultaat-ontdekking interface-classificatie.
      de: Föderierte Suchbeschreibungs- und Ergebnisentdeckungs-Schnittstellenklassifikation.
      fr: Classification d'interface de description de recherche fédérée et de découverte de résultats.
      es: Clasificación de interfaz de descripción de búsqueda federada y descubrimiento de resultados.
      ar: تصنيف واجهة وصف البحث الموحد واكتشاف النتائج.
      id: Klasifikasi antarmuka deskripsi pencarian terfederasi dan penemuan hasil.
      zh: 联合搜索描述和结果发现接口分类。
    structured_aliases:
    - literal_form: OpenSearch-eindpunt
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: OpenSearch-Endpunkt
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: point de terminaison OpenSearch
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: punto final OpenSearch
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نقطة نهاية البحث المفتوح
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: titik akhir OpenSearch
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 开放搜索端点
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - OpenSearch
    - federated search
    - RSS
    - Atom
    - browser integration
    slot_usage:
      has_specification:
        ifabsent: uri(https://opensearch.org/)
      has_format:
        any_of:
        - equals_string: application/opensearchdescription+xml
        - equals_string: application/atom+xml
        - equals_string: application/rss+xml
      has_method:
        ifabsent: string(GET)
    comments:
    - Federated search standard - browser integration support
    - 'Preserved from prior description: Classification for OpenSearch endpoints. **Protocol**: OpenSearch **Purpose**: Federated search description and results **Standard**: https://opensearch.org/ **Heritage Sector Usage**: OpenSearch enables federated search across multiple sources: - Browser search integration - Cross-repository discovery - Search suggestions **Components**: Description document, RSS/Atom results'
    slots:
    - has_score
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
  IIIFImageAPI:
    is_a: DataServiceEndpointType
    class_uri: hc:IIIFImageAPI
    description: IIIF image-delivery interface classification for parameterized image access.
    alt_descriptions:
      nl: IIIF-beeldleveringsinterface-classificatie voor geparametriseerde beeldtoegang.
      de: IIIF-Bildlieferungs-Schnittstellenklassifikation für parametrisierten Bildzugriff.
      fr: Classification d'interface de livraison d'images IIIF pour l'accès paramétré aux images.
      es: Clasificación de interfaz de entrega de imágenes IIIF para acceso parametrizado a imágenes.
      ar: تصنيف واجهة تسليم صور IIIF للوصول المُعلم للصور.
      id: Klasifikasi antarmuka pengiriman gambar IIIF untuk akses gambar terparameter.
      zh: 用于参数化图像访问的IIIF图像交付接口分类。
    structured_aliases:
    - literal_form: IIIF-beeld-API
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: IIIF-Bild-API
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: API d'image IIIF
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: API de imagen IIIF
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: واجهة برمجة صور IIIF
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: API gambar IIIF
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: IIIF图像API
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - IIIF
    - image API
    - image delivery
    - interoperability
    - deep zoom
    slot_usage:
      has_specification:
        ifabsent: uri(https://iiif.io/api/image/)
      has_format:
        any_of:
        - equals_string: image/jpeg
        - equals_string: image/png
        - equals_string: image/tiff
        - equals_string: image/webp
      has_method:
        ifabsent: string(GET)
    comments:
    - International Image Interoperability Framework - Image API
    - Global standard for heritage image delivery
    - 'Preserved from prior description: Classification for IIIF Image API endpoints. **Protocol**: IIIF Image API **Purpose**: Standardized image manipulation and delivery **Standard**: https://iiif.io/api/image/ **Heritage Sector Usage**: IIIF Image API enables interoperable image access: - Region extraction - Size scaling - Rotation - Format conversion - Quality selection **Widely adopted** by museums, libraries, archives worldwide. **Versions**: 2.1, 3.0'
    slots:
    - has_score
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
