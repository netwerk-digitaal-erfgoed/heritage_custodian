id: https://nde.nl/ontology/hc/class/UniversityArchiveRecordSetTypes
name: UniversityArchiveRecordSetTypes
title: UniversityArchive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  wd: http://www.wikidata.org/entity/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - ./UniversityArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  UniversityAdministrationFonds:
    is_a: UniversityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based grouping for central governance and operational files from
      higher-education institutions.
    alt_descriptions:
      nl: >-
        Recordsettype voor documenten van centrale governance en administratie van
        een universiteit, geordend volgens het fonds-principe.
      de: >-
        Record-Set-Typ fuer Unterlagen der zentralen Hochschulverwaltung, nach
        dem Fonds-Prinzip der Provenienz organisiert.
      fr: >-
        Type d'ensemble documentaire pour les documents de gouvernance et
        d'administration centrale d'une universite, organise selon le principe du fonds.
      es: >-
        Tipo de conjunto documental para registros de gobierno y administracion
        central universitaria, organizado segun el principio de fondo.
      ar: >-
        نوع مجموعة سجلات لوثائق الحوكمة والإدارة المركزية في الجامعة، منظم
        وفق مبدأ الرصيد الأرشيفي (fonds).
      id: >-
        Jenis himpunan rekod untuk dokumen tata kelola dan administrasi pusat
        universitas, diatur menurut prinsip fonds berbasis asal-usul.
      zh: >-
        用于大学中央治理与行政记录的档案集合类型，按 fonds 来源原则组织。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - UniversityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:UniversityAdministrationFonds
      has_custodian:
        equals_string: hc:UniversityArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by UniversityArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: universiteitsbestuursfonds
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Hochschulverwaltungsfonds
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fonds administratif universitaire
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: fondo administrativo universitario
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رصيد الإدارة الجامعية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fonds administrasi universitas
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 高校行政全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - university administration
    - institutional governance
    - higher education records
    - academic management
    - university fonds
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
  StudentRecordSeries:
    is_a: UniversityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Chronological grouping for learner lifecycle files covering enrolment,
      progression, and completion.
    alt_descriptions:
      nl: >-
        Recordsettype voor dossiers over de levenscyclus van studenten, doorgaans
        geordend als terugkerende serie.
      de: >-
        Record-Set-Typ fuer Unterlagen zum studentischen Lebenszyklus, meist als
        wiederkehrende Serie organisiert.
      fr: >-
        Type d'ensemble documentaire pour les dossiers du cycle de vie etudiant,
        generalement organises en serie recurrente.
      es: >-
        Tipo de conjunto documental para expedientes del ciclo de vida estudiantil,
        normalmente organizado como serie recurrente.
      ar: >-
        نوع مجموعة سجلات لملفات دورة حياة الطالب، وعادة ما يُنظم كسلسلة متكررة.
      id: >-
        Jenis himpunan rekod untuk berkas siklus hidup mahasiswa, umumnya
        disusun sebagai seri berulang.
      zh: >-
        用于记录学生生命周期活动的档案集合类型，通常按连续系列组织。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - UniversityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:StudentRecordSeries
      has_custodian:
        equals_string: hc:UniversityArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by UniversityArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: studentendossierserie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Studierendenaktenserie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie de dossiers etudiants
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: serie de expedientes estudiantiles
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: سلسلة سجلات الطلاب
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri rekod mahasiswa
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 学生档案系列
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - student records
    - enrollment files
    - academic progression
    - student lifecycle
    - matriculation records
    annotations:
      custodian_types: '[''*'']'
  FacultyPapersCollection:
    is_a: UniversityArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled body of personal and professional documentation created by
      academic staff.
    alt_descriptions:
      nl: >-
        Recordsettype voor persoonlijke en professionele documenten van
        faculteitsleden, geordend als archiefcollectie.
      de: >-
        Record-Set-Typ fuer persoenliche und berufliche Unterlagen von
        Fakultaeitsmitgliedern, als Archivsammlung geordnet.
      fr: >-
        Ensemble de documents personnels et professionnels produits par le
        personnel académique.
      es: >-
        Tipo de conjunto documental para papeles personales y profesionales del
        profesorado, organizado como coleccion archivistica.
      ar: >-
        نوع مجموعة سجلات للأوراق الشخصية والمهنية لأعضاء هيئة التدريس، مرتبة
        كأرشيف تجميعي.
      id: >-
        Jenis himpunan rekod untuk dokumen pribadi dan profesional dosen,
        disusun sebagai koleksi arsip.
      zh: >-
        用于教职人员个人与职业文献的档案集合类型，按档案馆藏方式编排。
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    see_also:
    - UniversityArchiveRecordSetType
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_custodian
    - has_note
    slot_usage:
      has_type:
        equals_string: hc:FacultyPapersCollection
      has_custodian:
        equals_string: hc:UniversityArchive
      has_note:
        equals_string: >-
          This RecordSetType is typically held by UniversityArchive custodians.
          Inverse of rico:isOrWasHolderOf.
    structured_aliases:
    - literal_form: collectie hooglerarenarchieven
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Sammlung von Fakultaetsnachlaessen
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection de papiers de faculte
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de papeles del profesorado
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة أوراق هيئة التدريس
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi arsip dosen
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 教师文书馆藏
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - faculty papers
    - academic staff archives
    - professor collections
    - scholarly manuscripts
    - academic papers
    annotations:
      custodian_types: '[''*'']'
