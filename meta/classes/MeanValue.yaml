classes:
  MeanValue:
    class_uri: schema:StructuredValue
    description: >-
      Statistical average representing the central tendency of a set of numeric observations.
    alt_descriptions:
      nl: >-
        Statistisch gemiddelde dat de centrale tendens van een reeks numerieke observaties vertegenwoordigt.
      de: >-
        Statistischer Durchschnitt, der die zentrale Tendenz einer Reihe numerischer Beobachtungen darstellt.
      fr: >-
        Moyenne statistique représentant la tendance centrale d'un ensemble d'observations numériques.
      es: >-
        Promedio estadístico que representa la tendencia central de un conjunto de observaciones numéricas.
      ar: >-
        متوسط إحصائي يمثل الاتجاه المركزي لمجموعة من الملاحظات الرقمية.
      id: >-
        Rata-rata statistik yang mewakili kecenderungan sentral dari serangkaian observasi numerik.
      zh: >-
        表示一组数值观测集中趋势的统计平均值。
