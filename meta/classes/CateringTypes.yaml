    - literal_form: comedor de personal
      in_language: es
    - literal_form: كافيتريا
      in_language: ar
    - literal_form: kantin
      in_language: id
    - literal_form: 食堂
      in_language: zh
    slot_usage:
      has_name:
        equals_string: Canteen
    broad_mappings:
