classes:
  ProvincialArchive:
    description: >-
      Government-funded repository at the provincial administrative level responsible
      for preserving official records, notarial documents, and materials of regional significance.
    alt_descriptions:
      nl: >-
        Door de overheid gefinancierde bewaarplaats op provinciaal administratief niveau
        verantwoordelijk voor het bewaren van officiële archieven, notariële akten en regionaal significant materiaal.
      de: >-
        Staatlich finanziertes Archiv auf der Ebene der Provinzverwaltung,
        zuständig für die Erhaltung von Amtsdokumenten, Notariatsakten und regional bedeutsamen Materialien.
      fr: >-
        Dépôt financé par le gouvernement au niveau administratif provincial
        responsable de la préservation des archives officielles, des actes notariés et des documents d'importance régionale.
      es: >-
        Repositorio financiado por el gobierno a nivel administrativo provincial
        responsable de preservar registros oficiales, documentos notariales y materiales de importancia regional.
      ar: >-
        مستودع ممول حكومياً على المستوى الإداري للمقاطعة
        مسؤول عن الحفاظ على السجلات الرسمية والوثائق التوثيقية والمواد ذات الأهمية الإقليمية.
      id: >-
        Repositori yang didanai pemerintah pada tingkat administratif provinsi
        yang bertanggung jawab untuk melestarikan arsip resmi, dokumen notaris, dan material signifikansi regional.
      zh: >-
        省级行政级别的政府资助存储库，
        负责保存官方记录、公证文件和具有区域重要性的材料。
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    close_mappings:
      - wd:Q5403345
      - rico:CorporateBody
    broad_mappings:
      - wd:Q166118
      - skos:Concept
    keywords:
      - provincial archive
      - regional archive
      - government archive
    structured_aliases:
      - literal_form: provinciaal archief
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Provinzarchiv
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: archives provinciales
        predicate: EXACT_SYNONYM
        in_language: fr
    slots:
      - has_type
      - hold_record_set
      - has_score
      - identified_by
    slot_usage:
      identified_by: null
      has_type:
        equals_string: hc:ArchiveOrganizationType
    annotations:
      skos:prefLabel: Provincial Archive
      skos:altLabel: Provinzarchiv, archivo provincial, archives provinciales
      admin_level: provincial
      custodian_status: governmental
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
      - RegionalArchive
      - NationalArchives
      - StateArchives
      - ProvincialHistoricalArchive
    comments:
      - Serves provincial administrative unit
      - Preserves provincial government records
      - May include notarial and other regional records
