id: https://nde.nl/ontology/hc/class/IconographicArchivesRecordSetTypes
name: IconographicArchivesRecordSetTypes
title: Iconographic Archives Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - ./IconographicArchivesRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_custodian
  - ../slots/has_note
classes:
  VisualImageCollection:
    is_a: IconographicArchivesRecordSetType
    class_uri: hc:VisualImageCollection
    description: >-
      A collection of visual images used as documentary evidence or reference.
    alt_descriptions:
      nl: >-
        Een collectie beeldmateriaal dat als documentair bewijs of referentie dient.
      de: >-
        Eine Sammlung visueller Bilder, die als dokumentarischer Nachweis oder Referenz dient.
      fr: >-
        Une collection d'images visuelles utilisees comme preuve documentaire ou comme reference.
      es: >-
        Una coleccion de imagenes visuales utilizada como evidencia documental o referencia.
      ar: >-
        مجموعة من الصور المرئية تُستخدم كدليل وثائقي أو مرجع.
      id: >-
        Koleksi gambar visual yang digunakan sebagai bukti dokumenter atau referensi.
      zh: >-
        用作文献证据或参考的一组视觉图像收藏。
    structured_aliases:
    - literal_form: beeldcollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Bildersammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection d'images
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de imagenes
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة صور
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi gambar
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 图像收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - visual images
      - documentary photography
      - pictorial evidence
      - image collection
      - reference images
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:IconographicArchives"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
  PrintCollection:
    is_a: IconographicArchivesRecordSetType
    class_uri: hc:PrintCollection
    description: >-
      A collection of prints, engravings, and related graphic works preserved for documentation and study.
    alt_descriptions:
      nl: >-
        Een collectie prenten, gravures en aanverwante grafische werken, bewaard voor documentatie en onderzoek.
      de: >-
        Eine Sammlung von Drucken, Stichen und verwandten grafischen Werken, bewahrt zur Dokumentation und Forschung.
      fr: >-
        Une collection d'estampes, de gravures et d'oeuvres graphiques associees, conservee pour la documentation et l'etude.
      es: >-
        Una coleccion de estampas, grabados y obras graficas relacionadas, conservada para documentacion y estudio.
      ar: >-
        مجموعة من المطبوعات والنقوش والأعمال الرسومية ذات الصلة محفوظة للتوثيق والدراسة.
      id: >-
        Koleksi cetakan, ukiran, dan karya grafis terkait yang dipelihara untuk dokumentasi dan kajian.
      zh: >-
        为文献记录与研究而保存的版画、雕版印刷品及相关平面艺术作品收藏。
    structured_aliases:
    - literal_form: prentencollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Druckgrafiksammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: collection d'estampes
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: coleccion de estampas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مجموعة مطبوعات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi cetakan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 版画收藏
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
      - prints
      - engravings
      - graphic works
      - printmaking
      - etchings
      - woodcuts
    slots:
      - has_type
      - has_score
      - has_custodian
      - has_note
    slot_usage:
      has_custodian:
        equals_string: "hc:IconographicArchives"
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
    related_mappings:
      - rico-rst:Collection
