id: https://nde.nl/ontology/hc/class/FrenchPrivateArchivesRecordSetType
name: FrenchPrivateArchivesRecordSetType
title: French Private Archives Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
- linkml:types
- ../classes/CollectionType
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  FrenchPrivateArchivesRecordSetType:
    class_uri: hc:FrenchPrivateArchivesRecordSetType
    is_a: CollectionType
    description: >-
      Classification root for documentary aggregations managed by
      non-state custodians under the French legal and institutional context.
    alt_descriptions:
      nl: >-
        Classificatiewortel voor documentaire aggregaties die worden beheerd
        door niet-statelijke beheerders binnen de Franse juridische en
        institutionele context.
      de: >-
        Klassifikatorischer Wurzelknoten für dokumentarische Aggregationen,
        die von nichtstaatlichen Verwahrern im französischen Rechts- und
        Institutionskontext verwaltet werden.
      fr: >-
        Racine de classification pour des agrégations documentaires gérées par
        des dépositaires non étatiques dans le contexte juridique et
        institutionnel français.
      es: >-
        Raíz de clasificación para agregaciones documentales gestionadas por
        custodios no estatales en el contexto jurídico e institucional francés.
      ar: >-
        جذر تصنيفي للتجميعات الوثائقية التي يديرها أمناء غير تابعين للدولة
        ضمن السياق القانوني والمؤسسي الفرنسي.
      id: >-
        Akar klasifikasi untuk agregasi dokumenter yang dikelola oleh kustodian
        non-negara dalam konteks hukum dan kelembagaan Prancis.
      zh: >-
        用于法国法律与机构语境下由非国家保管方管理文献聚合体的分类根概念。
    slots:
    - has_type
    - has_score
    - has_scope
    slot_usage:
      has_type:
        equals_string: FrenchPrivateArchivesRecordSetType
    structured_aliases:
    - literal_form: type niet-statelijke Franse documentaggregatie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Typ nichtstaatlicher französischer Dokumentaggregation
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type d'agrégation documentaire privée française
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de agregación documental privada francesa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع تجميع وثائقي خاص في فرنسا
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe agregasi dokumenter swasta Prancis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 法国私主体文献聚合类型
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Covers documentary aggregations governed by private, family, religious, or corporate custodians.
    - Supports jurisdiction-aware archival description for non-state governance structures.
    - 'Preserved from prior description: Classification root for documentary aggregates managed by private archival custodians in France.'
    keywords:
    - non-state custodian
    - French legal context
    - documentary aggregation
    - archival governance
    examples:
    - value:
        has_type: FrenchPrivateArchivesRecordSetType
        has_scope: Family correspondence and estate administration files.
      description: Documentary aggregation managed by a non-state custodian in France.
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
