    broad_mappings:
    - skos:Concept
    related_mappings:
    - hc:MediaArchive
    - hc:EducationProviderType
    slots: []
    comments:
    - Geographic scope is primarily Germany and neighboring German-speaking regions.
    - Typical services include educational film lending, media-production support, and teacher training.
    - Common organizational variants include district, city, and state-level centers.
    - Historical predecessor pattern includes Bildstelle-type institutions.
    see_also:
    - Bildstelle
    - MediaArchive
    - EducationProviderType
    slot_usage: {}
