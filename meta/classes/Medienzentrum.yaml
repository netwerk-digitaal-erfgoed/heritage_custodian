classes:
  Medienzentrum:
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    description: >-
      Institution type in German-speaking contexts that provides educational
      audiovisual resources, equipment lending, and instructional support.
    alt_descriptions:
      nl: Instellingstype in Duitstalige contexten dat educatieve audiovisuele bronnen uitleenapparatuur en didactische ondersteuning biedt.
      de: Institutionstyp im deutschsprachigen Raum der audiovisuelle Bildungsressourcen Geraeteausleihe und didaktische Unterstuetzung bereitstellt.
      fr: Type d institution en contexte germanophone fournissant ressources audiovisuelles educatives pret d equipements et soutien pedagogique.
      es: Tipo de institucion en contextos germanohablantes que ofrece recursos audiovisuales educativos prestamo de equipos y apoyo didactico.
      ar: نمط مؤسسي في السياقات الناطقة بالألمانية يوفر موارد سمعية بصرية تعليمية وإعارة معدات ودعما تعليميا.
      id: Tipe institusi di konteks berbahasa Jerman yang menyediakan sumber audiovisual pendidikan peminjaman peralatan dan dukungan instruksional.
      zh: 德语语境中的机构类型，提供教育视听资源、设备借用与教学支持。
    structured_aliases:
    - {literal_form: mediadienstcentrum, in_language: nl}
    - {literal_form: Medienzentrum, in_language: de}
    - {literal_form: centre de ressources medias, in_language: fr}
    - {literal_form: centro de recursos audiovisuales, in_language: es}
    - {literal_form: مركز موارد إعلامية تعليمية, in_language: ar}
    - {literal_form: pusat sumber media pendidikan, in_language: id}
    - {literal_form: 教育媒体资源中心, in_language: zh}
