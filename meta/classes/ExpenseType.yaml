classes:
  ExpenseType:
    abstract: true
    class_uri: skos:Concept
    description: >-
      Abstract categorization for financial outlays, cost allocations, and budgetary expenditures.
    alt_descriptions:
      nl: >-
        Abstracte categorisatie voor financiële uitgaven, kostenverdelingen en begrotingsuitgaven.
      de: >-
        Abstrakte Kategorisierung für finanzielle Ausgaben, Kostenaufteilungen und Haushaltsausgaben.
      fr: >-
        Catégorisation abstraite pour les dépenses financières, les allocations de coûts et les dépenses budgétaires.
      es: >-
        Categorización abstracta para desembolsos financieros, asignaciones de costos y gastos presupuestarios.
      ar: >-
        تصنيف تجريدي للمدفوعات المالية وتوزيعات التكاليف والنفقات الميزانية.
      id: >-
        Kategorisasi abstrak untuk pengeluaran keuangan, alokasi biaya, dan pengeluaran anggaran.
      zh: >-
        财务支出、成本分配和预算开支的抽象分类。
