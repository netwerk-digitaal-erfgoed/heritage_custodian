id: https://nde.nl/ontology/hc/class/DigitalPlatformKeyContact
name: DigitalPlatformKeyContact
title: Digital Platform Key Contact
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
classes:
  DigitalPlatformKeyContact:
    class_uri: schema:Person
    description: >-
      Designated individual responsible for operational, support, or governance communications related to a digital platform.
    alt_descriptions:
      nl: >-
        Aangewezen persoon die verantwoordelijk is voor operationele, ondersteunings- of governance-communicatie met betrekking tot een digitaal platform.
      de: >-
        Zuständige Person, die für betriebliche, Support- oder Governance-Kommunikation in Bezug auf eine digitale Plattform verantwortlich ist.
      fr: >-
        Personne désignée responsable des communications opérationnelles, de support ou de gouvernance liées à une plateforme numérique.
      es: >-
        Persona designada responsable de las comunicaciones operativas, de soporte o de gobernanza relacionadas con una plataforma digital.
      ar: >-
        الشخص المخصص المسؤول عن الاتصالات التشغيلية أو الدعم أو الحوكمة المتعلقة بالمنصة الرقمية.
      id: >-
        Individu yang ditunjuk yang bertanggung jawab atas komunikasi operasional, dukungan, atau tata kelola terkait platform digital.
      zh: >-
        负责与数字平台相关的运营、支持或治理沟通的指定个人。
