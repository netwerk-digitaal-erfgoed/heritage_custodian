classes:
  DigitalPlatformOrganizationProfile:
    class_uri: schema:Organization
    description: >-
      Structured profile section capturing institutional classification, operational scope, and founding circumstances for organizational entities.
    alt_descriptions:
      nl: >-
        Gestructureerd profielgedeelte dat institutionele classificatie, operationele reikwijdte en oprichtingsomstandigheden voor organisatie-entiteiten vastlegt.
      de: >-
        Strukturierter Profilabschnitt, der institutionelle Klassifizierung, operativen Umfang und Gründungsumstände für Organisationseinheiten erfasst.
      fr: >-
        Section de profil structurée capturant la classification institutionnelle, la portée opérationnelle et les circonstances de fondation pour les entités organisationnelles.
      es: >-
        Sección de perfil estructurado que captura la clasificación institucional, el alcance operativo y las circunstancias de fundación para entidades organizativas.
      ar: >-
        قسم ملف منظم يلتقط التصنيف المؤسسي والنطاق التشغيلي وظروف التأسيس للكيانات التنظيمية.
      id: >-
        Bagian profil terstruktur yang menangkap klasifikasi kelembagaan, cakupan operasional, dan keadaan pendirian untuk entitas organisasi.
      zh: >-
        捕获组织实体的机构分类、运营范围和成立情况的结构化配置文件部分。
