id: https://nde.nl/ontology/hc/class/PlanarCoordinates
name: planar_coordinates_class
title: Planar Coordinates Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
- linkml:types
classes:
  PlanarCoordinates:
    description: >-
      2D planar coordinates (x, y) for image regions, bounding boxes, or surfaces.
      Used by BoundingBox to define the origin point. Coordinates are typically
      normalized (0.0-1.0) or in pixels.
    alt_descriptions:
      nl: 2D vlakke coördinaten (x, y) voor beeldregio's, bounding boxes of oppervlakken.
      de: 2D-Planarkoordinaten (x, y) für Bildbereiche, Bounding Boxes oder Oberflächen.
      fr: Coordonnées planaires 2D (x, y) pour les régions d'image.
    structured_aliases:
    - literal_form: vlakkecoördinaten
      in_language: nl
    - literal_form: Planarkoordinaten
      in_language: de
    comments:
    - Used by BoundingBox to define the origin point.
    - Coordinates typically normalized (0.0-1.0) or in pixels.
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class.
      custodian_types: '[''*'']'
    slots: []
