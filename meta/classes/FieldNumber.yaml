id: https://nde.nl/ontology/hc/class/FieldNumber
name: FieldNumber
title: Field Number Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dwc: http://rs.tdwg.org/dwc/terms/
default_prefix: hc
imports:
- linkml:types
classes:
  FieldNumber:
    is_a: Identifier
    class_uri: hc:FieldNumber
    description: >-
      Identifier assigned during fieldwork activities to link field notes, collection events,
      and related documentation records.
    alt_descriptions:
      nl: >-
        Identificator toegewezen tijdens veldwerkactiviteiten om veldnotities, verzamelevenementen
        en gerelateerde documentatierecords te koppelen.
      de: >-
        Identifikator, der während Feldarbeitstätigkeiten vergeben wird, um Feldnotizen,
        Sammlungsereignisse und zugehörige Dokumentationsdatensätze zu verknüpfen.
      fr: >-
        Identifiant attribué lors des activités de terrain pour relier les notes de terrain,
        les événements de collecte et les enregistrements de documentation connexes.
      es: >-
        Identificador asignado durante actividades de trabajo de campo para vincular notas de campo,
        eventos de recolección y registros de documentación relacionados.
      ar: >-
        معرّف يُعيَّن خلال أنشطة العمل الميداني لربط ملاحظات الحقل
        وأحداث الجمع وسجلات التوثيق ذات الصلة.
      id: >-
        Pengidentifikasi yang ditetapkan selama kegiatan kerja lapangan untuk menghubungkan
        catatan lapangan, peristiwa pengumpulan, dan catatan dokumentasi terkait.
      zh: >-
        在野外工作活动中分配的标识符，用于链接野外笔记、采集事件和相关文档记录。
    structured_aliases:
    - literal_form: veldnummer
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Feldnummer
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: numéro de terrain
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: número de campo
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رقم الحقل
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: nomor lapangan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 野外编号
      predicate: EXACT_SYNONYM
      in_language: zh
    close_mappings:
    - dwc:fieldNumber
    comments:
    - Used in natural history and archaeological field documentation.
    - Links specimens, observations, and field notes to collection events.
    - 'Preserved from prior description: Identifier assigned in fieldwork to link field notes, events, and related records.'
    keywords:
    - fieldwork identifier
    - collection event
    - field documentation
    - specimen tracking
    examples:
    - value:
        has_value: FN-2024-001
      description: Field number assigned during 2024 excavation
    annotations:
      specificity_score: 0.3
      specificity_rationale: Domain identifier used in field documentation workflows.
      custodian_types: '["*"]'
