id: https://nde.nl/ontology/hc/class/RelatedType
name: RelatedType-class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
- linkml:types
- ../slots/related_to
classes:
  RelatedType:
    class_uri: hc:RelatedType
    description: >-
      A reference to a related class in the heritage ontology.
    alt_descriptions:
      nl: Een verwijzing naar een gerelateerde klasse in de erfgoed-ontologie.
      de: Ein Verweis auf eine verwandte Klasse in der Heritage-Ontologie.
    structured_aliases:
    - literal_form: gerelateerd type
      in_language: nl
    - literal_form: verwandter Typ
      in_language: de
    - literal_form: type connexe
      in_language: fr
    comments:
    - Used for documenting relationships between types.
    broad_mappings:
    - skos:Concept
    slots:
    - related_to
    annotations:
      specificity_score: 0.3
      specificity_rationale: Universal utility for type relationships
      custodian_types: "['*']"
