id: https://w3id.org/nde/ontology/Nachlass
name: Nachlass
title: Nachlass (Personal Papers)
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/identified_by
  - ../slots/has_score
  - ../slots/has_type
classes:
  Nachlass:
    description: >-
      Repository specializing in preserving and providing access to the personal
      papers, manuscripts, and creative remains of deceased individuals.
    alt_descriptions:
      nl: >-
        Bewaarinstelling gespecialiseerd in het bewaren en toegankelijk maken van de
        persoonlijke paperassen, manuscripten en creatieve nalatenschappen van overleden personen.
      de: >-
        Repositorium, das auf die Bewahrung und Bereitstellung von persönlichen Papieren,
        Manuskripten und kreativen Hinterlassenschaften verstorbener Personen spezialisiert ist.
      fr: >-
        Dépôt spécialisé dans la préservation et l'accès aux papiers personnels, manuscrits
        et vestiges créatifs de personnes décédées.
      es: >-
        Repositorio especializado en preservar y proporcionar acceso a los papeles personales,
        manuscritos y legados creativos de personas fallecidas.
      ar: >-
        مستودع متخصص في حفظ وتوفير الوصول إلى الأوراق الشخصية والمخطوطات والإرث الإبداعي للمتوفين.
      id: >-
        Repositori yang berspesialisasi dalam melestarikan dan menyediakan akses ke kertas
        pribadi, naskah, dan peninggalan kreatif orang yang telah meninggal.
      zh: >-
        专门保存和提供对已故个人文件、手稿和创造性遗作访问的存储库。
    is_a: ArchiveOrganizationType
    class_uri: skos:Concept
    slots:
    - has_type
    - has_score
    - identified_by
    slot_usage:
      identified_by:
    annotations:
      skos:prefLabel: Nachlass
      skos:altLabel: "Personal Papers, Literary Remains, archives form\xE9es du legs, Papers, Bequest"
      collection_type: personal papers
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    see_also:
    - LiteraryArchive
    - PersonalArchive
    - HouseArchive
    - PersonalLibrary
    comments:
    - Nachlass (de)
    - Nachlass (es)
    - "archives form\xE9es du legs (fr)"
    - German archival term widely used internationally
    - Refers to papers left after death of notable person
    - Core concept for personal and literary archives
