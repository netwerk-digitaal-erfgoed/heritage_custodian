id: https://nde.nl/ontology/hc/class/TradeUnionArchiveRecordSetType
name: TradeUnionArchiveRecordSetType
title: Trade Union Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
imports:
  - linkml:types
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/related_to
classes:
  TradeUnionArchiveRecordSetType:
    abstract: true
    class_uri: rico:RecordSetType
    alt_descriptions:
      nl: Abstracte basisklasse voor recordsettypen in vakbonds- en arbeidersarchieven.
      de: Abstrakte Basisklasse fuer Recordset-Typen in Gewerkschafts- und Arbeiterarchiven.
      fr: Classe de base abstraite pour les types de jeux de documents des archives syndicales.
      es: Clase base abstracta para tipos de conjuntos documentales de archivos sindicales.
      ar: فئة أساس مجردة لأنواع مجموعات السجلات في أرشيفات النقابات العمالية.
      id: Kelas dasar abstrak untuk tipe set rekaman dalam arsip serikat pekerja.
      zh: 工会与劳工档案记录集类型的抽象基类。
    structured_aliases:
    - literal_form: type vakbondsarchief-recordset
      in_language: nl
    - literal_form: Gewerkschaftsarchiv-Recordsettyp
      in_language: de
    - literal_form: type de jeu de documents syndical
      in_language: fr
    - literal_form: tipo de conjunto documental sindical
      in_language: es
    - literal_form: نوع مجموعة سجلات نقابية
      in_language: ar
    - literal_form: tipe set rekaman serikat pekerja
      in_language: id
    - literal_form: 工会档案记录集类型
      in_language: zh
    description: >-
      Abstract category for grouping documentary holdings from organized labor
      movements by provenance or arrangement pattern.
    keywords:
    - trade union records
    - labor movement archives
    - workers documentation
    - union collections
    - organized labor heritage
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    see_also:
    - TradeUnionArchive
    - UnionAdministrationFonds
    - CollectiveBargainingSeries
    - StrikeDocumentationCollection
    - LaborPublicationsCollection
    - WorkersPhotographyCollection
    slots:
    - has_type
    - has_score
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
      modeling_notes: |
        This class models record set types, not archive organizations.

        Use TradeUnionArchive for the custodian organization type, and
        TradeUnionArchiveRecordSetType subclasses for fonds/series/collection types.
