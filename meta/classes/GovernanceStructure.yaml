classes:
  GovernanceStructure:
    class_uri: org:OrganizationalUnit
    description: >-
      Organizational unit representing a governance arrangement, authority delegation, or administrative subdivision.
    alt_descriptions:
      nl: >-
        Organisatorische eenheid die een bestuursregeling, bevoegdheidsdelegatie of administratieve onderverdeling vertegenwoordigt.
