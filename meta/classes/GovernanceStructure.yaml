        Organisationseinheit, die eine Governance-Struktur, Befugnisdelegation oder administrative Unterteilung darstellt.
      fr: >-
        Unité organisationnelle représentant un arrangement de gouvernance, une délégation d'autorité ou une subdivision administrative.
      es: >-
        Unidad organizativa que representa un arreglo de gobernanza, delegación de autoridad o subdivisión administrativa.
      ar: >-
        وحدة تنظيمية تمثل ترتيب حوكمة أو تفويض سلطة أو تقسيم إداري.
      id: >-
        Unit organisasi yang mewakili pengaturan tata kelola, delegasi wewenang, atau subdivisi administratif.
      zh: >-
        代表治理安排、权力下放或行政分支的组织单位。
