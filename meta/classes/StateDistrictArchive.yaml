classes:
  StateDistrictArchive:
    description: >-
      Archival institution at the district level within a national archival network,
      preserving records from local government, courts, and administrative bodies.
    alt_descriptions:
      nl: >-
        Archiefinstelling op districts niveau binnen een nationaal archiefnetwerk,
        die archieven bewaart van lokale overheid, rechtbanken en bestuursorganen.
      de: >-
        Archivinstitution auf Bezirksebene innerhalb eines nationalen Archivnetzwerks,
        die Unterlagen von lokaler Regierung, Gerichten und Verwaltungsorganen bewahrt.
      fr: >-
        Institution archivistique au niveau du district au sein d'un réseau archivistique national,
        préservant les documents des gouvernements locaux, des tribunaux et des organes administratifs.
      es: >-
        Institución archivística a nivel de distrito dentro de una red archivística nacional,
        preservando registros del gobierno local, tribunales y organismos administrativos.
      ar: >-
        مؤسسة أرشيفية على مستوى المنطقة ضمن شبكة أرشيف وطنية،
        تحافظ على سجلات الحكومة المحلية والمحاكم والهيئات الإدارية.
      id: >-
        Institusi arsip di tingkat distrik dalam jaringan arsip nasional,
        yang melestarikan catatan dari pemerintah lokal, pengadilan, dan badan administratif.
      zh: >-
        国家档案网络内区级的档案机构，保存地方政府、法院和行政机构的记录。
    is_a: CustodianType
    class_uri: schema:ArchiveOrganization
    close_mappings:
      - wd:Q53131316
      - rico:CorporateBody
    broad_mappings:
      - wd:Q166118
      - skos:Concept
    keywords:
      - state district archive
      - district archive
      - local government archive
    structured_aliases:
