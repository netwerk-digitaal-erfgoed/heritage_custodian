id: https://nde.nl/ontology/hc/classes/CustodianNameConsensus
name: CustodianNameConsensus
title: CustodianNameConsensus
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_type
  - ../slots/in_language
  - ../slots/has_note
  - ../slots/shortened_as
  - ../slots/has_source
  - ../slots/has_url
  - ../slots/has_name
classes:
  CustodianNameConsensus:
    class_uri: prov:Entity
    description: >-
      Adjudicated naming decision derived from reconciling multiple evidence
      sources into a single authoritative designation.
    alt_descriptions:
      nl: >-
        Beoordeelde naamgevingsbeslissing afgeleid van het verenigen van meerdere bewijsbronnen
        tot een enkele gezaghebbende aanduiding.
      de: >-
        Schiedsrichterische Namensentscheidung, die aus der Vereinigung mehrerer Beweisquellen
        zu einer einzigen autoritativen Bezeichnung abgeleitet wurde.
      fr: >-
        Décision de dénomination arbitrée dérivée de la réconciliation de plusieurs sources
        de preuves en une seule désignation faisant autorité.
      es: >-
        Decisión de nomenclatura adjudicada derivada de reconciliar múltiples fuentes de
        evidencia en una sola designación autorizada.
      ar: >-
        قرار تسمية محكوم مستمد من التوفيق بين مصادر أدلة متعددة في تسمية موثوقة واحدة.
      id: >-
        Keputusan penamaan yang diadjudikasi yang berasal dari rekonsiliasi beberapa sumber
        bukti menjadi satu penunjukan otoritatif.
      zh: >-
        从多个证据来源协调为单一权威指定得出的裁决命名决定。
    broad_mappings:
      - prov:Entity
    close_mappings:
      - skos:Concept
    related_mappings:
      - schema:name
    slots:
      - has_type
      - has_source
      - has_url
      - in_language
      - has_name
      - has_note
      - shortened_as
