id: https://nde.nl/ontology/hc/classes/WebSource
name: WebSource
title: WebSource
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  pav: http://purl.org/pav/
  dcat: http://www.w3.org/ns/dcat#
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
imports:
- linkml:types
# default_range: string
classes:
  WebSource:
    description: >-
      URL or internet address consulted during data gathering, research,
      or profile compilation activities.
    alt_descriptions:
      nl: Webbron gebruikt voor profielcompilatie, een URL die geraadpleegd werd.
      de: Webquelle für die Profilerstellung, eine URL, die konsultiert wurde.
      fr: Source web utilisée pour la compilation de profil, une URL consultée.
      es: Fuente web utilizada para la compilación de perfiles, una URL consultada.
      ar: مصدر ويب مستخدم لتجميع الملف الشخصي، عنوان URL تمت استشارته.
      id: Sumber web yang digunakan untuk kompilasi profil, URL yang dikonsultasikan.
      zh: 用于档案编制的网页资源参考，一个被咨询的URL。
    structured_aliases:
    - literal_form: webbron
      in_language: nl
    - literal_form: Web-Quelle
      in_language: de
    - literal_form: source web
      in_language: fr
    - literal_form: fuente web
      in_language: es
    - literal_form: مصدر ويب
      in_language: ar
    - literal_form: sumber web
      in_language: id
    - literal_form: 网页来源
      in_language: zh
    comments:
    - Captures reference to online resource from which information was derived.
    class_uri: dcat:Resource
    broad_mappings:
    - dcat:Resource
    close_mappings:
    - schema:WebPage
    related_mappings:
    - prov:Entity
    - schema:CreativeWork
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_timestamp
