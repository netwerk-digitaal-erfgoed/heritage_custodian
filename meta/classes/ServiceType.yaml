id: https://nde.nl/ontology/hc/class/ServiceType
name: ServiceType
title: Service Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
classes:
  ServiceType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Abstract base class for service type classifications.
    alt_descriptions:
      nl: Abstracte basisklasse voor servicetype-classificaties.
      de: Abstrakte Basisklasse für Dienstleistungstyp-Klassifizierungen.
      fr: Classe de base abstraite pour les classifications de types de service.
    structured_aliases:
    - literal_form: servicetype
      in_language: nl
    - literal_form: Dienstleistungstyp
      in_language: de
    - literal_form: type de service
      in_language: fr
    comments:
    - Service categories include VISITOR, RESEARCH, CONSERVATION, REPRODUCTION, EDUCATIONAL.
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    annotations:
      specificity_score: '0.45'
      specificity_rationale: Moderately specific - service types common in institutions.
      custodian_types: "['*']"
