id: https://nde.nl/ontology/hc/class/EngagementMetric
name: EngagementMetric
title: Engagement Metric Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/

default_prefix: hc

imports:
- linkml:types
- ../metadata
- ../slots/has_type
- ../slots/has_measurement_unit
- ../slots/has_value
classes:
  EngagementMetric:
    class_uri: schema:InteractionCounter
    description: >-
      Quantitative interaction measure used to track audience engagement with
      digital content or services.
    alt_descriptions:
      nl: Kwantitatieve interactiemaat voor het volgen van publieksbetrokkenheid bij digitale content of diensten.
      de: Quantitatives Interaktionsmass zur Erfassung der Publikumsbeteiligung an digitalen Inhalten oder Diensten.
      fr: Mesure quantitative d interaction pour suivre l engagement du public envers des contenus ou services numeriques.
      es: Medida cuantitativa de interaccion para seguir la participacion del publico con contenidos o servicios digitales.
      ar: مقياس تفاعل كمي لتتبع انخراط الجمهور مع المحتوى أو الخدمات الرقمية.
      id: Ukuran interaksi kuantitatif untuk melacak keterlibatan audiens pada konten atau layanan digital.
      zh: 用于跟踪受众对数字内容或服务参与度的量化交互指标。
    structured_aliases:
    - {literal_form: betrokkenheidsmetric, in_language: nl}
    - {literal_form: Engagement-Metrik, in_language: de}
    - {literal_form: metrique d engagement, in_language: fr}
    - {literal_form: metrica de interaccion, in_language: es}
    - {literal_form: مؤشر تفاعل, in_language: ar}
    - {literal_form: metrik keterlibatan, in_language: id}
    - {literal_form: 互动指标, in_language: zh}
    exact_mappings:
    - schema:InteractionCounter

    slots:
    - has_type
    - has_value
    - has_measurement_unit

    slot_usage:
      has_type:
#         range: string
      has_value:
        range: decimal
      has_measurement_unit:
#         range: string
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.4
      specificity_rationale: Common digital metric.
