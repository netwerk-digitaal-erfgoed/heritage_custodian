id: https://nde.nl/ontology/hc/class/Wifi
name: Wifi
title: Wifi Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
classes:
  Wifi:
    class_uri: schema:LocationFeatureSpecification
    description: >-
      Wireless internet access specification for heritage institution locations,
      indicating whether visitors can connect to Wi-Fi networks on premises.
    alt_descriptions:
      nl: >-
        Specificatie voor draadloze internettoegang bij erfgoedinstellingen,
        aangevend of bezoekers verbinding kunnen maken met Wi-Fi-netwerken op locatie.
      de: >-
        Spezifikation für drahtlosen Internetzugang an Heritage-Institutionen,
        die angibt, ob Besucher sich vor Ort mit WLAN-Netzwerken verbinden können.
      fr: >-
        Spécification d'accès Internet sans fil pour les lieux d'institutions patrimoniales,
        indiquant si les visiteurs peuvent se connecter aux réseaux Wi-Fi sur place.
      es: >-
        Especificación de acceso a Internet inalámbrico para ubicaciones de instituciones patrimoniales,
        indicando si los visitantes pueden conectarse a redes Wi-Fi en el local.
      ar: >-
        مواصفات الوصول إلى الإنترنت اللاسلكي لمواقع المؤسسات التراثية،
        تشير إلى ما إذا كان الزوار يمكنهم الاتصال بشبكات Wi-Fi في الموقع.
      id: >-
        Spesifikasi akses internet nirkabel untuk lokasi institusi warisan,
        menunjukkan apakah pengunjung dapat terhubung ke jaringan Wi-Fi di lokasi.
      zh: >-
        遗产机构地点的无线互联网接入规范，
        指示访客是否可以在现场连接Wi-Fi网络。
    broad_mappings:
      - schema:LocationFeatureSpecification
    structured_aliases:
      - literal_form: wifi
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: draadloos internet
        predicate: RELATED_SYNONYM
        in_language: nl
      - literal_form: WLAN
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: drahtloses Netzwerk
        predicate: RELATED_SYNONYM
        in_language: de
      - literal_form: wi-fi
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: sans fil
        predicate: RELATED_SYNONYM
        in_language: fr
      - literal_form: wifi
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: inalámbrico
        predicate: RELATED_SYNONYM
        in_language: es
    comments:
      - Indicates whether wireless internet access is available for visitors
      - May include details about network name, access requirements, or coverage areas
    keywords:
      - wifi
      - wireless
      - internet
      - network
      - connectivity
    slots:
      - has_description
    examples:
      - value:
          has_description: Free Wi-Fi available throughout the museum
        description: Public Wi-Fi announcement
      - value:
          has_description: Wi-Fi available in reading room only
        description: Limited access scenario
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class for location amenity specification
      custodian_types: '["*"]'
