id: https://nde.nl/ontology/hc/class/Type
name: Type
title: Type
description: A generic type.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_name
classes:
  Type:
    class_uri: skos:Concept
    description: >-
      Abstract classification concept used to group entities by shared
      characteristics.
    alt_descriptions:
      nl: Abstracte categorie om entiteiten op gedeelde kenmerken te classificeren.
      de: Abstrakte Kategorie zur Klassifikation von Entitaeten nach gemeinsamen Merkmalen.
      fr: Categorie abstraite servant a classer des entites selon des caracteristiques communes.
      es: Categoria abstracta para clasificar entidades por caracteristicas compartidas.
      ar: فئة تجريدية تُستخدم لتصنيف الكيانات وفق خصائص مشتركة.
      id: Kategori abstrak untuk mengklasifikasikan entitas berdasarkan karakteristik bersama.
      zh: 用于按共同特征对实体进行分类的抽象类别。
    structured_aliases:
    - literal_form: typecategorie
      in_language: nl
    - literal_form: Typkategorie
      in_language: de
    - literal_form: categorie de type
      in_language: fr
    - literal_form: categoria de tipo
      in_language: es
    - literal_form: فئة نوع
      in_language: ar
    - literal_form: kategori tipe
      in_language: id
    - literal_form: 类型类别
      in_language: zh
    annotations:
      custodian_types: '["*"]'
    slots:
      - has_name
