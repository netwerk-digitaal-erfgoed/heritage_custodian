classes:
  FeaturePlace:
    is_a: ReconstructedEntity
    class_uri: crm:E27_Site
    description: >-
      Typological classification assigning building or site characteristics to a referenced location.
    alt_descriptions:
      nl: >-
        Typologische classificatie die gebouw- of locatiekenmerken toekent aan een gerefereerde locatie.
      de: >-
        Typologische Klassifikation, die einem referenzierten Ort Gebäude- oder Standortmerkmale zuweist.
      fr: >-
        Classification typologique attribuant des caractéristiques de bâtiment ou de site à un lieu référencé.
      es: >-
        Clasificación tipológica que asigna características de edificio o sitio a una ubicación referenciada.
      ar: >-
        تصنيف نمطي يخصص خصائص المبنى أو الموقع لموقع مُشار إليه.
      id: >-
        Klasifikasi tipologis yang menetapkan karakteristik bangunan atau situs ke lokasi yang dirujuk.
      zh: >-
        将建筑或场地特征分配给参考位置的类型分类。
