id: https://nde.nl/ontology/hc/class/ICHSafeguardingType
name: ICHSafeguardingType
title: ICH Safeguarding Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
classes:
  ICHSafeguardingType:
    class_uri: hc:ICHSafeguardingType
    description: >-
      Controlled category differentiating safeguarding strategy approaches such as documentation, transmission, awareness, or legal protection for intangible heritage.
    alt_descriptions:
      nl: >-
        Gecontroleerde categorie die veiligstellingsstrategiebenaderingen differentieert zoals documentatie, overdracht, bewustzijn of juridische bescherming voor immaterieel erfgoed.
      de: >-
        Kontrollierte Kategorie zur Differenzierung von Sicherungsstrategieansätzen wie Dokumentation, Weitergabe, Bewusstsein oder rechtlichem Schutz für immaterielles Erbe.
      fr: >-
        Catégorie contrôlée différenciant les approches de stratégies de sauvegarde telles que la documentation, la transmission, la sensibilisation ou la protection juridique pour le patrimoine immatériel.
      es: >-
        Categoría controlada que diferencia enfoques de estrategias de salvaguarda como documentación, transmisión, sensibilización o protección legal para patrimonio inmaterial.
      ar: >-
        فئة مضبوطة تميز مناهج استراتيجيات الحماية مثل التوثيق أو النقل أو التوعية أو الحماية القانونية للتراث غير المادي.
      id: >-
        Kategori terkontrol yang membedakan pendekatan strategi perlindungan seperti dokumentasi, transmisi, kesadaran, atau perlindungan hukum untuk warisan takbenda.
      zh: >-
        区分非物质遗产保护策略方法（如文献、传承、宣传或法律保护）的受控类别。
    structured_aliases:
    - literal_form: ICH-beschermingstype
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: ICH-Sicherungstyp
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: type de sauvegarde PCI
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: tipo de salvaguarda PCI
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: نوع حماية التراث غير المادي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: tipe perlindungan ICH
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 非遗保护类型
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_label
    broad_mappings:
    - skos:Concept
    comments:
    - Aligns with UNESCO 2003 Convention safeguarding measures.
    - Used for classifying safeguarding activities in ICH inventories.
    - 'Preserved from prior description: Controlled category for differentiating safeguarding strategy forms such as documentation, transmission, awareness, or legal protection.'
    keywords:
    - safeguarding strategy
    - intangible heritage protection
    - UNESCO ICH measures
    - transmission support
    examples:
    - value:
        has_label: Transmission through Education
      description: ICH safeguarding type for educational programs
