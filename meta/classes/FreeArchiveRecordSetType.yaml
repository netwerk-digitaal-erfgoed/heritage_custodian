id: https://nde.nl/ontology/hc/class/FreeArchiveRecordSetType
name: FreeArchiveRecordSetType
title: Free Archive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../classes/CollectionType
  - ../slots/has_scope
  - ../slots/has_score
  - ../slots/has_type
classes:
  FreeArchiveRecordSetType:
    class_uri: hc:FreeArchiveRecordSetType
    is_a: CollectionType
    description: >-
      Classification root for documentary aggregates commonly curated by
      independent social-movement archives.
    alt_descriptions:
      nl: Classificatieroot voor documentaire gehelen die doorgaans door onafhankelijke bewegingenarchieven worden beheerd.
      de: Klassifikationswurzel fuer Dokumentaggregate, die typischerweise von unabhaengigen Bewegungsarchiven verwaltet werden.
      fr: Racine de classification pour les ensembles documentaires couramment conserves par des archives independantes de mouvements sociaux.
      es: Raiz de clasificacion para agregados documentales habitualmente conservados por archivos independientes de movimientos sociales.
      ar: جذر تصنيفي للتجمعات الوثائقية التي تديرها عادة أرشيفات الحركات الاجتماعية المستقلة.
      id: Akar klasifikasi untuk agregat dokumenter yang lazim dikurasi oleh arsip gerakan sosial independen.
      zh: 用于独立社会运动档案机构常见文献聚合体的分类根节点。
    structured_aliases:
      - literal_form: vrij-archiefbestandtype
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Freies-Archiv-Bestandstyp
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: type d'ensemble documentaire d'archive libre
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: tipo de conjunto documental de archivo libre
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: نوع مجموعة سجلات أرشيف مستقل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: tipe set arsip independen
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 自由档案记录集类型
        predicate: EXACT_SYNONYM
        in_language: zh
    keywords:
      - independent archive
      - social movement documentation
      - documentary aggregate classification
      - archival taxonomy
    slots:
      - has_type
      - has_score
      - has_scope
    broad_mappings:
      - rico:RecordSetType
      - skos:Concept
      - crm:E55_Type
