classes:
  FilmArchive:
    is_a: ArchiveOrganizationType
    class_uri: schema:ArchiveOrganization
    description: >-
      Institution dedicated to acquiring, conserving, and making accessible cinematographic works and moving image materials.
    alt_descriptions:
      nl: >-
        Instelling die gewijd is aan het verwerven, conserveren en toegankelijk maken van cinematografische werken en bewegend beeld materiaal.
      de: >-
        Einrichtung, die dem Erwerb, der Konservierung und der Zugänglichmachung von Filmwerken und Bewegtbildmaterialien gewidmet ist.
      fr: >-
        Institution dédiée à l'acquisition, la conservation et la mise à disposition d'œuvres cinématographiques et de matériaux d'images animées.
      es: >-
        Institución dedicada a adquirir, conservar y poner a disposición obras cinematográficas y materiales de imágenes en movimiento.
      ar: >-
        مؤسسة مكرسة لاقتناء وحفظ وإتاحة الأعمال السينمائية ومواد الصور المتحركة.
      id: >-
        Lembaga yang didedikasikan untuk memperoleh, mengawetkan, dan menyediakan akses ke karya sinematografis dan materi gambar bergerak.
      zh: >-
        专门收集、保存和提供电影作品和动态影像材料访问的机构。
