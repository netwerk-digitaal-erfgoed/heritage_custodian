id: https://w3id.org/nde/ontology/IconographicArchives
name: IconographicArchives
title: Iconographic Archives
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
- linkml:types
- ../classes/ArchiveOrganizationType
- ../slots/identified_by
- ../slots/has_score
- ../slots/has_type
- ../slots/hold_record_set
classes:
  IconographicArchives:
    class_uri: hc:IconographicArchives
    is_a: ArchiveOrganizationType
    description: >-
      Organization dedicated to acquiring, preserving, and providing access to
      visual materials including prints, engravings, drawings, and photographs.
    alt_descriptions:
      nl: >-
        Instelling gewijd aan het verzamelen, bewaren en ontsluiten van visuele materialen
        zoals prenten, gravures, tekeningen en fotografie.
      de: >-
        Einrichtung, die dem Sammeln, Bewahren und Erschließen visueller Materialien
        wie Drucke, Stiche, Zeichnungen und Fotografie gewidmet ist.
      fr: >-
        Institution dédiée à l'acquisition, la préservation et l'accès aux matériaux visuels
        tels que les estampes, les gravures, les dessins et la photographie.
      es: >-
        Institución dedicada a adquirir, preservar y proporcionar acceso a materiales visuales
        como grabados, estampas, dibujos y fotografía.
      ar: >-
        مؤسسة مكرسة لاقتناء وحفظ وتوفير الوصول إلى المواد البصرية
        مثل المطبوعات والنقوش والرسومات والتصوير الفوتوغرافي.
      id: >-
        Lembaga yang didedikasikan untuk mengakuisisi, melestarikan, dan menyediakan akses
        ke materi visual seperti cetakan, ukiran, gambar, dan fotografi.
      zh: >-
        致力于获取、保存和提供视觉材料（如版画、雕刻、素描和摄影）访问的机构。
    slots:
    - has_type
    - hold_record_set
    - has_score
    - identified_by
    slot_usage:
      has_type:
        equals_string: hc:ArchiveOrganizationType
    broad_mappings:
    - schema:ArchiveOrganization
    - wd:Q166118
    close_mappings:
    - wd:Q117810712
    - rico:CorporateBody
    structured_aliases:
    - literal_form: iconografische archieven
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: ikonografische Archive
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: archives iconographiques
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: archivos iconográficos
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: أرشيفات أيقونوغرافية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: arsip ikonografis
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 图像档案馆
      predicate: EXACT_SYNONYM
      in_language: zh
    comments:
    - Specializes in visual documentation and artistic heritage
    - Collections include prints, drawings, photographs, and graphic works
    - Often part of museums, libraries, or independent cultural institutions
    - 'Preserved from prior description: Archival institution specializing in preservation and access of pictorial documentation such as prints, drawings, and photographs.'
    keywords:
    - visual heritage
    - pictorial collections
    - prints
    - drawings
    - photographs
    - graphic arts
    examples:
    - value:
        has_label: Iconographic Archive Netherlands
        hold_record_set: pictorial_collection
      description: National visual documentation repository
    annotations:
      specificity_score: 0.6
      specificity_rationale: Specialized archive type for visual heritage collections
      custodian_types: "['*']"
