  OrganicMaterial:
    is_a: MaterialType
    class_uri: hc:OrganicMaterial
    description: >-
      Naturally occurring substance derived from living organisms, including plant and animal-based materials.
    alt_descriptions:
      nl: >-
        Van nature voorkomende stof afkomstig van levende organismen, inclusief plantaardige en dierlijke materialen.
      de: >-
        Natürlich vorkommende Substanz, die von lebenden Organismen stammt, einschließlich pflanzlicher und tierischer Materialien.
      fr: >-
        Substance naturelle dérivée d'organismes vivants, incluant les matériaux végétaux et animaux.
      es: >-
        Sustancia de origen natural derivada de organismos vivos, incluyendo materiales vegetales y animales.
      ar: >-
        مادة طبيعية مشتقة من الكائنات الحية، بما في ذلك المواد النباتية والحيوانية.
      id: >-
        Zat yang terjadi secara alami yang berasal dari organisme hidup, termasuk bahan nabati dan hewani.
      zh: >-
        源自生物体的天然物质，包括植物和动物基材料。
    structured_aliases:
    - literal_form: organisch materiaal
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: organisches Material
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: matière organique
      predicate: EXACT_SYNONYM
