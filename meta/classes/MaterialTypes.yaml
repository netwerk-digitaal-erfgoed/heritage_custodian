      in_language: id
    - literal_form: 有机材料
      predicate: EXACT_SYNONYM
      in_language: zh
    close_mappings:
    - aat:300011914
    broad_mappings:
    - skos:Concept
    - crm:E55_Type
    keywords:
    - organic
    - natural
    - plant
    - animal
    - biological
    notes:
    - |
      Preserved from prior description (commit 6e634651):

      "Plant and animal-derived materials requiring stable climate control.\n\n**INCLUDES**: Paper, parchment, vellum, leather, wood, textiles (cotton,\nlinen, silk, wool), adhesives (animal glue, starch), natural fibers.\n\n**PRESERVATION**: Typically requires 18-20\xB0C, 45-55% RH. Susceptible to\nmold, insect damage, and dimensional changes from humidity fluctuation.\n\n**AAT Alignment**: aat:300011914 (organic material)\n"
    comments:
    - 'Preserved from prior description: Organic material class including plant and animal-derived substances.'
