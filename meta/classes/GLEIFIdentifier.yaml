id: https://nde.nl/ontology/hc/class/GLEIFIdentifier
name: GLEIFIdentifier
title: GLEIF Identifier Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  gleif: https://www.gleif.org/ontology/Base/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
- linkml:types
classes:
  GLEIFIdentifier:
    is_a: Identifier
    class_uri: hc:GLEIFIdentifier
    description: >-
      Alphanumeric code referencing a legal-entity registration record within the Global Legal Entity Identifier ecosystem.
    alt_descriptions:
      nl: >-
        Alfanumerieke code die verwijst naar een registratierecord van een rechtspersoon
        binnen het Global Legal Entity Identifier-ecosysteem.
      de: >-
        Alphanumerischer Code, der auf einen Registrierungsdatensatz einer juristischen Person
        im Global Legal Entity Identifier-Ökosystem verweist.
      fr: >-
        Code alphanumérique référençant un enregistrement d'entité légale
        dans l'écosystème Global Legal Entity Identifier.
      es: >-
        Código alfanumérico que referencia un registro de entidad legal
        en el ecosistema Global Legal Entity Identifier.
      ar: >-
        رمز أبجدي رقمي يشير إلى سجل كيان قانوني
        في منظومة المعرف القانوني العالمي.
      id: >-
        Kode alfanumerik yang mereferensikan catatan registrasi entitas hukum
        dalam ekosistem Global Legal Entity Identifier.
      zh: >-
        引用全球法人识别符生态系统中法律实体注册记录的字母数字代码。
    structured_aliases:
    - literal_form: LEI-code
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: LEI-Code
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: identifiant LEI
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: identificador LEI
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: معرف LEI
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kode LEI
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: LEI标识符
      predicate: EXACT_SYNONYM
      in_language: zh
    close_mappings:
    - dcterms:Identifier
    related_mappings:
    - gleif:RegistrationAuthorityCode
    comments:
    - LEI provides standardized identification for financial transactions and regulatory compliance.
    - Format is 20-character alphanumeric code conforming to ISO 17442.
    - 'Preserved from prior description: Identifier referencing a legal-entity record in the GLEIF ecosystem.'
    keywords:
    - legal entity identification
    - financial compliance
    - ISO 17442
    - regulatory identifier
    examples:
    - value: 54930084UKLVMY22DS16
      description: Sample LEI format for a legal entity
    annotations:
      specificity_score: 0.3
      specificity_rationale: External legal-entity identifier for governance and compliance linking.
      custodian_types: '["*"]'
