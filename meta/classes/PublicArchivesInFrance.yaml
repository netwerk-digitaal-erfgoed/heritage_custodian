classes:
  PublicArchivesInFrance:
    description: >-
      Public-law institution in France responsible for preserving records created or received by government entities.
    alt_descriptions:
      nl: >-
        Instelling onder publiekrecht in Frankrijk verantwoordelijk voor het bewaren van archieven die door overheidsinstanties zijn gecreëerd of ontvangen.
      de: >-
        Öffentlich-rechtliche Institution in Frankreich, die für die Bewahrung von Unterlagen verantwortlich ist, die von Regierungsstellen erstellt oder empfangen wurden.
      fr: >-
        Institution de droit public en France chargée de la conservation des archives créées ou reçues par les entités gouvernementales.
      es: >-
        Institución de derecho público en Francia responsable de preservar los registros creados o recibidos por entidades gubernamentales.
      ar: >-
        مؤسسة قانونية عامة في فرنسا مسؤولة عن الحفاظ على السجلات التي أنشأتها أو تلقتها الكيانات الحكومية.
      id: >-
        Institusi hukum publik di Prancis yang bertanggung jawab untuk melestarikan catatan yang dibuat atau diterima oleh entitas pemerintah.
      zh: >-
        法国公法机构，负责保存政府实体创建或接收的记录。
