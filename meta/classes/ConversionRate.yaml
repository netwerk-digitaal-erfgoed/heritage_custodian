classes:
  ConversionRate:
    class_uri: schema:QuantitativeValue
    description: >-
      Percentage metric expressing the proportion of a source population that
      completes a defined target action within a specified timeframe.
    alt_descriptions:
      nl: >-
        Percentage-metric die de verhouding uitdrukt van een bronpopulatie die een
        gedefinieerde doelactie voltooit binnen een gespecificeerd tijdsbestek.
      de: >-
        Prozentsatz-Metrik, die den Anteil einer Ausgangspopulation ausdrückt, der eine
        definierte Zielhandlung innerhalb eines bestimmten Zeitraums abschließt.
      fr: >-
        Métrique de pourcentage exprimant la proportion d'une population source qui
        termine une action cible définie dans un délai spécifié.
      es: >-
        Métrica porcentual que expresa la proporción de una población fuente que completa
        una acción objetivo definida dentro de un plazo especificado.
      ar: >-
        مقياس نسبة مئوية يعبر عن نسبة السكان المصدر الذين يكملون إجراءً مستهدفًا محددًا ضمن إطار زمني محدد.
      id: >-
        Metrik persentase yang menyatakan proporsi populasi sumber yang menyelesaikan
        tindakan target yang ditentukan dalam jangka waktu tertentu.
      zh: >-
        表示在指定时间范围内完成定义目标动作的源群体比例的百分比指标。
