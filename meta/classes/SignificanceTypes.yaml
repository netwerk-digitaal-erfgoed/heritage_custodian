id: https://nde.nl/ontology/hc/class/SignificanceTypes
name: significance_types_class
title: Significance Types Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
imports:
- ./SignificanceType
- linkml:types
- ../metadata
default_prefix: hc
classes:
  CommunitySignificance:
    is_a: SignificanceType
    class_uri: hc:CommunitySignificance
    description: >-
      Significance to a community, relating to cultural identity and social cohesion.
    alt_descriptions:
      nl: Betekenis voor een gemeenschap, met betrekking tot culturele identiteit en sociale samenhang.
      de: Bedeutung für eine Gemeinschaft, bezogen auf kulturelle Identität und sozialen Zusammenhalt.
      fr: Importance pour une communauté, liée à l'identité culturelle et à la cohésion sociale.
      es: Importancia para una comunidad, relacionada con la identidad cultural y la cohesión social.
      ar: أهمية للمجتمع تتعلق بالهوية الثقافية والتماسك الاجتماعي.
      id: Pentingnya bagi suatu komunitas, terkait identitas budaya dan kohesi sosial.
      zh: 对社区的意义，涉及文化认同与社会凝聚力。
    structured_aliases:
    - literal_form: gemeenschapsbetekenis
      in_language: nl
    - literal_form: Gemeinschaftsbedeutung
      in_language: de
    - literal_form: importance communautaire
      in_language: fr
    - literal_form: importancia comunitaria
      in_language: es
    - literal_form: أهمية مجتمعية
      in_language: ar
    - literal_form: signifikansi komunitas
      in_language: id
    - literal_form: 社区意义
      in_language: zh
    keywords:
    - community
    - cultural identity
    - social cohesion
    - collective memory
    comments:
    - Aspects include cultural identity, social cohesion, historical continuity, sense of place.
    - Use cases include UNESCO Intangible Cultural Heritage listings, regional traditions.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.4
      specificity_rationale: Community significance central to cultural heritage justification.
      custodian_types: "['*']"
  EconomicSignificance:
    is_a: SignificanceType
    class_uri: hc:EconomicSignificance
    description: >-
      Economic importance and impact.
    alt_descriptions:
      nl: Economisch belang en impact.
      de: Wirtschaftliche Bedeutung und Auswirkung.
      fr: Importance économique et impact.
      es: Importancia económica e impacto.
      ar: الأهمية الاقتصادية والتأثير.
      id: Pentingnya ekonomi dan dampaknya.
      zh: 经济重要性与影响力。
    structured_aliases:
    - literal_form: economische betekenis
      in_language: nl
    - literal_form: Wirtschaftliche Bedeutung
      in_language: de
    - literal_form: importance économique
      in_language: fr
    - literal_form: importancia económica
      in_language: es
    - literal_form: أهمية اقتصادية
      in_language: ar
    - literal_form: signifikansi ekonomi
      in_language: id
    - literal_form: 经济意义
      in_language: zh
    keywords:
    - economic
    - tourism revenue
    - employment
    - heritage economy
    comments:
    - Aspects include tourism revenue, local employment, heritage economy contribution.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.45
      specificity_rationale: Economic significance important for heritage sustainability.
  HistoricalSignificance:
    is_a: SignificanceType
    class_uri: hc:HistoricalSignificance
    description: >-
      Historical importance and relevance.
    alt_descriptions:
      nl: Historisch belang en relevantie.
      de: Historische Bedeutung und Relevanz.
      fr: Importance historique et pertinence.
      es: Importancia histórica y relevancia.
      ar: الأهمية التاريخية والصلة.
      id: Pentingnya sejarah dan relevansinya.
      zh: 历史重要性与相关性。
    structured_aliases:
    - literal_form: historische betekenis
      in_language: nl
    - literal_form: Historische Bedeutung
      in_language: de
    - literal_form: importance historique
      in_language: fr
    - literal_form: importancia histórica
      in_language: es
    - literal_form: أهمية تاريخية
      in_language: ar
    - literal_form: signifikansi sejarah
      in_language: id
    - literal_form: 历史意义
      in_language: zh
    keywords:
    - historical
    - historical continuity
    - documentary evidence
    - period representation
    comments:
    - Aspects include historical continuity, documentary evidence, period representation.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.4
      specificity_rationale: Historical significance fundamental to heritage assessment.
  ScientificSignificance:
    is_a: SignificanceType
    class_uri: hc:ScientificSignificance
    description: >-
      Scientific or research importance.
    alt_descriptions:
      nl: Wetenschappelijk of onderzoeksbelang.
      de: Wissenschaftliche oder Forschungsbedeutung.
      fr: Importance scientifique ou de recherche.
      es: Importancia científica o de investigación.
      ar: الأهمية العلمية أو البحثية.
      id: Pentingnya ilmiah atau penelitian.
      zh: 科学或研究重要性。
    structured_aliases:
    - literal_form: wetenschappelijke betekenis
      in_language: nl
    - literal_form: Wissenschaftliche Bedeutung
      in_language: de
    - literal_form: importance scientifique
      in_language: fr
    - literal_form: importancia científica
      in_language: es
    - literal_form: أهمية علمية
      in_language: ar
    - literal_form: signifikansi ilmiah
      in_language: id
    - literal_form: 科学意义
      in_language: zh
    keywords:
    - scientific
    - research value
    - type specimens
    - unique materials
    comments:
    - Aspects include research value, type specimens, unique materials.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.55
      specificity_rationale: Scientific significance specific to research collections.
  AestheticSignificance:
    is_a: SignificanceType
    class_uri: hc:AestheticSignificance
    description: >-
      Aesthetic or artistic importance.
    alt_descriptions:
      nl: Esthetisch of artistiek belang.
      de: Ästhetische oder künstlerische Bedeutung.
      fr: Importance esthétique ou artistique.
      es: Importancia estética o artística.
      ar: الأهمية الجمالية أو الفنية.
      id: Pentingnya estetika atau artistik.
      zh: 审美或艺术重要性。
    structured_aliases:
    - literal_form: esthetische betekenis
      in_language: nl
    - literal_form: Ästhetische Bedeutung
      in_language: de
    - literal_form: importance esthétique
      in_language: fr
    - literal_form: importancia estética
      in_language: es
    - literal_form: أهمية جمالية
      in_language: ar
    - literal_form: signifikansi estetika
      in_language: id
    - literal_form: 审美意义
      in_language: zh
    keywords:
    - aesthetic
    - artistic merit
    - architectural significance
    - design innovation
    comments:
    - Aspects include artistic merit, architectural significance, design innovation.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.5
      specificity_rationale: Aesthetic significance important for art and architecture.
  TerroirSignificance:
    is_a: SignificanceType
    class_uri: hc:TerroirSignificance
    description: >-
      Geographic/environmental specificity and uniqueness.
    alt_descriptions:
      nl: Geografische/milieu-specificiteit en uniciteit.
      de: Geografische/umweltspezifische Besonderheit und Einzigartigkeit.
      fr: Spécificité géographique/environnementale et unicité.
      es: Especificidad geográfica/ambiental y singularidad.
      ar: الخصوصية الجغرافية/البيئية والتفرد.
      id: Keunikan dan kekhususan geografis/lingkungan.
      zh: 地理/环境特异性与独特性。
    structured_aliases:
    - literal_form: terroir-betekenis
      in_language: nl
    - literal_form: Terroir-Bedeutung
      in_language: de
    - literal_form: importance de terroir
      in_language: fr
    - literal_form: importancia de terroir
      in_language: es
    - literal_form: أهمية التروار
      in_language: ar
    - literal_form: signifikansi terroir
      in_language: id
    - literal_form: 风土意义
      in_language: zh
    keywords:
    - terroir
    - geographic origin
    - environmental conditions
    - PDO designation
    comments:
    - Aspects include geographic origin, environmental conditions, PDO/PGI designations.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.6
      specificity_rationale: Terroir significance specific to taste/scent heritage.
  DiplomaticSignificance:
    is_a: SignificanceType
    class_uri: hc:DiplomaticSignificance
    description: >-
      Cultural diplomacy and international representation.
    alt_descriptions:
      nl: Culturele diplomatie en internationale vertegenwoordiging.
      de: Kulturdiplomatie und internationale Vertretung.
      fr: Diplomatie culturelle et représentation internationale.
      es: Diplomacia cultural y representación internacional.
      ar: الدبلوماسية الثقافية والتمثيل الدولي.
      id: Diplomasi budaya dan perwakilan internasional.
      zh: 文化外交与国际代表性。
    structured_aliases:
    - literal_form: diplomatieke betekenis
      in_language: nl
    - literal_form: Diplomatische Bedeutung
      in_language: de
    - literal_form: importance diplomatique
      in_language: fr
    - literal_form: importancia diplomática
      in_language: es
    - literal_form: أهمية دبلوماسية
      in_language: ar
    - literal_form: signifikansi diplomatik
      in_language: id
    - literal_form: 外交意义
      in_language: zh
    keywords:
    - diplomatic
    - cultural diplomacy
    - soft power
    - international recognition
    comments:
    - Aspects include national heritage representation, soft power, international recognition.
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: 0.55
      specificity_rationale: Diplomatic significance relevant for national heritage.
