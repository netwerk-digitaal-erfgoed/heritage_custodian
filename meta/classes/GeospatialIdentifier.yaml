default_prefix: hc
imports:
- linkml:types
classes:
  GeospatialIdentifier:
    is_a: Identifier
    class_uri: hc:GeospatialIdentifier
    description: >-
      Persistent identifier referencing a geographic feature, location, or spatial entity within an external gazetteer or internal registry.
    alt_descriptions:
      nl: >-
        Permanente identificatiecode die verwijst naar een geografisch object, locatie of ruimtelijke entiteit in een externe gazetteer of intern register.
      de: >-
        Persistenter Identifikator, der auf ein geografisches Objekt, einen Standort oder eine räumliche Entität in einem externen Gazetteer oder internen Register verweist.
      fr: >-
        Identifiant persistant faisant référence à une entité géographique, un lieu ou une entité spatiale dans un gazette externe ou un registre interne.
      es: >-
        Identificador persistente que referencia una entidad geográfica, ubicación o entidad espacial en una gazetera externa o registro interno.
      ar: >-
        معرف دائم يشير إلى معلم جغرافي أو موقع أو كيان مكاني في دليل جغرافي خارجي أو سجل داخلي.
      id: >-
        Pengenal persisten yang merujuk ke fitur geografis, lokasi, atau entitas spasial dalam gazetteer eksternal atau registri internal.
      zh: >-
        在外部地名录或内部注册表中引用地理要素、位置或空间实体的持久标识符。
