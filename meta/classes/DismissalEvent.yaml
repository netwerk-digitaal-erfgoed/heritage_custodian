id: https://nde.nl/ontology/hc/class/DismissalEvent
name: DismissalEvent
title: Dismissal Event Class
description: Event representing a dismissal, rejection, or negative reception (e.g. dislikes). MIGRATED from dislike_count slot (2026-01-26).
prefixes:
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
imports:
- linkml:types
- ../slots/has_quantity
- ../slots/has_measurement_unit
default_prefix: hc
classes:
  DismissalEvent:
    class_uri: schema:UserInteraction
    description: >-
      Interaction event capturing rejection or negative user response metrics in
      feedback analytics.
    alt_descriptions:
      nl: Interactiegebeurtenis die afwijzing of negatieve gebruikersreactiemetingen in feedbackanalyse vastlegt.
      de: Interaktionsereignis zur Erfassung von Ablehnung oder negativen Nutzerreaktionsmetriken in Feedbackanalysen.
      fr: Evenement d interaction capturant des mesures de rejet ou de reaction negative des usagers dans l analyse de feedback.
      es: Evento de interaccion que captura metricas de rechazo o reaccion negativa de usuarios en analitica de feedback.
      ar: حدث تفاعلي يلتقط مقاييس الرفض أو الاستجابة السلبية للمستخدم ضمن تحليلات التغذية الراجعة.
      id: Peristiwa interaksi yang menangkap metrik penolakan atau respons negatif pengguna dalam analitik umpan balik.
      zh: 在反馈分析中记录用户否定或负向反应指标的交互事件。
    structured_aliases:
    - {literal_form: afwijzingsgebeurtenis, in_language: nl}
    - {literal_form: Ablehnungsereignis, in_language: de}
    - {literal_form: evenement de rejet, in_language: fr}
    - {literal_form: evento de rechazo, in_language: es}
    - {literal_form: حدث رفض, in_language: ar}
    - {literal_form: peristiwa penolakan, in_language: id}
    - {literal_form: 否定反馈事件, in_language: zh}
    broad_mappings:
    - schema:UserInteraction
    slots:
    - has_quantity
    - has_measurement_unit
    slot_usage:
      has_quantity:
        range: integer
      has_measurement_unit:
#         range: string
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
