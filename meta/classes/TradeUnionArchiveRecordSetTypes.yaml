      de: Zusammengefuehrter visueller Bestand zu Arbeitsorten, Demonstrationen und sozialem Leben im industriellen Umfeld.
      fr: Corpus visuel rassemble representant lieux de travail, manifestations et vie sociale industrielle.
      es: Corpus visual reunido que muestra lugares de trabajo, manifestaciones y vida social industrial.
      ar: مجموعة بصرية مجمّعة تُظهر أماكن العمل والمظاهرات والحياة الاجتماعية الصناعية.
      id: Korpus visual terhimpun yang menggambarkan tempat kerja, demonstrasi, dan kehidupan sosial industri.
      zh: 汇集工作场所、示威活动与工业社会生活图像的视觉文献体。
