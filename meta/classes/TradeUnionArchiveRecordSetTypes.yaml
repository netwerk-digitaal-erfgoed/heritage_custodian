id: https://nde.nl/ontology/hc/class/TradeUnionArchiveRecordSetTypes
name: TradeUnionArchiveRecordSetTypes
title: Trade Union Archive Record Set Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  rico-rst: https://www.ica.org/standards/RiC/vocabularies/recordSetTypes#
  wd: http://www.wikidata.org/entity/
default_prefix: hc
imports:
  - ./TradeUnionArchiveRecordSetType
  - linkml:types
  - ../slots/has_score
  - ../slots/has_type
  - ../slots/has_note
  - ../slots/has_scope
classes:
  UnionAdministrationFonds:
    is_a: TradeUnionArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Provenance-based grouping for governance and operational documentation
      produced by labor organizations.
    alt_descriptions:
      nl: Herkomstgebaseerde groepering voor bestuurs- en operationele documentatie van arbeidsorganisaties.
      de: Provenienzbasierte Gruppierung fuer Leitungs- und Betriebsunterlagen von Arbeitsorganisationen.
      fr: Regroupement fonde sur la provenance pour la documentation de gouvernance et de fonctionnement d organisations du travail.
      es: Agrupacion basada en procedencia para documentacion de gobierno y operaciones de organizaciones laborales.
      ar: تجميع قائم على المصدر لوثائق الحوكمة والتشغيل الصادرة عن منظمات العمل.
      id: Pengelompokan berbasis asal-usul untuk dokumentasi tata kelola dan operasional organisasi pekerja.
      zh: 按来源原则组织的劳动组织治理与运营文献分组。
    structured_aliases:
    - literal_form: Gewerkschaftsverwaltungsbestand
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: fondo de administracion sindical
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: fonds d'administration syndicale
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: vakbondsbestuursarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: fundo de administracao sindical
      predicate: EXACT_SYNONYM
      in_language: pt
    - literal_form: مجموعة إدارة نقابية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: himpunan administrasi serikat
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 工运治理全宗
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - union administration
    - congress minutes
    - membership records
    - union governance
    - labor organization
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Fonds
    see_also:
    - TradeUnionArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Fonds
    - TradeUnionArchive
    - AssociationArchive
    annotations:
      historical_note: Union administration records document the internal workings
        of labor organizations, including democratic processes, financial management,
        and organizational development.
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:UnionAdministrationFonds
      has_note:
        equals_string: This RecordSetType classifies record sets following the fonds principle as defined by rico-rst:Fonds. Provenance-based organization by creating union body (federation, national union, local, committee).
      has_scope:
        equals_string: '["bylaws", "congress minutes", "membership records", "financial records", "correspondence"]'
  CollectiveBargainingSeries:
    is_a: TradeUnionArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Chronological grouping for negotiation agreements, wage schedules, and
      industrial-relations files.
    alt_descriptions:
      nl: Chronologische groepering voor onderhandelingsafspraken, loonoverzichten en dossiers over arbeidsverhoudingen.
      de: Chronologische Gruppierung fuer Verhandlungsvereinbarungen, Lohnplaene und Unterlagen zu Arbeitsbeziehungen.
      fr: Regroupement chronologique des accords de negociation, baremes salariaux et dossiers de relations professionnelles.
      es: Agrupacion cronologica de acuerdos de negociacion, escalas salariales y expedientes de relaciones laborales.
      ar: تجميع زمني لاتفاقات التفاوض وجداول الأجور وملفات علاقات العمل.
      id: Pengelompokan kronologis untuk kesepakatan negosiasi, skala upah, dan berkas hubungan industrial.
      zh: 对谈判协议、薪酬表与劳资关系档案的时间序列分组。
    structured_aliases:
    - literal_form: Tarifverhandlungsserie
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: serie de negociacion colectiva
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: serie de negociation collective
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: CAO-archief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: serie de negociacao coletiva
      predicate: EXACT_SYNONYM
      in_language: pt
    - literal_form: سلسلة تفاوض عمالي
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: seri perundingan kerja
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 劳资协商系列
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - collective bargaining
    - CAO
    - collectieve arbeidsovereenkomst
    - labor contracts
    - wage agreements
    - industrial relations
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Series
    see_also:
    - TradeUnionArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Series
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:CollectiveBargainingSeries
      has_note:
        equals_string: This RecordSetType classifies record sets following the series principle as defined by rico-rst:Series. Chronological arrangement by industry sector, employer, or contract period.
      has_scope:
        equals_string: '["CAOs", "negotiations", "arbitration", "wage agreements", "working conditions"]'
  StrikeDocumentationCollection:
    is_a: TradeUnionArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled body of evidence on labor stoppages, protests, and related
      dispute actions.
    alt_descriptions:
      nl: Samengebracht corpus met bewijsmateriaal over werkonderbrekingen, protesten en verwante arbeidsconflicten.
      de: Zusammengefuehrter Bestand mit Nachweisen zu Arbeitsniederlegungen, Protesten und verwandten Konflikthandlungen.
      fr: Ensemble documentaire reunissant des preuves de cessations de travail, protestations et actions de conflit associees.
      es: Conjunto reunido de evidencias sobre paros laborales, protestas y acciones vinculadas a conflictos.
      ar: مجموعة مجمّعة من الأدلة حول توقفات العمل والاحتجاجات وإجراءات النزاع المرتبطة بها.
      id: Korpus terhimpun berisi bukti penghentian kerja, protes, dan aksi sengketa terkait.
      zh: 汇集罢工停工、抗议及相关争议行动证据的组合文献体。
    structured_aliases:
    - literal_form: Streikdokumentationssammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: coleccion de documentacion de huelgas
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: collection de documentation de greves
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: stakingsarchief
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: colecao de documentacao de greves
      predicate: EXACT_SYNONYM
      in_language: pt
    - literal_form: مجموعة توثيق الإضرابات
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi dokumentasi mogok
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 劳资冲突文献汇编
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - strike documentation
    - labor actions
    - picket lines
    - work stoppages
    - February strike
    - Februaristaking
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - wd:Q9388534
    see_also:
    - TradeUnionArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Collection
    - TradeUnionArchive
    - PoliticalArchive
    - SocialMovementCollection
    annotations:
      historical_note: Strike documentation captures moments of heightened worker
        mobilization. Collections often combine union records with donated materials
        from participants and media coverage.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:StrikeDocumentationCollection
      has_note:
        equals_string: This RecordSetType classifies record sets following the collection principle as defined by rico-rst:Collection. Assembled documentation organized by strike event, industry, or time period.
      has_scope:
        equals_string: '["strike records", "picket documentation", "solidarity actions", "posters", "photographs"]'
  LaborPublicationsCollection:
    is_a: TradeUnionArchiveRecordSetType
    class_uri: rico:RecordSetType
    description: >-
      Assembled body of printed movement media such as newspapers, journals,
      pamphlets, and bulletins.
    alt_descriptions:
      nl: Samengebrachte reeks gedrukte bewegingmedia zoals kranten, tijdschriften, pamfletten en bulletins.
      de: Zusammengefuehrter Bestand gedruckter Bewegungsmedien wie Zeitungen, Journale, Flugschriften und Bulletins.
      fr: Ensemble de medias imprimes du mouvement, tels que journaux, revues, brochures et bulletins.
      es: Conjunto de medios impresos del movimiento, como periodicos, revistas, folletos y boletines.
      ar: مجموعة من وسائط الحركة المطبوعة مثل الصحف والدوريات والمنشورات والنشرات.
      id: Himpunan media cetak gerakan seperti surat kabar, jurnal, pamflet, dan buletin.
      zh: 汇集报刊、期刊、小册子与公报等运动印刷媒介的文献体。
    structured_aliases:
    - literal_form: Arbeiterpressesammlung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: coleccion de publicaciones obreras
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: collection de publications ouvrieres
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: vakbondsperscollectie
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: colecao de publicacoes operarias
      predicate: EXACT_SYNONYM
      in_language: pt
    - literal_form: مجموعة منشورات الحركة
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: koleksi terbitan gerakan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 工运印刷文献汇编
      predicate: EXACT_SYNONYM
      in_language: zh
    keywords:
    - labor publications
    - union newspapers
    - workers press
    - labor propaganda
    - union magazines
    - May Day
    - 1 mei
    broad_mappings:
    - rico:RecordSetType
    - skos:Concept
    - crm:E55_Type
    related_mappings:
    - rico-rst:Collection
    - wd:Q732577
    see_also:
    - TradeUnionArchiveRecordSetType
    - rico:RecordSetType
    - rico-rst:Collection
    - PressArchive
    annotations:
      library_note: Major collections held by IISG (International Institute of Social
        History), university libraries, and specialized research libraries.
    slots:
    - has_type
    - has_score
    - has_note
    - has_scope
    slot_usage:
      has_type:
        equals_string: hc:LaborPublicationsCollection
      has_note:
        equals_string: This RecordSetType classifies record sets following the collection principle as defined by rico-rst:Collection. Assembled publications organized by title, publisher, union, or subject matter.
      has_scope:
        equals_string: '["newspapers", "magazines", "pamphlets", "educational materials", "propaganda"]'
  WorkersPhotographyCollection:
    is_a: TradeUnionArchiveRecordSetType
    class_uri: rico:RecordSetType
