id: https://nde.nl/ontology/hc/class/TransmissionMethod
name: TransmissionMethod
title: TransmissionMethod
description: Method of transmission for intangible heritage.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/has_label
classes:
  TransmissionMethod:
    class_uri: skos:Concept
    description: >-
      Way intangible practices, knowledge, and skills are passed between
      generations or communities.
    alt_descriptions:
      nl: Wijze waarop immateriele praktijken, kennis en vaardigheden tussen generaties of gemeenschappen worden doorgegeven.
      de: Art und Weise, wie immaterielle Praktiken, Wissen und Faehigkeiten zwischen Generationen oder Gemeinschaften weitergegeben werden.
      fr: Maniere dont des pratiques, savoirs et savoir-faire immateriels sont transmis entre generations ou communautes.
      es: Forma en que practicas, conocimientos y habilidades inmateriales se transmiten entre generaciones o comunidades.
      ar: الطريقة التي تُنقل بها الممارسات والمعارف والمهارات غير المادية بين الأجيال أو المجتمعات.
      id: Cara praktik, pengetahuan, dan keterampilan takbenda diwariskan antargenerasi atau komunitas.
      zh: 非物质实践、知识与技能在代际或社群间传承的方式。
    structured_aliases:
    - literal_form: overdrachtswijze
      in_language: nl
    - literal_form: Uebertragungsweise
      in_language: de
    - literal_form: mode de transmission
      in_language: fr
    - literal_form: metodo de transmision
      in_language: es
    - literal_form: طريقة الانتقال
      in_language: ar
    - literal_form: metode transmisi
      in_language: id
    - literal_form: 传承方式
      in_language: zh
    slots:
    - has_label
    - has_description
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
