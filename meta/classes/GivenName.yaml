classes:
  GivenName:
    class_uri: hc:GivenName
    description: >-
      Personal first name or forename used to identify an individual within a family unit.
    alt_descriptions:
      nl: >-
        Persoonlijke voornaam gebruikt om een individu binnen een familie-eenheid te identificeren.
      de: >-
        Persönlicher Vorname oder Rufname, der verwendet wird, um eine Person innerhalb einer Familieneinheit zu identifizieren.
      fr: >-
        Prénom personnel utilisé pour identifier un individu au sein d'une unité familiale.
      es: >-
        Nombre de pila personal utilizado para identificar a un individuo dentro de una unidad familiar.
      ar: >-
        الاسم الشخصي الأول المستخدم لتحديد الفرد ضمن وحدة عائلية.
      id: >-
        Nama depan pribadi yang digunakan untuk mengidentifikasi individu dalam unit keluarga.
      zh: >-
        用于在家庭单元内识别个人的个人名字或名字。
