id: https://nde.nl/ontology/hc/classes/MultilingualAliases
name: MultilingualAliases
title: Multilingual Aliases
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
classes:
  MultilingualAliases:
    class_uri: linkml:Any
    description: Language-keyed structure for storing alternative names and aliases.
    alt_descriptions:
      nl: Taalgestructureerde structuur voor alternatieve namen en aliassen.
      de: Sprachschluessel-Struktur zur Speicherung alternativer Namen und Aliase.
      fr: Structure indexee par langue pour stocker noms alternatifs et alias.
      es: Estructura indexada por idioma para almacenar nombres alternativos y alias.
      ar: بنية مفاتيح لغوية لتخزين الأسماء البديلة والكنى.
      id: Struktur berbasis bahasa untuk menyimpan nama alternatif dan alias.
      zh: 按语言键组织的别名与替代名称存储结构。
    structured_aliases:
    - {literal_form: meertalige aliassen, in_language: nl}
    - {literal_form: mehrsprachige Aliase, in_language: de}
    - {literal_form: alias multilingues, in_language: fr}
    - {literal_form: alias multilingues, in_language: es}
    - {literal_form: أسماء مستعارة متعددة اللغات, in_language: ar}
    - {literal_form: alias multibahasa, in_language: id}
    - {literal_form: 多语言别名, in_language: zh}
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
