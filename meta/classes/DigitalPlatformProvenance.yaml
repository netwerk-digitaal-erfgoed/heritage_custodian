id: https://nde.nl/ontology/hc/class/DigitalPlatformProvenance
name: DigitalPlatformProvenance
title: Digital Platform Provenance
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
default_prefix: hc
imports:
  - linkml:types
classes:
  DigitalPlatformProvenance:
    class_uri: prov:Activity
    description: >-
      Process record documenting profiling steps, data acquisition, transformation
      decisions, and quality assessment activities.
    alt_descriptions:
      nl: >-
        Procesrecord dat profileringsstappen, gegevensverwerving, transformatiebeslissingen
        en kwaliteitsbeoordelingsactiviteiten documenteert.
      de: >-
        Prozessdatensatz, der Profiling-Schritte, Datenerfassung, Transformationsentscheidungen
        und Qualitätsbewertungsaktivitäten dokumentiert.
      fr: >-
        Enregistrement de processus documentant les étapes de profilage, l'acquisition
        de données, les décisions de transformation et les activités d'évaluation de qualité.
      es: >-
        Registro de proceso que documenta pasos de perfilado, adquisición de datos,
        decisiones de transformación y actividades de evaluación de calidad.
      ar: >-
        سجل عملية يوثق خطوات التنميط واكتساب البيانات وقرارات التحويل وأنشطة تقييم الجودة.
      id: >-
        Rekaman proses yang mendokumentasikan langkah-langkah pemrofilan, akuisisi data,
        keputusan transformasi, dan aktivitas penilaian kualitas.
      zh: >-
        记录分析步骤、数据获取、转换决策和质量评估活动的过程记录。
    broad_mappings:
      - prov:Activity
    related_mappings:
      - prov:Entity
    slots: []
