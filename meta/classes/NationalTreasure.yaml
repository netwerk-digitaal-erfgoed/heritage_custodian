classes:
  NationalTreasure:
    description: >-
      Institutional classification for organizations holding legally protected items of exceptional national cultural significance.
    alt_descriptions:
      nl: >-
        Institutionele classificatie voor organisaties die wettelijk beschermde objecten van uitzonderlijke nationale culturele betekenis beheren.
      de: >-
        Institutionelle Klassifikation für Organisationen, die rechtlich geschützte Objekte von außergewöhnlicher nationaler kultureller Bedeutung verwalten.
      fr: >-
        Classification institutionnelle pour les organisations détenant des objets légalement protégés d'une importance culturelle nationale exceptionnelle.
      es: >-
        Clasificación institucional para organizaciones que custodian objetos legalmente protegidos de importancia cultural nacional excepcional.
      ar: >-
        تصنيف مؤسسي للمنظمات التي تحتفظ بقطع محمية قانونياً ذات أهمية ثقافية وطنية استثنائية.
      id: >-
        Klasifikasi kelembagaan untuk organisasi yang mengelola benda yang dilindungi secara hukum dengan pentingnya budaya nasional yang luar biasa.
      zh: >-
        持有具有特殊国家文化意义的法律保护物品的机构的机构分类。
