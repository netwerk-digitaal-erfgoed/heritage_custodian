id: https://nde.nl/ontology/hc/class/IndexTypes
name: index_types_classes
title: Index Type Subclasses
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - ./IndexType
  - linkml:types
classes:
  TableOfContents:
    is_a: IndexType
    class_uri: hc:TableOfContents
    description: >-
      Hierarchical navigation structure organizing chapters, sections, and subdivisions within a document.
    alt_descriptions:
      nl: >-
        Hiërarchische navigatiestructuur die hoofdstukken, secties en onderverdelingen binnen een document ordent.
      de: >-
        Hierarchische Navigationsstruktur, die Kapitel, Abschnitte und Unterteilungen innerhalb eines Dokuments organisiert.
      fr: >-
        Structure de navigation hiérarchique organisant les chapitres, sections et subdivisions dans un document.
      es: >-
        Estructura de navegación jerárquica que organiza capítulos, secciones y subdivisiones dentro de un documento.
      ar: >-
        هيكل تنقل هرمي ينظم الفصول والأقسام والأقسام الفرعية داخل المستند.
      id: >-
        Struktur navigasi hierarkis yang mengatur bab, bagian, dan subdivisi dalam dokumen.
      zh: >-
        在文档中组织章节、部分和细分的层级导航结构。
    structured_aliases:
    - literal_form: Inhoudsopgave
      in_language: nl
    - literal_form: Inhaltsverzeichnis
      in_language: de
    - literal_form: TableDesMatières
      in_language: fr
    - literal_form: Índice
      in_language: es
    - literal_form: فهرس المحتويات
      in_language: ar
    - literal_form: DaftarIsi
      in_language: id
    - literal_form: 目录
      in_language: zh
    keywords:
    - contents
    - navigation
    - chapters
    - hierarchy
    annotations:
      dcterms_mapping: dcterms:tableOfContents
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: '[''*'']'
    examples:
    - value:
        identified_by: hc:index-type/table-of-contents
        has_label:
        - Table of Contents@en
        - Inhoudsopgave@nl
        - "Table des matières@fr"
      description: Standard table of contents type
    broad_mappings:
    - skos:Concept
  SubjectIndex:
    is_a: IndexType
    class_uri: hc:SubjectIndex
    description: >-
      Alphabetical listing of subjects or topics with corresponding page or section references.
    alt_descriptions:
      nl: >-
        Alfabetische lijst van onderwerpen of thema's met bijbehorende pagina- of sectieverwijzingen.
      de: >-
        Alphabetische Auflistung von Themen oder Sachverhalten mit entsprechenden Seiten- oder Abschnittsverweisen.
      fr: >-
        Liste alphabétique des sujets ou thèmes avec les références de page ou de section correspondantes.
      es: >-
        Listado alfabético de temas o asuntos con las correspondientes referencias de página o sección.
      ar: >-
        قائمة أبجدية بالموضوعات أو المواضيع مع مراجع الصفحات أو الأقسام المقابلة.
      id: >-
        Daftar alfabetis subjek atau topik dengan referensi halaman atau bagian yang sesuai.
      zh: >-
        按字母顺序排列的主题或话题列表，附有相应的页面或章节引用。
    structured_aliases:
    - literal_form: Zakenregister
      in_language: nl
    - literal_form: Sachregister
      in_language: de
    - literal_form: IndexDesSujets
      in_language: fr
    - literal_form: ÍndiceDeMaterias
      in_language: es
    - literal_form: فهرس الموضوعات
      in_language: ar
    - literal_form: IndeksSubjek
      in_language: id
    - literal_form: 主题索引
      in_language: zh
    keywords:
    - subject
    - topic
    - thematic
    - alphabetical
    examples:
    - value:
        identified_by: hc:index-type/subject-index
        has_label:
        - Subject Index@en
        - Zakenregister@nl
      description: Subject index type
    broad_mappings:
    - skos:Concept
  NameIndex:
    is_a: IndexType
    class_uri: hc:NameIndex
    description: >-
      Alphabetical listing of persons, artists, or authors mentioned within a work.
    alt_descriptions:
      nl: >-
        Alfabetische lijst van personen, kunstenaars of auteurs die in een werk worden genoemd.
      de: >-
        Alphabetische Auflistung von Personen, Künstlern oder Autoren, die in einem Werk erwähnt werden.
      fr: >-
        Liste alphabétique des personnes, artistes ou auteurs mentionnés dans une œuvre.
      es: >-
        Listado alfabético de personas, artistas o autores mencionados en una obra.
      ar: >-
        قائمة أبجدية بالأشخاص أو الفنانين أو المؤلفين المذكورين في العمل.
      id: >-
        Daftar alfabetis orang, seniman, atau penulis yang disebutkan dalam sebuah karya.
      zh: >-
        作品中提到的人物、艺术家或作者的按字母顺序列表。
    structured_aliases:
    - literal_form: Namenregister
      in_language: nl
    - literal_form: Namensregister
      in_language: de
    - literal_form: IndexDesNoms
      in_language: fr
    - literal_form: ÍndiceDeNombres
      in_language: es
    - literal_form: فهرس الأسماء
      in_language: ar
    - literal_form: IndeksNama
      in_language: id
    - literal_form: 人名索引
      in_language: zh
    keywords:
    - name
    - person
    - artist
    - author
    examples:
    - value:
        identified_by: hc:index-type/name-index
        has_label:
        - Name Index@en
        - Index of Artists@en
        - Namenregister@nl
      description: Name/artist index type
    broad_mappings:
    - skos:Concept
  ChronologicalIndex:
    is_a: IndexType
    class_uri: hc:ChronologicalIndex
    description: >-
      Sequential listing of entries ordered by date or historical time period.
    alt_descriptions:
      nl: >-
        Sequentiële lijst van vermeldingen geordend op datum of historische tijdsperiode.
      de: >-
        Sequentielle Auflistung von Einträgen, geordnet nach Datum oder historischem Zeitraum.
      fr: >-
        Liste séquentielle d'entrées ordonnées par date ou période historique.
      es: >-
        Listado secuencial de entradas ordenadas por fecha o período histórico.
      ar: >-
        قائمة متسلسلة من الإدخالات مرتبة حسب التاريخ أو الفترة الزمنية التاريخية.
      id: >-
        Daftar berurutan entri yang diurutkan berdasarkan tanggal atau periode waktu historis.
      zh: >-
        按日期或历史时期排序的条目顺序列表。
    structured_aliases:
    - literal_form: ChronologischOverzicht
      in_language: nl
    - literal_form: ChronologischesVerzeichnis
      in_language: de
    - literal_form: IndexChronologique
      in_language: fr
    - literal_form: ÍndiceCronológico
      in_language: es
    - literal_form: فهرس زمني
      in_language: ar
    - literal_form: IndeksKronologis
      in_language: id
    - literal_form: 年代索引
      in_language: zh
    keywords:
    - chronological
    - date
    - timeline
    - historical
    examples:
    - value:
        identified_by: hc:index-type/chronological-index
        has_label:
        - Chronological Index@en
        - Timeline@en
        - Chronologisch overzicht@nl
      description: Chronological index type
    broad_mappings:
    - skos:Concept
  TopicalIndex:
    is_a: IndexType
    class_uri: hc:TopicalIndex
    description: >-
      Thematic grouping of entries organized by topic rather than alphabetical sequence.
    alt_descriptions:
      nl: >-
        Thematische groepering van vermeldingen georganiseerd op onderwerp in plaats van alfabetische volgorde.
      de: >-
        Thematische Gruppierung von Einträgen, organisiert nach Thema statt alphabetischer Reihenfolge.
      fr: >-
        Regroupement thématique d'entrées organisées par sujet plutôt que par séquence alphabétique.
      es: >-
        Agrupación temática de entradas organizadas por tema en lugar de secuencia alfabética.
      ar: >-
        تجميع موضوعي للإدخالات منظمة حسب الموضوع بدلاً من التسلسل الأبجدي.
      id: >-
        Pengelompokan tematik entri yang diatur berdasarkan topik bukan urutan alfabetis.
      zh: >-
        按主题而非字母顺序组织的条目主题分组。
    structured_aliases:
    - literal_form: ThematischRegister
      in_language: nl
    - literal_form: ThematischesRegister
      in_language: de
    - literal_form: GuideThématique
      in_language: fr
    - literal_form: GuíaTemática
      in_language: es
    - literal_form: دليل موضوعي
      in_language: ar
    - literal_form: PanduanTematik
      in_language: id
    - literal_form: 主题指南
      in_language: zh
    keywords:
    - topical
    - thematic
    - topic
    - theme
    examples:
    - value:
        identified_by: hc:index-type/topical-index
        has_label:
        - Topical Index@en
        - Thematic Guide@en
      description: Topical index type
    broad_mappings:
    - skos:Concept
  Glossary:
    is_a: IndexType
    class_uri: hc:Glossary
    description: >-
      Alphabetical list of specialized terms with definitions used within a work.
    alt_descriptions:
      nl: >-
        Alfabetische lijst van gespecialiseerde termen met definities die in een werk worden gebruikt.
      de: >-
        Alphabetische Liste spezialisierter Begriffe mit Definitionen, die in einem Werk verwendet werden.
      fr: >-
        Liste alphabétique de termes spécialisés avec leurs définitions utilisés dans une œuvre.
      es: >-
        Lista alfabética de términos especializados con definiciones utilizados en una obra.
      ar: >-
        قائمة أبجدية للمصطلحات المتخصصة مع تعريفات مستخدمة في العمل.
      id: >-
        Daftar alfabetis istilah khusus dengan definisi yang digunakan dalam sebuah karya.
      zh: >-
        作品中使用的专业术语及其定义的按字母顺序列表。
    structured_aliases:
    - literal_form: VerklarendeWoordenlijst
      in_language: nl
    - literal_form: Glossar
      in_language: de
    - literal_form: Glossaire
      in_language: fr
    - literal_form: Glosario
      in_language: es
    - literal_form: قاموس مصطلحات
      in_language: ar
    - literal_form: Glosarium
      in_language: id
    - literal_form: 词汇表
      in_language: zh
    keywords:
    - glossary
    - terms
    - definitions
    - vocabulary
    examples:
    - value:
        identified_by: hc:index-type/glossary
        has_label:
        - Glossary@en
        - Verklarende woordenlijst@nl
      description: Glossary type
    broad_mappings:
    - skos:Concept
  PlateIndex:
    is_a: IndexType
    class_uri: hc:PlateIndex
    description: >-
      Catalog of images, plates, or figures referenced within illustrated publications.
    alt_descriptions:
      nl: >-
        Catalogus van afbeeldingen, platen of figuren waarnaar wordt verwezen in geïllustreerde publicaties.
      de: >-
        Katalog von Bildern, Tafeln oder Abbildungen, auf die in illustrierten Publikationen verwiesen wird.
      fr: >-
        Catalogue d'images, planches ou figures référencées dans les publications illustrées.
      es: >-
        Catálogo de imágenes, láminas o figuras referenciadas en publicaciones ilustradas.
      ar: >-
        فهرس الصور أو اللوحات أو الأشكال المشار إليها في المنشورات المصورة.
      id: >-
        Katalog gambar, pelat, atau gambar yang dirujuk dalam publikasi bergambar.
      zh: >-
        插图出版物中引用的图像、图版或图表目录。
    structured_aliases:
    - literal_form: Platenlijst
      in_language: nl
    - literal_form: Tafelverzeichnis
      in_language: de
    - literal_form: ListeDesPlanches
      in_language: fr
    - literal_form: ListaDeLáminas
      in_language: es
    - literal_form: قائمة اللوحات
      in_language: ar
    - literal_form: DaftarPelat
      in_language: id
    - literal_form: 图版索引
      in_language: zh
    keywords:
    - plate
    - illustration
    - figure
    - image
    examples:
    - value:
        identified_by: hc:index-type/plate-index
        has_label:
        - List of Plates@en
        - List of Illustrations@en
        - Platenlijst@nl
      description: Plate/illustration index type
    broad_mappings:
    - skos:Concept
