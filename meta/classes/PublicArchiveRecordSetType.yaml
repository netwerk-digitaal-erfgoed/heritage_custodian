id: https://nde.nl/ontology/hc/class/PublicArchiveRecordSetType
name: PublicArchiveRecordSetType
title: PublicArchive Record Set Type
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  skos: http://www.w3.org/2004/02/skos/core#
  wd: http://www.wikidata.org/entity/
imports:
- linkml:types
- ../slots/has_scope
- ../slots/has_score
- ../slots/has_type
classes:
  PublicArchiveRecordSetType:
    description: >-
      Taxonomy node for aggregations of governmental, civic, and administratively
      mandated documentation held by publicly accountable repositories.
    alt_descriptions:
      nl: >-
        Taxonomieknooppunt voor aggregaties van overheids-, burger- en administratief verplichte
        documentatie in bezit van publiek verantwoordingsplichtige bewaarinstellingen.
      de: >-
        Taxonomieknoten für Aggregationen staatlicher, bürgerlicher und administrativ vorgeschriebener
        Dokumentation in öffentlich rechenschaftspflichtigen Repositorien.
      fr: >-
        Nœud taxonomique pour les agrégations de documentation gouvernementale, civile et
        administrativement obligée détenue par des dépôts publiquement responsables.
      es: >-
        Nodo taxonómico para agregaciones de documentación gubernamental, cívica y administrativamente
        mandatada en depósitos de responsabilidad pública.
      ar: >-
        عقدة تصنيفية لتجميعات الوثائق الحكومية والمدنية والإلزامية إدارياً المحفوظة في مستودعات مسؤولة علناً.
      id: >-
        Simpul taksonomi untuk agregasi dokumentasi pemerintah, sipil, dan administratif wajib
        yang disimpan oleh repositori yang bertanggung jawab secara publik.
      zh: >-
        用于聚合由公共责任机构持有的政府、公民和行政强制文档的分类法节点。
    is_a: CollectionType
    class_uri: rico:RecordSetType
    broad_mappings:
    - rico:RecordSetType
    slots:
    - has_type
    - has_score
    - has_scope
    see_also:
    - PublicArchive
    - rico:RecordSetType
    slot_usage:
      has_type:
        equals_string: hc:PublicArchiveRecordSetType
    annotations:
      specificity_score: 0.1
      specificity_rationale: Generic utility class/slot created during migration
      custodian_types: "['*']"
    comments:
    - 'Preserved from prior description: A rico:RecordSetType for classifying collections held by PublicArchive custodians.'
