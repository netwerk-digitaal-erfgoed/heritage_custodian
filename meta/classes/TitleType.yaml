id: https://nde.nl/ontology/hc/class/TitleType
name: TitleType
title: Title Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/identified_by
- ../slots/has_label
classes:
  TitleType:
    class_uri: skos:Concept
    abstract: true
    description: >-
      Category for classifying naming expressions by their semantic role (uniform, variant, translated, abbreviated, parallel, or former).
    alt_descriptions:
      nl: Categorie voor het classificeren van naamuitdrukkingen naar hun semantische rol (uniform, variant, vertaald, afgekort, parallel of voormalig).
      de: Kategorie zur Klassifizierung von Namensausdrücken nach ihrer semantischen Rolle (einheitlich, variant, übersetzt, abgekürzt, parallel oder früher).
      fr: Catégorie pour classer les expressions de nommage selon leur rôle sémantique (uniforme, variante, traduit, abrégé, parallèle ou ancien).
      es: Categoría para clasificar expresiones de nombres según su rol semántico (uniforme, variante, traducido, abreviado, paralelo o anterior).
      ar: فئة لتصنيف تعبيرات التسمية حسب دورها الدلالي (موحد، متغير، مترجم، مختصر، موازٍ، أو سابق).
      id: Kategori untuk mengklasifikasikan ekspresi penamaan berdasarkan peran semantiknya (seragam, varian, diterjemahkan, disingkat, paralel, atau sebelumnya).
      zh: 用于按语义角色（统一、变体、翻译、缩写、平行或前称）分类命名表达的类别。
    structured_aliases:
    - literal_form: titeltype
      in_language: nl
    - literal_form: Titeltyp
      in_language: de
    - literal_form: type de titre
      in_language: fr
    - literal_form: tipo de título
      in_language: es
    - literal_form: نوع العنوان
      in_language: ar
    - literal_form: tipe judul
      in_language: id
    - literal_form: 标题类型
      in_language: zh
    broad_mappings:
    - skos:Concept
    slots:
    - identified_by
    - has_label
    - has_description
    comments:
    - Title categories include UNIFORM (standardized/controlled), VARIANT (alternative), TRANSLATED (another language), ABBREVIATED (short form), PARALLEL (appearing on resource), FORMER (previous title)
    annotations:
      specificity_score: '0.50'
      specificity_rationale: Moderately specific - title types library/archive domain.
      custodian_types: "['*']"
