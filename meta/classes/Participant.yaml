  - ../slots/has_name
classes:
  Participant:
    class_uri: schema:Person
    description: >-
      Individual taking part in an organized event, educational program, or institutional activity.
    alt_descriptions:
      nl: >-
        Individu dat deelneemt aan een georganiseerd evenement, educatief programma of institutionele activiteit.
      de: >-
        Person, die an einer organisierten Veranstaltung, einem Bildungsprogramm oder einer institutionellen Aktivität teilnimmt.
      fr: >-
        Personne participant à un événement organisé, un programme éducatif ou une activité institutionnelle.
      es: >-
        Individuo que participa en un evento organizado, programa educativo o actividad institucional.
      ar: >-
        فرد يشارك في حدث منظم أو برنامج تعليمي أو نشاط مؤسسي.
      id: >-
        Individu yang mengambil bagian dalam acara terorganisir, program pendidikan, atau aktivitas kelembagaan.
      zh: >-
        参加有组织的活动、教育计划或机构活动的个人。
