    - literal_form: enriquecimiento de YouTube
      in_language: es
    - literal_form: إثراء يوتيوب
      in_language: ar
    - literal_form: pengayaan YouTube
      in_language: id
    - literal_form: YouTube丰富
      in_language: zh
    comments:
    - Aggregates YouTube data for heritage institutions
