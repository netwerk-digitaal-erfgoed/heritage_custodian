classes:
  YoutubeEnrichment:
    description: >-
      Aggregated platform-derived metadata bundle combining channel, video, and
      engagement evidence.
    alt_descriptions:
      nl: YouTube-kanaal en video-verrijkingsgegevens voor erfgoedinstellingen, die sociale media-aanwezigheid, video-inhoud en betrokkenheidsstatistieken samenvoegen.
      de: YouTube-Kanal- und Video-Anreicherungdaten für Heritage-Institutionen, die Social-Media-Präsenz, Videoinhalte und Engagement-Metriken aggregieren.
      fr: Données d'enrichissement de chaîne et de vidéo YouTube pour les institutions patrimoniales, agrégeant la présence sur les réseaux sociaux, le contenu vidéo et les métriques d'engagement.
      es: Datos de enriquecimiento de canal y video de YouTube para instituciones patrimoniales, agregando presencia en redes sociales, contenido de video y métricas de participación.
      ar: بيانات إثراء قناة وفيديو YouTube لمؤسسات التراث، تجمع وجود وسائل التواصل الاجتماعي ومحتوى الفيديو ومقاييس المشاركة.
      id: Data pengayaan saluran dan video YouTube untuk lembaga warisan, mengagregasi kehadiran media sosial, konten video, dan metrik keterlibatan.
      zh: 遗产机构的YouTube频道和视频丰富数据，聚合社交媒体存在、 视频内容和参与度指标。
    class_uri: prov:Entity
    broad_mappings:
    - prov:Entity
    close_mappings:
