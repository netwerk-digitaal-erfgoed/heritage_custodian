id: https://nde.nl/ontology/hc/class/Facility
name: Facility
title: Facility Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_type
classes:
  Facility:
    class_uri: schema:Place
    description: >-
      Physical amenity or service infrastructure associated with a heritage custodian location for visitor or operational use.
    alt_descriptions:
      nl: >-
        Fysieke voorziening of service-infrastructuur verbonden aan een erfgoedbeheerderlocatie
        voor bezoekers- of operationeel gebruik.
      de: >-
        Physische Annehmlichkeit oder Serviceinfrastruktur, die mit einem Heritage-Verwalterstandort
        für Besucher- oder Betriebsnutzung verbunden ist.
      fr: >-
        Aménité physique ou infrastructure de service associée à un site de dépositaire du patrimoine
        pour l'usage des visiteurs ou des opérations.
      es: >-
        Servicio físico o infraestructura de servicio asociada con una ubicación de depositario
        patrimonial para uso de visitantes u operativo.
      ar: >-
        مرفق مادي أو بنية تحتية للخدمات مرتبطة بموقع أمين تراث لاستخدام الزوار أو العمليات.
      id: >-
        Fasilitas fisik atau infrastruktur layanan yang terkait dengan lokasi kustodian warisan
        untuk penggunaan pengunjung atau operasional.
      zh: >-
        与遗产保管人地点相关的物理设施或服务基础设施，供访客或运营使用。
    structured_aliases:
    - literal_form: voorziening
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Einrichtung
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: installation
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: instalación
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: مرفق
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: fasilitas
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 设施
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:Place
    slots:
    - has_type
    comments:
    - Includes restrooms, cafes, gift shops, parking, and accessibility features.
    - Used for visitor amenity planning and facility management.
    - 'Preserved from prior description: Visitor or operational facility associated with a custodian location.'
    keywords:
    - visitor amenity
    - service infrastructure
    - institutional facility
    - physical resource
    examples:
    - value:
        has_type: Cafe
      description: Museum cafe facility for visitors
    annotations:
      specificity_score: 0.4
      specificity_rationale: Moderately specific place model for institutional amenities.
      custodian_types: '["*"]'
