id: https://nde.nl/ontology/hc/class/FeaturedItem
name: FeaturedItem
title: Featured Item Class
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_label
- ../slots/has_description
- ../slots/has_image
classes:
  FeaturedItem:
    class_uri: schema:CreativeWork
    description: >-
      Curated selection highlighted for prominent display within a collection
      overview, exhibition narrative, or promotional context.
    alt_descriptions:
      nl: >-
        Gecureerde selectie uitgelicht voor prominente weergave binnen een collectieoverzicht,
        tentoonstellingsverhaal of promotionele context.
      de: >-
        Kuratierte Auswahl, die für prominente Präsentation innerhalb einer Sammlungsübersicht,
        Ausstellungserzählung oder Werbekontext hervorgehoben wird.
      fr: >-
        Sélection curatoriale mise en évidence pour un affichage prominenant dans un aperçu de collection,
        un récit d'exposition ou un contexte promotionnel.
      es: >-
        Selección curada destacada para exhibición prominente dentro de una descripción de colección,
        narrativa de exposición o contexto promocional.
      ar: >-
        اختيار منسق مُسلط عليه للعرض البارز ضمن نظرة عامة على المجموعة
        أو سرد المعرض أو سياق ترويجي.
      id: >-
        Pilihan terkurasi yang ditonjolkan untuk tampilan menonjol dalam ikhtisar koleksi,
        narasi pameran, atau konteks promosi.
      zh: >-
        在馆藏概览、展览叙事或宣传语境中突出展示的精选项目。
    structured_aliases:
    - literal_form: uitgelicht item
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: hervorgehobenes Objekt
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: élément mis en avant
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: elemento destacado
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: عنصر مميز
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: item unggulan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 特色项目
      predicate: EXACT_SYNONYM
      in_language: zh
    broad_mappings:
    - schema:CreativeWork
    slots:
    - has_label
    - has_description
    - has_image
    comments:
    - Used for homepage carousels, exhibition highlights, and featured collections.
    - May include visual thumbnail and descriptive text.
    - 'Preserved from prior description: Highlighted item selected for presentation in a list, page, or narrative.'
    keywords:
    - curated highlight
    - featured content
    - prominent display
    - exhibition highlight
    examples:
    - value:
        has_label: Masterpiece of the Month
        has_description: Rembrandt's The Night Watch.
      description: Featured item for museum homepage display
    annotations:
      specificity_score: 0.25
      specificity_rationale: Presentation helper class for highlighted content.
      custodian_types: '["*"]'
