id: https://nde.nl/ontology/hc/class/ValidationStatus
name: ValidationStatus
title: Validation Status
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_code
  - ../slots/has_label
classes:
  ValidationStatus:
    class_uri: skos:Concept
    description: >-
      Controlled outcome indicator showing whether data passed, failed, or
      requires review after rule-based checking.
    alt_descriptions:
      nl: Gecontroleerde status die aangeeft of gegevens na regelgebaseerde controle zijn geslaagd, afgekeurd of ter beoordeling staan.
      de: Kontrollierter Status, der anzeigt, ob Daten nach regelbasierter Pruefung bestanden, fehlgeschlagen oder zur Pruefung markiert sind.
      fr: Etat controle indiquant si des donnees ont reussi, echoue ou necessitent une revue apres verification par regles.
      es: Estado controlado que indica si los datos superaron, fallaron o requieren revision tras una comprobacion por reglas.
      ar: حالة مضبوطة تبيّن ما إذا كانت البيانات قد نجحت أو فشلت أو تحتاج مراجعة بعد التحقق القائم على القواعد.
      id: Status terkontrol yang menunjukkan apakah data lulus, gagal, atau perlu ditinjau setelah pemeriksaan berbasis aturan.
      zh: 指示数据在规则校验后是通过、失败还是需复核的受控状态。
    structured_aliases:
    - literal_form: validatiestatus
      in_language: nl
    - literal_form: Validierungsstatus
      in_language: de
    - literal_form: statut de validation
      in_language: fr
    - literal_form: estado de validacion
      in_language: es
    - literal_form: حالة التحقق
      in_language: ar
    - literal_form: status validasi
      in_language: id
    - literal_form: 校验状态
      in_language: zh
    slots:
    - has_code
    - has_label
    broad_mappings:
    - skos:Concept
    annotations:
      specificity_score: '0.45'
      specificity_rationale: Moderately specific - validation common in data management.
      custodian_types: '[''*'']'
    examples:
    - value:
        has_code: VALID
        has_label: Valid
        validation_date: '2025-01-14T10:30:00Z'
        error_count: 0
      description: Valid status with no errors
