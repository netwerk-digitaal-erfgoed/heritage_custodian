id: https://nde.nl/ontology/hc/class/HTTPMethodType
name: HTTPMethodType
title: HTTP Method Type
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_description
  - ../slots/identified_by
  - ../slots/has_label
classes:
  HTTPMethodType:
    class_uri: hc:HTTPMethodType
    abstract: true
    description: >-
      Abstract taxonomy root for categorizing HTTP request verbs used in
      API interactions and web service communications.
    alt_descriptions:
      nl: >-
        Abstracte taxonomiewortel voor het categoriseren van HTTP-verzoekswoorden die
        worden gebruikt in API-interacties en webservice-communicaties.
      de: >-
        Abstrakte Taxonomie-Wurzel zur Kategorisierung von HTTP-Anfragemethoden, die in
        API-Interaktionen und Webdienst-Kommunikationen verwendet werden.
      fr: >-
        Racine taxonomique abstraite pour catégoriser les verbes de requête HTTP utilisés
        dans les interactions API et les communications de services web.
      es: >-
        Raíz taxonómica abstracta para categorizar verbos de solicitud HTTP utilizados
        en interacciones API y comunicaciones de servicios web.
      ar: >-
        جذر تصنيفي مجرد لتصنيف أفعال طلب HTTP المستخدمة في تفاعلات API واتصالات خدمات الويب.
      id: >-
        Akar taksonomi abstrak untuk mengkategorikan kata kerja permintaan HTTP yang
        digunakan dalam interaksi API dan komunikasi layanan web.
      zh: >-
        用于对API交互和Web服务通信中使用的HTTP请求动词进行分类的抽象分类法根。
    slots:
      - identified_by
      - has_label
      - has_description
    broad_mappings:
      - skos:Concept
