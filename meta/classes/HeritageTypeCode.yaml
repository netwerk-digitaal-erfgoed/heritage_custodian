id: https://nde.nl/ontology/hc/class/HeritageTypeCode
name: HeritageTypeCode
title: Heritage Type Code
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_description
- ../slots/has_label
classes:
  HeritageTypeCode:
    class_uri: hc:HeritageTypeCode
    description: >-
      Compact symbolic designation representing a heritage category within
      controlled classification schemes.
    alt_descriptions:
      nl: >-
        Compacte symbolische aanduiding die een erfgoedcategorie vertegenwoordigt binnen
        gecontroleerde classificatieschema's.
      de: >-
        Kompakte symbolische Bezeichnung, die eine Heritage-Kategorie innerhalb
        kontrollierter Klassifikationsschemata repräsentiert.
      fr: >-
        Désignation symbolique compacte représentant une catégorie patrimoniale dans
        des schémas de classification contrôlés.
      es: >-
        Designación simbólica compacta que representa una categoría patrimonial dentro
        de esquemas de clasificación controlados.
      ar: >-
        تسمية رمزية مختصرة تمثل فئة تراثية ضمن
        مخططات تصنيف مضبوطة.
      id: >-
        Penunjukan simbolis ringkas yang mewakili kategori warisan dalam
        skema klasifikasi terkontrol.
      zh: >-
        在受控分类方案中表示遗产类别的紧凑符号指定。
    structured_aliases:
    - literal_form: erfgoedtypecode
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: Heritage-Typcode
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: code de type patrimonial
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: código de tipo patrimonial
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: رمز نوع التراث
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kode tipe warisan
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 遗产类型代码
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_label
    - has_description
    broad_mappings:
    - skos:Concept
    close_mappings:
    - schema:DefinedTerm
    comments:
    - Short-form codes for interoperable heritage categorization.
    - Used in data exchange formats and API responses.
    - 'Preserved from prior description: Compact symbolic code representing a heritage category within controlled classification schemes.'
    keywords:
    - classification code
    - heritage category
    - symbolic designation
    - interoperability code
