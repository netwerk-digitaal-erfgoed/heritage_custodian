id: https://nde.nl/ontology/hc/class/Humidity
name: Humidity
title: Humidity
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: http://schema.org/
default_prefix: hc
imports:
- linkml:types
- ../slots/has_tolerance
classes:
  Humidity:
    class_uri: hc:Humidity
    description: >-
      Relative atmospheric moisture measurement used to monitor and control preservation environments for collection care.
    alt_descriptions:
      nl: >-
        Relatieve atmosferische vochtigheidsmeting gebruikt voor het bewaken en regelen van
        conserveringsomgevingen voor collectiezorg.
      de: >-
        Relative atmosphärische Feuchtigkeitsmessung zur Überwachung und Steuerung von
        Erhaltungsumgebungen für die Bestandspflege.
      fr: >-
        Mesure relative de l'humidité atmosphérique utilisée pour surveiller et contrôler
        les environnements de conservation pour la gestion des collections.
      es: >-
        Medición relativa de humedad atmosférica utilizada para monitorear y controlar
        ambientes de conservación para el cuidado de colecciones.
      ar: >-
        قياس رطوبة جوية نسبية يُستخدم لمراقبة والتحكم في بيئات الحفظ لرعاية المجموعات.
      id: >-
        Pengukuran kelembaban atmosfer relatif yang digunakan untuk memantau dan mengontrol
        lingkungan pelestarian untuk perawatan koleksi.
      zh: >-
        用于监测和控制藏品保护环境的相对大气湿度测量。
    structured_aliases:
    - literal_form: relatieve luchtvochtigheid
      predicate: EXACT_SYNONYM
      in_language: nl
    - literal_form: relative Luftfeuchtigkeit
      predicate: EXACT_SYNONYM
      in_language: de
    - literal_form: humidité relative
      predicate: EXACT_SYNONYM
      in_language: fr
    - literal_form: humedad relativa
      predicate: EXACT_SYNONYM
      in_language: es
    - literal_form: الرطوبة النسبية
      predicate: EXACT_SYNONYM
      in_language: ar
    - literal_form: kelembaban relatif
      predicate: EXACT_SYNONYM
      in_language: id
    - literal_form: 相对湿度
      predicate: EXACT_SYNONYM
      in_language: zh
    slots:
    - has_tolerance
    slot_usage:
      has_tolerance:
        range: HumidityTolerance
    broad_mappings:
    - schema:StructuredValue
    comments:
    - Critical parameter for organic material preservation.
    - Typically expressed as percentage with acceptable tolerance ranges.
    - 'Preserved from prior description: Relative moisture condition metric used to monitor and control preservation environments.'
    keywords:
    - environmental monitoring
    - preservation condition
    - moisture control
    - collection care
