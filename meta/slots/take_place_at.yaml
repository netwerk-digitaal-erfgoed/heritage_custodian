# ==============================================================================
# LinkML Slot Definition: take_place_at
# ==============================================================================
# Physical location where an event or occurrence happens
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                 | File/Line                       | Mapping | Notes                                                       |
# |---------------|--------------------------|---------------------------------|---------|-------------------------------------------------------------|
# | **CIDOC-CRM** | `crm:P7_took_place_at`   | CIDOC_CRM_v7.1.3.rdf:1294-1309 | exact   | "Spatial location of an instance of E4 Period." Domain: E4_Period, Range: E53_Place. |
# | **RiC-O**     | `rico:hasOrHadLocation`  | RiC-O_1-1.rdf:6853-6886        | close   | Domain: Thing (any), Range: Place. Broader than event-specific. |
# | **Schema.org** | `schema:location`       | schemaorg.owl:25018-25044       | close   | "The location of, for example, where an event is happening." Domain: Event/Organization/Action. Broader domain. |
# | **PROV-O**    | `prov:atLocation`        | prov.ttl:486-503                | close   | "The Location of any resource." Domain: Activity/Agent/Entity/InstantaneousEvent. Broader domain. |
#
# CHANGES:
# - rico:hasOrHadLocation demoted exact → close (domain is Thing — any entity,
#   not just events/periods like our slot and crm:P7)
# - Cleaned description: extracted usage/alignment notes to comments
# - Removed unused prefixes: dcterms, skos, rdfs, org, xsd
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/take_place_at
name: take_place_at
title: Take Place At
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  schema: https://schema.org/
  prov: http://www.w3.org/ns/prov#
imports:
  - linkml:types
default_prefix: hc
slots:
  take_place_at:
    slot_uri: crm:P7_took_place_at
    description: >-
      Identifies the specific physical location, venue, or site where an event,
      meeting, or occurrence happens.
    alt_descriptions:
      nl: >-
        Identificeert de specifieke fysieke locatie, plaats of site waar een
        evenement, bijeenkomst of gebeurtenis plaatsvindt.
      de: >-
        Identifiziert den spezifischen physischen Ort, Veranstaltungsort oder
        Standort, an dem ein Ereignis, eine Versammlung oder ein Vorkommnis
        stattfindet.
      fr: >-
        Identifie le lieu physique spécifique, la salle ou le site où un événement,
        une réunion ou un fait se produit.
      ar: >-
        يحدد الموقع المادي المحدد أو المكان أو الموقع الذي يقع فيه حدث أو اجتماع
        أو واقعة.
      id: >-
        Mengidentifikasi lokasi fisik, tempat, atau situs tertentu di mana suatu
        acara, pertemuan, atau kejadian berlangsung.
      zh: >-
        标识事件、会议或事件发生的具体物理位置、场所或地点。
      es: >-
        Identifica la ubicación física específica, el lugar o el sitio donde ocurre
        un evento, reunión o suceso.
    structured_aliases:
      - literal_form: Locatie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Veranstaltungsort
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Lieu
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: موقع
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Lokasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 地点
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Ubicación
        predicate: EXACT_SYNONYM
        in_language: es
    range: string  # uriorcurie
    required: false
    multivalued: false
    exact_mappings:
    close_mappings:
      - rico:hasOrHadLocation  # RiC-O_1-1.rdf:6853-6886 - Domain: Thing (any), Range: Place. Broader than event-specific.
      - schema:location  # schemaorg.owl:25018-25044 - "The location of, for example, where an event is happening." Domain: Event/Organization/Action. Broader domain.
      - prov:atLocation  # prov.ttl:486-503 - "The Location of any resource." Domain: Activity/Agent/Entity/InstantaneousEvent. Broader domain.
    comments:
      - "Links events to place references (CustodianPlace, GeoSpatialPlace, or generic Location). Class-level slot_usage narrows the range to specific place types as needed."
      - "The location may be current (ongoing events) or historical (past events)."
      - "Migrated from took_place_at slot (2026-01-15) per Rule 39 (RiC-O temporal naming convention)."
    examples:
      - value: https://nde.nl/ontology/hc/place/nl-nh-haa
        description: Noord-Hollands Archief merger took place at Haarlem location
      - value: https://nde.nl/ontology/hc/geo/gaza-city
        description: Cultural heritage destruction event location
    annotations:
      migration_date: '2026-01-15'
      migrated_from: took_place_at
      rule_reference: 'Rule 39: RiC-O temporal naming convention'
      custodian_types: '["*"]'
    aliases:
      - takes_or_took_place_at
