# ==============================================================================
# LinkML Slot Definition: has_caption
# ==============================================================================
# A short explanation, title, or description accompanying an illustration,
# image, or media object.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **Schema.org**| `schema:caption`      | schemaorg.owl:11157-11160  | exact   | "The caption for this object"      |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-06 - Added header, multilingual, changed slot_uri to schema:caption (exact match)
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_caption
name: has_caption
title: Has Caption

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  has_caption:
    slot_uri: schema:caption
    description: >-
      To possess a short explanation, title, or description accompanying an illustration, image, or media object.
    alt_descriptions:
      nl: >-
        Een korte uitleg, titel of beschrijving bezitten die een illustratie, afbeelding of mediaobject begeleidt.
      de: >-
        Eine kurze Erläuterung, einen Titel oder eine Beschreibung besitzen, die eine Illustration, ein Bild oder ein Medienobjekt begleitet.
      fr: >-
        Posséder une courte explication, un titre ou une description accompagnant une illustration, une image ou un objet média.
      ar: >-
        امتلاك شرح موجز أو عنوان أو وصف يرافق رسمًا توضيحيًا أو صورة أو كائنًا إعلاميًا.
      id: >-
        Memiliki penjelasan singkat, judul, atau deskripsi yang menyertai ilustrasi, gambar, atau objek media.
      zh: >-
        拥有伴随插图、图像或媒体对象的简短说明、标题或描述。
      es: >-
        Poseer una breve explicación, título o descripción que acompaña a una ilustración, imagen u objeto multimedia.
    structured_aliases:
      - literal_form: heeft bijschrift
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Bildunterschrift
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a une légende
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه تعليق توضيحي
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki keterangan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有说明文字
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene leyenda
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_caption
      - is_closed_caption
      - is_sdh
    exact_mappings:
    annotations:
      custodian_types: '["*"]'
