# ==============================================================================
# LinkML Slot Definition: has_service
# ==============================================================================
# A system, utility, or act of assistance provided by an organization to users.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                   | File/Line                | Mapping | Notes                                           |
# |---------------|----------------------------|--------------------------|---------|------------------------------------------------|
# | **Schema.org**| `schema:availableService`  | schemaorg.owl:9515-9533  | close   | "A medical service available from this provider." Both = service from provider.|
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_service
name: has_service
title: Has Service
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
default_prefix: hc
imports:
- linkml:types
slots:
  has_service:
    slot_uri: hc:hasService
    description: >-
      To specify a system, utility, or act of assistance provided by an organization or
      entity to users or customers.
    alt_descriptions:
      nl: >-
        Om een systeem, voorziening of vorm van dienstverlening aan te geven die door een
        organisatie of entiteit aan gebruikers of klanten wordt geboden.
      de: >-
        Um ein System, eine Einrichtung oder eine Hilfeleistung anzugeben, die von einer
        Organisation oder Entität für Benutzer oder Kunden bereitgestellt wird.
      fr: >-
        Pour spécifier un système, un service ou un acte d'assistance fourni par une
        organisation ou une entité aux utilisateurs ou clients.
      ar: >-
        لتحديد نظام أو خدمة أو عمل مساعدة يقدمه منظمة أو كيان للمستخدمين أو العملاء.
      id: >-
        Untuk menentukan sistem, utilitas, atau tindakan bantuan yang diberikan oleh
        organisasi atau entitas kepada pengguna atau pelanggan.
      zh: >-
        用于指定由组织或实体向用户或客户提供的系统、设施或协助行为。
      es: >-
        Para especificar un sistema, servicio o acto de asistencia proporcionado por una
        organización o entidad a usuarios o clientes.
    structured_aliases:
      - literal_form: Dienst
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Dienst
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Service
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: خدمة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Layanan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 服务
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Servicio
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_service
      - has_or_had_service_details
      - has_service_details
      - interlibrary_loan
      - material_specialization
      - serves_function_of
      - service_offering
      - services_offered
    annotations:
      custodian_types: '["*"]'
    close_mappings:
    - schema:availableService  # schemaorg.owl:9515-9533 - Both = service from provider. Schema.org originally medical-domain but generalized.
