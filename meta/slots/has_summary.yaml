# ==============================================================================
# LinkML Slot Definition: has_summary
# ==============================================================================
# Condensed version or brief account of a larger entity or text.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology    | Property           | File/Line            | Mapping | Notes                                                                                   |
# |-------------|--------------------|----------------------|---------|-----------------------------------------------------------------------------------------|
# | **DCTerms** | `dcterms:abstract` | dcterms.rdf:765-785  | close   | "A summary of the resource." SubPropertyOf dcterms:description — abstract is specifically a summary of a resource; has_summary is more general. |
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_summary
name: has_summary
title: Has Summary
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
- linkml:types
slots:
  has_summary:
    slot_uri: hc:hasSummary
    description: >-
      To specify a condensed version, abstract, or brief account covering the
      main points or substance of a larger entity or text.
    alt_descriptions:
      nl: >-
        Om een verkorte versie, samenvatting of beknopt overzicht te geven
        van de hoofdpunten of inhoud van een groter geheel of tekst.
      de: >-
        Zur Angabe einer gekürzten Fassung, Zusammenfassung oder eines kurzen
        Berichts über die Hauptpunkte oder den Inhalt einer größeren Entität
        oder eines Textes.
      fr: >-
        Pour spécifier une version condensée, un résumé ou un compte rendu
        succinct couvrant les points principaux ou la substance d'une entité
        ou d'un texte plus vaste.
      ar: >-
        لتحديد نسخة مختصرة أو ملخص أو عرض موجز يغطي النقاط الرئيسية أو جوهر
        كيان أو نص أكبر.
      id: >-
        Untuk menentukan versi ringkas, abstrak, atau uraian singkat yang
        mencakup poin-poin utama atau inti dari suatu entitas atau teks yang
        lebih besar.
      zh: >-
        用于指定涵盖较大实体或文本的要点或实质内容的精简版本、摘要或简要说明。
      es: >-
        Para especificar una versión condensada, resumen o relato breve que
        cubra los puntos principales o la sustancia de una entidad o texto
        más amplio.
    structured_aliases:
      - literal_form: Samenvatting
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zusammenfassung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Résumé
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: ملخص
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Ringkasan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 摘要
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Resumen
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_summary
      - is_or_was_governance_clause
      - governance_clause
    close_mappings:
      - dcterms:abstract  # dcterms.rdf:765-785 — "A summary of the resource." SubPropertyOf dcterms:description — resource-specific.
    annotations:
      custodian_types: '["*"]'
