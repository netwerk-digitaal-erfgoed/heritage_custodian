# ==============================================================================
# LinkML Slot Definition: registered_by
# ==============================================================================
# The user, official, system, or organization that performed a registration.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                 | File/Line                       | Mapping  | Notes                                                          |
# |---------------|--------------------------|---------------------------------|----------|----------------------------------------------------------------|
# | **HC**        | `hc:registeredBy`        | —                               | slot_uri | No external "registered by" property exists.                   |
# | **PROV**      | `prov:wasAttributedTo`   | prov.ttl:1082-1095              | close    | "Ascribing an entity to an agent" — general, not registration. |
# | **CIDOC-CRM** | `crm:P14_carried_out_by` | CIDOC_CRM_v7.1.3.rdf:1489-1504 | related  | E7 Activity→E39 Actor; any activity performer, not reg.        |
# | **Schema.org** | `schema:agent`          | schemaorg.owl:7463-7480         | broad    | "Direct performer of an action" — very generic.                |
#
# CREATED: 2025-02-02
# UPDATED: 2026-02-11
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/registered_by
name: registered_by
title: Registered By
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  registered_by:
    slot_uri: hc:registeredBy
    description: >-
      Identifies the specific user, official, system, or organization that
      performed the action of entering an entity into a record, list, or
      database. Typically refers to a registration authority such as a chamber
      of commerce, companies house, or charity commission.
    alt_descriptions:
      nl: >-
        Identificeert de specifieke gebruiker, functionaris, systeem of
        organisatie die de handeling heeft verricht van het inschrijven van een
        entiteit in een register, lijst of database.
      de: >-
        Identifiziert den spezifischen Benutzer, Beamten, das System oder die
        Organisation, die die Eintragung einer Entität in ein Register, eine
        Liste oder eine Datenbank vorgenommen hat.
      fr: >-
        Identifie l'utilisateur, le fonctionnaire, le système ou l'organisation
        spécifique qui a effectué l'inscription d'une entité dans un registre,
        une liste ou une base de données.
      ar: >-
        يحدد المستخدم أو المسؤول أو النظام أو المنظمة المحددة التي قامت بإدخال
        كيان في سجل أو قائمة أو قاعدة بيانات.
      id: >-
        Mengidentifikasi pengguna, pejabat, sistem, atau organisasi tertentu
        yang melakukan tindakan mendaftarkan suatu entitas ke dalam catatan,
        daftar, atau basis data.
      zh: >-
        标识将实体登记到记录、列表或数据库中的特定用户、官员、系统或组织。
      es: >-
        Identifica al usuario, funcionario, sistema u organización específico
        que realizó la acción de inscribir una entidad en un registro, lista o
        base de datos.
    structured_aliases:
      - literal_form: geregistreerd door
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: registriert von
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: enregistré par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مسجل بواسطة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: didaftarkan oleh
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 登记者
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: registrado por
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    close_mappings:
      - prov:wasAttributedTo  # prov.ttl:1082-1095 - "Attribution is the ascribing of an entity to an agent"
    broad_mappings:
      - schema:agent  # schemaorg.owl:7463-7480 - "Direct performer or driver of the action"
    related_mappings:
      - crm:P14_carried_out_by  # CIDOC_CRM_v7.1.3.rdf:1489-1504 - "Active participation of E39 Actor in E7 Activity"
    aliases:
      - registration_authority
    examples:
      - value: "Kamer van Koophandel"
        description: Dutch Chamber of Commerce (KvK), the registration authority for businesses in the Netherlands.
      - value: "Companies House"
        description: The UK registration authority for companies and limited liability partnerships.
      - value: "Charity Commission"
        description: The UK regulator and registration authority for charities in England and Wales.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Typically points to a registration authority. The RegistrationAuthority
        class (if used as range) includes fields such as name, abbreviation,
        jurisdiction, website, and registration_types. Authorities vary by
        jurisdiction and entity type.
      - >-
        See also gleif-base:RegistrationAuthority (gleif_base.ttl:220-226) for
        a comparable class definition in the GLEIF ontology.
