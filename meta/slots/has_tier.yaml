id: https://nde.nl/ontology/hc/slot/has_tier
name: has_tier
title: Has Tier
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_tier:
    slot_uri: hc:hasTier
    description: >-
      To specify a distinct level, rank, or layer within a hierarchical system,
      service structure, or architecture.
    alt_descriptions:
      nl: >-
        Om een afzonderlijk niveau, rang of laag aan te geven binnen een
        hiërarchisch systeem, dienststructuur of architectuur.
      de: >-
        Zur Angabe einer bestimmten Ebene, eines Rangs oder einer Schicht
        innerhalb eines hierarchischen Systems, einer Dienststruktur oder
        Architektur.
      fr: >-
        Pour spécifier un niveau, rang ou couche distinct au sein d'un système
        hiérarchique, d'une structure de services ou d'une architecture.
      ar: >-
        لتحديد مستوى أو رتبة أو طبقة مميزة ضمن نظام هرمي أو هيكل خدمات
        أو بنية معمارية.
      id: >-
        Untuk menentukan tingkat, peringkat, atau lapisan yang berbeda dalam
        sistem hierarkis, struktur layanan, atau arsitektur.
      zh: >-
        用于指定层级系统、服务结构或架构中的特定级别、等级或层次。
      es: >-
        Para especificar un nivel, rango o capa distinto dentro de un sistema
        jerárquico, estructura de servicios o arquitectura.
    structured_aliases:
      - literal_form: Niveau
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Stufe
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Niveau
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مستوى
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Tingkat
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 层级
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Nivel
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_tier
    annotations:
      custodian_types: '["*"]'
