# ==============================================================================
# LinkML Slot Definition: has_output
# ==============================================================================
# Describes results, data, or products yielded by a process, operation, or
# computation. Used for IoT devices, APIs, processing pipelines, and software.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property                  | File/Line              | Mapping | Notes                                           |
# |--------------|---------------------------|------------------------|---------|------------------------------------------------|
# | **PROV-O**   | `prov:generated`          | prov.ttl:579-591       | exact   | Activity generated Entity (inverse of wasGeneratedBy) |
# | **Schema.org**| `schema:result`          | schemaorg.owl:33466-33484| close  | "Result produced in the action"                 |
# | **Schema.org**| `schema:serviceOutput`   | schemaorg.owl:34984-34997| close  | "Tangible thing generated by service"           |
# | **CIDOC-CRM**| `crm:P108_has_produced`   | CIDOC_CRM:3609-3623    | close   | Production resulted in physical thing           |
# | **CIDOC-CRM**| `crm:P94_has_created`     | CIDOC_CRM:3223-3237    | close   | Creation resulted in conceptual object          |
# | **CIDOC-CRM**| `crm:P92_brought_into_existence`| CIDOC_CRM:3166-3179| broad  | General: brought persistent item into existence |
# | **Schema.org**| `schema:produces`        | schemaorg.owl:31037-31055| related| Deprecated, superseded by serviceOutput        |
#
# NOTE: prov:generated is the active form (Activity → Entity), while
# prov:wasGeneratedBy is the passive form (Entity → Activity).
#
# CREATED: 2026-01-26
# UPDATED: 2026-02-03 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_output
name: has_output
title: has output

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  dcterms: http://purl.org/dc/terms/
  sosa: http://www.w3.org/ns/sosa/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

description: |
  To yield or produce a specific result, data, or product as a consequence of a process, operation, or computation.

imports:
  - linkml:types

slots:
  has_output:
    slot_uri: prov:generated
    description: |
      To yield or produce a specific result, data, or product as a consequence of a process, operation, or computation.
    alt_descriptions:
      nl: >-
        Een specifiek resultaat, gegevens of product opleveren als gevolg van een proces, operatie of berekening.
      de: >-
        Ein spezifisches Ergebnis, Daten oder Produkt als Folge eines Prozesses, einer Operation oder einer Berechnung hervorbringen.
      fr: >-
        Produire un résultat, des données ou un produit spécifique comme conséquence d'un processus, d'une opération ou d'un calcul.
      ar: >-
        إنتاج نتيجة أو بيانات أو منتج محدد كنتيجة لعملية أو تشغيل أو حساب.
      id: >-
        Menghasilkan hasil, data, atau produk tertentu sebagai konsekuensi dari proses, operasi, atau komputasi.
      zh: >-
        作为过程、操作或计算的结果，产生特定的结果、数据或产品。
      es: >-
        Producir un resultado, datos o producto específico como consecuencia de un proceso, operación o cálculo.
    structured_aliases:
      - literal_form: heeft uitvoer
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Ausgabe
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a une sortie
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: له مخرجات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki keluaran
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有输出
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene salida
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    multivalued: true
    inlined_as_list: false
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.70
      custodian_types_rationale: Output specifications applicable to all custodian types with digital systems.
    exact_mappings:
      # PROV-O generated - Activity generated an Entity
      # Domain: Activity, Range: Entity
      # Inverse of wasGeneratedBy
      # Lines 579-591 in prov.ttl
    close_mappings:
      # Schema.org result - "The result produced in the action"
      # Domain: Action, Range: Thing
      # Lines 33466-33484 in schemaorg.owl
      - schema:result
      # Schema.org serviceOutput - "Tangible thing generated by service"
      # Supersedes schema:produces
      # Lines 34984-34997 in schemaorg.owl
      - schema:serviceOutput
      # CIDOC-CRM P108_has_produced - Physical thing from production
      # Domain: E12_Production, Range: E24_Physical_Human-Made_Thing
      # Lines 3609-3623 in CIDOC_CRM_v7.1.3.rdf
      - crm:P108_has_produced
      # CIDOC-CRM P94_has_created - Conceptual object from creation
      # Domain: E65_Creation, Range: E28_Conceptual_Object
      # Lines 3223-3237 in CIDOC_CRM_v7.1.3.rdf
      - crm:P94_has_created
      # SOSA hasResult - Observation result
      - sosa:hasResult
    broad_mappings:
      # CIDOC-CRM P92_brought_into_existence - General existence creation
      # P94 and P108 are subproperties of P92
      # Lines 3166-3179 in CIDOC_CRM_v7.1.3.rdf
      - crm:P92_brought_into_existence
      # PROV-O influenced - General influence relationship
      # prov:generated is subPropertyOf prov:influenced
      - prov:influenced
    narrow_mappings:
      # Schema.org resultComment - Specific: comment as result
      # subPropertyOf schema:result
      # Line 33488 in schemaorg.owl
      - schema:resultComment
      # Schema.org resultReview - Specific: review as result
      # subPropertyOf schema:result
      # Line 33512 in schemaorg.owl
      - schema:resultReview
    related_mappings:
      # Schema.org produces - Deprecated, superseded by serviceOutput
      # Lines 31037-31055 in schemaorg.owl
      - schema:produces
    aliases:
      - has_or_had_output
    examples:
      - value: "hc:OutputData/sensor-readings-json"
        description: IoT device output - climate sensor readings in JSON format
      - value: "hc:OutputData/analytics-export-csv"
        description: Data export output - analytics data in CSV format
      - value: "hc:OutputData/api-response"
        description: API service output - data response payload
    comments:
      - Updated 2026-02-03 with verified ontology mappings and translations
      - |
        **PURPOSE**: Represents data, signals, or artifacts emitted by:
        - IoT devices (sensor readings, beacon signals)
        - APIs and services (data responses)
        - Processing pipelines (transformed data)
        - Software systems (reports, exports)
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):
        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | PROV-O | prov:generated | 579 | exact | Activity → Entity |
        | Schema.org | schema:result | 33466 | close | Action result |
        | Schema.org | schema:serviceOutput | 34984 | close | Service output |
        | CIDOC-CRM | crm:P108_has_produced | 3609 | close | Physical production |
        | CIDOC-CRM | crm:P94_has_created | 3223 | close | Conceptual creation |
        | CIDOC-CRM | crm:P92_brought_into_existence | 3166 | broad | General existence |
        | Schema.org | schema:resultComment | 33488 | narrow | Comment result |
      - |
        **RANGE NOTES**:
        The OutputData class captures output specifications including:
        - Format (JSON, CSV, XML, etc.)
        - Frequency (real-time, batch, scheduled)
        - Destination (URL, file path, queue)
        - Data characteristics (schema, encoding)
      - |
        **TEMPORAL SEMANTICS** (RiC-O Pattern):
        "has_or_had_output" indicates outputs may change over time as
        systems are updated or reconfigured.
