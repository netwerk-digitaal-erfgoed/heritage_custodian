id: https://nde.nl/ontology/hc/slot/has_schema
name: has_schema
title: Has Schema
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_schema:
    slot_uri: hc:hasSchema
    description: >-
      To specify the structural definition, blueprint, or set of rules that governs
      the organization, format, and validity of data or metadata.
    comments:
      - "MIGRATED 2026-02-03 from has_or_had_schema for conciseness."
    alt_descriptions:
      nl: >-
        Om de structurele definitie, blauwdruk of set regels aan te geven die de organisatie,
        het formaat en de geldigheid van gegevens of metadata beheerst.
      de: >-
        Um die strukturelle Definition, den Bauplan oder die Regeln anzugeben, die die
        Organisation, das Format und die Gültigkeit von Daten oder Metadaten bestimmen.
      fr: >-
        Pour spécifier la définition structurelle, le plan ou l'ensemble de règles qui
        régit l'organisation, le format et la validité des données ou métadonnées.
      ar: >-
        لتحديد التعريف الهيكلي أو المخطط أو مجموعة القواعد التي تحكم تنظيم البيانات أو
        البيانات الوصفية وتنسيقها وصلاحيتها.
      id: >-
        Untuk menentukan definisi struktural, cetak biru, atau seperangkat aturan yang
        mengatur organisasi, format, dan validitas data atau metadata.
      zh: >-
        用于指定管理数据或元数据的组织、格式和有效性的结构定义、蓝图或规则集。
      es: >-
        Para especificar la definición estructural, el plano o el conjunto de reglas que
        rige la organización, el formato y la validez de los datos o metadatos.
    structured_aliases:
      - literal_form: Schema
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Schema
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Schéma
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مخطط
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Skema
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 模式
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Esquema
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_schema
      - has_or_had_scheme
      - has_scheme
    annotations:
      custodian_types: '["*"]'
