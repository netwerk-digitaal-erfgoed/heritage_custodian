# ==============================================================================
# LinkML Slot Definition: changed_through
# ==============================================================================
# Captures modification or transformation resulting from a specific process,
# event, or intervention. Used to document organizational changes in heritage
# institutions.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property               | File/Line         | Mapping | Notes                                    |
# |--------------|------------------------|-------------------|---------|------------------------------------------|
# | **PROV-O**   | `prov:wasInfluencedBy` | prov.ttl:1147-1176| slot_uri| "Because prov:wasInfluencedBy is a broad |
# |              |                        |                   |         | relation, its more specific subproperties|
# |              |                        |                   |         | should be used when applicable."         |
# | **PROV-O**   | `prov:wasDerivedFrom`  | prov.ttl:1073     | narrow  | subPropertyOf wasInfluencedBy            |
# | **PROV-O**   | `prov:wasGeneratedBy`  | prov.ttl:1089     | narrow  | subPropertyOf wasInfluencedBy            |
# | **PROV-O**   | `prov:used`            | prov.ttl:1046     | narrow  | subPropertyOf wasInfluencedBy            |
# | **PROV-O**   | `prov:Influence`       | prov.ttl:253-263  | related | Class for qualified influence relations  |
# | **CIDOC-CRM**| `crm:P15_was_influenced_by`| CIDOC_CRM:1517-1530| close | "Captures relationship between E7 Activity|
# |              |                        |                   |         | and anything that may have had bearing." |
# | **CIDOC-CRM**| `crm:P15i_influenced`  | CIDOC_CRM:1531-1542| related | Inverse: "influenced"                    |
#
# CREATED: 2026-01-26
# UPDATED: 2026-02-03 - Added narrow_mappings (subProperties of prov:wasInfluencedBy)
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/changed_through
name: changed_through
title: changed through

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/

imports:
  - linkml:types

default_prefix: hc

slots:
  changed_through:
    slot_uri: prov:wasInfluencedBy
    description: >-
      To undergo modification or transformation as a direct result of a
      specific process, event, or intervention.
    alt_descriptions:
      nl: >-
        Het ondergaan van wijziging of transformatie als gevolg van een
        specifiek proces, gebeurtenis of interventie.
      de: >-
        Eine Änderung oder Transformation als direktes Ergebnis eines
        bestimmten Prozesses, Ereignisses oder Eingriffs durchlaufen.
      fr: >-
        Subir une modification ou une transformation en conséquence directe
        d'un processus, événement ou intervention spécifique.
      ar: >-
        الخضوع لتعديل أو تحول كنتيجة مباشرة لعملية أو حدث أو تدخل محدد.
      id: >-
        Mengalami modifikasi atau transformasi sebagai akibat langsung dari
        proses, peristiwa, atau intervensi tertentu.
      zh: >-
        作为特定过程、事件或干预的直接结果而经历修改或转变。
      es: >-
        Experimentar modificación o transformación como resultado directo
        de un proceso, evento o intervención específica.
    range: uriorcurie
    multivalued: true
    inlined: false
    narrow_mappings:
      # prov.ttl line 1073: wasDerivedFrom rdfs:subPropertyOf wasInfluencedBy
      # Narrow: specific type of influence - derivation
      - prov:wasDerivedFrom  # from prov.ttl - entity derived from another
      
      # prov.ttl line 1089: wasGeneratedBy rdfs:subPropertyOf wasInfluencedBy
      # Narrow: specific type of influence - generation by activity
      - prov:wasGeneratedBy  # from prov.ttl - entity generated by activity
      
      # prov.ttl line 1046: used rdfs:subPropertyOf wasInfluencedBy
      # Narrow: specific type of influence - activity used entity
      - prov:used  # from prov.ttl - activity used entity
    close_mappings:
      - crm:P15_was_influenced_by
    related_mappings:
      - prov:Influence
      - crm:P15i_influenced
    aliases:
      - changes_or_changed_through
      - was_influenced_by
      - is_or_was_changed_through
      - content_changed
    structured_aliases:
      - literal_form: veranderd door
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_changed_through
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: geändert durch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: changé par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: تغير من خلال
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diubah melalui
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 通过...变更
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: cambiado mediante
        predicate: EXACT_SYNONYM
        in_language: es
    examples:
      - value: "hc:MergerEvent2020"
        description: Organizational merger event that transformed the institution
      - value: "hc:DigitizationProject2019"
        description: Digitization initiative that modified collection access
      - value: "hc:RestructuringProgram"
        description: Administrative restructuring that changed governance
    annotations:
      custodian_types: '["*"]'
    comments:
      - |
        **USAGE**:
        Used for:
        - Organizational restructuring events
        - Policy changes affecting operations
        - Technology implementations
        - Mergers, acquisitions, or splits
        - Regulatory changes impacting the institution
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):

        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | **PROV-O** | `prov:wasInfluencedBy` | 1147-1176 | slot_uri | Broad influence relation |
        | **PROV-O** | `prov:wasDerivedFrom` | 1073 | narrow | subPropertyOf wasInfluencedBy |
        | **PROV-O** | `prov:wasGeneratedBy` | 1089 | narrow | subPropertyOf wasInfluencedBy |
        | **PROV-O** | `prov:used` | 1046 | narrow | subPropertyOf wasInfluencedBy |
        | **CIDOC-CRM** | `crm:P15_was_influenced_by` | 1517-1530 | close | Activity influenced by entity |
        | **PROV-O** | `prov:Influence` | 253-263 | related | Qualified influence class |
        | **CIDOC-CRM** | `crm:P15i_influenced` | 1531-1542 | related | Inverse relation |
