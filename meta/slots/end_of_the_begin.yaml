# ==============================================================================
# LinkML Slot Definition: end_of_the_begin
# ==============================================================================
# Latest possible start time of a temporal extent (CIDOC-CRM E52_Time-Span pattern).
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property                   | File/Line           | Mapping  | Notes                                    |
# |----------------|----------------------------|---------------------|----------|------------------------------------------|
# | **CIDOC-CRM**  | `crm:P81a_end_of_the_begin`| CIDOC_CRM:3008-3018 | close    | "end of the begin" - latest possible     |
# |                |                            |                     |          | start time. Domain: E52_Time-Span        |
# |                |                            |                     |          | Range: rdfs:Literal (DatatypeProperty)   |
# | **CIDOC-CRM**  | `crm:P81_ongoing_throughout`| CIDOC_CRM:2996     | broad    | Parent property (P81a subPropertyOf P81).|
# | **PROV-O**     | `prov:startedAtTime`       | prov.ttl:1018-1028  | related  | "The time at which an activity started." |
# |                |                            |                     |          | Range: xsd:dateTime                      |
#
# CIDOC-CRM FUZZY DATE PATTERN:
# P81a defines the latest possible time the time span could have started.
# Used with P82a (begin_of_the_begin) to express uncertainty about start time.
#
# Example: "Founded between 1800-1805"
#   - begin_of_the_begin: 1800-01-01 (earliest possible founding)
#   - end_of_the_begin: 1805-12-31 (latest possible founding)
#
# SLOT_URI NOTE:
# Uses hc:endOfTheBegin (ObjectProperty) instead of crm:P81a (DatatypeProperty)
# to support Timestamp class range for structured temporal data.
#
# CREATED: 2026-01-15
# UPDATED: 2026-02-03 - Added broad_mappings (P81a subPropertyOf P81)
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/end_of_the_begin
name: end_of_the_begin
title: end of the begin

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#

imports:
  - linkml:types

default_prefix: hc

slots:
  end_of_the_begin:
    slot_uri: hc:endOfTheBegin
    description: >-
      To indicate the latest possible start time of temporal extent (CIDOC-CRM E52_Time-Span).
    alt_descriptions:
      nl: >-
        Het aangeven van de laatst mogelijke starttijd van een temporele omvang (CIDOC-CRM E52_Time-Span).
      de: >-
        Angabe der spätestmöglichen Startzeit einer zeitlichen Ausdehnung (CIDOC-CRM E52_Time-Span).
      fr: >-
        Indiquer le moment de début le plus tardif possible d'une étendue temporelle (CIDOC-CRM E52_Time-Span).
      ar: >-
        للإشارة إلى أحدث وقت بداية ممكن للنطاق الزمني (CIDOC-CRM E52_Time-Span).
      id: >-
        Untuk menunjukkan waktu mulai terbaru yang mungkin dari rentang temporal (CIDOC-CRM E52_Time-Span).
      zh: >-
        指示时间范围的最晚可能开始时间（CIDOC-CRM E52_Time-Span）。
      es: >-
        Indicar el momento de inicio más tardío posible de una extensión temporal (CIDOC-CRM E52_Time-Span).
    range: string
    any_of:
      - range: Timestamp
      - range: string
      - range: datetime
    inlined: false
    required: false
    multivalued: false
    close_mappings:
      - crm:P81a_end_of_the_begin
    broad_mappings:
      - crm:P81_ongoing_throughout # CIDOC-CRM: Parent property (P81a rdfs:subPropertyOf P81, line 3017)
    related_mappings:
      - prov:startedAtTime
    aliases:
      - latest_start
      - end_of_begin
      - is_or_was_end_of_the_begin
    structured_aliases:
      - literal_form: einde van het begin
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_end_of_the_begin
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Ende des Anfangs
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: fin du début
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: نهاية البداية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: akhir dari awal
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 开始的结束
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: fin del inicio
        predicate: EXACT_SYNONYM
        in_language: es
    examples:
      - value: |
          timestamp_value: "1805-12-31"
          timestamp_precision: day
        description: Latest possible founding date
      - value: "1945-05-08"
        description: Latest possible start as ISO 8601 string
    annotations:
      migration_date: '2026-01-15'
      owl_note: Uses hc:endOfTheBegin (ObjectProperty) instead of crm:P81a (DatatypeProperty) to match Timestamp class range
      custodian_types: '["*"]'
    comments:
      - |
        **CIDOC-CRM Pattern**:
        P81a defines the latest possible time the time span could have started.
        Used with P82a (begin_of_the_begin) to express uncertainty about start time.
      - |
        **Example**: "Founded between 1800-1805"
        - begin_of_the_begin: 1800-01-01 (earliest possible founding)
        - end_of_the_begin: 1805-12-31 (latest possible founding)
      - |
        **Range**: Supports Timestamp class, ISO 8601 strings, and datetime values.
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):

        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | **CIDOC-CRM** | `crm:P81a_end_of_the_begin` | 3008-3018 | close | Latest possible start time |
        | **CIDOC-CRM** | `crm:P81_ongoing_throughout` | 2996 | broad | Parent (P81a subPropertyOf P81) |
        | **PROV-O** | `prov:startedAtTime` | 1018-1028 | related | Activity start time |
