id: https://nde.nl/ontology/hc/slot/has_reason
name: has_reason
title: Has Reason
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_reason:
    slot_uri: hc:hasReason
    description: >-
      To specify the cause, explanation, or justification for an event, action, state, or decision.
    alt_descriptions:
      nl: >-
        Om de oorzaak, verklaring of rechtvaardiging voor een gebeurtenis, handeling, toestand of beslissing te specificeren.
      de: >-
        Um die Ursache, Erklärung oder Rechtfertigung für ein Ereignis, eine Handlung, einen Zustand oder eine Entscheidung anzugeben.
      fr: >-
        Pour spécifier la cause, l'explication ou la justification d'un événement, d'une action, d'un état ou d'une décision.
      ar: >-
        لتحديد السبب أو التفسير أو المبرر لحدث أو إجراء أو حالة أو قرار.
      id: >-
        Untuk menentukan penyebab, penjelasan, atau justifikasi untuk suatu peristiwa, tindakan, keadaan, atau keputusan.
      zh: >-
        用于指定事件、行动、状态或决策的原因、解释或理由。
      es: >-
        Para especificar la causa, explicación o justificación de un evento, acción, estado o decisión.
    structured_aliases:
      - literal_form: Reden
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Grund
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Raison
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: سبب
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Alasan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 原因
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Razon
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_reason
    annotations:
      custodian_types: '["*"]'
