# ==============================================================================
# LinkML Slot Definition: allocated_through
# ==============================================================================
# Mechanism, process, or program that facilitated resource allocation.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                                                    |
# |---------------|-----------------------|----------------------|---------|----------------------------------------------------------|
# | **PROV-O**    | `prov:wasGeneratedBy` | prov.ttl:1073-1088   | related | Entity generated by activity - more generic              |
# | **PROV-O**    | `prov:used`           | prov.ttl:1039-1055   | related | Activity used entity                                     |
#
# SEMANTIC NOTES:
# - Allocation "through" captures the mechanism/channel/program
# - No exact standard property exists for allocation mechanism
# - Custom hc: URI is appropriate
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, multilingual support, related_mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/allocated_through
name: allocated_through
title: Allocated Through

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#

imports:
  - linkml:types

default_prefix: hc

slots:
  allocated_through:
    slot_uri: hc:allocatedThrough
    description: >-
      To be assigned or distributed via a specific mechanism, process, channel, event 
      or program that facilitates the apportionment of resources.
    alt_descriptions:
      nl: >-
        Toegewezen of verdeeld via een specifiek mechanisme, proces, kanaal, gebeurtenis 
        of programma dat de verdeling van middelen faciliteert.
      de: >-
        Zugewiesen oder verteilt über einen bestimmten Mechanismus, Prozess, Kanal, 
        ein Ereignis oder Programm, das die Verteilung von Ressourcen ermöglicht.
      fr: >-
        Attribué ou distribué via un mécanisme, processus, canal, événement ou programme 
        spécifique qui facilite la répartition des ressources.
      ar: >-
        أن يتم تخصيصه أو توزيعه عبر آلية أو عملية أو قناة أو حدث أو برنامج 
        معين يسهل توزيع الموارد.
      id: >-
        Ditugaskan atau didistribusikan melalui mekanisme, proses, saluran, peristiwa 
        atau program tertentu yang memfasilitasi pembagian sumber daya.
      zh: >-
        通过促进资源分配的特定机制、流程、渠道、事件或计划进行分配或分发。
      es: >-
        Asignado o distribuido a través de un mecanismo, proceso, canal, evento o 
        programa específico que facilita la distribución de recursos.
    structured_aliases:
      - literal_form: toegewezen via
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: zugewiesen durch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: alloué par le biais de
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مخصص عبر
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: dialokasikan melalui
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 通过...分配
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: asignado mediante
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    multivalued: true
    related_mappings:
      - prov:wasGeneratedBy  # prov.ttl:1073 - generation by activity
    aliases:
      - is_or_was_allocated_through
    annotations:
      custodian_types: '["*"]'
