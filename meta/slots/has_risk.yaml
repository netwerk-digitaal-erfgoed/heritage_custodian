id: https://nde.nl/ontology/hc/slot/has_risk
name: has_risk
title: Has Risk
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_risk:
    slot_uri: hc:hasRisk
    description: >-
      To specify a potential danger, possibility of loss, or negative outcome associated with an entity, activity, or decision.
    alt_descriptions:
      nl: >-
        Om een mogelijk gevaar, kans op verlies of negatief resultaat te specificeren dat geassocieerd is met een entiteit, activiteit of beslissing.
      de: >-
        Um eine potenzielle Gefahr, Verlustmöglichkeit oder ein negatives Ergebnis anzugeben, das mit einer Entität, Aktivität oder Entscheidung verbunden ist.
      fr: >-
        Pour spécifier un danger potentiel, une possibilité de perte ou un résultat négatif associé à une entité, une activité ou une décision.
      ar: >-
        لتحديد خطر محتمل أو احتمال خسارة أو نتيجة سلبية مرتبطة بكيان أو نشاط أو قرار.
      id: >-
        Untuk menentukan bahaya potensial, kemungkinan kerugian, atau hasil negatif yang terkait dengan suatu entitas, aktivitas, atau keputusan.
      zh: >-
        用于指定与实体、活动或决策相关的潜在危险、损失可能性或负面结果。
      es: >-
        Para especificar un peligro potencial, posibilidad de pérdida o resultado negativo asociado con una entidad, actividad o decisión.
    structured_aliases:
      - literal_form: Risico
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Risiko
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Risque
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مخاطرة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Risiko
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 风险
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Riesgo
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_risk
    annotations:
      custodian_types: '["*"]'
