id: https://nde.nl/ontology/hc/slot/is_accessibility_feature_of
name: is_accessibility_feature_of
title: Is Accessibility Feature Of
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  is_accessibility_feature_of:
    description: Inverse of has_accessibility_feature. Relates an accessibility feature to the entity that has it.
    range: uriorcurie
    inverse: has_accessibility_feature
    implements:
      - owl:ObjectProperty
    multivalued: true
