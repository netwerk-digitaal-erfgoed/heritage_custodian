# ==============================================================================
# LinkML Slot Definition: recombined
# ==============================================================================
# Indicates whether an entity has been reunited after separation or dispersal.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                              |
# |---------------|-----------------------|----------------------|---------|------------------------------------|
# | **HC**        | `hc:recombined`       | (custom)             | exact   | HC-specific: reunification status  |
#
# No standard ontology property found for this heritage-specific concept.
# This is a domain-specific slot for tracking reunification of dispersed collections.
#
# CREATED: 2026-02-04
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/recombined
name: recombined
title: Recombined
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - linkml:types
slots:
  recombined:
    slot_uri: hc:recombined
    description: >-
      Indicates whether an entity has been reunited or brought back together
      after having been separated or dispersed.
    alt_descriptions:
      nl: >-
        Geeft aan of een entiteit opnieuw is samengevoegd of bijeengebracht
        nadat deze was gescheiden of verspreid.
      de: >-
        Gibt an, ob eine Entität nach einer Trennung oder Zerstreuung
        wieder zusammengeführt oder vereinigt wurde.
      fr: >-
        Indique si une entité a été réunie ou rassemblée après avoir
        été séparée ou dispersée.
      ar: >-
        يشير إلى ما إذا كان الكيان قد أُعيد توحيده أو جمعه معًا
        بعد أن تم فصله أو تشتيته.
      id: >-
        Menunjukkan apakah suatu entitas telah disatukan kembali atau
        dikumpulkan kembali setelah dipisahkan atau tersebar.
      zh: >-
        表示实体在分离或分散后是否已重新联合或重新组合在一起。
      es: >-
        Indica si una entidad ha sido reunida o reagrupada después
        de haber sido separada o dispersada.
    structured_aliases:
      - literal_form: herenigd
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: wieder zusammengeführt
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: réuni
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مُعاد توحيده
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: disatukan kembali
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 重新组合
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: recombinado
        predicate: EXACT_SYNONYM
        in_language: es
    range: boolean
    aliases:
      - is_or_was_recombined
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Applicable to all heritage custodian types.
      custodian_types_primary: A
      specificity_score: 0.7
      specificity_rationale: Domain-specific slot for tracking collection reunification.
