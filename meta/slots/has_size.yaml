id: https://nde.nl/ontology/hc/slot/has_size
name: has_size
title: Has Size
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
default_prefix: hc
imports:
- linkml:types
slots:
  has_size:
    slot_uri: hc:hasSize
    description: >-
      To specify the physical dimensions, magnitude, extent, or capacity of an entity.
    alt_descriptions:
      nl: >-
        Om de fysieke afmetingen, omvang, reikwijdte of capaciteit van een entiteit aan
        te geven.
      de: >-
        Um die physischen Abmessungen, die Größenordnung, den Umfang oder die Kapazität
        einer Entität anzugeben.
      fr: >-
        Pour spécifier les dimensions physiques, l'ampleur, l'étendue ou la capacité
        d'une entité.
      ar: >-
        لتحديد الأبعاد المادية أو الحجم أو النطاق أو السعة لكيان ما.
      id: >-
        Untuk menentukan dimensi fisik, besaran, luas, atau kapasitas suatu entitas.
      zh: >-
        用于指定实体的物理尺寸、大小、范围或容量。
      es: >-
        Para especificar las dimensiones físicas, la magnitud, la extensión o la capacidad
        de una entidad.
    structured_aliases:
      - literal_form: Omvang
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Größe
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Taille
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: حجم
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Ukuran
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 尺寸
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Tamaño
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_size
    annotations:
      custodian_types: '["*"]'
    exact_mappings:
    - schema:size  # schemaorg.owl:35498-35516 - "Standardized size of a product or creative work." Domain-restricted to Product/CreativeWork.
