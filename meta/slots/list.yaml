# ==============================================================================
# LinkML Slot Definition: list
# ==============================================================================
# The act of enumerating or recording items in a specific order or collection.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology    | Property                  | File/Line                       | Mapping | Notes                                                                        |
# |-------------|---------------------------|---------------------------------|---------|------------------------------------------------------------------------------|
# | **CRM**     | `crm:P71_lists`           | CIDOC_CRM_v7.1.3.rdf:2812-2825 | close   | "Associates an E32 Authority Document with an E1 CRM Entity it lists."       |
# | **Schema**  | `schema:itemListElement`  | schemaorg.owl:23489-23515       | related | "For itemListElement values, you can use simple strings."                    |
# | **SKOS**    | `skos:memberList`         | skos.rdf:363-380                | related | "Relates an ordered collection to the RDF list containing its members."      |
# | **DCTerms** | `dcterms:tableOfContents` | dcterms.rdf:1989-2009           | narrow  | "A list of subunits of the resource."                                        |
#
# CREATED: 2026-02-10
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/list
name: list
title: List
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
imports:
  - linkml:types
default_prefix: hc
slots:
  list:
    slot_uri: hc:list
    description: >-
      Signifies the act of enumerating, recording, or displaying items, names, or data
      points in a specific order or collection.
    alt_descriptions:
      nl: >-
        Duidt op de handeling van het opsommen, registreren of weergeven van items, namen
        of gegevenspunten in een specifieke volgorde of verzameling.
      de: >-
        Bezeichnet die Handlung des Aufzählens, Erfassens oder Anzeigens von Elementen,
        Namen oder Datenpunkten in einer bestimmten Reihenfolge oder Sammlung.
      fr: >-
        Désigne l'acte d'énumérer, d'enregistrer ou d'afficher des éléments, des noms ou
        des points de données dans un ordre ou une collection spécifique.
      ar: >-
        يشير إلى عملية تعداد أو تسجيل أو عرض العناصر أو الأسماء أو نقاط البيانات
        بترتيب أو مجموعة محددة.
      id: >-
        Menandakan tindakan menghitung, mencatat, atau menampilkan item, nama, atau titik
        data dalam urutan atau koleksi tertentu.
      zh: >-
        表示以特定顺序或集合的形式枚举、记录或显示项目、名称或数据点的行为。
      es: >-
        Significa el acto de enumerar, registrar o mostrar elementos, nombres o puntos de
        datos en un orden o colección específica.
    structured_aliases:
      - literal_form: Opsomming
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Auflistung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Énumération
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: قائمة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Daftar
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 列表
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Lista
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    annotations:
      custodian_types: '["*"]'
    close_mappings:
      - crm:P71_lists  # CIDOC_CRM_v7.1.3.rdf:2812-2825 — "Associates an E32 Authority Document with an E1 CRM Entity which it lists."
    narrow_mappings:
      - dcterms:tableOfContents  # dcterms.rdf:1989-2009 — "A list of subunits of the resource."
    related_mappings:
      - schema:itemListElement  # schemaorg.owl:23489-23515 — "For itemListElement values, you can use simple strings."
      - skos:memberList  # skos.rdf:363-380 — "Relates an ordered collection to the RDF list containing its members."
    aliases:
      - list_item
