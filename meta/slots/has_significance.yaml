id: https://nde.nl/ontology/hc/slot/has_significance
name: has_significance
title: Has Significance
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_significance:
    slot_uri: hc:hasSignificance
    description: >-
      To specify the importance, magnitude, or validity of an entity or result, indicating
      its consequence or the statistical likelihood that it is not due to random chance.
    alt_descriptions:
      nl: >-
        Om het belang, de omvang of de geldigheid van een entiteit of resultaat aan te
        geven, als indicatie van het gevolg ervan of de statistische waarschijnlijkheid
        dat het niet aan toeval te wijten is.
      de: >-
        Um die Bedeutung, Größenordnung oder Gültigkeit einer Entität oder eines Ergebnisses
        anzugeben, als Hinweis auf dessen Konsequenz oder die statistische Wahrscheinlichkeit,
        dass es nicht auf Zufall beruht.
      fr: >-
        Pour spécifier l'importance, l'ampleur ou la validité d'une entité ou d'un résultat,
        indiquant sa conséquence ou la probabilité statistique qu'il ne soit pas dû au
        hasard.
      ar: >-
        لتحديد أهمية أو حجم أو صلاحية كيان أو نتيجة، مما يشير إلى تأثيرها أو
        الاحتمال الإحصائي بأنها ليست ناتجة عن الصدفة.
      id: >-
        Untuk menentukan kepentingan, besaran, atau validitas suatu entitas atau hasil,
        yang menunjukkan konsekuensinya atau kemungkinan statistik bahwa hal tersebut bukan
        karena kebetulan.
      zh: >-
        用于指定实体或结果的重要性、规模或有效性，表明其后果或统计上非随机发生的可能性。
      es: >-
        Para especificar la importancia, magnitud o validez de una entidad o resultado,
        indicando su consecuencia o la probabilidad estadística de que no se deba al azar.
    structured_aliases:
      - literal_form: Significantie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Signifikanz
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Signification
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: أهمية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Signifikansi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 显著性
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Significancia
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_significance
    annotations:
      custodian_types: '["*"]'
