# ==============================================================================
# LinkML Slot Definition: has_threshold
# ==============================================================================
# Limit, boundary, or magnitude that must be reached for an effect or change.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# No standard ontology mapping identified.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_threshold
name: has_threshold
title: Has Threshold
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_threshold:
    slot_uri: hc:hasThreshold
    description: >-
      To specify the limit, boundary, or magnitude that must be reached or
      exceeded to produce a specific result, effect, or change in state.
    alt_descriptions:
      nl: >-
        Om de grens, drempel of omvang aan te geven die moet worden bereikt
        of overschreden om een specifiek resultaat, effect of toestandsverandering
        te bewerkstelligen.
      de: >-
        Zur Angabe der Grenze, Schwelle oder Größenordnung, die erreicht oder
        überschritten werden muss, um ein bestimmtes Ergebnis, eine Wirkung
        oder eine Zustandsänderung hervorzurufen.
      fr: >-
        Pour spécifier la limite, le seuil ou la grandeur qui doit être atteint
        ou dépassé pour produire un résultat, un effet ou un changement d'état
        spécifique.
      ar: >-
        لتحديد الحد أو العتبة أو المقدار الذي يجب الوصول إليه أو تجاوزه
        لإنتاج نتيجة أو تأثير أو تغيير محدد في الحالة.
      id: >-
        Untuk menentukan batas, ambang batas, atau besaran yang harus dicapai
        atau dilampaui untuk menghasilkan hasil, efek, atau perubahan keadaan
        tertentu.
      zh: >-
        用于指定必须达到或超过的极限、边界或量级，以产生特定的结果、效果或状态变化。
      es: >-
        Para especificar el límite, umbral o magnitud que debe alcanzarse o
        superarse para producir un resultado, efecto o cambio de estado específico.
    structured_aliases:
      - literal_form: Drempelwaarde
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Schwellenwert
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Seuil
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: عتبة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Ambang Batas
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 阈值
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Umbral
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_threshold
      - has_or_had_treshold
      - has_treshold
    annotations:
      custodian_types: '["*"]'
