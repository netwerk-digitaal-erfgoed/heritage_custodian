id: https://nde.nl/ontology/hc/slot/has_rate
name: has_rate
title: Has Rate
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_rate:
    slot_uri: hc:hasRate
    description: >-
      To specify a quantity, amount, or measure of a variable considered in relation to a unit of another variable (typically time).
    alt_descriptions:
      nl: >-
        Om een hoeveelheid, bedrag of maat van een variabele te specificeren die wordt beschouwd in verhouding tot een eenheid van een andere variabele (doorgaans tijd).
      de: >-
        Um eine Menge, einen Betrag oder ein Mass einer Variablen anzugeben, die im Verhältnis zu einer Einheit einer anderen Variablen (typischerweise Zeit) betrachtet wird.
      fr: >-
        Pour spécifier une quantité, un montant ou une mesure d'une variable considérée par rapport à une unité d'une autre variable (typiquement le temps).
      ar: >-
        لتحديد كمية أو مقدار أو مقياس لمتغير يُنظر إليه بالنسبة إلى وحدة من متغير آخر (عادةً الوقت).
      id: >-
        Untuk menentukan kuantitas, jumlah, atau ukuran suatu variabel yang dipertimbangkan dalam kaitannya dengan satuan variabel lain (biasanya waktu).
      zh: >-
        用于指定一个变量相对于另一个变量（通常为时间）的单位所衡量的数量、金额或度量。
      es: >-
        Para especificar una cantidad, monto o medida de una variable considerada en relación con una unidad de otra variable (típicamente el tiempo).
    structured_aliases:
      - literal_form: Tarief
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Rate
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Taux
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: معدل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Tingkat
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 比率
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Tasa
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_rate
    comments:
      - "MIGRATED 2026-02-03 from has_or_had_rate for conciseness."
    annotations:
      custodian_types: '["*"]'
