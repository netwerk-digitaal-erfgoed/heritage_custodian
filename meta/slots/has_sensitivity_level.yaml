id: https://nde.nl/ontology/hc/slot/has_sensitivity_level
name: has_sensitivity_level
title: Has Sensitivity Level
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_sensitivity_level:
    slot_uri: hc:hasSensitivityLevel
    description: >-
      To specify the degree of confidentiality, security classification, or protection
      required for an entity or piece of information.
    alt_descriptions:
      nl: >-
        Om de mate van vertrouwelijkheid, beveiligingsclassificatie of bescherming aan te
        geven die vereist is voor een entiteit of stuk informatie.
      de: >-
        Um den Grad der Vertraulichkeit, Sicherheitsklassifizierung oder des Schutzes
        anzugeben, der für eine Entität oder ein Informationsstück erforderlich ist.
      fr: >-
        Pour spécifier le degré de confidentialité, la classification de sécurité ou la
        protection requise pour une entité ou une information.
      ar: >-
        لتحديد درجة السرية أو تصنيف الأمان أو الحماية المطلوبة لكيان أو جزء من المعلومات.
      id: >-
        Untuk menentukan tingkat kerahasiaan, klasifikasi keamanan, atau perlindungan yang
        diperlukan untuk suatu entitas atau informasi.
      zh: >-
        用于指定实体或信息所需的机密程度、安全分类或保护级别。
      es: >-
        Para especificar el grado de confidencialidad, clasificación de seguridad o
        protección requerida para una entidad o pieza de información.
    structured_aliases:
      - literal_form: Gevoeligheidsniveau
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Vertraulichkeitsstufe
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Niveau de sensibilité
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مستوى الحساسية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Tingkat Sensitivitas
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 敏感度级别
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Nivel de sensibilidad
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_sensitivity_level
    annotations:
      custodian_types: '["*"]'
