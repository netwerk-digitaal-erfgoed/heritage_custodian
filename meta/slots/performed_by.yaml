    range: string
    multivalued: true
    close_mappings:
      - crm:P14_carried_out_by  # CIDOC_CRM_v7.1.3.rdf:1489-1503 - "Active participation of Actor in Activity." Activity‚ÜíActor
      - rico:isOrWasPerformedBy  # RiC-O_1-1.rdf:14819-14870 - "Connects an Activity to an Agent that performed it." Activity‚ÜíAgent
    broad_mappings:
      - schema:agent  # schemaorg.owl:7465-7490 - "Direct performer or driver of the action." very broad, Action‚ÜíPerson/Org
      - prov:wasAssociatedWith  # prov.ttl:1066-1080 - "Agent with unspecified responsibility for Activity." Activity‚ÜíAgent
    related_mappings:
      - schema:performer  # schemaorg.owl:29624-29648 - "A performer at the event." Event‚ÜíPerson/Org
      - schema:actor  # schemaorg.owl:7033-7060 - "An actor in TV, radio, movie, video games, or event." media-scoped
    aliases:
      - performer
    examples:
      - value: "Gamelan Semara Ratih"
        description: "Balinese gamelan ensemble performing traditional ceremonial music"
      - value: "Master weaver Ni Ketut Ayu"
        description: "Individual tradition bearer maintaining textile heritage practices"
      - value: "Royal Concertgebouw Orchestra"
        description: "Performing ensemble associated with a heritage concert venue"
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        In heritage contexts, this slot typically links to tradition bearers,
        master artists, heritage groups (often type I custodians), or performing
        ensembles that maintain intangible cultural practices such as music,
        dance, craft, or ritual.
      - >-
        The range is string but may reference custodian identifiers or URIs.
        The commented-out range of Custodian in the original file suggests
        future evolution toward a typed reference.
      - >-
        crm:P14_carried_out_by is very close semantically ("active participation
        implying causal or legal responsibility") but covers any Activity, not
        just artistic/heritage performance. rico:isOrWasPerformedBy is similarly
        close but comes from an archival context.
