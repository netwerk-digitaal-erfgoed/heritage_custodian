# ==============================================================================
# LinkML Slot Definition: performed_by
# ==============================================================================
# Identifies the agent that carries out an action or presents an artistic work.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property                       | File/Line                          | Mapping | Notes                                                                                 |
# |--------------|--------------------------------|------------------------------------|---------|---------------------------------------------------------------------------------------|
# | **CRM**      | `crm:P14_carried_out_by`       | CIDOC_CRM_v7.1.3.rdf:1489-1503    | close   | "Active participation of Actor in Activity. Implies causal or legal responsibility."  |
# |              |                                |                                    |         | Activity‚ÜíActor. SubProperty of P11_had_participant. Broader domain (any activity).    |
# | **RiC-O**    | `rico:isOrWasPerformedBy`      | RiC-O_1-1.rdf:14819-14870         | close   | "Connects an Activity to an Agent that performed or performs the Activity."            |
# |              |                                |                                    |         | Activity‚ÜíAgent. Archival context. SubProperty of hasOrHadParticipant.                 |
# | **Schema**   | `schema:performer`             | schemaorg.owl:29624-29648          | related | "A performer at the event." Event‚ÜíPerson/Organization. Identifies performer entity.   |
# | **Schema**   | `schema:actor`                 | schemaorg.owl:7033-7060            | related | "An actor (individual or a group), e.g. in TV, radio, movie, video games."            |
# |              |                                |                                    |         | Domain: media types (Movie, Episode, TVSeries, etc.) and Event.                       |
# | **Schema**   | `schema:agent`                 | schemaorg.owl:7465-7490            | broad   | "The direct performer or driver of the action." Action‚ÜíPerson/Org. Very broad.        |
# | **PROV**     | `prov:wasAssociatedWith`       | prov.ttl:1066-1080                 | broad   | "Agent that had some unspecified responsibility for the Activity." Activity‚ÜíAgent.     |
#
# No single standard property exactly captures "performed by" in a heritage
# custodian context (tradition bearers, heritage groups maintaining practices).
# crm:P14_carried_out_by and rico:isOrWasPerformedBy are close but have broader
# activity domains not specific to artistic/heritage performance.
#
# CREATED: 2026-02-07
# UPDATED: 2026-02-10
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/performed_by
name: performed_by
title: Performed By
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  schema: https://schema.org/
  prov: http://www.w3.org/ns/prov#
imports:
  - linkml:types
default_prefix: hc
slots:
  performed_by:
    slot_uri: hc:performedBy
    description: >-
      Identifies the specific individual, group, ensemble, or organization that
      carries out an action, executes a task, maintains a tradition, or presents
      an artistic work. In heritage custodian contexts, this typically links to
      heritage groups, tradition bearers, master artists, or performing ensembles
      that sustain intangible cultural practices.
