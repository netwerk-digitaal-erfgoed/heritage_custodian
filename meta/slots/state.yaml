# ==============================================================================
# LinkML Slot Definition: state
# ==============================================================================
# Express, declare, or specify a fact, opinion, or condition
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property       | File/Line              | Mapping | Notes                                                    |
# |---------------|----------------|------------------------|---------|----------------------------------------------------------|
# | **Schema.org** | `schema:value` | schemaorg.owl:39461-39494 | related | Value of QuantitativeValue/PropertyValue; domain-specific. |
#
# No standard exact match found for the general concept of "stating a fact or condition."
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/state
name: state
title: State
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  state:
    slot_uri: hc:state
    description: >-
      To express, declare, or specify a fact, opinion, or condition definitely or
      clearly in speech or writing.
    alt_descriptions:
      nl: >-
        Het uitdrukken, verklaren of specificeren van een feit, mening of toestand op
        een duidelijke en ondubbelzinnige wijze in spraak of geschrift.
      de: >-
        Eine Tatsache, Meinung oder einen Zustand bestimmt oder klar in Sprache oder
        Schrift ausdruecken, erklaeren oder angeben.
      fr: >-
        Exprimer, declarer ou specifier un fait, une opinion ou une condition de maniere
        definitive ou claire, a l'oral ou par ecrit.
      ar: >-
        التعبير عن حقيقة أو رأي أو حالة أو الإعلان عنها أو تحديدها بشكل واضح ومحدد
        في الكلام أو الكتابة.
      id: >-
        Mengungkapkan, menyatakan, atau menentukan fakta, pendapat, atau kondisi secara
        pasti atau jelas dalam ucapan atau tulisan.
      zh: >-
        在言语或书面中明确或清楚地表达、声明或指定事实、意见或状况。
      es: >-
        Expresar, declarar o especificar un hecho, opinion o condicion de manera
        definitiva o clara en el habla o la escritura.
    structured_aliases:
      - literal_form: Verklaring
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Aussage
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Declaration
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: Bayan
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Pernyataan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: Shengming
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Declaracion
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    comments:
      - "Original range was considered as Quantity or uriorcurie; currently set to string."
    annotations:
      custodian_types: '["*"]'
    related_mappings:
      - schema:value  # schemaorg.owl:39461-39494 - "The value of a QuantitativeValue or property value node." Domain: MonetaryAmount|PropertyValue|QuantitativeValue
    aliases:
      - state_or_stated
      - states_or_stated
