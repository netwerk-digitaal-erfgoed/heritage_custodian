# ==============================================================================
# LinkML Slot Definition: canonized_as
# ==============================================================================
# Formal recognition and inclusion in an authoritative canon of heritage assets.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                       | Mapping | Notes                              |
# |---------------|-----------------------|---------------------------------|---------|------------------------------------|
# | **CIDOC-CRM** | `crm:P71i_is_listed_in` | CIDOC_CRM_v7.1.3.rdf:2826-2837 | close | "is listed in" an Authority Document (E32) — authority docs, not canons broadly |
# | **SKOS**      | `skos:inScheme`       | skos.rdf:75-86                  | related | "Relates a resource to a concept scheme in which it is included." (concept schemes, not cultural canons) |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-06 - Rewrote header, alt_descriptions, structured_aliases; added crm:P71i_is_listed_in as close, skos:inScheme as related
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/canonized_as
name: canonized_as
title: Canonized As

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: https://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  canonized_as:
    slot_uri: hc:canonizedAs
    description: >-
      To be formally recognized and included in an authoritative list, body of works, or collection of culturally significant events, documents, or heritage assets (a canon).
    alt_descriptions:
      nl: >-
        Formeel erkend en opgenomen zijn in een gezaghebbende lijst, een geheel van werken, of een verzameling van cultureel significante gebeurtenissen, documenten of erfgoedobjecten (een canon).
      de: >-
        Formell anerkannt und aufgenommen sein in eine maßgebliche Liste, ein Werkverzeichnis oder eine Sammlung kulturell bedeutsamer Ereignisse, Dokumente oder Kulturgüter (einen Kanon).
      fr: >-
        Être formellement reconnu et inclus dans une liste faisant autorité, un corpus d'œuvres ou une collection d'événements, de documents ou de biens patrimoniaux culturellement significatifs (un canon).
      ar: >-
        أن يكون معترفًا به رسميًا ومدرجًا في قائمة موثوقة أو مجموعة أعمال أو مجموعة من الأحداث أو الوثائق أو الأصول التراثية ذات الأهمية الثقافية (قانون أو كانون).
      id: >-
        Diakui secara resmi dan dimasukkan dalam daftar otoritatif, kumpulan karya, atau koleksi peristiwa, dokumen, atau aset warisan budaya yang signifikan secara kultural (sebuah kanon).
      zh: >-
        被正式认可并纳入权威名录、作品集或具有文化意义的事件、文献或遗产资产的集合（经典）。
      es: >-
        Ser formalmente reconocido e incluido en una lista autorizada, un cuerpo de obras o una colección de eventos, documentos o activos patrimoniales culturalmente significativos (un canon).
    structured_aliases:
      - literal_form: gecanoniseerd als
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: kanonisiert als
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: canonisé en tant que
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مُقنَّن بوصفه
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: dikanonisasi sebagai
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 被列入经典为
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: canonizado como
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_canonical_form
    close_mappings:
      - crm:P71i_is_listed_in  # CIDOC_CRM_v7.1.3.rdf:2826-2837 - "is listed in" an Authority Document (authority docs, not canons broadly)
    related_mappings:
      - skos:inScheme  # skos.rdf:75-86 - "Relates a resource to a concept scheme in which it is included." (concept schemes, not cultural canons)
    annotations:
      custodian_types: '["*"]'
