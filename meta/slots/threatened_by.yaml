# ==============================================================================
# LinkML Slot Definition: threatened_by
# ==============================================================================
# Indicates what places the entity at risk, endangers, or potentially harms it.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **Custom**    | `hc:threatenedBy`     | N/A                        | -       | No direct standard equivalent      |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/threatened_by
name: threatened_by
title: Threatened By

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  threatened_by:
    slot_uri: hc:threatenedBy
    description: >-
      To be placed at risk, endangered, or potentially harmed by a specific
      external force, agent, condition, or event.
    alt_descriptions:
      nl: >-
        In gevaar gebracht, bedreigd of potentieel geschaad door een specifieke
        externe kracht, agent, conditie of gebeurtenis.
      de: >-
        Durch eine bestimmte externe Kraft, einen Akteur, eine Bedingung oder
        ein Ereignis gefährdet, bedroht oder potenziell geschädigt zu werden.
      fr: >-
        Être mis en danger, menacé ou potentiellement lésé par une force
        externe, un agent, une condition ou un événement spécifique.
      ar: >-
        أن يكون معرضًا للخطر أو مهددًا أو قد يتضرر من قوة خارجية أو عامل أو
        حالة أو حدث محدد.
      id: >-
        Ditempatkan dalam risiko, terancam, atau berpotensi dirugikan oleh
        kekuatan eksternal, agen, kondisi, atau peristiwa tertentu.
      zh: >-
        被特定的外部力量、代理、条件或事件置于风险中、受到威胁或可能受到伤害。
      es: >-
        Estar en riesgo, amenazado o potencialmente perjudicado por una fuerza
        externa, agente, condición o evento específico.
    structured_aliases:
      - literal_form: bedreigd door
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: bedroht durch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: menacé par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مهدد من قبل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: terancam oleh
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 受威胁于
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: amenazado por
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - is_or_was_threatened_by
    annotations:
      custodian_types: '["*"]'
