# ==============================================================================
# LinkML Slot Definition: has_liability
# ==============================================================================
# Legal responsibility, duty, obligation, or financial debt of an entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property        | File/Line                  | Mapping  | Notes                                                  |
# |---------------|-----------------|----------------------------|----------|--------------------------------------------------------|
