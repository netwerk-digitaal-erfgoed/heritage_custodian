# ==============================================================================
# LinkML Slot Definition: tax_deductible
# ==============================================================================
# Boolean indicator of whether something is eligible for tax deduction.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **Custom**    | `hc:taxDeductible`    | N/A                        | -       | No direct standard equivalent      |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/tax_deductible
name: tax_deductible
title: Tax Deductible

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  tax_deductible:
    slot_uri: hc:taxDeductible
    description: >-
      To be eligible for subtraction from gross income or revenue when
      calculating the amount of tax to be paid, typically according to specific
      legal or fiscal regulations.
    alt_descriptions:
      nl: >-
        In aanmerking komen voor aftrek van het bruto-inkomen of de omzet bij
        het berekenen van de te betalen belasting, doorgaans volgens specifieke
        wettelijke of fiscale regelgeving.
      de: >-
        Berechtigt zu sein, vom Bruttoeinkommen oder -umsatz bei der Berechnung
        der zu zahlenden Steuer abgezogen zu werden, typischerweise gemäß
        spezifischer gesetzlicher oder steuerlicher Vorschriften.
      fr: >-
        Être éligible à la déduction du revenu brut ou du chiffre d'affaires
        lors du calcul du montant de l'impôt à payer, généralement selon des
        réglementations légales ou fiscales spécifiques.
      ar: >-
        أن يكون مؤهلاً للخصم من الدخل الإجمالي أو الإيرادات عند حساب مبلغ
        الضريبة المستحقة، عادةً وفقًا للوائح قانونية أو مالية محددة.
      id: >-
        Memenuhi syarat untuk pengurangan dari pendapatan kotor atau pendapatan
        saat menghitung jumlah pajak yang harus dibayar, biasanya sesuai dengan
        peraturan hukum atau fiskal tertentu.
      zh: >-
        在计算应缴税款时有资格从总收入或收入中扣除，通常根据特定的法律或财政法规。
      es: >-
        Ser elegible para deducción del ingreso bruto o ingresos al calcular
        el monto del impuesto a pagar, típicamente según regulaciones legales
        o fiscales específicas.
    structured_aliases:
      - literal_form: fiscaal aftrekbaar
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: steuerlich absetzbar
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: déductible d'impôt
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: قابل للخصم الضريبي
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: dapat dikurangkan pajak
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 可抵税
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: deducible de impuestos
        predicate: EXACT_SYNONYM
        in_language: es
    range: boolean
    aliases:
      - is_or_was_tax_deductible
    annotations:
      custodian_types: '["*"]'
