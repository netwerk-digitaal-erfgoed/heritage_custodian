id: https://nde.nl/ontology/hc/slot/has_section
name: has_section
title: Has Section
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_section:
    slot_uri: hc:hasSection
    description: >-
      To specify a distinct part, division, or subdivision of a larger entity, such as
      a document, website, organization, or physical structure.
    alt_descriptions:
      nl: >-
        Om een afzonderlijk deel, afdeling of onderverdeling van een grotere entiteit aan
        te geven, zoals een document, website, organisatie of fysieke structuur.
      de: >-
        Um einen eigenständigen Teil, eine Abteilung oder Unterabteilung einer größeren
        Entität anzugeben, wie eines Dokuments, einer Website, Organisation oder physischen
        Struktur.
      fr: >-
        Pour spécifier une partie distincte, une division ou une subdivision d'une entité
        plus grande, telle qu'un document, un site web, une organisation ou une structure
        physique.
      ar: >-
        لتحديد جزء مميز أو قسم أو تقسيم فرعي لكيان أكبر، مثل مستند أو موقع ويب أو منظمة
        أو هيكل مادي.
      id: >-
        Untuk menentukan bagian, divisi, atau subdivisi yang berbeda dari entitas yang lebih
        besar, seperti dokumen, situs web, organisasi, atau struktur fisik.
      zh: >-
        用于指定较大实体的独立部分、分区或细分，例如文档、网站、组织或物理结构。
      es: >-
        Para especificar una parte distinta, división o subdivisión de una entidad mayor,
        como un documento, sitio web, organización o estructura física.
    structured_aliases:
      - literal_form: Sectie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Abschnitt
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Section
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: قسم
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Bagian
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 部分
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Sección
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_section
      - has_or_had_sub_collection
      - has_sub_collection
      - page_section
      - personnel_budget
      - section_id
    annotations:
      custodian_types: '["*"]'
