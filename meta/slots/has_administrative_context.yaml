id: https://nde.nl/ontology/hc/slot/has_administrative_context
name: has_administrative_context
title: Has Administrative Context

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/

default_prefix: hc

imports:
  - linkml:types

slots:
  has_administrative_context:
    slot_uri: hc:hasAdministrativeContext
    description: >-
      The specific organizational framework, jurisdiction, or situational setting in which 
      administrative actions, decisions, or record-keeping take place.
    alt_descriptions:
      nl: >-
        Het specifieke organisatorische kader, rechtsgebied of situationele omgeving 
        waarin administratieve handelingen, beslissingen of dossiervorming plaatsvinden.
      de: >-
        Der spezifische organisatorische Rahmen, die Zuständigkeit oder der situative 
        Kontext, in dem Verwaltungshandlungen, Entscheidungen oder Aktenführung stattfinden.
      fr: >-
        Le cadre organisationnel spécifique, la juridiction ou le contexte situationnel 
        dans lequel se déroulent les actions administratives, les décisions ou la tenue de dossiers.
      ar: >-
        الإطار التنظيمي المحدد أو الاختصاص القضائي أو البيئة الظرفية التي تتم فيها 
        الإجراءات الإدارية أو القرارات أو حفظ السجلات.
      id: >-
        Kerangka organisasi tertentu, yurisdiksi, atau pengaturan situasional di mana 
        tindakan administratif, keputusan, atau pencatatan berlangsung.
      zh: >-
        行政行为、决策或记录保存发生的特定组织框架、管辖权或情境环境。
      es: >-
        El marco organizativo específico, jurisdicción o entorno situacional en el que 
        tienen lugar las acciones administrativas, decisiones o mantenimiento de registros.
    structured_aliases:
      - literal_form: administratieve context
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Verwaltungskontext
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: contexte administratif
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: السياق الإداري
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: konteks administratif
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 行政背景
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: contexto administrativo
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - is_or_was_administrative_context
    annotations:
      source_section: "**Administrative Context**:"
      custodian_types: '["*"]'
    comments:
      - 'MIGRATED from **Administrative Context**: sections in documentation.'
      - |
        **USAGE**: Describes the administrative environment including governance 
        structure, regulatory framework, and institutional setting.
