# ==============================================================================
# LinkML Slot Definition: has_conversion_rate
# ==============================================================================
# A numeric conversion rate (e.g. digitization conversion rate, currency
# exchange rate, or similar ratio).
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | (none)        | —                     | —                          | —       | No standard ontology property found for general conversion rate |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-06 - Added header, multilingual, cleaned description; rewrote alt_descriptions for faithful translation
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_conversion_rate
name: has_conversion_rate
title: Has Conversion Rate

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  has_conversion_rate:
    slot_uri: hc:hasConversionRate
    description: >-
      To specify the factor or ratio at which one unit of account, currency, or measure is exchanged for or converted into another.
    alt_descriptions:
      nl: >-
        De factor of verhouding specificeren waartegen één rekeneenheid, valuta of maat wordt ingewisseld voor of omgerekend naar een andere.
      de: >-
        Den Faktor oder das Verhältnis angeben, zu dem eine Rechnungseinheit, Währung oder Maßeinheit gegen eine andere eingetauscht oder umgerechnet wird.
      fr: >-
        Spécifier le facteur ou le ratio auquel une unité de compte, une devise ou une mesure est échangée contre ou convertie en une autre.
      ar: >-
        تحديد العامل أو النسبة التي يتم بها تبادل أو تحويل وحدة حساب أو عملة أو مقياس إلى وحدة أخرى.
      id: >-
        Menentukan faktor atau rasio di mana satu unit akun, mata uang, atau ukuran ditukarkan atau dikonversi ke unit lainnya.
      zh: >-
        指定一个记账单位、货币或计量单位兑换或转换为另一个的因子或比率。
      es: >-
        Especificar el factor o proporción a la que una unidad de cuenta, moneda o medida se intercambia o convierte en otra.
    structured_aliases:
      - literal_form: heeft conversiepercentage
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Konversionsrate
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a un taux de conversion
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه معدل تحويل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki tingkat konversi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有转换率
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene tasa de conversión
        predicate: EXACT_SYNONYM
        in_language: es
    range: float
    aliases:
      - has_or_had_conversion_rate
    comments:
      - |
        MIGRATED 2026-02-03 from has_or_had_conversion_rate for conciseness.
    annotations:
      custodian_types: '["*"]'
