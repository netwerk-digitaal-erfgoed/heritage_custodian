id: https://nde.nl/ontology/hc/slot/has_qualifier
name: has_qualifier
title: Has Qualifier
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_qualifier:
    slot_uri: hc:hasQualifier
    description: >-
      To specify a modifying element, word, or phrase used to limit, attribute, or provide specific context to the meaning or scope of a value or entity.
    alt_descriptions:
      nl: >-
        Het specificeren van een modificerend element, woord of zinsdeel dat wordt
        gebruikt om de betekenis of reikwijdte van een waarde of entiteit te beperken,
        toe te schrijven of van specifieke context te voorzien.
      de: >-
        Zur Angabe eines modifizierenden Elements, Wortes oder Ausdrucks, der verwendet
        wird, um die Bedeutung oder den Umfang eines Wertes oder einer Entität
        einzuschränken, zuzuordnen oder mit spezifischem Kontext zu versehen.
      fr: >-
        Spécifier un élément modificateur, un mot ou une expression utilisé pour
        limiter, attribuer ou fournir un contexte spécifique au sens ou à la portée
        d'une valeur ou d'une entité.
      ar: >-
        لتحديد عنصر معدِّل أو كلمة أو عبارة تُستخدم لتقييد أو إسناد أو توفير سياق
        محدد لمعنى أو نطاق قيمة أو كيان.
      id: >-
        Untuk menentukan elemen pengubah, kata, atau frasa yang digunakan untuk
        membatasi, mengatribusikan, atau memberikan konteks spesifik pada makna atau
        cakupan suatu nilai atau entitas.
      zh: >-
        指定用于限定、归属或为值或实体的含义或范围提供特定上下文的修饰元素、词语或短语。
      es: >-
        Especificar un elemento modificador, palabra o frase utilizada para limitar,
        atribuir o proporcionar contexto específico al significado o alcance de un
        valor o entidad.
    structured_aliases:
      - literal_form: Kwalificatie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Qualifikator
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Qualificateur
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مؤهل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Kualifikasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 限定词
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Calificador
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_qualifier
    comments:
      - "MIGRATED 2026-02-03 from has_or_had_qualifier for conciseness."
      - "NOTE: `schema:qualifier` does not exist as a Schema.org property. The previous exact_mapping was erroneous and has been removed."
    annotations:
      custodian_types: '["*"]'
