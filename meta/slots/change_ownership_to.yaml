# ==============================================================================
# LinkML Slot Definition: change_ownership_to
# ==============================================================================
# To transfer the legal rights, possession, or control of an entity to a
# designated new owner or responsible agent.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                      | File/Line             | Mapping | Notes                              |
# |---------------|-------------------------------|-----------------------|---------|------------------------------------|
# | **CIDOC-CRM** | `crm:P22_transferred_title_to`| CIDOC_CRM_v7.1.3.rdf  | exact   | Recipient of legal title transfer  |
# | **PROV-O**    | `prov:wasAttributedTo`        | prov.ttl:1082-1087    | close   | Attribution to agent               |
# | **RiC-O**     | `rico:hasOrHadHolder`         | RiC-O_1-1.rdf         | related | Current/previous holder of record  |
#
# HIERARCHY: crm:P22_transferred_title_to has no rdfs:subPropertyOf declaration
#
# CREATED: 2026-01-16
# UPDATED: 2026-02-03 - Added header documentation
# UPDATED: 2026-02-03 - Fixed corrupted description field, moved notes to comments
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/change_ownership_to
name: change_ownership_to
title: Change Ownership To
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#
  rico: https://www.ica.org/standards/RiC/ontology#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - linkml:types
slots:
  change_ownership_to:
    slot_uri: crm:P22_transferred_title_to
    description: >-
      To transfer the legal rights, possession, or control of an entity to a
      designated new owner or responsible agent.
    alt_descriptions:
      nl: >-
        Om de wettelijke rechten, bezit of controle van een entiteit over te
        dragen aan een aangewezen nieuwe eigenaar of verantwoordelijke agent.
      de: >-
        Um die rechtlichen Ansprüche, den Besitz oder die Kontrolle einer
        Entität an einen bestimmten neuen Eigentümer oder verantwortlichen
        Akteur zu übertragen.
      fr: >-
        Pour transférer les droits légaux, la possession ou le contrôle d'une
        entité à un nouveau propriétaire désigné ou un agent responsable.
      ar: >-
        لنقل الحقوق القانونية أو الحيازة أو السيطرة على كيان إلى مالك جديد
        معين أو وكيل مسؤول.
      id: >-
        Untuk mengalihkan hak hukum, kepemilikan, atau kontrol atas suatu
        entitas kepada pemilik baru yang ditunjuk atau agen yang bertanggung
        jawab.
      zh: >-
        将某实体的法定权利、所有权或控制权转让给指定的新所有者或负责的代理人。
      es: >-
        Para transferir los derechos legales, posesión o control de una
        entidad a un nuevo propietario designado o agente responsable.
    structured_aliases:
      - literal_form: eigendomsoverdracht aan
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_change_ownership_to
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Eigentumsübertragung an
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: transfert de propriété à
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: نقل الملكية إلى
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: pengalihan kepemilikan kepada
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 所有权转让至
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: transferencia de propiedad a
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    required: false
    multivalued: false
    exact_mappings:
    close_mappings:
      - prov:wasAttributedTo
    related_mappings:
      - rico:hasOrHadHolder
    aliases:
      - changes_or_changed_ownership_to
      - is_or_was_change_ownership_to
    annotations:
      replaces_slots: to_owner
      migration_date: '2026-01-16'
      migration_rule: Rule 56 (semantic consistency over simplicity)
      custodian_types: '["*"]'
    examples:
      - value: https://nde.nl/ontology/hc/owner/rijksmuseum
        description: Ownership transferred to Rijksmuseum
      - value: https://nde.nl/ontology/hc/owner/private-collector-001
        description: Ownership transferred to private collector
    comments:
      - MIGRATED from to_owner per slot_fixes.yaml (Rule 56, 2026-01-16).
      - |
        TEMPORAL SEMANTICS: This relationship may be historical - ownership
        may have changed multiple times.
      - |
        SEMANTIC DISTINCTION: This slot is for OWNERSHIP TRANSFER (legal title),
        NOT physical movement. For physical movement, use `is_or_was_transferred_to`
        with `crm:P26_moved_to`.
        | Slot | Ontology | Semantics |
        |------|----------|-----------|
        | change_ownership_to | crm:P22 | Legal title transfer |
        | is_or_was_transferred_to | crm:P26 | Physical location change |
      - |
        USAGE: Typical in ProvenanceEvent for documenting chain of custody:
        - Acquisitions (purchase, gift, bequest)
        - Deaccessioning (sale, transfer)
        - Loans (temporary custody without ownership change)
