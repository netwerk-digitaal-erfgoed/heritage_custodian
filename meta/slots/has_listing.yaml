id: https://nde.nl/ontology/hc/slot/has_listing
name: has_listing
title: Has Listing
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
