id: https://nde.nl/ontology/hc/slot/is_token_of
name: is_token_of
title: Is Token Of
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
