# ==============================================================================
# LinkML Slot Definition: assessed_as
# ==============================================================================
# The result or classification of an evaluation or assessment.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line               | Mapping | Notes                              |
# |---------------|-----------------------|-------------------------|---------|------------------------------------|
# | **Schema.org**| `schema:assesses`     | schemaorg.owl:8873-8896 | related | "Intended to assess the competency |
# |               |                       |                         |         | or learning outcome" - educational |
# | **Schema.org**| `schema:AssessAction` | schemaorg.owl:331-335   | related | Class for assessment actions       |
#
# schema:assesses is specific to educational competency assessment.
# This slot is more general for any evaluation result.
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added ontology mappings, improved multilingual
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/assessed_as
name: assessed_as
title: Assessed As
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - linkml:types
slots:
  assessed_as:
    slot_uri: hc:assessedAs
    description: >-
      The result or classification assigned to an entity following an
      evaluation, examination, or analysis.
    alt_descriptions:
      nl: >-
        Het resultaat of de classificatie die aan een entiteit is toegekend
        na een evaluatie, onderzoek of analyse.
      de: >-
        Das Ergebnis oder die Klassifizierung, die einer Entität nach einer
        Bewertung, Untersuchung oder Analyse zugewiesen wurde.
      fr: >-
        Le résultat ou la classification attribué à une entité suite à une
        évaluation, un examen ou une analyse.
      ar: >-
        النتيجة أو التصنيف المُسند إلى كيان بعد تقييم أو فحص أو تحليل.
      id: >-
        Hasil atau klasifikasi yang diberikan kepada entitas setelah evaluasi,
        pemeriksaan, atau analisis.
      zh: >-
        在评估、检查或分析后分配给实体的结果或分类。
      es: >-
        El resultado o clasificación asignado a una entidad tras una
        evaluación, examen o análisis.
    structured_aliases:
      - literal_form: beoordeeld als
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: bewertet als
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: évalué comme
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مُقيَّم بـ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: dinilai sebagai
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 被评估为
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: evaluado como
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    related_mappings:
      - schema:assesses  # schemaorg.owl:8873-8896 - educational competency specific
      - schema:AssessAction  # schemaorg.owl:331-335 - class, not property
    aliases:
      - has_or_had_assessment
      - is_or_was_assessed_as
      - has_assessment
    comments:
      - |
        **USAGE**: Records the outcome of assessments such as condition reports,
        conservation evaluations, accreditation reviews, or quality audits.
      - |
        **HERITAGE CONTEXT**: Common assessments include preservation status,
        collection quality, accessibility compliance, and institutional ratings.
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Applicable to all heritage custodian types.
      custodian_types_primary: M
      specificity_score: 0.5
      specificity_rationale: General assessment result slot.
