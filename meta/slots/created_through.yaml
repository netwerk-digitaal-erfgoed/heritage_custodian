# ==============================================================================
# LinkML Slot Definition: created_through
# ==============================================================================
# Event or activity through which an entity was created.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property               | File/Line            | Mapping | Notes                              |
# |---------------|------------------------|----------------------|---------|------------------------------------|
# | **PROV-O**    | `prov:wasGeneratedBy`  | prov.ttl:1132-1145   | exact   | Entity generated by Activity       |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, multilingual, updated slot_uri to standard
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/created_through
name: created_through
title: Created Through

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  created_through:
    slot_uri: prov:wasGeneratedBy
    description: >-
      The event, activity, or process through which the entity was brought
      into existence or generated.
    alt_descriptions:
      nl: >-
        De gebeurtenis, activiteit of het proces waardoor de entiteit tot
        stand is gekomen of is gegenereerd.
      de: >-
        Das Ereignis, die Aktivität oder der Prozess, durch den die Entität
        ins Leben gerufen oder generiert wurde.
      fr: >-
        L'événement, l'activité ou le processus par lequel l'entité a été
        créée ou générée.
      ar: >-
        الحدث أو النشاط أو العملية التي من خلالها تم إنشاء الكيان أو توليده.
      id: >-
        Peristiwa, aktivitas, atau proses yang melaluinya entitas diciptakan
        atau dihasilkan.
      zh: >-
        通过其创建或生成实体的事件、活动或过程。
      es: >-
        El evento, actividad o proceso a través del cual la entidad fue
        creada o generada.
    structured_aliases:
      - literal_form: gecreëerd via
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: erstellt durch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: créé par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: أُنشئ من خلال
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: dibuat melalui
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 通过...创建
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: creado a través de
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    exact_mappings:
    aliases:
      - is_or_was_created_through
    annotations:
      custodian_types: '["*"]'
    comments:
      - |
        **ONTOLOGY ALIGNMENT**: prov:wasGeneratedBy from PROV-O links an Entity
        to the Activity that generated it. This is an exact semantic match for
        "created through" meaning the creation event/activity.
