# ==============================================================================
# LinkML Slot Definition: has_thumbnail
# ==============================================================================
# Reduced-size image or visual preview representing a larger file.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property              | File/Line                | Mapping | Notes                                                                          |
# |----------------|-----------------------|--------------------------|---------|--------------------------------------------------------------------------------|
# | **FOAF**       | `foaf:thumbnail`      | foaf.ttl:564-571         | exact   | "A derived thumbnail image." Domain: foaf:Image, Range: foaf:Image — restricted to Image class. |
# | **Schema.org** | `schema:thumbnailUrl` | schemaorg.owl:37782-37800 | close  | "A thumbnail image relevant to the Thing." Domain: CreativeWork only.          |
#
# REMOVED: dcat:thumbnail — does not exist in DCAT v3.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_thumbnail
name: has_thumbnail
title: Has Thumbnail
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
default_prefix: hc
imports:
- linkml:types
slots:
  has_thumbnail:
    slot_uri: hc:hasThumbnail
    description: >-
      To specify a reduced-size image or visual preview that serves as a
      placeholder or representation for a larger file, video, or document.
    alt_descriptions:
      nl: >-
        Om een verkleinde afbeelding of visueel voorbeeld aan te geven dat
        dient als plaatshouder of representatie voor een groter bestand,
        video of document.
      de: >-
        Zur Angabe eines verkleinerten Bildes oder einer visuellen Vorschau,
        die als Platzhalter oder Darstellung für eine größere Datei, ein Video
        oder ein Dokument dient.
      fr: >-
        Pour spécifier une image de taille réduite ou un aperçu visuel servant
        de substitut ou de représentation pour un fichier, une vidéo ou un
        document plus volumineux.
      ar: >-
        لتحديد صورة مصغرة أو معاينة بصرية تعمل كعنصر نائب أو تمثيل لملف
        أو فيديو أو مستند أكبر.
      id: >-
        Untuk menentukan gambar berukuran kecil atau pratinjau visual yang
        berfungsi sebagai pengganti atau representasi untuk file, video, atau
        dokumen yang lebih besar.
      zh: >-
        用于指定作为较大文件、视频或文档的占位符或表示的缩小尺寸图像或视觉预览。
      es: >-
        Para especificar una imagen de tamaño reducido o vista previa visual
        que sirve como marcador de posición o representación de un archivo,
        video o documento más grande.
    structured_aliases:
      - literal_form: Miniatuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Vorschaubild
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Vignette
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: صورة مصغرة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Gambar Mini
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 缩略图
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Miniatura
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    required: false
    multivalued: false
    aliases:
      - has_or_had_thumbnail
    exact_mappings:
      - foaf:thumbnail  # foaf.ttl:564-571 — "A derived thumbnail image." Domain/Range: foaf:Image.
    close_mappings:
      - schema:thumbnailUrl  # schemaorg.owl:37782-37800 — "A thumbnail image relevant to the Thing." Domain: CreativeWork.
    comments:
      - "MIGRATED 2026-02-03: Renamed from has_or_had_thumbnail for conciseness."
    annotations:
      custodian_types: '["*"]'
    examples:
      - value: https://nde.nl/ontology/hc/thumbnail/rijksmuseum-collection-001
        description: Thumbnail for Rijksmuseum collection item
