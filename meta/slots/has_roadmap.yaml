id: https://nde.nl/ontology/hc/slot/has_roadmap
name: has_roadmap
title: Has Roadmap
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_roadmap:
    slot_uri: hc:hasRoadmap
    description: >-
      To specify a strategic plan or timeline that outlines the goals, steps, and milestones for the development or execution of a project, product, or strategy.
    alt_descriptions:
      nl: >-
        Om een strategisch plan of tijdlijn te specificeren die de doelen, stappen en mijlpalen beschrijft voor de ontwikkeling of uitvoering van een project, product of strategie.
      de: >-
        Um einen strategischen Plan oder Zeitplan anzugeben, der die Ziele, Schritte und Meilensteine für die Entwicklung oder Durchführung eines Projekts, Produkts oder einer Strategie umreisst.
      fr: >-
        Pour spécifier un plan stratégique ou un calendrier décrivant les objectifs, les étapes et les jalons pour le développement ou l'exécution d'un projet, produit ou stratégie.
      ar: >-
        لتحديد خطة استراتيجية أو جدول زمني يحدد الأهداف والخطوات والمعالم الرئيسية لتطوير أو تنفيذ مشروع أو منتج أو استراتيجية.
      id: >-
        Untuk menentukan rencana strategis atau garis waktu yang menguraikan tujuan, langkah, dan tonggak pencapaian untuk pengembangan atau pelaksanaan suatu proyek, produk, atau strategi.
      zh: >-
        用于指定一个战略计划或时间线，概述项目、产品或战略的开发或执行的目标、步骤和里程碑。
      es: >-
        Para especificar un plan estratégico o cronograma que describe los objetivos, pasos e hitos para el desarrollo o ejecución de un proyecto, producto o estrategia.
    structured_aliases:
      - literal_form: Routekaart
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Fahrplan
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Feuille de route
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: خارطة طريق
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Peta jalan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 路线图
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Hoja de ruta
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_roadmap
      - is_permanent
      - is_temporary
      - planned_closure_date
      - planned_end
      - planned_start
      - policy_review_date
      - results_expected_date
      - retention_schedule
      - retention_tracking
      - review_date
    annotations:
      custodian_types: '["*"]'
