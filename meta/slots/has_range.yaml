# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_range
name: has_range
title: Has Range
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_range:
    slot_uri: hc:hasRange
    description: >-
      To specify the extent, scope, interval, or set of allowable values associated with an entity, property, or function.
    alt_descriptions:
      nl: >-
        Om de omvang, reikwijdte, het interval of de verzameling van toegestane waarden te specificeren die zijn geassocieerd met een entiteit, eigenschap of functie.
      de: >-
        Um den Umfang, Bereich, das Intervall oder die Menge zulässiger Werte anzugeben, die mit einer Entität, Eigenschaft oder Funktion verbunden sind.
      fr: >-
        Pour spécifier l'étendue, la portée, l'intervalle ou l'ensemble de valeurs admissibles associées à une entité, une propriété ou une fonction.
      ar: >-
        لتحديد المدى أو النطاق أو الفاصل الزمني أو مجموعة القيم المسموح بها المرتبطة بكيان أو خاصية أو وظيفة.
      id: >-
        Untuk menentukan jangkauan, cakupan, interval, atau kumpulan nilai yang diperbolehkan yang terkait dengan suatu entitas, properti, atau fungsi.
      zh: >-
        用于指定与实体、属性或函数相关联的范围、范畴、区间或允许值集合。
      es: >-
        Para especificar la extensión, el alcance, el intervalo o el conjunto de valores admisibles asociados con una entidad, propiedad o función.
    structured_aliases:
      - literal_form: Bereik
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Bereich
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Plage
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: نطاق
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Rentang
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 范围
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Rango
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_range
    annotations:
      custodian_types: '["*"]'
