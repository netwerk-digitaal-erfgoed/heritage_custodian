# ==============================================================================
# LinkML Slot Definition: has_range
# ==============================================================================
# The extent, scope, interval, or set of allowable values for an entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# No standard ontology match found. Meta-level data structure concept for
# expressing numeric or temporal ranges.
#
