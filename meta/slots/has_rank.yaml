id: https://nde.nl/ontology/hc/slot/has_rank
name: has_rank
title: Has Rank
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_rank:
    slot_uri: hc:hasRank
    description: >-
      To specify the relative position, level, or standing of an entity within a hierarchy, ordering system, or classification scheme
    alt_descriptions:
      nl: >-
        Om de relatieve positie, het niveau of de rang van een entiteit binnen een hiërarchie, ordeningssysteem of classificatieschema te specificeren.
      de: >-
        Um die relative Position, Ebene oder Stellung einer Entität innerhalb einer Hierarchie, eines Ordnungssystems oder Klassifikationsschemas anzugeben.
      fr: >-
        Pour spécifier la position relative, le niveau ou le rang d'une entité au sein d'une hiérarchie, d'un système d'ordonnancement ou d'un schéma de classification.
      ar: >-
        لتحديد الموضع النسبي أو المستوى أو المرتبة لكيان ضمن تسلسل هرمي أو نظام ترتيب أو مخطط تصنيف.
      id: >-
        Untuk menentukan posisi relatif, tingkat, atau kedudukan suatu entitas dalam hierarki, sistem pengurutan, atau skema klasifikasi.
      zh: >-
        用于指定实体在层级结构、排序系统或分类方案中的相对位置、级别或地位。
      es: >-
        Para especificar la posición relativa, el nivel o la categoría de una entidad dentro de una jerarquía, sistema de ordenamiento o esquema de clasificación.
    structured_aliases:
      - literal_form: Rang
        predicate: EXACT_SYNONYM
        in_language: nl
