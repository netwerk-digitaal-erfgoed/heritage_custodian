      - literal_form: رتبة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Peringkat
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 排名
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Rango
        predicate: EXACT_SYNONYM
        in_language: es
    range: integer
    aliases:
      - has_or_had_rank
      - michelin_star
    annotations:
      custodian_types: '["*"]'
