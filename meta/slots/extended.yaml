# ==============================================================================
# LinkML Slot Definition: extended
# ==============================================================================
# Indicates whether something was prolonged, expanded, or lengthened beyond original limits.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property        | File/Line            | Mapping | Notes                            |
# |---------------|-----------------|----------------------|---------|----------------------------------|
# | (none found)  | -               | -                    | -       | GLAM domain-specific boolean     |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/extended
name: extended
title: Extended

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  extended:
    slot_uri: hc:extended
    description: >-
      Whether something has been prolonged in duration, expanded in scope, or physically 
      lengthened beyond its original limits or scheduled conclusion.
    alt_descriptions:
      nl: >-
        Of iets is verlengd in duur, uitgebreid in omvang, of fysiek verlengd voorbij de 
        oorspronkelijke grenzen of geplande afsluiting.
      de: >-
        Ob etwas in der Dauer verlängert, im Umfang erweitert oder physisch über seine 
        ursprünglichen Grenzen oder den geplanten Abschluss hinaus verlängert wurde.
      fr: >-
        Si quelque chose a été prolongé dans la durée, élargi dans sa portée, ou 
        physiquement allongé au-delà de ses limites originales ou de sa conclusion prévue.
      ar: >-
        ما إذا كان شيء ما قد تم تمديده في المدة أو توسيعه في النطاق أو إطالته فعلياً 
        بما يتجاوز حدوده الأصلية أو نهايته المقررة.
      id: >-
        Apakah sesuatu telah diperpanjang durasinya, diperluas cakupannya, atau secara 
        fisik diperpanjang melampaui batas aslinya atau kesimpulan yang dijadwalkan.
      zh: >-
        某事物是否在持续时间上延长、在范围上扩大，或在物理上延伸超出其原始限制或预定的结束时间。
      es: >-
        Si algo ha sido prolongado en duración, ampliado en alcance, o físicamente 
        extendido más allá de sus límites originales o conclusión programada.
    structured_aliases:
      - literal_form: verlengd
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: erweitert
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: prolongé
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: ممتد
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diperpanjang
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 延长
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: extendido
        predicate: EXACT_SYNONYM
        in_language: es
    range: boolean
    aliases:
      - is_or_was_extended
    annotations:
      custodian_types: '["*"]'
    comments:
      - |
        **USAGE**: Applicable to exhibitions, projects, loans, contracts, or any entity 
        with a temporal extent that may be extended beyond its original planned duration.
      - 'RiC-O naming: isOrWas indicates potentially historical relationship'
