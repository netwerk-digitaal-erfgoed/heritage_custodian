# ==============================================================================
# LinkML Slot Definition: has_gender
# ==============================================================================
# The gender or biological sex of a person, organism, or specimen.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property          | File/Line                  | Mapping  | Notes                                                                          |
# |----------------|-------------------|----------------------------|----------|--------------------------------------------------------------------------------|
# | **Schema.org** | `schema:gender`   | schemaorg.owl:18982-19004  | slot_uri | "Gender of something, typically a Person." Person/SportsTeam→Text/GenderType.  |
# | **FOAF**       | `foaf:gender`     | foaf.ttl:262-270           | close    | "The gender of this Agent." Agent→Literal. Narrower domain (Agent only).       |
# | **CIDOC CRM**  | `crm:P2_has_type` | CIDOC_CRM_v7.1.3.rdf:1200-1214 | broad | "Allows sub-typing of CRM entities through a thesaurus." Very generic typing.  |
#
# CREATED: 2026-02-02
# UPDATED: 2026-02-12
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/has_gender
name: has_gender
title: Has Gender
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_gender:
    slot_uri: schema:gender
    description: >-
      The gender or biological sex of a person, organism, or specimen associated
      with a heritage custodian institution. In the heritage context, this applies
      to personnel records, biographical data of historical figures in collections,
      and natural history specimens where biological sex is recorded at the time
      of collection or observation. Values may include male, female, non-binary,
      hermaphrodite, unknown, or not applicable, depending on context.
    alt_descriptions:
      nl: >-
        Het geslacht of de biologische sekse van een persoon, organisme of specimen
        dat geassocieerd is met een erfgoedinstelling. Waarden kunnen mannelijk,
        vrouwelijk, non-binair, hermafrodiet, onbekend of niet van toepassing
        omvatten.
      de: >-
        Das Geschlecht oder das biologische Geschlecht einer Person, eines Organismus
        oder Exemplars, das mit einer Kulturerbe-Einrichtung verbunden ist. Werte
        können männlich, weiblich, nicht-binär, zwittrig, unbekannt oder nicht
        zutreffend umfassen.
      fr: >-
        Le genre ou le sexe biologique d'une personne, d'un organisme ou d'un
        spécimen associé à une institution patrimoniale. Les valeurs peuvent
        inclure masculin, féminin, non binaire, hermaphrodite, inconnu ou non
        applicable.
      ar: >-
        الجنس أو الجنس البيولوجي لشخص أو كائن حي أو عينة مرتبطة بمؤسسة حفظ
        التراث. يمكن أن تشمل القيم ذكر أو أنثى أو غير ثنائي أو خنثى أو غير
        معروف أو غير قابل للتطبيق.
      id: >-
        Gender atau jenis kelamin biologis seseorang, organisme, atau spesimen
        yang terkait dengan lembaga pemelihara warisan budaya. Nilai dapat mencakup
        laki-laki, perempuan, non-biner, hermafrodit, tidak diketahui, atau tidak
        berlaku.
      zh: >-
        与遗产保管机构相关的人员、生物体或标本的性别或生物性别。值可以包括男性、女性、
        非二元、雌雄同体、未知或不适用。
      es: >-
        El género o sexo biológico de una persona, organismo o espécimen asociado
        con una institución custodio del patrimonio. Los valores pueden incluir
        masculino, femenino, no binario, hermafrodita, desconocido o no aplicable.
    structured_aliases:
      - literal_form: geslacht
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Geschlecht
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: genre
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: الجنس
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: jenis kelamin
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 性别
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: género
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    close_mappings:
      - foaf:gender  # foaf.ttl:262-270 - "The gender of this Agent (typically but not necessarily 'male' or 'female')." Agent→Literal; narrower domain than schema:gender
    broad_mappings:
      - crm:P2_has_type  # CIDOC_CRM_v7.1.3.rdf:1200-1214 - "Allows sub-typing of CIDOC CRM entities through a terminological hierarchy." Very generic typing property
    aliases:
      - sex
    examples:
      - value: "Female"
        description: "Gender of a museum director in a personnel record"
      - value: "Male"
        description: "Biological sex of a bird specimen in a natural history collection"
      - value: "Unknown"
        description: "Gender not determinable for a historical figure in an archival record"
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        slot_uri is schema:gender because it is the most widely adopted property
        for expressing gender of persons and other entities. schema:gender accepts
        both text strings and GenderType enumeration values, accommodating
        non-binary and culturally specific gender identities.
      - >-
        For natural history specimens where biological sex (not social gender) is
        the primary concern, the Darwin Core property dwc:sex is the domain
        standard. dwc:sex is not cited in mappings because the Darwin Core ontology
        file is not available in data/ontology/ for verification.
      - >-
        The original matang file referenced an identifies_as companion slot for
        recording gender identity based on social or cultural identity, which may
        differ from biological sex.
