# ==============================================================================
# LinkML Slot Definition: retained
# ==============================================================================
# The required retention duration (in years) for which a record, object, or
# data set must be preserved before disposal or permanent archiving.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property              | File/Line                    | Mapping          | Notes                                                                      |
# |----------------|-----------------------|------------------------------|------------------|----------------------------------------------------------------------------|
# | **Schema.org** | `schema:validFor`     | schemaorg.owl:39314-39330    | related_mappings | "validFor" PermitвҶ’Duration. Related: validity duration of permits, not records retention.                       |
# | **DCTerms**    | `dcterms:valid`       | dcterms.rdf:2076-2101        | related_mappings | "Date Valid" date range of validity. Related: dates not duration in years.                                      |
# | **OWL-Time**   | `time:hasDuration`    | time.ttl:752-759             | related_mappings | "has duration" TemporalEntityвҶ’Duration. Related: generic temporal duration, not retention-specific.             |
# | **Schema.org** | `schema:duration`     | schemaorg.owl:15892-15905    | broad_mappings   | "duration" Event/MediaObjectвҶ’Duration. Broader: any item duration.                                             |
# | **Schema.org** | `schema:expires`      | schemaorg.owl:17832-17835    | related_mappings | "expires" CreativeWorkвҶ’Date. Related: expiration date, not retention period.                                    |
#
# CREATED: 2026-02-11
# UPDATED: 2026-02-11
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/retained
name: retained
title: Retained
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  time: http://www.w3.org/2006/time#
imports:
  - linkml:types
default_prefix: hc
slots:
  retained:
    slot_uri: hc:retained
    description: >-
      The required retention duration, in years, for which an object, record,
      or data set must be preserved before it can be destroyed, transferred,
      or permanently archived. A null value indicates permanent retention
      with no scheduled disposal.
    alt_descriptions:
      nl: >-
        De vereiste bewaartermijn, in jaren, gedurende welke een object, record
        of dataset moet worden bewaard voordat het kan worden vernietigd,
        overgedragen of permanent gearchiveerd.
      de: >-
        Die erforderliche Aufbewahrungsdauer in Jahren, fГјr die ein Objekt,
        Datensatz oder eine Akte aufbewahrt werden muss, bevor es vernichtet,
        Гјbertragen oder dauerhaft archiviert werden kann.
      fr: >-
        La durГ©e de conservation requise, en annГ©es, pendant laquelle un objet,
        un dossier ou un jeu de donnГ©es doit ГӘtre prГ©servГ© avant de pouvoir
        ГӘtre dГ©truit, transfГ©rГ© ou archivГ© de maniГЁre permanente.
      ar: >-
        Щ…ШҜШ© Ш§Щ„Ш§ШӯШӘЩҒШ§Шё Ш§Щ„Щ…Ш·Щ„ЩҲШЁШ© ШЁШ§Щ„ШіЩҶЩҲШ§ШӘ Ш§Щ„ШӘЩҠ ЩҠШ¬ШЁ Ш®Щ„Ш§Щ„ЩҮШ§ Ш§Щ„ШӯЩҒШ§Шё Ш№Щ„Щү ЩғШ§ШҰЩҶ ШЈЩҲ ШіШ¬Щ„
        ШЈЩҲ Щ…Ш¬Щ…ЩҲШ№Ш© ШЁЩҠШ§ЩҶШ§ШӘ ЩӮШЁЩ„ ШЈЩҶ ЩҠЩ…ЩғЩҶ ШҘШӘЩ„Ш§ЩҒЩҮШ§ ШЈЩҲ ЩҶЩӮЩ„ЩҮШ§ ШЈЩҲ ШЈШұШҙЩҒШӘЩҮШ§ ШЁШҙЩғЩ„ ШҜШ§ШҰЩ….
      id: >-
        Durasi retensi yang diperlukan, dalam tahun, selama objek, rekod, atau
        kumpulan data harus disimpan sebelum dapat dimusnahkan, ditransfer,
        atau diarsipkan secara permanen.
      zh: >-
        д»Ҙе№ҙдёәеҚ•дҪҚзҡ„иҰҒжұӮдҝқз•ҷжңҹйҷҗпјҢеңЁжӯӨжңҹй—ҙеҜ№иұЎгҖҒи®°еҪ•жҲ–ж•°жҚ®йӣҶеҝ…йЎ»иў«дҝқеӯҳпјҢ
        д№ӢеҗҺжүҚиғҪй”ҖжҜҒгҖҒиҪ¬з§»жҲ–ж°ёд№…еҪ’жЎЈгҖӮ
      es: >-
        La duraciГіn de retenciГіn requerida, en aГұos, durante la cual un objeto,
        registro o conjunto de datos debe preservarse antes de poder ser
        destruido, transferido o archivado permanentemente.
    structured_aliases:
      - literal_form: bewaartermijn
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Aufbewahrungsdauer
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: durГ©e de conservation
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: Щ…ШҜШ© Ш§Щ„Ш§ШӯШӘЩҒШ§Шё
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: masa retensi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: дҝқз•ҷжңҹйҷҗ
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: perГӯodo de retenciГіn
        predicate: EXACT_SYNONYM
        in_language: es
    range: integer
    broad_mappings:
      - schema:duration  # schemaorg.owl:15892-15905 - "duration" Event/MediaObjectвҶ’Duration
    related_mappings:
      - schema:validFor  # schemaorg.owl:39314-39330 - "validFor" PermitвҶ’Duration
      - dcterms:valid  # dcterms.rdf:2076-2101 - "Date Valid" date range of validity
      - time:hasDuration  # time.ttl:752-759 - "has duration" TemporalEntityвҶ’Duration
      - schema:expires  # schemaorg.owl:17832-17835 - "expires" CreativeWorkвҶ’Date
    aliases:
      - retention_period_year
    examples:
      - value: "7"
        description: Typical retention period for financial records and tax documentation.
      - value: "10"
        description: Common retention period for contracts and legal documents.
      - value: "20"
        description: Typical retention period for personnel files.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Value is expressed as a whole number of years. Use null or omit this
        field for records requiring permanent retention (e.g. policy documents,
        governance records). Conditional retention periods such as "until case
        closed + 5 years" should be documented in a companion notes field.
      - >-
        Common retention periods in heritage and archival contexts include
        7 years (financial/tax), 10 years (contracts/legal), 20 years
        (personnel files), and permanent (policy/governance).
