# ==============================================================================
# LinkML Slot Definition: has_purpose
# ==============================================================================
# The fundamental reason, intended function, or aim for which an entity exists.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# No standard ontology match found. `schema:description` (schemaorg.owl:14844-14870)
# is "A description of the item" — semantically different from purpose/function.
#
# CREATED: 2026-02-07
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_purpose
name: purpose-slot
title: Purpose
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_purpose:
    slot_uri: hc:hasPurpose
    description: >-
      To specify the fundamental reason, intended function, or aim for which an entity exists, is created, or operates.
    alt_descriptions:
      nl: >-
        Het specificeren van de fundamentele reden, beoogde functie of het doel waarvoor
        een entiteit bestaat, wordt gecreëerd of opereert.
      de: >-
        Zur Angabe des grundlegenden Grundes, der beabsichtigten Funktion oder des Ziels,
        für das eine Entität existiert, geschaffen wird oder operiert.
      fr: >-
        Spécifier la raison fondamentale, la fonction prévue ou le but pour lequel une
        entité existe, est créée ou fonctionne.
      ar: >-
        لتحديد السبب الجوهري أو الوظيفة المقصودة أو الهدف الذي من أجله يوجد كيان
        أو يُنشأ أو يعمل.
      id: >-
        Untuk menentukan alasan mendasar, fungsi yang dimaksudkan, atau tujuan keberadaan,
        penciptaan, atau pengoperasian suatu entitas.
      zh: >-
        指定实体存在、被创建或运作的根本原因、预期功能或目的。
      es: >-
        Especificar la razón fundamental, función prevista o finalidad por la cual una
        entidad existe, es creada u opera.
    structured_aliases:
      - literal_form: Doel
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zweck
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: But
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: الغرض
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Tujuan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 目的
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Propósito
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - is_or_was_purpose
      - is_or_was_purpose_clause
    comments:
      - "Migrated from `**Purpose**:` and `**PURPOSE**:` sections in description text."
      - |
        **USE CASES**:
        - Purpose of heritage institution types
        - Purpose of IoT devices/networks
        - Purpose of technical systems
    annotations:
      source_section: "**Purpose**:"
      custodian_types: '["*"]'
