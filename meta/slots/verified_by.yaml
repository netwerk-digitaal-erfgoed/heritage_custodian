# ==============================================================================
# LinkML Slot Definition: verified_by
# ==============================================================================
# Indicates the agent, organization, or mechanism responsible for confirming,
# validating, or authenticating something.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **Custom**    | `hc:verifiedBy`       | N/A                        | -       | No direct standard equivalent      |
# | **Schema.org**| `schema:verificationFactCheckingPolicy` | schemaorg.owl:39977-39981 | related | Disclosure about verification     |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/verified_by
name: verified_by
title: Verified By

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  verified_by:
    slot_uri: hc:verifiedBy
    description: >-
      To be confirmed, validated, or authenticated by a specific agent,
      organization, or mechanism responsible for checking accuracy or truthfulness.
    alt_descriptions:
      nl: >-
        Bevestigd, gevalideerd of geverifieerd door een specifieke agent,
        organisatie of mechanisme dat verantwoordelijk is voor het controleren
        van nauwkeurigheid of waarheidsgetrouwheid.
      de: >-
        Von einem bestimmten Agenten, einer Organisation oder einem Mechanismus,
        der für die Überprüfung der Genauigkeit oder Wahrhaftigkeit verantwortlich
        ist, bestätigt, validiert oder authentifiziert zu werden.
      fr: >-
        Être confirmé, validé ou authentifié par un agent, une organisation ou
        un mécanisme spécifique responsable de la vérification de l'exactitude
        ou de la véracité.
      ar: >-
        أن يتم تأكيده أو التحقق منه أو توثيقه بواسطة وكيل أو منظمة أو آلية محددة
        مسؤولة عن التحقق من الدقة أو الصدق.
      id: >-
        Dikonfirmasi, divalidasi, atau diautentikasi oleh agen, organisasi, atau
        mekanisme tertentu yang bertanggung jawab untuk memeriksa akurasi atau
        kebenaran.
      zh: >-
        由负责检查准确性或真实性的特定代理、组织或机制确认、验证或认证。
      es: >-
        Ser confirmado, validado o autenticado por un agente, organización o
        mecanismo específico responsable de verificar la precisión o veracidad.
    structured_aliases:
      - literal_form: geverifieerd door
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: verifiziert von
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: vérifié par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: تم التحقق منه بواسطة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diverifikasi oleh
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 由...验证
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: verificado por
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - is_or_was_verified_by
      - is_verified
    annotations:
      custodian_types: '["*"]'
