# ==============================================================================
# LinkML Slot Definition: justified_by
# ==============================================================================
# Links a decision, conclusion, or data modification to its underlying rationale.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                    | File/Line                     | Mapping | Notes                                                        |
# |---------------|-----------------------------|-------------------------------|---------|--------------------------------------------------------------|
# | **CIDOC-CRM** | `crm:P17_was_motivated_by`  | CIDOC_CRM_v7.1.3.rdf:1574-88 | close   | "reason for carrying out E7 Activity." Motivation ≈ justif.  |
# | **PROV-O**    | `prov:wasInfluencedBy`      | prov.ttl:1147-1174            | broad   | Very broad influence; justification is a specific influence.  |
# | **PROV-O**    | `prov:hadPlan`              | prov.ttl:649-659              | related | Plan adopted in an Association; tangential to justification.  |
# | **SKOS**      | `skos:note`                 | skos.rdf:176-185              | related | "A general note, for any purpose." Generic annotation.       |
#
# REMOVED MAPPINGS:
# - prov:hadReason — does NOT exist in prov.ttl (zero matches). Removed.
#
# CREATED: 2026-02-09
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/justified_by
name: justified_by
title: Justified By
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
imports:
  - linkml:types
default_prefix: hc
slots:
  justified_by:
    slot_uri: hc:justifiedBy
    range: string
    description: >-
      Links a specific decision, conclusion, or data modification (such as merging records) to the underlying rule,
      evidence, logic, or similarity score that warrants it.
    alt_descriptions:
      nl: >-
        Koppelt een specifieke beslissing, conclusie of gegevenswijziging (zoals het samenvoegen van records) aan de
        onderliggende regel, het bewijs, de logica of de gelijkenisscore die deze rechtvaardigt.
      de: >-
        Verknüpft eine bestimmte Entscheidung, Schlussfolgerung oder Datenänderung (wie das Zusammenführen von
        Datensätzen) mit der zugrunde liegenden Regel, dem Beweis, der Logik oder dem Ähnlichkeitswert, der sie
        rechtfertigt.
      fr: >-
        Relie une décision, une conclusion ou une modification de données spécifique (comme la fusion
        d'enregistrements) à la règle, la preuve, la logique ou le score de similarité sous-jacent qui la justifie.
      ar: >-
        يربط قرارًا أو استنتاجًا أو تعديلًا محددًا للبيانات (مثل دمج السجلات) بالقاعدة أو الدليل أو المنطق أو درجة
        التشابه الأساسية التي تبرره.
      id: >-
        Menghubungkan keputusan, kesimpulan, atau modifikasi data tertentu (seperti penggabungan rekod) dengan aturan,
        bukti, logika, atau skor kesamaan yang mendasarinya.
      zh: >-
        将特定的决策、结论或数据修改（如合并记录）与支撑它的基础规则、证据、逻辑或相似度评分相关联。
      es: >-
        Vincula una decisión, conclusión o modificación de datos específica (como la fusión de registros) con la regla,
        evidencia, lógica o puntuación de similitud subyacente que la justifica.
    structured_aliases:
      - literal_form: Rechtvaardiging
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Rechtfertigung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Justification
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: تبرير
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Pembenaran
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 依据
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Justificación
        predicate: EXACT_SYNONYM
        in_language: es
    close_mappings:
      - crm:P17_was_motivated_by  # CIDOC_CRM_v7.1.3.rdf:1574-1588 - "reason for carrying out E7 Activity"
    broad_mappings:
      - prov:wasInfluencedBy  # prov.ttl:1147-1174 - very broad influence relation
    related_mappings:
      - prov:hadPlan  # prov.ttl:649-659 - "Plan adopted by Agent in Association with Activity"
      - skos:note  # skos.rdf:176-185 - "A general note, for any purpose"
    comments:
      - "PROV-O: prov:qualifiedAttribution can be used for detailed provenance rationale."
      - "Original close_mapping prov:hadReason was removed — property does not exist in PROV-O."
    annotations:
      custodian_types: '["*"]'
    aliases:
      - justification
