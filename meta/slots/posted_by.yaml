      ar: >-
        ┘іпГп»п» пД┘ё┘Ёп│пфп«п»┘Ё пБ┘ѕ пД┘ёпГп│пДпе пБ┘ѕ пД┘ё┘Ё┘ё┘Ђ пД┘ёп┤п«пх┘і пД┘ё┘ЁпГп»п» пД┘ёп░┘і ┘єп┤п▒
        ┘ЁпГпф┘ѕ┘Ѕ пБ┘ѕ п▒п│пД┘ёпЕ пБ┘ѕ пфпГп»┘іпФпД┘І п╣┘ё┘Ѕ ┘Ё┘єпхпЕ пБ┘ѕ ┘Ё┘єпфп»┘Ѕ пБ┘ѕ ┘Ёп│пДпГпЕ п╣пД┘ЁпЕ.
      id: >-
        Mengidentifikasi pengguna, akun, atau profil tertentu yang
        memublikasikan konten, pesan, atau pembaruan ke platform,
        forum, atau ruang publik.
      zh: >-
        ТаЄУ»єтюет╣│тЈ░сђЂУ«║тЮЏТѕќтЁгтЁ▒уЕ║жЌ┤СИітЈЉтИЃтєЁт«╣сђЂТХѕТЂ»ТѕќТЏ┤Тќ░уџёуЅ╣т«џућеТѕисђЂ
        У┤дТѕиТѕќСИфС║║УхёТќЎсђѓ
      es: >-
