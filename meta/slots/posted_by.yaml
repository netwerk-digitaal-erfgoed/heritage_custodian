# ==============================================================================
# LinkML Slot Definition: posted_by
# ==============================================================================
# Identifies the user, account, or profile that published content to a
# platform such as a social media network, forum, or website.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology    | Property                  | File/Line                | Mapping | Notes                                                               |
# |-------------|---------------------------|--------------------------|---------|---------------------------------------------------------------------|
# | **PROV**    | `prov:wasAttributedTo`    | prov.ttl:1082-1096       | close   | "wasAttributedTo" EntityРєњAgent. Attribution of entity to agent.     |
# | **Schema**  | `schema:author`           | schemaorg.owl:9265-9286  | related | "author" CreativeWorkРѕфRatingРєњOrganizationРѕфPerson. Content authoring.|
# | **DCTerms** | `dcterms:creator`         | dcterms.rdf:1092-1121    | related | "Creator" РєњAgent. Entity responsible for making a resource.         |
# | **FOAF**    | `foaf:maker`              | foaf.ttl:382-391         | related | "maker" ThingРєњAgent. Equivalent to dcterms:creator.                 |
# | **Schema**  | `schema:publisher`        | schemaorg.owl:31710-31729| related | "publisher" CreativeWorkРєњOrganizationРѕфPerson. Publishing entity.    |
#
# No exact match found. The concept of identifying specifically who posted
# content to a social media platform is narrower than general authorship
# (schema:author) or resource creation (dcterms:creator). prov:wasAttributedTo
# is the closest conceptual match (ascribing an entity to an agent), but its
# scope is broader (any entity-to-agent attribution, not specifically posting).
#
# CREATED: 2026-02-02
# UPDATED: 2026-02-10
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/posted_by
name: posted_by
title: Posted By
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  foaf: http://xmlns.com/foaf/0.1/
imports:
  - linkml:types
default_prefix: hc
slots:
  posted_by:
    slot_uri: hc:postedBy
    description: >-
      Identifies the specific user, account, or profile that published a
      piece of content, message, or update to a platform, forum, or
      public space. Typically references a social media profile or
      account identifier that links back to the custodian organization
      responsible for the post.
