    range: string
    close_mappings:
      - prov:wasAttributedTo  # prov.ttl:1082-1096 - "wasAttributedTo" EntityРєњAgent attribution
    related_mappings:
      - schema:author  # schemaorg.owl:9265-9286 - "author" CreativeWorkРѕфRatingРєњOrganizationРѕфPerson
      - dcterms:creator  # dcterms.rdf:1092-1121 - "Creator" entity responsible for making resource
      - foaf:maker  # foaf.ttl:382-391 - "maker" ThingРєњAgent
      - schema:publisher  # schemaorg.owl:31710-31729 - "publisher" CreativeWorkРєњOrganizationРѕфPerson
    aliases:
      - posted_by_profile
    examples:
      - value: "@rijksmuseum"
        description: >-
          The Rijksmuseum's official Instagram account posting a
          collection highlight.
      - value: "britishmuseum"
        description: >-
          The British Museum's Twitter/X handle posting an event
          announcement.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        This slot identifies who posted content, not the content itself. The
        value typically references a social media profile or username. In the
        data model, this may link to a SocialMediaProfile entity which in turn
        connects to the parent Custodian organization.
      - >-
        Conceptually similar to Activity Streams 2.0 attributedTo, which
        identifies the actor responsible for content. The Activity Streams
        vocabulary is not in data/ontology/ and therefore not cited in mappings.
      - >-
        The alias posted_by_profile emphasizes that the poster is identified
        by their profile rather than a personal name.
