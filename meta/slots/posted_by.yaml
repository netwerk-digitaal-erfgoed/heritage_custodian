    structured_aliases:
      - literal_form: geplaatst door
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: ver├Хffentlicht von
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: publi├Е par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: ┘єп┤п▒ пе┘ѕпДп│пипЕ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diposting oleh
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: тЈЉтИЃУђЁ
