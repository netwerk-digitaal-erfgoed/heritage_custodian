# ==============================================================================
# LinkML Slot Definition: replied_to
# ==============================================================================
# Be the recipient of a response or counter-communication generated by another
# entity in answer to a prior action or message.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                              |
# |---------------|-----------------------|----------------------|---------|------------------------------------|
# | **Schema.org**| `schema:parentItem`   | schemaorg.owl:28852  | exact   | Parent in Q/A thread               |
# | **Schema.org**| `schema:comment`      | schemaorg.owl:12267  | close   | Inverse direction                  |
# | **Schema.org**| `schema:replyToUrl`   | schemaorg.owl:33100  | related | URL for posting reply              |
#
# CREATED: 2026-01-22
# UPDATED: 2026-02-02 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/replied_to
name: replied_to
title: replied to
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  replied_to:
    slot_uri: schema:parentItem
    description: >-
      To be the recipient of a response or counter-communication generated by another entity in answer to a prior action or message.
    alt_descriptions:
      nl: >-
        De ontvanger zijn van een reactie of tegencommunicatie die door een
        andere entiteit is gegenereerd als antwoord op een eerdere actie of
        bericht.
      de: >-
        Der Empfänger einer Antwort oder Gegenkommunikation zu sein, die von
        einer anderen Entität als Reaktion auf eine vorherige Aktion oder
        Nachricht generiert wurde.
      fr: >-
        Être le destinataire d'une réponse ou d'une contre-communication
        générée par une autre entité en réponse à une action ou un message
        antérieur.
      ar: >-
        أن يكون المتلقي لرد أو اتصال مضاد تم إنشاؤه بواسطة كيان آخر كإجابة
        على إجراء أو رسالة سابقة.
      id: >-
        Menjadi penerima respons atau komunikasi balik yang dihasilkan oleh
        entitas lain sebagai jawaban atas tindakan atau pesan sebelumnya.
      zh: >-
        成为由另一实体生成的回复或反向通信的接收者，作为对先前行动或消息的回应。
      es: >-
        Ser el destinatario de una respuesta o contracomunicación generada
        por otra entidad en respuesta a una acción o mensaje previo.
    structured_aliases:
      - literal_form: antwoord op
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_replied_to
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Antwort auf
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: réponse à
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: ردًا على
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: balasan untuk
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 回复至
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: en respuesta a
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    multivalued: true
    exact_mappings:
      # Schema.org parentItem - Lines 28852-28876 in schemaorg.owl
      # "The parent of a question, answer or item in general. Typically used
      # for Q/A discussion threads e.g. a chain of comments"
      # Domain: Question | Comment | Answer
      # Range: Comment | CreativeWork | Role | URL | Text
    close_mappings:
      # Schema.org comment (inverse direction) - Lines 12267-12289 in schemaorg.owl
      # "Comments, typically from users."
      # This is the inverse: points from something to its comments
      - schema:comment
    related_mappings:
      # Schema.org replyToUrl - Lines 33100-33120 in schemaorg.owl
      # "The URL at which a reply may be posted to the specified UserComment"
      # Related but specific to URL for posting replies, not the reply relationship itself
      - schema:replyToUrl
    aliases:
      - has_or_had_reply_to
      - is_reply_to
      - in_reply_to
      - is_or_was_replied_to
    examples:
      - value: https://example.org/post/original-article-123
        description: >-
          A comment that replies to an original article
      - value: https://example.org/comment/parent-comment-456
        description: >-
          A nested reply that responds to another comment in a thread
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.6
      specificity_rationale: >-
        Moderately general - applies to any threaded discussion or Q&A context
        where reply relationships need to be expressed.
    comments:
      - Created 2026-01-22 from comment_reply_count migration (Rule 53)
      - Updated 2026-02-02 with verified ontology mappings and translations
      - |
        **PURPOSE**:
        Captures the relationship between a reply/response and its parent content.
        Used for threaded discussions, Q&A forums, comment sections, and any
        context where content is created in response to other content.
      - |
        **RiC-O NAMING** (Rule 39):
        Uses "has_or_had_" prefix in aliases to indicate temporal relationship -
        the content has a reply target currently or had one in the past.
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):

        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | **Schema.org** | `schema:parentItem` | 28852-28876 | exact | Parent in Q/A thread |
        | **Schema.org** | `schema:comment` | 12267-12289 | close | Inverse direction |
        | **Schema.org** | `schema:replyToUrl` | 33100-33120 | related | URL for posting reply |
      - |
        **MIGRATION NOTE**:
        Created from migration of `comment_reply_count` slot per slot_fixes.yaml.
        Replaces simple integer counts with structured reply relationships.
        Note: SIOC ontology (sioc:has_reply) is not available in data/ontology/
        so Schema.org mappings are used as the primary verified alignment.
