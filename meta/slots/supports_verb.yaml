# ==============================================================================
# LinkML Slot Definition: supports_verb
# ==============================================================================
# Indicates which OAI-PMH verbs are supported by a service endpoint.
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/supports_verb
name: supports_verb
title: supports verb
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../enums/OAIPMHVerbEnum
slots:
  supports_verb:
    slot_uri: hc:supportsVerb
    description: OAI-PMH verb supported by a repository endpoint.
    alt_descriptions:
      nl: OAI-PMH-werkwoord dat door een repository-endpoint wordt ondersteund.
      de: OAI-PMH-Verb, das von einem Repositoriums-Endpunkt unterstuetzt wird.
      fr: Verbe OAI-PMH pris en charge par un point d acces de depot.
      es: Verbo OAI-PMH soportado por un endpoint de repositorio.
      ar: فعل OAI-PMH الذي تدعمه نقطة نهاية لمستودع.
      id: Verba OAI-PMH yang didukung oleh endpoint repositori.
      zh: 资源库端点所支持的 OAI-PMH 动词。
    structured_aliases:
      - literal_form: ondersteunt werkwoord
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: unterstuetzt Verb
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: prend en charge le verbe
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: soporta verbo
        predicate: EXACT_SYNONYM
        in_language: es
      - literal_form: يدعم فعل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: mendukung verba
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 支持动词
        predicate: EXACT_SYNONYM
        in_language: zh
    range: OAIPMHVerbEnum
    multivalued: true
    required: false
    annotations:
      custodian_types: '["*"]'
