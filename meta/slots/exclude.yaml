# ==============================================================================
# LinkML Slot Definition: exclude
# ==============================================================================
# To deliberately omit, debar, or prevent an entity from being included in a
# specific group, list, or scope of consideration.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                              |
# |---------------|-----------------------|----------------------|---------|------------------------------------|
# | (none)        | N/A                   | N/A                  | N/A     | No standard ontology mapping found |
#
# NOTE: No standard ontology properties for exclusion semantics were found.
# This is a custom Heritage Custodian property (hc:exclude).
#
# CREATED: 2026-01-20
# UPDATED: 2026-02-03 - Added header documentation
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/exclude
name: exclude
title: Exclude
description: |
    To deliberately omit, debar, or prevent an entity from being included in a specific group, list, or scope of consideration.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
default_prefix: hc
slots:
  exclude:
    description: >-
      To deliberately omit, debar, or prevent an entity from being included
      in a specific group, list, or scope of consideration.
    alt_descriptions:
      nl: >-
        Om een entiteit opzettelijk weg te laten, uit te sluiten of te
        voorkomen dat deze wordt opgenomen in een specifieke groep, lijst of
        reikwijdte van overweging.
      de: >-
        Eine Entität absichtlich auszulassen, auszuschließen oder zu
        verhindern, dass sie in eine bestimmte Gruppe, Liste oder einen
        Betrachtungsbereich aufgenommen wird.
      fr: >-
        Pour omettre, exclure ou empêcher délibérément une entité d'être
        incluse dans un groupe, une liste ou un champ de considération
        spécifique.
      ar: >-
        لحذف أو منع أو استبعاد كيان عمداً من أن يتم تضمينه في مجموعة أو
        قائمة أو نطاق اعتبار محدد.
      id: >-
        Untuk sengaja menghilangkan, menghalangi, atau mencegah suatu entitas
        dimasukkan dalam kelompok, daftar, atau ruang lingkup pertimbangan
        tertentu.
      zh: >-
        故意省略、排除或阻止某实体被包含在特定群组、列表或考虑范围内。
      es: >-
        Para omitir, excluir o impedir deliberadamente que una entidad sea
        incluida en un grupo, lista o ámbito de consideración específico.
    structured_aliases:
      - literal_form: uitsluiten
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_exclude
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: ausschließen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: exclure
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: استبعاد
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: mengecualikan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 排除
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: excluir
        predicate: EXACT_SYNONYM
        in_language: es
    # range: Any
    multivalued: true
    # inlined: true # CANNOT inline string
    annotations:
      custodian_types: '["*"]'
    aliases:
    - excludes_or_excluded
    - is_or_was_exclude
    comments:
    - MIGRATED from excluded_materials per slot_fixes.yaml (Rule 53).
