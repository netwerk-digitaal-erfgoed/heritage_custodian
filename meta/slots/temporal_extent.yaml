# ==============================================================================
# LinkML Slot Definition: temporal_extent
# ==============================================================================
# The time period, range, or duration covered by the entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                   | File/Line                    | Mapping | Notes                              |
# |---------------|----------------------------|------------------------------|---------|------------------------------------|
# | **CIDOC-CRM** | `crm:P4_has_time-span`     | CIDOC_CRM_v7.1.3.rdf:1242-1253| exact   | "Associates an instance of E2      |
# |               |                            |                              |         | Temporal Entity with E52 Time-Span"|
# | **PROV-O**    | `prov:startedAtTime`       | prov.ttl:1018-1027           | related | Start time of activity             |
# | **PROV-O**    | `prov:endedAtTime`         | prov.ttl:555-564             | related | End time of activity               |
# | **DCTerms**   | `dcterms:extent`           | dcterms.rdf:1269+            | broad   | "A dimension or extent" - broader  |
#
# CREATED: 2026-02-04
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/temporal_extent
name: temporal_extent
title: Temporal Extent
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
  - linkml:types
slots:
  temporal_extent:
    slot_uri: crm:P4_has_time-span
    description: >-
      The time period, range, or duration covered by the content, existence,
      or validity of the entity.
    alt_descriptions:
      nl: >-
        De tijdsperiode, het bereik of de duur die wordt bestreken door de
        inhoud, het bestaan of de geldigheid van de entiteit.
      de: >-
        Der Zeitraum, die Spanne oder die Dauer, die durch den Inhalt, die
        Existenz oder die Gültigkeit der Entität abgedeckt wird.
      fr: >-
        La période de temps, la plage ou la durée couverte par le contenu,
        l'existence ou la validité de l'entité.
      ar: >-
        الفترة الزمنية أو النطاق أو المدة التي يغطيها المحتوى أو وجود
        الكيان أو صلاحيته.
      id: >-
        Periode waktu, rentang, atau durasi yang dicakup oleh konten,
        keberadaan, atau validitas entitas.
      zh: >-
        实体的内容、存在或有效性所涵盖的时间段、范围或持续时间。
      es: >-
        El período de tiempo, rango o duración cubierto por el contenido,
        la existencia o la validez de la entidad.
    structured_aliases:
      - literal_form: tijdsspanne
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zeitspanne
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: étendue temporelle
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: المدى الزمني
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: rentang waktu
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 时间范围
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: extensión temporal
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    exact_mappings:
    broad_mappings:
      - dcterms:extent  # dcterms.rdf:1269+ - "A dimension or extent"
    related_mappings:
      - prov:startedAtTime  # prov.ttl:1018-1027
      - prov:endedAtTime  # prov.ttl:555-564
    aliases:
      - has_or_had_temporal_extent
      - is_or_was_quantity_date
      - programme_period
      - programme_year
      - creation_timespan
      - loan_timespan
      - name_validity_period
      - observation_date
      - observation_period
      - performance_datetime
      - period_covered
      - period
      - record_timespan
      - reported_date
      - source_date
    comments:
      - |
        **CIDOC-CRM ALIGNMENT**: Maps to crm:P4_has_time-span which links
        Activity to TimeSpan.
      - |
        **PROV-O**: Maps to combination of prov:startedAtTime and prov:endedAtTime.
      - |
        **USAGE - Precise timestamps**:
        - Set begin_of_the_begin == end_of_the_begin (activity start)
        - Set begin_of_the_end == end_of_the_end (activity end)
      - |
        **USAGE - Uncertain duration (fuzzy boundaries)**:
        - begin_of_the_begin: Earliest possible start
        - end_of_the_begin: Latest possible start
        - begin_of_the_end: Earliest possible end
        - end_of_the_end: Latest possible end
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Applicable to all heritage custodian types.
      custodian_types_primary: A
      specificity_score: 0.7
      specificity_rationale: Core temporal modeling slot aligned with CIDOC-CRM.
