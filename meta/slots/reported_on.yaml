# ==============================================================================
# LinkML Slot Definition: reported_on
# ==============================================================================
# URI of a report or document in which this entity is formally documented.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property                    | File/Line                     | Mapping | Notes                                                                       |
# |----------------|-----------------------------|-------------------------------|---------|-----------------------------------------------------------------------------|
# | **CIDOC CRM**  | `crm:P70i_is_documented_in` | CIDOC_CRM_v7.1.3.rdf:2799-10 | close   | "is documented in." E1_CRM_Entity→E31_Document. Same intent (entity→its     |
# |                |                             |                               |         | documenting resource); differs in range (E31_Document vs URI).              |
# | **Schema.org** | `schema:subjectOf`          | schemaorg.owl:36889-36912     | close   | "A CreativeWork or Event about this Thing." Thing→CreativeWork. Close:       |
# |                |                             |                               |         | links entity to content about it; broader than formal report.               |
# | **Dublin Core**| `dcterms:isReferencedBy`     | dcterms.rdf:1488-1511         | broad   | "A related resource that references the described resource." Very general   |
# |                |                             |                               |         | inter-resource referencing, not specifically a report.                      |
#
# CREATED: 2026-02-08
# UPDATED: 2026-02-10
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/reported_on
name: reported_on
title: Reported On
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
default_prefix: hc
imports:
  - linkml:types
slots:
  reported_on:
    slot_uri: hc:reportedOn
    description: >-
      URI of a report, condition assessment, or other formal document in which
      this entity is documented, announced, or covered. Typically links to an
      outbound condition report, conservation assessment, or incident report
      that records the state or status of a heritage object or collection at
      a specific point in time.
    alt_descriptions:
      nl: >-
        URI van een rapport, conditiebeoordeling of ander formeel document
        waarin deze entiteit is gedocumenteerd, aangekondigd of behandeld.
      de: >-
        URI eines Berichts, einer Zustandsbewertung oder eines anderen formellen
        Dokuments, in dem diese Entität dokumentiert, angekündigt oder behandelt
        wird.
      fr: >-
        URI d'un rapport, d'une évaluation de condition ou d'un autre document
        formel dans lequel cette entité est documentée, annoncée ou couverte.
      ar: >-
        عنوان URI لتقرير أو تقييم حالة أو وثيقة رسمية أخرى تم فيها توثيق هذا
        الكيان أو الإعلان عنه أو تغطيته.
      id: >-
        URI laporan, penilaian kondisi, atau dokumen formal lainnya yang
        mendokumentasikan, mengumumkan, atau meliput entitas ini.
      zh: >-
        记录、公布或报道该实体的报告、状况评估或其他正式文件的URI。
      es: >-
        URI de un informe, evaluación de condición u otro documento formal en
        el que se documenta, anuncia o cubre esta entidad.
    structured_aliases:
      - literal_form: Gerapporteerd op
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Berichtet in
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Rapporté dans
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مُبلَّغ عنه في
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Dilaporkan pada
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 报告于
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Reportado en
        predicate: EXACT_SYNONYM
        in_language: es
    range: uri
    multivalued: false
    close_mappings:
      - crm:P70i_is_documented_in  # CIDOC_CRM_v7.1.3.rdf:2799-2810 - "is documented in." E1_CRM_Entity→E31_Document. Same intent (entity linked to its documenting resource); differs in range (E31_Document vs URI).
      - schema:subjectOf  # schemaorg.owl:36889-36912 - "A CreativeWork or Event about this Thing." Thing→CreativeWork. Links entity to content about it; broader than formal report.
    broad_mappings:
      - dcterms:isReferencedBy  # dcterms.rdf:1488-1511 - "A related resource that references the described resource." General inter-resource referencing, not specifically a report.
    aliases:
      - outbound_condition_report_url
    examples:
      - value: "https://example.org/reports/condition/2026/SK-A-4691"
        description: >-
          URI of an outbound condition report for a painting leaving the
          collection for a loan exhibition.
      - value: "https://example.org/reports/incident/2026-01-15"
        description: >-
          URI of an incident report documenting damage to a heritage object.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Range is URI, not string — the value should be a resolvable URL or
        URI pointing to the actual report document.
      - >-
        In CIDOC-CRM, documenting an entity is modelled via P70 documents
        (E31_Document → E1_CRM_Entity) or inversely P70i is_documented_in.
        This slot uses the inverse direction: entity → report URI.
      - >-
        Common heritage report types: outbound condition reports (for loans),
        inbound condition reports (upon receipt), conservation treatment
        reports, incident/damage reports, and provenance research reports.
