# ==============================================================================
# LinkML Slot Definition: has_schedule
# ==============================================================================
# A plan, list, or timeline of events, tasks, or procedures with intended times.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                | Mapping  | Notes                                              |
# |---------------|-----------------------|--------------------------|----------|----------------------------------------------------|
# | **Schema.org**| `schema:eventSchedule`| schemaorg.owl:17366-17390| narrow   | "Associates an Event with a Schedule." Event-specific.|
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_schedule
name: has_schedule
title: Has Schedule
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
default_prefix: hc
imports:
- linkml:types
slots:
  has_schedule:
    slot_uri: hc:hasSchedule
    description: >-
      To specify a plan, list, or timeline of events, tasks, or procedures with intended
      times or dates for their occurrence.
    comments:
      - "MIGRATED 2026-02-03 from has_or_had_schedule for conciseness."
    alt_descriptions:
      nl: >-
        Om een plan, lijst of tijdlijn aan te geven van evenementen, taken of procedures
        met beoogde tijden of data voor hun plaatsvinden.
      de: >-
        Um einen Plan, eine Liste oder einen Zeitplan von Ereignissen, Aufgaben oder Verfahren
        mit vorgesehenen Zeiten oder Daten für ihr Eintreten anzugeben.
      fr: >-
        Pour spécifier un plan, une liste ou un calendrier d'événements, de tâches ou de
        procédures avec les heures ou dates prévues pour leur réalisation.
      ar: >-
        لتحديد خطة أو قائمة أو جدول زمني للأحداث أو المهام أو الإجراءات مع الأوقات أو
        التواريخ المقصودة لحدوثها.
      id: >-
        Untuk menentukan rencana, daftar, atau jadwal acara, tugas, atau prosedur dengan
        waktu atau tanggal yang dimaksudkan untuk pelaksanaannya.
      zh: >-
        用于指定事件、任务或程序的计划、列表或时间表，包含其预定发生的时间或日期。
      es: >-
        Para especificar un plan, lista o cronograma de eventos, tareas o procedimientos
        con las horas o fechas previstas para su ocurrencia.
    structured_aliases:
      - literal_form: Rooster
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zeitplan
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Calendrier
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: جدول
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Jadwal
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 时间表
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Cronograma
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: false
    aliases:
      - has_or_had_schedule
      - maintenance_schedule
    annotations:
      custodian_types: '["*"]'
    narrow_mappings:
    - schema:eventSchedule  # schemaorg.owl:17366-17390 - Event-specific schedule; this slot is a general schedule property.
