# ==============================================================================
# LinkML Slot Definition: checked_through
# ==============================================================================
# System, procedure, or channel through which verification was performed.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                | File/Line            | Mapping | Notes                              |
# |---------------|-------------------------|----------------------|---------|------------------------------------|
# | **PROV-O**    | `prov:wasGeneratedBy`   | prov.ttl:1132-1145   | related | Generation through activity        |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/checked_through
name: checked_through
title: Checked Through

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  checked_through:
    slot_uri: hc:checkedThrough
    description: >-
      The system, procedure, intermediate channel, or pathway through which
      the entity was verified, examined, or processed.
    alt_descriptions:
      nl: >-
        Het systeem, de procedure, het tussenliggende kanaal of pad waardoor
        de entiteit is geverifieerd, onderzocht of verwerkt.
      de: >-
        Das System, Verfahren, der Zwischenkanal oder Weg, über den die
        Entität überprüft, untersucht oder verarbeitet wurde.
      fr: >-
        Le système, la procédure, le canal intermédiaire ou la voie par
        laquelle l'entité a été vérifiée, examinée ou traitée.
      ar: >-
        النظام أو الإجراء أو القناة الوسيطة أو المسار الذي تم من خلاله
        التحقق من الكيان أو فحصه أو معالجته.
      id: >-
        Sistem, prosedur, saluran perantara, atau jalur yang melaluinya
        entitas diverifikasi, diperiksa, atau diproses.
      zh: >-
        实体通过其进行验证、检查或处理的系统、程序、中间渠道或路径。
      es: >-
        El sistema, procedimiento, canal intermedio o vía a través del cual
        la entidad fue verificada, examinada o procesada.
    structured_aliases:
      - literal_form: gecontroleerd via
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: überprüft durch
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: vérifié par
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: تم التحقق عبر
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diperiksa melalui
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 通过...检查
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: verificado a través de
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    related_mappings:
      - prov:wasGeneratedBy  # Generation through activity (loosely related)
    aliases:
      - is_or_was_checked_through
    annotations:
      custodian_types: '["*"]'
