# ==============================================================================
# LinkML Slot Definition: has_accessibility_feature
# ==============================================================================
# Describes accessibility features that remove barriers and ensure usability
# for individuals with diverse abilities. Used for physical locations,
# digital resources, and services in heritage contexts.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property                        | File/Line              | Mapping | Notes                                            |
# |--------------|---------------------------------|------------------------|---------|--------------------------------------------------|
# | **Schema.org**| `schema:accessibilityFeature`  | schemaorg.owl:6543-6562| exact   | "Content features for accessibility"             |
# | **Schema.org**| `schema:accessMode`            | schemaorg.owl:6458-6461| close   | Sensory/cognitive access modes                   |
# | **Schema.org**| `schema:accessModeSufficient`  | schemaorg.owl:6479-6482| close   | Sufficient access modes for content              |
# | **Schema.org**| `schema:amenityFeature`        | schemaorg.owl:7869-7892| broad   | General features of a place (broader)            |
# | **Schema.org**| `schema:accessibilityControl`  | schemaorg.owl:6522-6525| narrow  | Input control methods (more specific)            |
# | **Schema.org**| `schema:accessibilityAPI`      | schemaorg.owl:6501-6504| narrow  | API compatibility (more specific)                |
# | **Schema.org**| `schema:accessibilityHazard`   | schemaorg.owl:6564-6567| related | Physiologically dangerous characteristics        |
# | **Schema.org**| `schema:accessibilitySummary`  | schemaorg.owl:6585-6588| related | Text summary of accessibility                    |
#
# NOTE: schema:accessibilityFeature is the primary property for recording
# accessibility features. Values should ideally be drawn from the W3C
# Accessibility Discovery Vocabulary (a11y-discov-vocab).
#
# CREATED: 2026-01-26
# UPDATED: 2026-02-03 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_accessibility_feature
name: has_accessibility_feature
title: has accessibility feature

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  owl: http://www.w3.org/2002/07/owl#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

description: |
  To possess specific functional attributes or design elements intended to remove barriers and ensure usability for individuals with diverse abilities.

imports:
  - linkml:types

slots:
  has_accessibility_feature:
    slot_uri: schema:accessibilityFeature
    description: |
      To possess specific functional attributes or design elements intended to remove barriers and ensure usability for individuals with diverse abilities.
    alt_descriptions:
      nl: >-
        Het bezitten van specifieke functionele eigenschappen of ontwerpelementen die bedoeld zijn om barrières weg te nemen en bruikbaarheid te garanderen voor personen met diverse vermogens.
      de: >-
        Das Besitzen spezifischer funktionaler Eigenschaften oder Designelemente, die darauf abzielen, Barrieren zu beseitigen und die Nutzbarkeit für Menschen mit unterschiedlichen Fähigkeiten zu gewährleisten.
      fr: >-
        Posséder des attributs fonctionnels spécifiques ou des éléments de conception destinés à éliminer les barrières et à garantir l'utilisabilité pour les personnes ayant des capacités diverses.
      ar: >-
        امتلاك سمات وظيفية محددة أو عناصر تصميم تهدف إلى إزالة الحواجز وضمان قابلية الاستخدام للأفراد ذوي القدرات المتنوعة.
      id: >-
        Memiliki atribut fungsional atau elemen desain tertentu yang dimaksudkan untuk menghilangkan hambatan dan memastikan kegunaan bagi individu dengan kemampuan yang beragam.
      zh: >-
        拥有旨在消除障碍并确保不同能力个体可用性的特定功能属性或设计元素。
      es: >-
        Poseer atributos funcionales específicos o elementos de diseño destinados a eliminar barreras y garantizar la usabilidad para personas con diversas capacidades.
    structured_aliases:
      - literal_form: heeft toegankelijkheidskenmerk
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Barrierefreiheitsmerkmal
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a une caractéristique d'accessibilité
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه ميزة إمكانية الوصول
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki fitur aksesibilitas
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有无障碍功能
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene característica de accesibilidad
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    inverse: is_accessibility_feature_of
    implements:
      - owl:ObjectProperty
    required: false
    multivalued: true
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Applicable to all heritage custodian types.
      custodian_types_primary: M
      specificity_score: 0.50
      specificity_rationale: Moderately specific slot for accessibility features.
    exact_mappings:
      # Schema.org accessibilityFeature - "Content features for accessibility"
      # Domain: CreativeWork, Range: Text | Role | URL
      # Lines 6543-6562 in schemaorg.owl
    close_mappings:
      # Schema.org accessMode - Sensory/cognitive access modes (auditory, tactile, textual, visual)
      # Lines 6458-6461 in schemaorg.owl
      - schema:accessMode
      # Schema.org accessModeSufficient - Sufficient access modes for understanding content
      # Lines 6479-6482 in schemaorg.owl
      - schema:accessModeSufficient
    broad_mappings:
      # Schema.org amenityFeature - General features of a place/accommodation
      # Broader: any feature, not just accessibility-focused
      # Lines 7869-7892 in schemaorg.owl
      - schema:amenityFeature
    narrow_mappings:
      # Schema.org accessibilityControl - Input control methods (specific type of feature)
      # Narrower: specifically about input control methods
      # Lines 6522-6525 in schemaorg.owl
      - schema:accessibilityControl
      # Schema.org accessibilityAPI - API compatibility (specific type of feature)
      # Narrower: specifically about API compatibility
      # Lines 6501-6504 in schemaorg.owl
      - schema:accessibilityAPI
    related_mappings:
      # Schema.org accessibilityHazard - Physiologically dangerous characteristics
      # Related: opposite concern (hazards vs features)
      # Lines 6564-6567 in schemaorg.owl
      - schema:accessibilityHazard
      # Schema.org accessibilitySummary - Text summary of accessibility
      # Related: human-readable summary vs structured features
      # Lines 6585-6588 in schemaorg.owl
      - schema:accessibilitySummary
    aliases:
      - has_or_had_accessibility_feature
      - is_accessible
    examples:
      - value: "wheelchairAccessible"
        description: Physical location is accessible by wheelchair
      - value: "audioDescription"
        description: Content includes audio description for visually impaired users
      - value: "captions"
        description: Content includes captions for deaf or hard-of-hearing users
      - value: "signLanguage"
        description: Content includes sign language interpretation
      - value: "braille"
        description: Materials available in Braille format
      - value: "largePrint"
        description: Materials available in large print format
    comments:
      - Updated 2026-02-03 with verified ontology mappings and translations
      - |
        **PURPOSE**: Records accessibility features of heritage institutions,
        their facilities, digital resources, and services. Enables users to
        discover accessible resources and plan visits accordingly.
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):
        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | Schema.org | schema:accessibilityFeature | 6543 | exact | Content features |
        | Schema.org | schema:accessMode | 6458 | close | Access modes |
        | Schema.org | schema:accessModeSufficient | 6479 | close | Sufficient modes |
        | Schema.org | schema:amenityFeature | 7869 | broad | General features |
        | Schema.org | schema:accessibilityControl | 6522 | narrow | Input controls |
        | Schema.org | schema:accessibilityAPI | 6501 | narrow | API compatibility |
        | Schema.org | schema:accessibilityHazard | 6564 | related | Hazards |
        | Schema.org | schema:accessibilitySummary | 6585 | related | Summary |
      - |
        **TEMPORAL SEMANTICS** (RiC-O Pattern):
        "has_or_had_accessibility_feature" indicates features may be historical -
        an institution's accessibility features may change over time.
      - |
        **USAGE PATTERNS**:
        - For physical locations: wheelchair ramps, elevators, accessible restrooms
        - For digital resources: captions, audio descriptions, screen reader support
        - For services: sign language interpretation, assistive listening devices
        - For materials: Braille, large print, tactile exhibits
      - |
        **VALUE RECOMMENDATIONS**:
        Values should ideally be drawn from the W3C Accessibility Discovery
        Vocabulary (https://www.w3.org/2021/a11y-discov-vocab/latest/).
        Common values include:
        - alternativeText, audioDescription, braille, captions
        - highContrastDisplay, largePrint, signLanguage, tactileGraphic
        - wheelchairAccessible, hearingLoop, guideDog
      - |
        **RANGE NOTES**:
        Range is `uriorcurie` (Rule 55) to allow controlled vocabulary URIs
        or custom accessibility feature references. Classes may narrow via
        slot_usage to specific AccessibilityFeature enums.
