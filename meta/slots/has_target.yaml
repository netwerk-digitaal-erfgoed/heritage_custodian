# ==============================================================================
# LinkML Slot Definition: has_target
# ==============================================================================
# Goal, objective, destination, or specific value that an action aims to reach.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# No standard ontology mapping identified.
#
# REMOVED: hc:temperature_target — invalid self-referencing mapping within hc: namespace.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_target
name: has_target
title: Has Target
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_target:
    slot_uri: hc:hasTarget
    description: >-
      To specify the goal, objective, destination, or specific value that an
      action, process, or device aims to reach, achieve, or affect.
    alt_descriptions:
      nl: >-
        Om het doel, de doelstelling, de bestemming of de specifieke waarde
        aan te geven die een actie, proces of apparaat beoogt te bereiken,
        te verwezenlijken of te beïnvloeden.
      de: >-
        Zur Angabe des Ziels, der Zielsetzung, des Bestimmungsorts oder des
        spezifischen Wertes, den eine Aktion, ein Prozess oder ein Gerät zu
        erreichen, zu erzielen oder zu beeinflussen beabsichtigt.
      fr: >-
        Pour spécifier l'objectif, le but, la destination ou la valeur
        spécifique qu'une action, un processus ou un dispositif vise à
        atteindre, réaliser ou affecter.
      ar: >-
        لتحديد الهدف أو الغاية أو الوجهة أو القيمة المحددة التي يسعى إجراء
        أو عملية أو جهاز إلى الوصول إليها أو تحقيقها أو التأثير عليها.
      id: >-
        Untuk menentukan tujuan, sasaran, destinasi, atau nilai spesifik yang
        ingin dicapai, diraih, atau dipengaruhi oleh suatu tindakan, proses,
        atau perangkat.
      zh: >-
        用于指定行动、过程或设备旨在达到、实现或影响的目标、目的、目的地或特定值。
      es: >-
        Para especificar la meta, el objetivo, el destino o el valor específico
        que una acción, proceso o dispositivo pretende alcanzar, lograr o afectar.
    structured_aliases:
      - literal_form: Doel
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Ziel
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Cible
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: هدف
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Target
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 目标
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Objetivo
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - is_or_was_temperature_target
    annotations:
      custodian_types: '["*"]'
