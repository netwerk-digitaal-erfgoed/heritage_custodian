# ==============================================================================
# LinkML Slot Definition: allocate
# ==============================================================================
# Distribution of resources, signifiers, or duties for specific purposes.
# Used for organizational resource management in heritage institutions.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property               | File/Line         | Mapping | Notes                                    |
# |--------------|------------------------|-------------------|---------|------------------------------------------|
# | **PROV-O**   | `prov:generated`       | prov.ttl:579-591  | close   | "Entity generated by activity." Resource |
# |              |                        |                   |         | creation/allocation aspect.              |
# | **PROV-O**   | `prov:used`            | prov.ttl:1039-1053| close   | "Entity used by Activity." Resource      |
# |              |                        |                   |         | consumption aspect.                      |
# | **W3C Org**  | `org:hasUnit`          | org.rdf:510-528   | related | "Unit which is part of Organization."    |
# |              |                        |                   |         | Organizational structure allocation.     |
# | **CIDOC-CRM**| `crm:P14_carried_out_by`| CIDOC_CRM:1489-1503| related | "Active participation of Actor in        |
# |              |                        |                   |         | Activity." Resource assignment.          |
# | **Schema.org**| `schema:owns`         | schemaorg.owl     | narrow  | Ownership of products/services.          |
#
# CREATED: 2026-01-26
# UPDATED: 2026-02-02 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/allocate
name: allocate
title: allocate

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  org: http://www.w3.org/ns/org#

imports:
  - linkml:types

default_prefix: hc

slots:
  allocate:
    slot_uri: hc:allocate
    description: >-
      To distribute resources, signifiers, or duties for a specific purpose.
    alt_descriptions:
      nl: >-
        Middelen, aanduidingen of taken verdelen voor een specifiek doel.
      de: >-
        Ressourcen, Kennzeichen oder Pflichten für einen bestimmten Zweck verteilen.
      fr: >-
        Distribuer des ressources, des signifiants ou des devoirs pour un but spécifique.
      ar: >-
        توزيع الموارد أو المعرفات أو الواجبات لغرض محدد.
      id: >-
        Mendistribusikan sumber daya, penanda, atau tugas untuk tujuan tertentu.
      zh: >-
        为特定目的分配资源、标识符或职责。
      es: >-
        Distribuir recursos, identificadores o deberes para un propósito específico.
    range: uriorcurie
    multivalued: true
    inlined: false
    close_mappings:
      - prov:generated
      - prov:used
    related_mappings:
      - org:hasUnit
      - org:hasSite
      - crm:P14_carried_out_by
      - crm:E79_Part_Addition
      - prov:wasAssociatedWith
      - dcterms:isPartOf
    narrow_mappings:
      - schema:owns
    aliases:
      - allocates_or_allocated
      - assigns
      - distributes
      - is_or_was_allocate
    structured_aliases:
      - literal_form: wijst toe
        predicate: EXACT_SYNONYM
      - literal_form: is_or_was_allocate
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: weist zu
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: alloue
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يخصص
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: mengalokasikan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 分配
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: asigna
        predicate: EXACT_SYNONYM
        in_language: es
    examples:
      - value: "hc:BudgetAllocation2024"
        description: Annual budget distribution to departments
      - value: "hc:StaffAssignment"
        description: Personnel allocation to projects
      - value: "hc:StorageAllocation"
        description: Physical storage space distribution
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.5
      specificity_rationale: Resource allocation applies across all custodian types.
    comments:
      - |
        **USAGE**:
        Used for:
        - Budget and funding distribution
        - Staff and personnel assignment
        - Storage and space allocation
        - Identifier assignment
        - Task and responsibility distribution
      - |
        **RESOURCE TYPES**:
        - Financial resources (budgets, grants)
        - Human resources (staff, volunteers)
        - Physical resources (space, equipment)
        - Digital resources (storage, identifiers)
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):

        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | **PROV-O** | `prov:generated` | 579-591 | close | Entity generated by activity |
        | **PROV-O** | `prov:used` | 1039-1053 | close | Entity used by activity |
        | **W3C Org** | `org:hasUnit` | 510-528 | related | Organizational unit structure |
        | **CIDOC-CRM** | `crm:P14_carried_out_by` | 1489-1503 | related | Actor participation |
        | **Schema.org** | `schema:owns` | - | narrow | Ownership relation |
