# ==============================================================================
# LinkML Slot Definition: amended_with
# ==============================================================================
# Indicates the document, record, or instrument that modifies or supplements
# the original content.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **PROV-O**    | `prov:wasRevisionOf`  | prov.ttl:1225-1230         | close   | "Derivation that revises entity"   |
# | **DC Terms**  | `dcterms:replaces`    | dcterms.rdf                | close   | Successor relationship             |
# | **Schema.org**| `schema:version`      | schemaorg.owl              | related | Version information                |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added header, multilingual, fixed description
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/amended_with
name: amended_with
title: Amended With

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  amended_with:
    slot_uri: hc:amendedWith
    description: >-
      To be modified, revised, or supplemented by a specific document, record,
      or instrument that alters or adds to the original content.
    alt_descriptions:
      nl: >-
        Gewijzigd, herzien of aangevuld door een specifiek document, record of
        instrument dat de oorspronkelijke inhoud wijzigt of aanvult.
      de: >-
        Durch ein bestimmtes Dokument, einen Datensatz oder ein Instrument geändert,
        überarbeitet oder ergänzt, das den ursprünglichen Inhalt verändert oder ergänzt.
      fr: >-
        Être modifié, révisé ou complété par un document, un enregistrement ou un
        instrument spécifique qui modifie ou ajoute au contenu original.
      ar: >-
        أن يتم تعديله أو مراجعته أو استكماله بواسطة وثيقة أو سجل أو صك محدد
        يغير أو يضيف إلى المحتوى الأصلي.
      id: >-
        Dimodifikasi, direvisi, atau dilengkapi oleh dokumen, catatan, atau
        instrumen tertentu yang mengubah atau menambah konten asli.
      zh: >-
        被特定文件、记录或文书修改、修订或补充，以更改或添加原始内容。
      es: >-
        Ser modificado, revisado o complementado por un documento, registro o
        instrumento específico que altera o añade al contenido original.
    structured_aliases:
      - literal_form: gewijzigd met
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: geändert mit
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: amendé avec
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: معدل بـ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: diamandemen dengan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 修订为
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: enmendado con
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_amendment_history
    close_mappings:
      - prov:wasRevisionOf  # prov.ttl:1225-1230 - "derivation that revises an entity"
      - dcterms:replaces  # Successor relationship
    related_mappings:
      - schema:version  # Version information
    comments:
      - |
        **USAGE**: Provides narrative history of changes to articles.
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Applicable to all heritage custodian types.
      custodian_types_primary: M
      specificity_score: 0.5
      specificity_rationale: Moderately specific slot.
