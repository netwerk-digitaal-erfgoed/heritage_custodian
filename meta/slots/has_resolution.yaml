# ==============================================================================
# LinkML Slot Definition: has_resolution
# ==============================================================================
# The final outcome, decision, or level of detail of a digital representation.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# No standard ontology match found. Dual-meaning concept covering both
# decision/outcome resolution and digital image/signal resolution.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_resolution
name: has_resolution
title: Has Resolution
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_resolution:
    slot_uri: hc:hasResolution
    description: >-
      To specify the final outcome, decision, or solution that settles a problem, inquiry, or formal proposal; or to specify the level of detail, sharpness, or clarity of a digital representation.
    alt_descriptions:
      nl: >-
        Om het uiteindelijke resultaat, de beslissing of de oplossing te specificeren die een probleem, onderzoek of formeel voorstel beslecht; of om het detailniveau, de scherpte of helderheid van een digitale representatie te specificeren.
      de: >-
        Um das endgültige Ergebnis, die Entscheidung oder die Lösung anzugeben, die ein Problem, eine Anfrage oder einen formellen Vorschlag beilegt; oder um den Detailgrad, die Schärfe oder Klarheit einer digitalen Darstellung anzugeben.
      fr: >-
        Pour spécifier le résultat final, la décision ou la solution qui règle un problème, une enquête ou une proposition formelle; ou pour spécifier le niveau de détail, la netteté ou la clarté d'une représentation numérique.
      ar: >-
        لتحديد النتيجة النهائية أو القرار أو الحل الذي يسوي مشكلة أو استفسارًا أو اقتراحًا رسميًا؛ أو لتحديد مستوى التفصيل أو الحدة أو الوضوح لتمثيل رقمي.
      id: >-
        Untuk menentukan hasil akhir, keputusan, atau solusi yang menyelesaikan masalah, pertanyaan, atau proposal formal; atau untuk menentukan tingkat detail, ketajaman, atau kejelasan representasi digital.
      zh: >-
        用于指定解决问题、查询或正式提案的最终结果、决定或解决方案；或用于指定数字表示的细节程度、锐度或清晰度。
      es: >-
        Para especificar el resultado final, la decisión o la solución que resuelve un problema, consulta o propuesta formal; o para especificar el nivel de detalle, nitidez o claridad de una representación digital.
    structured_aliases:
      - literal_form: Resolutie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Aufloesung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Resolution
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: دقة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Resolusi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 分辨率
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Resolucion
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_resolution
      - spatial_resolution
    annotations:
      custodian_types: '["*"]'
