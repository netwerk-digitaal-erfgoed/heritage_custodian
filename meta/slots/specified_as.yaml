# ==============================================================================
# LinkML Slot Definition: specified_as
# ==============================================================================
# Indicates the precision level of a place reference (building, street, city...).
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property                          | File/Line                          | Mapping | Notes                                                                               |
# |--------------|-----------------------------------|------------------------------------|---------|--------------------------------------------------------------------------------------|
# | **CRM**      | `crm:P2_has_type`                 | CIDOC_CRM_v7.1.3.rdf:1200-1215    | broad   | "Sub-typing through a terminological hierarchy." Entity→Type. Generic typing.       |
# | **DQV**      | `dqv:precision`                   | dqv.ttl:184-186                    | related | "The recorded level of details. Exactness of a measurement or description."         |
# |              |                                   |                                    |         | Quality dimension, not a property for assignment. Conceptually related.             |
# | **DCAT**     | `dcat:spatialResolutionInMeters`  | dcat3.ttl:1615-1640                | related | "Minimum spatial separation resolvable in a dataset, measured in meters."           |
# |              |                                   |                                    |         | Numeric spatial resolution, not categorical place specificity.                      |
#
# No standard ontology defines a categorical place specificity/granularity
# property. The concept is domain-specific: classifying how precisely a place
# reference identifies a location (building vs. street vs. city vs. region).
#
# NOTE: The original file contained a narrow_mapping to gn:featureClass
# (GeoNames). This has been removed because no GeoNames ontology file exists
# in data/ontology/ for verification (zero tolerance for unverifiable mappings).
#
# CREATED: 2026-02-07
# UPDATED: 2026-02-10
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/specified_as
name: specified_as
title: Specified As
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  dqv: http://www.w3.org/ns/dqv#
  dcat: http://www.w3.org/ns/dcat#
imports:
  - linkml:types
default_prefix: hc
slots:
  specified_as:
    slot_uri: hc:specifiedAs
    description: >-
      Indicates how precisely a place reference identifies a location, using a
      categorical specificity level. Values range from exact building
      identification to vague or unspecified references, enabling consistent
      recording of geographic precision across heritage records.
    alt_descriptions:
      nl: >-
        Geeft aan hoe nauwkeurig een plaatsverwijzing een locatie identificeert,
        met behulp van een categorisch specificatieniveau.
      de: >-
        Gibt an, wie genau eine Ortsangabe einen Standort identifiziert, unter
        Verwendung eines kategorischen Genauigkeitsniveaus.
      fr: >-
        Indique avec quelle précision une référence de lieu identifie un
        emplacement, en utilisant un niveau de spécificité catégorique.
      ar: >-
        يشير إلى مدى دقة إشارة المكان في تحديد الموقع، باستخدام مستوى تحديد
        تصنيفي.
      id: >-
        Menunjukkan seberapa tepat referensi tempat mengidentifikasi lokasi,
        menggunakan tingkat spesifisitas kategorikal.
      zh: >-
        指示地点引用识别位置的精确程度，使用分类的具体性级别。
      es: >-
        Indica con qué precisión una referencia de lugar identifica una
        ubicación, utilizando un nivel de especificidad categórico.
    structured_aliases:
      - literal_form: gespecificeerd als
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: spezifiziert als
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: spécifié comme
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: محدد كـ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: ditentukan sebagai
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 指定为
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: especificado como
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    required: false
    broad_mappings:
      - crm:P2_has_type  # CIDOC_CRM_v7.1.3.rdf:1200-1215 - "Sub-typing through terminological hierarchy." generic typing mechanism
    related_mappings:
      - dqv:precision  # dqv.ttl:184-186 - "Recorded level of details. Exactness of a measurement or description."
      - dcat:spatialResolutionInMeters  # dcat3.ttl:1615-1640 - "Minimum spatial separation resolvable in a dataset." numeric, not categorical
    aliases:
      - place_specificity
    examples:
      - value: "BUILDING"
        description: "Specific building identified (e.g. 'Rijksmuseum, Amsterdam')"
      - value: "STREET"
        description: "Street-level precision (e.g. 'Museumstraat, Amsterdam')"
      - value: "NEIGHBORHOOD"
        description: "Neighborhood or district level (e.g. 'Museumplein area')"
      - value: "CITY"
        description: "City-level precision (e.g. 'Amsterdam')"
      - value: "REGION"
        description: "Regional precision (e.g. 'North Holland')"
      - value: "VAGUE"
        description: "Unspecified or imprecise reference (e.g. 'the old mansion')"
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Recommended values: BUILDING, STREET, NEIGHBORHOOD, CITY, REGION, VAGUE.
        Use standardized values for consistent querying across datasets.
      - >-
        The original schema included a commented-out range of PlaceSpecificityEnum
        and an import of ../enums/PlaceSpecificityEnum, suggesting future
        evolution toward an enum-constrained range.
      - >-
        A previous narrow_mapping to gn:featureClass (GeoNames) was removed
        because the GeoNames ontology file is not available in data/ontology/
        for verification. If a verified GeoNames ontology is added later, this
        mapping could be reconsidered as a related or narrow mapping.
