# ==============================================================================
# LinkML Slot Definition: analyze
# ==============================================================================
# Detailed examination of constitution or structure for explanation and
# interpretation. Used for research and processing activities.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology     | Property                       | File/Line         | Mapping | Notes                                    |
# |--------------|--------------------------------|-------------------|---------|------------------------------------------|
# | **SOSA**     | `sosa:observes`                | sosa.ttl          | close   | Sensor observes observable property.     |
# | **SOSA**     | `sosa:Observation`             | sosa.ttl          | related | Act of observing a property (Class).     |
# | **SOSA**     | `sosa:Procedure`               | sosa.ttl          | related | Workflow or protocol for observation.    |
# | **SOSA**     | `sosa:observedProperty`        | sosa.ttl          | related | Property being observed.                 |
# | **SOSA**     | `sosa:hasResult`               | sosa.ttl          | related | Result of observation.                   |
# | **SOSA**     | `sosa:Result`                  | sosa.ttl          | related | Result class.                            |
# | **SOSA**     | `sosa:madeObservation`         | sosa.ttl          | narrow  | Sensor made specific observation.        |
# | **PROV-O**   | `prov:wasGeneratedBy`          | prov.ttl          | related | Entity generated by activity.            |
# | **PROV-O**   | `prov:used`                    | prov.ttl:1039-1053| related | Activity used entity (analysis input).   |
# | **PROV-O**   | `prov:Activity`                | prov.ttl:53-63    | broad   | General activity class (broader).        |
# | **CIDOC-CRM**| `crm:E13_Attribute_Assignment` | CIDOC_CRM         | related | Assigning attributes through analysis.   |
# | **CIDOC-CRM**| `crm:E83_Type_Creation`        | CIDOC_CRM         | related | Creating types through analysis.         |
# | **CIDOC-CRM**| `crm:P140_assigned_attribute_to`| CIDOC_CRM        | narrow  | Specific attribute assignment property.  |
# | **DQV**      | `dqv:hasQualityMeasurement`    | dqv.ttl           | related | Quality measurement from analysis.       |
#
# CREATED: 2026-01-26
# UPDATED: 2026-02-02 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/analyze
name: analyze
title: analyze

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  sosa: http://www.w3.org/ns/sosa/
  dqv: http://www.w3.org/ns/dqv#

imports:
  - linkml:types

default_prefix: hc

slots:
  analyze:
    slot_uri: hc:analyze
    description: >-
      To examine in detail the constitution or structure of something,
      typically for purposes of explanation and interpretation.
    alt_descriptions:
      nl: >-
        De samenstelling of structuur van iets in detail onderzoeken,
        doorgaans met het oog op uitleg en interpretatie.
      de: >-
        Die Zusammensetzung oder Struktur von etwas im Detail untersuchen,
        typischerweise zum Zweck der Erklärung und Interpretation.
      fr: >-
        Examiner en détail la constitution ou la structure de quelque chose,
        généralement à des fins d'explication et d'interprétation.
      ar: >-
        فحص تكوين أو هيكل شيء ما بالتفصيل، عادةً لأغراض الشرح والتفسير.
      id: >-
        Memeriksa secara rinci susunan atau struktur sesuatu, biasanya
        untuk tujuan penjelasan dan interpretasi.
      zh: >-
        详细检查某事物的构成或结构，通常用于解释和诠释目的。
      es: >-
        Examinar en detalle la constitución o estructura de algo,
        típicamente con fines de explicación e interpretación.
    range: string
    any_of:
      - range: integer
      - range: VideoFrame
    multivalued: true
    inlined: false
    close_mappings:
      - sosa:observes
    related_mappings:
      - sosa:Observation
      - sosa:Procedure
      - sosa:observedProperty
      - sosa:hasResult
      - sosa:Result
      - prov:wasGeneratedBy
      - prov:used
      - crm:E13_Attribute_Assignment
      - crm:E83_Type_Creation
      - dqv:hasQualityMeasurement
    narrow_mappings:
      - sosa:madeObservation
      - crm:P140_assigned_attribute_to
    broad_mappings:
      - prov:Activity
    aliases:
      - analyzes_or_analyzed
      - analyse
      - examines
      - studies
      - is_or_was_analyze
      - measurement_data
    structured_aliases:
      - literal_form: analyseert
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: analysiert
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: analyse
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يحلل
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: menganalisis
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 分析
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: analiza
        predicate: EXACT_SYNONYM
        in_language: es
    examples:
      - value: 24000
        description: Total video frames analyzed (integer count)
      - value: |
          has_or_had_quantity:
            quantity_value: 1.0
            quantity_type: FRAME_SAMPLE_RATE
            has_or_had_unit:
              unit_value: "samples per second"
          frame_count: 1800
        description: Video frame analysis at 1 fps (VideoFrame instance)
    annotations:
      custodian_types: '["*"]'
      specificity_score: 0.6
      specificity_rationale: Research and processing activity across all types.
    comments:
      - |
        **USAGE**:
        Used for research and processing activities:
        - Video frame analysis
        - Document analysis
        - Collection item processing
        - Quality assessment
        - Scientific examination
      - |
        **SOSA (Sensor, Observation, Sample, Actuator)**:
        Maps to SOSA observation model:
        - `sosa:observes` - What is being observed
        - `sosa:Observation` - The observation act
        - `sosa:hasResult` - Result of observation
      - |
        **MIGRATION SUPPORT**:
        This slot supports VideoFrame class for frame_sample_rate migration
        per slot_fixes.yaml (Rule 53, 2026-01-22).
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):

        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | **SOSA** | `sosa:observes` | - | close | Observation relation |
        | **SOSA** | `sosa:Observation` | - | related | Observation class |
        | **PROV-O** | `prov:used` | 1039-1053 | related | Analysis input |
        | **CIDOC-CRM** | `crm:E13_Attribute_Assignment` | - | related | Attribute assignment |
        | **DQV** | `dqv:hasQualityMeasurement` | - | related | Quality measurement |
