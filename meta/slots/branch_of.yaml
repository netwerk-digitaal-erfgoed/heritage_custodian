# ==============================================================================

id: https://nde.nl/ontology/hc/slot/branch_of
name: branch_of
title: Branch Of

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  branch_of:
    slot_uri: org:subOrganizationOf
    description: >-
      A local office, subsidiary division, or administrative unit of a larger
      parent organization, operating at a different location but under the
      same governance structure.
    alt_descriptions:
      nl: >-
        Een lokaal kantoor, ondergeschikte divisie of administratieve eenheid
        van een grotere moederorganisatie, werkzaam op een andere locatie maar
        onder dezelfde bestuursstructuur.
      de: >-
        Ein lokales Büro, eine Tochterdivision oder Verwaltungseinheit einer
        größeren Mutterorganisation, die an einem anderen Standort tätig ist,
        aber unter derselben Governance-Struktur steht.
      fr: >-
        Un bureau local, une division subsidiaire ou une unité administrative
        d'une organisation mère plus grande, opérant dans un lieu différent
        mais sous la même structure de gouvernance.
      ar: >-
        مكتب محلي أو قسم فرعي أو وحدة إدارية لمنظمة أم أكبر، تعمل في موقع
        مختلف ولكن تحت نفس هيكل الحوكمة.
      id: >-
        Kantor lokal, divisi anak perusahaan, atau unit administratif dari
        organisasi induk yang lebih besar, beroperasi di lokasi berbeda
        tetapi di bawah struktur tata kelola yang sama.
      zh: >-
        较大母组织的地方办事处、子公司部门或行政单位，在不同地点运营但在相同的治理结构下。
      es: >-
        Una oficina local, división subsidiaria o unidad administrativa de una
        organización matriz más grande, que opera en una ubicación diferente
        pero bajo la misma estructura de gobierno.
    structured_aliases:
      - literal_form: vestiging van
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Zweigstelle von
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: succursale de
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: فرع من
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: cabang dari
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 隶属于
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: sucursal de
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    multivalued: false
    exact_mappings:
    aliases:
      - is_or_was_branch_of
      - is_branch_of_authority
      - is_branch_of
    annotations:
      custodian_types: '["*"]'
