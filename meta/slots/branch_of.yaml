# ==============================================================================
# LinkML Slot Definition: branch_of
# ==============================================================================
# Parent organization this entity is a branch of.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                 | File/Line          | Mapping | Notes                              |
# |---------------|--------------------------|--------------------|---------|------------------------------------|
# | **W3C Org**   | `org:subOrganizationOf`  | org.rdf:663-681    | exact   | "Hierarchical containment"         |
