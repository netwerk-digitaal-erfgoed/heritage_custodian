# ==============================================================================
# LinkML Slot Definition: has_ratio
# ==============================================================================
# A proportional relationship between two amounts, dimensions, or quantities,
# commonly used for signal-to-noise ratio (SNR) in audio preservation.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology   | Property               | File/Line                            | Mapping | Notes                                                          |
# |------------|------------------------|--------------------------------------|---------|----------------------------------------------------------------|
# | **CIDOC**  | `crm:P43_has_dimension`| CIDOC_CRM_v7.1.3.rdf:2242-2257      | broad   | "has dimension" E70_Thing→E54_Dimension. Generic measurable.   |
# | **Schema** | `schema:bitrate`       | schemaorg.owl:10140-10158            | related | "bitrate" MediaObject→Text. Different AV technical metric.     |
#
# CREATED: 2026-02-12
# UPDATED: 2026-02-12
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/has_ratio
name: has_ratio
title: Has Ratio
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_ratio:
    slot_uri: hc:hasRatio
    description: >-
      The proportional relationship between two amounts, dimensions, or
      quantities. In the heritage-custodian domain this is most commonly
      used for signal-to-noise ratio (SNR) measurements on audio carriers,
      expressed in decibels (dB).
    alt_descriptions:
      nl: >-
        De verhoudingswaarde die de proportionele relatie tussen twee
        hoeveelheden, dimensies of grootheden uitdrukt, zoals een
        signaal-ruisverhouding.
      de: >-
        Der Verhältniswert, der die proportionale Beziehung zwischen zwei
        Mengen, Dimensionen oder Größen ausdrückt, beispielsweise ein
        Signal-Rausch-Verhältnis.
      fr: >-
        La valeur de ratio exprimant la relation proportionnelle entre deux
        quantités, dimensions ou grandeurs, telle qu'un rapport
        signal-sur-bruit.
      ar: >-
        قيمة النسبة التي تعبر عن العلاقة التناسبية بين كميتين أو بعدين
        أو مقدارين، مثل نسبة الإشارة إلى الضوضاء.
      id: >-
        Nilai rasio yang menyatakan hubungan proporsional antara dua jumlah,
        dimensi, atau besaran, seperti rasio sinyal terhadap kebisingan.
      zh: >-
        表示两个数量、维度或量之间比例关系的比值，例如信噪比。
      es: >-
        El valor de proporción que expresa la relación proporcional entre dos
        cantidades, dimensiones o magnitudes, como una relación señal-ruido.
    structured_aliases:
      - literal_form: verhoudingswaarde
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Verhältniswert
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: ratio
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: نسبة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: rasio
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 比值
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: proporción
        predicate: EXACT_SYNONYM
        in_language: es
    range: float
    broad_mappings:
      - crm:P43_has_dimension  # CIDOC_CRM_v7.1.3.rdf:2242-2257 - "has dimension" E70_Thing→E54_Dimension
    related_mappings:
      - schema:bitrate  # schemaorg.owl:10140-10158 - "bitrate" MediaObject→Text; different AV technical metric
    aliases:
      - snr_db
    examples:
      - value: "35.2"
        description: >-
          Signal-to-noise ratio of 35.2 dB, indicating excellent audio quality.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Commonly used for signal-to-noise ratio (SNR) in audio preservation.
        Quality scale for SNR in dB: greater than 30 dB is excellent,
        20-30 dB is good, 10-20 dB is acceptable, less than 10 dB is poor
        (speech intelligibility affected).
