# ==============================================================================
# LinkML Slot Definition: has_policy
# ==============================================================================
# A principle, rule, guideline, or course of action adopted to guide decisions.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                      | File/Line                | Mapping  | Notes                                              |
# |---------------|-------------------------------|--------------------------|----------|----------------------------------------------------|
# | **Schema.org**| `schema:publishingPrinciples` | schemaorg.owl:31756-31761| related  | Editorial/publishing principles only, not general policy. |
#
# CREATED: 2026-02-07
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_policy
name: has_policy
title: Has Policy
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_policy:
    slot_uri: hc:hasPolicy
    description: >-
      To specify a principle, rule, guideline, or course of action adopted by an organization or individual to guide decisions and achieve rational outcomes.
    alt_descriptions:
      nl: >-
        Het specificeren van een principe, regel, richtlijn of gedragslijn die door een
        organisatie of individu wordt gehanteerd om beslissingen te sturen en rationele
        uitkomsten te bereiken.
      de: >-
        Zur Angabe eines Prinzips, einer Regel, Richtlinie oder Handlungsweise, die von
        einer Organisation oder Einzelperson angenommen wird, um Entscheidungen zu leiten
        und rationale Ergebnisse zu erzielen.
      fr: >-
        Spécifier un principe, une règle, une directive ou une ligne de conduite adoptée
        par une organisation ou un individu pour guider les décisions et atteindre des
        résultats rationnels.
      ar: >-
        لتحديد مبدأ أو قاعدة أو توجيه أو مسار عمل تتبناه منظمة أو فرد لتوجيه القرارات
        وتحقيق نتائج رشيدة.
      id: >-
        Untuk menentukan prinsip, aturan, pedoman, atau arah tindakan yang diadopsi oleh
        organisasi atau individu untuk memandu keputusan dan mencapai hasil yang rasional.
      zh: >-
        指定由组织或个人采纳的原则、规则、指导方针或行动方针，以指导决策并实现合理的结果。
      es: >-
        Especificar un principio, regla, directriz o curso de acción adoptado por una
        organización o individuo para guiar decisiones y lograr resultados racionales.
    structured_aliases:
      - literal_form: Beleid
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Richtlinie
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Politique
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: سياسة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Kebijakan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 政策
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Política
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_policy
      - lending_policy
    related_mappings:
      - schema:publishingPrinciples  # schemaorg.owl:31756-31761 - "document describing the editorial principles of an Organization... that relate to their activities as a publisher." Much narrower: publishing/editorial principles only, not general institutional policy.
    annotations:
      custodian_types: '["*"]'
