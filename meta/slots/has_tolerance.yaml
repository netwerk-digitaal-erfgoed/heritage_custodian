id: https://nde.nl/ontology/hc/slot/has_tolerance
name: has_tolerance
title: has_tolerance
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_tolerance:
    name: has_tolerance
    title: has_tolerance
    description: >-
      The permissible limit of variation or the range within which a specified
      proportion of a population is expected to lie with a certain confidence level.
    alt_descriptions:
      nl: >-
        De toelaatbare limiet van variatie of het bereik waarbinnen een bepaald
        deel van een populatie met een bepaald betrouwbaarheidsniveau verwacht
        wordt te liggen.
      de: >-
        Die zulässige Abweichungsgrenze oder der Bereich, innerhalb dessen ein
        bestimmter Anteil einer Population mit einem bestimmten Konfidenzniveau
        erwartet wird.
      fr: >-
        La limite admissible de variation ou la plage dans laquelle une proportion
        spécifiée d'une population est censée se situer avec un certain niveau
        de confiance.
      ar: >-
        الحد المسموح به من التباين أو النطاق الذي يُتوقع أن تقع فيه نسبة
        محددة من مجتمع إحصائي بمستوى ثقة معين.
      id: >-
        Batas variasi yang diizinkan atau rentang di mana proporsi tertentu dari
        suatu populasi diharapkan berada dengan tingkat kepercayaan tertentu.
      zh: >-
        允许的变化限度或在一定置信水平下预期特定比例的总体所处的范围。
      es: >-
        El límite permisible de variación o el rango dentro del cual se espera
        que se encuentre una proporción especificada de una población con un
        cierto nivel de confianza.
    structured_aliases:
      - literal_form: Tolerantie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Toleranz
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Tolérance
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: تسامح
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Toleransi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 容差
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Tolerancia
        predicate: EXACT_SYNONYM
        in_language: es
    slot_uri: hc:hasTolerance
    range: string
    aliases:
      - has_or_had_tolerance
    annotations:
      custodian_types: '["*"]'
