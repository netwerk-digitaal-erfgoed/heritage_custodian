# ==============================================================================
# LinkML Slot Definition: organized_as
# ==============================================================================
# Structural framework, classification system, or methodology used to arrange entities
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology  | Property             | File/Line                | Mapping | Notes                                                        |
# |-----------|----------------------|--------------------------|---------|--------------------------------------------------------------|
# | **RiC-O** | `rico:structure`     | RiC-O_1-1.rdf:23182-23200 | related | DatatypeProperty about arrangement/composition of Records.   |
# | **ORG**   | `org:classification`  | org.rdf:371-386          | related | Classification of Organization within a scheme.              |
#
# No standard exact match found. rico:hasOrHadOrganizationalPrinciple does NOT exist in RiC-O.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/organized_as
name: organized_as
title: Organized As
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  org: http://www.w3.org/ns/org#
imports:
  - linkml:types
default_prefix: hc
slots:
  organized_as:
    slot_uri: hc:organizedAs
    description: >-
      Describes the specific structural framework, classification system, or methodology
      used to arrange, group, or order entities, documents, or groups (e.g., an archive
      organized as a chronological series, or a company organized as a hierarchy).
    alt_descriptions:
      nl: >-
        Beschrijft het specifieke structurele raamwerk, classificatiesysteem of de methodologie
        die wordt gebruikt om entiteiten, documenten of groepen te rangschikken, groeperen of
        ordenen (bijv. een archief georganiseerd als een chronologische reeks, of een bedrijf
        georganiseerd als een hierarchie).
      de: >-
        Beschreibt den spezifischen strukturellen Rahmen, das Klassifikationssystem oder die
        Methodik, die verwendet wird, um Entitaeten, Dokumente oder Gruppen anzuordnen,
        zu gruppieren oder zu ordnen (z.B. ein Archiv organisiert als chronologische Reihe
        oder ein Unternehmen organisiert als Hierarchie).
      fr: >-
        Decrit le cadre structurel specifique, le systeme de classification ou la methodologie
        utilise pour organiser, regrouper ou ordonner des entites, des documents ou des groupes
        (par ex. des archives organisees en serie chronologique ou une entreprise organisee
        en hierarchie).
      ar: >-
        يصف الإطار الهيكلي المحدد أو نظام التصنيف أو المنهجية المستخدمة لترتيب أو تجميع أو
        تنظيم الكيانات أو الوثائق أو المجموعات (مثل أرشيف منظم كسلسلة زمنية أو شركة منظمة
        كتسلسل هرمي).
      id: >-
        Menjelaskan kerangka struktural spesifik, sistem klasifikasi, atau metodologi yang
        digunakan untuk mengatur, mengelompokkan, atau mengurutkan entitas, dokumen, atau
        kelompok (misalnya arsip yang diorganisasi sebagai seri kronologis, atau perusahaan
        yang diorganisasi sebagai hierarki).
      zh: >-
        描述用于排列、分组或排序实体、文档或群组的特定结构框架、分类系统或方法论（例如，按时间顺序系列组织的档案，或按层级结构组织的公司）。
      es: >-
        Describe el marco estructural especifico, el sistema de clasificacion o la metodologia
        utilizada para organizar, agrupar u ordenar entidades, documentos o grupos (por ejemplo,
        un archivo organizado como una serie cronologica o una empresa organizada como una
        jerarquia).
    structured_aliases:
      - literal_form: Organisatiestructuur
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Organisationsstruktur
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Structure organisationnelle
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: Haikal tanzimi
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Struktur organisasi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: Zuzhi jiegou
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Estructura organizativa
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    required: false
    comments:
      - "rico:hasOrHadOrganizationalPrinciple does not exist in RiC-O - use hc namespace."
    annotations:
      custodian_types: '["*"]'
    related_mappings:
      - rico:structure  # RiC-O_1-1.rdf:23182-23200 - DatatypeProperty about arrangement/composition of Record Resources/Instantiations
      - org:classification  # org.rdf:371-386 - Classification for an Organization within a scheme; about classifying orgs, not organizational structure
    aliases:
      - organizedAs
