# ==============================================================================
# LinkML Slot Definition: contains_collection
# ==============================================================================
# Collections housed within a closed space or container.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                    | File/Line              | Mapping | Notes                              |
# |---------------|-----------------------------|------------------------|---------|------------------------------------|
# | **RiC-O**     | `rico:containsOrContained`  | RiC-O_1-1.rdf:2002-2043| close   | Spatial containment                |
# | **Schema.org**| `schema:hasPart`            | schemaorg.owl          | broad   | General part-whole                 |
# | **DC Terms**  | `dcterms:hasPart`           | dcterms.rdf            | broad   | Physical/logical inclusion         |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, cleaned description, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/contain_collection
name: contain_collection
title: Contain Collection

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  contain_collection:
    slot_uri: hc:containCollection
    description: >-
      The collections that are housed, stored, or contained within this
      closed space, building, or container.
    alt_descriptions:
      nl: >-
        De collecties die zijn gehuisvest, opgeslagen of bevat in deze
        afgesloten ruimte, gebouw of container.
      de: >-
        Die Sammlungen, die in diesem geschlossenen Raum, Gebäude oder
        Behälter untergebracht, gelagert oder enthalten sind.
      fr: >-
        Les collections qui sont hébergées, stockées ou contenues dans cet
        espace clos, bâtiment ou conteneur.
      ar: >-
        المجموعات المُستضافة أو المُخزنة أو الموجودة في هذا المكان
        المغلق أو المبنى أو الحاوية.
      id: >-
        Koleksi yang ditempatkan, disimpan, atau terkandung dalam ruang
        tertutup, bangunan, atau wadah ini.
      zh: >-
        在此封闭空间、建筑物或容器中收藏、存储或包含的藏品。
      es: >-
        Las colecciones que están alojadas, almacenadas o contenidas en este
        espacio cerrado, edificio o contenedor.
    structured_aliases:
      - literal_form: bevat collectie
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: enthält Sammlung
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: contient collection
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يحتوي على مجموعة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: berisi koleksi
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 包含收藏
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: contiene colección
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    multivalued: true
    close_mappings:
      - rico:containsOrContained  # RiC-O spatial containment
    broad_mappings:
      - schema:hasPart  # General part-whole (more general than spatial containment)
      - dcterms:hasPart  # Physical/logical inclusion (more general than spatial containment)
    aliases:
      - contains_or_contained_collection
      - has_or_had_collection_url
      - has_collection_url
    annotations:
      custodian_types: '["*"]'
    comments:
      - |
        **MIGRATION NOTE (2026-02-03)**:
        Migrated from contains_or_contained_collection for conciseness.
