id: https://nde.nl/ontology/hc/slot/has_segment
name: has_segment
title: Has Segment
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
- linkml:types
slots:
  has_segment:
    slot_uri: hc:hasSegment
    description: >-
      To specify a portion, division, or fragment of a larger entity or group that shares
      common characteristics or is defined by specific boundaries.
    alt_descriptions:
      nl: >-
        Om een deel, afdeling of fragment van een grotere entiteit of groep aan te geven
        dat gemeenschappelijke kenmerken deelt of door specifieke grenzen is gedefinieerd.
      de: >-
        Um einen Abschnitt, eine Abteilung oder ein Fragment einer größeren Entität oder
        Gruppe anzugeben, die gemeinsame Merkmale aufweist oder durch bestimmte Grenzen
        definiert ist.
      fr: >-
        Pour spécifier une portion, une division ou un fragment d'une entité ou d'un groupe
        plus grand partageant des caractéristiques communes ou défini par des limites
        spécifiques.
      ar: >-
        لتحديد جزء أو قسم أو شظية من كيان أو مجموعة أكبر تشترك في خصائص مشتركة أو محددة
        بحدود معينة.
      id: >-
        Untuk menentukan bagian, divisi, atau fragmen dari entitas atau kelompok yang lebih
        besar yang memiliki karakteristik bersama atau didefinisikan oleh batas-batas tertentu.
      zh: >-
        用于指定较大实体或群组的一部分、分区或片段，该部分具有共同特征或由特定边界定义。
      es: >-
        Para especificar una porción, división o fragmento de una entidad o grupo mayor
        que comparte características comunes o está definido por límites específicos.
    structured_aliases:
      - literal_form: Segment
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Segment
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Segment
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: قطاع
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Segmen
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 分段
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Segmento
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - has_or_had_segment
      - object_segment
    annotations:
      custodian_types: '["*"]'
