# ==============================================================================
# LinkML Slot Definition: has_specimen
# ==============================================================================
# Types of specimens or taxonomic groups held by a natural history institution.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology   | Property                  | File/Line                            | Mapping | Notes                                                               |
# |------------|---------------------------|--------------------------------------|---------|---------------------------------------------------------------------|
# | **Schema** | `schema:hasPart`          | schemaorg.owl:20403-20425            | broad   | "hasPart" CreativeWork→CreativeWork/Text. General part-of.           |
# | **CIDOC**  | `crm:P46_is_composed_of`  | CIDOC_CRM_v7.1.3.rdf:2324-2340      | related | "is composed of" E18→E18. Physical composition, not holdings types. |
#
# CREATED: 2026-02-12
# UPDATED: 2026-02-12
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/has_specimen
name: has_specimen
title: Has Specimen
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_specimen:
    slot_uri: hc:hasSpecimen
    description: >-
      The types of specimens or taxonomic groups held by a heritage
      institution such as a zoo, botanical garden, aquarium, or natural
      history museum. Each value names a broad category of living or
      preserved organisms represented in the institution's collection.
    alt_descriptions:
      nl: >-
        De soorten specimens of taxonomische groepen die worden beheerd
        door een erfgoedinstelling zoals een dierentuin, botanische tuin,
        aquarium of natuurhistorisch museum.
      de: >-
        Die Arten von Exemplaren oder taxonomischen Gruppen, die von einer
        Kulturerbeeinrichtung wie einem Zoo, botanischen Garten, Aquarium
        oder Naturkundemuseum gehalten werden.
      fr: >-
        Les types de spécimens ou de groupes taxonomiques détenus par une
        institution patrimoniale telle qu'un zoo, un jardin botanique, un
        aquarium ou un musée d'histoire naturelle.
      ar: >-
        أنواع العينات أو المجموعات التصنيفية التي تحتفظ بها مؤسسة تراثية
        مثل حديقة حيوان أو حديقة نباتية أو حوض أسماك أو متحف تاريخ
        طبيعي.
      id: >-
        Jenis spesimen atau kelompok taksonomi yang dimiliki oleh lembaga
        warisan budaya seperti kebun binatang, kebun raya, akuarium, atau
        museum sejarah alam.
      zh: >-
        由动物园、植物园、水族馆或自然历史博物馆等遗产机构持有的标本类型或
        分类群。
      es: >-
        Los tipos de especímenes o grupos taxonómicos mantenidos por una
        institución patrimonial como un zoológico, jardín botánico, acuario
        o museo de historia natural.
    structured_aliases:
      - literal_form: specimen
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Exemplar
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: spécimen
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: عينة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: spesimen
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 标本
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: espécimen
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    broad_mappings:
      - schema:hasPart  # schemaorg.owl:20403-20425 - "hasPart" CreativeWork→CreativeWork/Text; general part-of relationship
    related_mappings:
      - crm:P46_is_composed_of  # CIDOC_CRM_v7.1.3.rdf:2324-2340 - "is composed of" E18→E18; physical composition not holdings types
    aliases:
      - specimen_type
    examples:
      - value: mammals
        description: >-
          Primates, carnivores, ungulates, marine mammals — as held by a
          zoo such as Artis.
      - value: vascular plants
        description: >-
          Ferns, gymnosperms, and angiosperms — as held by a botanical
          garden such as Hortus Leiden.
      - value: corals
        description: >-
          Reef-building cnidarians — as held by a marine aquarium.
      - value: butterflies
        description: >-
          Lepidoptera — as held by a butterfly house such as Vlindorado.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Botanical institutions: vascular plants, non-vascular plants (mosses,
        liverworts, hornworts), algae, fungi, cultivars (named plant
        varieties).
      - >-
        Zoological institutions: mammals, birds, reptiles, amphibians, fish,
        invertebrates (insects, arachnids, mollusks, crustaceans).
      - >-
        Aquariums: marine fish, freshwater fish, corals, marine mammals,
        sharks and rays, jellyfish.
      - >-
        Specialised collections: butterflies (butterfly houses), primates
        only (primate centres), raptors (falconry centres), carnivorous
        plants, succulents (cactus and succulent gardens).
