# ==============================================================================
# LinkML Slot Definition: has_architect
# ==============================================================================
# The architect or firm responsible for designing a building or structure.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property        | File/Line        | Mapping | Notes                            |
# |---------------|-----------------|------------------|---------|----------------------------------|
# | (none found)  | -               | -                | -       | GLAM domain-specific architect   |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-03 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_architect
name: has_architect
title: Has Architect

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/

default_prefix: hc

imports:
  - linkml:types

slots:
  has_architect:
    slot_uri: hc:hasArchitect
    description: >-
      The designated architect or architectural firm responsible for the design, planning, 
      and structural conception of a building or structure.
    alt_descriptions:
      nl: >-
        De aangewezen architect of architectenbureau verantwoordelijk voor het ontwerp, 
        de planning en de structurele conceptie van een gebouw of constructie.
      de: >-
        Der bestimmte Architekt oder das Architekturbüro, das für die Gestaltung, Planung 
        und strukturelle Konzeption eines Gebäudes oder Bauwerks verantwortlich ist.
      fr: >-
        L'architecte ou le cabinet d'architecture désigné responsable de la conception, 
        de la planification et de la conception structurelle d'un bâtiment ou d'une structure.
      ar: >-
        المهندس المعماري أو المكتب المعماري المعين المسؤول عن تصميم وتخطيط والتصور 
        الهيكلي لمبنى أو هيكل.
      id: >-
        Arsitek atau firma arsitektur yang ditunjuk yang bertanggung jawab atas desain, 
        perencanaan, dan konsepsi struktural bangunan atau struktur.
      zh: >-
        负责建筑物或结构的设计、规划和结构构思的指定建筑师或建筑事务所。
      es: >-
        El arquitecto o firma de arquitectura designada responsable del diseño, planificación 
        y concepción estructural de un edificio o estructura.
    structured_aliases:
      - literal_form: architect
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Architekt
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: architecte
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مهندس معماري
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: arsitek
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 建筑师
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: arquitecto
        predicate: EXACT_SYNONYM
        in_language: es
    range: uriorcurie
    aliases:
      - has_or_had_architect
    annotations:
      custodian_types: '["*"]'
    comments:
      - |
        **USAGE**: Links heritage buildings to the architects who designed them. May 
        reference Person or Organization entities.
    examples:
      - value: "https://www.wikidata.org/wiki/Q313093"
        description: Reference to Pierre Cuypers, architect of the Rijksmuseum
