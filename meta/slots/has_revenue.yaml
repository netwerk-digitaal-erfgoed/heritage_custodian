# ==============================================================================
# LinkML Slot Definition: has_revenue
# ==============================================================================
# The total income generated from primary operations.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                 | File/Line              | Mapping | Notes                                          |
# |---------------|--------------------------|------------------------|---------|-------------------------------------------------|
# | **Schema.org**| `schema:yearlyRevenue`   | schemaorg.owl:40705-40720| narrow  | "The size of the business in annual revenue."  |
# |               |                          |                        |         | Domain: BusinessAudience. More specific.        |
#
# schema:yearlyRevenue is specific to BusinessAudience and annual period.
# Our slot is a general revenue concept not limited to yearly or audience.
#
# CREATED: 2026-02-08
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_revenue
name: has_revenue
title: Has Revenue
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  has_revenue:
    slot_uri: hc:hasRevenue
    description: >-
      To specify the total amount of income generated by the sale of goods or services related to the company's primary operations.
    alt_descriptions:
      nl: >-
        Om het totale bedrag aan inkomsten te specificeren dat wordt gegenereerd door de verkoop van goederen of diensten gerelateerd aan de primaire activiteiten van het bedrijf.
      de: >-
        Um den Gesamtbetrag der Einnahmen anzugeben, die durch den Verkauf von Waren oder Dienstleistungen im Zusammenhang mit den Hauptgeschäftstätigkeiten des Unternehmens erzielt werden.
      fr: >-
        Pour spécifier le montant total des revenus générés par la vente de biens ou de services liés aux opérations principales de l'entreprise.
      ar: >-
        لتحديد إجمالي مبلغ الدخل الناتج عن بيع السلع أو الخدمات المتعلقة بالعمليات الرئيسية للشركة.
      id: >-
        Untuk menentukan jumlah total pendapatan yang dihasilkan dari penjualan barang atau jasa yang terkait dengan operasi utama perusahaan.
      zh: >-
        用于指定通过销售与公司主要业务相关的商品或服务所产生的总收入金额。
      es: >-
        Para especificar el monto total de ingresos generados por la venta de bienes o servicios relacionados con las operaciones principales de la empresa.
    structured_aliases:
      - literal_form: Omzet
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Umsatz
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: Revenu
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: إيرادات
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: Pendapatan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 收入
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: Ingresos
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    narrow_mappings:
      - schema:yearlyRevenue  # schemaorg.owl:40705-40720 - Yearly + business-specific; this slot is general revenue.
    aliases:
      - has_or_had_revenue
      - revenue_category
    annotations:
      custodian_types: '["*"]'
