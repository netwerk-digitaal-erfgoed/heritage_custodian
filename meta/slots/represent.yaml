    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        This slot is intentionally broad, covering visual depiction (a painting
        represents a scene), symbolic meaning (an emblem represents a value),
        and formal agency (an institution represents an artist). For purely
        visual depiction of physical objects, crm:P138_represents or
        crm:P62_depicts may be more precise.
      - >-
        EDM's edm:isRepresentationOf is a subproperty of crm:P138_represents,
        scoped to information resources representing cultural heritage objects
        in the Europeana context.
