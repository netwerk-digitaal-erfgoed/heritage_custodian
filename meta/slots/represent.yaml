#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology   | Property                  | File/Line              | Mapping | Notes                                                          |
# |------------|---------------------------|------------------------|---------|------------------------------------------------------------|
# | **CIDOC**  | `crm:P138_represents`     | CIDOC:4155-4169        | close   | VisualItem‚ÜíCRMEntity. Visual representation incl. digitisation.|
# | **EDM**    | `edm:isRepresentationOf`  | edm.owl:515-521        | related | InformationResource‚ÜíResource. SubProperty of P138_represents.  |
# | **FOAF**   | `foaf:depicts`            | foaf.ttl:198-206       | related | Image‚ÜíThing. Visual depiction, narrower scope (images only).   |
# | **CIDOC**  | `crm:P62_depicts`         | CIDOC:2649-2661        | related | PhysicalHumanMadeThing‚ÜíCRMEntity. Shortcut of P138 path.      |
# | **Schema** | `schema:about`            | schemaorg.owl:6247-6251| related | "The subject matter of an object." Broader: subject not repr.  |
#
# This slot spans multiple senses of "represent" (visual depiction, symbolic
# meaning, acting on behalf of) which no single external property fully covers.
# Using hc:represent as the slot_uri.
#
# CREATED: 2026-02-02
# UPDATED: 2026-02-11
# ==============================================================================
