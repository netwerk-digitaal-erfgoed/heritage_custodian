# ==============================================================================
# LinkML Slot Definition: has_time_interval
# ==============================================================================
# Associates entities with a continuous span of time characterized by defined
# start and end points, or a duration expressed as a scaled value.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property                      | File/Line               | Mapping | Notes                                            |
# |---------------|-------------------------------|-------------------------|---------|--------------------------------------------------|
# | **OWL Time**  | `time:hasDuration`            | time.ttl:752-759        | exact   | "Duration of a temporal entity, expressed as a   |
# |               |                               |                         |         | scaled value or nominal value."                  |
# | **Schema.org**| `schema:duration`             | schemaorg.owl:15892-920 | close   | "Duration in ISO 8601 format."                   |
# | **CIDOC-CRM** | `crm:P4_has_time-span`        | CIDOC_CRM:1242-1254     | close   | "Associates a temporal entity with a time-span." |
# | **DCTerms**   | `dcterms:temporal`            | dcterms.rdf:2010-2033   | related | "Temporal characteristics of the resource."      |
# | **OWL Time**  | `time:hasTemporalDuration`    | time.ttl:792-799        | broad   | Parent property; general duration of entity.     |
# | **OWL Time**  | `time:hasDurationDescription` | time.ttl:760-766        | narrow  | Structured duration description.                 |
#
# OWL Time Classes: time:Duration, time:Interval, time:TemporalEntity,
# time:DurationDescription, time:DateTimeInterval
#
# CREATED: 2026-01-14
# UPDATED: 2026-02-03 - Added multilingual support, verified ontology mappings
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_time_interval
name: has_time_interval
title: Has Time Interval
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  time: http://www.w3.org/2006/time#
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
default_prefix: hc
slots:
  has_time_interval:
    slot_uri: time:hasDuration
    description: |
      To be associated with a specific, continuous span of time that is characterized by defined start and end points.
    alt_descriptions:
      nl: Geassocieerd zijn met een specifieke, continue tijdspanne die wordt gekenmerkt door gedefinieerde begin- en eindpunten.
      de: Mit einer bestimmten, kontinuierlichen Zeitspanne verbunden sein, die durch definierte Anfangs- und Endpunkte gekennzeichnet ist.
      fr: Être associé à une période de temps spécifique et continue caractérisée par des points de début et de fin définis.
      ar: أن يكون مرتبطًا بفترة زمنية محددة ومستمرة تتميز بنقاط بداية ونهاية محددة.
      id: Dikaitkan dengan rentang waktu tertentu yang berkelanjutan yang ditandai dengan titik awal dan akhir yang ditentukan.
      zh: 与一个由明确的起点和终点定义的特定、连续的时间跨度相关联。
      es: Estar asociado con un intervalo de tiempo específico y continuo caracterizado por puntos de inicio y fin definidos.
    structured_aliases:
      - literal_form: heeft tijdsinterval
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Zeitintervall
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a pour intervalle de temps
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه فترة زمنية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki interval waktu
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有时间间隔
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene intervalo de tiempo
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    inlined: false
    exact_mappings:
    close_mappings:
      - schema:duration  # schemaorg.owl:15892-15920 - "Duration in ISO 8601 format"
      - crm:P4_has_time-span  # CIDOC_CRM:1242-1254 - associates temporal entity with time-span
    broad_mappings:
      - time:hasTemporalDuration  # time.ttl:792-799 - parent property; general duration
    narrow_mappings:
      - time:hasDurationDescription  # time.ttl:760-766 - structured duration description
      - time:hasXSDDuration  # xsd:duration typed literal
    related_mappings:
      - dcterms:temporal  # dcterms.rdf:2010-2033 - temporal characteristics of resource
      - schema:temporalCoverage  # schemaorg.owl:37609 - temporal coverage
    aliases:
      - has_or_had_time_interval
      - has_duration
      - performance_duration
      - post_type_max_duration
      - processing_duration_seconds
    annotations:
      custodian_types: '["*"]'
      custodian_types_rationale: Time interval associations applicable to all custodian types.
      custodian_types_primary: '*'
      specificity_score: 0.25
      specificity_rationale: Low specificity - universal temporal relationship.
    examples:
      - value: P7D
        description: Weekly update interval (ISO 8601 duration).
      - value: P1Y
        description: Annual time interval for revenue reporting.
      - value: PT10M
        description: Video duration of 10 minutes.
      - value: PT2H30M
        description: Event duration of 2 hours 30 minutes.
      - value: P3M
        description: Quarterly reporting period.
    comments:
      - Created from slot_fixes.yaml migration (2026-01-14).
      - Uses W3C Time Ontology for duration semantics.
      - |
        **TEMPORAL SEMANTICS** (RiC-O style):
        The "has_or_had" naming indicates that time interval associations can change:
        - Update frequencies may be revised
        - Approval times may change with policy updates
        - Reporting periods may vary
        - Durations of media content
      - |
        **USE CASES**:
        - Update frequency: How often data is refreshed (e.g., P7D for weekly)
        - Approval time: Expected processing duration
        - Reporting period: Time period for metrics/revenue
        - Media duration: Length of video/audio content
      - |
        **ISO 8601 DURATION FORMAT**:
        - P = period designator (required)
        - nY = years, nM = months, nD = days
        - T = time designator (before time components)
        - nH = hours, nM = minutes, nS = seconds
        - Examples: P1Y (1 year), P3M (3 months), PT30M (30 minutes)
      - |
        **ONTOLOGY ALIGNMENT** (verified against data/ontology/):
        | Ontology | Property | Line | Mapping | Notes |
        |----------|----------|------|---------|-------|
        | OWL Time | time:hasDuration | 752-759 | exact | Scaled value duration |
        | Schema.org | schema:duration | 15892-920 | close | ISO 8601 duration |
        | CIDOC-CRM | crm:P4_has_time-span | 1242-1254 | close | Time-span association |
        | OWL Time | time:hasTemporalDuration | 792-799 | broad | Parent property |
        | OWL Time | time:hasDurationDescription | 760-766 | narrow | Structured duration |
      - Updated 2026-02-03 with verified ontology mappings and translations.
