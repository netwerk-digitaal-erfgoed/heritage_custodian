id: https://nde.nl/ontology/hc/slot/has_degree
name: has_degree
title: Has Degree

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  has_degree:
    slot_uri: hc:hasDegree
    description: >-
      To specify the relative level, intensity, extent, or stage of a quality, attribute, or condition (e.g., degree of accuracy, degree of risk).
    alt_descriptions:
      nl: >-
        Het relatieve niveau, de intensiteit, de omvang of het stadium van een kwaliteit, eigenschap of toestand specificeren (bijv. mate van nauwkeurigheid, mate van risico).
      de: >-
        Das relative Niveau, die Intensität, das Ausmaß oder das Stadium einer Qualität, Eigenschaft oder eines Zustands angeben (z. B. Genauigkeitsgrad, Risikograd).
      fr: >-
        Spécifier le niveau relatif, l'intensité, l'étendue ou le stade d'une qualité, d'un attribut ou d'une condition (par ex., degré de précision, degré de risque).
      ar: >-
        تحديد المستوى النسبي أو الشدة أو النطاق أو المرحلة لجودة أو سمة أو حالة (مثل درجة الدقة، درجة المخاطرة).
      id: >-
        Menentukan tingkat relatif, intensitas, cakupan, atau tahap suatu kualitas, atribut, atau kondisi (misalnya, tingkat akurasi, tingkat risiko).
      zh: >-
        指定某种质量、属性或条件的相对水平、强度、范围或阶段（例如，准确度、风险程度）。
      es: >-
        Especificar el nivel relativo, la intensidad, el alcance o la etapa de una cualidad, atributo o condición (por ej., grado de precisión, grado de riesgo).
    structured_aliases:
      - literal_form: heeft graad
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Grad
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a un degré
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه درجة
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki derajat
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有程度
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene grado
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_degree
    comments:
      - |
        MIGRATED 2026-02-03 from has_or_had_degree for conciseness.
    annotations:
      custodian_types: '["*"]'
