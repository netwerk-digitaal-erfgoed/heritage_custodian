# ==============================================================================
# LinkML Slot Definition: receive
# ==============================================================================
# Gets, accepts, or takes delivery of an object, message, signal, grant, or
# service sent by another entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property/Class           | File/Line                        | Mapping  | Notes                                                        |
# |----------------|--------------------------|----------------------------------|----------|--------------------------------------------------------------|
# | **Schema.org** | `schema:ReceiveAction`   | schemaorg.owl:4710-4719          | related  | Class (not property); "physically/electronically receiving". |
# | **CIDOC-CRM**  | `crm:P22_transferred_title_to` | CIDOC_CRM_v7.1.3.rdf:1681-1695 | related | E8 Acquisition→E39 Actor; ownership transfer, narrower.     |
# | **CIDOC-CRM**  | `crm:P29_custody_received_by`  | CIDOC_CRM_v7.1.3.rdf:1875-1893 | related | E10 Transfer of Custody→E39 Actor; custody receipt.         |
# | **PROV-O**     | `prov:Accept`            | prov.ttl:2000-2008               | related  | Class; acceptance of a resource in provenance context.       |
#
# No external ontology defines a general "receive" action property; hc:receive
# is appropriate as slot_uri.
#
# CREATED: 2025-11-21
# UPDATED: 2026-02-11
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/receive
name: receive
title: Receive
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
imports:
  - linkml:types
default_prefix: hc
slots:
  receive:
    slot_uri: hc:receive
    description: >-
      Gets, accepts, or takes delivery of an object, message, signal, grant, or service
      sent by another entity.
    alt_descriptions:
      nl: >-
        Ontvangt of accepteert een object, bericht, signaal, subsidie of dienst die door
        een andere entiteit is verzonden.
      de: >-
        Empfängt oder nimmt ein Objekt, eine Nachricht, ein Signal, eine Zuwendung oder
        eine Dienstleistung an, die von einer anderen Entität gesendet wurde.
      fr: >-
        Reçoit ou accepte un objet, un message, un signal, une subvention ou un service
        envoyé par une autre entité.
      ar: >-
        يتلقى أو يقبل كائنًا أو رسالة أو إشارة أو منحة أو خدمة مرسلة من كيان آخر.
      id: >-
        Menerima atau mengambil objek, pesan, sinyal, hibah, atau layanan yang dikirim
        oleh entitas lain.
      zh: >-
        接收或接受由另一实体发送的对象、消息、信号、资助或服务。
      es: >-
        Recibe o acepta un objeto, mensaje, señal, subvención o servicio enviado por
        otra entidad.
    structured_aliases:
      - literal_form: ontvangen
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: empfangen
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: recevoir
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يتلقى
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: menerima
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 接收
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: recibir
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    related_mappings:
      - schema:ReceiveAction  # schemaorg.owl:4710-4719 - Class "ReceiveAction"; physically/electronically receiving
      - crm:P22_transferred_title_to  # CIDOC_CRM_v7.1.3.rdf:1681-1695 - E8 Acquisition→E39 Actor; ownership transfer
      - crm:P29_custody_received_by  # CIDOC_CRM_v7.1.3.rdf:1875-1893 - E10 Transfer of Custody→E39 Actor; custody receipt
    aliases:
      - receives_or_received
    annotations:
      custodian_types: '["*"]'
