# ==============================================================================
# LinkML Slot Definition: refer_to
# ==============================================================================
# Links a sign, identifier, or source segment to the entity it denotes.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology       | Property                          | File/Line                    | Mapping | Notes                                                                                     |
# |----------------|-----------------------------------|------------------------------|---------|-------------------------------------------------------------------------------------------|
# | **CIDOC-CRM**  | `crm:P67_refers_to`              | CIDOC_CRM_v7.1.3.rdf:2706   | close   | E89 Propositional Object→E1 CRM Entity. Literally "refers to." Same semantic intent;      |
# |                |                                   |                              |         | differs in domain (E89 only) and range (entity ref, not string).                          |
# | **DCTerms**    | `dcterms:references`              | dcterms.rdf:1782-1804        | broad   | "A related resource that is referenced, cited, or otherwise pointed to." Broader:          |
# |                |                                   |                              |         | general inter-resource referencing without the semiotic/denotational focus.                |
# | **CIDOC-CRM**  | `crm:P140_assigned_attribute_to`  | CIDOC_CRM_v7.1.3.rdf:4206   | related | E13 Attribute Assignment→E1 CRM Entity. Target entity of an attribution event; related    |
# |                |                                   |                              |         | but semantically distinct from general "refers to."                                       |
# | **Schema.org** | `schema:mentions`                 | schemaorg.owl:26198-26217    | related | CreativeWork→Thing. "Contains a reference to, but is not necessarily about a concept."     |
# |                |                                   |                              |         | Related: about mentioning within creative works specifically.                              |
#
# CREATED: 2026-02-10
# UPDATED: 2026-02-10
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/refer_to
name: refer_to
title: Refer To
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
imports:
  - linkml:types
default_prefix: hc
slots:
  refer_to:
    slot_uri: hc:referTo
    description: >-
      Links or points a sign, symbol, identifier, or source segment to the
      specific entity, concept, or resource it denotes, mentions, or
      represents. Used to record the target of a reference relationship where
      the referencing item (e.g. an inscription, catalogue entry, or data
      field) identifies or singles out a particular thing in the world.
    alt_descriptions:
      nl: >-
        Koppelt een teken, symbool, identificator of bronsegment aan de
        specifieke entiteit, het concept of de bron waarnaar het verwijst.
      de: >-
        Verknüpft ein Zeichen, Symbol, einen Identifikator oder ein
        Quellsegment mit der spezifischen Entität, dem Konzept oder der
        Ressource, auf die es verweist.
      fr: >-
        Relie un signe, symbole, identifiant ou segment de source à l'entité,
        au concept ou à la ressource spécifique qu'il désigne, mentionne ou
        représente.
      ar: >-
        يربط علامة أو رمزاً أو معرّفاً أو جزءاً مصدرياً بالكيان أو المفهوم أو
        المورد المحدد الذي يشير إليه.
      id: >-
        Menghubungkan tanda, simbol, pengidentifikasi, atau segmen sumber ke
        entitas, konsep, atau sumber daya tertentu yang dirujuknya.
      zh: >-
        将标记、符号、标识符或来源片段链接到其所指称、提及或表示的特定实体、概念
        或资源。
      es: >-
        Vincula un signo, símbolo, identificador o segmento de fuente con la
        entidad, concepto o recurso específico al que denota, menciona o
        representa.
    structured_aliases:
      - literal_form: verwijst naar
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: verweist auf
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: renvoie à
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يشير إلى
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: merujuk ke
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 指向
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: refiere a
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: false
    close_mappings:
      - crm:P67_refers_to  # CIDOC_CRM_v7.1.3.rdf:2706-2717 - "refers to." E89 Propositional Object→E1 CRM Entity. Same semantic intent; differs in domain (E89 only) and range (entity ref vs string).
    broad_mappings:
      - dcterms:references  # dcterms.rdf:1782-1804 - "A related resource that is referenced, cited, or otherwise pointed to." Broader: general inter-resource referencing.
    related_mappings:
      - crm:P140_assigned_attribute_to  # CIDOC_CRM_v7.1.3.rdf:4206-4218 - "assigned attribute to." E13 Attribute Assignment→E1 CRM Entity. Target entity of an attribution event; not general "refers to."
      - schema:mentions  # schemaorg.owl:26198-26217 - "Contains a reference to, but is not necessarily about a concept." CreativeWork→Thing.
    aliases:
      - object_ref
      - place_custodian_ref
      - profile_location
      - recognized_person_name
      - refers_or_referred_to
      - refers_to_custodian
      - refers_to_legal_status
      - refers_to_person
      - refers_to_storage
    examples:
      - value: "Rijksmuseum Amsterdam"
        description: >-
          An inscription or catalogue entry that refers to the Rijksmuseum as
          the holding institution.
      - value: "NL-AmRMA"
        description: >-
          An ISIL code used as an identifier that refers to a specific
          heritage custodian.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        Stores the reference target as a plain string. For typed entity
        references (URIs or CURIEs), classes may override the range in
        slot_usage.
      - >-
        Classes may override slot_uri in slot_usage to bind to a more specific
        CRM property (e.g. crm:P67_refers_to for propositional objects or
        crm:P140_assigned_attribute_to for attribute assignment contexts).
