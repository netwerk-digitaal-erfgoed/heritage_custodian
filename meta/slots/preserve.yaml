# ==============================================================================
# LinkML Slot Definition: preserve
# ==============================================================================
# Maintains, protects, or keeps an entity safe from harm, decay, or loss.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology  | Term                         | File/Line                        | Mapping | Notes                                                                |
# |-----------|------------------------------|----------------------------------|---------|----------------------------------------------------------------------|
# | **CRM**   | `crm:P147_curated`           | CIDOC_CRM_v7.1.3.rdf:4378-4397  | related | "Associates E87 Curation Activity with E78 Curated Holding."         |
# | **CRM**   | `crm:E87_Curation_Activity`  | CIDOC_CRM_v7.1.3.rdf:1095-1105  | (class) | "Evolving, preserving, and promoting a collection." Reference only.  |
# | **RiC-O** | `rico:hasOrHadSubject`        | RiC-O_1-1.rdf:8231-8241         | n/a     | "Connects RecordResource to Thing." Not preservation; excluded.      |
# | **PROV**  | `prov:used`                  | prov.ttl:1039-1052               | related | "Entity used by Activity." Too generic for preservation.             |
# | **Schema**| `schema:object`              | schemaorg.owl:27871-27879        | related | "Object upon which action is carried out." Generic action target.    |
# | **PREMIS**| `premis:PreservationPolicy`  | premis3.owl:208-216              | (class) | "Decision/policy on preservation functions." Reference only.         |
#
# No external ontology defines a property that specifically captures the act
# of preserving an entity; slot_uri remains hc:preserve.
#
# CREATED: 2026-01-19
# UPDATED: 2026-02-11
# ==============================================================================
id: https://nde.nl/ontology/hc/slot/preserve
name: preserve
title: Preserve
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
default_prefix: hc
imports:
  - linkml:types
slots:
  preserve:
    slot_uri: hc:preserve
    description: >-
      Maintains, protects, or keeps an entity, object, data, or environment
      safe from harm, decay, or loss, ensuring its longevity or original state.
      In heritage custodian contexts this covers physical conservation of
      collection items, digital preservation of born-digital or digitised
      assets, environmental monitoring to prevent deterioration, and
      safeguarding of intangible cultural heritage practices. The relationship
      may be historical, indicating that an entity preserved different content
      over time.
    alt_descriptions:
      nl: >-
        Onderhoudt, beschermt of bewaart een entiteit, object, data of omgeving
        tegen schade, verval of verlies, en waarborgt de duurzaamheid of
        oorspronkelijke staat ervan.
      de: >-
        Erhält, schützt oder bewahrt eine Entität, ein Objekt, Daten oder eine
        Umgebung vor Schaden, Verfall oder Verlust und sichert deren
        Langlebigkeit oder Originalzustand.
      fr: >-
        Maintient, protège ou conserve une entité, un objet, des données ou un
        environnement contre les dommages, la dégradation ou la perte, en
        assurant sa longévité ou son état d'origine.
      ar: >-
        يحافظ على كيان أو كائن أو بيانات أو بيئة أو يحميها أو يصونها من
        الضرر أو التدهور أو الفقدان، مما يضمن استمراريتها أو حالتها الأصلية.
      id: >-
        Memelihara, melindungi, atau menjaga suatu entitas, objek, data, atau
        lingkungan dari kerusakan, pembusukan, atau kehilangan, memastikan
        keawetan atau kondisi aslinya.
      zh: >-
        维护、保护或保存实体、对象、数据或环境，使其免受损害、衰变或丢失，确保其持久性或原始状态。
      es: >-
        Mantiene, protege o conserva una entidad, objeto, datos o entorno
        contra daños, deterioro o pérdida, asegurando su longevidad o estado
        original.
    structured_aliases:
      - literal_form: bewaren
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: bewahren
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: préserver
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: يحفظ
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: melestarikan
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 保存
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: preservar
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    related_mappings:
      - crm:P147_curated  # CIDOC_CRM_v7.1.3.rdf:4378-4397 - "Associates E87 Curation Activity with E78 Curated Holding"
      - prov:used  # prov.ttl:1039-1052 - "Entity used by Activity" - too generic
      - schema:object  # schemaorg.owl:27871-27879 - "Object upon which action is carried out" - generic action target
    aliases:
      - preserves_or_preserved
    examples:
      - value: "hc:conservation-lab-01"
        description: >-
          A conservation laboratory preserves a collection of 17th-century
          oil paintings through climate-controlled storage and periodic
          restoration treatments.
      - value: "hc:digital-archive-nl"
        description: >-
          A national digital archive preserves born-digital government
          records through format migration and redundant storage.
    annotations:
      custodian_types: '["*"]'
    comments:
      - >-
        In LLM response contexts this slot can replace boolean flags like
        clear_thinking by pointing to a ReasoningContent object that captures
        what reasoning is being preserved across turns.
      - >-
        Classes may narrow the range in slot_usage to reference specific
        target classes (e.g., ReasoningContent, CollectionItem).
      - "Migrated from: clear_thinking (2026-01-19)."
