# ==============================================================================
# LinkML Slot Definition: has_audio
# ==============================================================================
# Links to an audio resource associated with an entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line                  | Mapping | Notes                              |
# |---------------|-----------------------|----------------------------|---------|------------------------------------|
# | **Schema.org**| `schema:audio`        | schemaorg.owl:9199-9202    | exact   | "An embedded audio object"         |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-06 - Rewrote alt_descriptions to faithfully translate English description
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_audio
name: has_audio
title: Has Audio

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  has_audio:
    slot_uri: schema:audio
    description: >-
      To contain, feature, or include sound recordings, voice tracks, or auditory elements.
    alt_descriptions:
      nl: >-
        Geluidsopnamen, stemsporen of auditieve elementen bevatten, kenmerken of omvatten.
      de: >-
        Tonaufnahmen, Stimmspuren oder auditive Elemente enthalten, aufweisen oder einschließen.
      fr: >-
        Contenir, présenter ou inclure des enregistrements sonores, des pistes vocales ou des éléments auditifs.
      ar: >-
        احتواء أو تضمين أو عرض تسجيلات صوتية أو مسارات صوتية أو عناصر سمعية.
      id: >-
        Mengandung, menampilkan, atau menyertakan rekaman suara, trek vokal, atau elemen auditori.
      zh: >-
        包含、展示或纳入录音、语音轨道或听觉元素。
      es: >-
        Contener, presentar o incluir grabaciones de sonido, pistas de voz o elementos auditivos.
    structured_aliases:
      - literal_form: heeft audio
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: hat Audio
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: a de l'audio
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: لديه صوت
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: memiliki audio
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 有音频
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: tiene audio
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    aliases:
      - has_or_had_audio
    exact_mappings:
    annotations:
      custodian_types: '["*"]'
