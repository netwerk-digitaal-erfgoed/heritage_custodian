# ==============================================================================
# LinkML Slot Definition: has_metadata
# ==============================================================================
# To possess or be associated with structured data that describes, explains,
# or provides context about the characteristics, content, or quality of an entity.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                              |
# |---------------|-----------------------|----------------------|---------|------------------------------------|
# | **Schema.org**| `schema:about`        | schemaorg.owl:6657   | related | Subject matter (not metadata)      |
# | **PROV-O**    | `prov:wasGeneratedBy` | prov.ttl:1108-1118   | related | Entity generated by activity       |
# | **DCTerms**   | `dcterms:description` | dcterms.rdf          | related | Descriptive information            |
#
# HIERARCHY: No standard ontology property for "has metadata" - domain-specific
#
# CREATED: 2026-01-20
# UPDATED: 2026-02-03 - Fixed mapping: schema:about is NOT exact (subject matter vs metadata)
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/has_metadata
name: has_metadata
title: has_metadata
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  skos: http://www.w3.org/2004/02/skos/core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  org: http://www.w3.org/ns/org#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: hc
imports:
- linkml:types
slots:
  has_metadata:
    name: has_metadata
    description: >-
      To possess or be associated with structured data that describes,
      explains, or provides context about the characteristics, content, or
      quality of an entity.
    alt_descriptions:
      nl: >-
        Om gestructureerde gegevens te bezitten of ermee geassocieerd te zijn
        die de kenmerken, inhoud of kwaliteit van een entiteit beschrijven,
        uitleggen of context bieden.
      de: >-
        Strukturierte Daten zu besitzen oder damit verbunden zu sein, die die
        Eigenschaften, den Inhalt oder die Qualität einer Entität beschreiben,
        erklären oder kontextualisieren.
      fr: >-
        Posséder ou être associé à des données structurées qui décrivent,
        expliquent ou fournissent un contexte sur les caractéristiques, le
        contenu ou la qualité d'une entité.
      ar: >-
        امتلاك أو الارتباط ببيانات منظمة تصف أو تشرح أو توفر سياقاً حول
        خصائص أو محتوى أو جودة كيان ما.
      id: >-
        Memiliki atau terkait dengan data terstruktur yang menjelaskan,
        menerangkan, atau memberikan konteks tentang karakteristik, konten,
        atau kualitas suatu entitas.
      zh: >-
        拥有或与描述、解释或提供关于实体特征、内容或质量的上下文的结构化数据相关联。
      es: >-
        Poseer o estar asociado con datos estructurados que describen,
        explican o proporcionan contexto sobre las características, contenido
        o calidad de una entidad.
    structured_aliases:
      - literal_form: metadata
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: Metadaten
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: métadonnées
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: بيانات وصفية
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: metadata
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 元数据
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: metadatos
        predicate: EXACT_SYNONYM
        in_language: es
    slot_uri: hc:hasMetadata
    range: string # uriorcurie
    multivalued: true
    related_mappings:
      - schema:about  # Subject matter, not metadata - different semantics
      - prov:wasGeneratedBy  # Entity generated by activity
      - dcterms:description  # Descriptive information
    aliases: 
      - has_or_had_metadata
      - has_or_had_transformation_metadata
      - has_transformation_metadata
    annotations:
      custodian_types: '["*"]'
    comments:
      - MIGRATED from enrichment_metadata_whatsapp per slot_fixes.yaml (Rule 53).
