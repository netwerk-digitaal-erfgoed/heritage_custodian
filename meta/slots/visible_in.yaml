# ==============================================================================
# LinkML Slot Definition: visible_in
# ==============================================================================
# Indicates that something is perceptibly present or observable within a specific
# physical object, media representation, or scope.
#
# ONTOLOGY ALIGNMENT (verified against data/ontology/):
#
# | Ontology      | Property              | File/Line            | Mapping | Notes                              |
# |---------------|-----------------------|----------------------|---------|------------------------------------|
# | **Custom**    | `hc:visibleIn`        | N/A                  | -       | No direct standard equivalent      |
#
# CREATED: 2026-02-03
# UPDATED: 2026-02-04 - Added header, multilingual support
# ==============================================================================

id: https://nde.nl/ontology/hc/slot/visible_in
name: visible_in
title: Visible In

prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: hc

imports:
  - linkml:types

slots:
  visible_in:
    slot_uri: hc:visibleIn
    description: >-
      To be perceptibly present, observable, or detectable within a specific
      physical object, media representation, or scope.
    alt_descriptions:
      nl: >-
        Waarneembaar aanwezig, zichtbaar of detecteerbaar zijn binnen een specifiek
        fysiek object, mediarepresentatie of bereik.
      de: >-
        Wahrnehmbar vorhanden, beobachtbar oder erkennbar innerhalb eines bestimmten
        physischen Objekts, einer Mediendarstellung oder eines Bereichs zu sein.
      fr: >-
        Être perceptiblement présent, observable ou détectable dans un objet
        physique spécifique, une représentation médiatique ou un périmètre donné.
      ar: >-
        أن يكون موجودًا بشكل ملحوظ، أو قابلًا للملاحظة أو الاكتشاف ضمن كائن مادي
        محدد أو تمثيل إعلامي أو نطاق معين.
      id: >-
        Hadir secara nyata, dapat diamati, atau terdeteksi dalam objek fisik
        tertentu, representasi media, atau cakupan tertentu.
      zh: >-
        在特定物理对象、媒体表示或范围内可感知地存在、可观察或可检测。
      es: >-
        Estar perceptiblemente presente, observable o detectable dentro de un
        objeto físico específico, una representación mediática o un ámbito determinado.
    structured_aliases:
      - literal_form: zichtbaar in
        predicate: EXACT_SYNONYM
        in_language: nl
      - literal_form: sichtbar in
        predicate: EXACT_SYNONYM
        in_language: de
      - literal_form: visible dans
        predicate: EXACT_SYNONYM
        in_language: fr
      - literal_form: مرئي في
        predicate: EXACT_SYNONYM
        in_language: ar
      - literal_form: terlihat dalam
        predicate: EXACT_SYNONYM
        in_language: id
      - literal_form: 可见于
        predicate: EXACT_SYNONYM
        in_language: zh
      - literal_form: visible en
        predicate: EXACT_SYNONYM
        in_language: es
    range: string
    multivalued: true
    aliases:
      - is_or_was_visible_in
    annotations:
      custodian_types: '["*"]'
