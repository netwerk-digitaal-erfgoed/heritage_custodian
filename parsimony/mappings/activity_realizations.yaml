id: https://nde.nl/ontology/hc/parsimony/mappings/activity-realizations
name: activity_realizations
title: Activity Realizations
description: >-
  Structured realization notes for how the semantic Activity hub is implemented
  through engineering provenance and event-oriented classes and slots.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/Activity
  - ../slots/functions_as
  - ../slots/has_spatial_scope
  - ../../../modules/classes/WebObservation
  - ../../../modules/classes/CustodianTimelineEvent
  - ../../../modules/slots/has_degree
  - ../../../modules/slots/has_level
  - ../../../modules/slots/has_position
  - ../../../modules/slots/retrieved_by
  - ../../../modules/slots/retrieved_at
  - ../../../modules/slots/retrieved_through
  - ../../../modules/slots/cover_country
  - ../../../modules/slots/cover_place
  - ../../../modules/slots/generated_by
  - ../../../modules/slots/transferred_from
  - ../../../modules/slots/transferred_to
comments:
  - >-
    REALIZATION AXIS: The semantic Activity hub is realized operationally by
    WebObservation when the engineering ontology needs explicit retrieval
    provenance for web-based evidence.
  - >-
    REALIZATION AXIS: CustodianTimelineEvent realizes semantic activity as a
    dated organizational transition record when institutional lifecycle change is
    the focus rather than evidence retrieval.
  - >-
    REALIZATION AXIS: Engineering retrieved_by, retrieved_at, and
    retrieved_through decompose semantic activity into agent, time, and method
    facets. Engineering generated_by, transferred_from, and transferred_to add
    workflow and transfer directionality where needed.
  - >-
    REALIZATION AXIS: Semantic functions_as gathers engineering role- and
    qualification-style slots such as has_position, has_degree, and selected
    has_level patterns when an activity like employment, study, or proficiency
    is described through the capacity exercised in that episode.
  - >-
    REALIZATION AXIS: Semantic has_spatial_scope gathers engineering
    cover_country and cover_place style coverage when an activity is framed by a
    territorial remit rather than by its immediate physical location.
