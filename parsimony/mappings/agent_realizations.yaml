id: https://nde.nl/ontology/hc/parsimony/mappings/agent-realizations
name: agent_realizations
title: Agent Realizations
description: >-
  Structured realization notes for how the semantic Agent hub is implemented
  through engineering person-, organization-, and affiliation-oriented classes
  and slots.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/Agent
  - ../../../modules/classes/Person
  - ../../../modules/classes/Organization
  - ../../../modules/classes/Employer
  - ../../../modules/classes/Department
  - ../../../modules/slots/member_of
  - ../../../modules/slots/has_position
  - ../../../modules/slots/has_role
  - ../../../modules/slots/cover_country
comments:
  - >-
    REALIZATION AXIS: The semantic Agent hub is concretized through engineering
    Person, Organization, Employer, and Department classes whenever the model
    needs actor-like identity with richer operational detail.
  - >-
    REALIZATION AXIS: Semantic affiliated_with remains the broad bridge over
    engineering member_of and related membership patterns when the focus is
    simply that an agent belongs to or is connected with an organization.
  - >-
    REALIZATION AXIS: Semantic functions_as gathers direct engineering role-like
    annotations such as has_position and has_role when an agent is described by
    the capacity in which it serves rather than by a more permanent type.
  - >-
    REALIZATION AXIS: Semantic has_spatial_scope gathers engineering
    cover_country-style territorial remit when an agent is described by the
    jurisdiction or national frame within which it operates, keeping that
    separate from physical address or current location.
