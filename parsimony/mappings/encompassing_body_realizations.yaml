id: https://nde.nl/ontology/hc/parsimony/mappings/encompassing-body-realizations
name: encompassing_body_realizations
title: Encompassing Body Realizations
description: >-
  Structured realization notes for how the semantic EncompassingBody hub is
  implemented through engineering governance and coordination classes and slots.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/EncompassingBody
  - ../slots/affiliated_with
  - ../slots/has_affiliate
  - ../slots/has_spatial_scope
  - ../../../modules/classes/EncompassingBody
  - ../../../modules/classes/ArchiveNetwork
  - ../../../modules/classes/ConnectionNetwork
  - ../../../modules/enums/EncompassingBodyTypeEnum
  - ../../../modules/slots/has_type
  - ../../../modules/slots/has_authority
  - ../../../modules/slots/has_policy
  - ../../../modules/slots/in_jurisdiction
  - ../../../modules/slots/has_membership_criteria
  - ../../../modules/slots/has_legal_form
  - ../../../modules/slots/member_of
comments:
  - >-
    REALIZATION AXIS: The semantic EncompassingBody hub is concretized by the
    abstract engineering EncompassingBody class, which defines governance,
    coordination, and service-provision context for heritage custodians.
  - >-
    REALIZATION AXIS: Engineering subtype semantics (umbrella organizations,
    networks, consortia, cooperatives, social movements, funding bodies) are
    captured through the EncompassingBodyTypeEnum rather than separate
    parsimony classes, keeping the semantic layer compact.
  - >-
    REALIZATION AXIS: Engineering ArchiveNetwork and ConnectionNetwork realize
    specific network-oriented facets of the encompassing body concept, adding
    operational detail about network membership and collaboration patterns.
  - >-
    REALIZATION AXIS: Semantic affiliated_with and has_affiliate gather
    engineering member_of and related membership patterns when the focus is
    the organizational embedding of custodians within encompassing structures.
  - >-
    REALIZATION AXIS: Semantic has_spatial_scope gathers engineering
    in_jurisdiction-style territorial framing when the encompassing body is
    described by its jurisdictional or national reach rather than physical
    location.
  - >-
    REALIZATION AXIS: Engineering has_authority, has_policy, has_membership_criteria,
    and has_legal_form distribute governance-specific facets that the semantic
    layer deliberately abstracts away into typed_as and has_note_literal.
