id: https://nde.nl/ontology/hc/parsimony/mappings/classification-realizations
name: classification_realizations
title: Classification Realizations
description: >-
  Structured realization notes for how the semantic Classification hub is
  implemented through engineering type hierarchies and bounded vocabularies.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/Classification
  - ../../../modules/classes/AgentType
  - ../../../modules/classes/CustodianType
  - ../../../modules/classes/ArchiveOrganizationType
  - ../../../modules/classes/CollectionType
  - ../../../modules/classes/LibraryType
  - ../../../modules/classes/RecordSetTypes
  - ../../../modules/classes/DigitalPlatformTypes
  - ../../../modules/enums/AgentTypeEnum
  - ../../../modules/slots/has_type
comments:
  - >-
    REALIZATION AXIS: The semantic Classification hub is realized primarily
    through engineering class-backed type systems such as CustodianType,
    ArchiveOrganizationType, CollectionType, LibraryType, RecordSetTypes,
    DigitalPlatformTypes, and AgentType.
  - >-
    REALIZATION AXIS: Engineering AgentTypeEnum realizes a bounded operational
    vocabulary for provenance work, not a full open semantic classification
    hierarchy.
  - >-
    REALIZATION AXIS: Engineering has_type operationalizes classification across
    many classes by connecting entities to specific type classes or enum-backed
    values.
