id: https://nde.nl/ontology/hc/parsimony/mappings/holding-realizations
name: holding_realizations
title: Holding Realizations
description: >-
  Structured realization notes for how the semantic Holding hub is implemented
  through engineering collection and record-set models.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/Holding
  - ../slots/has_spatial_scope
  - ../../../modules/classes/CustodianCollection
  - ../../../modules/classes/CollectionType
  - ../../../modules/classes/RecordSetTypes
  - ../../../modules/classes/CustodianArchiveRecordSetType
  - ../../../modules/classes/MuseumArchiveRecordSetType
  - ../../../modules/classes/FilmArchiveRecordSetType
  - ../../../modules/classes/ProvincialArchiveRecordSetType
  - ../../../modules/slots/hold
  - ../../../modules/slots/has_type
  - ../../../modules/slots/part_of
  - ../../../modules/slots/temporal_extent
  - ../../../modules/slots/cover_country
  - ../../../modules/slots/cover_geographic_subdivision
  - ../../../modules/slots/cover_place
comments:
  - >-
    REALIZATION AXIS: The semantic Holding hub is concretized operationally by
    CustodianCollection as the main engineering class for curated bodies of
    material governed by preservation and access practice.
  - >-
    REALIZATION AXIS: Engineering type systems such as CollectionType,
    RecordSetTypes, CustodianArchiveRecordSetType, MuseumArchiveRecordSetType,
    FilmArchiveRecordSetType, and ProvincialArchiveRecordSetType realize the
    semantic holding concept as arrangement, aggregation, and record-family
    taxonomies.
  - >-
    REALIZATION AXIS: Engineering hold, has_type, part_of, and temporal_extent
    decompose semantic holding meaning into custody, classification,
    containment, and temporal coverage structures.
  - >-
    REALIZATION AXIS: Semantic has_spatial_scope gathers engineering
    cover_country, cover_geographic_subdivision, and cover_place when a holding
    is defined by geographic coverage, collecting remit, or regional scope
    rather than only by where it is stored.
