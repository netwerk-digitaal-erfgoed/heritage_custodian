id: https://nde.nl/ontology/hc/parsimony/mappings/parsimony-engineering-type-realizations
name: parsimony_engineering_type_realizations
title: Parsimony Engineering Type Realizations
description: >-
  Expanded realization notes showing how the semantic Classification hub is
  concretized by multiple engineering type families.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/Classification
  - ../../../modules/classes/AgentType
  - ../../../modules/classes/ArchiveOrganizationType
  - ../../../modules/classes/CollectionType
  - ../../../modules/classes/CustodianType
  - ../../../modules/classes/DigitalPlatformTypes
  - ../../../modules/classes/LibraryType
  - ../../../modules/classes/RecordSetTypes
  - ../../../modules/enums/AgentTypeEnum
comments:
  - >-
    TYPE REALIZATION: Classification -> CustodianType is the main engineering
    realization for institution-level heritage classification.
  - >-
    TYPE REALIZATION: Classification -> ArchiveOrganizationType and LibraryType
    are sibling engineering realizations under the broader CustodianType family.
  - >-
    TYPE REALIZATION: Classification -> CollectionType and RecordSetTypes are
    engineering realizations used for archival arrangement and holding-specific
    classification rather than organizational typing.
  - >-
    TYPE REALIZATION: Classification -> DigitalPlatformTypes is an engineering
    realization used for repository, discovery, and platform taxonomies.
  - >-
    TYPE REALIZATION: Classification -> AgentType is an abstract engineering
    realization used for provenance-facing agent categories.
  - >-
    TYPE REALIZATION: Classification -> AgentTypeEnum is a closed operational
    realization for bounded provenance vocabularies and should not be treated as
    semantically equivalent to the open semantic Classification hub.
