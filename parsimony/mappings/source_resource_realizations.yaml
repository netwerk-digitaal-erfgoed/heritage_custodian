id: https://nde.nl/ontology/hc/parsimony/mappings/source-resource-realizations
name: source_resource_realizations
title: Source Resource Realizations
description: >-
  Structured realization notes for how the semantic SourceResource hub is
  implemented through engineering source bundles, publication slots, and related
  association structures.
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
default_prefix: hc
imports:
  - linkml:types
  - ../../../modules/metadata
  - ../classes/SourceResource
  - ../../../modules/classes/CustodianSourceFile
  - ../../../modules/slots/has_source
  - ../../../modules/slots/has_publisher
  - ../../../modules/slots/related_to
comments:
  - >-
    REALIZATION AXIS: The semantic SourceResource hub is realized most directly
    through CustodianSourceFile, which acts as the engineering root bundle for a
    full source document together with enrichment and provenance metadata.
  - >-
    REALIZATION AXIS: Engineering has_source and has_publisher distribute source
    semantics into derivation and publication roles that remain unified in the
    semantic layer.
  - >-
    REALIZATION AXIS: Engineering related_to is often used to attach auxiliary
    documents, reports, and publication-like resources that are treated more
    generally as semantic source associations.
