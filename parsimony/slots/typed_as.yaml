id: https://nde.nl/ontology/hc/parsimony/slot/typed_as
name: typed_as
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  typed_as:
    slot_uri: schema:additionalType
    description: Relates a concept to a reusable classification or type node.
    range: Classification
    inverse: is_type_of
    implements:
      - owl:ObjectProperty
    multivalued: true
    related_mappings:
      - skos:broader
    narrow_mappings:
      - hc:has_type
