id: https://nde.nl/ontology/hc/parsimony/slot/made_available_by
name: made_available_by
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  made_available_by:
    slot_uri: dcterms:publisher
    description: Relates a semantic resource to the agent that publishes, issues, or otherwise makes it available.
    range: Agent
    inverse: makes_available
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - schema:publisher
    narrow_mappings:
      - hc:has_publisher
