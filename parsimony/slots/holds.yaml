id: https://nde.nl/ontology/hc/parsimony/slot/holds
name: holds
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  rico: https://www.ica.org/standards/RiC/ontology#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  holds:
    slot_uri: rico:isOrWasHolderOf
    description: Relates a custodian or agent concept to a holding concept it holds or held.
    range: Holding
    inverse: held_by
    implements:
      - owl:ObjectProperty
    multivalued: true
    narrow_mappings:
      - hc:hold
