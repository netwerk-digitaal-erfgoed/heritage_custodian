id: https://nde.nl/ontology/hc/parsimony/slot/has_note_literal
name: has_note_literal
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  has_note_literal:
    slot_uri: schema:description
    description: Free-text note used for concise semantic documentation.
    range: string
    implements:
      - owl:DatatypeProperty
    multivalued: true
    close_mappings:
      - skos:note
