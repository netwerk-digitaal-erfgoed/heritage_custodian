id: https://nde.nl/ontology/hc/parsimony/slot/situated_in_time
name: situated_in_time
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  situated_in_time:
    slot_uri: crm:P4_has_time-span
    description: Places an entity, activity, or relation within a time span, period, or temporal frame.
    range: string
    implements:
      - owl:DatatypeProperty
    multivalued: true
    related_mappings:
      - prov:startedAtTime
      - prov:endedAtTime
    narrow_mappings:
      - hc:temporal_extent
