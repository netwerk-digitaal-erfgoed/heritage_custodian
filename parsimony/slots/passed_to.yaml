id: https://nde.nl/ontology/hc/parsimony/slot/passed_to
name: passed_to
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  passed_to:
    slot_uri: hc:passedTo
    description: Indicates the destination agent or place to which custody, possession, or a resource is passed in a transfer context.
    range: Agent
    inverse: received_from
    implements:
      - owl:ObjectProperty
    multivalued: true
    narrow_mappings:
      - crm:P29_custody_received_by
      - schema:toLocation
      - hc:transferred_to
