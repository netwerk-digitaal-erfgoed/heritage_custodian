id: https://nde.nl/ontology/hc/parsimony/slot/yielded_by
name: yielded_by
title: Yielded By
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  yielded_by:
    description: Inverse of yields. Relates an output entity to the activity that yielded it.
