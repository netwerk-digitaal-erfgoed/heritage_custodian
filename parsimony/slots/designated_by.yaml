id: https://nde.nl/ontology/hc/parsimony/slot/designated_by
name: designated_by
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  designated_by:
    slot_uri: crm:P1_is_identified_by
    description: Connects an entity to a name, identifier, code, or appellation by which it is designated.
    range: Designation
    inverse: designates
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - rico:hasOrHadIdentifier
    narrow_mappings:
      - hc:identified_by
