id: https://nde.nl/ontology/hc/parsimony/slot/available_via
name: available_via
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  available_via:
    slot_uri: schema:url
    description: Indicates the page, service, portal, or endpoint through which a resource is made available.
    range: uri
    implements:
      - owl:DatatypeProperty
    multivalued: true
    close_mappings:
      - dcat:accessURL
    related_mappings:
      - dcat:landingPage
      - dcterms:identifier
