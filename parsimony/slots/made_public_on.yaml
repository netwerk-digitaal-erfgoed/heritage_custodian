id: https://nde.nl/ontology/hc/parsimony/slot/made_public_on
name: made_public_on
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  made_public_on:
    slot_uri: dcterms:issued
    description: States the date on which a semantic resource is officially issued, published, or otherwise made public.
    range: datetime
    implements:
      - owl:DatatypeProperty
    multivalued: true
    close_mappings:
      - schema:datePublished
    narrow_mappings:
      - hc:published_on
