id: https://nde.nl/ontology/hc/parsimony/slot/yields
name: yields
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  yields:
    slot_uri: prov:generated
    description: >-
      Relates an activity to the observations it produces. The activity yields
      evidence-bearing observations that can then indicate semantic entities.
    range: Observation
    inverse: yielded_by
    implements:
      - owl:ObjectProperty
    multivalued: true
    related_mappings:
      - prov:wasGeneratedBy
