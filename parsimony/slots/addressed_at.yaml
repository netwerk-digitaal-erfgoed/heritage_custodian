id: https://nde.nl/ontology/hc/parsimony/slot/addressed_at
name: addressed_at
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  addressed_at:
    slot_uri: schema:address
    description: Relates a semantic entity to a postal, physical, or service address used for communication, delivery, or identification.
    range: uriorcurie
    inverse: addresses
    implements:
      - owl:ObjectProperty
    multivalued: true
    narrow_mappings:
      - hc:has_address
