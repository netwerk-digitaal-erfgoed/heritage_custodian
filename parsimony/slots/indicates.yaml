id: https://nde.nl/ontology/hc/parsimony/slot/indicates
name: indicates
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  crm: http://www.cidoc-crm.org/cidoc-crm/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  indicates:
    slot_uri: hc:indicates
    description: >-
      Connects an observation to the semantic entity it provides evidence about.
      The observation indicates (points to, serves as evidence for) a custodial
      entity, place, holding, legal status, source, or encompassing body.
    range: uriorcurie
    inverse: indicated_by
    implements:
      - owl:ObjectProperty
    multivalued: true
    related_mappings:
      - prov:generated
      - crm:P141_assigned
    narrow_mappings:
      - hc:indicate
      - hc:observe
