id: https://nde.nl/ontology/hc/parsimony/slot/accessed_under
name: accessed_under
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  accessed_under:
    slot_uri: dcterms:accessRights
    description: States the conditions, rights, restrictions, or policy framework under which a resource may be accessed.
    range: string
    implements:
      - owl:DatatypeProperty
    multivalued: true
    close_mappings:
      - schema:conditionsOfAccess
    narrow_mappings:
      - hc:has_access_policy
