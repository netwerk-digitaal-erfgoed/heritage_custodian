id: https://nde.nl/ontology/hc/parsimony/slot/expressed_in
name: expressed_in
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  expressed_in:
    slot_uri: dcterms:language
    description: Relates a semantic resource, observation, or designation to the language in which it is expressed or documented.
    range: uriorcurie
    inverse: expresses
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - schema:inLanguage
    narrow_mappings:
      - hc:has_language
