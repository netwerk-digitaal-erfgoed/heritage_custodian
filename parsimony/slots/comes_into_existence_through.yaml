id: https://nde.nl/ontology/hc/parsimony/slot/comes_into_existence_through
name: comes_into_existence_through
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  prov: http://www.w3.org/ns/prov#
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  comes_into_existence_through:
    slot_uri: crm:P92i_was_brought_into_existence_by
