id: https://nde.nl/ontology/hc/parsimony/slot/attested_in
name: attested_in
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  attested_in:
    slot_uri: dcterms:source
    description: Links an entity, observation, or claim to a source in which it is attested or documented.
    range: SourceResource
    inverse: attests
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - prov:used
    narrow_mappings:
      - hc:has_source
