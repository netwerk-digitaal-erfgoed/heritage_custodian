id: https://nde.nl/ontology/hc/parsimony/slot/has_affiliate
name: has_affiliate
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  org: http://www.w3.org/ns/org#
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  has_affiliate:
    slot_uri: org:hasMember
    description: Relates a semantic group, network, or organization to an affiliated member or participating entity.
    range: Agent
    inverse: affiliated_with
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - schema:member
    narrow_mappings:
      - hc:has_member
