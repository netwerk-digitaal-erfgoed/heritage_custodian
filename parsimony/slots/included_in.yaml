id: https://nde.nl/ontology/hc/parsimony/slot/included_in
name: included_in
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  included_in:
    slot_uri: dcterms:isPartOf
    description: Relates an entity to a larger whole, set, or framework within which it is included.
    range: uriorcurie
    inverse: includes
    implements:
      - owl:ObjectProperty
    multivalued: true
    close_mappings:
      - schema:isPartOf
    narrow_mappings:
      - hc:partOf
      - hc:encompassedBy
