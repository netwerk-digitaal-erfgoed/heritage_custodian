id: https://nde.nl/ontology/hc/parsimony/slot/equivalent_to
name: equivalent_to
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  equivalent_to:
    slot_uri: skos:exactMatch
    description: Relates a semantic entity to another entity that is treated as semantically equivalent across authority systems or conceptual schemes.
    range: uriorcurie
    implements:
      - owl:ObjectProperty
    multivalued: true
    comments:
      - >-
        DESIGN DECISION: equivalent_to is a symmetric property — if X is equivalent to Y then
        Y is equivalent to X. No distinct inverse property is needed or meaningful. OOPS P13
        (missing inverse) is accepted for this slot; declaring owl:SymmetricProperty triggers
        OOPS P28 (wrong symmetric), so symmetry is documented here instead.
    close_mappings:
      - schema:sameAs
    narrow_mappings:
      - hc:equivalent_to
