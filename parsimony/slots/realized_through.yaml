id: https://nde.nl/ontology/hc/parsimony/slot/realized_through
name: realized_through
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  prov: http://www.w3.org/ns/prov#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  realized_through:
    slot_uri: prov:wasGeneratedBy
    description: Relates an entity to the activity, process, or reconstruction workflow through which it becomes realized.
    range: Activity
    inverse: realizes
    implements:
      - owl:ObjectProperty
    multivalued: true
    broad_mappings:
      - prov:wasInfluencedBy
    related_mappings:
      - prov:generated
    narrow_mappings:
      - hc:generated_by
