id: https://nde.nl/ontology/hc/parsimony/slot/marked_as
name: marked_as
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  marked_as:
    slot_uri: hc:hasStatus
    description: Marks an entity with a current state, standing, or descriptive status relevant to interpretation or access.
    range: string
    implements:
      - owl:DatatypeProperty
    multivalued: true
    related_mappings:
      - schema:status
    narrow_mappings:
      - hc:has_status
