id: https://nde.nl/ontology/hc/parsimony/slot/contactable_through
name: contactable_through
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
slots:
  contactable_through:
    slot_uri: schema:contactPoint
    description: Relates a semantic entity to a contact point, channel, or service interface through which communication is directed.
    range: uriorcurie
    inverse: provides_contact_for
    implements:
      - owl:ObjectProperty
    multivalued: true
    narrow_mappings:
      - hc:has_contact_point
