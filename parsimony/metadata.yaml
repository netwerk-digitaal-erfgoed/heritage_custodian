id: https://nde.nl/ontology/hc/parsimony/metadata
name: heritage_custodian_parsimony_metadata
title: Heritage Custodian Parsimony Ontology - Metadata
description: >-
  Metadata root for the semantic LinkML package created through a parsimony
  methodology and layered over the engineering ontology in ../modules/.
version: 0.1.0
license: https://creativecommons.org/licenses/by-sa/4.0/
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  prov: http://www.w3.org/ns/prov#
  pico: https://personsincontext.org/model#
  schema: https://schema.org/
  rico: https://www.ica.org/standards/RiC/ontology#
  dcterms: http://purl.org/dc/terms/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  owl: http://www.w3.org/2002/07/owl#
default_prefix: hc
imports:
  - linkml:types
  - ../modules/metadata
slots:
  ontology_layer:
    description: >-
      Annotation indicating whether a schema element belongs to the semantic
      layer or to a mapped engineering realization.
    range: string
