id: https://nde.nl/ontology/hc/parsimony/class/Designation
name: Designation
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  crm: http://www.cidoc-crm.org/cidoc-crm/
  rico: https://www.ica.org/standards/RiC/ontology#
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label_literal
  - ../slots/has_uri_literal
  - ../slots/expressed_in
  - ../slots/equivalent_to
  - ../slots/typed_as
classes:
  Designation:
    class_uri: crm:E41_Appellation
    description: Broad concept for identifiers, names, codes, and appellations used to identify entities.
    narrow_mappings:
      - rico:Identifier
    slots:
      - has_label_literal
      - has_uri_literal
      - expressed_in
      - equivalent_to
      - typed_as
