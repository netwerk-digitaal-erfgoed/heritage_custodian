id: https://nde.nl/ontology/hc/parsimony/class/Classification
name: Classification
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  skos: http://www.w3.org/2004/02/skos/core#
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label_literal
  - ../slots/has_note_literal
  - ../slots/equivalent_to
classes:
  Classification:
    class_uri: skos:Concept
    description: Semantic classification node used for typology and semantic narrowing.
    broad_mappings:
      - crm:E55_Type
    examples:
      - value:
          has_label_literal:
            - Archive organization
          has_note_literal:
            - Classifies custodial institutions focused on archival holdings.
        description: Semantic classification node reused across custodian and holding descriptions.
    slots:
      - has_label_literal
      - has_note_literal
      - equivalent_to
