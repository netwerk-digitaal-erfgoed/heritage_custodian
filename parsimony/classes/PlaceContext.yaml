id: https://nde.nl/ontology/hc/parsimony/class/PlaceContext
name: PlaceContext
prefixes:
  linkml: https://w3id.org/linkml/
  hc: https://nde.nl/ontology/hc/
  schema: https://schema.org/
  crm: http://www.cidoc-crm.org/cidoc-crm/
default_prefix: hc
imports:
  - linkml:types
  - ../slots/has_label_literal
  - ../slots/has_uri_literal
  - ../slots/addressed_at
  - ../slots/equivalent_to
  - ../slots/typed_as
classes:
  PlaceContext:
    class_uri: schema:Place
    description: Broad place class for named locations used in custodial description and provenance.
    broad_mappings:
      - crm:E53_Place
    narrow_mappings:
      - hc:CustodianPlace
    slots:
      - has_label_literal
      - has_uri_literal
      - addressed_at
      - equivalent_to
      - typed_as
